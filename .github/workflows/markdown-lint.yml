name: Lint Markdown

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23

  no-summaries:
    name: No-summaries grep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run the no-summaries grep
        run: |
          set -e
          # The "no-summaries" rule from agents.md §"The 'no-summaries,
          # every step explicit' rule". The list is maintained in
          # agents.md; if you add a new banned phrase, add it there
          # AND to the regex below.
          #
          # We use grep -P (PCRE) for the negative lookbehind on
          # "non-trivially" (which is allowed because the negation
          # is part of the word). The banned-phrase list is allowed
          # in:
          # - agents.md itself (the canonical source of the rule)
          # - design.md (which is linter-ignored)
          # - Quoted mentions in chapter reading guides (ch00, ch07
          #   explicitly mention the rule in their reading guides;
          #   these are marked with <!-- no-summaries-ok -->)
          # - The cited-literature sections, where the original
          #   papers may use these phrases when describing their
          #   own omissions.
          #
          # The pattern uses negative lookbehind to exclude
          # "non-trivially" (allowed) from "trivially" (banned).
          PATTERN='\bby inspection\b|\bafter some algebra\b|\bit can be shown\b|\bstraightforward to evaluate\b|\bby a similar argument\b|\bleaves as an exercise\b|\bafter some manipulation\b|\bit is easy to verify\b|(?<!non-)\btrivially\b|\banalogously,\b|\ba straightforward manipulation\b|\bomitted for brevity\b|\bwe do not show the details here\b|\bthe reader can verify\b|\bas a quick check\b|\bone can verify\b|\bthe result follows from\b|\bwe omit the details\b|\bit is left as\b|\bleft to the reader\b|\bdetails are left\b|\bfor the interested reader\b'
          exit_code=0
          for f in dft_notes/chapter_*/00-*.md; do
            # grep -P for PCRE (lookbehind support)
            # Exclude lines marked with <!-- no-summaries-ok -->
            if grep -nP "$PATTERN" "$f" | grep -v 'no-summaries-ok' | grep -v '<!-- no-summaries-ok -->'; then
              echo ""
              echo "FAIL: Banned 'summarise-and-skip' phrases in $f."
              echo "See agents.md §'The no-summaries, every step explicit rule'."
              exit_code=1
            fi
          done
          if [ $exit_code -ne 0 ]; then
            exit $exit_code
          fi
          echo "OK: no banned phrases found in any chapter"
