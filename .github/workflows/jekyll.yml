name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Allow one concurrent deployment, queueing newer runs and cancelling in-progress
# older runs on the same ref.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets `GITHUB_TOKEN` permissions to allow deployment to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent accidental deploys from forks.
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          cache-version: 1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          # Avoid future-dated posts being skipped in CI.
          JEKYLL_BUILD_FUTURE: "true"
          # Strict front matter helps catch broken notes early.
          STRICT: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
