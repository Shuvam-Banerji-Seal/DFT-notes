name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Allow one concurrent deployment. Newer runs queue; older in-progress runs
# are allowed to complete (deploys are not cheap to interrupt).
concurrency:
  group: "pages"
  cancel-in-progress: false

# Minimum `GITHUB_TOKEN` permissions for the build job (deployment is in the
# next job with its own elevated permissions).
permissions:
  contents: read

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          cache-version: 1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          # Avoid future-dated posts being skipped in CI.
          JEKYLL_BUILD_FUTURE: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    # `environment:` is a job-level key. It must be inside a job, not at the
    # top level of the workflow file.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
