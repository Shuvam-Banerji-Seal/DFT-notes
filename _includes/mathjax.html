<!--
  MathJax 3 — TeX input, SVG output.

  Why SVG (was CHTML in the previous version):
    The CHTML bundle (tex-mml-chtml.js) emits internal MathML for
    assistive technology. The MathML it emits uses three attributes
    that the MathML spec has deprecated:

      - mathvariant='bold' on <mi>           (replaced by CSS)
      - accent / accentunder inferred from   (replaced by explicit
        a core operator on <mover>/<munder>   attributes)

    These produced console warnings on every chapter:
      "mathvariant='bold' on MathML elements is deprecated..."
      "Inferring the accent property from the core operator..."
      "Inferring the accentunder property from the core operator..."

    Switching to SVG (tex-svg.js) makes MathJax skip the MathML output
    entirely... almost. MathJax 3's SVG bundle STILL emits an
    <mjx-assistive-mml> element inside every <mjx-container> for
    screen-reader fallback, and that assistive MathML uses the same
    deprecated attributes. So the warnings persist.

    The fix below chains into the default pageReady and runs a
    post-typeset cleanup that removes the deprecated MathML.

  Kramdown line-break repair:
    The site's kramdown config uses GFM input, which (correctly per
    the GFM spec) converts a trailing `\\` at end of line into an
    HTML `<br />` line break. LaTeX also uses `\\` as a line break
    inside math (`\begin{array}...\end{array}`), and MathJax rejects
    `<br />` inside math with "Misplaced \hline" or "Extra close
    brace" errors. The repair function converts these <br /> back to
    `\\` text nodes BEFORE MathJax scans the document.

  Why no MutationObserver:
    An earlier iteration used a MutationObserver to re-run the
    repair and re-typeset on every DOM mutation. That design caused
    an infinite loop (typeset -> DOM-mutation -> observer -> typeset)
    which hung the page. Kramdown generates all math content
    server-side, so a one-shot pass is sufficient.

  pageReady must return a promise:
    When overriding pageReady, you must return a promise. If you
    return a non-promise value (e.g. `true`), MathJax thinks
    typesetting is done and never runs the actual typeset. This is
    documented in the MathJax 3 startup-actions page.

  Side benefits of SVG output:
    - Crisp rendering at any zoom level
    - Identical output across browsers (no font-loading races)
    - Smaller HTML footprint per equation
    - Consistent print quality

  Input delimiters:
    Inline:     $...$   or   \(...\)
    Display:    $$...$$ or   \[...\]

  Refs:
    https://docs.mathjax.org/en/latest/web/actions.html
    https://docs.mathjax.org/en/latest/output/svg.html
-->
<script>
  // ------- Helper: rewrite <br> back to \\ inside math envs -------
  // MathJax sees the raw HTML before typesetting. Kramdown's GFM
  // pass converts a trailing "\\" at end of line into a <br /> in
  // HTML. So a source line like:
  //
  //     x \\
  //     y
  //
  // becomes:
  //
  //     x \<br>y
  //
  // in the HTML. (The leading "x \" is a single backslash that
  // is the residue of the original "\\".)
  //
  // MathJax doesn't know about <br> tags. We need the line break
  // to appear as "\\" in the TeX stream. Three cases, by what
  // immediately precedes the <br> in the DOM:
  //
  //  1. Text ends in "\\" (double backslash): the original "\\"
  //     was kept by kramdown, the <br /> is just an additional
  //     line break. Just remove the <br />; the line break is
  //     already there as "\\".
  //
  //  2. Text ends in "\" (single backslash): kramdown stripped
  //     one of the backslashes. Remove the <br /> and the
  //     preceding "\" so we're left with nothing (the line break
  //     was already emitted as "\\" in the markdown but lost
  //     one backslash in transit - so we add it back by
  //     concatenating the next row to the current row).
  //     Actually simpler: replace the <br /> with "\\" so we
  //     get a "\\" line break in the TeX stream.
  //
  //  3. Text ends in something else: the <br /> isn't part of a
  //     line-break sequence. Remove it.
  function repairBrInMath() {
    var candidates = document.body.querySelectorAll('p, li, dd, dt, div, blockquote');
    for (var i = 0; i < candidates.length; i++) {
      var node = candidates[i];
      if (node.tagName === 'PRE' || node.tagName === 'CODE') continue;
      var text = node.textContent || '';
      var hasMath = /\\begin\{(equation|align|gather|matrix|array|cases|aligned|gathered|multline)\b/.test(text)
                 || /\$\$.+\$\$/s.test(text);
      if (!hasMath) continue;
      var brs = node.querySelectorAll('br');
      for (var j = 0; j < brs.length; j++) {
        var br = brs[j];
        var prev = br.previousSibling;
        var prevText = '';
        if (prev) {
          if (prev.nodeType === 3) prevText = prev.textContent || '';
          else if (prev.nodeType === 1) prevText = prev.textContent || '';
        }
        if (/\\\s*$/.test(prevText)) {
          // Case 1: text ends in "\\" or "\". The line break is
          // already in the TeX (the "\\" or "\"), so just remove
          // the <br />. If the text ends in just "\", the
          // resulting TeX has "\\" (line break) which is what
          // we want.
          //
          // Actually we need to be careful: if the text ends in
          // a single "\", that's an escape character, not a line
          // break. We need to add the missing backslash.
          if (/\\\\\s*$/.test(prevText)) {
            // Already has "\\" line break, just remove the <br>
            br.parentNode.removeChild(br);
          } else if (/\\\s*$/.test(prevText)) {
            // Text ends in single "\". The original "\\" became
            // just "\" (kramdown stripped one backslash), and
            // the <br /> is the kramdown line break. Replace
            // the "\<br />" sequence with "\\" (one line break).
            // That means: change the preceding text node's
            // last "\" + the <br /> to "\\".
            //
            // We do this by setting the previous text node's
            // content to (its content minus the trailing "\")
            // and inserting a "\\" text node in place of the br.
            if (prev.nodeType === 3) {
              prev.textContent = prev.textContent.replace(/\\\s*$/, '');
            }
            var newText = document.createTextNode('\\\\');
            br.parentNode.replaceChild(newText, br);
          }
        } else {
          // Case 3: not a line break context, just remove
          br.parentNode.removeChild(br);
        }
      }
    }
  }

  // ------- Helper: strip deprecated assistive MathML from rendered math -------
  // MathJax's SVG output wraps each equation in an <mjx-container>
  // that contains a child <mjx-assistive-mml> for screen readers.
  // That child uses the deprecated MathML attributes that cause
  // console warnings. The visual SVG (also in the container) is
  // unaffected by removing it.
  function cleanupAssistiveMml() {
    var els = document.querySelectorAll('mjx-assistive-mml');
    for (var i = 0; i < els.length; i++) els[i].remove();
  }

  // ------- Helper: collapse soft line breaks in text nodes -------
  // Kramdown's GFM mode preserves source newlines as literal "\n"
  // characters in text nodes (rather than adding <br />). In normal
  // flow with `white-space: normal`, these collapse to spaces —
  // EXCEPT when the "\n" appears at the start of a text node that
  // immediately follows a replaced inline element (like the SVG
  // inside an mjx-container). In that case the "\n" can trigger
  // a visible line break in some renderers, producing awkward
  // "random newline after math" artifacts across the site.
  //
  // Fix: walk every text node in the document, skip the ones
  // inside <pre>, <code>, <script>, <style> (which legitimately
  // preserve formatting), and collapse any run of whitespace
  // (including "\n") to a single space. This normalises the
  // kramdown output to match what a browser would produce from
  // single-spaced HTML.
  function normalizeTextWhitespace() {
    var skipTags = { PRE: 1, CODE: 1, SCRIPT: 1, STYLE: 1, NOSCRIPT: 1 };
    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: function (node) {
          var p = node.parentNode;
          while (p && p !== document.body) {
            if (skipTags[p.tagName]) return NodeFilter.FILTER_REJECT;
            p = p.parentNode;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );
    var node;
    var fixed = 0;
    while ((node = walker.nextNode())) {
      var before = node.nodeValue;
      // Collapse any run of whitespace (including newlines) to a
      // single space. Trim leading/trailing whitespace.
      var after = before.replace(/\s+/g, ' ').replace(/^ | $/g, '');
      if (after !== before) {
        node.nodeValue = after;
        fixed++;
      }
    }
    return fixed;
  }

  window.MathJax = {
    tex: {
      inlineMath:    [['$', '$'], ['\\(', '\\)']],
      displayMath:   [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true,
      tags: 'ams',
      macros: {
        '\\R': '\\mathbb{R}',
        '\\N': '\\mathbb{N}',
        '\\Z': '\\mathbb{Z}',
        '\\C': '\\mathbb{C}'
      }
    },
    loader: { load: ['[tex]/ams', '[tex]/bbox', '[tex]/boldsymbol'] },
    options: {
      enableMenu: false,
      skipHtmlTags: { '[+]': ['code', 'pre'] },
      renderActions: { addMenu: [] }
    },
    startup: {
      // CRITICAL: pageReady MUST return a promise. If it returns a
      // non-promise value, MathJax treats that as typesetting
      // having completed and never runs the actual typeset.
      //
      // Flow: run the repair (BEFORE defaultPageReady so MathJax
      // sees "\\" not "<br>"), then defaultPageReady which does
      // the actual typeset, then cleanup to strip the deprecated
      // assistive MathML.
      pageReady: function () {
        repairBrInMath();
        normalizeTextWhitespace();
        return MathJax.startup.defaultPageReady().then(function () {
          cleanupAssistiveMml();
          // Run again after typeset — MathJax may have added new
          // text nodes (assistive-mml placeholders, equation
          // numbers) that also need normalising.
          normalizeTextWhitespace();
        });
      },
      ready: function () {
        MathJax.startup.defaultReady();
      }
    }
  };
</script>
<script
  id="MathJax-script"
  async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
></script>
