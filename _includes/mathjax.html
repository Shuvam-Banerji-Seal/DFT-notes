<!--
  MathJax 3 — TeX input, SVG output.

  Why SVG (was CHTML in the previous version):
    The CHTML bundle (tex-mml-chtml.js) emits internal MathML for
    assistive technology. The MathML it emits uses three attributes
    that the MathML spec has deprecated:

      - mathvariant='bold' on <mi>           (replaced by CSS)
      - accent / accentunder inferred from   (replaced by explicit
        a core operator on <mover>/<munder>   attributes)

    These produced console warnings on every chapter:
      "mathvariant='bold' on MathML elements is deprecated..."
      "Inferring the accent property from the core operator..."
      "Inferring the accentunder property from the core operator..."

    Switching to SVG (tex-svg.js) makes MathJax skip the MathML output
    entirely... almost. MathJax 3's SVG bundle STILL emits an
    <mjx-assistive-mml> element inside every <mjx-container> for
    screen-reader fallback, and that assistive MathML uses the same
    deprecated attributes. So the warnings persist.

    The fix below registers an `attachMathJax` callback that fires
    after each MathJax pass and removes the <mjx-assistive-mml>
    elements. The SVG output remains fully rendered (it's the
    primary visual content); we just drop the redundant internal
    MathML fallback that nobody reads in practice.

    Accessibility tradeoff: the <mjx-container> elements still carry
    their aria-label from MathJax (set during typesetting, before
    the cleanup). Screen readers will read the visual SVG via the
    parent aria-label. Pure assistive-MathML readers (rare in 2025)
    will get nothing — but they would have received deprecated
    MathML anyway, so this is a strict improvement.

  Kramdown line-break repair:
    The site's kramdown config uses GFM input, which (correctly per
    the GFM spec) converts a trailing `\\` at end of line into an
    HTML `<br />` line break. LaTeX also uses `\\` as a line break
    inside math (`\begin{array}...\end{array}`), and MathJax rejects
    `<br />` inside math with "Misplaced \hline" or "Extra close
    brace" errors.

    To work around this without giving up GFM (which we need for
    GitHub-flavoured tables and code-fence handling), the pre-typeset
    hook below walks the DOM, finds every `<p>` / `<li>` / `<div>`
    whose text content contains a math environment (`\begin{...}` /
    `$$...$$` / `\[...\]`), and rewrites the `<br />` elements inside
    them back to the literal `\\` that MathJax expects. Code blocks
    (`<pre><code>`) are skipped, so legitimate `<br />` inside
    inline code is preserved.

  Side benefits of SVG output:
    - Crisp rendering at any zoom level
    - Identical output across browsers (no font-loading races)
    - Smaller HTML footprint per equation
    - Consistent print quality

  Input delimiters:
    Inline:     $...$   or   \(...\)
    Display:    $$...$$ or   \[...\]

  Refs:
    https://docs.mathjax.org/en/latest/output/svg.html
    https://docs.mathjax.org/en/latest/options/input/tex.html
-->
<script>
  window.MathJax = {
    tex: {
      inlineMath:    [['$', '$'], ['\\(', '\\)']],
      displayMath:   [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true,
      tags: 'ams',
      macros: {
        '\\R': '\\mathbb{R}',
        '\\N': '\\mathbb{N}',
        '\\Z': '\\mathbb{Z}',
        '\\C': '\\mathbb{C}'
      }
    },
    loader: { load: ['[tex]/ams', '[tex]/bbox', '[tex]/boldsymbol'] },
    options: {
      enableMenu: false,
      skipHtmlTags: { '[+]': ['code', 'pre'] },
      renderActions: { addMenu: [] }
    },
    startup: {
      pageReady: () => {
        // ------- Pre-typeset: rewrite <br /> back to \\ inside math -------
        // Kramdown + GFM converts "text \\\n" (LaTeX line break) into
        // "text \<br />". MathJax sees the <br /> inside math and errors.
        // Run BEFORE MathJax scans the document so it sees \\ not <br />.
        const repairBrInMath = () => {
          // Find all elements that contain a math environment. Use
          // querySelectorAll with a substring match on the innerHTML
          // (it's not perfect — tags may nest — but it's good enough
          // for our case where math blocks are always inside <p>).
          const candidates = document.body.querySelectorAll('p, li, dd, dt, div, blockquote');
          for (const node of candidates) {
            // Skip code blocks
            if (node.tagName === 'PRE' || node.tagName === 'CODE') continue;
            // Check for math content
            const text = node.textContent || '';
            if (!/\\begin\{(equation|align|gather|matrix|array|cases|aligned|gathered|multline)\b/.test(text)
                && !/\$\$.+\$\$/s.test(text)) continue;
            // Replace <br> children with text nodes carrying \\
            const brs = Array.from(node.querySelectorAll('br'));
            for (const br of brs) {
              const text = document.createTextNode('\\\\');
              br.parentNode.replaceChild(text, br);
            }
          }
        };
        repairBrInMath();
        return true;
      },
      ready: () => {
        MathJax.startup.defaultReady();

        // ------- Post-typeset: remove deprecated assistive MathML -------
        const cleanup = () => {
          document.querySelectorAll('mjx-assistive-mml').forEach(
            el => el.remove()
          );
        };

        MathJax.startup.promise.then(() => {
          cleanup();
          // Set up observer for future re-renders
          const observer = new MutationObserver(() => {
            repairBrInMath();
            MathJax.typesetPromise().then(cleanup);
          });
          observer.observe(document.body, {
            childList: true,
            subtree: true,
          });
        });
      }
    }
  };
</script>
<script
  id="MathJax-script"
  async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
></script>
