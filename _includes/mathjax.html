<!--
  MathJax 3 — TeX input, SVG output.

  Why SVG (was CHTML in the previous version):
    The CHTML bundle (tex-mml-chtml.js) emits internal MathML for
    assistive technology. The MathML it emits uses three attributes
    that the MathML spec has deprecated:

      - mathvariant='bold' on <mi>           (replaced by CSS)
      - accent / accentunder inferred from   (replaced by explicit
        a core operator on <mover>/<munder>   attributes)

    These produced console warnings on every chapter:
      "mathvariant='bold' on MathML elements is deprecated..."
      "Inferring the accent property from the core operator..."
      "Inferring the accentunder property from the core operator..."

    Switching to SVG (tex-svg.js) makes MathJax skip the MathML output
    entirely... almost. MathJax 3's SVG bundle STILL emits an
    <mjx-assistive-mml> element inside every <mjx-container> for
    screen-reader fallback, and that assistive MathML uses the same
    deprecated attributes. So the warnings persist.

    The fix below registers a `pageReady` callback that runs BEFORE
    MathJax scans the document, walks every <p> / <li> / <div> /
    <blockquote> that contains a math environment, and rewrites any
    <br /> children back to the literal `\\` text node that MathJax
    expects. After typesetting, the assistive-mml cleanup runs once
    to remove the deprecated MathML.

  Kramdown line-break repair:
    The site's kramdown config uses GFM input, which (correctly per
    the GFM spec) converts a trailing `\\` at end of line into an
    HTML `<br />` line break. LaTeX also uses `\\` as a line break
    inside math (`\begin{array}...\end{array}`), and MathJax rejects
    `<br />` inside math with "Misplaced \hline" or "Extra close
    brace" errors. The repair function converts these <br /> back to
    `\\` text nodes before MathJax scans the document. Code blocks
    (`<pre><code>`) are skipped, so legitimate `<br />` inside
    inline code is preserved.

  Side benefits of SVG output:
    - Crisp rendering at any zoom level
    - Identical output across browsers (no font-loading races)
    - Smaller HTML footprint per equation
    - Consistent print quality

  Input delimiters:
    Inline:     $...$   or   \(...\)
    Display:    $$...$$ or   \[...\]

  Refs:
    https://docs.mathjax.org/en/latest/output/svg.html
    https://docs.mathjax.org/en/latest/options/input/tex.html
-->
<script>
  // ------- Helper functions (defined at window scope so all MathJax
  //          callbacks can access them) -------
  function repairBrInMath() {
    // Find all elements that may contain math content. Use
    // querySelectorAll to find block-level elements (p, li, dd, dt,
    // div, blockquote); check each for math environment markers and
    // rewrite <br /> children back to "\\" text nodes.
    var candidates = document.body.querySelectorAll('p, li, dd, dt, div, blockquote');
    for (var i = 0; i < candidates.length; i++) {
      var node = candidates[i];
      if (node.tagName === 'PRE' || node.tagName === 'CODE') continue;
      var text = node.textContent || '';
      var hasMath = /\\begin\{(equation|align|gather|matrix|array|cases|aligned|gathered|multline)\b/.test(text)
                 || /\$\$.+\$\$/s.test(text);
      if (!hasMath) continue;
      var brs = node.querySelectorAll('br');
      for (var j = 0; j < brs.length; j++) {
        var br = brs[j];
        var newText = document.createTextNode('\\\\');
        br.parentNode.replaceChild(newText, br);
      }
    }
  }

  function cleanupAssistiveMml() {
    var els = document.querySelectorAll('mjx-assistive-mml');
    for (var i = 0; i < els.length; i++) els[i].remove();
  }

  window.MathJax = {
    tex: {
      inlineMath:    [['$', '$'], ['\\(', '\\)']],
      displayMath:   [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true,
      tags: 'ams',
      macros: {
        '\\R': '\\mathbb{R}',
        '\\N': '\\mathbb{N}',
        '\\Z': '\\mathbb{Z}',
        '\\C': '\\mathbb{C}'
      }
    },
    loader: { load: ['[tex]/ams', '[tex]/bbox', '[tex]/boldsymbol'] },
    options: {
      enableMenu: false,
      skipHtmlTags: { '[+]': ['code', 'pre'] },
      renderActions: { addMenu: [] }
    },
    startup: {
      pageReady: () => {
        // Run BEFORE MathJax scans the document so it sees \\ not <br />
        repairBrInMath();
        return true;
      },
      ready: () => {
        MathJax.startup.defaultReady();

        MathJax.startup.promise.then(() => {
          cleanupAssistiveMml();
          // Re-run the repair on every DOM mutation (theme toggle,
          // dynamic content, page navigation) so MathJax re-typesets
          // with clean math input.
          var observer = new MutationObserver(() => {
            repairBrInMath();
            if (window.MathJax && window.MathJax.typesetPromise) {
              window.MathJax.typesetPromise().then(cleanupAssistiveMml);
            }
          });
          observer.observe(document.body, {
            childList: true,
            subtree: true,
          });
        });
      }
    }
  };
</script>
<script
  id="MathJax-script"
  async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
></script>
