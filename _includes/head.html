<!--
  Local override of minima's head include. Replicates the theme's
  default head verbatim, then adds MathJax at the end so the
  `$$...$$` math in dft_notes/ actually renders on the client.

  If the site ever drops minima, the new theme's head should keep
  the same five slots (charset / IE / viewport / SEO / main.css)
  plus the MathJax include — that's the contract this file fulfils.

  Note: minima 2.5 (which is what we use, with Jekyll 3.10) calls
  other partials via `{%- include -%}`, not `{%- include_cached -%}`.
  The cached variant is Jekyll 4+ only.
-->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
{%- seo -%}
<link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
{%- feed_meta -%}
{%- include mathjax.html -%}
