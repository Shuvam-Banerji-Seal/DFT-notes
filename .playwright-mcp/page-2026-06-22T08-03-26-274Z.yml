      - heading "1.1 PySCF" [level=3] [ref=e108]
      - list [ref=e109]:
        - listitem [ref=e110]:
          - strong [ref=e111]: "License:"
          - text: Apache-2.0.
          - strong [ref=e112]: "Language:"
          - text: Python (C kernels).
          - strong [ref=e113]: "Repo:"
          - link "https://github.com/pyscf/pyscf" [ref=e114] [cursor=pointer]:
            - /url: https://github.com/pyscf/pyscf
        - listitem [ref=e115]:
          - strong [ref=e116]: "DFT methods:"
          - text: RKS / UKS / GKS DFT, hybrid and range-separated functionals (
          - link "chapter 05" [ref=e117] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: §5.4–5.5), collinear and non-collinear spin-DFT, density-fitting DFT, explicit-response TDDFT, real-time TDDFT, DFT+DMFT.
        - listitem [ref=e118]:
          - strong [ref=e119]: "Basis sets:"
          - text: GTOs. Pople, Dunning, Karlsruhe (def2), ANO, even-tempered; user-defined sets.
        - listitem [ref=e120]:
          - strong [ref=e121]: "DFT Notes chapters:"
          - text: 03, 04, 05, 06.
        - listitem [ref=e122]:
          - strong [ref=e123]: When to use.
          - text: The de facto open-source QC code. The right default for
          - emphasis [ref=e124]: method development
          - text: ": the entire SCF, ERI contraction, and DIIS loop is in plain"
          - code [ref=e125]: numpy
          - text: "-readable Python, and the source compiles in minutes. It is"
          - emphasis [ref=e126]: not
          - text: the right default for
          - emphasis [ref=e127]: production
          - text: CCSD(T) on a 50-atom organic molecule with a triple-zeta basis — Psi4 or Q-Chem will be 3–10× faster because they ship hand-tuned integral engines (Libint) and more aggressive parallelisation. For TM multi-reference work, use ORCA or PySCF’s CASSCF.
      - heading "1.2 Psi4" [level=3] [ref=e128]
      - list [ref=e129]:
        - listitem [ref=e130]:
          - strong [ref=e131]: "License:"
          - text: LGPL-3.0.
          - strong [ref=e132]: "Language:"
          - text: Python front end, C++ back end.
          - strong [ref=e133]: "Repo:"
          - link "https://github.com/psi4/psi4" [ref=e134] [cursor=pointer]:
            - /url: https://github.com/psi4/psi4
        - listitem [ref=e135]:
          - strong [ref=e136]: "DFT methods:"
          - text: SCF, DFT (LDA, GGA, hybrid, range-separated), explicit-response TDDFT, ADC(2), EOM-CCSD, MP2, MP3, CC2, CCSD, CCSD(T), SAPT, DFT-SAPT, FCIQMC plugin. Geometry optimisation, harmonic frequencies, IRC, transition states.
        - listitem [ref=e137]:
          - strong [ref=e138]: "Basis sets:"
          - text: GTOs. Pople, Dunning, Karlsruhe, JKFIT / RIFIT auxiliary bases, ccECP effective core potentials.
        - listitem [ref=e139]:
          - strong [ref=e140]: "DFT Notes chapters:"
          - text: 02, 03, 04, 05, 06.
        - listitem [ref=e141]:
          - strong [ref=e142]: When to use.
          - text: The right pick for open-source
          - emphasis [ref=e143]: production
          - text: quantum chemistry at small-to-medium scale. The C++ side uses Libint and is fast; the Python front end is pleasant to script. The community is friendly and the documentation is excellent. For TM multi-reference work, reach for ORCA or PySCF.
      - heading "1.3 ORCA" [level=3] [ref=e144]
      - list [ref=e145]:
        - listitem [ref=e146]:
          - strong [ref=e147]: "License:"
          - text: Free for academic use; commercial for industry (source-available, not OSI open source).
          - strong [ref=e148]: "Language:"
          - text: C++.
          - strong [ref=e149]: "Repo:"
          - link "https://orcaforum.kofo.mpg.de/" [ref=e150] [cursor=pointer]:
            - /url: https://orcaforum.kofo.mpg.de/
        - listitem [ref=e151]:
          - strong [ref=e152]: "DFT methods:"
          - text: "SCF, KS-DFT (LDA, GGA, meta-GGA, hybrid, range-separated, double-hybrid), TDDFT, RIJCOSX, broken-symmetry DFT for antiferromagnets, CASSCF, NEVPT2, MRCI, DLPNO-CCSD(T), CEPA. Strong on spectroscopy: UV/Vis, XAS, EPR, NMR, Mössbauer."
        - listitem [ref=e153]:
          - strong [ref=e154]: "Basis sets:"
          - text: GTOs. def2 family, SARC auxiliary bases for transition metals, Karlsruhe segmented-contracted sets.
        - listitem [ref=e155]:
          - strong [ref=e156]: "DFT Notes chapters:"
          - text: 03, 04, 05, 06.
        - listitem [ref=e157]:
          - strong [ref=e158]: When to use.
          - text: The de facto standard in
          - emphasis [ref=e159]: "inorganic and organometalli`c"
          - text: ’ quantum chemistry.
          - strong [ref=e160]: DLPNO-CCSD(T)
          - text: makes canonical-accuracy coupled cluster tractable on 100–200-atom systems; the broken-symmetry DFT framework is the workhorse for antiferromagnetic TM clusters (
          - link "chapter 04" [ref=e161] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: §4.8.5); the spectroscopy modules are unmatched. The main weakness is the closed-source distribution and the steep licence procedure.
      - heading "1.4 Q-Chem" [level=3] [ref=e162]
      - list [ref=e163]:
        - listitem [ref=e164]:
          - strong [ref=e165]: "License:"
          - text: Commercial.
          - strong [ref=e166]: "Language:"
          - text: C++ / Fortran.
          - strong [ref=e167]: "Repo:"
          - link "https://www.q-chem.com/" [ref=e168] [cursor=pointer]:
            - /url: https://www.q-chem.com/
        - listitem [ref=e169]:
          - strong [ref=e170]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, range-separated, double-hybrid), explicit-response TDDFT, ADC(2), EOM-CCSD, CCSD(T), EOM-CC methods, spin-flip TDDFT, ab-initio MD, fragment-based methods (ALMO, FMO, XPol), constrained DFT, non-equilibrium PCM.
        - listitem [ref=e171]:
          - strong [ref=e172]: "Basis sets:"
          - text: GTOs. Pople, Dunning, Karlsruhe, midbond functions, user-definable.
        - listitem [ref=e173]:
          - strong [ref=e174]: "DFT Notes chapters:"
          - text: 03, 04, 05, 06.
        - listitem [ref=e175]:
          - strong [ref=e176]: When to use.
          - text: The right pick for
          - emphasis [ref=e177]: high-throughput quantum chemistry
          - text: "in a commercial setting: pharmaceutical screening, large-molecule excited states (EOM-CCSD is well-developed), spin-flip TDDFT for diradicals. The fragment-based methods (ALMO) are unmatched for large covalently-bonded systems."
      - heading "1.5 Gaussian" [level=3] [ref=e178]
      - list [ref=e179]:
        - listitem [ref=e180]:
          - strong [ref=e181]: "License:"
          - text: Commercial.
          - strong [ref=e182]: "Language:"
          - text: Fortran.
          - strong [ref=e183]: "Repo:"
          - link "https://gaussian.com/" [ref=e184] [cursor=pointer]:
            - /url: https://gaussian.com/
        - listitem [ref=e185]:
          - strong [ref=e186]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, range-separated, double-hybrid), TDDFT, MP2, MP4, CCSD, CCSD(T), CASSCF, CASPT2, ECP, ONIOM, PCM, SMD. The broadest method coverage in the commercial QC ecosystem, with a 50-year track record.
        - listitem [ref=e187]:
          - strong [ref=e188]: "Basis sets:"
          - text: GTOs. STO-nG, 3-21G, 6-31G family, 6-311G family, cc-pV
          - emphasis [ref=e189]: X
          - text: Z, aug-cc-pVXZ, LanL2DZ, SDD, ANO.
        - listitem [ref=e190]:
          - strong [ref=e191]: "DFT Notes chapters:"
          - text: 03, 04, 05, 06.
        - listitem [ref=e192]:
          - strong [ref=e193]: When to use.
          - text: The right pick for
          - emphasis [ref=e194]: "publication- benchmar`k"
          - text: ’ organic-chemistry calculations where maximum compatibility with the historical record is wanted (chapter 05 §5.4 explains why B3LYP is the lingua franca). GaussView is unmatched for setting up geometry optimisations, IRCs, and NMR calculations. The Fortran internals are old, parallel scaling is poor past ~32 cores, and the licence model is restrictive. For new
          - emphasis [ref=e195]: method-development
          - text: work the open-source codes win; for new
          - emphasis [ref=e196]: production
          - text: work in TM chemistry, ORCA wins.
      - separator [ref=e197]
      - heading "2. Plane-wave / PAW codes" [level=2] [ref=e198]
      - paragraph [ref=e199]:
        - text: For
        - strong [ref=e200]: periodic solids
        - text: ": crystals, surfaces, defects, interfaces, liquids (with PBC). The common thread is a"
        - strong [ref=e201]: plane-wave basis
        - text: (
        - link "chapter 06" [ref=e202] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.7,
        - link "chapter 07" [ref=e203] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: ) with
        - strong [ref=e204]: Bloch’s theorem
        - text: for periodicity (
        - link "chapter 07" [ref=e205] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: §7.3) and
        - strong [ref=e206]: pseudopotentials or PAW
        - text: to handle the core electrons (
        - link "chapter 08" [ref=e207] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-08/
        - text: ). The plane-wave basis is
        - emphasis [ref=e208]: position-independent
        - text: ", which eliminates the Pulay force ("
        - link "chapter 04" [ref=e209] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.7.3).
