      - heading "2.1 Quantum ESPRESSO" [level=3] [ref=e248]
      - list [ref=e249]:
        - listitem [ref=e250]:
          - strong [ref=e251]: "License:"
          - text: GPL.
          - strong [ref=e252]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e253]: "Repo:"
          - link "https://gitlab.com/QEF/q-e" [ref=e254] [cursor=pointer]:
            - /url: https://gitlab.com/QEF/q-e
        - listitem [ref=e255]:
          - strong [ref=e256]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid HSE06, PBE0, exact exchange), spin-polarised and non-collinear DFT, DFT+U(+V), Wannier-function methods (Wannier90), TDDFT in the real-time (
          - code [ref=e257]: turboTDDFT
          - text: ) and linear-response (
          - code [ref=e258]: turboEELS
          - text: ) flavours,
          - img [ref=e260]
          - text: and
          - img [ref=e274]
          - text: via ‘Yambo’ and ‘West
          - code [ref=e281]: ", phonon dispersion and electron-phonon coupling ("
          - text: EPW
          - code [ref=e282]: ), NMR chemical shifts (
          - text: QE-Knopp
          - code [ref=e283]: ), Hubbard parameters (
          - text: "HP`), Born–Oppenheimer and Car–Parrinello MD."
        - listitem [ref=e284]:
          - strong [ref=e285]: "Basis sets:"
          - text: Plane waves (kinetic cutoff
          - img [ref=e287]
          - text: ), with norm-conserving (Troullier–Martins, ONCV), ultrasoft, or PAW datasets from the
          - code [ref=e297]: pseudodojo
          - text: ’ library.
        - listitem [ref=e298]:
          - strong [ref=e299]: "DFT Notes chapters:"
          - text: 04, 05, 06 §6.7, 07, 08.
        - listitem [ref=e300]:
          - strong [ref=e301]: When to use.
          - text: The de facto open-source plane-wave DFT code. The right pick for any
          - emphasis [ref=e302]: "academi`c"
          - text: ’ solid-state DFT project that wants to read, modify, and publish the source. The phonons module is the most-used open-source phonon code. The hybrid / GW / TDDFT stack is well-maintained but a step behind VASP in user-friendliness. If you want a method VASP does not have (Wannier interpolation, second-variational spin–orbit,
          - img [ref=e304]
          - text: at scale), Quantum ESPRESSO is usually the right pick.
      - heading "2.2 VASP" [level=3] [ref=e317]
      - list [ref=e318]:
        - listitem [ref=e319]:
          - strong [ref=e320]: "License:"
          - text: Commercial.
          - strong [ref=e321]: "Language:"
          - text: Fortran.
          - strong [ref=e322]: "Repo:"
          - link "https://www.vasp.at/" [ref=e323] [cursor=pointer]:
            - /url: https://www.vasp.at/
        - listitem [ref=e324]:
          - strong [ref=e325]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, PBE0, HSE06, SCAN, r²SCAN, exact exchange), spin-polarised and non-collinear DFT, DFT+U, DFT+DMFT via external interface, electric-field response, dipole corrections, GW and BSE via the
          - code [ref=e326]: vasp_gw
          - text: ’ module, MD, NEB, dimer method, finite-difference phonons, ML force-field interface.
        - listitem [ref=e327]:
          - strong [ref=e328]: "Basis sets:"
          - text: Plane waves with
          - strong [ref=e329]: PAW
          - text: augmentation (
          - link "chapter 08" [ref=e330] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: "§8.7, §8.12). The PAW library is the most extensive in the field: a wide range of valence configurations (small-core, large-core,"
          - img [ref=e332]
          - text: "- and"
          - img [ref=e338]
          - text: "-electron “sv” / “pv” / “d” / “s” variants)."
        - listitem [ref=e343]:
          - strong [ref=e344]: "DFT Notes chapters:"
          - text: 04, 05, 06, 07, 08.
        - listitem [ref=e345]:
          - strong [ref=e346]: When to use.
          - text: The workhorse of
          - emphasis [ref=e347]: industrial and academic solid-state DFT
          - text: ". The materials community has converged on it, and the convergence of opinion is itself a reason to use it: every reviewer of a solid-state paper expects to see “VASP” in the methods section. The PAW library is the deepest, the parallel efficiency is the highest, and the documentation is comprehensive. The main weaknesses are the closed-source licence and the cost. For light elements in simple structures, Quantum ESPRESSO produces equivalent results. For strongly-correlated oxides ("
          - link "chapter 04" [ref=e348] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: §4.5), VASP + DFT+U is the workhorse; for
          - img [ref=e350]
          - text: spectroscopy, VASP GW or Yambo on top of VASP is standard.
      - heading "2.3 CASTEP" [level=3] [ref=e357]
      - list [ref=e358]:
        - listitem [ref=e359]:
          - strong [ref=e360]: "License:"
          - text: Commercial, but the
          - strong [ref=e361]: UK academic site licence
          - text: gives every UK university unlimited use.
          - strong [ref=e362]: "Language:"
          - text: Fortran.
          - strong [ref=e363]: "Repo:"
          - link "https://www.castep.org/" [ref=e364] [cursor=pointer]:
            - /url: https://www.castep.org/
        - listitem [ref=e365]:
          - strong [ref=e366]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, exact exchange), spin-polarised DFT, DFT+U, NMR chemical shifts, EELS, phonon dispersion, electron-phonon coupling, TDDFT in the linear-response Casida formulation, ab-initio MD (NVT, NPT, metadynamics via PLUMED), NEB, transition-state search, linear-scaling DFT for large cells (DFPT + TS).
        - listitem [ref=e367]:
          - strong [ref=e368]: "Basis sets:"
          - text: Plane waves with norm-conserving or ultrasoft pseudopotentials. PAW is not native; the on-the-fly-generated “C9” library is well-tested.
        - listitem [ref=e369]:
          - strong [ref=e370]: "DFT Notes chapters:"
          - text: 04, 05, 06, 07, 08.
        - listitem [ref=e371]:
          - strong [ref=e372]: When to use.
          - text: A strong pick for
          - emphasis [ref=e373]: "UK academi`c"
          - text: ’ solid-state work where the licence is free; outside the UK, Quantum ESPRESSO is the standard open-source alternative. The NMR chemical-shift and EELS modules are particularly well-developed. The phonon and electron-phonon coupling suite is mature. The user community is smaller than VASP / Quantum ESPRESSO’s.
      - heading "2.4 ABINIT" [level=3] [ref=e374]
      - list [ref=e375]:
        - listitem [ref=e376]:
          - strong [ref=e377]: "License:"
          - text: GPL.
          - strong [ref=e378]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e379]: "Repo:"
          - link "https://github.com/abinit/abinit" [ref=e380] [cursor=pointer]:
            - /url: https://github.com/abinit/abinit
        - listitem [ref=e381]:
          - strong [ref=e382]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, exact exchange), spin-polarised DFT, DFT+U, linear-response DFPT for phonons, dielectric response, Born effective charges, IR / Raman,
          - img [ref=e384]
          - text: (the ‘Optics’ and ‘SIGMA’ modules are the workhorse
          - img [ref=e398]
          - text: code for the open-source community), BSE, TDDFT in the Casida and Sternheimer flavours, electron stopping power, electron–phonon coupling, finite electric fields, orbital-free DFT, PAW (Blöchl’s original 1994 algorithm); one of the most mature
          - emphasis [ref=e405]: response-property
          - text: suites in the field.
        - listitem [ref=e406]:
          - strong [ref=e407]: "Basis sets:"
          - text: Plane waves. Norm-conserving pseudopotentials (Troullier–Martins, ONCV), PAW datasets from the ABINIT
          - code [ref=e408]: JTH
          - text: ’ table.
        - listitem [ref=e409]:
          - strong [ref=e410]: "DFT Notes chapters:"
          - text: 04, 05, 06, 07, 08; also the response-property chapters 10/11 (in preparation).
        - listitem [ref=e411]:
          - strong [ref=e412]: When to use.
          - text: The right pick for
          - emphasis [ref=e413]: response-property
          - text: and
          - emphasis [ref=e414]: many-body perturbation theory
          - text: work where the open-source path is mandatory. The DFPT implementation is one of two production implementations in the world (the other being Quantum ESPRESSO’s
          - code [ref=e415]: PHonon
          - text: ); ABINIT’s response suite is broader. The
          - img [ref=e417]
          - text: implementation is the most-used open-source
          - img [ref=e431]
          - text: code. ABINIT is
          - emphasis [ref=e438]: not
          - text: the right pick for high-throughput materials screening (no comprehensive potential library, no batch interface).
      - heading "2.5 CP2K" [level=3] [ref=e439]
      - list [ref=e440]:
        - listitem [ref=e441]:
          - strong [ref=e442]: "License:"
          - text: GPL.
          - strong [ref=e443]: "Language:"
          - text: Fortran 2003 (MPI / OpenMP hybrid, GPU via CUDA / HIP).
          - strong [ref=e444]: "Repo:"
          - link "https://github.com/cp2k/cp2k" [ref=e445] [cursor=pointer]:
            - /url: https://github.com/cp2k/cp2k
        - listitem [ref=e446]:
          - strong [ref=e447]: "DFT methods:"
          - text: KS-DFT in the
          - strong [ref=e448]: mixed Gaussian / plane-wave (GPW)
          - text: and Gaussian / augmented-plane-wave (GAPW) flavours. LDA, GGA, meta-GGA, hybrid (HFX, PBE0, HSE06 via truncated Coulomb), DFT+U, range-separated hybrids, MP2, RPA, GW, TDDFT, Ehrenfest MD, Born–Oppenheimer MD, metadynamics (PLUMED), NEB, finite-temperature DFT, ML potentials (MTP); one of the
          - emphasis [ref=e449]: fastest
          - text: ab-initio MD codes for systems in the 100–10,000-atom range.
        - listitem [ref=e450]:
          - strong [ref=e451]: "Basis sets:"
          - text: Gaussian for the wavefunctions (DZVP, TZV2P, QZV2P, MOLOPT, ccGRB); plane waves for the auxiliary density. GTH pseudopotentials, ONCV, and PAW via the GAPW back end.
        - listitem [ref=e452]:
          - strong [ref=e453]: "DFT Notes chapters:"
          - text: 03, 04, 05, 06 §6.7, 07, 08.
        - listitem [ref=e454]:
          - strong [ref=e455]: When to use.
          - text: The right pick for
          - emphasis [ref=e456]: ab-initio molecular dynamics of large systems
          - text: ": water simulations (1,000+ water molecules in a box), solid–liquid interfaces, organic–inorganic interfaces, battery electrolytes, MOFs with diffusing ions. The GPW/GAPW mixed basis is what makes this scale: the plane-wave auxiliary grid is much cheaper than a pure plane-wave code at the same accuracy for inhomogeneous systems. CP2K also ships"
          - emphasis [ref=e457]: linear-scaling
          - text: DFT for systems beyond 10,000 atoms where diagonalisation becomes the bottleneck. If you are running solid-state DFT and do not need MD, Quantum ESPRESSO or VASP are better defaults.
      - heading "2.6 WIEN2k" [level=3] [ref=e458]
      - paragraph [ref=e459]:
        - text: See section 3 (all-electron codes). WIEN2k is the most widely-used
        - strong [ref=e460]: full-potential LAPW
        - text: code and is listed in this table because of its prominence in solid-state DFT; it is the entry that breaks the “plane-wave + pseudopotential” mould.
      - separator [ref=e461]
      - heading "3. All-electron codes (full potential)" [level=2] [ref=e462]
      - paragraph [ref=e463]:
        - text: Codes that make
        - strong [ref=e464]: no pseudopotential approximation
        - text: "— the core electrons are computed explicitly, on the same footing as the valence. The price is computational cost: the core wavefunctions are sharp and require a very high plane-wave cutoff or an alternative basis (Muffin-tin orbitals in LAPW). The reward is the correct treatment of magnetic core states, hyperfine parameters, NMR contact shifts, Mössbauer isomer shifts, spin–orbit coupling, and"
        - img [ref=e466]
        - text: "-electron localisation ("
        - link "chapter 08" [ref=e471] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-08/
        - text: §8.13–8.14).
      - table [ref=e472]:
        - rowgroup [ref=e473]:
          - row "Code License Language Basis Best at" [ref=e474]:
            - columnheader "Code" [ref=e475]
            - columnheader "License" [ref=e476]
            - columnheader "Language" [ref=e477]
            - columnheader "Basis" [ref=e478]
            - columnheader "Best at" [ref=e479]
        - rowgroup [ref=e480]:
          - row "WIEN2k Commercial (ac.) Fortran APW + LAPW + lo Solids, -electron systems, hyperfine" [ref=e481]:
            - cell "WIEN2k" [ref=e482]
            - cell "Commercial (ac.)" [ref=e483]
            - cell "Fortran" [ref=e484]
            - cell "APW + LAPW + lo" [ref=e485]
            - cell "Solids, -electron systems, hyperfine" [ref=e486]:
              - text: Solids,
              - img [ref=e488]
              - text: "-electron systems, hyperfine"
          - row "Elk GPL Fortran FP-LAPW Open-source all-electron DFT, response" [ref=e493]:
            - cell "Elk" [ref=e494]
            - cell "GPL" [ref=e495]
            - cell "Fortran" [ref=e496]
            - cell "FP-LAPW" [ref=e497]
            - cell "Open-source all-electron DFT, response" [ref=e498]
          - row "FLEUR GPL (BSD-style) Fortran FP-LAPW + lo Open-source, magnetism, MAE, NRIXS" [ref=e499]:
            - cell "FLEUR" [ref=e500]
            - cell "GPL (BSD-style)" [ref=e501]
            - cell "Fortran" [ref=e502]
            - cell "FP-LAPW + lo" [ref=e503]
            - cell "Open-source, magnetism, MAE, NRIXS" [ref=e504]
      - heading "3.1 WIEN2k" [level=3] [ref=e505]
      - list [ref=e506]:
        - listitem [ref=e507]:
          - strong [ref=e508]: "License:"
          - text: Commercial, free for academic use.
          - strong [ref=e509]: "Language:"
          - text: Fortran.
          - strong [ref=e510]: "Repo:"
          - link "https://susi.theochem.tuwien.ac.at/" [ref=e511] [cursor=pointer]:
            - /url: https://susi.theochem.tuwien.ac.at/
        - listitem [ref=e512]:
          - strong [ref=e513]: "DFT methods:"
          - text: Full-potential LAPW + local orbitals (lo) in the WIEN2k / Madsen–Kunesch formulation. LDA, GGA, meta-GGA (SCAN, TB-mBJ), hybrid (PBE0, HSE06 via Yukawa screening), exact exchange, DFT+U, spin-polarised and non-collinear DFT, spin–orbit coupling as a
          - emphasis [ref=e514]: first-class
          - text: option, electric-field gradient, NMR chemical shifts and Knight shifts, Mössbauer isomer shifts, EELS, XANES, optical conductivity,
          - img [ref=e516]
          - text: and BSE via the
          - code [ref=e529]: wien2wannier
          - text: ’ and
          - code [ref=e530]: exciting
          - text: ’ interfaces.
        - listitem [ref=e531]:
          - strong [ref=e532]: "Basis sets:"
          - text: APW + LAPW + lo in a
          - strong [ref=e533]: Muffin-tin + interstitial
          - text: decomposition. The MT spheres handle the strongly-bound core and valence states; the plane-wave expansion handles the smooth interstitial region. No pseudopotential.
        - listitem [ref=e534]:
          - strong [ref=e535]: "DFT Notes chapters:"
          - text: 04 §4.9 (relativistic KS, spin–orbit), 08 §8.13 (the all-electron analog).
        - listitem [ref=e536]:
          - strong [ref=e537]: When to use.
          - text: The right pick when the physics
          - emphasis [ref=e538]: forces
          - text: "full-potential treatment: hyperfine parameters that depend on the core electron density at the nucleus, magnetic anisotropy energies of"
          - img [ref=e540]
          - text: "-electron compounds, NMR shifts in heavy-element materials, Mössbauer isomer shifts. The user community is concentrated in the magnetism and actinide communities. The trade-off is pragmatics: the code is harder to use than VASP or Quantum ESPRESSO, the run-time is typically 10–100× longer than PAW for the same system, and the inputs (MT radii, basis-set choice, RKmax) require more care. If you can use PAW and get away with it, use PAW."
      - heading "3.2 Elk" [level=3] [ref=e545]
      - list [ref=e546]:
        - listitem [ref=e547]:
          - strong [ref=e548]: "License:"
          - text: GPL.
          - strong [ref=e549]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e550]: "Repo:"
          - link "https://elk.sourceforge.io/" [ref=e551] [cursor=pointer]:
            - /url: https://elk.sourceforge.io/
        - listitem [ref=e552]:
          - strong [ref=e553]: "DFT methods:"
          - text: "Full-potential LAPW. LDA, GGA, meta-GGA (SCAN), hybrid (HSE06, PBE0, exact exchange), DFT+U, spin-polarised and non-collinear DFT, spin–orbit coupling as a first-class option, ground state and linear-response DFPT: phonons, dielectric response, Born effective charges, IR / Raman, electron-phonon coupling,"
          - img [ref=e555]
          - text: ", BSE."
        - listitem [ref=e568]:
          - strong [ref=e569]: "Basis sets:"
          - text: APW + LAPW + lo; same formal structure as WIEN2k.
        - listitem [ref=e570]:
          - strong [ref=e571]: "DFT Notes chapters:"
          - text: 04, 05, 08.
        - listitem [ref=e572]:
          - strong [ref=e573]: When to use.
          - text: The open-source alternative to WIEN2k. The implementation is faithful to the LAPW formalism and the documentation is thorough. Elk is
          - emphasis [ref=e574]: slower
          - text: than WIEN2k for serial runs but supports MPI parallelism and is on par in production. The right pick for open-source, all-electron, full-potential DFT, in particular for response properties at the DFT level.
      - heading "3.3 FLEUR" [level=3] [ref=e575]
      - list [ref=e576]:
        - listitem [ref=e577]:
          - strong [ref=e578]: "License:"
          - text: BSD-style (open source).
          - strong [ref=e579]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e580]: "Repo:"
          - link "https://www.flapw.de/maX-4/" [ref=e581] [cursor=pointer]:
            - /url: https://www.flapw.de/maX-4/
        - listitem [ref=e582]:
          - strong [ref=e583]: "DFT methods:"
          - text: Full-potential LAPW. LDA, GGA, meta-GGA, hybrid (PBE0, HSE06), exact exchange, DFT+U, spin-polarised and non-collinear DFT, spin–orbit coupling, magnetic anisotropy energy (MAE), NMR contact and dipolar hyperfine fields, resonant inelastic X-ray scattering (NRIXS) via the
          - emphasis [ref=e584]: Rixs
          - text: module,
          - img [ref=e586]
          - text: "via interface with ‘Spex’ and ‘Yambo`."
        - listitem [ref=e599]:
          - strong [ref=e600]: "Basis sets:"
          - text: APW + LAPW + lo.
        - listitem [ref=e601]:
          - strong [ref=e602]: "DFT Notes chapters:"
          - text: 04, 05, 08.
        - listitem [ref=e603]:
          - strong [ref=e604]: When to use.
          - text: The right pick for
          - emphasis [ref=e605]: magnetism
          - text: and
          - emphasis [ref=e606]: spectroscopy
          - text: on open-source infrastructure. The MAE workflow is the most-used benchmark for the open-source LAPW community. The RIXS / NRIXS implementation is unique. The user interface is more challenging than VASP’s, and the parallel scaling on large systems is good but not class-leading.
      - separator [ref=e607]
      - heading "4. Real-space grid codes" [level=2] [ref=e608]
      - paragraph [ref=e609]:
        - text: Codes that discretise
        - strong [ref=e610]: all of real space
        - text: (not just the atoms) on a finite-difference, finite-element, or multigrid grid. The basis is
        - emphasis [ref=e611]: position-independent
        - text: (no atom-centred functions), so the Pulay force vanishes (
        - link "chapter 04" [ref=e612] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.7.3) and the representation is exact in the limit of an infinitely-fine grid. Real-space grids are the natural setting for
        - strong [ref=e613]: time-dependent
        - text: "problems: the wavefunction can be propagated in time with a leap-frog, Crank– Nicolson, or exponential-midpoint scheme, and there is no wrap-around artefact from periodic images of a localised excitation."
      - table [ref=e614]:
        - rowgroup [ref=e615]:
          - row "Code License Language Best at" [ref=e616]:
            - columnheader "Code" [ref=e617]
            - columnheader "License" [ref=e618]
            - columnheader "Language" [ref=e619]
            - columnheader "Best at" [ref=e620]
        - rowgroup [ref=e621]:
          - row "Octopus GPL Fortran + C TDDFT, atoms in strong fields, large clusters" [ref=e622]:
            - cell "Octopus" [ref=e623]
            - cell "GPL" [ref=e624]
            - cell "Fortran + C" [ref=e625]
            - cell "TDDFT, atoms in strong fields, large clusters" [ref=e626]
          - row "GPAW GPL Python + C PAW on a grid, ASE integration, ML hooks" [ref=e627]:
            - cell "GPAW" [ref=e628]
            - cell "GPL" [ref=e629]
            - cell "Python + C" [ref=e630]
            - cell "PAW on a grid, ASE integration, ML hooks" [ref=e631]
          - row "SIESTA GPL Fortran NAO basis, linear-scaling DFT, large systems" [ref=e632]:
            - cell "SIESTA" [ref=e633]
            - cell "GPL" [ref=e634]
            - cell "Fortran" [ref=e635]
            - cell "NAO basis, linear-scaling DFT, large systems" [ref=e636]
      - heading "4.1 Octopus" [level=3] [ref=e637]
      - list [ref=e638]:
        - listitem [ref=e639]:
          - strong [ref=e640]: "License:"
          - text: GPL.
          - strong [ref=e641]: "Language:"
          - text: Fortran 2003, C for I/O.
          - strong [ref=e642]: "Repo:"
          - link "https://gitlab.com/octopus-code/octopus" [ref=e643] [cursor=pointer]:
            - /url: https://gitlab.com/octopus-code/octopus
        - listitem [ref=e644]:
          - strong [ref=e645]: "DFT methods:"
          - text: Real-space grid KS-DFT (LDA, GGA, meta-GGA, hybrid, exact exchange), real-time TDDFT, Ehrenfest MD, Maxwell + TDDFT coupling for plasmonics and light-matter interaction, magnetic response, multiplet ligand-field theory, density-functional tight-binding. Finite systems in real space with absorbing boundaries; periodic systems via a multi-cell or supercell formulation.
        - listitem [ref=e646]:
          - strong [ref=e647]: "Basis sets:"
          - text: Real-space grid (uniform or adaptive mesh refinement), finite-element basis; optional plane-wave basis for compatibility.
        - listitem [ref=e648]:
          - strong [ref=e649]: "DFT Notes chapters:"
          - text: 04, 05, 06 §6.8, 07 (real-space PBC); the TDDFT chapter 10/11.
        - listitem [ref=e650]:
          - strong [ref=e651]: When to use.
          - text: The right pick for
          - emphasis [ref=e652]: time-dependent
          - text: "DFT in real time: laser excitation of molecules, plasmonics, attosecond spectroscopy, atoms in strong laser fields, light–matter coupling beyond the dipole approximation. The user community is concentrated in the"
          - emphasis [ref=e653]: atomic, molecular, and optical physics
          - text: (AMO) community. For ground-state solid-state DFT the plane-wave codes (VASP, Quantum ESPRESSO) are faster and more established. Octopus is the right default for “I need to propagate a wavefunction in time on a grid” — there is essentially no other production open-source code for this.
      - heading "4.2 GPAW" [level=3] [ref=e654]
      - list [ref=e655]:
        - listitem [ref=e656]:
          - strong [ref=e657]: "License:"
          - text: GPL.
          - strong [ref=e658]: "Language:"
          - text: Python (front end) + C / Cython (kernels); ASE (
          - link "section 9" [ref=e659] [cursor=pointer]:
            - /url: "#9-workflow-managers"
          - text: ) is the standard geometry / calculator interface.
          - strong [ref=e660]: "Repo:"
          - link "https://gitlab.com/gpaw/gpaw" [ref=e661] [cursor=pointer]:
            - /url: https://gitlab.com/gpaw/gpaw
        - listitem [ref=e662]:
          - strong [ref=e663]: "DFT methods:"
          - text: PAW (
          - link "chapter 08" [ref=e664] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: §8.7) on a real-space grid (default), a plane-wave mode (LAPW- equivalent accuracy with plane-wave diagonalisation), and an LCAO mode (atomic-orbital projection of the PAW solution, useful for linear-scaling DFT). LDA, GGA, meta-GGA, hybrid (HSE06, PBE0, exact exchange, range-separated), DFT+U, spin-polarised and non-collinear DFT, real-time TDDFT, linear-response TDDFT (Casida), GW and BSE via external interface, RPA, Delta-SCF, constrained DFT, transition-state search, NEB.
        - listitem [ref=e665]:
          - strong [ref=e666]: "Basis sets:"
          - text: "PAW datasets (the GPAW / ASE PAW dataset library, with the `0.9.x’ series being the production default). Real-space grid (multi-grid for the Poisson solver) or plane waves. LCAO projections in dzp / szp configurations for the LCAO mode."
        - listitem [ref=e667]:
          - strong [ref=e668]: "DFT Notes chapters:"
          - text: 04, 05, 06, 07, 08.
        - listitem [ref=e669]:
          - strong [ref=e670]: When to use.
          - text: The right pick for
          - emphasis [ref=e671]: PAW-quality
          - text: calculations with a
          - emphasis [ref=e672]: Python
          - text: "interface and ASE integration. It is the most user-friendly of the PAW codes for new methods development: most algorithm changes require no Fortran. The LCAO mode makes GPAW usable for systems with thousands of atoms. The main weakness is raw speed: the same calculation in VASP or Quantum ESPRESSO typically runs 2–5× faster."
      - heading "4.3 SIESTA" [level=3] [ref=e673]
      - list [ref=e674]:
        - listitem [ref=e675]:
          - strong [ref=e676]: "License:"
          - text: GPL.
          - strong [ref=e677]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e678]: "Repo:"
          - link "https://gitlab.com/siesta-project/siesta" [ref=e679] [cursor=pointer]:
            - /url: https://gitlab.com/siesta-project/siesta
        - listitem [ref=e680]:
          - strong [ref=e681]: "DFT methods:"
          - text: KS-DFT with
          - strong [ref=e682]: numerical atomic orbitals (NAOs)
          - text: as the basis (
          - link "chapter 06" [ref=e683] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-06/
          - text: §6.13). LDA, GGA, meta-GGA, hybrid (HSE06, PBE0), spin-polarised DFT, DFT+U, fully-relativistic spin–orbit, real-space grid for the Poisson solver, real-time TDDFT (newer developments), linear-scaling DFT (the “Order-N” mode) for systems with
          - img [ref=e685]
          - text: atoms and a finite band gap. Troullier–Martins pseudopotentials in the Kleinman–Bylander form.
        - listitem [ref=e700]:
          - strong [ref=e701]: "Basis sets:"
          - text: "NAOs: radial numerical pseudo-atomic orbitals on a logarithmic radial grid, with multiple-ζ and polarisation variants. The user specifies a"
          - emphasis [ref=e702]: single
          - text: energy shift that controls the cutoff radius
          - img [ref=e704]
          - text: ; the basis is automatically generated. The result is a
          - emphasis [ref=e712]: compact
          - text: "basis: typical production calculations are tractable with"
          - img [ref=e714]
          - text: functions per atom (vs.
          - img [ref=e726]
          - text: for plane waves).
        - listitem [ref=e740]:
          - strong [ref=e741]: "DFT Notes chapters:"
          - text: 06 §6.13, 07, 08; the linear-scaling chapter 10/11.
        - listitem [ref=e742]:
          - strong [ref=e743]: When to use.
          - text: The right pick for
          - emphasis [ref=e744]: very large systems
          - text: (thousands of atoms) where the atom-centred basis is an advantage and a tightly converged energy is not the goal. Widely used for biomolecular systems, polymers, disordered solids, and battery electrode / electrolyte interfaces. The linear-scaling mode is one of the few production linear-scaling DFT codes; it pays off for insulators with a clean band gap. The trade-off is that the
          - emphasis [ref=e745]: energy
          - text: convergence is harder to control than in VASP.
      - separator [ref=e746]
      - heading "5. Wavelet codes" [level=2] [ref=e747]
      - paragraph [ref=e748]:
        - text: Wavelet bases —
        - strong [ref=e749]: Daubechies wavelets
        - text: ", in particular — are the next step up from finite-difference real-space grids: they combine the locality of the real-space grid (so the Pulay force is zero) with the systematic improvability of a basis-set expansion ("
        - link "chapter 06" [ref=e750] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.14). The convergence of the total energy with the wavelet resolution is
        - emphasis [ref=e751]: exponential
        - text: ", rather than the polynomial convergence of finite-difference / finite-element methods."
      - heading "5.1 BigDFT" [level=3] [ref=e752]
      - list [ref=e753]:
        - listitem [ref=e754]:
          - strong [ref=e755]: "License:"
          - text: GPL.
          - strong [ref=e756]: "Language:"
          - text: Fortran 2003 (C kernels).
          - strong [ref=e757]: "Repo:"
          - link "https://gitlab.com/l_sim/bigdft-suite" [ref=e758] [cursor=pointer]:
            - /url: https://gitlab.com/l_sim/bigdft-suite
        - listitem [ref=e759]:
          - strong [ref=e760]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, meta-GGA, hybrid, exact exchange) on a Daubechies-wavelet basis, in both finite systems and PBC. Wavelet-based multigrid Poisson solver, real-time TDDFT (
          - code [ref=e761]: BigDFT-Turbo
          - text: ), linear-response TDDFT, constrained DFT, high-lying / Rydberg states via a “C-IC” (continuum in crystal) embedding, fragmentation approach.
        - listitem [ref=e762]:
          - strong [ref=e763]: "Basis sets:"
          - text: "Daubechies wavelets (the original BigDFT-1n) and the newer 2G (second-generation) formulation. Both are systematically improvable: the energy converges exponentially with the wavelet resolution parameter"
          - code [ref=e764]: hgrids
          - text: .
        - listitem [ref=e765]:
          - strong [ref=e766]: "DFT Notes chapters:"
          - text: 06 §6.14.
        - listitem [ref=e767]:
          - strong [ref=e768]: When to use.
          - text: The right pick when you want the
          - emphasis [ref=e769]: guarantees
          - text: "of a systematically-improvable basis: clean convergence behaviour, no basis-set superposition error in the localised-basis sense, and a Poisson solver that is exact (within the basis) for the whole simulation cell. The community is centred in the French electronic-structure community (the GenCI consortium). For a production run on a moderate-size solid, VASP or Quantum ESPRESSO will be faster and have more turnkey workflows. For"
          - emphasis [ref=e770]: systematic basis-set convergence studies
          - text: or
          - emphasis [ref=e771]: systematically-improvable reference calculations
          - text: ", BigDFT is the unique open-source choice."
      - separator [ref=e772]
      - heading "6. Coupled-cluster / high-accuracy wavefunction" [level=2] [ref=e773]
      - paragraph [ref=e774]:
        - text: Codes that implement wavefunction-based
        - emphasis [ref=e775]: post-HF
        - text: "methods to high accuracy: MP2, MP3, CCSD, CCSD(T), FCI, EOM-CC, explicitly correlated (F12) methods, multireference methods. The hierarchy is described in"
        - link "chapter 02" [ref=e776] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-02/
        - text: §2.3; DFT is the
        - emphasis [ref=e777]: "chea`p"
        - text: ’ alternative, but for small molecules where accuracy is paramount, CCSD(T) in a quadruple-zeta basis is the gold standard (
        - link "chapter 02" [ref=e778] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-02/
        - text: §2.4). The “all in Hartree” cost of CCSD(T) is
        - img [ref=e780]
        - text: ", so these codes are aimed at small-to-medium molecules."
      - table [ref=e788]:
        - rowgroup [ref=e789]:
          - row "Code License Language Best at" [ref=e790]:
            - columnheader "Code" [ref=e791]
            - columnheader "License" [ref=e792]
            - columnheader "Language" [ref=e793]
            - columnheader "Best at" [ref=e794]
        - rowgroup [ref=e795]:
          - row "MRCC Free Fortran / C High-accuracy CC, F12, arbitrary-order CC" [ref=e796]:
            - cell "MRCC" [ref=e797]
            - cell "Free" [ref=e798]
            - cell "Fortran / C" [ref=e799]
            - cell "High-accuracy CC, F12, arbitrary-order CC" [ref=e800]
          - row "CFOUR GPL Fortran / C Open-source CC, EOM-CC, MR-CC" [ref=e801]:
            - cell "CFOUR" [ref=e802]
            - cell "GPL" [ref=e803]
            - cell "Fortran / C" [ref=e804]
            - cell "Open-source CC, EOM-CC, MR-CC" [ref=e805]
      - heading "6.1 MRCC" [level=3] [ref=e806]
      - list [ref=e807]:
        - listitem [ref=e808]:
          - strong [ref=e809]: "License:"
          - text: Free (closed-source but redistributable; no cost for any user).
          - strong [ref=e810]: "Language:"
          - text: Fortran / C.
          - strong [ref=e811]: "Repo:"
          - link "https://www.mrcc.hu/" [ref=e812] [cursor=pointer]:
            - /url: https://www.mrcc.hu/
        - listitem [ref=e813]:
          - strong [ref=e814]: "Methods:"
          - text: MP2, MP3, MP4, CCSD, CCSDT, CCSDTQ, CCSD(T), CCSDT(Q), CC(n) (closed-shell CCSD up to CCSDTQPHH), perturbative triples (T) and beyond, explicitly-correlated CC (F12), density-fitted integrals, arbitrary-order CC up to CCSDTQPHH, MR-CC methods (Mk-MRCCSD, BW-MRCCSD). The author is Mihály Kállay.
        - listitem [ref=e815]:
          - strong [ref=e816]: "Basis sets:"
          - text: GTOs. Pople, Dunning, Karlsruhe, custom. Density-fitting auxiliary bases.
        - listitem [ref=e817]:
          - strong [ref=e818]: "DFT Notes chapters:"
          - text: 02, 03.
        - listitem [ref=e819]:
          - strong [ref=e820]: When to use.
          - text: The right pick for
          - emphasis [ref=e821]: single-point coupled-cluster reference
          - text: calculations on small molecules. Its principal strength is the
          - emphasis [ref=e822]: arbitrary- order
          - text: "CC capability: there is no other production code that routinely reaches CCSDTQPHH, and the F12 implementation is one of the most accurate in the field. The trade-off is that MRCC is a single-point- energy code: geometry optimisations, finite differences, and properties are typically computed by calling MRCC from an external driver (CFOUR, Psi4, or a user script)."
      - heading "6.2 CFOUR" [level=3] [ref=e823]
      - list [ref=e824]:
        - listitem [ref=e825]:
          - strong [ref=e826]: "License:"
          - text: GPL.
          - strong [ref=e827]: "Language:"
          - text: Fortran / C.
          - strong [ref=e828]: "Repo:"
          - link "https://github.com/CFOUR/cfour" [ref=e829] [cursor=pointer]:
            - /url: https://github.com/CFOUR/cfour
        - listitem [ref=e830]:
          - strong [ref=e831]: "Methods:"
          - text: HF, MP2, MP3, MP4, CCSD, CCSD(T), CCSDT, CC(n), EOM-CCSD (ionised, attached, excited), MR-CC (Mk-MRCCSD, BW-MRCCSD), explicit correlation (F12), analytic first- and second-derivatives (gradients, Hessians) for HF, MP2, CCSD, CCSD(T), EOM-CCSD; geometry optimisation, harmonic frequencies, anharmonic vibrational spectroscopy, vibrational configuration interaction (VCI), equation-of-motion coupled cluster for excited states.
        - listitem [ref=e832]:
          - strong [ref=e833]: "Basis sets:"
          - text: GTOs. Pople, Dunning, Karlsruhe, ANO. Spherical-harmonic and Cartesian conventions.
        - listitem [ref=e834]:
          - strong [ref=e835]: "DFT Notes chapters:"
          - text: 02, 03.
        - listitem [ref=e836]:
          - strong [ref=e837]: When to use.
          - text: The right pick for
          - emphasis [ref=e838]: high-accuracy wavefunction
          - text: methods where the open-source path is mandatory. The analytic second-derivatives for CCSD(T) are state-of-the-art and enable
          - emphasis [ref=e839]: "anharmoni`c"
          - text: ’ vibrational spectroscopy at the CCSD(T) level. The EOM-CCSD suite is mature. CFOUR is slower than MRCC for single-point energies above CCSD(T), but is the better pick for geometry optimisation, vibrational spectroscopy, and any workflow that needs gradients. The PySCF and Psi4 interfaces to CFOUR give a modern Python front end.
      - separator [ref=e840]
      - heading "7. Codes for special systems" [level=2] [ref=e841]
      - paragraph [ref=e842]:
        - text: Codes that occupy a niche. Either they implement a basis that is unique (CRYSTAL with Gaussians for solids, FHI-aims with NAOs of tier-4 quality, exciting with FP-LAPW for excited states), or they are layered on top of a more general code as a
        - emphasis [ref=e843]: post-processor
        - text: (WEST, Yambo for
        - img [ref=e845]
        - text: and BSE).
      - table [ref=e858]:
        - rowgroup [ref=e859]:
