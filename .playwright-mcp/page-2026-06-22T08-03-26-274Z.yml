      - heading "10.1 Quantum ESPRESSO" [level=3] [ref=e1407]
      - paragraph [ref=e1408]:
        - text: Quantum ESPRESSO is a Fortran 2003 plane-wave DFT code (
        - link "§2.1" [ref=e1409] [cursor=pointer]:
          - /url: "#21-quantum-espresso"
        - text: ). The cheatsheet below covers the standard ‘pw.x’ (ground-state) and ‘bands.x’ (post-processing) executables. The input format is
        - strong [ref=e1410]: name-list Fortran
        - text: "— every section starts with ‘&NAME’ and ends with ‘/`."
      - heading "10.1.1 Minimal input — H₂ SCF" [level=4] [ref=e1411]
      - paragraph [ref=e1412]: "The smallest input that produces a sensible single-point energy on a hydrogen molecule:"
      - code [ref=e1416]: "&CONTROL calculation = 'scf' ! 'scf' | 'relax' | 'vc-relax' | 'bands' | 'nscf' prefix = 'h2' ! base name for output files outdir = './tmp/' ! scratch directory (must exist) pseudo_dir = './pseudo/' ! directory containing *.UPF pseudopotentials verbosity = 'low' ! 'low' | 'high' / &SYSTEM ibrav = 0 ! 0 = free-format lattice (ATOMIC_POSITIONS below) nat = 2 ntyp = 1 ecutwfc = 30.0 ! plane-wave cutoff for wavefunctions, Ry ecutrho = 240.0 ! charge-density cutoff, Ry ! >= 4*ecutwfc for NC-PP ! >= 8-12 * ecutwfc for USPP / PAW / &ELECTRONS conv_thr = 1.0d-8 ! SCF convergence threshold, Ry / ATOMIC_SPECIES H 1.008 H.upf ! element, atomic mass, pseudopotential file ATOMIC_POSITIONS angstrom H 0.0 0.0 0.0 H 0.0 0.0 0.74 ! bond length 0.74 Å K_POINTS gamma ! Gamma-only: 1 k-point"
      - paragraph [ref=e1417]: "To run: ‘pw.x < h2.scf.in > h2.scf.out’. The total energy (in Rydberg) is in `h2.scf.out’ after ‘! total energy’."
      - heading "10.1.2 Annotated example — Si band structure" [level=4] [ref=e1418]
      - paragraph [ref=e1419]: "A band structure of bulk silicon along the standard Γ–X–W–K–Γ–L path. Three calculations: (i) self-consistent ground state on a uniform Monkhorst–Pack mesh; (ii) non-self-consistent calculation along the k-path using the converged charge density; (iii) post-processing with `bands.x’ to extract the band energies."
      - paragraph [ref=e1420]:
        - strong [ref=e1421]: Step 1 — SCF
        - text: (
        - code [ref=e1422]: si.scf.in
        - text: "):"
      - code [ref=e1426]: "&CONTROL calculation = 'scf' prefix = 'si' outdir = './tmp/' pseudo_dir = './pseudo/' / &SYSTEM ibrav = 0 nat = 2 ntyp = 1 ecutwfc = 40.0 ! converged at 40 Ry for Si.pbe-n-rrkjus_psl.0.1.UPF ecutrho = 320.0 ! 8x ecutwfc for ultrasoft / PAW occupations = 'fixed' ! semiconductor: fixed occupations / &ELECTRONS conv_thr = 1.0d-10 ! tighter than the H2 default / ATOMIC_SPECIES Si 28.086 Si.pbe-n-rrkjus_psl.0.1.UPF ATOMIC_POSITIONS crystal Si 0.00 0.00 0.00 Si 0.25 0.25 0.25 ! diamond structure, fractional CELL_PARAMETERS angstrom 0.00 2.715 2.715 2.715 0.00 2.715 2.715 2.715 0.00 K_POINTS automatic ! Monkhorst-Pack mesh 8 8 8 0 0 0"
      - paragraph [ref=e1427]:
        - strong [ref=e1428]: Step 2 — bands
        - text: (
        - code [ref=e1429]: si.bands.in
        - text: "): same as ‘si.scf.in’ but with ‘calculation = ‘bands’"
        - code [ref=e1430]: ", an added"
        - text: "nbnd`, and the k-path:"
      - code [ref=e1434]: "&CONTROL calculation = 'bands' ! only this line differs from scf ... / &SYSTEM ... nbnd = 12 ! >= number of electrons / 2 occupations = 'fixed' / &ELECTRONS conv_thr = 1.0d-10 / ATOMIC_SPECIES Si 28.086 Si.pbe-n-rrkjus_psl.0.1.UPF ATOMIC_POSITIONS crystal Si 0.00 0.00 0.00 Si 0.25 0.25 0.25 CELL_PARAMETERS angstrom 0.00 2.715 2.715 2.715 0.00 2.715 2.715 2.715 0.00 K_POINTS tpiba_b ! high-symmetry path; cartesian, 2*pi/bohr 6 0.0 0.0 0.0 30 ! Gamma 0.5 0.0 0.5 30 ! X 0.5 0.25 0.75 30 ! W 0.375 0.375 0.375 30 ! K 0.0 0.0 0.0 30 ! Gamma 0.5 0.5 0.5 30 ! L"
      - paragraph [ref=e1435]: "The ‘6’ is the number of segments, the ‘30’ is the number of k-points per segment. Run: ‘pw.x < si.scf.in > si.scf.out && pw.x < si.bands.in > si.bands.out’."
      - paragraph [ref=e1436]:
        - strong [ref=e1437]: Step 3 — post-processing
        - text: (
        - code [ref=e1438]: si.bands.post.in
        - text: "): extract band energies:"
      - code [ref=e1442]: "&BANDS prefix = 'si' outdir = './tmp/' filband = 'si.bands.dat' ! output: k-index, E_1, E_2, ..., E_nbands lsym = .true. ! enforce the symmetries of the path /"
      - paragraph [ref=e1443]: "Run: ‘bands.x < si.bands.post.in > si.bands.post.out’. The file `si.bands.dat’ has one row per k-point and one column per band."
      - heading "10.1.3 What to tweak for X" [level=4] [ref=e1444]
      - list [ref=e1445]:
        - listitem [ref=e1446]:
          - strong [ref=e1447]: To converge the total energy to 1 meV/atom
          - text: ": sweep"
          - code [ref=e1448]: ecutwfc
          - text: ’ from 20 to 80 Ry, recompute, and pick the smallest value at which the energy changes by less than 1 meV/atom. With PAW pseudopotentials from the
          - code [ref=e1449]: pslibrary
          - text: ", typical converged values are 40–80 Ry."
        - listitem [ref=e1450]:
          - strong [ref=e1451]: To converge the band gap to 0.1 eV
          - text: ": increase"
          - code [ref=e1452]: ecutwfc
          - text: ’ (conduction bands converge more slowly), tighten ‘conv_thr’ to ‘1.0d-10
          - code [ref=e1453]: ", and verify the k-point sampling. For an accurate gap with semilocal functionals, switch to a hybrid ('input_dft = 'HSE'', [chapter 05](/DFT-notes/dft-notes/chapter-05/) §5.5) or to $G_0W_0$ via 'Yambo' / 'West"
          - text: .
        - listitem [ref=e1454]:
          - strong [ref=e1455]: To converge k-point sampling
          - text: ": sweep the MP mesh from"
          - img [ref=e1457]
          - text: to
          - img [ref=e1471]
          - text: on a primitive cell, and pick the smallest at which the energy changes by less than 1 meV/atom.
        - listitem [ref=e1487]:
          - strong [ref=e1488]: To converge k-point sampling
          - text: ": sweep the MP mesh from"
          - img [ref=e1490]
          - text: to
          - img [ref=e1504]
          - text: on a primitive cell, and pick the smallest mesh at which the total energy changes by less than 1 meV/atom.
        - listitem [ref=e1520]:
          - strong [ref=e1521]: For metals
          - text: ": set ‘occupations = ‘smearing’’, use"
          - code [ref=e1522]: smearing = 'mp'' (Methfessel–Paxton, 2nd order) with
          - text: degauss = 0.02’ Ry, and increase the k-mesh substantially. Never use
          - code [ref=e1523]: "'gaussian'' for production — it converges too slowly with mesh density. For very high accuracy, use"
          - text: ‘fd’’ (Fermi–Dirac) and extrapolate.
        - listitem [ref=e1524]:
          - strong [ref=e1525]: For spin-polarised systems
          - text: ": add `nspin = 2’ to ‘&SYSTEM’ and set ‘starting_magnetization(i)’ for each species. For non-collinear, use ‘noncolin = .true.’."
        - listitem [ref=e1526]:
          - strong [ref=e1527]: For geometry optimisation
          - text: ": use"
          - code [ref=e1528]: calculation = 'relax'' (ions only) or
          - text: ‘vc-relax’’ (ions and cell). Set ‘ion_dynamics = ‘bfgs’’ or ‘‘damp’’ (Wentzcovich
        - listitem [ref=e1529]:
          - strong [ref=e1530]: For geometry optimisation
          - text: ": use"
          - code [ref=e1531]: calculation = 'relax'' (ions only) or
          - text: ‘vc-relax’’ (ions and cell). Set ‘ion_dynamics = ‘bfgs’’ or ‘‘damp’’ (Wentzcovich damping) for stability on tricky systems.
      - heading "10.1.4 Common pitfalls" [level=4] [ref=e1532]
      - list [ref=e1533]:
        - listitem [ref=e1534]:
          - strong [ref=e1535]: Mismatched ecutrho
          - text: ": must be"
          - img [ref=e1537]
          - code [ref=e1546]: ecutwfc
          - text: ’ for norm-conserving and
          - img [ref=e1548]
          - text: (often
          - img [ref=e1558]
          - text: ) for US/PAW. The error is silent — the SCF converges to a “wrong” total energy that is
          - emphasis [ref=e1566]: not
          - text: variational.
        - listitem [ref=e1567]:
          - strong [ref=e1568]: Wrong pseudopotential file
          - text: ":"
          - code [ref=e1569]: pseudo_dir
          - text: ’ is relative to the working directory. Mismatched valence configurations (e.g.
          - img [ref=e1571]
          - text: for Si when
          - img [ref=e1589]
          - text: is needed for excited states) silently produce wrong energies.
        - listitem [ref=e1613]:
          - strong [ref=e1614]: occupations = ‘tetrahedron’ on a coarse mesh
          - text: ": the tetrahedron integrator needs at least"
          - img [ref=e1616]
          - text: on a primitive cell. With a coarser mesh, use
          - code [ref=e1629]: "'fixed'' (semiconductor) or"
          - text: ‘smearing’’ (metal).
        - listitem [ref=e1630]:
          - strong [ref=e1631]: Forgetting prefix consistency between SCF and bands
          - text: ": the bands run reads the charge from"
          - code [ref=e1632]: outdir/prefix.save/
          - text: . If
          - code [ref=e1633]: prefix
          - text: ’ differs, the run fails with “file not found” or, worse, reads a different prefix’s charge and gives a wrong answer without erroring.
        - listitem [ref=e1634]:
          - strong [ref=e1635]: PAW / USPP family mixing
          - text: ": the pseudopotentials must be from the"
          - emphasis [ref=e1636]: same
          - text: family across elements (e.g. PBE ultrasoft with PBE ultrasoft, not with LDA norm-conserving). Mixing families gives a non-variational answer.
      - heading "10.1.5 Cross-references" [level=4] [ref=e1637]
