      - heading "7.1 CRYSTAL" [level=3] [ref=e927]
      - list [ref=e928]:
        - listitem [ref=e929]:
          - strong [ref=e930]: "License:"
          - text: Free for academic use; commercial for industry.
          - strong [ref=e931]: "Language:"
          - text: Fortran.
          - strong [ref=e932]: "Repo:"
          - link "https://www.crystal.unito.it/" [ref=e933] [cursor=pointer]:
            - /url: https://www.crystal.unito.it/
        - listitem [ref=e934]:
          - strong [ref=e935]: "DFT methods:"
          - text: KS-DFT (LDA, GGA, hybrid B3LYP, PBE0, range-separated), spin-polarised DFT, HF, MP2, CC, CI. Periodic systems in 1-D, 2-D, 3-D, with full space group symmetry. Phonon dispersion, elastic constants, piezo-electric tensors, NMR chemical shifts, EELS, XAS.
        - listitem [ref=e936]:
          - strong [ref=e937]: "Basis sets:"
          - text: Gaussian basis for solids (the unique selling point). Pople, Dunning, Karlsruhe families; also CRYSTAL’s own polarised-valence sets. “Ghost-atom” approach supports basis-set superposition error (BSSE) studies.
        - listitem [ref=e938]:
          - strong [ref=e939]: "DFT Notes chapters:"
          - text: 04, 05, 06, 07.
        - listitem [ref=e940]:
          - strong [ref=e941]: When to use.
          - text: The right pick when you need a
          - strong [ref=e942]: Gaussian basis for a crystalline solid
          - text: ": reduced BSSE, well-defined extrapolation to the complete basis set, easier comparison to molecular calculations using the same basis family. The MP2 and CC implementations for periodic systems are unique. The trade-off is that the plane-wave + PAW codes are faster, more user-friendly, and have larger community for “standard” solid-state DFT; CRYSTAL is the specialist choice."
      - heading "7.2 FHI-aims" [level=3] [ref=e943]
      - list [ref=e944]:
        - listitem [ref=e945]:
          - strong [ref=e946]: "License:"
          - text: Free for academic use; per-group licence for industry (source-available; not OSI open source).
          - strong [ref=e947]: "Language:"
          - text: Fortran.
          - strong [ref=e948]: "Repo:"
          - link "https://fhi-aims.org/" [ref=e949] [cursor=pointer]:
            - /url: https://fhi-aims.org/
        - listitem [ref=e950]:
          - strong [ref=e951]: "DFT methods:"
          - text: KS-DFT with
          - strong [ref=e952]: all-electron numerical atom-centred orbital (NAO)
          - text: basis at “tier” levels (tier 1, 2, 3, 4 — the higher the tier, the more functions). LDA, GGA, meta-GGA, hybrid, range-separated, exact exchange, DFT+U, spin-polarised and non-collinear DFT, real-time TDDFT, linear-response TDDFT, RPA, GW and BSE via interface, RPA correlation,
          - img [ref=e954]
          - text: ", dispersion-corrected DFT, ZORA scalar-relativistic and full-relativistic, geometry optimisation, MD, NEB, phonons. Tier-4 bases are essentially all-electron reference-quality."
        - listitem [ref=e967]:
          - strong [ref=e968]: "Basis sets:"
          - text: NAO on a logarithmic radial grid; the user selects a “tier” (a basis-set level); the basis is pre-tabulated for the entire periodic table.
        - listitem [ref=e969]:
          - strong [ref=e970]: "DFT Notes chapters:"
          - text: 04, 05, 06 §6.13, 08.
        - listitem [ref=e971]:
          - paragraph [ref=e972]:
            - strong [ref=e973]: When to use.
            - text: The right pick when you need
            - emphasis [ref=e974]: all-electron
            - text: accuracy on a molecular (or cluster) system without the cost of a full LAPW treatment. The tier-4 basis is the most accurate practical all-electron basis in the molecular regime; the GW and RPA implementations are the gold standard for molecular
            - img [ref=e976]
            - text: "benchmarks. The community is centred in the FHI Berlin and surrounding groups. The trade-off is the licence and the smaller user community relative to ORCA / Psi4. ### 7.3 exciting"
        - listitem [ref=e989]:
          - strong [ref=e990]: "License:"
          - text: GPL.
          - strong [ref=e991]: "Language:"
          - text: Fortran.
          - strong [ref=e992]: "Repo:"
          - link "https://exciting-code.org/" [ref=e993] [cursor=pointer]:
            - /url: https://exciting-code.org/
        - listitem [ref=e994]:
          - strong [ref=e995]: "DFT methods:"
          - text: Full-potential LAPW (LDA, GGA, meta-GGA, hybrid, DFT+U, spin–orbit),
          - emphasis [ref=e996]: linear-response TDDFT
          - text: in the Bethe–Salpeter equation (BSE) formulation,
          - img [ref=e998]
          - text: ", phonon dispersion, electron-phonon coupling, optical absorption, XAS, EELS, magneto-optical Kerr effect."
        - listitem [ref=e1011]:
          - strong [ref=e1012]: "Basis sets:"
          - text: APW + LAPW + lo; same as Elk / WIEN2k.
        - listitem [ref=e1013]:
          - strong [ref=e1014]: "DFT Notes chapters:"
          - text: 04, 05, 07, 08; the excited-state chapter 10/11.
        - listitem [ref=e1015]:
          - strong [ref=e1016]: When to use.
          - text: The right pick for
          - emphasis [ref=e1017]: excited-state solids
          - text: with full-potential LAPW accuracy. The BSE implementation is among the best in the open-source LAPW community. The user community is smaller than Elk’s or WIEN2k’s, but the spectroscopic workflows (optical, XAS, EELS) are well-developed.
      - heading "7.4 WEST" [level=3] [ref=e1018]
      - list [ref=e1019]:
        - listitem [ref=e1020]:
          - strong [ref=e1021]: "License:"
          - text: GPL.
          - strong [ref=e1022]: "Language:"
          - text: Fortran.
          - strong [ref=e1023]: "Repo:"
          - link "https://west-code.org/" [ref=e1024] [cursor=pointer]:
            - /url: https://west-code.org/
        - listitem [ref=e1025]:
          - strong [ref=e1026]: "DFT methods:"
          - text: "Many-body perturbation theory on top of KS-DFT ground state:"
          - img [ref=e1028]
          - text: ","
          - img [ref=e1042]
          - text: (partially self-consistent
          - img [ref=e1050]
          - text: ","
          - img [ref=e1062]
          - text: ), BSE. Reads the converged ground state from Quantum ESPRESSO, CP2K, or SIESTA. Large-scale parallelism (MPI + OpenMP + GPU). Stochastic approaches for ultra-large systems.
        - listitem [ref=e1073]:
          - strong [ref=e1074]: "Basis sets:"
          - text: Inherits from the host code. Plane waves (Quantum ESPRESSO, CP2K GPW), NAOs (SIESTA).
        - listitem [ref=e1075]:
          - strong [ref=e1076]: "DFT Notes chapters:"
          - text: 04 (response formalism), 05, 07, 10/11 (response properties).
        - listitem [ref=e1077]:
          - strong [ref=e1078]: When to use.
          - text: The right pick for
          - img [ref=e1080]
          - text: and BSE on systems too large for VASP GW to handle. The stochastic
          - img [ref=e1094]
          - text: implementation makes the method scale to thousands of atoms; the deterministic
          - img [ref=e1102]
          - text: is the most-used open-source production
          - img [ref=e1116]
          - text: in the plane-wave community after Yambo. The downside is WEST’s tighter coupling to Quantum ESPRESSO and a smaller user community than Yambo.
      - heading "7.5 Yambo" [level=3] [ref=e1123]
      - list [ref=e1124]:
        - listitem [ref=e1125]:
          - strong [ref=e1126]: "License:"
          - text: GPL.
          - strong [ref=e1127]: "Language:"
          - text: Fortran 2003.
          - strong [ref=e1128]: "Repo:"
          - link "https://www.yambo-code.org/" [ref=e1129] [cursor=pointer]:
            - /url: https://www.yambo-code.org/
        - listitem [ref=e1130]:
          - strong [ref=e1131]: "DFT methods:"
          - text: "Many-body perturbation theory:"
          - img [ref=e1133]
          - text: ","
          - img [ref=e1147]
          - text: ","
          - img [ref=e1158]
          - text: ", BSE, time-dependent BSE, dielectric response, EELS,"
          - img [ref=e1170]
          - text: in the “full-frequency” and plasmon-pole approximations, parallel over bands, k-points, and frequency.
        - listitem [ref=e1177]:
          - strong [ref=e1178]: "Basis sets:"
          - text: Reads ground-state data from Quantum ESPRESSO, VASP, ABINIT, SIESTA, and others. Uses the host code’s basis (plane waves, PAW, etc.) for the KS orbitals, then constructs the
          - img [ref=e1180]
          - text: self-energy and BSE kernel in the host basis.
        - listitem [ref=e1187]:
          - strong [ref=e1188]: "DFT Notes chapters:"
          - text: 04 (response), 05, 07, 10/11 (response and excited states).
        - listitem [ref=e1189]:
          - strong [ref=e1190]: When to use.
          - text: The right pick for
          - img [ref=e1192]
          - text: and BSE on top of an existing KS-DFT calculation. It is
          - emphasis [ref=e1205]: the
          - text: de facto open-source code for these methods, with a large user community and well-developed documentation. The Yambo + Quantum ESPRESSO pipeline is the standard open-source route to a many-body corrected band gap, dielectric function, optical spectrum, or XAS. For very large systems, WEST is the better pick; for molecular
          - img [ref=e1207]
          - text: benchmarks, FHI-aims is the better pick.
      - separator [ref=e1220]
      - heading "8. Visualisation" [level=2] [ref=e1221]
      - paragraph [ref=e1222]:
        - text: Codes for rendering the
        - strong [ref=e1223]: outputs
        - text: of electronic- structure calculations. None of these are themselves electronic-structure codes; they read the outputs of the production codes and turn them into pictures. The DFT chapters that
        - emphasis [ref=e1224]: produce
        - text: the data are 04 (charge densities, Kohn–Sham orbitals), 05 (spin densities), 06 (basis-set isosurfaces), 07 (band structures, Fermi surfaces), 08 (PAW augmentation densities), and 10/11 (response properties, optical absorption).
      - table [ref=e1225]:
        - rowgroup [ref=e1226]:
          - row "Code License Language Best at" [ref=e1227]:
            - columnheader "Code" [ref=e1228]
