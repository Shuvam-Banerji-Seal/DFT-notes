      - heading "8.1 VESTA" [level=3] [ref=e1253]
      - list [ref=e1254]:
        - listitem [ref=e1255]:
          - strong [ref=e1256]: "License:"
          - text: Freeware (no cost, source-closed).
          - strong [ref=e1257]: "Language:"
          - text: C.
          - strong [ref=e1258]: "Repo:"
          - link "https://jp-minerals.org/vesta/en/" [ref=e1259] [cursor=pointer]:
            - /url: https://jp-minerals.org/vesta/en/
        - listitem [ref=e1260]:
          - strong [ref=e1261]: "Reads:"
          - text: CIF, VASP POSCAR / CHGCAR / WAVECAR / LOCPOT, Gaussian cube, XCrySDen structure (XSF), PDB, Quantum ESPRESSO input / output, ABINIT input / output, SIESTA.
        - listitem [ref=e1262]:
          - strong [ref=e1263]: When to use.
          - text: The right default for
          - emphasis [ref=e1264]: crystal-structure and isosurface
          - text: "visualisation: lattice, atoms, bonds, charge density isosurfaces, spin-density isosurfaces, ELF, structure comparison, polyhedral rendering. The bond-rendering and polyhedral drawing are the most developed in any open-source or freeware tool. Limitations: no animation, no MD visualisation, no large-scale 3-D scene handling."
      - heading "8.2 OVITO" [level=3] [ref=e1265]
      - list [ref=e1266]:
        - listitem [ref=e1267]:
          - strong [ref=e1268]: "License:"
          - text: Commercial; academic licence free of charge; open-source Python API.
          - strong [ref=e1269]: "Language:"
          - text: C++ / Python.
          - strong [ref=e1270]: "Repo:"
          - link "https://www.ovito.org/" [ref=e1271] [cursor=pointer]:
            - /url: https://www.ovito.org/
        - listitem [ref=e1272]:
          - strong [ref=e1273]: "Reads:"
          - text: LAMMPS dump, XDATCAR (VASP), GROMACS, CIF, POSCAR, custom formats.
        - listitem [ref=e1274]:
          - strong [ref=e1275]: When to use.
          - text: The right default for
          - emphasis [ref=e1276]: molecular- dynamics visualisation
          - text: ": trajectories, defects, dislocation analysis, CNA / DXA / Wigner–Seitz analysis, bond-orientational order parameters. The Python scripting layer is the most powerful of any visualisation tool."
      - heading "8.3 ParaView" [level=3] [ref=e1277]
      - list [ref=e1278]:
        - listitem [ref=e1279]:
          - strong [ref=e1280]: "License:"
          - text: BSD.
          - strong [ref=e1281]: "Language:"
          - text: C++ / Python.
          - strong [ref=e1282]: "Repo:"
          - link "https://www.paraview.org/" [ref=e1283] [cursor=pointer]:
            - /url: https://www.paraview.org/
        - listitem [ref=e1284]:
          - strong [ref=e1285]: "Reads:"
          - text: VTK, NetCDF, Exodus II, raw arrays, custom readers; VASP data via
          - emphasis [ref=e1286]: ParaView Catalyst
          - text: and PVGeo plug-ins.
        - listitem [ref=e1287]:
          - strong [ref=e1288]: When to use.
          - text: The right pick for
          - emphasis [ref=e1289]: general 3-D scientific visualisation at scale
          - text: ": finite-element meshes, fluid flow, large spatiotemporal fields. The “client–server” model distributes rendering to a remote cluster. For DFT-specific visualisation (crystal structures, isosurfaces, band structures), VESTA and XCrySDen are more direct."
      - heading "8.4 XCrySDen" [level=3] [ref=e1290]
      - list [ref=e1291]:
        - listitem [ref=e1292]:
          - strong [ref=e1293]: "License:"
          - text: GPL.
          - strong [ref=e1294]: "Language:"
          - text: C / Tcl/Tk.
          - strong [ref=e1295]: "Repo:"
          - link "http://www.xcrysden.org/" [ref=e1296] [cursor=pointer]:
            - /url: http://www.xcrysden.org/
        - listitem [ref=e1297]:
          - strong [ref=e1298]: "Reads:"
          - text: XSF, SIESTA output, Quantum ESPRESSO output, VASP, FHI-aims.
        - listitem [ref=e1299]:
          - strong [ref=e1300]: When to use.
          - text: The right pick for
          - emphasis [ref=e1301]: band-structure and Fermi-surface
          - text: visualisation in the solid-state community. The Brillouin-zone rendering and the k-path generator are the most-used in the plane-wave DFT community. The “Fermi surface” mode (with a 3-D Brillouin-zone integration) is the unique feature.
      - separator [ref=e1302]
      - heading "9. Workflow managers" [level=2] [ref=e1303]
      - paragraph [ref=e1304]:
        - text: Codes for
        - emphasis [ref=e1305]: organising
        - text: electronic-structure calculations. A workflow manager accepts a high-level specification (“compute the band structure of MoS₂, then the phonons, then the GW correction”) and turns it into a sequence of job submissions, with dependency tracking, error recovery, and provenance. Workflow managers are not electronic-structure codes; they sit
        - emphasis [ref=e1306]: "on top o`f"
        - text: ’ the production codes from sections 1–7. | Code | License | Language | Best at | |:———-|:———|:———–|:————————————————-| | ASE | LGPL | Python | Lightweight scripting, structure handling, IO | | AiiDA | MIT | Python | Workflow + provenance, sharing, materials cloud | | Fireworks | BSD | Python | Lightweight workflow + database | | atomate | MIT | Python | Pre-built workflows (MP-style) for VASP, Q-Chem |
      - heading "9.1 ASE (Atomic Simulation Environment)" [level=3] [ref=e1307]
      - list [ref=e1308]:
        - listitem [ref=e1309]:
          - strong [ref=e1310]: "License:"
          - text: LGPL.
          - strong [ref=e1311]: "Language:"
          - text: Python.
          - strong [ref=e1312]: "Repo:"
          - link "https://gitlab.com/ase/ase" [ref=e1313] [cursor=pointer]:
            - /url: https://gitlab.com/ase/ase
        - listitem [ref=e1314]:
          - strong [ref=e1315]: "Capabilities:"
          - text: Atom / geometry handling, file I/O for the major codes (VASP, Quantum ESPRESSO, CASTEP, ABINIT, GPAW, SIESTA, ORCA, FHI-aims, …), high-level “calculator” interface that lets the user swap codes by changing one line, structure optimisation, NEB, molecular dynamics, phonons, equation of state, defects and surfaces module, band structure helper, materials project compatibility.
        - listitem [ref=e1316]:
          - strong [ref=e1317]: "DFT Notes chapters:"
          - text: all of them — ASE is the recommended Python interface for nearly every production code mentioned above.
        - listitem [ref=e1318]:
          - strong [ref=e1319]: When to use.
          - text: The right default for
          - emphasis [ref=e1320]: Python-driven
          - text: "electronic-structure scripting. The calculator interface is the most useful pattern: a"
          - code [ref=e1321]: Vasp
          - text: ","
          - code [ref=e1322]: GPAW
          - text: ","
          - code [ref=e1323]: Espresso
          - text: ", or"
          - code [ref=e1324]: ORCA
          - text: "’ calculator exposes the same `.get_potential_energy()’ API. ASE does"
          - emphasis [ref=e1325]: not
          - text: manage job submission to a cluster (use Fireworks or AiiDA for that) and does
          - emphasis [ref=e1326]: not
          - text: track provenance (use AiiDA for that). For a
          - emphasis [ref=e1327]: campaign
          - text: (a thousand calculations) the workflow managers below are better.
      - heading "9.2 AiiDA" [level=3] [ref=e1328]
      - list [ref=e1329]:
        - listitem [ref=e1330]:
          - strong [ref=e1331]: "License:"
          - text: MIT.
          - strong [ref=e1332]: "Language:"
          - text: Python.
          - strong [ref=e1333]: "Repo:"
          - link "https://github.com/aiidateam/aiida-core" [ref=e1334] [cursor=pointer]:
            - /url: https://github.com/aiidateam/aiida-core
        - listitem [ref=e1335]:
          - strong [ref=e1336]: "Capabilities:"
          - text: Workflow management with
          - strong [ref=e1337]: provenance tracking
          - text: ": every calculation is stored in a database with its full input, output, and dependencies. Workflows are written in Python, with built-in primitives for common patterns (relax, band structure, phonons). The Materials Cloud ("
          - link "https://www.materialscloud.org/" [ref=e1338] [cursor=pointer]:
            - /url: https://www.materialscloud.org/
          - text: ) is built on AiiDA. Pluggable schedulers (SLURM, PBS, SGE, LSF, etc.) and pluggable codes (Quantum ESPRESSO, VASP, CP2K, CASTEP, SIESTA, Fleur, NWChem).
        - listitem [ref=e1339]:
          - strong [ref=e1340]: "DFT Notes chapters:"
          - text: all of them, but especially the chapter 12 (high-throughput / database — planned) workflow.
        - listitem [ref=e1341]:
          - strong [ref=e1342]: When to use.
          - text: The right default for a
          - emphasis [ref=e1343]: research group that runs thousands of DFT calculations
          - text: and needs to
          - emphasis [ref=e1344]: reproduce
          - text: "them. The provenance graph is the unique feature: every result is automatically linked to the input geometry, code version, pseudopotential library, and workflow definition. The trade-off is the on-ramp: AiiDA has its own daemon, its own database (PostgreSQL), and its own workflow language. For a single calculation the overhead is too much. For a campaign, the reproducibility gain is worth it."
      - heading "9.3 Fireworks" [level=3] [ref=e1345]
      - list [ref=e1346]:
        - listitem [ref=e1347]:
          - strong [ref=e1348]: "License:"
          - text: BSD.
          - strong [ref=e1349]: "Language:"
          - text: Python.
          - strong [ref=e1350]: "Repo:"
          - link "https://github.com/materialsproject/fireworks" [ref=e1351] [cursor=pointer]:
            - /url: https://github.com/materialsproject/fireworks
        - listitem [ref=e1352]:
          - strong [ref=e1353]: "Capabilities:"
          - text: Lightweight workflow management with MongoDB-backed job tracking. Each calculation is a
          - emphasis [ref=e1354]: firework
          - text: ’, workflows are fireworks + links. The central
          - code [ref=e1355]: lpad
          - text: ’ command-line interface manages the queue. Pluggable queue interfaces (SLURM, PBS, SGE, LSF). Provenance tracking through the
          - emphasis [ref=e1356]: "launchpa`d"
          - text: ’ — not as deep as AiiDA’s, but lighter.
        - listitem [ref=e1357]:
          - strong [ref=e1358]: "DFT Notes chapters:"
          - text: all of them.
        - listitem [ref=e1359]:
          - strong [ref=e1360]: When to use.
          - text: The right default for
          - emphasis [ref=e1361]: a research group that needs a queue manager and workflow
          - text: without the full AiiDA overhead. The
          - emphasis [ref=e1362]: atomate
          - text: package (below) is built on top of Fireworks. Use Fireworks if you want the queue management and dependency tracking but do not need the formal provenance graph; use AiiDA if you do.
      - heading "9.4 atomate" [level=3] [ref=e1363]
      - list [ref=e1364]:
        - listitem [ref=e1365]:
          - strong [ref=e1366]: "License:"
          - text: MIT.
          - strong [ref=e1367]: "Language:"
          - text: Python (built on top of Fireworks, pymatgen, and custodian).
          - strong [ref=e1368]: "Repo:"
          - link "https://github.com/materialsproject/atomate" [ref=e1369] [cursor=pointer]:
            - /url: https://github.com/materialsproject/atomate
        - listitem [ref=e1370]:
          - strong [ref=e1371]: "Capabilities:"
          - text: "Pre-built workflows for the Materials Project style: structural optimisation, static calculation, band structure, density of states, elastic tensor, dielectric constant, piezoelectric tensor, phonon dispersion, NEB, GW / BSE, defect formation energies. Plug-in calculators for VASP (the main target) and Q-Chem. Automatic error handling via"
          - code [ref=e1372]: custodian
          - text: ’ (the calculation re-runs with adjusted parameters if a job fails).
        - listitem [ref=e1373]:
          - strong [ref=e1374]: "DFT Notes chapters:"
          - text: all of them.
        - listitem [ref=e1375]:
          - strong [ref=e1376]: When to use.
          - text: The right default for
          - emphasis [ref=e1377]: “I want a standard Materials-Project-style workflow, and I do not want to write it myself”
          - text: . The pre-built workflows cover the 80% case; the remaining 20% is built by chaining them or by writing a new
          - code [ref=e1378]: Firework
          - text: . The error-correction infrastructure (
          - code [ref=e1379]: custodian
          - text: ") is the unique feature: a calculation that converges to the wrong magnetic state, or fails the convergence test, is automatically restarted with adjusted parameters. The cost is the deep coupling to VASP; for non-VASP workflows, AiiDA’s pluggability is more flexible."
      - separator [ref=e1380]
      - separator [ref=e1381]
      - heading "10. Code cheatsheets (input files)" [level=2] [ref=e1382]
      - blockquote [ref=e1383]:
        - paragraph [ref=e1384]:
          - text: Companion to the use-case profiles in §§1–9. The profiles tell you
          - emphasis [ref=e1385]: which code to reach for
          - text: ; the cheatsheets below tell you
          - emphasis [ref=e1386]: what to type into it
          - text: . Every entry shows a
          - strong [ref=e1387]: minimal
          - text: input that produces a sensible result on a trivial system (a hydrogen molecule or a primitive cell), an
          - strong [ref=e1388]: annotated
          - text: version of the same input for a slightly harder calculation (a band structure, a spin-polarised system, an MD step), a short list of
          - emphasis [ref=e1389]: what to tweak for X
          - text: ", a list of common pitfalls*, and a cross-reference to the chapter where the underlying theory is derived."
      - paragraph [ref=e1390]:
        - text: The cheatsheet is
        - emphasis [ref=e1391]: not
        - text: a replacement for the manual of any of these codes. It is the
        - emphasis [ref=e1392]: first thing to look at
        - text: when starting a new project, before reading the manual. The “what to tweak” lists are the answers to the questions you will ask on the third day of the project; the “common pitfalls” lists are the answers to the questions you will ask on the third week.
