      - paragraph [ref=e10075]:
        - text: The 8a position places the two atoms of the basis at
        - img [ref=e10077]
        - text: and
        - img [ref=e10095]
        - text: plus the FCC translations. The 8b position is the
        - strong [ref=e10127]: other
