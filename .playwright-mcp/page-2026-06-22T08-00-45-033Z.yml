      - blockquote [ref=e11088]:
        - paragraph [ref=e11089]:
          - strong [ref=e11090]: Trigonal vs hexagonal rhombohedral setting.
          - text: The rhombohedral lattice can be described with
          - emphasis [ref=e11091]: rhombohedral axes
          - text: (one rhombohedral cell, 3 lattice points) or with
          - emphasis [ref=e11092]: hexagonal axes
          - text: (three times larger hexagonal cell, 1 lattice point per hexagonal cell). Both descriptions refer to the same lattice. The hexagonal setting is what
          - code [ref=e11093]: spglib
          - text: ’ and most DFT codes use; the rhombohedral setting is what older textbooks use.
      - separator [ref=e11094]
      - heading "6. Reciprocal lattice and Brillouin zones" [level=2] [ref=e11095]
      - paragraph [ref=e11096]:
        - text: The
        - strong [ref=e11097]: first Brillouin zone
        - text: (1st BZ) is the
        - strong [ref=e11098]: Wigner–Seitz cell of the reciprocal lattice
        - text: "— the set of points in reciprocal space that are closer to the origin than to any other reciprocal-lattice point. Equation (7.16) of chapter 07 gives the formal definition:"
      - img [ref=e11100]
      - paragraph [ref=e11189]:
        - text: The boundary of the 1st BZ is built from the perpendicular bisector planes of the
        - strong [ref=e11190]: shortest
        - text: reciprocal-lattice vectors
        - img [ref=e11192]
        - text: . The
        - strong [ref=e11198]: higher-order
        - text: "BZs are the 2nd, 3rd, … shells: the 2nd BZ is the set of points closer to"
        - emphasis [ref=e11199]: one
        - text: non-origin reciprocal lattice point than to any other, and so on.
      - heading "6.1 Construction algorithm" [level=3] [ref=e11200]
      - paragraph [ref=e11201]: "The construction of the 1st BZ in 3-D is straightforward:"
      - list [ref=e11202]:
        - listitem [ref=e11203]:
          - text: Generate the list of all
          - img [ref=e11205]
          - text: vectors with
          - img [ref=e11212]
          - text: less than some cutoff (typically
          - img [ref=e11223]
          - text: for the first few shells).
        - listitem [ref=e11241]:
          - text: For each
          - img [ref=e11243]
          - text: ", compute the perpendicular bisector plane:"
          - img [ref=e11250]
          - text: .
        - listitem [ref=e11287]:
          - text: The 1st BZ is the intersection of all half-spaces
          - img [ref=e11289]
          - text: .
        - listitem [ref=e11326]: Find the vertices of the polyhedron by intersecting triples of bisector planes; classify them by the number of bisecting planes they lie on (4 = vertex where 4 planes meet, etc.).
        - listitem [ref=e11327]: The high-symmetry points are those vertices that are invariant under the largest subgroup of the point group.
      - paragraph [ref=e11328]:
        - text: In practice, this algorithm is implemented in
        - code [ref=e11329]: spglib
        - text: ’ and
        - code [ref=e11330]: seekpath
        - text: . For the 7 lattice types, the resulting polyhedra are well-known and tabulated below.
