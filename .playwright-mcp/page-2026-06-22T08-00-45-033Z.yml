      - separator [ref=e9407]
      - heading "4. Wyckoff positions" [level=2] [ref=e9408]
      - paragraph [ref=e9409]:
        - text: A
        - strong [ref=e9410]: Wyckoff position
        - text: of a space group is the set of symmetry-equivalent sites in the unit cell. Each space group has a finite number of Wyckoff positions; the position with the
        - strong [ref=e9411]: highest site symmetry
        - text: and
        - strong [ref=e9412]: lowest multiplicity
        - text: is the
        - strong [ref=e9413]: most special
        - text: and is conventionally labelled with the
        - strong [ref=e9414]: lowest letter
        - text: (
        - img [ref=e9416]
        - text: ).
      - heading "4.1 Multiplicity, letter, and site symmetry" [level=3] [ref=e9421]
      - paragraph [ref=e9422]: "Three numbers describe a Wyckoff position:"
      - list [ref=e9423]:
        - listitem [ref=e9424]:
          - paragraph [ref=e9425]:
            - strong [ref=e9426]: Multiplicity
            - img [ref=e9428]
            - text: — the number of symmetry-equivalent sites per
            - strong [ref=e9433]: conventional
            - text: unit cell. For a primitive cell
            - img [ref=e9435]
            - text: counts the sites in the primitive cell; for a centred cell it is multiplied by the centring factor (1 for
            - img [ref=e9441]
            - text: ", 2 for"
            - img [ref=e9447]
            - text: ", 4 for"
            - img [ref=e9453]
            - text: ).
        - listitem [ref=e9458]:
          - paragraph [ref=e9459]:
            - strong [ref=e9460]: Wyckoff letter
            - text: — a single Latin letter starting from
            - img [ref=e9462]
            - text: for the most special position, then
            - img [ref=e9468]
            - text: . Positions with the same letter have the same site symmetry. Letters run out after
            - img [ref=e9486]
            - text: (or before, depending on the group); the IUC uses subscripts after that point.
        - listitem [ref=e9491]:
          - paragraph [ref=e9492]:
            - strong [ref=e9493]: Site symmetry
            - text: — the subgroup of the point group that leaves the site invariant. E.g. in
            - img [ref=e9495]
            - text: the 1a Wyckoff position has site symmetry
            - img [ref=e9511]
            - text: (the full cubic point group), the 3c position has site symmetry
            - img [ref=e9525]
            - text: ", the 6e position has site symmetry"
            - img [ref=e9542]
            - text: ", and so on."
      - paragraph [ref=e9553]:
        - text: The general rule is
        - strong [ref=e9554]:
          - text: multiplicity
          - img [ref=e9556]
          - text: site-symmetry order = space-group order
        - text: . E.g. in
        - img [ref=e9562]
        - text: (order 48), the 1a site has full cubic symmetry (order 48) and multiplicity
        - img [ref=e9578]
        - text: ; the 3c site has site-symmetry order 16 (
        - img [ref=e9595]
        - text: ) and multiplicity
        - img [ref=e9612]
        - text: .
