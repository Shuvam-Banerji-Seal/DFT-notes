      - heading "7.6 Code output for the FCC k-path" [level=3] [ref=e15195]
      - paragraph [ref=e15196]:
        - code [ref=e15197]: pymatgen
        - text: "’ (the standard Python materials science library) will print the Setyawan–Curtarolo k-path for an FCC material as:"
      - code [ref=e15201]: "from pymatgen.core import Structure from pymatgen.symmetry.bandstructure import HighSymmKpath s = Structure.from_file(\"POSCAR\") kpath = HighSymmKpath(s) path = kpath.kpath[\"kpoints\"] # dict: label -> coord (fractional) print(path) # {'Gamma': [0, 0, 0], 'X': [0.5, 0, 0.5], 'L': [0.5, 0.5, 0.5], ...} print(kpath.kpath[\"path\"]) # [['Gamma', 'X', 'W', 'K', 'Gamma', 'L', 'U', 'W', 'L', 'K']]"
      - paragraph [ref=e15202]:
        - text: The
        - code [ref=e15203]: HighSymmKpath
        - text: ’ class is the canonical way to get a Setyawan–Curtarolo k-path for any crystal structure. The path returned is the modern (long) convention, and the k-point coordinates are
        - emphasis [ref=e15204]: fractional
        - text: in the reciprocal basis
        - img [ref=e15206]
        - text: .
      - separator [ref=e15231]
      - heading "8. Working with space groups in DFT codes" [level=2] [ref=e15232]
      - paragraph [ref=e15233]:
        - text: The four most common DFT codes — VASP, Quantum ESPRESSO, CASTEP, and SIESTA — accept the space group in different ways. VASP uses the symmetry operations in the
        - code [ref=e15234]: POSCAR
        - text: /
        - code [ref=e15235]: CONTCAR
        - text: "’ itself; QE uses ‘space_group’ in the ‘&SYSTEM’ namelist; CASTEP uses `.cell’ keyword; SIESTA uses a separate Z-matrix file. The"
        - strong [ref=e15236]: CIF file
        - text: is the universal interchange format and the recommended starting point for any new crystal.
      - heading "8.1 The CIF (Crystallographic Information File) format" [level=3] [ref=e15237]
      - paragraph [ref=e15238]:
        - text: A
        - strong [ref=e15239]: CIF
        - text: "file is a plain-text file with a fixed structure: data are organised in"
        - code [ref=e15240]: data_block
        - text: "s, with each datum a `key value’ pair (text or numeric). The standard fields for a crystal structure are:"
      - code [ref=e15242]: data_Cu _chemical_name_common "Copper" _chemical_formula_structural "Cu" _cell_length_a 3.6149 _cell_length_b 3.6149 _cell_length_c 3.6149 _cell_angle_alpha 90 _cell_angle_beta 90 _cell_angle_gamma 90 _cell_volume 47.246 _space_group_name_H-M_alt "F m -3 m" _space_group_IT_number 225 loop_ _space_group_symop_operation_xyz 'x, y, z' '-x, -y, z' '-x, y, -z' 'x, -y, -z' 'z, x, y' '-z, -x, y' ... (48 operations in total for Fm-3m) loop_ _atom_site_label _atom_site_fract_x _atom_site_fract_y _atom_site_fract_z _atom_site_occupancy Cu1 0.0 0.0 0.0 1.0
      - paragraph [ref=e15243]: "The key fields:"
      - list [ref=e15244]:
        - listitem [ref=e15245]:
          - text: ‘
          - emphasis [ref=e15246]: cell_length
          - emphasis [ref=e15247]: ’ and ‘_cell_angle_
          - text: ’ — the conventional cell parameters
          - img [ref=e15249]
          - text: in Å and
          - img [ref=e15267]
          - text: in degrees.
        - listitem [ref=e15284]: "`_space_group_name_H-M_alt’ — the Hermann–Mauguin symbol."
        - listitem [ref=e15285]:
          - code [ref=e15286]: _space_group_IT_number
          - text: ’ — the IUC space-group number (1–230).
        - listitem [ref=e15287]:
          - code [ref=e15288]: _space_group_symop_operation_xyz
          - text: "’ — the 48 (or however many) symmetry operations in `(x, y, z)’ shorthand. The first operation is always the identity; the others are the coset representatives."
        - listitem [ref=e15289]:
          - text: "`"
          - emphasis [ref=e15290]: atom_site
          - text: "*’ — the atomic positions in fractional coordinates of the conventional cell."
      - paragraph [ref=e15291]:
        - text: The CIF standard is maintained by the IUCr (International Union of Crystallography) and documented in
        - emphasis [ref=e15292]: International Tables for Crystallography
        - text: vol. G.
      - heading "8.2 VASP" [level=3] [ref=e15293]
      - paragraph [ref=e15294]:
        - text: VASP reads the structure from
        - code [ref=e15295]: POSCAR
        - text: . Symmetry is detected from the atomic positions; the user does not need to specify the space group explicitly. The relevant
        - code [ref=e15296]: INCAR
        - text: "’ tags are:"
      - table [ref=e15297]:
        - rowgroup [ref=e15298]:
          - row "Tag Default Meaning" [ref=e15299]:
            - columnheader "Tag" [ref=e15300]
            - columnheader "Default" [ref=e15301]
            - columnheader "Meaning" [ref=e15302]
        - rowgroup [ref=e15303]:
          - 'row "ISYM’ 2 Symmetry: 0 = off, 1 = use operations, 2 = use operations + break when stops decreasing" [ref=e15304]':
            - cell "ISYM’" [ref=e15305]:
              - code [ref=e15306]: ISYM
              - text: ’
            - cell "2" [ref=e15307]
            - 'cell "Symmetry: 0 = off, 1 = use operations, 2 = use operations + break when stops decreasing" [ref=e15308]':
              - text: "Symmetry: 0 = off, 1 = use operations, 2 = use operations + break when"
              - img [ref=e15310]
              - text: stops decreasing
          - row "SYMPREC’ 1e-5 Tolerance for symmetry detection (Å)" [ref=e15315]:
            - cell "SYMPREC’" [ref=e15316]:
              - code [ref=e15317]: SYMPREC
              - text: ’
            - cell "1e-5" [ref=e15318]
            - cell "Tolerance for symmetry detection (Å)" [ref=e15319]
          - row "‘LWAVE’ .FALSE. Write ‘WAVECAR’" [ref=e15320]:
            - cell "‘LWAVE’" [ref=e15321]
            - cell ".FALSE." [ref=e15322]
            - cell "Write ‘WAVECAR’" [ref=e15323]
          - row "‘LCHARG’ .FALSE. Write ‘CHGCAR’" [ref=e15324]:
            - cell "‘LCHARG’" [ref=e15325]
            - cell ".FALSE." [ref=e15326]
            - cell "Write ‘CHGCAR’" [ref=e15327]
          - row "IBRION’ — Optimisation algorithm" [ref=e15328]:
            - cell "IBRION’" [ref=e15329]:
              - code [ref=e15330]: IBRION
              - text: ’
            - cell "—" [ref=e15331]
            - cell "Optimisation algorithm" [ref=e15332]
      - paragraph [ref=e15333]: For a non-symmorphic space group with a glide plane, VASP detects the glide automatically; the symmetry-derived k-point reduction (‘KPOINTS’ with ‘Auto’ mesh) respects the glide.
      - blockquote [ref=e15334]:
        - paragraph [ref=e15335]:
          - strong [ref=e15336]: Tip.
          - text: "If you have a CIF file, use ‘pymatgen’ or ‘ase’ to convert it to a POSCAR: ‘Structure.from_file(“Cu.cif”).to(“POSCAR”, “POSCAR”)’."
      - heading "8.3 Quantum ESPRESSO" [level=3] [ref=e15337]
      - paragraph [ref=e15338]: "QE uses the `&SYSTEM’ namelist in the input file:"
      - code [ref=e15342]: "&SYSTEM ibrav = 2 ! FCC celldm(1) = 7.65 ! a in Bohr (= 4.05 Å / 0.529) nat = 1 ntyp = 1 space_group = 225 ! Fm-3m /"
      - paragraph [ref=e15343]:
        - text: The
        - code [ref=e15344]: ibrav
        - text: ’ codes are QE-internal shortcuts for the 14 Bravais lattices. When
        - code [ref=e15345]: space_group
        - text: ’ is given, QE uses the symmetry operations from the
        - emphasis [ref=e15346]: International Tables
        - text: for k-point reduction and Hamiltonian symmetrisation. This is more reliable than letting QE
        - emphasis [ref=e15347]: guess
        - text: the symmetry from the atomic positions.
      - heading "8.4 CASTEP" [level=3] [ref=e15348]
      - paragraph [ref=e15349]: "CASTEP uses a `.cell’ file:"
      - code [ref=e15353]: "%BLOCK LATTICE_CART 3.6149 0.0 0.0 0.0 3.6149 0.0 0.0 0.0 3.6149 %ENDBLOCK LATTICE_CART %BLOCK POSITIONS_FRAC Cu 0.0 0.0 0.0 %ENDBLOCK POSITIONS_FRAC SYMMETRY_GENERATE SNAP_TO_SYMMETRY"
      - paragraph [ref=e15354]:
        - text: The
        - code [ref=e15355]: SYMMETRY_GENERATE
        - text: ’ keyword asks CASTEP to find the space group from the structure;
        - code [ref=e15356]: SNAP_TO_SYMMETRY
        - text: ’ rounds the atomic positions to the nearest high-symmetry site.
      - heading "8.5 SIESTA" [level=3] [ref=e15357]
      - paragraph [ref=e15358]: "SIESTA reads the structure from a `.fdf’ file:"
      - code [ref=e15362]: LatticeConstant 1.0 Ang %block LatticeVectors 3.6149 0.0 0.0 0.0 3.6149 0.0 0.0 0.0 3.6149 %endblock LatticeVectors %block AtomicCoordinatesAndAtomicSpecies 0.0 0.0 0.0 1 %endblock AtomicCoordinatesAndAtomicSpecies
      - paragraph [ref=e15363]:
        - text: SIESTA does not have explicit space-group support; symmetry is detected by the
        - code [ref=e15364]: SIESTA
        - text: "-internal module or by an external tool such as"
        - code [ref=e15365]: spglib
        - text: .
      - heading "8.6 The Bilbao Crystallographic Server (BCS)" [level=3] [ref=e15366]
      - paragraph [ref=e15367]:
        - text: The
        - link "Bilbao Crystallographic Server" [ref=e15368] [cursor=pointer]:
          - /url: https://www.cryst.ehu.es/
        - text: "(BCS) is the de-facto web reference for space-group analysis. It hosts a dozen tools; the most useful for DFT work are:"
      - table [ref=e15369]:
        - rowgroup [ref=e15370]:
          - row "Tool URL Use" [ref=e15371]:
