      - blockquote [ref=e9114]:
        - paragraph [ref=e9115]:
          - strong [ref=e9116]: Zincblende vs diamond.
          - img [ref=e9118]
          - text: (No. 216) and
          - img [ref=e9134]
          - text: (No. 227) have the same FCC Bravais lattice and the same occupied Wyckoff positions, but different
          - emphasis [ref=e9149]: glide
          - text: planes. In
          - img [ref=e9151]
          - text: the two atoms of the basis sit at
          - img [ref=e9167]
          - text: and
          - img [ref=e9185]
          - text: ", which is the"
          - strong [ref=e9217]: diamond
          - text: structure. In
          - img [ref=e9219]
          - text: the second atom is at
          - img [ref=e9235]
          - text: as well, but the
          - emphasis [ref=e9267]: "`d"
          - text: ’ glide of the diamond is replaced by a pure mirror — the
          - strong [ref=e9268]: zincblende
          - text: structure. If the two basis atoms are different species (GaAs, ZnS, CdTe), the inversion symmetry is broken and the group is zincblende. If they are the same (Si, Ge, C), the group is diamond.
