      - paragraph [ref=e880]:
        - text: The
        - strong [ref=e881]: "holohedral point grou`p"
        - text: (or holohedry*) is the full point group that maps the conventional cell onto itself. It is the highest-symmetry point group of the crystal system; every other point group in the same system is a subgroup of the holohedry. The order column is the number of operations in the group. See §2 below for the full 32-point-group classification.
      - blockquote [ref=e882]:
        - paragraph [ref=e883]:
          - strong [ref=e884]: Trigonal vs hexagonal.
          - text: Some authors use the term “rhombohedral” for the trigonal system. The lattice can be described with either rhombohedral axes (
          - img [ref=e886]
          - text: ","
          - img [ref=e900]
          - text: ) or hexagonal axes (three times larger conventional cell with
          - img [ref=e914]
          - text: ","
          - img [ref=e928]
          - text: ). Both descriptions are valid; the hexagonal setting is more common in modern DFT codes (VASP, Quantum ESPRESSO) because the BZ is a regular hexagonal prism, easier to navigate.
