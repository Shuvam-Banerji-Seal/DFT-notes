      - paragraph [ref=e3726]:
        - text: A
        - strong [ref=e3727]: point group
        - text: of a crystal is the set of isometries of
        - img [ref=e3729]
        - text: that leave at least one point fixed and map the crystal onto itself. These isometries are the rotations, reflections, inversions, and improper rotations (rotoinversions) of §2.2 below. The point group is the
        - strong [ref=e3738]: directional
        - text: part of the full
        - strong [ref=e3739]: space group
        - text: (§3); the space group adds the translations.
