      - heading "7.4 Hexagonal (HEX)" [level=3] [ref=e14766]
      - paragraph [ref=e14767]:
        - text: The standard hexagonal path visits the 6 high-symmetry points of §6.5 in two halves. The first half (
        - img [ref=e14769]
        - text: ) lives in the basal plane
        - img [ref=e14787]
        - text: and is the path used for 2-D materials such as graphene. The second half (
        - img [ref=e14800]
        - text: ) samples the
        - img [ref=e14822]
        - text: dispersion. Three closing segments (
        - img [ref=e14831]
        - text: ","
        - img [ref=e14841]
        - text: ) connect the top of the BZ back to the basal plane. The shorthand is
      - img [ref=e14851]
      - paragraph [ref=e14902]:
        - text: "For 2-D materials, drop the second half: the path reduces to"
        - img [ref=e14904]
        - text: ", the canonical graphene path of"
        - link "chapter 11 §11.9" [ref=e14921] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-11/
        - text: .
      - blockquote [ref=e14922]:
        - paragraph [ref=e14923]:
          - strong [ref=e14924]: The K point is doubly counted.
          - text: In the path above, the segment
          - img [ref=e14926]
          - text: is on the basal plane and the segment
          - img [ref=e14936]
          - text: is between the basal plane and the top face. The point
          - img [ref=e14946]
          - text: therefore appears
          - emphasis [ref=e14951]: twice
          - text: in the path. This is correct — the basal-plane
          - img [ref=e14953]
          - text: and the top-face
          - img [ref=e14959]
          - text: are
          - emphasis [ref=e14964]: different
          - text: points in the 3-D BZ, even though they share the
          - img [ref=e14966]
          - text: "-component when projected to the basal plane."
