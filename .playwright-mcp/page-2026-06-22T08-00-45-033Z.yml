        - emphasis [ref=e3787]: not
        - text: a Bravais-lattice symmetry. (5-fold symmetries do appear in
        - strong [ref=e3788]: quasicrystals
        - text: — the Shechtman 1982 discovery, Nobel 2011 — but those are not periodic in 3-D and are not the topic of this page.)
