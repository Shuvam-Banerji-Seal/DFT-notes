      - paragraph [ref=e15824]:
        - text: Note that diamond, rocksalt, and zincblende all have the
        - emphasis [ref=e15825]: same
        - text: extended Pearson symbol
        - code [ref=e15826]: cF8
        - text: ’ (8 atoms per conventional FCC cell) — what distinguishes them is the space group (
        - img [ref=e15828]
        - text: ","
        - img [ref=e15844]
        - text: ","
        - img [ref=e15860]
        - text: respectively) and the species on each Wyckoff position.
      - 'heading "9.4 Worked example: identifying a material from its Pearson symbol" [level=3] [ref=e15875]'
      - blockquote [ref=e15876]:
        - paragraph [ref=e15877]:
          - text: A material in the ICSD has Pearson symbol
          - code [ref=e15878]: oF8
          - text: ’ and is reported to be an intercalation compound. What crystal system, Bravais lattice, and conventional cell does it have?
      - paragraph [ref=e15879]:
        - code [ref=e15880]: oF8
        - text: ’ is the structure of
        - img [ref=e15882]
        - text: "-NaFeO₂ — a layered intercalation compound used as a positive electrode in Na-ion batteries. The breakdown:"
      - list [ref=e15887]:
        - listitem [ref=e15888]:
          - code [ref=e15889]: o
          - text: ’ = orthorhombic (
          - img [ref=e15891]
          - text: ","
          - img [ref=e15905]
          - text: ).
        - listitem [ref=e15926]:
          - code [ref=e15927]: F
          - text: ’ = face-centred (4 lattice points per conventional cell).
        - listitem [ref=e15928]:
          - code [ref=e15929]: "8"
          - text: ’ = 8 atoms per conventional cell, so 8/4 = 2 atoms per primitive cell.
      - paragraph [ref=e15930]:
        - text: The full structural description is in space group
        - img [ref=e15932]
        - text: (No. 33) or
        - img [ref=e15947]
        - text: (No. 62) — depending on the specific chemistry. The ICSD entry will list the space group explicitly; the Pearson symbol alone is a
        - emphasis [ref=e15958]: family
        - text: identifier, not a
        - emphasis [ref=e15959]: structure
        - text: identifier.
      - blockquote [ref=e15960]:
        - paragraph [ref=e15961]:
          - strong [ref=e15962]: Pearson symbol as a structure-type identifier.
          - text: The 1-to-1 mapping is
          - emphasis [ref=e15963]: not
          - text: a structure-type identifier. Two materials can share a Pearson symbol but have different space groups (e.g.
          - img [ref=e15965]
          - text: for diamond, rocksalt, and zincblende). Use the Pearson symbol as a quick filter; use the full space group + Wyckoff positions for a complete structure description.
      - separator [ref=e15974]
      - heading "10. Hermann–Mauguin and Schoenflies side-by-side" [level=2] [ref=e15975]
      - paragraph [ref=e15976]:
        - text: The two notations are not in 1-to-1 correspondence. The Schoenflies symbols depend on the
        - emphasis [ref=e15977]: rotational
        - text: subgroup (the “axial” part) and use letter+number, while the HM symbols depend on the full point group and use number+letter+number. Some groups have the same Schoenflies symbol across crystal systems (e.g.
        - img [ref=e15979]
        - text: is the point group of
        - emphasis [ref=e15990]: "bot`h"
        - text: ’ the monoclinic
        - img [ref=e15992]
        - text: and the orthorhombic
        - img [ref=e16008]
        - text: ); the HM symbol distinguishes them.
      - heading "10.1 Why both exist" [level=3] [ref=e16019]
      - paragraph [ref=e16020]:
        - strong [ref=e16021]: Schoenflies
        - text: "is preferred in:"
      - list [ref=e16022]:
        - listitem [ref=e16023]: Spectroscopy (IR, Raman, polarisation selection rules).
        - listitem [ref=e16024]: Molecular quantum chemistry (point group of a single molecule).
        - listitem [ref=e16025]:
          - text: "Group theory of finite groups (the Schoenflies notation emphasises the abstract group structure:"
          - img [ref=e16027]
          - text: cyclic,
          - img [ref=e16036]
          - text: dihedral,
          - img [ref=e16045]
          - text: tetrahedral,
          - img [ref=e16051]
          - text: octahedral,
          - img [ref=e16057]
          - text: icosahedral).
      - paragraph [ref=e16062]:
        - strong [ref=e16063]: Hermann–Mauguin
        - text: "is preferred in:"
      - list [ref=e16064]:
        - listitem [ref=e16065]:
          - text: Crystallography (the
          - emphasis [ref=e16066]: International Tables
          - text: ", every database, the BCS)."
        - listitem [ref=e16067]: Solid-state physics and DFT (every modern code).
        - listitem [ref=e16068]: Materials science (the Pearson Handbook uses HM).
      - paragraph [ref=e16069]: When in doubt, use HM. When reading a spectroscopy paper, you will encounter Schoenflies.
      - heading "10.2 Complete mapping table (32 point groups)" [level=3] [ref=e16070]
