      - paragraph [ref=e15411]:
        - text: The BCS also hosts the
        - strong [ref=e15412]: Bilbao Crystallographic Data
        - text: "for each space group: the full Wyckoff-position list with site symmetries, the maximal and minimal non-isomorphic subgroups, and the Brillouin-zone data."
      - 'heading "8.7 Worked example: building -quartz (SiO₂) from scratch" [level=3] [ref=e15413]':
        - text: "8.7 Worked example: building"
        - img [ref=e15415]
        - text: "-quartz (SiO₂) from scratch"
      - paragraph [ref=e15420]:
        - img [ref=e15422]
        - text: "-quartz is a low-temperature polymorph of SiO₂ with space group"
        - img [ref=e15428]
        - text: (No. 152, Schoenflies
        - img [ref=e15443]
        - text: ) and three formula units per unit cell. Here is how to build it from a CIF file and a
        - code [ref=e15453]: pymatgen
        - text: ’ script that emits a VASP
        - code [ref=e15454]: POSCAR
        - text: .
      - paragraph [ref=e15455]:
        - strong [ref=e15456]: Step 1. The CIF file.
      - code [ref=e15458]: data_alpha_quartz _chemical_name_common "alpha-quartz" _chemical_formula_structural "SiO2" _cell_length_a 4.9134 _cell_length_b 4.9134 _cell_length_c 5.4052 _cell_angle_alpha 90 _cell_angle_beta 90 _cell_angle_gamma 120 _space_group_name_H-M_alt "P 31 21" _space_group_IT_number 152 loop_ _atom_site_label _atom_site_fract_x _atom_site_fract_y _atom_site_fract_z Si1 0.4697 0.0000 0.0000 Si2 0.0000 0.4697 0.6667 Si3 0.5303 0.5303 0.3333 O1 0.4133 0.2672 0.1187 O2 0.2672 0.4133 0.5479 O3 0.7328 0.1461 0.4521 O4 0.5867 0.8539 0.2146 O5 0.1461 0.7328 0.8813 O6 0.8539 0.5867 0.7854
      - paragraph [ref=e15459]:
        - strong [ref=e15460]:
          - text: Step 2. The
          - code [ref=e15461]: pymatgen
          - text: ’ script that converts to POSCAR.
      - code [ref=e15465]: "from pymatgen.core import Structure from pymatgen.symmetry.analyzer import SpacegroupAnalyzer s = Structure.from_file(\"alpha_quartz.cif\") spg = SpacegroupAnalyzer(s, symprec=1e-3) print(\"Space group:\", spg.get_space_group_symbol()) # -> \"P 31 21\" print(\"Number: \", spg.get_space_group_number()) # -> 152 s_sym = spg.get_symmetrized_structure() s_sym.to(fmt=\"poscar\", filename=\"POSCAR\")"
      - paragraph [ref=e15466]:
        - strong [ref=e15467]: Step 3. The VASP input files.
      - code [ref=e15471]: "# INCAR (geometry optimisation) SYSTEM = alpha-quartz ENCUT = 520 EDIFF = 1e-5 IBRION = 2 ISIF = 3 ISYM = 2 NSW = 30 EDIFFG = -0.02"
      - code [ref=e15475]: "# KPOINTS (Auto mesh, 6x6x6 for a hexagonal cell) Auto 0 Gamma 6 6 6 0 0 0"
      - paragraph [ref=e15476]:
        - text: "The key `ISYM = 2’ lets VASP detect the"
        - img [ref=e15478]
        - text: symmetry from the POSCAR and use it for k-point reduction and Hamiltonian symmetrisation. The point group of
        - img [ref=e15493]
        - text: is
        - img [ref=e15508]
        - text: (order 6), so the speedup from symmetry is modest (
        - img [ref=e15517]
        - text: ) but the band-structure plot along the hexagonal k-path (§7.4) is well-defined.
      - blockquote [ref=e15526]:
        - paragraph [ref=e15527]:
          - strong [ref=e15528]: Reading note.
          - text: The point group of
          - img [ref=e15530]
          - text: "-quartz is"
          - img [ref=e15536]
          - text: ","
          - emphasis [ref=e15544]: not
          - text: the more symmetric
          - img [ref=e15546]
          - text: of
          - img [ref=e15558]
          - text: "-quartz (the high-temperature polymorph, space group"
          - img [ref=e15564]
          - text: ", No. 154). The two structures differ in their screw sense:"
          - img [ref=e15578]
          - text: has a right-handed screw,
          - img [ref=e15592]
          - text: a left-handed screw. Enantiomorphic pairs of this kind are common in chiral minerals.
      - separator [ref=e15605]
      - heading "9. The Pearson symbol cheat sheet" [level=2] [ref=e15606]
      - paragraph [ref=e15607]:
        - text: The
        - strong [ref=e15608]: Pearson symbol
        - text: is a two-character code for a Bravais lattice. It is used in crystallographic databases (CRYSTMET, ICSD, Pearson’s Handbook) and in the materials science literature to identify a structure type.
      - heading "9.1 Structure" [level=3] [ref=e15609]
      - paragraph [ref=e15610]:
        - text: A Pearson symbol has the form
        - code [ref=e15611]: XY
        - text: "’ where:"
      - list [ref=e15612]:
        - listitem [ref=e15613]:
          - code [ref=e15614]: X
          - text: ’ is a
          - strong [ref=e15615]: lowercase
          - text: letter denoting the crystal system (see §1.1).
        - listitem [ref=e15616]:
          - code [ref=e15617]: "Y"
          - text: ’ is an
          - strong [ref=e15618]: uppercase
          - text: letter denoting the centring (see §1.2).
      - paragraph [ref=e15619]:
        - text: "The two letters together identify the Bravais lattice. Combined with the number of atoms per cell, a Pearson symbol becomes a structure-type identifier: e.g."
        - code [ref=e15620]: cF8
        - text: ’ is the diamond structure (FCC, 8 atoms per conventional cell).
      - heading "9.2 The 23 Pearson symbols" [level=3] [ref=e15621]
      - paragraph [ref=e15622]:
        - text: There are
        - strong [ref=e15623]: "23"
        - text: Pearson symbols in common use. The reason there are 23 and not 14 (the number of Bravais lattices) is that some authors extend the convention to include the lattice
        - emphasis [ref=e15624]: centring
        - text: of the reciprocal lattice or the lattice system in a non-standard way. The 14 standard Pearson symbols are in the table below; the 9 extras (
        - img [ref=e15626]
        - text: ","
        - img [ref=e15634]
        - text: ","
        - img [ref=e15642]
        - text: ","
        - img [ref=e15650]
        - text: ","
        - img [ref=e15658]
        - text: ","
        - img [ref=e15666]
        - text: ","
        - img [ref=e15674]
        - text: ","
        - img [ref=e15682]
        - text: ", and one more historical variant) are alternate names for one of the 14 and are encountered only in older references."
      - heading "9.3 The “atoms per cell” extension" [level=3] [ref=e15689]
      - paragraph [ref=e15690]: "The Pearson symbol is sometimes extended with a third character, the number of atoms in the conventional cell:"
      - table [ref=e15691]:
