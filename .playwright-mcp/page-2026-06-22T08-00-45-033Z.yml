      - paragraph [ref=e18363]:
        - text: The 7 infinite families
        - img [ref=e18365]
        - text: and the 5 cubic groups
        - img [ref=e18421]
        - text: together generate the 32 crystallographic point groups when the cyclic orders are restricted to
        - img [ref=e18452]
        - text: and the cubic groups are restricted to
        - img [ref=e18479]
        - text: and
        - img [ref=e18485]
        - text: (the icosahedral group
        - img [ref=e18491]
        - text: of order 120 is
        - emphasis [ref=e18496]: not
        - text: a 3-D Bravais-lattice symmetry; it is the symmetry of the icosahedron, the buckyball C₆₀, and quasicrystals).
      - blockquote [ref=e18497]:
        - paragraph [ref=e18498]:
          - strong [ref=e18499]: Mapping rule of thumb.
          - text: To convert Schoenflies
          - img [ref=e18501]
          - text: "HM:"
        - list [ref=e18506]:
          - listitem [ref=e18507]:
            - img [ref=e18509]
            - text: (with horizontal bar if there is inversion, letter
            - code [ref=e18521]: m
            - text: ’ for horizontal mirror).
          - listitem [ref=e18522]:
            - img [ref=e18524]
            - text: (in cubic) or
            - img [ref=e18541]
            - text: (with mirrors).
          - listitem [ref=e18550]:
            - img [ref=e18552]
            - text: (cubic, chiral);
            - img [ref=e18563]
            - text: (cubic, with mirrors);
            - img [ref=e18584]
            - text: ;
            - img [ref=e18596]
            - text: . When in doubt, look it up in §10.2 above.
      - separator [ref=e18616]
      - heading "11. What we left out" [level=2] [ref=e18617]
      - paragraph [ref=e18618]:
        - text: This page is a
        - emphasis [ref=e18619]: reference
        - text: ", not a derivation. The topics below are"
        - emphasis [ref=e18620]: not
        - text: "covered here and would each deserve their own section (or chapter):"
      - list [ref=e18621]:
        - listitem [ref=e18622]:
          - strong [ref=e18623]: Magnetic space groups
          - text: (Shubnikov groups, 1651 of them). The 230 “grey” space groups above are the paramagnetic groups; once time-reversal symmetry is broken, the magnetic point group can be any of 32 + 32 + 58 = 122 *magneti
          - code [ref=e18624]: c*' point groups, and the magnetic space groups number 1651. The BCS has a separate
          - text: "NCSYM`’ tool for these."
        - listitem [ref=e18625]:
          - strong [ref=e18626]: Incommensurate structures.
          - text: Modulated structures and quasicrystals have no 3-D Bravais lattice; the symmetry is described in
          - img [ref=e18628]
          - text: "-D superspace."
        - listitem [ref=e18641]:
          - strong [ref=e18642]: Quasicrystals.
          - text: The 5-fold and icosahedral symmetries of quasicrystals are
          - emphasis [ref=e18643]: local
          - text: (i.e. on the diffraction pattern) but the structure is aperiodic.
        - listitem [ref=e18644]:
          - strong [ref=e18645]: Subperiodic groups
          - text: (layer groups, rod groups, frieze groups). These are the symmetry groups of 2-D and 1-D submanifolds of 3-D space; they are useful for surfaces and polymers.
        - listitem [ref=e18646]:
          - strong [ref=e18647]: Higher-dimensional crystallography.
          - text: The 230 space groups are the 3-D case;
          - img [ref=e18649]
          - text: "-D generalisations exist and are tabulated for"
          - img [ref=e18655]
          - text: and
          - img [ref=e18665]
          - text: (relevant for quasicrystal structure solution).
        - listitem [ref=e18674]:
          - strong [ref=e18675]: Relativistic crystallography.
          - text: Magnetic groups and spin-space groups are the relativistic generalisations; the spin-space groups number 11994 in 3-D (Litvin 2013).
        - listitem [ref=e18676]:
          - strong [ref=e18677]: Group theory of space groups.
          - text: The 230 space groups are abstractly a small set of isomorphism classes (73 symmorphic
          - list [ref=e18678]:
            - listitem [ref=e18679]:
              - text: 157 non-symmorphic), and their irreps at the high-symmetry k-points are tabulated in
              - emphasis [ref=e18680]: International Tables
              - text: vol. B.
      - paragraph [ref=e18681]:
        - text: For the DFT context, the
        - strong [ref=e18682]: 230 space groups
        - text: and their
        - strong [ref=e18683]: k- point conventions
        - text: (Setyawan–Curtarolo) are the only ones you need. Everything else is on the BCS.
      - separator [ref=e18684]
      - heading "12. References and further reading" [level=2] [ref=e18685]
      - list [ref=e18686]:
        - listitem [ref=e18687]:
          - strong [ref=e18688]: International Tables for Crystallography
          - text: ", vol. A (Space-group symmetry), 6th ed., ed. M. I. Aroyo (Wiley, 2016). The canonical reference. Every library with a crystallography section has it."
        - listitem [ref=e18689]:
          - text: M. I. Aroyo, ed.,
          - strong [ref=e18690]: International Tables for Crystallography
          - text: vol. E (Subperiodic groups), 2nd ed. (Wiley, 2020). Layer, rod, and frieze groups.
        - listitem [ref=e18691]:
          - text: C. Kittel,
          - strong [ref=e18692]: Introduction to Solid State Physics
          - text: ", 9th ed. (Wiley, 2021), chapters 1–2. The classic textbook. Uses the"
          - img [ref=e18694]
          - text: convention for the reciprocal lattice (§1.3).
        - listitem [ref=e18701]:
          - text: N. W. Ashcroft and N. D. Mermin,
          - strong [ref=e18702]: Solid State Physics
          - text: (Holt, Rinehart, Winston, 1976), chapters 4–7. More thorough than Kittel on reciprocal space.
        - listitem [ref=e18703]:
          - text: M. S. Dresselhaus, G. Dresselhaus, and A. Jorio,
          - strong [ref=e18704]: "Group Theory: Application to the Physics of Condensed Matter"
          - text: (Springer, 2008). The standard reference for space-group applications in solid-state physics.
        - listitem [ref=e18705]:
          - text: "W. Setyawan and S. Curtarolo, “High-throughput electronic band structure calculations: Challenges and tools”,"
          - emphasis [ref=e18706]: Computational Materials Science
          - strong [ref=e18707]: "49"
          - text: ", 299 (2010). The paper that defined the canonical k-paths of §7."
          - emphasis [ref=e18708]: Every
          - text: modern band-structure database uses these conventions.
        - listitem [ref=e18709]:
          - text: G. K. H. Madsen and D. J. Singh, “BoltzTraP. A code for calculating band-structure dependent quantities”,
          - emphasis [ref=e18710]: Computer Physics Communications
          - strong [ref=e18711]: "175"
          - text: ", 67 (2006). The BoltzTraP code uses the Setyawan–Curtarolo conventions."
        - listitem [ref=e18712]:
          - text: The
          - link "Bilbao Crystallographic Server" [ref=e18713] [cursor=pointer]:
            - /url: https://www.cryst.ehu.es/
          - text: ", M. I. Aroyo et al. The de-facto web reference."
        - listitem [ref=e18714]:
          - text: The
          - code [ref=e18715]: spglib
          - text: ’ library, H. T. Stokes and D. M. Hatch (Brigham Young University). Python wrapper
          - code [ref=e18716]: pyspglib
          - text: . The standard tool for symmetry analysis from a CIF or POSCAR.
        - listitem [ref=e18717]:
          - text: The
          - code [ref=e18718]: pymatgen
          - text: ’ library, S. P. Ong et al. (Materials Project). The standard Python materials-science library; uses Setyawan–Curtarolo k-paths as defaults.
        - listitem [ref=e18719]:
          - text: The
          - code [ref=e18720]: ase
          - text: ’ library (Atomic Simulation Environment), A. H. Larsen et al. An alternative to
          - code [ref=e18721]: pymatgen
          - text: ; similar capabilities for reading CIF and computing k-paths.
        - listitem [ref=e18722]:
          - text: D. Shechtman, I. Blech, D. Gratias, and J. W. Cahn, “Metallic phase with long-range orientational order and no translational symmetry”,
          - emphasis [ref=e18723]: Physical Review Letters
          - strong [ref=e18724]: "53"
          - text: ", 1951 (1984). The original quasicrystal paper (5-fold symmetry in a metallic solid)."
      - blockquote [ref=e18725]:
        - paragraph [ref=e18726]:
          - strong [ref=e18727]: Up next in DFT Notes.
          - text: This page is the static crystallography reference. For the
