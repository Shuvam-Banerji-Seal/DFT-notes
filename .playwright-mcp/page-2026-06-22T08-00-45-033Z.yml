      - paragraph [ref=e1454]:
        - text: The 14 Bravais lattices are sometimes called the 14
        - emphasis [ref=e1455]: Bravais types
        - text: ": a primitive cubic lattice and a primitive hexagonal lattice are the only “primitive” Bravais lattices in their systems, and adding centring to a primitive lattice either generates a new lattice type (e.g. body-centred cubic"
        - img [ref=e1457]
        - text: primitive cubic) or, in some cases, is equivalent to a smaller primitive cell of another centring. E.g. base-centred orthorhombic (
        - img [ref=e1463]
        - text: or
        - img [ref=e1471]
        - text: ) is
        - emphasis [ref=e1478]: not
        - text: equivalent to primitive orthorhombic; the extra centring point gives a different topology.
