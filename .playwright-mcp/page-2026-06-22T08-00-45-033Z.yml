      - heading "7. High-symmetry k-paths for common lattices" [level=2] [ref=e12922]
      - paragraph [ref=e12923]:
        - text: The 1-D k-path used to plot a band structure is a
        - emphasis [ref=e12924]: chain of straight segments
        - text: joining the high-symmetry points. The path must visit every symmetry-inequivalent point in the IBZ at least once; longer paths are more complete but harder to read. The four “canonical” paths below are the ones used by the Materials Project, AFLOW, the BoltzTraP code, and every modern VASP/QE tutorial.
      - heading "7.1 Simple cubic (SC)" [level=3] [ref=e12925]
      - paragraph [ref=e12926]:
        - text: The SC lattice has a
        - strong [ref=e12927]: cubic
