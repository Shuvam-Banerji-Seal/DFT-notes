      - heading "1. Direct and reciprocal lattices" [level=2] [ref=e316]
      - paragraph [ref=e317]:
        - text: A
        - strong [ref=e318]: Bravais lattice
        - text: is the infinite, discrete set of points
        - img [ref=e320]
        - text: in
        - img [ref=e379]
        - text: that a real crystal’s translations form. The
        - strong [ref=e388]: primitive vectors
        - img [ref=e390]
        - text: are the three linearly-independent shortest vectors that generate the lattice. The
        - strong [ref=e415]: conventional cell
        - text: is a (typically larger) cubic-, orthorhombic-, or hexagonal-shaped cell that exposes the lattice’s symmetry; it is the cell of choice for reporting lattice parameters and atomic positions, while the primitive cell is the cell of choice for band-structure and density-of-states calculations.
