          - link [ref=e7769] [cursor=pointer]:
            - /url: "#"
        - text: above are identical to equations (7.139) and (7.140) of that chapter.
      - heading "3.2 Symmorphic vs non-symmorphic space groups" [level=3] [ref=e7778]
      - paragraph [ref=e7779]:
        - text: A space group is
        - strong [ref=e7780]: symmorphic
        - text: if its point group is a
        - emphasis [ref=e7781]: "subgrou`p"
        - text: ’ of the space group in the literal sense — that is, if every element of the point group
        - img [ref=e7783]
        - text: is in the space group. Equivalently, a symmorphic space group is a
        - emphasis [ref=e7794]: direct product
        - text: of the point group and the translation subgroup.
      - paragraph [ref=e7795]:
        - text: In a non-symmorphic space group, on the other hand, some “point-group” operations are accompanied by a
        - emphasis [ref=e7796]: fractional
        - text: translation
        - img [ref=e7798]
        - text: "that is not a Bravais vector. These fractional translations can be of two kinds:"
      - list [ref=e7804]:
        - listitem [ref=e7805]:
          - paragraph [ref=e7806]:
            - strong [ref=e7807]: "Screw axis:"
            - img [ref=e7809]
            - text: is parallel to the rotation axis; the operation is a rotation + translation. The notation
            - img [ref=e7816]
            - text: denotes an
            - img [ref=e7825]
            - text: "-fold rotation accompanied by a"
            - img [ref=e7831]
            - text: translation along the axis (in units of the cell parameter along the axis). E.g.
            - img [ref=e7842]
            - text: is a 2-fold rotation with translation by
            - img [ref=e7851]
            - text: ;
            - img [ref=e7862]
            - text: is a 4-fold rotation with translation by
            - img [ref=e7871]
            - text: .
        - listitem [ref=e7881]:
          - paragraph [ref=e7882]:
            - strong [ref=e7883]: "Glide plane:"
            - img [ref=e7885]
            - text: lies in the mirror plane; the operation is a reflection + translation. Glides are denoted
            - img [ref=e7892]
            - text: (translation by
            - img [ref=e7898]
            - text: ),
            - img [ref=e7909]
            - text: (by
            - img [ref=e7915]
            - text: ),
            - img [ref=e7926]
            - text: (by
            - img [ref=e7932]
            - text: ),
            - img [ref=e7943]
            - text: (translation by
            - img [ref=e7949]
            - text: or any other diagonal), and
            - img [ref=e7968]
            - text: (translation by
            - img [ref=e7974]
            - text: — a “diamond” glide).
      - paragraph [ref=e7992]:
        - text: Of the 230 space groups, exactly
        - strong [ref=e7993]: 73 are symmorphic
        - text: and
        - strong [ref=e7994]: 157 are non-symmorphic
        - text: . The symmorphic space groups are the ones in which every crystal axis is described by a single HM symbol without subscripts (screws) or letter (glides). The most common symmorphic space groups in DFT are
        - img [ref=e7996]
        - text: (No. 221),
        - img [ref=e8012]
        - text: (No. 225),
        - img [ref=e8028]
        - text: (No. 191), and
        - img [ref=e8045]
        - text: (No. 123).
      - heading "3.3 Looking up a space group from its number" [level=3] [ref=e8061]
      - paragraph [ref=e8062]:
        - text: The
        - emphasis [ref=e8063]: International Tables for Crystallography
        - text: ", vol. A, tabulates the 230 space groups in order from No. 1 to No. 230. The numbering is unique and universal; “space group No. 227” is"
        - img [ref=e8065]
        - text: (the diamond structure) in every reference. The first 73 are symmorphic; numbers 74–230 are non-symmorphic.
      - paragraph [ref=e8080]: "A short cut for the practitioner:"
      - list [ref=e8081]:
        - listitem [ref=e8082]: The number, the HM symbol, and the Schoenflies symbol are three equivalent labels for the same space group. All three are accepted by modern DFT codes.
        - listitem [ref=e8083]:
          - text: The HM symbol has the structure
          - img [ref=e8085]
          - text: where each
          - emphasis [ref=e8127]: position
          - text: is a generator (rotation, screw, mirror, glide, or rotoinversion) along a specific crystallographic direction.
        - listitem [ref=e8128]:
          - text: The full entry in the
          - emphasis [ref=e8129]: International Tables
          - text: (or on the BCS) includes the Wyckoff positions (§4), the maximal subgroups, and the generators.
      - blockquote [ref=e8130]:
        - paragraph [ref=e8131]:
          - strong [ref=e8132]: Tip.
          - text: The Python library
          - code [ref=e8133]: spglib
          - text: ’ (H. T. Stokes, D. M. Hatch, Brigham Young University; python wrapper
          - code [ref=e8134]: pyspglib
          - text: ) is the standard tool for symmetry analysis. It takes a crystal structure (cell + atomic positions) and returns the space group number, the HM symbol, the Schoenflies symbol, the equivalent Wyckoff positions, and a symmetrised cell.
      - heading "3.4 The most common space groups for DFT calculations" [level=3] [ref=e8135]
