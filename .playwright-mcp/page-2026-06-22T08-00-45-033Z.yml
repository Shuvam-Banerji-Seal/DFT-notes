      - blockquote [ref=e7448]:
        - paragraph [ref=e7449]:
          - strong [ref=e7450]: Order counting.
          - text: The order of a point group is the number of distinct symmetry operations it contains. For
          - img [ref=e7452]
          - text: it is
          - img [ref=e7461]
          - text: ; for
          - img [ref=e7467]
          - text: it is
          - img [ref=e7476]
          - text: ; for
          - img [ref=e7484]
          - text: (chiral tetrahedral) it is 12; for
          - img [ref=e7490]
          - text: (chiral octahedral, sometimes called the
          - emphasis [ref=e7495]: "rotation grou`p"
          - text: ’ of the cube) it is 24; for
          - img [ref=e7497]
          - text: (full octahedral) it is 48. The five cubic point groups are 12, 24, 24, 24, 48 in size, which sums with the others to 32. —
      - heading "3. The 230 space groups" [level=2] [ref=e7505]
      - paragraph [ref=e7506]:
        - text: A
        - strong [ref=e7507]: space group
        - text: is the full symmetry group of a crystal, including both the directional symmetries of the point group (§2) and the translational symmetries of the Bravais lattice (§1). The full group is
        - strong [ref=e7508]: infinite
        - text: because translations
        - img [ref=e7510]
        - text: are infinite in number; but the
        - emphasis [ref=e7534]: factor
        - text: by which the group is infinite — the
        - strong [ref=e7535]: point group
        - text: — is finite. Every space group can be written as a
        - emphasis [ref=e7536]: coset decomposition
        - text: of its point group over the translation subgroup, so the space group is “point group + a small set of generators”.
      - paragraph [ref=e7537]:
        - text: "The enumeration of 3-D space groups is one of the great counting theorems of 19th-century mathematics: there are"
        - strong [ref=e7538]: exactly 230 distinct space groups
        - text: in three dimensions, a result proved independently by Schoenflies (1891), Fedorov (1891), and Barlow (1894). The classification is tabulated in the
        - emphasis [ref=e7539]: International Tables for Crystallography
        - text: ", vol. A (6th ed., 2016), and the equivalent Schoenflies notation in vol. E (2002). Modern web resources are the"
        - link "Bilbao Crystallographic Server" [ref=e7540] [cursor=pointer]:
          - /url: https://www.cryst.ehu.es/
        - text: (BCS) and the
        - code [ref=e7541]: spglib
        - text: ’ library.
      - heading "3.1 The Seitz notation" [level=3] [ref=e7542]
      - paragraph [ref=e7543]:
        - text: Every element
        - img [ref=e7545]
        - text: of a space group can be written in
        - strong [ref=e7550]: Seitz notation
      - img [ref=e7552]
      - paragraph [ref=e7591]:
        - text: with
        - img [ref=e7593]
        - text: a point-group operation (rotation, reflection, inversion, rotoinversion, or a product thereof) and
        - img [ref=e7609]
        - text: a translation. The composition rule is
      - img [ref=e7624]
      - paragraph [ref=e7700]:
        - text: The translation subgroup is
        - img [ref=e7702]
        - text: for
        - img [ref=e7715]
        - text: ", and the point group is the set of"
        - img [ref=e7739]
        - text: operations in the group.
      - paragraph [ref=e7750]:
        - text: In the DFT notes the Seitz notation is introduced in
        - link "chapter 07 §7.10.1" [ref=e7751] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: . Equations
