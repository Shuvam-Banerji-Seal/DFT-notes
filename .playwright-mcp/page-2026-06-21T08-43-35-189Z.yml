  - main [ref=e25]:
    - generic [ref=e26]:
      - heading "Chapter 00 — Welcome" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]: This chapter has no equations. That’s the only one. Everything after this is math.
      - paragraph [ref=e30]:
        - text: These notes are an attempt to write down, in one place, the
        - emphasis [ref=e31]: minimum viable theory
        - text: of Density Functional Theory — enough to read a modern DFT paper, set up a calculation, and know which approximations you are making and why they might be wrong.
      - heading "How to read this chapter" [level=2] [ref=e32]
      - paragraph [ref=e33]:
        - text: Chapter 00 is the
        - strong [ref=e34]: only meta chapter
        - text: in the collection. Every later chapter (01, 02, …) is about DFT; this one is about the
        - emphasis [ref=e35]: document you are reading
        - text: . If you are in a hurry to get to equations, you can read the
        - emphasis [ref=e36]: Notation
        - text: and
        - emphasis [ref=e37]: What is not in scope
        - text: sections and skip straight to
        - link "chapter 01" [ref=e38] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-01/
        - text: . If you are reading the notes for the first time and want to know what you are getting into, read this chapter linearly.
      - heading "The document is uniform on purpose" [level=3] [ref=e39]
      - paragraph [ref=e40]:
        - text: Every content chapter (chapter 01 onward) is built from the
        - strong [ref=e41]: same seven-part template
        - text: (see
        - emphasis [ref=e42]: The chapter structure template
        - text: "below). That uniformity is the whole point of writing a fixed template: once you have read one chapter, you know the shape of every chapter, and you can navigate directly to the part that interests you. The template is enforced by"
        - link "agent:qa-reviewer" [ref=e43] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/agents/#the-chapter-rigor-checklist
          - code [ref=e44]: agent:qa-reviewer
        - text: and recorded in
        - link "agents.md" [ref=e45] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/agents/
          - code [ref=e46]: agents.md
        - text: .
      - heading "How to read a chapter" [level=3] [ref=e47]
      - paragraph [ref=e48]: There are three reasonable patterns. Pick whichever fits your goal.
      - list [ref=e49]:
        - listitem [ref=e50]:
          - strong [ref=e51]: Linear, first pass.
          - text: Read claim → derivation → diagram → worked example → problems, in order. This is the right way to learn a chapter the first time. Expect ~30–90 minutes per chapter depending on your background.
        - listitem [ref=e52]:
          - strong [ref=e53]: Reference, second pass.
          - text: Jump to the
          - emphasis [ref=e54]: claim
          - text: (always equation 1 of the chapter) to recall the headline result. Then read the
          - emphasis [ref=e55]: What we left out
          - text: section to see what the chapter is silent on. Use this when you come back to a chapter months later and need a one-paragraph refresher.
        - listitem [ref=e56]:
          - strong [ref=e57]: Problem-driven.
          - text: Skim the
          - emphasis [ref=e58]: Problems
          - text: section first. Each problem is calibrated to require material from a particular part of the chapter; if the problem makes no sense to you, that is a signal to go read the part of the chapter it references. This is the right way to use the notes to
          - emphasis [ref=e59]: self-test
          - text: .
      - blockquote [ref=e60]:
        - paragraph [ref=e61]:
          - strong [ref=e62]: Tip.
          - text: If you’re reading on a phone, the code blocks are horizontal-scrollable. If you’re reading on the e-reader surface (see the
          - link "design spec" [ref=e63] [cursor=pointer]:
            - /url: /DFT-notes/design.md
          - text: ), use the font slider if the math is too small. Every Mermaid diagram is rendered client-side; if it does not appear, open the browser console and look for a CDN error.
      - heading "The “no step skipped” promise" [level=3] [ref=e64]
      - paragraph [ref=e65]:
        - text: "The author has been emphatic:"
        - emphasis [ref=e66]: no calculation will be omitted, nothing should be kept like “do as I exercise” or “from here on”
        - text: . Every algebraic step in every chapter appears in the chapter. If a step is purely mechanical (expand, distribute, collect) it is labelled as such in one line, but the result is still written out. This is the only reliable way to be sure the math is correct, and it is the only reliable way for a reader to
        - emphasis [ref=e67]: check
        - text: the math is correct. If you ever find a derivation in these notes that skips a step in violation of this rule, please open an issue.
      - heading "Cross-references" [level=3] [ref=e68]
      - paragraph [ref=e69]: "Chapters cross-reference each other with two distinct signals:"
      - list [ref=e70]:
        - listitem [ref=e71]:
          - text: A plain Markdown link
          - code [ref=e72]: "[Chapter 01](/DFT-notes/dft-notes/chapter-01/)"
          - text: — used for
          - emphasis [ref=e73]: prerequisite
          - text: material that the reader is expected to have already read.
        - listitem [ref=e74]:
          - text: A forward link
          - code [ref=e75]: "[chapter 04](/DFT-notes/dft-notes/chapter-04/)"
          - text: — used to flag material that
          - emphasis [ref=e76]: will be developed later
          - text: but is needed in the current chapter for context.
      - paragraph [ref=e77]:
        - text: In both cases, the link is to a
        - emphasis [ref=e78]: chapter
        - text: ", never to a section within a chapter. This is so the dependency graph stays legible (see"
        - emphasis [ref=e79]: Roadmap
        - text: below). If a section-level link seems essential, that is usually a sign the chapter should be split.
      - heading "The “catch” is woven through" [level=3] [ref=e80]
      - paragraph [ref=e81]:
        - text: The chapter template has explicit “diagram”, “worked example”, “problems”, and “What we left out” sections. None of them is labelled “catch”. But the spirit of the catch —
        - emphasis [ref=e82]: what does this formula not tell you, and where does it break?
        - text: — is woven into
        - emphasis [ref=e83]: every
        - text: "part of the template:"
      - list [ref=e84]:
        - listitem [ref=e85]:
          - text: the derivation has
          - strong [ref=e86]: Tip
          - text: ","
          - strong [ref=e87]: Note
          - text: ", and"
          - strong [ref=e88]: Warning
          - text: callouts that flag common pitfalls;
        - listitem [ref=e89]:
          - text: the worked example deliberately picks parameter values that
          - emphasis [ref=e90]: exercise
          - text: a known failure mode (small basis, large grid spacing, hard XC functional);
        - listitem [ref=e91]: the “What we left out” section is the catch, made explicit.
      - paragraph [ref=e92]: When you read a chapter, do not skip the callouts. They are where the lived experience of the topic lives.
      - heading "Mathematical prerequisites" [level=2] [ref=e93]
      - paragraph [ref=e94]:
        - text: DFT, at the level of these notes, draws on roughly
        - strong [ref=e95]: five mathematical subjects
        - text: at the undergraduate / first-year-graduate level. Below, each is broken into the
        - emphasis [ref=e96]: specific
        - text: pieces the notes will use, with a one-sentence statement of what the reader should be able to do with each piece. Nothing in the list is exotic; everything is taught in standard curricula and is re-stated as it is used.
      - heading "Linear algebra (used throughout)" [level=3] [ref=e97]
      - list [ref=e98]:
        - listitem [ref=e99]:
          - strong [ref=e100]: Vector spaces and inner products.
          - text: You should be comfortable with the inner product
          - img [ref=e102]
          - text: in
          - img [ref=e135]
          - text: and its extension
          - img [ref=e145]
          - text: for functions. Every chapter uses inner products.
        - listitem [ref=e176]:
          - strong [ref=e177]: Eigendecomposition.
          - text: Given a Hermitian matrix
          - img [ref=e179]
          - text: ", you should be able to factor it as"
          - img [ref=e186]
          - text: with
          - img [ref=e206]
          - text: unitary and
          - img [ref=e213]
          - text: real diagonal. This is the
          - emphasis [ref=e218]: only
          - text: diagonalisation the notes use as a primitive. Singular-value decomposition is used once or twice in chapter 06 (density fitting) but is not assumed.
        - listitem [ref=e219]:
          - strong [ref=e220]: The spectral theorem.
          - text: Hermitian operators have real eigenvalues and a complete orthonormal set of eigenvectors. The notes use this in chapter 03 (Hartree–Fock) and chapter 04 (Kohn–Sham) to argue that the Fock and Kohn–Sham operators can be diagonalised.
        - listitem [ref=e221]:
          - strong [ref=e222]: Bra-ket notation.
          - text: You should be able to read
          - img [ref=e224]
          - text: as “the matrix element of
          - img [ref=e252]
          - text: between basis functions
          - img [ref=e262]
          - text: and
          - img [ref=e268]
          - text: "”. We use bra-ket throughout. The only operations we ever perform on a bra or a ket are: take the inner product, insert a resolution of the identity"
          - img [ref=e274]
          - text: ", and act with an operator from the left or the right."
      - heading "Calculus of several variables (used throughout)" [level=3] [ref=e305]
      - list [ref=e306]:
        - listitem [ref=e307]:
          - strong [ref=e308]: Partial derivatives and the chain rule.
          - text: Used in chapter 04 to derive the Kohn–Sham potential by differentiating the exchange–correlation energy with respect to the density.
        - listitem [ref=e309]:
          - strong [ref=e310]: Gradient, divergence, Laplacian.
          - text: Used in the kinetic operator
          - img [ref=e312]
          - text: ", in the gradient correction to GGA functionals (chapter 05), and in the stress tensor (chapter 09)."
        - listitem [ref=e329]:
          - strong [ref=e330]: Line, surface, and volume integrals.
          - text: Used to define the electron number, the dipole moment, and the total energy.
        - listitem [ref=e331]:
          - strong [ref=e332]: Green’s theorem / the divergence theorem.
          - text: Used once, in chapter 07, to relate the gradient of a Bloch function to its surface integral over a unit cell.
      - heading "Probability and statistics (used in chapters 03, 04, 05, 09)" [level=3] [ref=e333]
      - list [ref=e334]:
        - listitem [ref=e335]:
          - strong [ref=e336]: Expectation values.
          - text: The notes use the quantum-mechanical definition
          - img [ref=e338]
          - text: . You should also be able to translate this to a classical average
          - img [ref=e372]
          - text: when
          - img [ref=e398]
          - text: is replaced by a function of position.
        - listitem [ref=e407]:
          - strong [ref=e408]: Joint and marginal distributions.
          - text: Used in chapter 05 (one-electron reduced density matrices) and chapter 09 (Boltzmann sampling in finite-temperature DFT, briefly).
        - listitem [ref=e409]:
          - strong [ref=e410]: Independent and identically distributed samples.
          - text: Not heavily used, but appears in the discussion of stochastic errors in Monte Carlo and in sampling the Brillouin zone.
      - heading "Complex analysis (used in chapter 11, on response functions)" [level=3] [ref=e411]
      - list [ref=e412]:
        - listitem [ref=e413]:
          - strong [ref=e414]: Analytic continuation.
          - text: The density–density response function
          - img [ref=e416]
          - text: is a meromorphic function of complex frequency
          - img [ref=e441]
          - text: with poles at the excitation energies. You should know what “meromorphic” means and why the location of the poles is physical.
        - listitem [ref=e446]:
          - strong [ref=e447]: Cauchy’s residue theorem.
          - text: Used to derive the fluctuation–dissipation theorem from the spectral representation of
          - img [ref=e449]
          - text: .
        - listitem [ref=e454]:
          - strong [ref=e455]: Contour integration.
          - text: Used in chapter 11 to evaluate frequency integrals on a contour that avoids the real axis.
          - emphasis [ref=e456]: If you are not continuing past chapter 10, you can skip this.
      - heading "Special functions (used in chapters 01, 05, 06)" [level=3] [ref=e457]
      - list [ref=e458]:
        - listitem [ref=e459]:
          - strong [ref=e460]:
            - text: Spherical harmonics
            - img [ref=e462]
            - text: .
          - text: Used in chapter 01 (angular part of the hydrogen atom) and in chapter 06 (atom-centred basis functions with
          - img [ref=e483]
          - text: ).
        - listitem [ref=e492]:
          - strong [ref=e493]:
            - text: Hermite polynomials
            - img [ref=e495]
            - text: .
          - text: Used in the analytical Gaussian integrals of chapter 06.
        - listitem [ref=e509]:
          - strong [ref=e510]:
            - text: Laguerre polynomials
            - img [ref=e512]
            - text: .
          - text: Used in the radial part of the hydrogen atom and in the STO radial functions.
        - listitem [ref=e526]:
          - strong [ref=e527]:
            - text: The error function
            - img [ref=e529]
            - text: and the Boys function
            - img [ref=e543]
            - text: .
          - text: Both appear in chapter 06 in the closed-form expressions for the two-electron integrals.
      - blockquote [ref=e557]:
        - paragraph [ref=e558]:
          - strong [ref=e559]: Where to look up what you forgot.
          - text: The classic reference is Abramowitz and Stegun,
          - emphasis [ref=e560]: Handbook of Mathematical Functions
          - text: (1964), still in print as the
          - emphasis [ref=e561]: NIST Digital Library of Mathematical Functions
          - text: (
          - code [ref=e562]: dlmf.nist.gov
          - text: ). For complex analysis, Ahlfors,
          - emphasis [ref=e563]: Complex Analysis
          - text: (any edition), is the standard.
      - heading "Quantum mechanics, undergraduate level" [level=3] [ref=e564]
      - list [ref=e565]:
        - listitem [ref=e566]:
          - strong [ref=e567]: The postulates.
          - text: State vectors, observables, measurement outcomes, the Schrödinger equation, the Born rule. If you have never seen the Schrödinger equation before,
          - strong [ref=e568]:
            - text: start with
            - link "chapter 01" [ref=e569] [cursor=pointer]:
              - /url: /DFT-notes/dft-notes/chapter-01/
          - text: ", which lays the postulates out one by one before any DFT-specific material is introduced."
        - listitem [ref=e570]:
          - strong [ref=e571]: The harmonic oscillator.
          - text: Used as a sanity check in chapter 01 and in the example of the Hückel model in chapter 02.
        - listitem [ref=e572]:
          - strong [ref=e573]: The hydrogen atom.
          - text: The exact solution is the only closed-form reference point in DFT. You should know the energy levels
          - img [ref=e575]
          - text: and the form of the 1s, 2s, 2p orbitals. The 1s density is plotted by the
          - emphasis [ref=e608]: hello world
          - text: program in the next section.
