        - emphasis [ref=e948]: what level of detail to expect
        - text: ", and"
        - emphasis [ref=e949]: what the reader should take away
        - text: .
      - heading "1. The claim" [level=3] [ref=e950]
      - paragraph [ref=e951]:
        - text: The chapter opens with
        - strong [ref=e952]: the headline result
        - text: — the one equation the reader should remember a year from now. It is always a
        - emphasis [ref=e953]: numbered
        - text: equation (
        - code [ref=e954]: "\\begin{equation} ... \\label{eq:ch-NN-headline} ...\\end{equation}"
        - text: ), and the body of the chapter cross-references it with
        - code [ref=e955]: "\\eqref{eq:ch-NN-headline}"
        - text: . In chapter 06 the claim is the Roothaan–Hall equation
        - img [ref=e957]
        - text: ; in chapter 04 it is the Kohn–Sham eigenvalue equation. The claim is the
        - emphasis [ref=e976]: destination
        - text: of the derivation; everything in the chapter is in service of it.
      - paragraph [ref=e977]:
        - strong [ref=e978]: What to expect.
        - text: One to four numbered equations, stated without proof, followed by a one-paragraph statement of
        - emphasis [ref=e979]: what it means
        - text: and
        - emphasis [ref=e980]: why it matters
        - text: . No algebra here.
      - paragraph [ref=e981]:
        - strong [ref=e982]: What to take away.
        - text: The reader should be able to write down the claim from memory after closing the chapter.
      - heading "2. The derivation" [level=3] [ref=e983]
      - paragraph [ref=e984]:
        - text: The body of the chapter. The derivation takes the claim apart into the smaller facts it is built on, and shows —
        - strong [ref=e985]: step by step
        - text: ", with every algebraic step explicit — how those smaller facts combine to give the claim. The author is bound by the “no step skipped” rule: no “by a straightforward manipulation”, no “after some algebra”, no “it can be shown that”. If a step is purely mechanical (expand, distribute, collect), the chapter says so in one line, but it writes the result."
      - paragraph [ref=e986]:
        - strong [ref=e987]: What to expect.
        - text: Numbered sub-sections (e.g. “6.2 Why we need a basis”), each with its own numbered equations. Cross-references to equations in
        - emphasis [ref=e988]: other
        - text: chapters by chapter link, cross-references to equations in
        - emphasis [ref=e989]: this
        - text: chapter by
        - code [ref=e990]: "\\eqref{}"
        - text: . Inline
        - strong [ref=e991]: Tip
        - text: ","
        - strong [ref=e992]: Note
        - text: ", and"
        - strong [ref=e993]: Warning
        - text: callouts flag common pitfalls and limits of the derivation.
      - paragraph [ref=e994]:
        - strong [ref=e995]: What to take away.
        - text: The reader should be able to redo the derivation on a blank page, in the same order, with the same intermediate steps. This is the test of whether the chapter has done its job.
      - heading "3. The code" [level=3] [ref=e996]
      - paragraph [ref=e997]:
        - text: A runnable Python snippet that
        - strong [ref=e998]: produces the result of the chapter
        - text: (or a piece of it). The snippet is
        - emphasis [ref=e999]: not
        - text: written ad hoc; it is copied from a file in
        - code [ref=e1000]: dft_notes/python_codes/chapter_NN/
        - text: ", with the chapter-relative path of the original file in the comment header. The convention is two-digit prefix, dash, kebab-case slug,"
        - code [ref=e1001]: .py
        - text: . The companion script is run by
        - code [ref=e1002]: agent:code-runner
        - text: to produce the PNG; the PNG is committed under
        - code [ref=e1003]: plots/
        - text: .
      - paragraph [ref=e1004]:
        - strong [ref=e1005]: What to expect.
        - text: A real Python program, ~10–50 lines, that imports only
        - code [ref=e1006]: numpy
        - text: ","
        - code [ref=e1007]: scipy
        - text: ", and"
        - code [ref=e1008]: matplotlib
        - text: (with
        - code [ref=e1009]: matplotlib.use("Agg")
        - text: "). No display is required. The snippet is self-contained: copy it into a file, run it, get a PNG."
      - paragraph [ref=e1010]:
        - strong [ref=e1011]: What to take away.
        - text: The reader should be able to read the snippet and predict the output before running it, and should be able to modify it (change basis, change grid, change functional) and have the change take effect without restructuring the script.
      - heading "4. The diagram" [level=3] [ref=e1012]
      - paragraph [ref=e1013]:
        - text: A Mermaid diagram that
        - strong [ref=e1014]: summarises the chapter’s structure
        - text: ". Typical choices: a flowchart of the algorithm, a state diagram of the iteration, a class diagram of the objects. The diagram is rendered client-side (CDN-loaded Mermaid), so it requires JavaScript to appear. The diagram is"
        - emphasis [ref=e1015]: not
        - text: a substitute for prose; it is a visual index into the chapter.
      - paragraph [ref=e1016]:
        - strong [ref=e1017]: What to expect.
        - text: One to three Mermaid blocks, each with a
        - code [ref=e1018]: "%%{init: ...}%%"
        - text: directive for layout hints. A short caption explaining what the diagram is and what the reader should take from it. Cross-references back to the prose sections the diagram summarises.
      - paragraph [ref=e1019]:
        - strong [ref=e1020]: What to take away.
        - text: The reader should be able to draw the diagram from memory after closing the chapter, and should be able to point to each box and say what chapter section it corresponds to.
      - heading "5. Worked example" [level=3] [ref=e1021]
      - paragraph [ref=e1022]:
        - text: A
        - strong [ref=e1023]: fully worked numerical example
        - text: that takes the chapter’s general result and applies it to a
        - emphasis [ref=e1024]: specific
        - text: system with
        - emphasis [ref=e1025]: specific
        - text: numbers. Every quantity has a numerical value; every intermediate result is shown; the final answer is stated. The example should be small enough to verify by hand (in principle) and large enough to exercise the typical failure modes of the method.
      - paragraph [ref=e1026]:
        - strong [ref=e1027]: What to expect.
        - text: The full numerical trace, often as a
        - code [ref=e1028]: text
        - text: code block. A reference back to the code snippet (section 3) that produced the plot. The plot itself, included as a Markdown image tag pointing to
        - code [ref=e1029]: dft_notes/python_codes/chapter_NN/plots/NN-slug.png
        - text: .
      - paragraph [ref=e1030]:
        - strong [ref=e1031]: What to take away.
        - text: The reader should be able to
        - emphasis [ref=e1032]: reproduce
        - text: the numbers — and should be encouraged to do so, by running the companion script.
      - heading "6. Problems" [level=3] [ref=e1033]
      - paragraph [ref=e1034]:
        - text: Three problems per chapter,
        - strong [ref=e1035]: ranging easy → hard
        - text: ", each followed by a fully worked solution. Problems use"
        - code [ref=e1036]: <details class="problem">
        - text: for the question and
        - code [ref=e1037]: <details class="answer">
        - text: for the answer, so the reader can think first and reveal later. Easy problems test recall of the chapter’s claim. Medium problems test application of the derivation to a new but related system. Hard problems test synthesis across multiple parts of the chapter (or across multiple chapters).
      - paragraph [ref=e1038]:
        - strong [ref=e1039]: What to expect.
        - text: Three to five problems per chapter. Solutions are written in the same step-by-step style as the derivation, and they end with a boxed final answer.
      - paragraph [ref=e1040]:
        - strong [ref=e1041]: What to take away.
        - text: The reader who can solve all three problems unaided has genuinely understood the chapter.
      - heading "7. What we left out" [level=3] [ref=e1042]
