      - heading "Problems" [level=2] [ref=e2758]
      - paragraph [ref=e2759]:
        - text: The problems in this chapter are
        - emphasis [ref=e2760]: meta
        - text: ": they ask you to use the template, the notation, and the roadmap to navigate the rest of the notes, rather than to do new DFT calculations. In later chapters the problems are DFT problems proper."
      - group [ref=e2761]:
        - generic "▸ Problem 1 (easy) — Locate the claim" [ref=e2762] [cursor=pointer]
        - text: "Open [chapter 06](/DFT-notes/dft-notes/chapter-06/) and look at section 6.1. Write down: 1. the *label* of the first numbered equation (the \"headline\" of chapter 06); 2. the *symbol* of the second numbered equation in section 6.1 (the explicit form of and ); 3. one sentence saying *what physical claim* the chapter is making. Do not skip ahead; the answer is all in section 6.1."
      - group [ref=e2763]:
        - generic "▸ Show answer" [ref=e2764] [cursor=pointer]
        - text: "1. The first numbered equation in section 6.1 is the basis-set expansion of the orbital, with label `eq:ch-06-basis-expansion`: The *headline* of the chapter (the equation that is the destination of the derivation) is the next one, with label `eq:ch-06-roothaan-hall`: 2. The explicit forms are in `eq:ch-06-fock-overlap`: 3. The claim is: *the Fock eigenvalue equation in a finite, non-orthogonal basis is a generalised matrix eigenproblem, with the Fock matrix on the left, the overlap matrix on the right, and the MO coefficients as eigenvectors.* This exercise reinforces the discipline of always reading the *labels* of equations, not just their visual form. Cross- references in later chapters use the labels, so the labels are how you navigate the notes."
      - group [ref=e2765]:
        - generic "▸ Problem 2 (easy) — Translate the symbols" [ref=e2766] [cursor=pointer]
        - text: For each of the following expressions, write a one-sentence "translation" into words. Use only the notation table in this chapter; do not look ahead. 1. 2. 3. (real orbitals, closed shell) 4.
      - group [ref=e2767]:
        - generic "▸ Show answer" [ref=e2768] [cursor=pointer]
        - text: "1. The matrix element of the Fock operator between basis functions and . In a basis-set code this is computed as an integral over of . 2. The electron density at point in a closed-shell system, summing the squared modulus of each doubly-occupied spatial orbital. The factor of 2 accounts for spin pairing. 3. The density matrix in the AO basis is twice the outer product of the occupied MO coefficient matrix with its Hermitian conjugate. (This identity is exact only for real orbitals in a closed shell with even; in general with diagonal in the occupation numbers.) 4. The Kohn–Sham total energy as a functional of the density: the non-interacting kinetic energy, the electron–external- potential interaction, the classical Hartree (Coulomb) energy, and the exchange–correlation energy. (Note that is *not* the true kinetic energy of the interacting system; the difference is absorbed into .)"
      - group [ref=e2769]:
        - generic "▸ Problem 3 (medium) — Hand-diagonalise a 2×2 matrix" [ref=e2770] [cursor=pointer]
        - text: This is a self-test of the linear-algebra prerequisite. Diagonalise the matrix 1. Write out the characteristic polynomial and find its roots. 2. For each eigenvalue, find an eigenvector (any normalisation is fine; you may use unnormalised vectors and normalise at the end). 3. Verify that the two eigenvectors are orthogonal. Verify that the matrix is Hermitian and that the eigenvalues are real. You should be able to do this with pen and paper in under five minutes. If you cannot, revisit the *Linear algebra* bullet in *Mathematical prerequisites* above.
      - group [ref=e2771]:
        - generic "▸ Show answer" [ref=e2772] [cursor=pointer]
        - text: "**Step 1.** The characteristic polynomial is Setting it to zero: , so , giving the two roots **Step 2.** For , the eigenvector satisfies , i.e. Take . After normalisation, . For , the eigenvector satisfies , i.e. Take , normalised to . **Step 3.** Inner product: . ✓ Hermitian: (real symmetric), so is Hermitian. ✓ Eigenvalues are and , both real. ✓ The spectral decomposition is"
      - group [ref=e2773]:
        - generic "▸ Problem 4 (medium) — Hello world, in numpy" [ref=e2774] [cursor=pointer]
        - text: "Write a short Python program (no more than 15 lines, not counting comments) that: 1. Constructs the matrix from [Problem 3](#problem-3-medium--hand-diagonalise-a-2x2-matrix) as a `numpy.ndarray`. 2. Calls `numpy.linalg.eigh` to compute its eigenvalues and eigenvectors. 3. Prints the eigenvalues, the eigenvector matrix , and verifies that is diagonal and that to within `1e-12`. You may use the `hello world` script in *Programming prerequisites* as a model for the file layout. You do not need to produce a plot."
      - group [ref=e2775]:
        - generic "▸ Show answer" [ref=e2776] [cursor=pointer]
        - text: "```python import numpy as np A = np.array([[2.0, 1.0], [1.0, 2.0]]) evals, U = np.linalg.eigh(A) print(\"eigenvalues:\", evals) # [1. 3.] Adiag = U.conj().T @ A @ U print(\"U^dag A U =\", Adiag) print(\"U^dag U - I =\", U.conj().T @ U - np.eye(2)) assert np.allclose(Adiag, np.diag(evals)) assert np.allclose(U.conj().T @ U, np.eye(2)) ``` The output is ```text eigenvalues: [1. 3.] U^dag A U = [[1. 0.] [0. 3.]] U^dag U - I = [[0. 0.] [0. 0.]] ``` which confirms the hand calculation of Problem 3 and the spectral theorem itself: a real symmetric matrix is diagonalised by an orthogonal matrix to a real diagonal matrix. A production DFT code does the same thing, only with and the diagonaliser being (chapter 06, `eq:ch-06-roothaan-hall`)."
      - group [ref=e2777]:
        - generic "▸ Problem 5 (hard) — Reading list for molecular DFT" [ref=e2778] [cursor=pointer]
        - text: "Suppose your research is *molecular* DFT: you have a desktop computer, a chemistry background, and no interest in solids, phonons, or pseudopotentials. You want to read the *minimum* number of chapters needed to set up a calculation with the 6-31G basis and the B3LYP functional on, say, an organic molecule. 1. From the chapter dependency graph in *Roadmap*, identify the minimum set of chapters you must read, in order. 2. Justify your choice: for each chapter you include, state *which piece of the calculation* it is needed for. 3. For each chapter you exclude, state *why* it is not on your critical path."
      - group [ref=e2779]:
        - generic "▸ Show answer" [ref=e2780] [cursor=pointer]
        - text: "**The minimum set, in order:** 1. **Chapter 01 — Schrödinger and postulates.** You need the Born rule and the variational principle to understand what the calculation is *doing*. 2. **Chapter 02 — The many-body problem.** You need to see *why* the exact Schrödinger equation for a molecule is unsolvable, so that the Kohn–Sham shortcut makes sense. 3. **Chapter 04 — Kohn–Sham.** This is the DFT core. Skipping chapter 03 (Hartree–Fock) is fine if you are not interested in the wavefunction-based lineage. 4. **Chapter 05 — XC functionals.** You need this to choose B3LYP (or any other functional) and to understand what the choice *means*. 5. **Chapter 06 — Basis sets.** You need this to choose 6-31G and to understand the Roothaan–Hall machinery that the code runs under the hood. **Chapters deliberately excluded:** - **Chapter 03 (Hartree–Fock).** Not strictly needed if you are happy to take the Kohn–Sham equations as a starting point. The chapters are written so this is a legitimate path. (You will, however, miss the historical and conceptual bridge from postulates to Kohn–Sham.) - **Chapter 07 (Solids & PBC).** You are computing a finite molecule, so Bloch's theorem and Brillouin zones are not needed. You will use a *molecular* code (Gaussian, ORCA, Q-Chem) that does not invoke them. - **Chapter 08 (Pseudopotentials).** These are for plane-wave calculations on heavy elements; the 6-31G basis on a first-row organic molecule uses *all-electron* primitives on C, N, O, H. (For transition-metal organometallics, this exclusion is wrong — you would need to add chapter 08.) - **Chapter 09 (Forces & geometry opt).** Strictly, you do *not* need this to run a single-point energy. But you do need it to optimise a geometry, which is the typical workflow. In practice, include it. - **Chapter 10 (Vibrations & phonons).** Phonons are for solids; you do not need them. Molecular vibrations (IR/Raman spectra) are a separate topic, sketched briefly in chapter 10 but not required for the typical workflow. **The subgraph of your reading.** The minimum graph is ```mermaid graph TD C00[Ch 00] --> C01[Ch 01] --> C02[Ch 02] --> C04[Ch 04] --> C05[Ch 05] --> C06[Ch 06] ``` a *linear* chain, which is why the notes are written so that the chapters can be read linearly even though the *full* graph has branches."
