          - strong [ref=e2720]: Relativistic DFT.
          - text: Spin-orbit coupling, the Dirac equation, four- component methods.
        - listitem [ref=e2721]:
          - strong [ref=e2722]: Strong correlation.
          - text: DFT+U, DMFT, multireference methods, quantum Monte Carlo.
        - listitem [ref=e2723]:
          - strong [ref=e2724]: Time-dependent DFT.
          - text: The Runge–Gross theorem, the linear-response regime, excitons.
        - listitem [ref=e2725]:
          - strong [ref=e2726]: Embedding.
