        - text: A
        - strong [ref=e1044]: honest, explicit list of the topics the chapter does not cover
        - text: . This is part of being honest about the scope. Two to five bullets is the norm. The list is written in the same tone as the rest of the chapter; it is not an apology, it is a hand-off to the next chapter or to a future note.
