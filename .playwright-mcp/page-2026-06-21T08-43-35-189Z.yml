        - emphasis [ref=e1047]: why
        - text: the topic is omitted. Cross-references forward to later chapters when the omitted topic is developed there.
      - paragraph [ref=e1048]:
        - strong [ref=e1049]: What to take away.
        - text: The reader should know, after reading this section, exactly what the chapter is silent on — and where to look if they need that material.
