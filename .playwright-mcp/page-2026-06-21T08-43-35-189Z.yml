      - code [ref=e865]: "# dft_notes/python_codes/chapter_00/01-hydrogen-1s.py import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt from pathlib import Path def hydrogen_1s_density(r, Z=1): \"\"\"Electron density of the hydrogen 1s orbital, |psi_1s(r)|^2.\"\"\" return (Z ** 3 / np.pi) * np.exp(-2.0 * Z * r) def main(): r = np.linspace(0.0, 20.0, 400) rho = hydrogen_1s_density(r, Z=1) fig, ax = plt.subplots(figsize=(6, 4)) ax.plot(r, rho, color=\"#0a4\", linewidth=2) ax.set_xlabel(\"r (a0)\") ax.set_ylabel(r\"$\\rho_{\\rm 1s}(r)$ (a0$^{-3}$)\") ax.set_title(\"Hydrogen 1s electron density\") out = Path(__file__).parent / \"plots\" / \"01-hydrogen-1s.png\" out.parent.mkdir(parents=True, exist_ok=True) fig.tight_layout() fig.savefig(out, dpi=120) print(f\"Wrote {out}\") if __name__ == \"__main__\": main()"
