      - heading "The chapter structure template" [level=2] [ref=e941]
      - paragraph [ref=e942]:
        - text: Every content chapter (chapters 01 and later) is built from the
        - strong [ref=e943]: same seven-part template
        - text: . The template is enforced by
        - link "agent:qa-reviewer" [ref=e944] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/agents/#the-chapter-rigor-checklist
          - code [ref=e945]: agent:qa-reviewer
        - text: and is reproduced verbatim from
        - code [ref=e946]: agents.md
        - text: ". Below, each part is described in plain language:"
        - emphasis [ref=e947]: what it is for
