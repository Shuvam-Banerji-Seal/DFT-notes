        - text: fermions it gives the
        - emphasis [ref=e6295]: exact
        - text: "ground state. The natural question is: how close is the"
        - emphasis [ref=e6296]: best
        - text: single determinant to the
        - emphasis [ref=e6297]: "true"
        - text: ground state of an
        - emphasis [ref=e6298]: interacting
        - text: system?
      - paragraph [ref=e6299]:
        - text: The answer is given by the
        - strong [ref=e6300]: Hartree–Fock
        - text: method of
        - link "chapter 03" [ref=e6301] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-03/
        - text: ": the restricted Hartree–Fock (RHF) energy is the minimum of"
        - img [ref=e6303]
        - text: over all
        - emphasis [ref=e6329]: single
        - text: Slater determinants
        - img [ref=e6331]
        - text: built from a chosen basis. The
        - strong [ref=e6336]: correlation energy
        - text: is the leftover,
      - paragraph [ref=e6337]:
        - img [ref=e6339]:
          - generic [ref=e6343]:
            - img [ref=e6344]
            - img [ref=e6375]
      - paragraph [ref=e6383]:
        - text: where
        - img [ref=e6385]
        - text: is the exact non-relativistic ground-state energy (in the same one-electron basis) and
        - img [ref=e6394]
        - text: is the RHF energy. By construction
        - img [ref=e6405]
        - text: — the exact wavefunction is always at least as low in energy as the best single determinant, because the determinant is one of the determinants in the FCI expansion
        - img [ref=e6422]:
          - link [ref=e6425] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-02-fci-explicit"
        - text: and the variational principle guarantees that adding more determinants can only lower the energy.
      - paragraph [ref=e6433]:
        - text: Equation
        - img [ref=e6435]:
          - link [ref=e6438] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-02-ecorr"
        - text: hides two effects, and it is worthwhile to disentangle them.
      - list [ref=e6446]:
        - listitem [ref=e6447]:
          - strong [ref=e6448]: Fermi correlation (exchange).
          - text: The Pauli exclusion principle already prevents same-spin electrons from being at the same point. A single Slater determinant
          - emphasis [ref=e6449]: captures
          - text: "this exactly: the"
          - img [ref=e6451]
          - text: term of the exchange sum
          - img [ref=e6461]
          - text: in
          - img [ref=e6481]:
            - link [ref=e6484] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-sc-diag"
          - text: is non-zero, and the corresponding energy is the
          - strong [ref=e6492]: exchange energy
          - img [ref=e6494]
          - text: of Hartree–Fock theory. Exchange is
          - emphasis [ref=e6502]: not
          - text: a correlation effect in the sense of
          - img [ref=e6504]:
            - link [ref=e6507] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-ecorr"
          - text: ; it is included in
          - img [ref=e6516]
          - text: .
        - listitem [ref=e6526]:
          - strong [ref=e6527]: Coulomb correlation.
          - text: The leftover is the
          - emphasis [ref=e6528]: truly
          - text: quantum effect that the exact wavefunction has
          - emphasis [ref=e6529]: more
          - text: "structure than a single determinant: opposite-spin electrons"
          - emphasis [ref=e6530]: also
          - text: avoid each other, even though Pauli does not require them to. The energy difference
          - img [ref=e6532]
          - text: is sometimes called the
          - strong [ref=e6558]: true correlation energy
          - text: ", and it is the"
          - emphasis [ref=e6559]: only
          - text: piece of correlation that a Hartree–Fock calculation misses.
      - paragraph [ref=e6560]:
        - text: For atoms and small molecules near equilibrium, the
        - emphasis [ref=e6561]: magnitude
        - text: of
        - img [ref=e6563]
        - text: "is small compared to the total energy: for water in a triple-zeta basis,"
        - img [ref=e6576]
        - text: and
        - img [ref=e6601]
        - text: ", i.e. about 0.4% of the total. But"
        - img [ref=e6627]
        - text: is the
        - emphasis [ref=e6639]: only
        - text: quantity that distinguishes different molecules’ bond energies reliably. A calculation that gets
        - img [ref=e6641]
        - text: to within 0.1% but misses the correlation energy entirely will
        - emphasis [ref=e6651]: not
        - text: predict reaction energies to within chemical accuracy (
        - img [ref=e6653]
        - text: ). This is the
        - emphasis [ref=e6691]: practical
        - text: motivation for the hierarchy of post-Hartree–Fock methods below.
      - blockquote [ref=e6692]:
        - paragraph [ref=e6693]:
          - strong [ref=e6694]: Note (the Coulson–Fischer point).
          - text: For molecular geometries
          - emphasis [ref=e6695]: far
          - text: from equilibrium — stretched bonds, near-dissociation limits, transition states for radical reactions — a single determinant can become
          - emphasis [ref=e6696]: qualitatively
          - text: wrong, not just slightly wrong. The Coulson–Fischer point is the geometry at which the restricted Hartree–Fock solution spontaneously breaks spin symmetry and becomes unstable to a different (lower) determinant. Beyond this point, RHF is
          - emphasis [ref=e6697]: qualitatively
          - text: "wrong: it predicts fractional bond orders, spurious ionic contributions, and the wrong dissociation limit. This is the regime of"
          - strong [ref=e6698]: strong (or static) correlation
          - text: ", and it is the regime in which the determinant basis of"
          - img [ref=e6700]:
            - link [ref=e6703] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-fci-explicit"
          - text: is needed at near-degenerate weights.
      - heading "2.2.8 The hierarchy of post-HF methods" [level=3] [ref=e6711]
