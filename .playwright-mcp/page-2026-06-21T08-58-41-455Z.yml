      - paragraph [ref=e7775]:
        - text: The numbers in the table are
        - emphasis [ref=e7776]: illustrative
        - text: (rounded, not from a real calculation), but the qualitative pattern is correct. CISD gives the same energy per fragment as CCSD, but it
        - emphasis [ref=e7777]: underestimates
        - text: "the energy of the dimer: it misses"
        - img [ref=e7779]
        - text: of correlation energy, which is exactly the
        - emphasis [ref=e7793]: disconnected
        - text: contribution of excitations on the two fragments acting in concert. The same
        - img [ref=e7795]
        - text: is
        - emphasis [ref=e7807]: also
        - text: the difference between “size consistent” and “size inconsistent” for two
        - img [ref=e7809]
        - text: "fragments. This is the practical reason CCSD has replaced CISD in essentially every production code: it has the same asymptotic cost and is size extensive, while CISD is not."
      - blockquote [ref=e7820]:
        - paragraph [ref=e7821]:
          - strong [ref=e7822]: Note (the linked diagram theorem).
          - text: The formal reason CCSD is size extensive is the
          - strong [ref=e7823]: linked diagram theorem
          - text: ": when the CC equations are derived in the language of many-body perturbation theory, only"
          - strong [ref=e7824]: connected
          - text: (linked) diagrams appear. Connected diagrams scale linearly with the number of particles, while disconnected diagrams scale as products of subsystem contributions. Truncated CI includes
          - emphasis [ref=e7825]: both
          - text: linked and unlinked diagrams; the unlinked pieces do not vanish in general, and they make the truncated CI miss the size-extensive part of the energy. The exponential Ansatz
          - img [ref=e7827]
          - text: of coupled-cluster theory is the
          - emphasis [ref=e7840]: only
          - text: non-trivial combination of excitations that automatically drops the unlinked diagrams, which is why the linked-diagram theorem makes CC methods size extensive and CI methods not.
      - heading "2.2.10 The road ahead" [level=3] [ref=e7841]
      - paragraph [ref=e7842]: "Three avenues of escape from the exponential wall are visible from where we stand:"
      - list [ref=e7843]:
        - listitem [ref=e7844]:
          - strong [ref=e7845]: Systematically improvable wavefunctions.
          - text: The MP / CI / CC hierarchy of section 2.2.8, the
          - strong [ref=e7846]: selected CI
          - text: family (CIPSI, ASCI, Heat-bath CI),
          - strong [ref=e7847]: quantum Monte Carlo
          - text: (VMC, DMC, FCIQMC, AFQMC), and
          - strong [ref=e7848]: tensor network
          - text: methods (DMRG, PEPS, MERA). Each has a regime where it works and a regime where it does not. These methods
          - emphasis [ref=e7849]: converge
          - text: to the full-CI answer in the limit of their respective control parameters (perturbation order, number of selected determinants, walker population, bond dimension), and the convergence is the proof that the method is doing
          - emphasis [ref=e7850]: exactly
          - text: the calculation it claims to.
        - listitem [ref=e7851]:
          - strong [ref=e7852]: Density-functional reformulation.
          - text: Throw out the wavefunction, reformulate the problem in terms of the one-electron density
          - img [ref=e7854]
          - text: of
          - img [ref=e7867]:
            - link [ref=e7870] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-1pdm"
          - text: ", and accept that the"
          - emphasis [ref=e7878]: exchange–correlation functional
          - text: is unknown. The basic variables of the theory now live in
          - img [ref=e7880]
          - text: ", which is independent of"
          - img [ref=e7890]
          - text: . This is the path that Kohn–Sham DFT takes, and it is the subject of
          - link "chapter 04" [ref=e7895] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: and
          - link "chapter 05" [ref=e7896] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: .
        - listitem [ref=e7897]:
          - strong [ref=e7898]: Avoid the problem entirely.
          - text: Pick a system that is
          - emphasis [ref=e7899]: not
          - text: strongly correlated, pick a property that is
          - emphasis [ref=e7900]: not
          - text: a small energy difference, and use a method that is known to be accurate for the regime. Tight-binding, semi-empirical methods, force fields, and machine-learning potentials are all of this kind; they work because they avoid the exponentially-hard problem rather than solving it.
      - paragraph [ref=e7901]:
        - text: The rest of these notes is almost entirely about option 2. We take a
        - emphasis [ref=e7902]: short
        - text: detour through Hartree–Fock first, because the HF orbitals and eigenvalues are the language in which Kohn–Sham DFT is written, and because the Fock operator is the cleanest example of a
        - strong [ref=e7903]: mean-field
        - text: theory.
      - heading "2.3 The code" [level=2] [ref=e7904]
      - paragraph [ref=e7905]:
        - text: The “many-body” character of the problem is hard to
        - emphasis [ref=e7906]: see
        - text: in a production code — the production code just diagonalises a huge matrix — but it is
        - emphasis [ref=e7907]: easy
        - text: to
        - emphasis [ref=e7908]: make
        - text: visible in a toy problem. We build a one-dimensional model of two electrons in a box of length
        - img [ref=e7910]
        - text: bohr, with a soft short-range repulsion between them, and solve the model in a tiny basis by hand. The script
        - link "dft_notes/python_codes/chapter_02/01-two-electron-box.py" [ref=e7919] [cursor=pointer]:
          - /url: /DFT-notes/dft_notes/python_codes/chapter_02/01-two-electron-box.py
          - code [ref=e7920]: dft_notes/python_codes/chapter_02/01-two-electron-box.py
        - text: does exactly this.
      - code [ref=e7924]: "# dft_notes/python_codes/chapter_02/01-two-electron-box.py \"\"\" Two electrons in a 1-D box with a soft short-range repulsion. A toy many-body problem solved by direct full CI in a sine basis. - One-electron basis: the first K sin(n pi x / L) functions on [0, L] with the particle-in-a-box Hamiltonian h_1. - Two-electron interaction: a soft Gaussian repulsion V(x1, x2) = lambda * exp(-(x1 - x2)^2 / sigma^2) with lambda = 1.0 Hartree, sigma = 0.5 bohr. - N_alpha = N_beta = 1, so N_det = K^2 (spin-adapted CI: K_orb singlet and triplet combinations). - Build the Slater-Condon matrix elements, diagonalise, plot the first few eigenvalues vs. K to show convergence. This is the smallest problem that has *all* the ingredients of a real many-body calculation: a one-electron basis, a two-electron integrals tensor, the Slater-Condon rules, and an exponential growth of the determinant count. \"\"\" import os import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt # --- Parameters --------------------------------------------------------- L = 4.0 # box length, bohr N_e = 2 # total electrons N_alpha = 1 N_beta = 1 LAMBDA = 1.0 # repulsion strength, Hartree SIGMA = 0.5 # repulsion range, bohr N_GRID = 400 # spatial grid for integrals # --- One-electron grid -------------------------------------------------- x = np.linspace(0.0, L, N_GRID) dx = x[1] - x[0] # --- One-electron basis: sine functions --------------------------------- def sin_basis(K, L, x): \"\"\"Return the K lowest sin(n pi x / L) functions on a grid.\"\"\" n = np.arange(1, K + 1)[:, None] return np.sqrt(2.0 / L) * np.sin(n * np.pi * x / L) # --- One-electron Hamiltonian matrix ----------------------------------- def one_electron_hamiltonian(K, L, x, dx): \"\"\"<chi_p | -1/2 d^2/dx^2 | chi_q> on a sine basis.\"\"\" chi = sin_basis(K, L, x) # (K, N_GRID) lap = (np.roll(chi, -1, axis=1) - 2.0 * chi + np.roll(chi, 1, axis=1)) / dx**2 lap[:, 0] = 0.0 lap[:, -1] = 0.0 return -0.5 * chi @ lap.T * dx # (K, K) # --- Two-electron integrals <pq|rs> ------------------------------------- def two_electron_integrals(K, L, x, dx, lam, sig): \"\"\" Return the four-index tensor <pq|rs> in physicists' notation, using a soft Gaussian repulsion V(x1, x2) = lam * exp(-(x1 - x2)^2 / sig^2). \"\"\" chi = sin_basis(K, L, x) # (K, N_GRID) g = np.exp(-(x[:, None] - x[None, :])**2 / sig**2) # (N_GRID, N_GRID) # (pq|rs) = sum_{x1 x2} chi_p(x1) chi_q(x1) V(x1,x2) chi_r(x2) chi_s(x2) dx1 dx2 V = lam * g * dx * dx chiV = chi @ V # (K, N_GRID, N_GRID) -> einsum return np.einsum(\"px,qx,rx,sx,pqrs->pqrs\", chi, chi, chi, chi, V) # actually do it step by step to keep the storage small"
