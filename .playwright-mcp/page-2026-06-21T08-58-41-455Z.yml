      - paragraph [ref=e5230]:
        - text: The numbers in the third and fourth rows of the table are what the phrase “
        - strong [ref=e5231]: exponential wall
        - text: ” refers to. No known algorithm defeats it in general. The
        - strong [ref=e5232]: orbital-optimised
        - text: approaches of modern quantum Monte Carlo (DMC, AFQMC, FCIQMC) and the
        - strong [ref=e5233]: selected CI
        - text: methods (CIPSI, ASCI, Heat-bath CI) attack the wall by
        - emphasis [ref=e5234]: sampling
        - text: the determinant space rather than enumerating it; the
        - strong [ref=e5235]: density matrix renormalisation group (DMRG)
        - text: and
        - strong [ref=e5236]: tensor network
        - text: methods attack it by
        - emphasis [ref=e5237]: factorising
        - text: the wavefunction into a product of small-tensor pieces. All of them work in regimes; none of them works in general. Density-functional theory, the subject of the rest of these notes,
        - emphasis [ref=e5238]: reformulates
        - text: the problem so that the exponential wall never appears — at the cost of introducing an unknown
        - strong [ref=e5239]: exchange–correlation functional
        - text: .
