      - heading "2.6 Problems" [level=2] [ref=e12017]
      - group [ref=e12018]:
        - generic "▸ Problem 1 (easy) — Antisymmetry of the Slater determinant for He" [ref=e12019] [cursor=pointer]
        - text: Write down the two-electron Slater determinant for the helium atom in a minimal basis, with both electrons in the same spatial orbital and opposite spins (one , one ). Show explicitly that the wavefunction is antisymmetric under exchange of the two combined coordinates , and that it vanishes when the two electrons have the same spin and the same spatial orbital. Then compute the spin-summed one-particle density of this state, and show that it is normalised to .
      - group [ref=e12020]:
        - generic "▸ Show answer" [ref=e12021] [cursor=pointer]
        - text: "The Slater determinant for the He atom's ground state is Expanding the determinant, **Antisymmetry.** Exchange . The spatial part is symmetric in the exchange (the two factors are identical), and the spin part is antisymmetric (it is the spin singlet, which flips sign under exchange of the *spin* labels). The product is therefore antisymmetric in , which is the content of postulate P6. **Vanishing for same spin and same orbital.** Suppose both electrons are and both in : because the two columns are *identical* and the determinant of a matrix with two equal columns is zero. This is the Pauli exclusion principle: two electrons with the same spin cannot occupy the same spatial orbital. **Spin-summed density.** From (or directly from the wavefunction above, summing over ): The factor 2 is the *spin* factor: both the and the sectors contribute the same . Normalisation: The last equality uses the normalisation of the spatial orbital."
      - group [ref=e12022]:
        - generic "▸ Problem 2 (medium) — Slater–Condon rules for a 2-electron system" [ref=e12023] [cursor=pointer]
        - text: For a 2-electron system with one-electron integrals and two-electron integrals (no other distinct integrals, by the symmetry of real orbitals in 2 electrons), show by direct evaluation of the 2 × 2 Slater determinants that the Slater–Condon rules and give exactly the matrix elements of the 2 × 2 CI problem. Concretely, take the basis for a closed-shell 2-electron system with spatial orbitals. Show that (a) the diagonal element ; (b) the off-diagonal element .
      - group [ref=e12024]:
        - generic "▸ Show answer" [ref=e12025] [cursor=pointer]
        - text: "**Part (a).** The wavefunction , normalised. Apply to , written as a sum of one- and two-electron operators: Project onto and integrate: - ** :** by the spin orthogonality , . The electron-1 factor is on both sides, so the spin integral is 1, and the spatial integral is . - ** :** by the same argument with electron 2. - ** :** involves the two-electron operator . The spin factors are still , and the spatial integral is exactly as defined in . Adding, This is the Slater–Condon rule for the 2-electron case, with the exchange term cancelling against the 1/2 in front of the double sum (because the only pair is , so the 1/2 is irrelevant for a single-pair diagonal). **Part (b).** The two determinants differ by *two* spin-orbitals ( has , has ), so the only non-zero contribution to comes from the two-electron operator — the one-electron operator would need in the spatial sector, but the spin part of is and that of is too, so the spin integral is still 1, but the spatial integral is , *not* the 1-electron integral . However, the antisymmetrisation in the determinant gives a *plus* sign for and a *minus* sign for in the same-row interchange, so the two terms cancel exactly. This is a 2-electron version of the fact that the matrix element of a 1-electron operator between two determinants that differ in two spin-orbitals vanishes. The two-electron piece: Spin part: . Spatial part: the Slater–Condon rule for two-electron systems gives However, the *antisymmetrised* matrix element picks up an *exchange* correction because the determinant structure reverses the sign of the two rows in a way that is sensitive to the identity of the orbitals. Concretely, expanding the determinants and projecting, For real orbitals, , so the result is the *exchange-corrected* Coulomb integral For a 2-electron 2-orbital problem with real orbitals, the exchange term is the only correction to the bare Coulomb integral. This is the result we used in ."
      - group [ref=e12026]:
        - generic "▸ Problem 3 (hard) — Correlation energy of H₂ in a minimal basis" [ref=e12027] [cursor=pointer]
        - text: "The full-CI ground-state energy of in a STO-3G minimal basis at is (equation ). The restricted Hartree–Fock ground-state energy in the same basis is ([chapter 06](/DFT-notes/dft-notes/chapter-06/), §6.9). Carry out the following calculation, step by step, *by hand* (with a calculator — no computer): 1. Compute the correlation energy . 2. Express in **eV** and in **kcal/mol** (using ). 3. The **Hund–Mulliken** wavefunction of is , where and . Show that the *energy expectation value* of in this state is the lower eigenvalue of the closed-shell block. Explain in one sentence why this is the case. 4. Compare the Hund–Mulliken energy to the full-CI energy . Are they equal? If not, identify which determinant is missing from the Hund–Mulliken Ansatz, and argue *qualitatively* whether the missing determinant would raise or lower the energy if it were added."
      - group [ref=e12028]:
        - generic "▸ Show answer" [ref=e12029] [cursor=pointer]
        - text: "**Part 1.** From , **Part 2.** Using the conversions, For a *minimal basis* on , this is a *huge* correlation energy — about 9% of the total HF energy. The reason is the basis: a STO-3G basis cannot represent the electron–electron cusp in the wavefunction, so the missing correlation is dominated by this basis-set artefact, not by physical dynamical correlation. In a triple-zeta basis with correlating polarisation functions, the *physical* correlation energy is ~0.3 eV, more than an order of magnitude smaller. **Part 3.** The state is the *lowest eigenvector* of the closed-shell block of , by construction. The energy expectation value of in this state is the lower eigenvalue of the block, which is . Adding gives the total energy , *exactly* equal to the full-CI ground-state energy of . The reason is that the open-shell singlets and are *uncoupled* from the closed shells by symmetry (their and matrix elements vanish), so the full-CI ground state is in fact a superposition of *just* the two closed-shell determinants. In a *bigger* basis, the coupling to the open-shell singlets would be non-zero and the Hund–Mulliken Ansatz would be an approximation to the full-CI ground state. **Part 4.** The Hund–Mulliken energy is *exactly* equal to the full-CI energy in this calculation — they are the *same* number. The reason is the symmetry of the 2-electron 2-orbital problem: the open-shell singlets are *uncoupled* from the closed shells, and the ground state is the *only* state in the block that has the right symmetry. In a bigger basis, the Hund–Mulliken Ansatz would *underestimate* the correlation energy, because it would miss the contribution of the open-shell singlets (and of higher excitations). The sign of the missing contribution is *lowering*: any additional determinant that is *coupled* to the ground state and has a non-zero matrix element to it will lower the energy by the variational principle. **Bottom line.** The 2-electron 2-orbital problem in a real basis is *exactly* solvable by the Hund–Mulliken Ansatz. This is a special case. In a real basis with spatial orbitals, the Hund–Mulliken Ansatz is a *2-configuration* CI, and it is *not* exact; the missing configurations (especially the open-shell singlets and the doubles into the virtual space) account for the rest of the correlation energy."
