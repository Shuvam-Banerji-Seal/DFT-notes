      - paragraph [ref=e6851]: "All of the methods below “Full CI” are systematic approximations to the full-CI sum. They can be derived in three standard ways:"
      - list [ref=e6852]:
        - listitem [ref=e6853]:
          - paragraph [ref=e6854]:
            - strong [ref=e6855]: Perturbation theory
            - text: (MP2, MP3, MP4, …). Write
            - img [ref=e6857]
            - text: with
            - img [ref=e6886]
            - text: a single-determinant zeroth-order Hamiltonian (e.g. the Fock operator), and expand
            - img [ref=e6899]
            - text: in powers of
            - img [ref=e6905]
            - text: . The leading correction is the second-order
            - strong [ref=e6914]: Møller–Plesset
            - text: energy
            - img [ref=e6916]:
              - generic [ref=e6920]:
                - img [ref=e6921]:
                  - generic [ref=e6958]:
                    - img [ref=e6961]
                    - img [ref=e6980]
                - img [ref=e7014]
            - text: a sum over
            - emphasis [ref=e7023]: occupied
            - text: spin-orbitals
            - img [ref=e7025]
            - text: and
            - emphasis [ref=e7034]: virtual
            - text: ones
            - img [ref=e7036]
            - text: . The denominator is the
            - emphasis [ref=e7045]: orbital-energy
            - text: difference of the four states, and the sum runs over all doubly-excited determinants. MP2 is the cheapest
            - emphasis [ref=e7046]: correlated
            - text: method.
        - listitem [ref=e7047]:
          - paragraph [ref=e7048]:
            - strong [ref=e7049]: Configuration interaction
            - text: (CISD, CISDT, CISDTQ, …, FCI). Truncate the FCI expansion
            - img [ref=e7051]:
              - link [ref=e7054] [cursor=pointer]:
                - /url: "#mjx-eqn%3Aeq%3Ach-02-fci-explicit"
            - text: to determinants that differ from the reference by at most
            - img [ref=e7063]
            - text: excitations. CISD includes singles and doubles, CISDT adds triples, etc. The Hamiltonian matrix in the truncated basis is
            - emphasis [ref=e7068]: much
            - text: smaller than the full-CI matrix, but the truncation breaks
            - strong [ref=e7069]: size consistency
            - text: (see §2.2.9 below).
        - listitem [ref=e7070]:
          - paragraph [ref=e7071]:
            - strong [ref=e7072]: Coupled-cluster theory
            - text: (CCS, CCSD, CCSDT, CCSDTQ, …). Write the exact wavefunction as
            - img [ref=e7074]
            - text: ", with"
            - img [ref=e7097]
            - text: a sum of
            - emphasis [ref=e7143]: excitation operators
            - text: that promote electrons from occupied to virtual orbitals. The exponential Ansatz
            - img [ref=e7145]
            - text: automatically includes products of excitations (a “double” is generated by
            - img [ref=e7193]
            - text: ", a “quadruple” by"
            - img [ref=e7206]
            - text: ", and so on), and the"
            - emphasis [ref=e7225]: connected
            - text: form of the resulting equations preserves size consistency. The CCSD equations are
            - img [ref=e7227]
            - text: and the perturbative triples correction CCSD(T) brings the cost to
            - img [ref=e7243]
            - text: .
      - blockquote [ref=e7258]:
        - paragraph [ref=e7259]:
          - strong [ref=e7260]: Tip.
          - text: “Cost (leading)” in the table is the
          - emphasis [ref=e7261]: leading-order
          - text: polynomial scaling with the basis-set size
          - img [ref=e7263]
          - text: ". All of the methods have a steep prefactor (especially CCSD(T) and full CI), and the scaling is what makes them intractable in practice. A useful rule of thumb: CCSD(T) on a 20-atom organic molecule with a triple-zeta basis is feasible (a few days on a workstation); CCSD(T) on a 100-atom protein is not (it would take longer than the age of the universe). Full CI on more than about 12 electrons in a double-zeta basis is not (it would take longer than 9 million years, as the worked example in section 2.5 makes concrete)."
      - heading "2.2.9 Size consistency and size extensivity" [level=3] [ref=e7268]
      - paragraph [ref=e7269]:
        - text: The full-CI wavefunction
        - img [ref=e7271]:
          - link [ref=e7274] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-02-fci-explicit"
        - text: is exact in the basis-set limit,
        - emphasis [ref=e7282]: and
        - text: "it has a property that no truncated method preserves without further consideration: the energy of a"
        - emphasis [ref=e7283]: super-molecule
        - text: made of two non-interacting fragments is the sum of the energies of the fragments. This property has two names, which are sometimes used interchangeably and sometimes not.
      - paragraph [ref=e7284]:
        - strong [ref=e7285]: Size consistency
        - text: (Pople, 1973). A method is
        - strong [ref=e7286]: size consistent
        - text: if, for two non-interacting fragments
        - img [ref=e7288]
        - text: and
        - img [ref=e7294]
        - text: "at infinite separation, the total energy equals the sum of the fragment energies:"
      - paragraph [ref=e7299]:
        - img [ref=e7301]:
          - generic [ref=e7305]:
            - img [ref=e7306]
            - img [ref=e7355]
      - paragraph [ref=e7363]:
        - text: "The “non-interacting” caveat is essential: size consistency is defined for a"
        - emphasis [ref=e7364]: vanishing
        - text: coupling between the fragments. A method that satisfies
        - img [ref=e7366]:
          - link [ref=e7369] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-02-size-cons"
        - text: for any two non-interacting fragments at any separation is size consistent.
      - paragraph [ref=e7377]:
        - strong [ref=e7378]: Size extensivity
        - text: (Bartlett, 1981). A method is
        - strong [ref=e7379]: size extensive
        - text: if the energy scales
        - emphasis [ref=e7380]: linearly
        - text: with the number of particles
        - img [ref=e7382]
        - text: "for a homogeneous system:"
      - paragraph [ref=e7387]:
        - img [ref=e7389]:
          - generic [ref=e7393]:
            - img [ref=e7394]
            - img [ref=e7426]
      - paragraph [ref=e7434]:
        - text: This is a
        - emphasis [ref=e7435]: stronger
        - text: "property than size consistency: it requires the energy to be proportional to the number of particles, not just additive at infinite separation. For a uniform electron gas, the HF energy per electron approaches a constant, the MP2 energy per electron approaches a constant, and the CCSD(T) energy per electron approaches a constant — so all of these methods are size extensive. CISD, on the other hand, gives an energy that grows"
        - emphasis [ref=e7436]: less
        - text: than linearly with
        - img [ref=e7438]
        - text: ", because the truncated CI misses the"
        - emphasis [ref=e7443]: disconnected
        - text: contributions to the energy (the products of excitations on different fragments) and the missing piece grows with
        - img [ref=e7445]
        - text: .
      - paragraph [ref=e7450]:
        - text: The distinction between the two properties is most easily seen in a
        - emphasis [ref=e7451]: dimer
        - text: calculation. Take two non-interacting copies of
        - img [ref=e7453]
        - text: "at infinite separation, and compare the size- consistent prediction of the energy to the size-inconsistent one:"
