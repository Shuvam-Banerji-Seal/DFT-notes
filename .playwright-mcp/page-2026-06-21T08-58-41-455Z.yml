      - heading "2.8 What we left out" [level=2] [ref=e12131]
      - paragraph [ref=e12132]:
        - text: This chapter is the
        - emphasis [ref=e12133]: setup
        - text: for everything else; it is necessarily a summary of an enormous literature. The topics we have
        - emphasis [ref=e12134]: not
        - text: "covered, and the reader should know are missing, are:"
      - list [ref=e12135]:
        - listitem [ref=e12136]:
          - strong [ref=e12137]: Relativistic effects.
          - text: The Hamiltonian
          - img [ref=e12139]:
            - link [ref=e12142] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-hamiltonian"
          - text: is the
          - emphasis [ref=e12149]: non-relativistic
          - text: Schrödinger Hamiltonian. For elements with
          - img [ref=e12151]
          - text: "(the third row of the transition metals and beyond), the inner-shell electrons are relativistic: the"
          - emphasis [ref=e12161]: Dirac–Coulomb
          - text: "Hamiltonian \\begin{equation} \\label{eq:ch-02-dirac} \\hat H_{\\text{DC}} \\;=\\; \\sum_i \\Bigl[ c\\, \\boldsymbol\\alpha_i \\cdot \\mathbf p_i + c^2 \\beta_i \\Bigr]"
          - list [ref=e12162]:
            - listitem [ref=e12163]: "\\sum_{iA} \\frac{Z_A}{r_{iA}}"
            - listitem [ref=e12164]:
              - text: "\\sum_{i<j} \\frac{1}{r_{ij}} \\end{equation} (with"
              - img [ref=e12166]
              - text: ","
              - img [ref=e12172]
              - text: the Dirac matrices) is needed. The non-relativistic limit is a perturbative expansion in
              - img [ref=e12178]
              - text: around
              - img [ref=e12189]:
                - link [ref=e12192] [cursor=pointer]:
                  - /url: "#mjx-eqn%3Aeq%3Ach-02-hamiltonian"
              - text: ; the leading relativistic correction is the
              - strong [ref=e12199]: spin–orbit coupling
              - img [ref=e12201]
              - text: ", which lifts the degeneracy of spin–orbit doublets and is essential for heavy-element chemistry. We will return to this in"
              - link "chapter 08" [ref=e12241] [cursor=pointer]:
                - /url: /DFT-notes/dft-notes/chapter-08/
              - text: in the pseudopotential context.
        - listitem [ref=e12242]:
          - strong [ref=e12243]: Quantum Monte Carlo as an alternative to CI.
          - text: The determinant-based methods of §2.2.8 are not the only route to the exact wavefunction.
          - strong [ref=e12244]: Variational Monte Carlo (VMC)
          - text: ","
          - strong [ref=e12245]: diffusion Monte Carlo (DMC)
          - text: ", and"
          - strong [ref=e12246]: auxiliary-field QMC (AFQMC)
          - text: represent the wavefunction as a
          - emphasis [ref=e12247]: sampled
          - text: ensemble of 3-
          - img [ref=e12249]
          - text: "-dimensional configurations and accumulate the energy expectation value by Metropolis-style sampling. The cost is"
          - emphasis [ref=e12254]: polynomial
          - text: in
          - img [ref=e12256]
          - text: (typically
          - img [ref=e12262]
          - text: per sample) but with a steep prefactor, and the methods are stochastic — the energy is known only to a statistical error bar.
          - strong [ref=e12277]: Full-CI QMC (FCIQMC)
          - text: "and its initiator variant combine the two ideas: they sample the determinant space stochastically and converge to the full-CI answer with a walker count that grows roughly polynomially with system size, although the exact scaling is a subject of active research."
        - listitem [ref=e12278]:
          - strong [ref=e12279]: The transcorrelated method.
          - text: An alternative to the Jastrow factor of QMC is to
          - emphasis [ref=e12280]: absorb
          - text: a correlation factor into the Hamiltonian, transforming a hard problem into a
          - emphasis [ref=e12281]: non-Hermitian
          - text: but easier one. The
          - strong [ref=e12282]: transcorrelated method
          - text: of Boys and Handy (1969) writes
          - img [ref=e12284]
          - text: with
          - img [ref=e12306]
          - text: a correlation operator, and the transformed Hamiltonian
          - img [ref=e12316]
          - text: has a substantially weaker correlation problem. The method has had a recent revival in the “transcorrelated QMC” and “transcorrelated coupled-cluster” literature.
        - listitem [ref=e12347]:
          - strong [ref=e12348]: Multi-reference methods (CASSCF, NEVPT2, CASPT2, MRCI).
          - text: The single-reference methods of §2.2.8 break down at the Coulson–Fischer point, where the Hartree–Fock determinant becomes qualitatively wrong. The standard fix is a
          - emphasis [ref=e12349]: multi-reference
          - text: Ansatz, in which the wavefunction is a
          - emphasis [ref=e12350]: complete active space
          - text: (CAS) CI inside a chosen subset of “active” orbitals, with the rest of the orbitals either doubly-occupied or empty. CASSCF, NEVPT2, and CASPT2 are the standard multi-reference methods, and they are the tools of choice for transition-metal chemistry, bond breaking, and excited states. We have not covered them.
        - listitem [ref=e12351]:
          - strong [ref=e12352]: The density matrix renormalisation group (DMRG).
          - text: For quasi-1-D systems (conjugated polymers, chains of transition-metal atoms), DMRG provides a polynomial-cost route to the full-CI wavefunction, with a bond-dimension parameter that controls the accuracy. The method generalises to higher dimensions through
          - strong [ref=e12353]: tensor network states
          - text: (PEPS, MERA), but the cost grows exponentially with the dimension of the network.
        - listitem [ref=e12354]:
          - strong [ref=e12355]: Symmetry adaptation.
          - text: The determinant basis of
          - img [ref=e12357]:
            - link [ref=e12360] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-02-ndet"
          - text: does not transform as a basis for the spatial symmetries of the molecule (point group, time-reversal, particle-hole). The
          - strong [ref=e12368]: symmetry-adapted CI
          - text: and
          - strong [ref=e12369]: GUGA
          - text: (graphical unitary group approach) methods exploit these symmetries to block-diagonalise the CI matrix, with a corresponding reduction in the computational cost and a clearer labelling of the states by their symmetry. We have ignored symmetries for clarity.
        - listitem [ref=e12370]:
          - strong [ref=e12371]: Explicitly correlated methods (F12, R12).
          - text: The slow basis-set convergence of the correlation energy is
          - emphasis [ref=e12372]: fundamentally
          - text: due to the inability of a one-electron basis to represent the electron–electron cusp
          - img [ref=e12374]
          - text: in the wavefunction. The
          - strong [ref=e12397]: R12 / F12
          - text: methods add an explicit dependence on the inter-electronic coordinate
          - img [ref=e12399]
          - text: to the wavefunction Ansatz, recovering the cusp
          - emphasis [ref=e12409]: exactly
          - text: and accelerating basis-set convergence by an order of magnitude. These methods are state-of-the-art for high-accuracy wavefunction calculations; we have not covered them.
        - listitem [ref=e12410]:
          - strong [ref=e12411]: The full quantum-chemistry pipeline.
          - text: We have described full CI as a
          - emphasis [ref=e12412]: bare
          - text: "matrix diagonalisation. Production codes add a great deal of machinery on top:"
          - strong [ref=e12413]: direct CI
          - text: (build the matrix elements on the fly instead of storing the full ERI tensor),
          - strong [ref=e12414]: Davidson diagonalisation
          - text: (iterative subspace method for the lowest few eigenvalues, avoiding the full diagonalisation),
          - strong [ref=e12415]: integral screening
          - text: (skip two-electron integrals below a threshold), and
          - strong [ref=e12416]: Cholesky decomposition of the ERI tensor
          - text: (compress the ERI tensor by a factor of ~10× without loss of accuracy). We have not discussed any of these.
      - blockquote [ref=e12417]:
