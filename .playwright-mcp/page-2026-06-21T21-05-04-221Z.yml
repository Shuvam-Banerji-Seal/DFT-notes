            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: — the Hohenberg–Kohn theorems and the Kohn–Sham equations, where the unknown functional is hidden.
      - heading "3.12 Problems" [level=2] [ref=e13416]
      - group [ref=e13417]:
        - generic "▸ Problem 1 (easy) — Anatomy of the Fock matrix in the AO basis" [ref=e13418] [cursor=pointer]
        - text: "For a closed-shell HF calculation in a basis of functions: 1. Write down the Fock matrix element in terms of the one-electron Hamiltonian , the AO density matrix , and the ERI tensor . State explicitly which indices appear in the Coulomb term and which in the exchange term, and why they differ. 2. Write the SCF update rule for the density matrix in terms of the occupied MO coefficient matrix . 3. Write the closed-shell HF electronic energy as a trace involving , , and . Show that this is consistent with the sum-over-orbitals form ."
      - group [ref=e13419]:
        - generic "▸ Show answer" [ref=e13420] [cursor=pointer]
        - text: "**1.** Equation : The Coulomb term has on the same *side* of the kernel (the \"bra\" side in chemists' notation) and on the other. The exchange term has paired with and paired with — one index from each pair has \"crossed\" to the other side. This crossing is what produces the non-locality of the exchange operator and what makes HF qualitatively different from a pure mean-field theory with a local potential. **2.** Equation : The factor of 2 is the closed-shell double occupancy; the rank of is (the number of doubly-occupied spatial orbitals), so is a projector (with respect to the inner product) onto the occupied subspace: **3.** Equation : In the MO basis the trace becomes a sum: (factor 2 from double occupancy). So The half in the trace form and the factor of 2 in the sum-over-orbitals form cancel exactly; the two expressions agree."
      - group [ref=e13421]:
        - generic "▸ Problem 2 (medium) — Invariance of the HF energy under unitary rotation of the occupied orbitals" [ref=e13422] [cursor=pointer]
        - text: "The closed-shell HF energy in the MO basis is Let be a unitary matrix acting on the occupied-orbital subspace, so that is a new set of orthonormal orbitals spanning the same subspace. Show that the HF energy is *invariant* under this rotation; that is, . (Hint: show that the density matrix is invariant under unitary rotations of the occupied orbitals, and that the energy depends on the orbitals only through the density matrix.)"
      - group [ref=e13423]:
        - generic "▸ Show answer" [ref=e13424] [cursor=pointer]
        - text: "The MO coefficients transform as , i.e. in matrix notation. The new density matrix is Since is unitary, , so The density matrix is *invariant* under unitary rotations of the occupied orbitals. The HF energy in the AO basis is with and built from . Since is fixed and depends on only through , the energy is a *function* of only: Invariance of under therefore implies , i.e. the HF energy is invariant under any unitary rotation of the occupied orbitals. This is the formal statement of the textbook line \"the HF energy depends on the *density matrix*, not on the individual orbitals*.\" The *orbitals within the occupied subspace are not observables; only the subspace they span is."
      - group [ref=e13425]:
        - generic "▸ Problem 3 (hard) — Derive Koopmans' theorem from the HF equations" [ref=e13426] [cursor=pointer]
        - text: "The HF eigenvalue equation in the MO basis is . Take the inner product with to obtain the MO Fock matrix element where the sum is over all doubly-occupied spatial orbitals and the factor 2 accounts for spin summation. Using this expression, derive the **Koopmans' theorem** statement of the ionisation energy for removal of a single electron from orbital : 1. Write explicitly in the MO basis. 2. Write explicitly. Take care with the Coulomb/exchange sums when one spin-orbital is removed. 3. Subtract and identify ."
      - group [ref=e13427]:
        - generic "▸ Show answer" [ref=e13428] [cursor=pointer]
        - text: "**1.** The closed-shell HF energy in the MO basis is where the sums are over doubly-occupied spatial orbitals. **2.** Removing one electron from orbital leaves the electron in orbital in place. The spin-orbitals in orbitals are unchanged, the spin-orbital in orbital is now vacant, and all spin-orbitals are unchanged. Summing spin-orbitals into spatial integrals, (The last equality uses by the 8-fold permutational symmetry of the ERI tensor.) **3.** Subtracting from the result: \\begin{align} I_a &\\;=\\; E_\\text{HF}(N-1) - E_\\text{HF}(N) \\notag\\ &\\;=\\; -h_{aa} \\;-\\; \\sum_j (2 J_{aj} - K_{aj}) \\notag\\ &\\;=\\; -\\Bigl( h_{aa} + \\sum_j (2 J_{aj} - K_{aj}) \\Bigr) \\notag\\ &\\;=\\; -\\varepsilon_a , \\end{align*} where the last line uses the MO Fock eigenvalue. This is the **Koopmans' theorem** statement. The crucial cancellation that makes Koopmans exact at the *closed-shell* level: the Fock matrix is unchanged by removing the electron, so the orbitals do not need to relax. The relaxation of the orbitals is a *first-order* effect, and the Fock eigenvalue equation guarantees that it cancels the *first-order* change in the total energy from the unchanged and the changed Coulomb/exchange sums."
      - heading "3.13 What we left out" [level=2] [ref=e13429]
      - paragraph [ref=e13430]:
        - text: This chapter is the
        - emphasis [ref=e13431]: gateway
        - text: "to the rest of the notes, and we have deliberately left out a number of topics that are essential to a working knowledge of HF theory but are not needed for the core derivation:"
      - list [ref=e13432]:
        - listitem [ref=e13433]:
          - strong [ref=e13434]: Restricted open-shell HF (ROHF).
          - text: We derived UHF (§3.7), but the
          - emphasis [ref=e13435]: spin-pure
          - text: alternative ROHF — with the Roothaan (1960) or McWeeny–Diercksen open-shell Fock matrix — is what every high-accuracy open-shell calculation uses. Implementation is more involved; the principles are the same.
        - listitem [ref=e13436]:
          - strong [ref=e13437]: Resolution-of-the-identity / density fitting (RI / DF) and Cholesky-decomposed ERIs.
          - text: Both reduce the ERI storage and the Fock build from
          - img [ref=e13439]
          - text: to
          - img [ref=e13455]
          - text: ", with or without an auxiliary basis respectively. Standard in every production code; we used the full four-index form for clarity."
        - listitem [ref=e13470]:
          - strong [ref=e13471]: Integral screening beyond Schwarz.
          - text: The Schwarz inequality
          - img [ref=e13473]:
            - link [ref=e13476] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-03-schwarz"
          - text: is the
          - emphasis [ref=e13484]: first
          - text: level of screening; production codes add
          - emphasis [ref=e13485]: shell-pair
          - text: ", shell-quartet, and"
          - emphasis [ref=e13486]: "density-base`d"
          - text: ’ screenings that drive the effective scaling of the Fock build down to
          - img [ref=e13488]
          - text: in the large-molecule limit.
        - listitem [ref=e13500]:
          - strong [ref=e13501]: Multiconfigurational SCF (MCSCF) and CASSCF.
          - text: When a single determinant is not enough, the orbital optimisation is generalised to a
          - emphasis [ref=e13502]: multi-determinant
          - text: Ansatz. We did not derive it.
        - listitem [ref=e13503]:
          - strong [ref=e13504]: Scalar relativistic effects and the Dirac–Hartree–Fock equation.
          - text: For heavy elements the non-relativistic Schrödinger equation is not enough; we will revisit relativistic HF in
          - link "chapter 08" [ref=e13505] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: (pseudopotentials) and
          - link "chapter 12" [ref=e13506] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: (relativistic effects).
        - listitem [ref=e13507]:
          - strong [ref=e13508]: Post-HF correlation methods.
          - text: MP2, MP3, MP4, CISD, CCSD, CCSD(T), CASPT2, NEVPT2, … These are the methods that
          - emphasis [ref=e13509]: start from
          - text: an HF calculation and add electron correlation on top; they are the subject of
          - link "chapter 11" [ref=e13510] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: .
