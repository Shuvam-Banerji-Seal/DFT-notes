        - text: — a
        - emphasis [ref=e13319]: density functional
        - text: we don’t know exactly but can approximate. The arithmetic is the same. The semantics are not.
      - paragraph [ref=e13320]:
        - text: The connection is deeper than the energy expression. The Fock operator
        - img [ref=e13322]:
