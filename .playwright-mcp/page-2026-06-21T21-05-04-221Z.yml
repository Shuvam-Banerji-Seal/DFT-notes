      - 'heading "3.8.5 Full implementation: H₂ STO-3G with DIIS" [level=3] [ref=e11411]'
      - paragraph [ref=e11412]:
        - text: Below is a self-contained direct-SCF calculation of the H₂ molecule in the STO-3G basis, with the ERI tensor recomputed on the fly every iteration, Schwarz screening, and DIIS acceleration. The script reproduces the converged HF energy
        - img [ref=e11414]
        - text: from chapter 6 §6.9 in fewer iterations than density mixing alone.
      - code [ref=e11434]: "# dft_notes/python_codes/chapter_03/01-direct-scf-h2-sto3g-diis.py \"\"\" Direct restricted Hartree-Fock for H2 in the STO-3G basis, with Schwarz-screened on-the-fly ERI evaluation and DIIS convergence acceleration. Reproduces E_HF(H2, R=1.4 a0) = -1.1167 E_h from Szabo & Ostlund table 3.5 (also recovered in chapter 6 of these notes). \"\"\" import numpy as np from scipy.linalg import eigh # STO-3G basis for hydrogen (Hehre-Stewart-Pople fit, zeta = 1.24) STO3G_H = { \"prims\": [(0.168856, 0.444635), (0.623913, 0.535328), (3.425250, 0.154329)], } def norm_s(alpha): \"\"\"Normalisation of a primitive s-Gaussian: (2 alpha / pi)^(3/4).\"\"\" return (2.0 * alpha / np.pi) ** 0.75 def overlap_ss(alpha, A, beta, B): \"\"\"<g_A | g_B> for two normalised primitive s-Gaussians.\"\"\" gamma = alpha + beta Rab2 = np.sum((A - B) ** 2) Kab = np.exp(-alpha * beta / gamma * Rab2) return norm_s(alpha) * norm_s(beta) * Kab (np.pi / gamma) ** 1.5 def kinetic_ss(alpha, A, beta, B): \"\"\"<g_A | -1/2 nabla^2 | g_B> for two primitive s-Gaussians.\"\"\" gamma = alpha + beta Rab2 = np.sum((A - B) ** 2) Kab = np.exp(-alpha * beta / gamma * Rab2) pre = norm_s(alpha) * norm_s(beta) * Kab (np.pi / gamma) ** 1.5 return pre * (alpha * beta / gamma) (3.0 - 2.0 alpha * beta / gamma Rab2) def boys_f0(t): \"\"\"Boys function F_0(t) = (1/2) sqrt(pi/t) erf(sqrt(t)); F_0(0) = 1.\"\"\" if t < 1e-12: return 1.0 from scipy.special import erf return 0.5 * np.sqrt(np.pi / t) * erf(np.sqrt(t)) def nuclear_ss(alpha, A, beta, B, Z, C): \"\"\"<g_A | -Z/|r - C| | g_B> for two primitive s-Gaussians.\"\"\" gamma = alpha + beta P = (alpha * A + beta * B) / gamma Rab2 = np.sum((A - B) ** 2) Kab = np.exp(-alpha * beta / gamma * Rab2) PC2 = np.sum((P - C) ** 2) return (-Z) * norm_s(alpha) * norm_s(beta) Kab \\ * (2.0 * np.pi / gamma) boys_f0(gamma PC2) def contracted_1e(shell_A, shell_B, op, Z=None, C=None): \"\"\"One-electron integral between two contracted s-shells.\"\"\" val = 0.0 for (a, da) in shell_A: for (b, db) in shell_B: if op == \"S\": val += da * db * overlap_ss(a, shell_A[\"center\"], b, shell_B[\"center\"]) elif op == \"T\": val += da * db * kinetic_ss(a, shell_A[\"center\"], b, shell_B[\"center\"]) elif op == \"V\": val += da * db * nuclear_ss(a, shell_A[\"center\"], b, shell_B[\"center\"], Z, C) return val def eri_prim_ss(alpha, A, beta, B, gamma, C, delta, D): \"\"\"(ab|cd) for four primitive s-Gaussians.\"\"\" ab = alpha + beta cd = gamma + delta P = (alpha * A + beta * B) / ab Q = (gamma * C + delta * D) / cd Rab2 = np.sum((A - B) ** 2) Rcd2 = np.sum((C - D) ** 2) RPQ2 = np.sum((P - Q) ** 2) Kab = np.exp(-alpha * beta / ab * Rab2) Kcd = np.exp(-gamma * delta / cd * Rcd2) pre = norm_s(alpha) * norm_s(beta) \\ * norm_s(gamma) * norm_s(delta) Kab Kcd rho = ab * cd / (ab + cd) return pre * (2.0 * np.pi ** 2.5) / (ab * cd * np.sqrt(ab + cd)) \\ * boys_f0(rho * RPQ2) def diagonal_eri(shell_A, shell_B): \"\"\"(AA|BB) for two contracted s-shells -- used for Schwarz bounds.\"\"\" val = 0.0 for (a, da) in shell_A[\"prims\"]: for (b, db) in shell_B[\"prims\"]: val += da * db * eri_prim_ss( a, shell_A[\"center\"], b, shell_B[\"center\"], a, shell_A[\"center\"], b, shell_B[\"center\"]) return abs(val) def build_F_direct(shells, P, schwarz, threshold=1e-12): \"\"\"Direct Fock-matrix build with Schwarz screening.\"\"\" K = len(shells) F = np.zeros((K, K)) schwarz_max = schwarz.max() for mu in range(K): for nu in range(mu, K): if schwarz[mu, nu] * schwarz_max < threshold: continue Jval = 0.0 for rho in range(K): for sigma in range(K): if schwarz[mu, nu] * schwarz[rho, sigma] < threshold: continue val = 0.0 for (a, da) in shells[mu][\"prims\"]: for (b, db) in shells[nu][\"prims\"]: for (c, dc) in shells[rho][\"prims\"]: for (d, dd) in shells[sigma][\"prims\"]: val += da * db * dc dd eri_prim_ss( a, shells[mu][\"center\"], b, shells[nu][\"center\"], c, shells[rho][\"center\"], d, shells[sigma][\"center\"]) Jval += P[rho, sigma] * val F[mu, nu] += Jval F[nu, mu] += Jval for mu in range(K): for nu in range(K): Kval = 0.0 for rho in range(K): for sigma in range(K): if schwarz[mu, sigma] * schwarz[rho, nu] < threshold: continue val = 0.0 for (a, da) in shells[mu][\"prims\"]: for (b, db) in shells[nu][\"prims\"]: for (c, dc) in shells[rho][\"prims\"]: for (d, dd) in shells[sigma][\"prims\"]: val += da * db * dc dd eri_prim_ss( a, shells[mu][\"center\"], b, shells[nu][\"center\"], c, shells[rho][\"center\"], d, shells[sigma][\"center\"]) Kval += P[rho, sigma] * val F[mu, nu] -= 0.5 * Kval return F def diis_extrapolate(F_list, err_list): \"\"\"Pulay DIIS in the AO basis using the commutator error.\"\"\" m = len(F_list) B = np.zeros((m + 1, m + 1)) for i in range(m): for j in range(m): B[i, j] = np.dot(err_list[i].ravel(), err_list[j].ravel()) B[i, m] = B[m, i] = 1.0 rhs = np.zeros(m + 1); rhs[-1] = 1.0 c = np.linalg.solve(B, rhs) return sum(c[i] * F_list[i] for i in range(m)) def commutator_error(F, P, S): \"\"\"Commutator [F, P] in the AO basis (zero at convergence).\"\"\" return F @ P @ S - S @ P @ F def h2_sto3g_direct_scf(R=1.4, max_iter=64, tol=1e-10, diis_start=2): \"\"\"Direct RHF for H2 / STO-3G at bond length R (in bohr).\"\"\" A = np.array([0.0, 0.0, 0.0]) B = np.array([0.0, 0.0, R]) sA = {\"prims\": STO3G_H[\"prims\"], \"center\": A} sB = {\"prims\": STO3G_H[\"prims\"], \"center\": B} shells = [sA, sB] K = 2 # One-electron integrals S = np.array([[contracted_1e(sA, sA, \"S\"), contracted_1e(sA, sB, \"S\")], [contracted_1e(sB, sA, \"S\"), contracted_1e(sB, sB, \"S\")]]) h = np.zeros((K, K)) for mu in range(K): for nu in range(K): Tval = contracted_1e(shells[mu], shells[nu], \"T\") for (Z, C) in [(1, A), (1, B)]: Tval += contracted_1e(shells[mu], shells[nu], \"V\", Z, C) h[mu, nu] = Tval # Schwarz bounds schwarz = np.zeros((K, K)) for mu in range(K): for nu in range(K): schwarz[mu, nu] = np.sqrt(diagonal_eri(shells[mu], shells[nu])) # Initial guess: diagonalise the core Hamiltonian eps, C = eigh(h, S) P = 2.0 * np.outer(C[:, 0], C[:, 0]) # SCF with DIIS F_list, err_list = [], [] for it in range(max_iter): F = build_F_direct(shells, P, schwarz, threshold=1e-12) if it >= diis_start: err = commutator_error(F, P, S) F_list.append(F.copy()) err_list.append(err.copy()) F = diis_extrapolate(F_list[-6:], err_list[-6:]) eps, C = eigh(F, S) P_new = 2.0 * np.outer(C[:, 0], C[:, 0]) dP = np.linalg.norm(P_new - P) P = P_new if dP < tol: print(f\" Converged in {it + 1} iterations, dP = {dP:.2e}\") break E_el = 0.5 * np.trace(P @ (h + F)) E_nn = 1.0 / R return E_el + E_nn, eps, C, P if __name__ == \"__main__\": E, eps, C, P = h2_sto3g_direct_scf() print(f\"\\nDirect-SCF (with DIIS) H2/STO-3G R = 1.4 a0\") print(f\" MO energies (E_h) : {eps}\") print(f\" E_HF = {E:.6f} E_h\") print(f\" Reference = -1.1167 E_h (Szabo & Ostlund)\")"
      - paragraph [ref=e11435]:
