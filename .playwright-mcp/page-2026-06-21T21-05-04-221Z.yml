      - heading "3.8.3 A worked direct-SCF loop" [level=3] [ref=e10391]
      - paragraph [ref=e10392]: "A minimal direct-SCF kernel (with on-the-fly ERI evaluation, Schwarz screening, and DIIS extrapolation; the actual code listing is below):"
      - code [ref=e10396]: "def direct_scf(geom, basis, n_elec, max_iter=100, tol=1e-9, diis_start=3, diis_dim=8): \"\"\"Direct restricted HF in a Gaussian basis with DIIS. geom : list of (Z, (x, y, z)) for each atom basis : dict atom_symbol -> list of (shell_am, exponents, coeffs) n_elec : total number of electrons (closed-shell, even) \"\"\" K = n_basis(basis) S = overlap_matrix(basis, geom) h = core_hamiltonian(basis, geom) Q = schwarz_bounds(basis, geom) # Q[mu, nu] = sqrt(|(mu nu|mu nu)|) X = loewdin_orthogonaliser(S) # Initial guess: diagonalise the core Hamiltonian eps, C = eigh(h, S) P = 2.0 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T diis_errs = [] diis_Fs = [] for it in range(max_iter): # Build the Fock matrix in the AO basis, on the fly J = build_J_direct(basis, geom, P, Q, threshold=1e-12) K = build_K_direct(basis, geom, P, Q, threshold=1e-12) F = h + J - 0.5 * K # DIIS extrapolation if it >= diis_start: diis_Fs.append(F) err = commutator_error(F, P, S) diis_errs.append(err) F = diis_extrapolate(diis_Fs[-diis_dim:], diis_errs[-diis_dim:]) # Solve the generalised eigenvalue problem eps, C = eigh(F, S) # Update the density P_new = 2.0 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T dP = np.linalg.norm(P_new - P) P = P_new if dP < tol: break E_el = 0.5 * np.trace(P @ (h + F)) return E_el, eps, C, P"
      - paragraph [ref=e10397]:
        - text: "The key piece is ‘build_J_direct’ / ‘build_K_direct`, which loop over basis-function quartets, apply the Schwarz test"
        - img [ref=e10399]:
          - link [ref=e10402] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-03-screen"
        - text: ", and accumulate only the non-negligible contributions. The full implementation appears in section 3.8.5. ### 3.8.4 DIIS — Pulay’s accelerator"
      - paragraph [ref=e10410]:
        - text: Plain density mixing converges in 20–50 iterations for most closed- shell molecules. For open-shell systems, transition-metal complexes, and near-degenerate electronic structure, it can oscillate or diverge. The standard accelerator,
