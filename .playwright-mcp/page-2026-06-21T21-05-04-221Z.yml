        - text: and
        - link "chapter 05" [ref=e13334] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: ") is built: a single Slater determinant of"
        - emphasis [ref=e13335]: orbitals
        - text: obeying a
        - emphasis [ref=e13336]: one-electron
        - text: eigenvalue equation, with the non-classical contribution
        - img [ref=e13338]
        - text: in place of
        - img [ref=e13352]
        - text: . The
        - emphasis [ref=e13363]: Ansatz
        - text: is the same; the operator changes.
      - blockquote [ref=e13364]:
        - paragraph [ref=e13365]:
          - strong [ref=e13366]: Note.
          - text: The notation “
          - img [ref=e13368]
          - text: ” in DFT is the
          - emphasis [ref=e13381]: local
          - text: (multiplicative) counterpart of the non-local exchange operator
          - img [ref=e13383]
