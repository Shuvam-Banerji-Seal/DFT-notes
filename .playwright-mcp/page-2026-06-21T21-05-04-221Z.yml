      - heading "3.11 Outlook" [level=2] [ref=e13396]
      - paragraph [ref=e13397]:
        - text: DFT replaces the unknown exact wavefunction by an unknown exact
        - emphasis [ref=e13398]: energy functional of the density
        - text: . Hartree–Fock is the
        - emphasis [ref=e13399]: Ansatz
        - text: that DFT rejects at the level of the wavefunction but reuses at the level of the
        - emphasis [ref=e13400]: orbital structure
        - text: ": a single Slater determinant of Kohn–Sham orbitals is the starting point of the most common family of DFT calculations."
      - paragraph [ref=e13401]: "The remaining chapters of these notes extend HF in two directions:"
      - list [ref=e13402]:
        - listitem [ref=e13403]:
          - strong [ref=e13404]: Inclusions of correlation.
          - text: Møller–Plesset perturbation theory (MP2, MP3, MP4), configuration interaction (CI), coupled cluster (CCSD, CCSD(T)), multireference methods (CASSCF, CASPT2). All of these
          - emphasis [ref=e13405]: "kee`p"
          - text: ’ the HF orbital structure as a starting point and add correlation on top.
        - listitem [ref=e13406]:
          - strong [ref=e13407]: Substitutions of the operator.
          - text: Kohn–Sham DFT (
          - link "chapter 04" [ref=e13408] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: and
          - link "chapter 05" [ref=e13409] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: ) replaces the Fock operator by a KS operator with a local
          - emphasis [ref=e13410]: exchange–correlation
          - text: potential. The arithmetic of solving the eigenvalue equation is unchanged; only the operator is different.
      - paragraph [ref=e13411]:
        - text: The HF theory we have built in this chapter is the
        - emphasis [ref=e13412]: common ancestor
        - text: of both lines.
      - blockquote [ref=e13413]:
        - paragraph [ref=e13414]:
          - text: "Next:"
