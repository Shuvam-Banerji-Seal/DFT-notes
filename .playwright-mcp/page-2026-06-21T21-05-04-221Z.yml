          - emphasis [ref=e13048]: self-energy
          - text: that includes the correlation. GW (
          - link "chapter 14" [ref=e13049] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-14/
          - text: ) is the modern method of choice for ionisations of solids and large molecules.
        - listitem [ref=e13050]:
          - strong [ref=e13051]: "Coupled-cluster ionisations (EOM-CCSD, CCSD-LRT):"
          - text: the most accurate; the
          - emphasis [ref=e13052]: equation-of-motion
          - text: formulation naturally handles the difference between the neutral and the ion. We will meet EOM-CCSD in a later chapter.
