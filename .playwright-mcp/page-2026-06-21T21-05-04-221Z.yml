      - heading "Chapter 03 — Hartree–Fock" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]: Hartree–Fock is not a particularly good theory of electronic structure. It is, however, the theory that defines the vocabulary every later method is forced to speak.
      - paragraph [ref=e30]:
        - text: The Hartree–Fock (HF) approximation is the cornerstone of electronic-structure theory. It is the simplest wavefunction-based method that respects the Pauli principle exactly, and it installs the working vocabulary —
        - emphasis [ref=e31]: orbital, Fock operator, self-consistent field, density matrix, Slater–Condon rules
        - text: — that every later theory (post-HF, Kohn–Sham DFT with hybrid functionals, multireference methods, embedding) borrows verbatim. This chapter builds HF from the variational principle down to the working algorithm that runs in every production quantum-chemistry code.
      - paragraph [ref=e32]: "By the end of this chapter you should be able to:"
      - list [ref=e33]:
        - listitem [ref=e34]: State the variational principle and the single-determinant Ansatz, and write down the Fock eigenvalue equation.
        - listitem [ref=e35]:
          - text: Derive the
          - strong [ref=e36]: Roothaan–Hall
          - text: matrix equation
          - img [ref=e38]
          - text: from the Fock operator expanded in a finite (in general non-orthogonal) basis.
        - listitem [ref=e57]:
          - text: Set up the
          - strong [ref=e58]: unrestricted (Pople–Nesbet)
          - text: equations for an open-shell system, and identify where spin contamination enters.
        - listitem [ref=e59]:
          - text: Distinguish
          - strong [ref=e60]: direct
          - text: from
          - strong [ref=e61]: conventional
          - text: SCF, and explain why the
          - strong [ref=e62]: DIIS
          - text: extrapolation is what every code actually does.
        - listitem [ref=e63]:
          - text: State
          - strong [ref=e64]: Koopmans’ theorem
          - text: ", derive it from the HF energy expression, and list the physical effects that cause it to fail."
