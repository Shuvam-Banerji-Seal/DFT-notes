      - paragraph [ref=e13129]: The four paths lie on a cost–accuracy ladder; Koopmans is the cheapest and the noisiest, EOM-CCSD is the most expensive and the most accurate. DFT analogues of these paths (ΔSCF-DFT, GW-DFT, EOM-CCSD) are the workhorses of contemporary photoemission calculations.
      - heading "3.10 Why DFT builds on HF" [level=2] [ref=e13130]
      - paragraph [ref=e13131]:
        - text: The Fock operator is the prototypical
        - strong [ref=e13132]: mean-field
        - text: "operator: each electron moves in the average field of all the others. The HF energy expression is also the template that every later theory copies:"
