      - heading "3.3 The self-consistent field" [level=2] [ref=e1520]
      - paragraph [ref=e1521]:
        - text: The Fock operator depends on the orbitals (through the density), and the orbitals are eigenfunctions of the Fock operator. We resolve the circularity by
        - strong [ref=e1522]: iteration
        - text: ":"
      - list [ref=e1523]:
        - listitem [ref=e1524]:
          - text: Start from a guess for the density
          - img [ref=e1526]
          - text: . In practice this is built from the eigenfunctions of the core Hamiltonian
          - img [ref=e1540]
          - text: alone — i.e. a superposition-of-atoms guess — or from an extended Hückel calculation, or from the density of a previous calculation on a similar geometry.
        - listitem [ref=e1549]:
          - text: Build the Fock matrix
          - img [ref=e1551]
          - text: from
          - img [ref=e1565]
          - text: .
        - listitem [ref=e1578]:
          - text: Diagonalise
          - img [ref=e1580]
          - text: to get new orbitals and a new density
          - img [ref=e1594]
          - text: .
        - listitem [ref=e1611]:
          - text: Mix
          - img [ref=e1613]
          - text: and
          - img [ref=e1627]
          - text: for numerical stability.
        - listitem [ref=e1644]: "Check convergence. If not converged, go to step 2. A minimal SCF loop in Python (using a pre-built one-electron Hamiltonian and two-electron integrals):"
      - code [ref=e1648]: "import numpy as np def scf_loop(H_core, eri, S, n_elec, max_iter=100, tol=1e-8, mixing=0.3): \"\"\"Restricted HF SCF in a non-orthogonal AO basis. H_core : (K, K) one-electron Hamiltonian in the AO basis eri : (K, K, K, K) two-electron integrals (physicists' notation) S : (K, K) overlap matrix n_elec : int number of electrons \"\"\" K = H_core.shape[0] # Initial guess: diagonalise the core Hamiltonian evals, C = np.linalg.eigh(H_core, S) P = 2 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T for it in range(max_iter): # Build the Fock matrix J = np.einsum(\"pqrs,rs->pq\", eri, P) K = np.einsum(\"prqs,rs->pq\", eri, P) F = H_core + J - 0.5 * K # Transform to the orthogonal basis and diagonalise evals, C = np.linalg.eigh(F, S) # New density P_new = 2 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T # Check convergence and mix dP = np.linalg.norm(P_new - P) P = (1 - mixing) * P + mixing * P_new if dP < tol: print(f\" Converged in {it + 1} iterations (dP = {dP:.2e})\") break else: print(f\" WARNING: SCF did not converge in {max_iter} iterations\") E_elec = 0.5 * np.trace(P @ (H_core + F)) return E_elec, evals, C, P"
      - paragraph [ref=e1649]:
        - text: "The call `np.einsum’ is doing what a real quantum-chemistry code does in its innermost loop. In production, the ERI tensor is recomputed on the fly and never stored; this is the"
        - emphasis [ref=e1650]: direct SCF
        - text: trick we will examine in section 3.8. >
        - strong [ref=e1651]: Warning.
        - text: Plain density mixing is enough for stable
      - blockquote [ref=e1652]:
