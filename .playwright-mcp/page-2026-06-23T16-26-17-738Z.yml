        - text: in disguise.
      - paragraph [ref=e13427]:
        - text: The naïve approach — use a
        - emphasis [ref=e13428]: non-local
        - text: Fock-like XC operator
        - img [ref=e13430]
        - text: — breaks the KS ansatz. The KS equations assume a
        - emphasis [ref=e13454]: one-body multiplicative
        - text: potential. Replacing it with an integral operator is a different theory (the
        - strong [ref=e13455]: generalised KS
        - text: or
        - strong [ref=e13456]: non-local-potential
        - text: DFT), and the spectral properties of the resulting equation are different.
      - paragraph [ref=e13457]:
        - text: The OEP method is the way to keep the
        - emphasis [ref=e13458]: local-potential
        - text: KS ansatz while using an
        - emphasis [ref=e13459]: orbital-dependent
        - text: functional.
      - heading "4.10.2 The OEP equation" [level=3] [ref=e13460]
