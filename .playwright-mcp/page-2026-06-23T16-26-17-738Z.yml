        - strong [ref=e17646]: Douglas–Kroll–Hess (DKH)
        - text: transformation, or the
        - strong [ref=e17647]: exact-2-component (X2C)
        - text: method, or the
        - strong [ref=e17648]: zeroth-order regular approximation (ZORA)
        - text: ) and only the positive-energy block is retained. The 2-component Hamiltonian has the Pauli structure of
        - img [ref=e17650]:
