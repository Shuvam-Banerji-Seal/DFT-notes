        - text: "**Step 1 — set-up.** The KS energy in a finite basis is where is a one-electron integral, the two-electron integral, and the nuclear–nuclear repulsion. The self-consistent solution is determined by the KS equation with the orthonormality constraint . **Step 2 — total derivative.** The chain rule gives **Step 3 — (B) vanishes at the SCF fixed point.** This is the Hellmann–Feynman part. The MO derivative is constrained by the orthonormality of the MOs. The first-order change in the constraint is . Multiplying the KS equation by and using the constraint, the MO-response term (B) reduces to , which exactly cancels the corresponding derivative in (A). The net effect is that **at the SCF fixed point, (B) is zero** — the orbitals are re-optimised at each and their response cancels the explicit derivative. The force is determined by (A) alone. **Step 4 — evaluate (A).** Differentiate each term of with respect to at fixed : In the **complete basis**, the basis-derivative is *orthogonal* to all functions in the basis (by completeness), so the integral derivatives reduce to derivatives of the **operators** alone. The one-electron integral derivative is , and the two-electron integral derivative is a derivative of (which is *zero* — the two-electron operator is independent of ). The XC functional derivative becomes , where vanishes in the complete basis. Collecting all three derivatives under the density integral and changing sign gives . **Step 5 — the Pulay correction in a finite basis.** When the basis is *not* complete, the basis-derivative is a function *in the same space as the basis*, and the matrix elements *do not* vanish. Carrying these through the calculation in Step 4 and using the KS eigenvalue equation to replace the one-electron piece, the residual basis-derivative term is exactly the **Pulay force** : The factor in the matrix element is the *Pulay operator*: it vanishes on the occupied space, and is non-zero on the *virtual* space. In a complete basis, the basis-derivative is purely virtual, and the matrix element is zero. In a finite basis, the basis-derivative has components inside the basis, and the Pulay term is non-zero. In a plane-wave basis the basis functions are *independent* of , so (each plane wave has no dependence), and the Pulay term vanishes."
