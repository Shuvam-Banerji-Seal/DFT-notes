        - text: ". The original statement in KS 1965 is on p. A1135, in the discussion of the correlation energy of a uniform electron gas:"
      - blockquote [ref=e19818]:
        - paragraph [ref=e19819]:
          - emphasis [ref=e19820]:
            - text: “The exchange and correlation contributions to the energy can be expressed in terms of the pair-correlation function. […] For any normal Fermi fluid the integral of the pair-correlation function over the coordinates of one particle, for fixed position of the other, is
            - img [ref=e19822]
            - text: .”
          - text: "[Kohn and Sham, 1965, p. A1135]"
      - paragraph [ref=e19829]:
        - text: In modern notation, the exchange–correlation hole
        - img [ref=e19831]
        - text: is defined by the coupling-constant integral [Gunnarsson and Lundqvist, 1976]
      - img [ref=e19856]
      - paragraph [ref=e19932]:
        - text: where
        - img [ref=e19934]
        - text: is the pair-distribution function of the
        - img [ref=e19943]
        - text: "-scaled system. The KS 1965 sum rule is the statement that"
      - img [ref=e19949]
      - paragraph [ref=e19991]:
        - text: i.e. the hole contains
        - emphasis [ref=e19992]: exactly one electron’s worth of missing charge
        - text: . This is sometimes called the “charge-neutrality sum rule” or, more colourfully, the “the hole always has one electron in it” rule [Almbladh and von Barth, 1985].
      - paragraph [ref=e19993]:
        - strong [ref=e19994]: Why the sum rule matters for modern XC theory.
        - text: The sum rule
        - img [ref=e19996]:
          - link [ref=e19999] [cursor=pointer]:
            - /url: "#"
        - text: is the constraint that
        - emphasis [ref=e20008]: every
        - text: approximation to
        - img [ref=e20010]
        - text: in the Jacob’s ladder of §4.5 must satisfy. The LDA satisfies it (because the uniform gas satisfies it). GGAs satisfy it
        - emphasis [ref=e20019]: approximately
        - text: — the gradient expansion of the LDA violates the sum rule at second order, and most GGA constructions recover it only at the cost of breaking other constraints (the trade-off documented in the PBE paper [Perdew, Burke, and Ernzerhof, 1996]). Hybrid functionals mix in a fraction of exact exchange, which
        - emphasis [ref=e20020]: automatically
        - text: satisfies the sum rule for the exchange part of the hole, but mixes in a GGA/LDA correlation that does not. RPA and the ACFDT (§4.9) satisfy the sum rule
        - emphasis [ref=e20021]: by construction
        - text: because the hole is computed from the full density–density response function [Harl and Kresse, 2008].
      - paragraph [ref=e20022]:
        - text: The sum rule was identified in the very first 1965 paper, as part of the
        - emphasis [ref=e20023]: justification
        - text: of the KS construction. The sum rule
        - img [ref=e20025]:
          - link [ref=e20028] [cursor=pointer]:
            - /url: "#"
        - text: is the
        - emphasis [ref=e20037]: physical reason
        - text: "that KS DFT works: the exchange–correlation energy is, up to a factor of"
        - img [ref=e20039]
        - text: ", the"
        - emphasis [ref=e20049]: Coulomb interaction of the density with its own hole
        - text: ", and the hole is always"
        - emphasis [ref=e20050]: normalised to one electron
        - text: .
      - heading "4.14.4 The self-interaction error" [level=3] [ref=e20051]
      - paragraph [ref=e20052]:
        - text: The
        - emphasis [ref=e20053]: self-interaction error
        - text: "(SIE) is the error made by every LDA/GGA XC functional: the Coulomb self-interaction of the density with itself is"
        - emphasis [ref=e20054]: "not exactly cancelle`d"
        - text: "’ by the exchange part. KS 1965 is the first paper to identify this problem, in the discussion of the universal functional following eq. (3):"
      - blockquote [ref=e20055]:
        - paragraph [ref=e20056]:
          - emphasis [ref=e20057]:
            - text: “An important requirement is that
            - img [ref=e20059]
            - text: should be free from self-interaction, i.e. in the case of a single electron the Hartree and exchange-correlation terms should cancel.”
          - text: "[Kohn and Sham, 1965, p. A1134]"
      - paragraph [ref=e20068]:
        - text: In modern notation, the requirement is that for a
        - emphasis [ref=e20069]: one-electron
        - text: density
        - img [ref=e20071]
        - text: ","
      - img [ref=e20103]
      - paragraph [ref=e20151]:
        - text: Every local or semi-local approximation (LDA, GGA, meta-GGA)
        - emphasis [ref=e20152]: violates
        - img [ref=e20154]:
          - link [ref=e20157] [cursor=pointer]:
            - /url: "#"
        - text: — typically by
        - img [ref=e20167]
        - text: –
        - img [ref=e20177]
        - text: eV per electron — because the
        - emphasis [ref=e20184]: approximate
        - img [ref=e20186]
        - text: reproduces the
        - emphasis [ref=e20201]: uniform-gas
        - text: limit and is not constrained to satisfy the one-electron limit [Perdew and Zunger, 1981].
      - paragraph [ref=e20202]:
        - strong [ref=e20203]: Why the SIE matters.
        - text: The SIE is
        - emphasis [ref=e20204]: not
        - text: a small effect for the properties that depend on the
        - emphasis [ref=e20205]: tails
        - text: of the density — the ionisation potential, the electron affinity, the dissociation limit of a molecule, the band gap, and the polarisability of an extended system. For atoms, the LDA ionisation potential is off by
        - img [ref=e20207]
        - text: –
        - img [ref=e20216]
        - text: ", the electron affinity is"
        - emphasis [ref=e20224]: positive
        - text: for most anions (the LDA predicts that no anion is bound), and the dissociation of H
        - img [ref=e20226]
        - text: in LDA gives an error of
        - img [ref=e20235]
        - text: eV. All of these failures are
        - emphasis [ref=e20242]: systematically
        - text: tied to the SIE. The
        - link "Perdew–Zunger self-interaction correction (SIC)" [ref=e20243] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
        - text: subtracts the SIE on an orbital-by-orbital basis and produces significantly improved atomisation energies and ionisation potentials.
      - paragraph [ref=e20244]:
        - strong [ref=e20245]: Why the SIE is hard to fix.
        - text: A functional that satisfies
        - img [ref=e20247]:
          - link [ref=e20250] [cursor=pointer]:
            - /url: "#"
        - text: for
        - emphasis [ref=e20259]: every
        - text: one-electron density is necessarily
        - emphasis [ref=e20260]: orbital-dependent
        - text: . The local and semi-local functionals of the Jacob’s ladder (§4.5) are
        - emphasis [ref=e20261]: pure density functionals
        - text: "; they cannot depend on the orbitals. The fix is to go up the ladder to hybrid functionals (rung 4: a fraction of exact exchange cures the SIE"
        - emphasis [ref=e20262]: for the occupied orbitals
        - text: but introduces a new error — the
        - emphasis [ref=e20263]: de-localisation error
        - text: "— for the virtual orbitals) or to OEP (rung 5: the OEP exchange potential is"
        - emphasis [ref=e20264]: self-interaction free
        - text: by construction [Sharp and Horton, 1953]; [Talman and Shadwick, 1976]; see §4.10 of this chapter).
      - blockquote [ref=e20265]:
        - paragraph [ref=e20266]:
          - strong [ref=e20267]: Tip.
          - text: The SIE is the
          - emphasis [ref=e20268]: "most-cite`d"
          - text: ’ failure of approximate DFT, and it is the most-cited reason to introduce orbital-dependent functionals, hybrid functionals, or DFT+U. But the
          - emphasis [ref=e20269]: original
          - text: observation — that
          - img [ref=e20271]
          - text: should be self-interaction free — is in KS 1965, p. A1134, one paragraph below eq. (3).
      - heading "4.14.5 What these papers don’t say" [level=3] [ref=e20280]
      - paragraph [ref=e20281]:
        - text: A faithful deep-dive has to be honest about what the two papers do
        - emphasis [ref=e20282]: not
        - text: contain. The original HK 1964 and KS 1965 papers are remarkably short, and almost every “DFT” in use today is a
        - emphasis [ref=e20283]: generalisation
        - text: "of what they describe. The omissions:"
      - list [ref=e20284]:
        - listitem [ref=e20285]:
          - strong [ref=e20286]: DFT for magnetic systems
          - text: (spin-polarised DFT, collinear and non-collinear). The HK 1964 paper explicitly restricts itself to
          - emphasis [ref=e20287]: "non-magneti`c"
          - text: ’ systems with a non-degenerate ground state [Hohenberg and Kohn, 1964, p. B864]. The spin-density generalisation is the [von Barth and Hedin, 1972] paper; the non-collinear generalisation is the [Kubler et al., 1988] papers.
        - listitem [ref=e20288]:
          - strong [ref=e20289]:
            - text: DFT+
            - img [ref=e20291]
            - text: for strongly-correlated electrons.
          - text: The transition-metal oxides (MnO, NiO, the parent compounds of cuprate superconductors) are described qualitatively incorrectly by the LDA — gap too small, magnetic moment too small, insulating character missed entirely. The DFT+
          - img [ref=e20297]
          - text: correction [Anisimov, Zaanen, and Andersen, 1991] adds an on-site Coulomb penalty to localised
          - img [ref=e20303]
          - text: or
          - img [ref=e20309]
          - text: orbitals; this is
          - emphasis [ref=e20314]: post-HK/KS
          - text: .
        - listitem [ref=e20315]:
          - strong [ref=e20316]: Time-dependent DFT.
          - text: All of HK 1964 and KS 1965 treats the
          - emphasis [ref=e20317]: ground state
          - text: . The response of the ground state to a time-dependent perturbation, and the resulting
          - emphasis [ref=e20318]: excited-state
          - text: properties, is the [Runge and Gross, 1984] theorem and the [Casida, 1995] formulation of TD-DFT. Modern TD-DFT is the workhorse of computational spectroscopy and is
          - emphasis [ref=e20319]: not
          - text: in HK 1964 or KS 1965.
        - listitem [ref=e20320]:
          - strong [ref=e20321]: Relativistic DFT.
          - text: The HK 1964 and KS 1965 papers use the non-relativistic Schrödinger equation. The Dirac–Kohn–Sham equations (§4.12), the spin–orbit coupling in DFT, and heavy-element DFT of the actinides, are the [Rajagopal and Callaway, 1973] and [MacDonald and Vosko, 1979] papers.
        - listitem [ref=e20322]:
          - strong [ref=e20323]: The Lieb functional and the Levy constrained search.
          - text: The v-representability assumption of HK 1964 was removed in [Levy, 1979] (constrained search over wavefunctions giving a density) and [Lieb, 1983] (the convex-analysis formulation).
        - listitem [ref=e20324]:
          - strong [ref=e20325]: Ensemble DFT and finite-temperature DFT.
          - text: The [Mermin, 1965] generalisation of HK to finite temperature replaces the ground state with a grand-canonical ensemble. The Mermin functional is the basis of finite-temperature DFT and of the thermal occupation smearing in metallic SCF.
        - listitem [ref=e20326]:
          - strong [ref=e20327]: Reduced-density-matrix functional theory (RDMFT).
          - text: A competitor to KS DFT that uses the
          - emphasis [ref=e20328]: one-body density matrix
          - img [ref=e20330]
          - text: rather than the density [Gilbert, 1975]; [Valone, 1980].
        - listitem [ref=e20350]:
          - strong [ref=e20351]: The pair-density formulation of XC.
          - text: The modern expression of
          - img [ref=e20353]
          - text: as a coupling-constant integral over the pair density (§4.9) is the [Gunnarsson and Lundqvist, 1976] and [Langreth and Perdew, 1977] papers. KS 1965 does
          - emphasis [ref=e20362]: not
          - text: use the pair-density language; it uses the more elementary language of the
          - emphasis [ref=e20363]: correlation energy of the uniform gas
          - text: .
      - blockquote [ref=e20364]:
        - paragraph [ref=e20365]:
          - strong [ref=e20366]: Note.
          - text: Every item on this list corresponds to at least one Nobel-prize-winning or Nobel-prize-nominated extension of the original HK/KS formulation. The two original papers are the
          - emphasis [ref=e20367]: trunk
          - text: ’; the extensions are the branches.
