      - group [ref=e18015]:
        - generic "▸ Show answer" [ref=e18016] [cursor=pointer]
        - text: "**Step 1 — the FW transformation.** Define the unitary operator with anti-Hermitian and chosen to block-diagonalise the Dirac Hamiltonian to the desired order in . At first order in , the transformed Hamiltonian is The choice to first order, with as the \"odd\" (off-diagonal) part of , gives to leading order, i.e. the Hamiltonian is block-diagonal. Continuing to second order in produces . **Step 2 — the kinetic relativistic term.** The leading correction to the upper-left block (positive-energy subspace) is . This comes from expanding to fourth order in . It is a *scalar* operator — it does not couple to the spin. **Step 3 — the Darwin term.** The term arises from the Zitterbewegung (rapid oscillation) of the electron around its mean position, which smears the electron–nucleus interaction over a region of size the reduced Compton wavelength . The Darwin term is non-zero only where — i.e. at nuclei with singular potentials and at other singularities of . For the Coulomb potential of a point charge , the Darwin term is a contact interaction proportional to . **Step 4 — the spin–orbit term.** The term arises from the magnetic field seen in the electron's rest frame when the electron is moving through the gradient of the electric potential. Write . For a *spherically symmetri`c*' potential , , and the cross product can be rewritten using (the angular-momentum operator) as Therefore the spin–orbit term is with . This is . For a hydrogenic atom , , and . The expectation value scales as in atomic units — the source of the scaling of the spin–orbit splitting that makes the spin–orbit term negligible for H, marginal for Si and Cu, and dominant for the and elements. **Step 5 — time reversal.** The time-reversal operator in spinor space is , where is complex conjugation. Under time reversal, (orbital reversal) and (spin reversal). Therefore — the spin–orbit operator is **even** under time reversal. This is the origin of the **Kramers degeneracy**: in the absence of an external magnetic field, every eigenstate of a system with half-integer total spin (and time-reversal-symmetric Hamiltonian) is at least *doubly degenerate*, with the two states related by time reversal. Kramers degeneracy is what makes the spin–orbit-split bands of a centrosymmetric crystal come in pairs rather than singlets."
