      - paragraph [ref=e17632]:
        - text: In practice 4-component relativistic DFT is used mostly in
        - strong [ref=e17633]: molecular Dirac–Fock / Dirac–KS codes
        - text: (DIRAC, ReSpect, Bertha, 4-component development versions of TURBOMOLE) and in solid-state codes that use the
        - strong [ref=e17634]: 4-component full-potential linearised augmented plane wave (FP-LAPW)
        - text: method (WIEN2k, Elk, FLEUR). The 4-component picture is essential when the spin–orbit coupling is large enough that the orbital energies and eigenfunctions are qualitatively different from the non- relativistic limit — for example, the
        - img [ref=e17636]
        - text: levels of the superheavy elements, where the spin–orbit splitting is comparable to the chemical-bond energy.
      - paragraph [ref=e17643]:
        - text: A common compromise is the
        - strong [ref=e17644]:
          - text: 2-component (or scalar + spin–orbit) relativisti
