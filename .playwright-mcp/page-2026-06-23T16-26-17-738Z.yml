          - text: ". URL: ["
          - link "https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864](https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864" [ref=e20376] [cursor=pointer]:
            - /url: https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864](https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864
