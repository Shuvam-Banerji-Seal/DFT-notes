      - heading "4.10.3 The KLI approximation" [level=3] [ref=e14249]
      - paragraph [ref=e14250]:
        - text: The full OEP equation
        - img [ref=e14252]:
          - link [ref=e14255] [cursor=pointer]:
            - /url: "#"
        - text: is expensive to solve and is ill-conditioned in the basis-set limit. The
        - strong [ref=e14264]: Krieger–Li–Iafrate (KLI) approximation
        - text: (Krieger, Li, Iafrate, 1992) replaces the full orbital shift
        - img [ref=e14266]
        - text: by an
        - emphasis [ref=e14271]: approximate
        - text: one that neglects the off-diagonal (in orbital index) contributions.
      - paragraph [ref=e14272]:
        - text: In the KLI approximation,
        - img [ref=e14274]
        - text: is replaced by its diagonal piece
      - img [ref=e14280]
      - paragraph [ref=e14370]:
        - text: "where $u_i(\\mathbf r) = \\delta E_\\text{xc} / \\delta \\phi_i^"
        - emphasis [ref=e14371]:
          - text: (\mathbf r)$ is the orbital shift. Substituting into
          - img [ref=e14373]:
            - link [ref=e14376] [cursor=pointer]:
              - /url: "#"
          - text: and using the completeness of the KS orbitals, the integral equation simplifies to a *closed-form
        - text: "expression for the OEP potential:"
      - img [ref=e14386]
      - paragraph [ref=e14508]:
        - text: where
        - img [ref=e14510]
        - text: is the orbital-average of the shift and the constant is fixed by the gauge-fixing condition (e.g.
        - img [ref=e14550]
        - text: for finite systems, or the average potential in solids).
      - paragraph [ref=e14576]:
        - text: The KLI approximation has the great virtue of
        - emphasis [ref=e14577]: not
        - text: "requiring the solution of an integral equation: the potential is computed directly from the orbitals and the orbital shifts, at a cost comparable to the Fock exchange itself. In a finite basis it costs"
        - img [ref=e14579]
        - text: (the Fock-exchange cost) plus a small diagonal overhead. It captures most of the physics of the full OEP and is the
        - emphasis [ref=e14594]: de facto
        - text: standard in production codes that need orbital-dependent XC.
      - blockquote [ref=e14595]:
        - paragraph [ref=e14596]:
          - strong [ref=e14597]: Note.
          - text: The KLI approximation is
          - emphasis [ref=e14598]: not
          - text: "a functional: it is a"
          - emphasis [ref=e14599]: prescription
          - text: for the local potential that the orbital-dependent functional
          - emphasis [ref=e14600]: "woul`d"
          - text: ’ produce if the OEP integral equation could be solved. The two differ by the
          - emphasis [ref=e14601]: off-diagonal
          - text: orbital contributions, which are typically small for “well-behaved” systems but can be a few percent of
          - img [ref=e14603]
          - text: in transition-metal atoms with near-degenerate
          - img [ref=e14613]
          - text: shells.
      - heading "4.10.4 Exact exchange in OEP" [level=3] [ref=e14618]
      - paragraph [ref=e14619]:
        - text: The most-used orbital-dependent functional is the
        - strong [ref=e14620]: exact exchange
        - text: (EXX),
      - img [ref=e14622]
      - paragraph [ref=e14764]:
        - text: The orbital shift
        - img [ref=e14766]
        - text: is the
        - strong [ref=e14809]: Fock exchange operator acting on
        - img [ref=e14811]
        - text: ","
      - img [ref=e14820]
      - paragraph [ref=e14946]:
        - text: The Fock operator is
        - emphasis [ref=e14947]: non-local
        - text: ": its action on"
        - img [ref=e14949]
        - text: at
        - img [ref=e14958]
        - text: depends on
        - img [ref=e14965]
        - emphasis [ref=e14973]: everywhere
        - text: . To use EXX in a local KS potential, we must run the OEP procedure.
      - paragraph [ref=e14974]:
        - text: In the
        - strong [ref=e14975]: EXX-OEP
        - text: method,
        - img [ref=e14977]
        - text: is inserted into
        - img [ref=e15007]:
          - link [ref=e15010] [cursor=pointer]:
            - /url: "#"
        - text: (or the full OEP integral) and the resulting
        - img [ref=e15020]
        - text: is the
        - emphasis [ref=e15040]: local
        - text: "potential that reproduces the exact exchange energy. The result is a KS calculation with:"
      - list [ref=e15041]:
        - listitem [ref=e15042]: The exact Fock exchange energy of the Slater determinant.
        - listitem [ref=e15043]: A local multiplicative KS potential (the OEP).
        - listitem [ref=e15044]: Self-interaction-free orbital energies.
      - paragraph [ref=e15045]:
        - text: The last point is the most useful. In ordinary LDA/GGA, each occupied orbital feels an
        - emphasis [ref=e15046]: unphysical
        - text: "self-interaction correction: the Hartree term counts the electron’s Coulomb interaction with itself, and the LDA/GGA XC correction does not fully cancel it. The “self-interaction error” is the residual, and it shows up as:"
      - list [ref=e15047]:
        - listitem [ref=e15048]:
          - text: Wrong dissociation limits of molecules (H
          - img [ref=e15050]
          - text: does not dissociate correctly in LDA).
        - listitem [ref=e15058]: Wrong polarisabilities of anions.
        - listitem [ref=e15059]: Underestimation of band gaps.
      - paragraph [ref=e15060]:
        - text: In EXX-OEP, the Fock exchange
        - emphasis [ref=e15061]: exactly
        - text: cancels the Hartree self-interaction for every orbital. The resulting
        - img [ref=e15063]
        - text: has a
        - emphasis [ref=e15076]: derivative discontinuity
        - text: (the KS gap is
        - emphasis [ref=e15077]: not
        - text: the fundamental gap), and the orbital energies are self-interaction-free.
      - blockquote [ref=e15078]:
        - paragraph [ref=e15079]:
          - strong [ref=e15080]: Tip.
          - text: EXX-OEP is conceptually the
          - emphasis [ref=e15081]: cleanest
          - text: realisation of exact exchange in DFT. In practice, it costs the same as a hybrid functional but delivers self-interaction-free orbital energies and the
          - emphasis [ref=e15082]: exact
          - img [ref=e15084]
          - text: . The KLI approximation is good to
          - img [ref=e15093]
          - text: in
          - img [ref=e15113]
          - text: for atoms and small molecules — adequate for most purposes.
      - heading "4.10.5 Why OEP matters" [level=3] [ref=e15122]
      - paragraph [ref=e15123]: Three reasons the OEP is worth knowing.
      - list [ref=e15124]:
        - listitem [ref=e15125]:
          - strong [ref=e15126]: Self-interaction-free orbital energies.
          - text: OEP-based functionals (EXX, OEP-MP2, OEP-RPA) give orbital energies that are
          - emphasis [ref=e15127]: not
          - text: contaminated by the self-interaction error of LDA/GGA. The band gaps, the core-level shifts, and the response properties are correspondingly better.
        - listitem [ref=e15128]:
          - strong [ref=e15129]: The natural setting for orbital-dependent functionals.
          - text: Any functional that is “naturally” written in terms of the KS orbitals — DFT+
          - img [ref=e15131]
          - text: ", hybrid functionals on top of a non-local kernel, screened exchange, MP2, RPA — can be cast as an OEP. The local potential that the OEP produces is the"
          - emphasis [ref=e15136]: only
          - text: correct KS potential for that functional.
        - listitem [ref=e15137]:
          - strong [ref=e15138]: The cost-quality frontier.
          - text: OEP-based methods are typically
          - emphasis [ref=e15139]: cheaper
          - text: than hybrid functionals (KLI in particular) and more accurate* than LDA/GGA for properties that depend on the orbital energies. They occupy a useful middle ground in the cost-accuracy landscape.
      - paragraph [ref=e15140]:
        - text: The OEP is also the
        - emphasis [ref=e15141]: theoretical bridge
        - text: between Kohn–Sham DFT and
        - strong [ref=e15142]: generalised KS theory
        - text: ", in which the XC potential is allowed to be a non-local integral operator. The OEP says: “if your functional is orbital-dependent, here is the"
        - emphasis [ref=e15143]: local
        - text: potential that gives you the same orbitals and orbital energies as the non-local one would”. The OEP is the limit of the generalised KS theory in which the non-locality is
        - emphasis [ref=e15144]: "eliminate`d"
        - text: ’ by an integral transformation.
      - heading "4.11 Görling–Levy perturbation theory" [level=2] [ref=e15145]
      - paragraph [ref=e15146]:
        - text: The third formal pillar of modern DFT is the
        - strong [ref=e15147]: Görling–Levy (GL) perturbation theory
        - text: (Görling & Levy, 1993, 1994, 1995). It is a systematic expansion of the XC energy in powers of the deviation of the
        - emphasis [ref=e15148]: density
        - text: from a reference density, and it is the only perturbation theory that
        - emphasis [ref=e15149]: simultaneously
        - text: (a) preserves the KS structure and (b) reproduces the exact KS eigenvalues order by order.
      - heading "4.11.1 The XC potential as a functional derivative" [level=3] [ref=e15150]
      - paragraph [ref=e15151]:
        - text: The XC potential of section 4.2 is the
        - emphasis [ref=e15152]: functional derivative
        - text: "of the XC energy with respect to the density:"
      - img [ref=e15154]
      - paragraph [ref=e15197]:
        - text: Equation
        - img [ref=e15199]:
          - link [ref=e15202] [cursor=pointer]:
            - /url: "#"
        - text: is the
        - emphasis [ref=e15211]: formal
        - text: definition; for LDA/GGA the functional derivative is a local function of
        - img [ref=e15213]
        - text: and its derivatives and can be evaluated by the chain rule. For
        - emphasis [ref=e15218]: orbital-dependent
        - text: functionals (EXX, MP2, RPA), the chain rule requires the response of the orbitals to a change in the density, and the derivative is no longer local — this is the OEP problem of §4.10. Görling and Levy’s contribution is a
        - emphasis [ref=e15219]:
          - text: thir
          - code [ref=e15220]: "d*' way: instead of working with orbital-dependent functionals directly, they **expand $E_\\text{xc}$ in powers of the density perturbation** around a uniform reference, and they show that the expansion can be *systematically rearrange"
          - text: d
        - text: ’ so that each order produces a well-defined local
        - img [ref=e15222]
        - text: .
      - heading "4.11.2 The coupling-constant perturbation theory" [level=3] [ref=e15238]
      - paragraph [ref=e15239]:
        - text: Start with a
        - emphasis [ref=e15240]: reference
        - text: density
        - img [ref=e15242]
        - text: and consider a small perturbation
        - img [ref=e15258]
        - text: . The XC energy admits a Taylor expansion in
        - img [ref=e15298]
        - text: ":"
      - img [ref=e15306]
      - paragraph [ref=e15478]:
        - text: The coefficients are the functional derivatives of
        - img [ref=e15480]
        - text: evaluated at
        - img [ref=e15490]
        - text: ":"
      - paragraph [ref=e15498]:
        - text: "\\begin{align} v_\\text{xc}^{(1)}"
        - link "\\rho_0" [ref=e15499] [cursor=pointer]:
          - /url: \mathbf r
        - text: "&= \\frac{\\delta E_\\text{xc}}{\\delta \\rho(\\mathbf r)} \\bigg|"
        - emphasis [ref=e15500]: "{\\rho_0} ,\\f"
        - text: "\\text{xc}^{(2)}"
        - link "\\rho_0" [ref=e15501] [cursor=pointer]:
          - /url: \mathbf r, \mathbf r'
        - text: "&= \\frac{\\delta^2 E_\\text{xc}}{\\delta \\rho(\\mathbf r)\\, \\delta \\rho(\\mathbf r’)} \\bigg|_{\\rho_0} . \\end{align}"
      - paragraph [ref=e15502]:
        - text: The first functional derivative is the XC potential at
        - img [ref=e15504]
        - text: ", the second is the"
        - strong [ref=e15512]: XC kernel
        - text: . Higher-order kernels exist in principle but are rarely used in practice.
      - paragraph [ref=e15513]:
        - text: For the
        - strong [ref=e15514]: homogeneous electron gas
        - text: (HEG), the reference is the uniform density
        - img [ref=e15516]
        - text: ", and the expansion becomes a Taylor expansion in the Fourier components of"
        - img [ref=e15544]
        - text: . The zeroth-order term is the HEG XC energy density, the first-order term vanishes by translational invariance, the second-order term is the
        - strong [ref=e15551]: Lindhard function
        - img [ref=e15553]
        - text: of the HEG.
      - paragraph [ref=e15568]:
        - text: The HEG expansion is the
        - strong [ref=e15569]: only case in which the GL perturbation theory converges term-by-term in closed form
        - text: . For non-uniform systems, the expansion is *asymptoti
        - code [ref=e15570]: c*
        - text: ": each term can be evaluated, but the series does not converge in the mathematical sense. The art of building a “rung” of Jacob’s ladder is to truncate the GL series at the order that gives the best balance of accuracy and cost."
      - heading "4.11.3 The Görling–Levy “shuffle”" [level=3] [ref=e15571]
      - paragraph [ref=e15572]:
        - text: The naive expansion
        - img [ref=e15574]:
          - link [ref=e15577] [cursor=pointer]:
            - /url: "#"
        - text: has a problem. The first-order term
        - img [ref=e15587]
        - text: is the XC potential of the
        - emphasis [ref=e15612]: reference
        - text: system, not of the target system. The orbital energies of the
        - emphasis [ref=e15613]: target
        - text: KS Hamiltonian, computed with
        - img [ref=e15615]
        - text: ", do not in general match the orbital energies of the"
        - emphasis [ref=e15640]: target
        - text: system.
      - paragraph [ref=e15641]:
        - text: Görling and Levy’s key insight is a
        - strong [ref=e15642]: shuffle
        - text: ": the perturbation series is reorganised order by order so that the"
        - emphasis [ref=e15643]: zeroth-order
        - text: Hamiltonian is the
        - emphasis [ref=e15644]: target
        - text: KS Hamiltonian, and the higher-order terms are corrections. Concretely, write the target density as
        - img [ref=e15646]
        - text: and the
        - emphasis [ref=e15664]: target
        - text: KS potential as
        - img [ref=e15666]
        - text: ", and expand:"
      - img [ref=e15690]
      - paragraph [ref=e15795]:
        - text: where
        - img [ref=e15797]
        - text: is the
        - emphasis [ref=e15830]: target
        - text: KS potential at the
        - emphasis [ref=e15831]: reference
        - text: density, and the higher-order terms are the
        - emphasis [ref=e15832]: corrections
        - text: that bring the potential up to the target. At each order, the
        - emphasis [ref=e15833]: target
        - text: "KS eigenvalues are reproduced exactly:"
      - img [ref=e15835]:
        - generic [ref=e15837]:
          - img [ref=e15855]
          - img [ref=e15900]
      - paragraph [ref=e15912]:
        - text: The shuffle is a
        - emphasis [ref=e15913]: bookkeeping
        - text: device that re-shuffles the perturbation series so that the
        - emphasis [ref=e15914]: physical
        - text: KS eigenvalues are the zeroth-order quantities. The corrections
        - img [ref=e15916]
        - text: for
        - img [ref=e15933]
        - text: are
        - emphasis [ref=e15942]: auxiliary
        - text: — they do not change the eigenvalues, only the
        - emphasis [ref=e15943]: wavefunctions
        - text: and the total energy.
      - paragraph [ref=e15944]:
        - text: "The practical consequence: in a GL perturbation theory, the"
        - strong [ref=e15945]: KS eigenvalues are exact at every order
        - text: ", by construction. This is the property that makes GL perturbation theory the"
        - emphasis [ref=e15946]: only
        - text: DFT perturbation theory that respects the KS structure at every order.
      - heading "4.11.4 Why this matters for the Jacob’s ladder of XC functionals" [level=3] [ref=e15947]
      - paragraph [ref=e15948]:
        - text: The GL perturbation theory is the
        - strong [ref=e15949]: unifying language
        - text: of the “Jacob’s ladder” introduced in section 4.5. Each rung is a different
        - emphasis [ref=e15950]: truncation
        - text: "of the GL series:"
      - list [ref=e15951]:
        - listitem [ref=e15952]:
          - strong [ref=e15953]: LDA
          - text: ": zeroth-order term of the GL expansion around the"
          - emphasis [ref=e15954]: uniform
          - text: gas, evaluated on the local density. No density-derivative information is kept.
        - listitem [ref=e15955]:
          - strong [ref=e15956]: GGA
          - text: ": add the"
          - emphasis [ref=e15957]: first-order
          - text: term in
          - img [ref=e15959]
          - text: . The kernel is the gradient-expansion coefficient of the HEG, evaluated on the local density
          - emphasis [ref=e15966]: "an`d"
          - text: ’ its gradient.
        - listitem [ref=e15967]:
          - strong [ref=e15968]: Meta-GGA
          - text: ": add the"
          - emphasis [ref=e15969]: second-order
          - text: term in
          - img [ref=e15971]
          - text: and the
          - emphasis [ref=e15978]: zeroth-order
          - text: term in the KS kinetic-energy density
          - img [ref=e15980]
          - text: . The meta-GGA is the
          - emphasis [ref=e15985]: third
          - text: ’ rung because it includes the one non-local piece of information that the LDA + GGA cannot reach.
        - listitem [ref=e15986]:
          - emphasis [ref=e15987]:
            - text: "*Hybri"
            - code [ref=e15988]: "d**: add the full* $\\lambda = 0$ value of the ISI of the ACFDT (§4.9) — i.e. the exact exchange of \\eqref{eq:ch-04-9-exact-exchange}. The hybrid is a GL perturbation theory in which the *integran"
            - text: d
          - text: ’ of the ACFDT is approximated, not the XC energy density directly.
        - listitem [ref=e15989]:
          - strong [ref=e15990]: Range-separated hybrid
          - text: ": separate the ACFDT integrand into a short-range DFT piece and a long-range exact-exchange piece. This is a"
          - emphasis [ref=e15991]: decomposition
          - text: of the ACFDT, not a new GL order.
        - listitem [ref=e15992]:
          - strong [ref=e15993]: "Double hybri`d"
          - text: ": add the first-order* correlation correction to the GL series. The MP2-like term"
          - img [ref=e15995]:
            - link [ref=e15998] [cursor=pointer]:
              - /url: "#"
          - text: is the
          - emphasis [ref=e16007]: first
          - text: correction to the
          - img [ref=e16009]
          - text: ACFDT integrand.
        - listitem [ref=e16018]:
          - strong [ref=e16019]: RPA
          - text: ": sum the"
          - emphasis [ref=e16020]: infinite
          - text: GL series for the correlation part, in the
          - emphasis [ref=e16021]: ring-diagram
          - text: approximation. The RPA is GL perturbation theory to all orders, in a specific (uniform) limit.
      - blockquote [ref=e16022]:
        - paragraph [ref=e16023]:
          - strong [ref=e16024]: Tip.
          - text: The GL perturbation theory is the
          - emphasis [ref=e16025]: only
          - text: framework in which every rung of Jacob’s ladder is a
          - emphasis [ref=e16026]: "well-define`d"
          - text: ’ truncation of a single, exact expansion. This is why “higher rung = more physics” is a
          - emphasis [ref=e16027]: consistent
          - text: statement in DFT, not a heuristic one.
      - paragraph [ref=e16028]:
        - text: The next chapter (
        - link "chapter 05" [ref=e16029] [cursor=pointer]:
