          - strong [ref=e17676]: Note.
          - text: In a
          - emphasis [ref=e17677]: pseudopotential
          - text: code the choice between SR, scalar + SO, and full-relativistic pseudopotentials is a
          - emphasis [ref=e17678]: generation-time
