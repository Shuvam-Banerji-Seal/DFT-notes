      - heading "4.13.1 Worked example — DIIS convergence on a 2×2 model" [level=3] [ref=e17788]
      - paragraph [ref=e17789]: "The companion script `dft_notes/python_codes/chapter_04/01-diis-scf.py’ implements a minimal KS-SCF on a 2×2 toy Hamiltonian and compares three acceleration schemes: linear mixing, DIIS, and Broyden. The model is"
      - img [ref=e17791]:
