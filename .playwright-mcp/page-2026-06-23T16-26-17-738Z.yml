        - text: self-consistently with the external potential replaced by the KS effective potential. The KS orbitals are 4-component spinors; the density is a
        - img [ref=e17622]
        - text: matrix in spinor space, summed over occupied states; the exchange–correlation energy is taken to be the
        - emphasis [ref=e17631]: same
