      - heading "4.13.3 What we left out" [level=3] [ref=e20523]
      - paragraph [ref=e20524]: "This chapter is the longest in the book so far, and still incomplete. The most important omissions:"
      - list [ref=e20525]:
        - listitem [ref=e20526]:
          - strong [ref=e20527]:
            - text: DFT+
            - img [ref=e20529]
            - text: and hybrid functionals as initial guesses for magnetic systems.
          - text: For strongly-correlated transition-metal oxides the LSDA gets the gap and the magnetic moment qualitatively wrong; the
          - strong [ref=e20534]:
            - text: DFT+
            - img [ref=e20536]
          - text: method (Anisimov, Zaanen, Andersen 1991) adds an on-site Coulomb correction to a chosen set of localised orbitals. We did not derive it.
        - listitem [ref=e20541]:
          - strong [ref=e20542]: The PAW formalism and the augmentation theorem.
          - text: The projector-augmented wave method (Blöchl, 1994) is the standard way to combine an all-electron description of the core with a plane-wave valence treatment. We mentioned it in passing in 4.12.4; a full treatment belongs in
          - link "chapter 08" [ref=e20543] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: (pseudopotentials).
        - listitem [ref=e20544]:
          - strong [ref=e20545]: The multiplet structure of correlated ions.
          - text: An open
          - img [ref=e20547]
          - text: or
          - img [ref=e20553]
          - text: shell has an atomic multiplet structure that LSDA smears out. Methods like
          - strong [ref=e20558]: DFT+DMFT
          - text: (dynamical mean-field theory) restore the multiplet physics on top of a KS starting point. Out of scope.
        - listitem [ref=e20559]:
          - strong [ref=e20560]: Non-collinearity beyond LSDA.
          - text: A
          - emphasis [ref=e20561]: proper
          - text: non-collinear XC functional would distinguish between
          - img [ref=e20563]
          - text: dependence, not just
          - img [ref=e20586]
          - text: . Such functionals exist (Krieger, Perdew, et al.) but are not in wide use; we did not discuss them.
        - listitem [ref=e20596]:
          - strong [ref=e20597]: Time-dependent DFT (TD-DFT).
          - text: All of this chapter treated the
          - emphasis [ref=e20598]: ground state
          - text: . The response of the ground state to a time-dependent perturbation — and the resulting excited-state properties (absorption, fluorescence, etc.) — is the subject of TD-DFT, which we will return to in a later chapter.
        - listitem [ref=e20599]:
          - strong [ref=e20600]: Ensemble DFT and finite-temperature KS.
          - text: The Mermin–Kohn–Sham extension of Hohenberg–Kohn to finite temperature replaces the ground state with a grand-canonical ensemble. It is the natural starting point for DFT descriptions of warm dense matter and for the occupation-smearing tricks used in metallic SCF.
        - listitem [ref=e20601]:
          - strong [ref=e20602]: The Lieb functional and the KS system as a constrained minimisation.
          - text: The form of the KS potential as the
          - emphasis [ref=e20603]: minimiser
          - text: of the Levy–Lieb functional is a beautiful piece of mathematics that we did not do justice to.
        - listitem [ref=e20604]:
          - strong [ref=e20605]: Reduced density-matrix functional theory (RDMFT).
          - text: A competitor to KS DFT that uses the one-body density matrix rather than the density. Out of scope.
      - blockquote [ref=e20606]:
        - paragraph [ref=e20607]:
          - text: "Next:"
          - link "chapter 05" [ref=e20608] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: — the practical zoo of XC functionals, and how to pick one.
