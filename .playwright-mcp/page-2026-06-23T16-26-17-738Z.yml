      - group [ref=e18011]:
        - generic "▸ Show answer" [ref=e18012] [cursor=pointer]
        - text: "**Step 1 — the extended HK theorem.** The original Hohenberg–Kohn theorem (section 4.1) says that the external potential is a unique functional of the ground-state density , for systems with a *fixe`d*' number of electrons and *no* magnetic field. Von Barth and Hedin (1972) extended the theorem to include a *static external magnetic fiel`d*' that couples to the electron spin via the Zeeman term (where ). In this case the Hamiltonian carries a *spin-dependent* potential and the *two* external fields are jointly determined by the two spin densities . Every observable becomes a functional of the spin-density pair. **Step 2 — the universal functional.** Following the same construction as in 4.1, define the *universal* spin-density functional and the total energy where is the magnetisation density along . The variational principle gives subject to the constraints . **Step 3 — introduce the KS reference.** As in 4.2, define a fictitious *non-interacting* system of two independent Fermi seas with the same spin densities. The kinetic energy becomes , computable from two sets of KS orbitals, and the remainder is the exchange–correlation functional **Step 4 — the LSDA approximation.** Assume the homogeneous electron gas (HEG) is a good *local* reference for the XC energy. A HEG with spin densities has the XC energy per particle , and the LSDA approximation is the local transcription **The assumption** is the *locality* of the XC hole: in a HEG, the exchange–correlation hole around an electron is a function of the *local* density, not of the density at distant points. This is a reasonable approximation for slowly-varying densities and a poor one for strongly-correlated or atomic-like systems. The parameterisation of comes from quantum Monte Carlo calculations of the HEG (Ceperley–Alder, 1980) and analytical fits (VWN, PW92, PBE). **Step 5 — the 2×2 KS equations.** Minimise subject to and the orthonormality of the MOs. The Euler–Lagrange equations give the chemical potential. Functional differentiation of with respect to gives the spin-dependent effective potential with . Two independent eigenvalue problems follow; each has its own set of occupied orbitals and eigenvalues, and the densities are reconstructed as . The factor of 2 in the spin-paired density (section 4.2) is replaced by 1 in each spin: . **Step 6 — what the magnetic field does.** The external magnetic field enters only as a *spin-up vs spin-down asymmetry* in the external potential. In its absence the two spin channels are *equivalent* (subject to the symmetry of the system); a non-zero breaks the symmetry and produces a non-zero . Note that the magnetic field is the *external* field; the internal field is a separate object that exists even in the absence of an external field and is responsible for spontaneous magnetisation in ferromagnets."
