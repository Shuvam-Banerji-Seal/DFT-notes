      - heading "Chapter 04 — Kohn–Sham DFT" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: Kohn–Sham DFT replaces an unknown
          - emphasis [ref=e30]: wavefunction
          - text: with an unknown
          - emphasis [ref=e31]: density functional
          - text: . The reformulation is exact; the approximation is the functional. The whole of modern DFT is the search for better functionals — and the search for better
          - emphasis [ref=e32]: solvers
          - text: for the equations they produce.
      - paragraph [ref=e33]:
        - text: This is the chapter in which the abstract “DFT exists” theorems of
        - link "chapter 02" [ref=e34] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-02/
        - text: "become a practical recipe. The recipe has four ingredients: a universal-looking energy expression whose unknown piece ("
        - img [ref=e36]
        - text: ) we approximate; a one-body Schrödinger equation for fictitious non-interacting orbitals; a self-consistent loop that ties the potential and the orbitals together; and a fixed-point solver (mixing, DIIS, Broyden, Kerker) that drives the loop home. We treat all four in turn. The first five sections (4.1–4.5) recall the canonical content; the next eight (4.6–4.13) are the extensions that turn the textbook KS equations into a tool that can be
        - emphasis [ref=e45]: implemented
        - text: ’ (§4.6 mixing), differentiated* (§4.7 forces),
        - emphasis [ref=e46]: spin-polarised
        - text: ’ (§4.8), formally grounded* (§4.9 ACFDT, §4.10 OEP, §4.11 Görling–Levy perturbation theory),
        - emphasis [ref=e47]: pushed into the heavy-element regime
        - text: (§4.12 relativistic KS), and
        - emphasis [ref=e48]: summarised
        - text: (§4.13 worked example + problems).
