      - blockquote [ref=e1202]:
        - paragraph [ref=e1203]:
          - strong [ref=e1204]: Warning.
          - text: It is tempting to read “DFT” as a mean-field theory like Hartree–Fock. It is not. The KS equations are
          - emphasis [ref=e1205]: exact
          - text: in the sense that the
          - emphasis [ref=e1206]: form
          - text: of the energy expression is exact; the value of
          - img [ref=e1208]
          - text: is approximate. Calling DFT a “mean-field theory” is the most common conceptual error in introductory DFT.
      - heading "4.4 The KS self-consistent loop" [level=2] [ref=e1217]
      - paragraph [ref=e1218]: "The KS equations have the same self-referential structure as HF: the potential depends on the orbitals, and the orbitals are eigenfunctions of the potential. The SCF procedure is identical in shape:"
      - code [ref=e1222]: "import numpy as np def ks_scf(H_core, eri, S, n_elec, v_xc, max_iter=100, tol=1e-7, mixing=0.3): \"\"\"Restricted KS-SCF in a non-orthogonal AO basis. H_core : (K, K) one-electron Hamiltonian eri : (K, K, K, K) electron-repulsion integrals S : (K, K) overlap matrix n_elec : int number of electrons v_xc : callable v_xc(rho_grid, density_matrix) -> F_xc on the grid \"\"\" K = H_core.shape[0] evals, C = np.linalg.eigh(H_core, S) P = 2 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T for it in range(max_iter): # Hartree potential J = np.einsum(\"pqrs,rs->pq\", eri, P) # Exchange–correlation potential, evaluated on the grid F_xc = v_xc(rho_grid=None, P=P) # signature depends on the XC code # Fock-like matrix F = H_core + J + F_xc evals, C = np.linalg.eigh(F, S) P_new = 2 * C[:, : n_elec // 2] @ C[:, : n_elec // 2].T dP = np.linalg.norm(P_new - P) P = (1 - mixing) * P + mixing * P_new if dP < tol: print(f\" Converged in {it + 1} iterations (ΔP = {dP:.2e})\") break E = 0.5 * np.trace(P @ (H_core + F)) return E, evals, C, P"
      - paragraph [ref=e1223]:
        - text: The structure is the same as HF; the only thing that changes is the
        - img [ref=e1225]
        - text: term being replaced by a local (in the DFT case) or semi-local (in the hybrid case)
        - img [ref=e1235]
        - text: contribution.
