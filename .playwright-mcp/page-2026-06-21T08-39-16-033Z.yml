      - blockquote [ref=e28]:
        - paragraph [ref=e29]: The Fock and Kohn–Sham operators live in an infinite-dimensional Hilbert space. We can only diagonalise finite matrices. A basis set is the bridge between the two — and the choice of bridge is what every practical DFT calculation rides on.
      - paragraph [ref=e30]:
        - text: By the end of
        - link "chapter 05" [ref=e31] [cursor=pointer]:
