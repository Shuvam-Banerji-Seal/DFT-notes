        - text: we had reduced the electronic-structure problem to a one-body eigenvalue equation for the Kohn–Sham (or Fock) orbitals. Both
        - img [ref=e33]
        - text: (
        - link "chapter 03" [ref=e59] [cursor=pointer]:
