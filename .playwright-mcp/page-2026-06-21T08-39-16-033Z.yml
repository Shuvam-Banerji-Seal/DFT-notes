        - text: ) and
        - img [ref=e61]
        - text: (
        - link "chapter 04" [ref=e91] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: ) are differential equations in
        - img [ref=e93]
        - text: whose unknown is a function. A computer cannot store a function; it can only store a finite array of numbers. The standard trick is to expand each orbital in a chosen,
        - strong [ref=e102]: finite
        - text: set of
        - img [ref=e104]
        - text: "known functions ${\\chi_\\mu}"
        - emphasis [ref=e109]:
          - text: "{\\mu=1}^K$ — the"
