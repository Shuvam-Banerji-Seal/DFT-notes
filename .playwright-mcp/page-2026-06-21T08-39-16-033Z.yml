          - strong [ref=e12094]: Diagonalise.
          - text: Standard plane-wave Roothaan–Hall with the
          - strong [ref=e12095]: non-local
          - text: projector-augmented-wave Hamiltonian operator
          - img [ref=e12097]
          - text: . Iterative diagonalisation (Davidson, RMM-DIIS, or block-Davidson) keeps the cost tractable.
        - listitem [ref=e12111]:
          - strong [ref=e12112]:
            - text: Update
            - img [ref=e12114]
            - text: .
          - text: Using the new
          - img [ref=e12128]
          - text: .
        - listitem [ref=e12140]:
          - strong [ref=e12141]: Loop 2–6
          - text: to self-consistency.
      - paragraph [ref=e12142]:
        - text: The “frozen” part of
        - img [ref=e12144]
        - text: (the core) is set in step 1 and never updated.
      - blockquote [ref=e12157]:
        - paragraph [ref=e12158]:
          - strong [ref=e12159]: Tip.
          - text: The
          - strong [ref=e12160]: PAW datasets
          - text: distributed with VASP / Quantum ESPRESSO are not just pseudopotentials — they contain the partial waves
          - emphasis [ref=e12161]: and
          - text: the projectors. Treating them as “potentials” and ignoring the reconstruction is a common source of confusion. The data file you load into a PAW code is a small, atom-type-specific data set (
          - img [ref=e12163]
          - text: –
          - img [ref=e12172]
          - text: radial functions per atom type) that defines the augmentation sphere, the partial waves, and the projectors.
      - heading "6.16 What we left out (updated)" [level=2] [ref=e12178]
      - paragraph [ref=e12179]: "The original “what we left out” in section 6.12 still applies, but the three new sections 6.13–6.15 bring their own omissions:"
      - list [ref=e12180]:
        - listitem [ref=e12181]:
          - strong [ref=e12182]: Linear-scaling NAO.
          - text: SIESTA’s
          - img [ref=e12184]
          - text: mode exploits the sparsity of the density matrix in an atom-centred basis; we have not derived the divide-and- conquer or Fermi-operator expansion methods that make this work. See
          - link "chapter 10" [ref=e12196] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: for the linear-scaling toolkit.
        - listitem [ref=e12197]:
          - strong [ref=e12198]: Adaptive finite elements.
          - text: FEniCS-based DFT codes use
          - emphasis [ref=e12199]: unstructured
          - text: tetrahedral meshes with adaptive refinement, a generalisation of the B-spline idea; we touched on it only in passing.
        - listitem [ref=e12200]:
          - strong [ref=e12201]: LAPW / APW+lo.
          - text: The linearised augmented plane wave basis (used by FLEUR, Wien2k) is a
          - emphasis [ref=e12202]: different
          - text: augmentation of the plane-wave basis, with energy-linearised partial waves at fixed energy
          - img [ref=e12204]
          - text: and “local orbitals” for energy flexibility. PAW is formally equivalent in the limit of large partial-wave sets, but the implementation is different and worth comparing. We did not.
        - listitem [ref=e12212]:
          - strong [ref=e12213]: The ultrasoft pseudopotential limit of PAW.
          - text: In the limit that the augmentation sphere shrinks to zero and the partial-wave set collapses to a single function, the PAW transformation reduces to an
          - strong [ref=e12214]: ultrasoft pseudopotential
          - text: (Vanderbilt 1990) — a connection worked out in
          - link "chapter 08" [ref=e12215] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: .
        - listitem [ref=e12216]:
          - strong [ref=e12217]: Wavelet basis sets for molecules.
          - text: The
          - img [ref=e12219]
          - text: wavelet DFT codes (BigDFT, ORCHID) combine the wavelet basis with density-matrix purification; we did not derive the purification step.
        - listitem [ref=e12231]:
          - strong [ref=e12232]: Spin–orbit coupling in the PAW augmentation.
          - text: For heavy elements (
          - img [ref=e12234]
          - text: ) the PAW partial waves must be computed in a relativistic framework (the Dirac equation rather than the Schrödinger equation), and the augmentation charges contain a
          - img [ref=e12245]
          - text: "-dependent contribution. We used the scalar-relativistic approximation throughout."
