      - paragraph [ref=e6112]:
        - text: The decision in the top-left box is the one a practitioner spends most of their time on. Atom-centred Gaussians dominate finite-molecule chemistry; plane waves dominate solid-state physics; real-space grids are a niche favoured for parallelisation and for systems where the periodicity assumption is awkward. All three feed the
        - emphasis [ref=e6113]: same
        - text: self-consistent loop and, in the basis-set limit, give the
        - emphasis [ref=e6114]: same
        - text: answer.
      - heading "6.11 Problems" [level=2] [ref=e6115]
