        - text: ". The key piece is the contracted-integral helper and the SCF update:"
      - code [ref=e5882]: "def contracted_eri(aA, dA, aB, dB, aC, dC, aD, dD, RA, RB, RC, RD): \"\"\"Two-electron integral (AB|CD) in chemists' notation.\"\"\" eri = 0.0 rAB2 = float(np.sum((RA - RB) ** 2)) rCD2 = float(np.sum((RC - RD) ** 2)) for ai, di in zip(aA, dA): for bj, ej in zip(aB, dB): P = (ai * RA + bj * RB) / (ai + bj) for ck, fk in zip(aC, dC): for dl, gl in zip(aD, dD): Q = (ck * RC + dl * RD) / (ck + dl) rPQ2 = float(np.sum((P - Q) ** 2)) eri += (di * ej * fk * gl * norm_s(ai) * norm_s(bj) * norm_s(ck) * norm_s(dl) * prim_eri(ai, bj, ck, dl, rAB2, rCD2, rPQ2)) return eri # ... in main() ... for it in range(64): J = np.einsum(\"pqrs,rs->pq\", ERI, P) Kx = np.einsum(\"prqs,rs->pq\", ERI, P) F = Hcore + J - 0.5 * Kx evals, C = eigh(F, S) P_new = 2.0 * np.outer(C[:, 0], C[:, 0]) if abs(E_elec - E_prev) < 1e-10: break P, E_prev = P_new, E_elec"
