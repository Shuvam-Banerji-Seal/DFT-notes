      - heading "6.12 What we left out" [level=2] [ref=e6128]
      - paragraph [ref=e6129]: "This chapter scratched the surface of basis-set design. Some of what we skipped:"
      - list [ref=e6130]:
        - listitem [ref=e6131]:
          - strong [ref=e6132]: Basis-set superposition error (BSSE).
          - text: When two fragments are computed in the
          - emphasis [ref=e6133]: union
          - text: of their atomic bases, each fragment can use functions centred on the other to artificially lower its own energy. The standard fix is the
          - strong [ref=e6134]: counterpoise correction
          - text: (Boys & Bernardi 1970). We ignored it.
        - listitem [ref=e6135]:
          - strong [ref=e6136]: Numerical atom-centred orbitals.
          - text: Codes like SIESTA, DMol3, and FHI-aims use
          - emphasis [ref=e6137]: numerically tabulated
          - text: atomic orbitals — a third family between Gaussians and plane waves — that are systematically improvable like Gaussians but carry no contraction-fitting error. We did not discuss them.
        - listitem [ref=e6138]:
          - strong [ref=e6139]: Resolution-of-the-identity / density-fitting.
          - text: The ERI tensor
          - img [ref=e6141]
          - text: is the bottleneck of every Gaussian SCF. Density-fitting (DF / RI) approximates it as a product of three-centre integrals over an auxiliary basis, reducing storage from
          - img [ref=e6160]
          - text: to
          - img [ref=e6176]
          - text: . Standard in every production code; out of scope here.
        - listitem [ref=e6191]:
          - strong [ref=e6192]: Effective-core potentials (ECPs) and relativistic contractions.
          - text: For heavy elements (
          - img [ref=e6194]
          - text: ) the inner-shell electrons demand a relativistic treatment and a basis tuned for it. We will revisit this in
          - link "chapter 08" [ref=e6204] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: in the pseudopotential context.
        - listitem [ref=e6205]:
          - strong [ref=e6206]: Wavelets and B-splines.
          - text: Multiresolution and finite- element methods (BigDFT, FHI-aims’ NAOs) avoid the uniform-grid Nyquist limit and are increasingly relevant for large molecules. We mentioned them in passing only.
      - blockquote [ref=e6207]:
        - paragraph [ref=e6208]:
          - text: "Next:"
          - link "chapter 07" [ref=e6209] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: "— Bloch’s theorem and the Brillouin zone: how plane waves and"
          - img [ref=e6211]
          - text: "-points combine to handle infinite periodic solids."
      - heading "6.13 Numerical atomic orbitals (NAOs)" [level=2] [ref=e6216]
      - paragraph [ref=e6217]:
        - text: The basis sets of sections 6.3–6.6 (STO-nG, Pople, Dunning) are all
        - strong [ref=e6218]: analytic
        - text: ": every function in the basis is known in closed form as a sum of Gaussians. An alternative, used by"
        - strong [ref=e6219]: SIESTA
        - text: (linear-scaling DFT),
        - strong [ref=e6220]: FHI-aims
        - text: (numeric all-electron), and the partial-wave construction of
        - strong [ref=e6221]: PAW
        - text: (section 6.15), is to
        - strong [ref=e6222]: tabulate
        - text: each basis function numerically on a radial grid. The basis functions are still atom-centred and angular-momentum- resolved, but the
        - strong [ref=e6223]: radial part
        - text: is a numerical solution of a one-particle Schrödinger equation — there are no contraction coefficients and no least-squares fitting error. The price is that the integrals are not analytical; they are evaluated by quadrature on the same radial grid the orbital was defined on.
