          - text: The wavefunction-based methods form a
          - emphasis [ref=e101]: ladder
          - text: in which the cost grows as a power of the basis size
          - img [ref=e103]
          - text: and the accuracy grows with that cost. Hartree–Fock (
          - link "chapter 03" [ref=e108] [cursor=pointer]:
