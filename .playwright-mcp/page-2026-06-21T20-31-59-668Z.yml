      - heading "Cross-chapter problem set A — From Schrödinger to pseudopotentials (chapters 01, 03, 04, 08)" [level=2] [ref=e18934]
      - paragraph [ref=e18935]:
        - text: "This multi-part problem walks the reader through the chain of approximations that turns the all-electron Schrödinger equation of a many-electron atom into a smooth valence-only pseudopotential. The chain is: H atom (analytical) → Hartree–Fock (many-electron, all-electron) → Kohn–Sham DFT (many-electron, all-electron, with approximate xc) → pseudopotential (valence-only, smooth). The system is"
        - strong [ref=e18936]: lithium
        - text: (
        - img [ref=e18938]
        - text: ","
        - img [ref=e18948]
        - text: ), the prototypical
        - emphasis [ref=e18965]: one-valence-electron
        - text: atom for which the pseudopotential approximation is exact in the limit of a frozen
        - img [ref=e18967]
        - text: core.
      - group [ref=e18974]:
        - generic "▸ Part 1 (chapter 01) — The hydrogenic 2s orbital" [ref=e18975] [cursor=pointer]
        - text: "Treat the valence electron of Li as a *hydrogeni`c*' orbital in an effective nuclear charge (the core screens two of the three nuclear protons). Write down the radial wavefunction and the energy . Estimate by the **Slater rules** and compare with the all-electron Kohn–Sham value . Why is the node of the hydrogenic (at ) \"deep inside\" the core region, and what does this imply for the plane-wave cutoff?"
      - group [ref=e18976]:
        - generic "▸ Show answer" [ref=e18977] [cursor=pointer]
        - text: "The Slater rules assign (the two electrons screen with weight 0.85 each), so and . The all-electron Kohn–Sham value is (the core is *not* fully screening), and the experimental IE is — the *opposite* trend: the Slater rules were derived for *neutral* atoms and miss the relaxation of the core in the ionised state. The Kohn–Sham eigenvalue is a *better* estimate of the neutral-atom orbital energy but *overestimates* the IE by (the SCF correction). The hydrogenic wavefunction at is in atomic units; it has one radial node at , deep inside the core region ( – is typical for Li). This nodefulness is exactly what a pseudopotential construction in chapter 08 will *remove*: a smooth pseudo-orbital with no radial node inside is the entire point of the construction."
      - group [ref=e18978]:
        - generic "▸ Part 2 (chapter 03) — Hartree–Fock on Li in a STO-3G basis" [ref=e18979] [cursor=pointer]
        - text: "Set up a Hartree–Fock calculation for Li in a STO-3G basis (one basis function per occupied orbital: a and a on the Li atom). Write the Fock matrix in the AO basis, , and the density matrix in the closed-shell two-electron core and the *open-shell* single electron. (Note: Li has electrons, so the *closed-shell* Ansatz of [Chapter 03, §3.5](/DFT-notes/dft-notes/chapter-03/) does not apply — you need an **unrestricted** HF or an **ROHF** treatment.) Report the Koopmans IE and compare with the hydrogenic estimate of Part 1."
      - group [ref=e18980]:
        - generic "▸ Show answer" [ref=e18981] [cursor=pointer]
        - text: "The Li atom in a minimal basis has two basis functions and three electrons: the closed-shell pair and one unpaired electron. The standard approach is **unrestricted Hartree–Fock (UHF)**: separate and orbitals, and similarly for , with and . The Fock matrix for spin is (the exchange term has a *spin-dependent* density matrix). For Li in STO-3G, the standard UHF result is (the Koopmans IE is , very close to the experimental IE of ), and (deeper, in the core). The unrestricted calculation gives a that is *not* exactly (the doublet value) — the spin contamination is typically for Li/STO-3G, an contamination that is *typical* for open-shell atoms in small bases."
      - group [ref=e18982]:
        - generic "▸ Part 3 (chapter 04) — Replace HF exchange with LDA" [ref=e18983] [cursor=pointer]
        - text: "Re-run the Li calculation of Part 2 with the HF *exchange* replaced by the **LDA exchange** functional of [Chapter 05, §5.1](/DFT-notes/dft-notes/chapter-05/). This is a *Kohn–Sham DFT* calculation in a minimal basis (KS-LDA/STO-3G). Report the new and compare with the UHF value. Discuss the *systemati`c*' difference: in atoms, KS-LDA *overbinds* the HOMO and underbinds the LUMO, but the *Koopmans* IE (which is , not the SCF value) is typically in *better* agreement with experiment for HF than for LDA, *reverse`d*' when the SCF correction is applied."
      - group [ref=e18984]:
        - generic "▸ Show answer" [ref=e18985] [cursor=pointer]
        - text: "The KS-LDA total energy is , and the KS eigenvalues are *not* the HF orbital energies — the *exchange* part of the Fock operator is replaced by the *local* xc potential , and the *correlation* part is added. For Li/STO-3G, the KS-LDA HOMO is at (a *deeper* eigenvalue than HF, by ); the Koopmans IE is *too large* by . This is the **DFT Koopmans failure**: the KS eigenvalue is *not* the ionisation energy in DFT, only in exact KS-DFT (the \"Janak theorem\" generalisation). The SCF correction — recomputing self-consistently at and — gives a value much closer to experiment: typically – for KS-LDA, compared to (UHF Koopmans) and (experimental). The *Koopmans* IE in HF is better than the Koopmans IE in LDA, but the SCF IE in LDA is *better* than the SCF IE in HF — the opposite conclusion, illustrating that HF and DFT are *different* theories, not just different functionals."
      - group [ref=e18986]:
        - generic "▸ Part 4 (chapter 08) — Build a Li pseudopotential from the all-electron LDA orbital" [ref=e18987] [cursor=pointer]
        - text: "Take the all-electron KS-LDA orbital of Li from Part 3 and construct a Troullier–Martins (TM) pseudopotential with cutoff radius following the recipe of [Chapter 08, §8.4 and §8.8](/DFT-notes/dft-notes/chapter-08/). Use the script [`chapter_08/01-hydrogen-pseudopotential.py`](/DFT-notes/dft_notes/python_codes/chapter_08/01-hydrogen-pseudopotential.py) as a template (it does the same construction for H; change the all-electron input to the Li KS-LDA orbital). Verify that the pseudo-wavefunction matches the all-electron for to machine precision, that is nodeless in , and that the **norm-conservation condition** holds. Then **invert** the radial equation to obtain and discuss why the pseudo-potential is much *shallower* than the all-electron potential inside and why this matters for the plane-wave cutoff."
      - group [ref=e18988]:
        - generic "▸ Show answer" [ref=e18989] [cursor=pointer]
        - text: "For Li/ with , the resulting is a smooth, finite function inside with a depth of (compared to the all-electron Coulomb which diverges as ); outside it is set equal to the all-electron . The pseudo-wavefunction is nodeless in (the TM form *forces* this through the polynomial ansatz), and the norm-conservation holds to relative error. The plane-wave cutoff required to expand is – (compared to for the all-electron with its radial node at ) — a saving that makes plane-wave DFT on Li feasible. The deeper point: the all-electron orbital of Li has and oscillates times inside ; the *pseudo-potential* is *designed*' to reproduce the valence orbital *outside* and is allowed* to deviate inside — that deviation is the *frozen-core* approximation. For a Li atom in two different chemical environments (e.g. Li in LiH vs Li in Li₂), the core is *assumed*' unchanged and the is transferred* between them — the transferability is the key property of the construction."
