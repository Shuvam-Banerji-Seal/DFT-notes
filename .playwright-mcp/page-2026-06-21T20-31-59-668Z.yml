      - group [ref=e19007]:
        - generic "▸ Show answer" [ref=e19008] [cursor=pointer]
        - text: "The minimum direct gap is at , achieved by the transition (valence band maximum) to (conduction band minimum) at the *same* — so the gap is direct. In a real 3-D semiconductor, the gap can be *indirect* (e.g. silicon), which requires a phonon to conserve crystal momentum and gives a *weaker* absorption edge. The absorption coefficient is in the dipole approximation (Fermi's golden rule summed over ); the joint DOS has the van Hove singularity at , so has a *pea`k*' just above the gap (the square-root edge of a 1-D DOS) and decays as above the gap. The exciton binding energy in 1-D is *muc`h*' larger than in 3-D: the 1-D hydrogen-like problem has (the binding is stronger because the electron and hole are confined to 1-D), and for a typical reduced mass and dielectric constant , – — a significant fraction of the gap, especially in *organi`c*' semiconductors."
      - group [ref=e19009]:
        - generic "▸ Part 4 (chapter 12) — Linear-response TDDFT absorption" [ref=e19010] [cursor=pointer]
        - text: "The independent-particle absorption of Part 3 *misses* the excitonic *redshift* (and the enhancement of the absorption below the gap). The chapter 12 linear-response TDDFT framework recovers it. **(a)** Set up the Casida eigenvalue problem for the 2-band chain in the *electron-hole* basis (one occupied orbital , one virtual ), with the *direct* Coulomb coupling and the *exchange* coupling . **(b)** Show that the **singlet** excitation energy is and the **triplet** is (no exchange screening in the triplet). **(c)** In 1-D, the Coulomb integrals are *larger* than in 3-D (the electron-hole overlap is larger), so the singlet is *more strongly redshifte`d*' and the singlet-triplet splitting is *larger*. Discuss the **Bethe–Salpeter** correction to the xc kernel that is required to reproduce the experimental absorption spectrum quantitatively."
      - group [ref=e19011]:
        - generic "▸ Show answer" [ref=e19012] [cursor=pointer]
        - text: "The Casida matrix for a 2-orbital, 2-electron system is the matrix derived in [Chapter 12, §12.7](/DFT-notes/dft-notes/chapter-12/), with the singlet block and the triplet block (a matrix — the spin flip kills the exchange). The singlet eigenvalue is — a *redshift* of magnitude (the **exciton binding energy** in this minimal basis). The 1-D Coulomb integrals are larger than their 3-D counterparts (the confinement enhances the overlap), so the exciton binding energy is larger. In real 1-D materials (carbon nanotubes, conjugated polymers) the binding energy can be – — comparable to the band gap itself. The **adiabatic LDA** (ALDA) *underestimates* the binding energy; the **Bethe–Salpeter equation** (BSE) is the *non-adiabati`c*' correction that gives quantitative agreement with experiment."
      - separator [ref=e19013]
      - heading "Cross-chapter problem set C — The Mott insulator (chapters 04, 05, 13)" [level=2] [ref=e19014]
      - paragraph [ref=e19015]:
        - text: This problem set takes the
        - strong [ref=e19016]: Mott insulator
        - text: as a unifying thread and shows how the
        - emphasis [ref=e19017]: failure
        - text: of one method (LDA) to describe it leads to a
        - emphasis [ref=e19018]: correction
        - text: (DFT+U). The prototype is the 2-band Hubbard model on a 2-D square lattice at half-filling, with one electron per site. In the non-interacting limit (
        - img [ref=e19020]
        - text: ) it is a
        - emphasis [ref=e19029]: metal
        - text: ; in the strongly- interacting limit (
        - img [ref=e19031]
        - text: ) it is a
        - strong [ref=e19040]: Mott insulator
        - text: with antiferromagnetic order. LDA predicts the metal,
        - emphasis [ref=e19041]: not
        - text: the insulator; DFT+U with a suitable
        - img [ref=e19043]
        - text: recovers the gap.
      - group [ref=e19048]:
        - generic "▸ Part 1 (chapter 04) — The KS-LDA band structure" [ref=e19049] [cursor=pointer]
        - text: "Take a 2-band Hubbard model on a 2-D square lattice, , at half-filling (one electron per site, two per unit cell if there is a 2-atom basis, or one per unit cell if there is a 1-atom basis with spin degeneracy). **(a)** Solve the *non-interacting* limit : the band structure is on a 1-atom unit cell, half-filled (one electron per site, but spin-degenerate, so two electrons per cell and *one* band). Identify the **Fermi surface** (the square ) and the **Fermi energy** . **(b)** Now treat the *same* problem in KS-DFT with the LDA xc functional. The LDA self-consistent solution is *exactly* the non-interacting solution (because the homogeneous electron gas that LDA is fit to is *itsel`f*' non-interacting in the KS sense); LDA predicts a *metal*. **(c)** Discuss why this is *wrong* for the real material: in the limit the on-site repulsion forbids double occupancy and the ground state is an *antiferromagnetic insulator* (a **Mott insulator**), not a metal."
      - group [ref=e19050]:
        - generic "▸ Show answer" [ref=e19051] [cursor=pointer]
        - text: "The non-interacting band has its extrema at ( ) and at the BZ corner ( ); the band is half-filled (with spin degeneracy, two electrons per unit cell, one band), and the Fermi surface is the **nested** square — perfect nesting at wavevector . LDA applied to this model gives the same answer: a metal with a nested Fermi surface. This is *wrong* for the interacting case at large , where the ground state is a Mott insulator with antiferromagnetic order at wavevector . The reason LDA fails: the LDA xc functional is fit to the *homogeneous* electron gas, which is a metal for any density; it has no mechanism to *localise* electrons in a half-filled band. The Mott transition is a *correlation-driven* insulator-to- metal transition that LDA simply *cannot* describe. In real materials, this failure is visible in the 3*`d*' transition-metal oxides (MnO, CoO, NiO, the parent compounds of the high- cuprates): LDA predicts *metalli`c*' ground states for materials that are *experimentally* antiferromagnetic insulators with gaps of – . The LDA gaps are listed in the table of [Chapter 13, §13.2.1](/DFT-notes/dft-notes/chapter-13/) for MnO, FeO, CoO, NiO — the systematic underestimation by a factor of is the *signature* of the missing Mott physics."
      - group [ref=e19052]:
        - generic "▸ Part 2 (chapter 05) — Why the GGA does not save us" [ref=e19053] [cursor=pointer]
        - text: "Repeat the calculation of Part 1 with the **PBE GGA** functional of [Chapter 05, §5.2](/DFT-notes/dft-notes/chapter-05/). **(a)** Show that the GGA correction to LDA is *small* for the homogeneous electron gas (the PBE enhancement factor is unity for , i.e. for a uniform density). **(b)** Argue why the GGA, like the LDA, has *no* mechanism to describe a Mott transition: the GGA is a *local* (or semi-local) correction to LDA, and the Mott physics is *non- local* (it depends on the *fluctuation of the density, not just its value and gradient). **(c)** Discuss the *hybri`d*' functionals (PBE0, HSE) of [Chapter 05, §5.4](/DFT-notes/dft-notes/chapter-05/) and their *temporary* success on Mott insulators: the *exact-exchange* part of the hybrid is a *non-local* operator and partially captures the on-site repulsion, so PBE0 opens a gap in MnO and NiO — but with an *ad ho`c*' mixing parameter , not from first principles."
      - group [ref=e19054]:
        - generic "▸ Show answer" [ref=e19055] [cursor=pointer]
        - text: "The PBE GGA enhancement factor satisfies — at zero reduced gradient, the GGA reduces to LDA. The *correction* is in the *gradient* of the density; for the homogeneous gas the gradient is zero, so the correction vanishes. The Mott insulator has a *non-zero* density gradient (the -orbital density is highly peaked on the transition-metal site), but the GGA correction is a *local* functional of the gradient and cannot describe the *non-local* physics of the on-site repulsion. The *hybri`d*' functionals (PBE0, HSE) replace a fraction of the GGA exchange with *exact* (non- local) HF exchange, which *does* contain the on- site – Coulomb repulsion in the form of the Fock exchange integral. For NiO, PBE0 ( ) opens a gap of , in reasonable agreement with experiment ( ), while LDA gives a *metal*. But the amount of exact exchange is an *empirical* parameter: is the PBE0 choice, but a *range-separate`d*' hybrid like HSE06 (with at short range and 0 at long range) gives similar results. The *fundamental* problem — that the hybrid is a *mixture* of DFT and HF, not a single self-consistent theory — is what the DFT+U correction of Part 3 addresses in a different way."
      - group [ref=e19056]:
        - generic "▸ Part 3 (chapter 13) — DFT+U opens the gap" [ref=e19057] [cursor=pointer]
        - text: "Apply the **DFT+U** correction of [Chapter 13](/DFT-notes/dft-notes/chapter-13/) to the 2-band Hubbard model of Part 1, treating the on-site occupation matrix of the localised orbital as a *dynamical* variable. **(a)** For the half-filled antiferromagnetic state (one electron per site, alternating spin), the occupation matrix in the spin-up channel is the *identity* on one sublattice and *zero* on the other. Show that on both sublattices, so the DFT+U correction *vanishes* in the half-filled AF state. **(b)** The *non-trivial* DFT+U effect appears when the *spin-u`p*' occupation on one sublattice is *less* than 1 (e.g. due to hybridisation with the other sublattice): then and the correction is *positive* — an energy penalty for the partial occupation. This penalty *stabilises* the half- filled AF state over the fractional-occupation metallic state. **(c)** At what value of does the gap open? Discuss the *choice* of : too small (say ) and the gap does not open, the system stays metallic; too large ( ) and the gap is grossly overestimated; the *physical* value is – for the 3*`d*' transition-metal oxides."
      - group [ref=e19058]:
        - generic "▸ Show answer" [ref=e19059] [cursor=pointer]
        - text: "In a *self-consistent* DFT+U calculation, the system *chooses* the state that minimises : the AF state has that is *higher* than (LDA prefers the ferromagnetic metal) but (the penalty is paid by the FM state). For large enough, and the AF state wins. The critical is the value at which the two energies are equal: for the 2-band Hubbard model on a square lattice, – in mean-field theory, in line with the QMC estimate of from §13.2. The *practical* issue is the **choice of **: there is no unique, first-principles value (the *constrained LDA* calculation of §13 gives a that depends on the screening length and the choice of the localised subspace). In practice one *fits* to reproduce an experimental gap or a structural property. The **DFT+DMFT** extension of DFT+U addresses this by *dynamically* computing the screening and the local Green's function, but the cost is much higher."
