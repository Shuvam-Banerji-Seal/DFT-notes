      - group [ref=e18997]:
        - generic "▸ Part 1 (chapter 07) — Electronic band structure of the diatomic chain" [ref=e18998] [cursor=pointer]
        - text: "The chain has a two-atom unit cell, so the BZ is and the *electroni`c*' band structure has *two* bands, . **(a)** Sketch for and identify the **band gap** at the BZ boundary . **(b)** Compute the **density of states** for the two bands by the change of variable on . **(c)** Show that the **joint density of states** (the *optical* DOS that governs direct transitions) is , with a **van Hove singularity** at ."
      - group [ref=e18999]:
        - generic "▸ Show answer" [ref=e19000] [cursor=pointer]
        - text: "The two-band dispersion is the textbook result of a two-site, one-orbital tight-binding chain: the eigenvalues of the Bloch Hamiltonian are , with a maximum of at the Brillouin-zone centre and a gap of at the boundary . The valence band is fully filled (two electrons per unit cell, one orbital per atom) and the conduction band is empty: the chain is an *insulator* (Peierls-type). The DOS of a single band is for , with a **van Hove singularity** at the band edges. The *joint* DOS for direct transitions is for , with a van Hove singularity at (the BZ boundary). This is the 1-D analogue of the 3-D absorption edge — the optical absorption *onsets* at the band gap and has a divergent joint DOS just above it."
      - group [ref=e19001]:
        - generic "▸ Part 2 (chapter 10) — Phonon dispersion of the diatomic chain" [ref=e19002] [cursor=pointer]
        - text: In the same geometry, the *phonon* dispersion has two branches . **(a)** Verify the **acoustic sum rule** and the **optical** branch . **(b)** For and , (a chain modelling HCl), compute the optical phonon frequency at in meV. **(c)** Discuss the **LO–TO splitting** in 3-D ionic crystals (NaCl, GaAs) and why it does *not* appear in the 1-D chain (the 1-D chain has no long-range Coulomb interaction to break the degeneracy at ).
      - group [ref=e19003]:
        - generic "▸ Show answer" [ref=e19004] [cursor=pointer]
        - text: "The acoustic sum rule is satisfied by the factor: at , . The optical branch at is ; for HCl-like parameters, and — about ten times larger than typical acoustic phonons in real solids, because the 1-D spring constant is *muc`h*' stiffer than a real interatomic spring. The LO–TO splitting is a *3-D* effect: in an ionic crystal the long-range Coulomb interaction between the *effective* charges of the ions adds a term to the dynamical matrix, which is *finite* at for the optical mode (the acoustic modes are protected by the ASR). In 1-D, the analogous term is *absent* — the 1-D Coulomb interaction is short-range in the lattice sums — so the LO–TO splitting does not appear."
