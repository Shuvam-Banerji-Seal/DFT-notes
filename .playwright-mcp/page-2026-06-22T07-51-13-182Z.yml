      - heading "Chapter 16 — Topological materials and topology in band theory" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]: The band structure of a crystal can carry an integer that no continuous deformation can change — and that integer controls whether a current flows around the edge of an otherwise insulating sample.
      - paragraph [ref=e30]:
        - text: In
        - link "chapter 07" [ref=e31] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: we saw that a perfect crystal’s Hamiltonian commutes with every lattice translation, and the eigenfunctions therefore factorise into a plane wave and a cell-periodic piece, the Bloch function. In
        - link "chapter 11" [ref=e32] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-11/
        - text: we saw that those Bloch functions produce a band structure
        - img [ref=e34]
        - text: that we plot, density-of-state, and project onto atomic orbitals. The missing chapter in that story is the
        - emphasis [ref=e49]:
          - text: geometri
          - code [ref=e50]: "c*' one: a Bloch function $|u_{n\\mathbf k}\\rangle$ is a *vector* in Hilbert space, and as we move $\\mathbf k$ around in the Brillouin zone the vector traces out a *pat"
          - text: h
        - text: "’ in Hilbert space. The geometry of that path — its twist, its curvature, its winding number — is encoded in three objects we will spend most of this chapter on: the"
        - strong [ref=e51]: Berry phase
        - text: ", the"
        - strong [ref=e52]: Berry curvature
        - text: ", and the"
        - strong [ref=e53]: Chern number
        - text: they integrate to. The Chern number is an
        - emphasis [ref=e54]: integer
        - text: "that classifies an isolated band; it cannot change without the band gap closing. And it is not a mathematical curiosity: it is the bulk topological invariant that determines the quantised Hall conductivity of"
        - link "chapter 15" [ref=e55] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-15/
        - text: ’s two-dimensional electron gas, the protected edge currents of the quantum Hall effect, the helical surface states of the 3D topological insulators, and the open Fermi arcs of the Weyl semimetals. The bulk–boundary correspondence — “non-trivial bulk topology forces gapless boundary states” — is the through-line of the entire chapter.
      - blockquote [ref=e56]:
        - paragraph [ref=e57]:
          - strong [ref=e58]: Reading note.
          - text: This chapter assumes
          - link "chapter 07" [ref=e59] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: (Bloch’s theorem, the Brillouin zone, reciprocal lattice),
          - link "chapter 11" [ref=e60] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: (Kohn–Sham band structure), and the relativistic background of
          - link "chapter 15" [ref=e61] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-15/
          - text: (spin–orbit coupling and the spin Hall effect) — every non-trivial 2D and 3D TI in a real material relies on SOC to invert the band ordering. No time-dependent perturbation theory is needed; the linear-response machinery of
          - link "chapter 12" [ref=e62] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: is touched on only in the worked example.
