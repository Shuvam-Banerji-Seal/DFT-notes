      - heading "16.8 Higher-order topological insulators (HOTIs)" [level=2] [ref=e9989]
      - paragraph [ref=e9990]:
        - text: "The bulk–boundary correspondence of §16.1 is a “first-order” correspondence: a"
        - img [ref=e9992]
        - text: "-dimensional insulator with non-trivial bulk topology has a"
