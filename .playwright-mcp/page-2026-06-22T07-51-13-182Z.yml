          - text: Construct a supercell with
          - img [ref=e9192]
          - text: unit cells of the bulk and
          - img [ref=e9198]
          - text: Å of vacuum on each side; periodic in the surface plane, finite perpendicular.
        - listitem [ref=e9206]: Standard SCF calculation to converge the density.
        - listitem [ref=e9207]:
          - text: Non-SCF calculation along a 1D
          - img [ref=e9209]
          - text: path (e.g.
          - img [ref=e9218]
          - text: –
          - img [ref=e9228]
          - text: –
          - img [ref=e9238]
          - text: –
          - img [ref=e9248]
          - text: for a hexagonal surface).
        - listitem [ref=e9257]:
          - strong [ref=e9258]: Project the slab bands onto the bulk band structure.
          - text: The surface state is the band that lies
          - emphasis [ref=e9259]: in the bulk gap
          - text: ’ and is localised at the surface.
      - paragraph [ref=e9260]:
        - text: For a 3D TI, the slab calculation should show a single Dirac cone at
        - img [ref=e9262]
        - text: (for the (001) surface of Bi
        - img [ref=e9272]
        - text: Se
        - img [ref=e9279]
        - text: ) crossing the bulk gap — the
        - emphasis [ref=e9285]: signature
        - text: of the strong TI phase.
      - blockquote [ref=e9286]:
        - paragraph [ref=e9287]:
          - strong [ref=e9288]: Note.
          - text: The slab is
          - emphasis [ref=e9289]: not
          - text: periodic in the perpendicular direction; the surface state is
          - emphasis [ref=e9290]: not
          - text: a Bloch state of the bulk crystal, but a
          - emphasis [ref=e9291]: "localise`d"
          - text: ’ state decaying into the bulk on a length scale of
          - img [ref=e9293]
          - text: –
          - img [ref=e9301]
          - text: nm. The slab is the most
          - emphasis [ref=e9307]: direct
          - text: way to see this localised state.
