      - paragraph [ref=e7858]:
        - text: "The diagram makes the relationship explicit: the"
        - emphasis [ref=e7859]: Chern
        - text: and QSH families are the 2D parents of the 3D TIs; the
        - emphasis [ref=e7860]: "Dira`c"
        - text: ’ family is the 4-fold (TRS+inversion preserved) parent of the
        - emphasis [ref=e7861]: Weyl
        - text: family (TRS or inversion broken); the
        - emphasis [ref=e7862]: TCI
        - text: family extends the strong TI family with crystal-symmetry protection; the
        - emphasis [ref=e7863]: HOTI
        - text: family is the “next-order” extension of the standard TI. Each branch has its own invariant — Chern number,
        - img [ref=e7865]
        - text: index, mirror Chern number, line-winding number, multipole moment — and each invariant has its own computational recipe in WannierTools / Z2Pack / BANDREP.
      - heading "16.6.4 The chiral anomaly and the negative magnetoresistance" [level=3] [ref=e7874]
      - paragraph [ref=e7875]:
        - text: The
        - strong [ref=e7876]: chiral anomaly
        - text: is a defining property of massless Weyl fermions in 3D. The chiral current
        - img [ref=e7878]
        - text: is
        - emphasis [ref=e7908]: classically
        - text: conserved, but
        - emphasis [ref=e7909]: quantum-mechanically
        - text: "the conservation fails in the presence of electromagnetic fields:"
      - img [ref=e7911]
      - paragraph [ref=e8015]:
        - text: The right-hand side is non-zero when
        - img [ref=e8017]
        - text: ": parallel fields pump right-handed Weyl fermions from the left-handed node to the right-handed one (or vice versa) at a rate"
        - img [ref=e8029]
        - text: . The
        - emphasis [ref=e8042]: separate
        - text: chiral charge is not conserved, but the total electric charge is.
      - paragraph [ref=e8043]: "In a Weyl semimetal, the chiral anomaly is observed in two ways:"
      - list [ref=e8044]:
        - listitem [ref=e8045]:
          - strong [ref=e8046]: The chiral magnetic effect.
          - text: A magnetic field
          - img [ref=e8048]
          - text: along, say, the
          - img [ref=e8055]
          - text: direction creates a population imbalance between the two chiralities. The resulting
          - emphasis [ref=e8060]: chiral chemical potential
          - img [ref=e8062]
          - text: drives a
          - emphasis [ref=e8070]: current
          - text: along
          - img [ref=e8072]
          - text: ","
      - img [ref=e8079]
      - paragraph [ref=e8118]:
        - text: This is the “
        - strong [ref=e8119]: chiral magnetic effect
        - text: ” (CME), predicted in 1983 in high-energy physics and observed in Weyl semimetals in 2015 by Li
        - emphasis [ref=e8120]: et al.
        - text: and Xiong et al.
      - list [ref=e8121]:
        - listitem [ref=e8122]:
          - strong [ref=e8123]: The negative longitudinal magnetoresistance (LMR).
          - text: When an electric field
          - img [ref=e8125]
          - text: is applied
          - emphasis [ref=e8131]: parallel
          - text: to
          - img [ref=e8133]
          - text: ", the chiral anomaly pumps charge from one chirality to the other. The pumped charge"
          - emphasis [ref=e8139]: reduces
          - text: the resistance because the back- scattering between the two chiralities is
          - emphasis [ref=e8140]: "suppresse`d"
          - text: ’ (the populations are unequal). The result is a
          - emphasis [ref=e8141]: negative
          - text: "longitudinal magnetoresistance: as"
          - img [ref=e8143]
          - text: increases, the longitudinal resistance
          - emphasis [ref=e8148]: decreases
          - text: . This was the first experimental signature of Weyl fermions in TaAs, observed in 2015. >
          - strong [ref=e8149]: Note.
          - text: The negative LMR is
          - emphasis [ref=e8150]: not
          - text: a unique signature of
          - blockquote [ref=e8151]:
            - paragraph [ref=e8152]:
              - text: the chiral anomaly — current jetting and other classical effects can also produce a negative LMR. The
              - emphasis [ref=e8153]: unambiguous
              - text: "signature is the planar Hall effect: in an in-plane"
              - img [ref=e8155]
              - text: and a perpendicular
              - img [ref=e8162]
              - text: the planar Hall voltage is
              - emphasis [ref=e8168]: "od`d"
              - text: ’ under
              - img [ref=e8170]
              - text: and has a characteristic
              - img [ref=e8184]
              - text: dependence on the angle
              - img [ref=e8200]
              - text: between
              - img [ref=e8206]
              - text: and
              - img [ref=e8213]
              - text: (the “Burkov” prediction). This signature has no classical analogue.
      - heading "16.7 Computing topology from DFT" [level=2] [ref=e8219]
      - paragraph [ref=e8220]:
        - text: The previous sections were
        - emphasis [ref=e8221]: theory
        - text: — Berry phase, Chern numbers,
        - img [ref=e8223]
