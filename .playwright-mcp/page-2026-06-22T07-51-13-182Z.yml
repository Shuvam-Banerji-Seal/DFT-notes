        - img [ref=e6735]
        - text: and
        - img [ref=e6765]
        - text: m/s. The surface state exhibits
        - strong [ref=e6785]: spin–momentum locking
        - text: ","
        - img [ref=e6787]
        - text: ": an electron with momentum"
        - img [ref=e6812]
        - text: cannot back-scatter to
        - img [ref=e6819]
        - text: because the spin would have to flip and a non-magnetic impurity cannot flip it. The result is a long mean-free path, the basis of proposed low-dissipation “topological” electronics.
      - blockquote [ref=e6827]:
        - paragraph [ref=e6828]:
          - strong [ref=e6829]: Note.
          - text: The
          - emphasis [ref=e6830]: existence
          - text: of the surface state is topologically protected; its
          - emphasis [ref=e6831]: energy
          - text: (relative to the bulk gap) is not. If the Fermi energy is in the bulk conduction band (as in naturally
          - img [ref=e6833]
          - text: "-type Bi"
          - img [ref=e6839]
          - text: Se
          - img [ref=e6846]
          - text: due to Se vacancies), the surface Dirac cone is “buried” under the bulk conduction. Doping the bulk to push
          - img [ref=e6853]
          - text: into the gap is the experimental challenge.
      - heading "16.5.3 Topological crystalline insulators (TCIs)" [level=3] [ref=e6861]
      - paragraph [ref=e6862]:
        - text: A
        - emphasis [ref=e6863]: topological crystalline insulator
        - text: is an insulator whose gapless surface states are protected by a
        - emphasis [ref=e6864]: crystal symmetry
        - text: (a mirror, a rotation, a glide, or a screw) rather than by TRS. The defining example is
        - strong [ref=e6865]: SnTe
        - text: (and the alloy Pb$
        - emphasis [ref=e6866]:
          - text: "{1-x}"
          - img [ref=e6868]
          - text: _x
          - img [ref=e6876]
        - text: "{1-x}"
        - img [ref=e6890]
        - text: _x
        - img [ref=e6898]
        - text: L$ points of the BZ are inverted by the spin–orbit coupling, and the
        - emphasis [ref=e7051]: mirror
        - text: symmetry of the (110) plane protects the surface states on the (001) surface. SnTe was the first material predicted to be a TCI (Fu,
        - emphasis [ref=e7052]: Phys. Rev. Lett.
        - strong [ref=e7053]: "106"
        - text: ", 106802 (2011)) and the first one observed in ARPES (Tanaka"
        - emphasis [ref=e7054]: et al.
        - text: ", Nature Physics*"
        - strong [ref=e7055]: "8"
        - text: ", 800 (2012))."
      - paragraph [ref=e7056]:
        - text: The classification of TCIs uses the
        - emphasis [ref=e7057]: symmetry-based indicators
        - text: of Po
        - emphasis [ref=e7058]: et al. and Song et al.
        - text: (2017–2018), which extend the
        - img [ref=e7060]
        - text: machinery of Fu–Kane to arbitrary space-group symmetries. A TCI can have
        - emphasis [ref=e7069]: multiple
        - text: Dirac cones on the surface (SnTe has four, one on each
        - img [ref=e7071]
        - text: face and on the (001) face) and higher-degeneracy surface states (four-, six-, eight-fold) at high-symmetry points.
      - blockquote [ref=e7082]:
        - paragraph [ref=e7083]:
          - strong [ref=e7084]: Tip.
          - text: The modern “topological quantum chemistry” framework (Bradlyn
          - emphasis [ref=e7085]: et al.
          - text: ", Science"
          - strong [ref=e7086]: "353"
          - text: ", 6299 (2016)) gives a complete classification of all band structures consistent with a given space-group symmetry, including TCIs, Dirac, Weyl, nodal-line, and multi-fold semimetals. Tools: the Bilbao Crystallographic Server’s"
          - code [ref=e7087]: TOPOLOGICAL QUANTUM CHEMISTRY' and the
          - text: "CheckTopologicalMat`’ Python package."
      - heading "16.6 Topological semimetals" [level=2] [ref=e7088]
      - paragraph [ref=e7089]:
        - text: The topological materials we have considered so far are
        - emphasis [ref=e7090]: insulators
        - text: ": they have a bulk gap. There is a parallel family of"
        - strong [ref=e7091]: topological semimetals
        - text: whose protection requires the
        - emphasis [ref=e7092]: touching
        - text: of two (or more) bulk bands at discrete points or along lines in the BZ. The three main families are the
        - strong [ref=e7093]: Dirac semimetals
        - text: (four-fold crossings, TRS and inversion preserved), the
        - strong [ref=e7094]: Weyl semimetals
        - text: (two-fold crossings, TRS or inversion broken), and the
        - strong [ref=e7095]: nodal-line semimetals
        - text: (lines of two-fold crossings protected by mirror or PT symmetry).
      - heading "16.6.1 Dirac semimetals" [level=3] [ref=e7096]
