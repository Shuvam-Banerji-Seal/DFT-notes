        - text: The setup is a semi-infinite crystal occupying the half- space
        - img [ref=e9314]
        - text: with surface at
        - img [ref=e9324]
        - text: . The surface Green’s function is
      - img [ref=e9334]
      - paragraph [ref=e9415]:
