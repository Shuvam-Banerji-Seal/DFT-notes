      - heading "16.13.4 The Hasan–Kane review (2010)" [level=3] [ref=e15166]
      - paragraph [ref=e15167]:
        - text: The 2010
        - emphasis [ref=e15168]: Reviews of Modern Physics
        - text: colloquium by Hasan and Kane is the
        - emphasis [ref=e15169]: modern
        - text: synthesis of the field. The paper is 23 pages long, with 183 references, and covers the
        - emphasis [ref=e15170]: entire
        - text: "topological-insulator landscape as of 2010: 2D TIs, 3D TIs, topological superconductors, Majorana fermions, and the topological magnetoelectric effect."
      - paragraph [ref=e15171]:
        - strong [ref=e15172]: The structure of the paper.
        - text: The paper is divided into seven sections. The first three are the
        - emphasis [ref=e15173]: theoretical
        - text: "foundation: (I) Introduction and overview, (II) Topological insulators in 2D (the QSH effect), (III) Topological insulators in 3D. The next two are the"
        - emphasis [ref=e15174]: experimental
        - text: "surveys: (IV) Experimental results for 2D TIs (HgTe/CdTe quantum wells), (V) Experimental results for 3D TIs (Bi$"
        - emphasis [ref=e15175]:
          - text: "2"
          - img [ref=e15177]
          - text: _3
          - img [ref=e15185]
          - text: _2
          - img [ref=e15195]
          - text: _3
          - img [ref=e15203]
          - text: _2
          - img [ref=e15213]
          - text: _3
          - img [ref=e15221]
        - text: "{1-x}"
        - img [ref=e15231]
        - text: _x$). The final two are the
        - emphasis [ref=e15238]: extensions
        - text: "to more exotic phases: (VI) Topological superconductors and Majorana fermions, (VII) Topological magnetoelectric effect and axion electrodynamics [Hasan and Kane, 2010, p. 3047]."
      - paragraph [ref=e15239]:
        - strong [ref=e15240]: The 2D TI section.
        - text: Section II.A of the review re-derives the
        - img [ref=e15242]
        - text: invariant from the Berry phase, the Pfaffian, and the time-reversal polarisation. The treatment is self-contained and includes the original Kane–Mele 2005 derivation, the Fu–Kane 2006 Pfaffian formula, and the inversion-symmetric parity criterion [Hasan and Kane, 2010, pp. 3049–3051]. Section II.B reviews the QSH effect in HgTe/CdTe quantum wells, the BHZ model, and the experimental observations. Section II.C discusses the
        - emphasis [ref=e15251]: helical
        - text: edge states and their protection by TRS [Hasan and Kane, 2010, pp. 3051–3053].
      - paragraph [ref=e15252]:
        - strong [ref=e15253]: The 3D TI section.
        - text: Section III.A introduces the strong and weak 3D TIs and the 3D
        - img [ref=e15255]
        - text: invariants. Section III.B reviews the Fu–Kane parity criterion and the time-reversal polarisation [Hasan and Kane, 2010, pp. 3053–3055]. Section III.C covers the Bi
        - img [ref=e15265]
        - text: Se
        - img [ref=e15272]
        - text: family, the band inversion at
        - img [ref=e15279]
        - text: ", and the surface Dirac cone. The surface states of the strong 3D TI are discussed in detail: the spin–momentum locking, the absence of back-scattering from non-magnetic disorder, and the ARPES observations [Hasan and Kane, 2010, pp. 3055–3057]."
      - paragraph [ref=e15284]:
        - strong [ref=e15285]: The extensions.
        - text: The review’s later sections cover the
        - emphasis [ref=e15286]: topological magnetoelectric effect
        - text: — the
        - img [ref=e15288]
        - text: term in the electromagnetic response of a 3D TI, the symmetry arguments for the quantisation of
        - img [ref=e15298]
        - text: ", and the proposed experiments to measure it. The topological superconductor section introduces the"
        - emphasis [ref=e15303]: Majorana fermion
        - text: and the proposals for topological quantum computation. These sections are the
        - emphasis [ref=e15304]: "most cite`d"
        - text: "’ of the review: the field expanded"
        - emphasis [ref=e15305]: enormously
        - text: between 2010 and 2015, and the topological-superconductor and Majorana literatures are largely built on the framework laid out in sections VI and VII of the review.
      - paragraph [ref=e15306]:
        - strong [ref=e15307]: Why read the original review?
        - text: The review is
        - emphasis [ref=e15308]: the
        - text: reference for the modern topological-insulator classification. It is the source the textbooks (and the chapters of these notes) draw on. The reader who wants to
        - emphasis [ref=e15309]: "understan`d"
        - text: ’ a 3D TI, a topological crystalline insulator, a higher-order TI, or a topological superconductor should
        - emphasis [ref=e15310]: start
        - text: with the Hasan–Kane review and only then move to the more recent literature.
      - blockquote [ref=e15311]:
        - paragraph [ref=e15312]:
          - strong [ref=e15313]: Note.
          - text: The 2010 review is the
          - emphasis [ref=e15314]: last
          - text: paper to cover the entire field in a single document. Since 2010 the field has fragmented into many sub-literatures (3D TIs, TCIs, HOTIs, Weyl semimetals, topological superconductors, etc.) and no single review covers all of them. The 2010 review is therefore the
          - emphasis [ref=e15315]: most efficient
          - text: starting point for a reader entering the field today.
      - heading "16.13.5 The original Weyl equation (1929)" [level=3] [ref=e15316]
      - paragraph [ref=e15317]:
        - text: The 1929 paper by Hermann Weyl is the
        - emphasis [ref=e15318]: historical
        - text: foundation of the subject. The paper is in German and is written in the dense, philosophical style of the early quantum-mechanics era. The paper’s contribution is the
        - strong [ref=e15319]: Weyl equation
        - text: — the relativistic wave equation for a
        - emphasis [ref=e15320]: massless
        - text: spin-1/2 particle — and the observation that the
        - emphasis [ref=e15321]: massless
        - text: Dirac equation factorises into two
        - emphasis [ref=e15322]: chiral
        - text: components [Weyl, 1929, p. 332].
      - paragraph [ref=e15323]:
        - strong [ref=e15324]: The massless Dirac equation.
        - text: The Weyl equation is the limit
        - img [ref=e15326]
        - text: "of the Dirac equation:"
      - img [ref=e15336]
      - paragraph [ref=e15365]:
        - text: where
        - img [ref=e15367]
        - text: are the Pauli matrices on the spin degree of freedom [Weyl, 1929, eq. (16), p. 332]. The Weyl spinor
        - img [ref=e15373]
        - text: is
        - emphasis [ref=e15378]: two-component
        - text: and has a definite
        - emphasis [ref=e15379]: chirality
        - text: (left- or right-handed), the eigenvalue of
        - img [ref=e15381]
        - text: . The massless Dirac equation factorises into two
        - emphasis [ref=e15389]: "decouple`d"
        - text: ’ Weyl equations, one for each chirality [Weyl, 1929, p. 333]. A
        - emphasis [ref=e15390]: massive
        - text: Dirac fermion mixes the two chiralities; a
        - emphasis [ref=e15391]: massless
        - text: one does not.
      - paragraph [ref=e15392]:
        - strong [ref=e15393]: Why the Weyl equation matters for topological materials.
        - text: Eighty years after Weyl’s paper, the
        - emphasis [ref=e15394]: same equation
        - text: turned out to describe the low-energy quasiparticles of a 3D Weyl semimetal (§16.6.2). The Hamiltonian of a single Weyl node is
        - img [ref=e15396]
        - text: ", exactly the Weyl equation"
        - img [ref=e15420]:
          - link [ref=e15423] [cursor=pointer]:
            - /url: "#"
        - text: with the speed of light
        - img [ref=e15433]
        - text: replaced by the band velocity
        - img [ref=e15439]
        - text: "[Weyl, 1929, p. 332, applied to TaAs and the Weyl semimetals of §16.6.2]. The"
        - emphasis [ref=e15444]: chirality
        - text: of a Weyl node is the
        - emphasis [ref=e15445]: chiral charge
        - text: of a Weyl fermion; the
        - emphasis [ref=e15446]: Nielsen–Ninomiya theorem
        - text: (the sum of chiralities in the BZ is zero) is the modern re-statement of the
        - emphasis [ref=e15447]: gauge anomaly cancellation
        - text: in Weyl’s original paper [Weyl, 1929, p. 334].
      - paragraph [ref=e15448]:
        - strong [ref=e15449]: The historical irony.
        - text: Weyl proposed the massless Dirac equation as a model of the electron, but the
        - emphasis [ref=e15450]: "observe`d"
        - text: ’ electron is massive (the electron mass is
        - img [ref=e15452]
        - text: keV, and the neutrino — the obvious candidate for a Weyl fermion in 1929 — is also now known to be massive after the neutrino-oscillation experiments of 1998–2002). The Weyl equation therefore had
        - emphasis [ref=e15471]: "no"
        - text: known realisation in nature for 80 years. The
        - emphasis [ref=e15472]: condensed-matter
        - text: Weyl equation — the low-energy Hamiltonian of a 3D Weyl semimetal — was the
        - emphasis [ref=e15473]: first
        - text: physical realisation, and it came in 2015 with the discovery of TaAs [Weng
        - emphasis [ref=e15474]: et al.
        - text: ", Phys. Rev. X"
        - strong [ref=e15475]: "5"
        - text: ", 011029 (2015); Xu"
        - emphasis [ref=e15476]: et al.
        - text: ", Science"
        - strong [ref=e15477]: "349"
        - text: ", 613 (2015)]."
      - paragraph [ref=e15478]:
        - strong [ref=e15479]: Weyl and topology.
        - text: Weyl’s paper contains the
        - emphasis [ref=e15480]: first
        - text: recognition that the chirality of a massless spin-1/2 particle is a
        - emphasis [ref=e15481]: topological
        - text: "invariant: it cannot change without the mass becoming non-zero, which closes the energy gap at"
        - img [ref=e15483]
        - text: . The same observation is the
        - emphasis [ref=e15493]: topological protection
        - text: "of a Weyl node in a Weyl semimetal: the node is the boundary between the"
        - emphasis [ref=e15494]: positive-energy
        - text: and negative-energy bands, and it can only be removed by
        - emphasis [ref=e15495]: pairing
        - text: it with another Weyl node of opposite chirality. The Nielsen– Ninomiya theorem of 1981 is the modern lattice version of Weyl’s 1929 observation.
      - blockquote [ref=e15496]:
        - paragraph [ref=e15497]:
          - strong [ref=e15498]: Note.
          - text: The 1929 Weyl paper is the
          - emphasis [ref=e15499]: most
          - text: historically important paper in this section. The
          - emphasis [ref=e15500]: modern
          - text: topological-insulator field did not exist in 1929; the paper was about fundamental physics, not about band theory. The connection to band theory is a
          - emphasis [ref=e15501]: retroactive
          - text: interpretation, made possible by the discovery of Weyl semimetals in
        - list [ref=e15502]:
          - listitem [ref=e15503]:
            - text: Reading the 1929 paper today, with the benefit of 90 years of hindsight, is one of the most
            - emphasis [ref=e15504]: illuminating
            - text: "exercises in modern condensed-matter physics: it shows that the mathematics of Weyl fermions was already in place"
            - emphasis [ref=e15505]: decades
            - text: before the physics of the topological insulator was discovered.
