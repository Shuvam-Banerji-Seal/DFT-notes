        - emphasis [ref=e10056]: second-order
        - text: TI has corner states (zero-dimensional), protected by
        - img [ref=e10058]
        - text: rotation or mirror symmetry; the invariant is a
        - emphasis [ref=e10066]: "quantise`d"
        - text: ’ electric quadrupole moment
        - img [ref=e10068]
        - text: . A 3D
        - emphasis [ref=e10088]: second-order
        - text: TI has 1D
        - emphasis [ref=e10089]: hinge
        - text: "states (chiral modes running along the edges of a 3D sample). Prominent material candidates:"
      - list [ref=e10090]:
