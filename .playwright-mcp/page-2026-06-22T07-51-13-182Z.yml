      - paragraph [ref=e15903]:
        - text: The mermaid diagram is the
        - emphasis [ref=e15904]: genealogy
        - text: of the topological-insulator field. The founding papers (Weyl 1929; Kane–Mele 2005; Fu–Kane 2006; BHZ 2006) lead to the canonical review (Hasan–Kane 2010), which then branches into the modern sub-fields. The reader who understands the five founding papers understands the
        - emphasis [ref=e15905]: root system
        - text: of every modern extension.
      - heading "16.13.7 What these papers don’t say" [level=3] [ref=e15906]
      - paragraph [ref=e15907]:
        - text: The five founding papers defined the field as of 2010, but the
        - emphasis [ref=e15908]: modern
        - text: field has expanded in directions the founding papers did not anticipate. The most important omissions are listed below. Each omission is now a
        - emphasis [ref=e15909]: major
        - text: sub-field; the founding papers are the necessary background for each.
      - list [ref=e15910]:
        - listitem [ref=e15911]:
          - strong [ref=e15912]: Higher-order topological insulators (HOTIs).
          - text: The Kane–Mele 2005 [Kane and Mele, 2005, p. 146802-1] and Fu–Kane 2006 [Fu and Kane, 2006, eq. (13), p. 045312-4] papers define
          - emphasis [ref=e15913]: first-order
          - text: "TIs: a"
          - img [ref=e15915]
          - text: "- dimensional TI has a"
          - img [ref=e15921]
          - text: "-dimensional gapless boundary. A"
          - strong [ref=e15934]: higher-order TI
          - text: (HOTI) of order
          - img [ref=e15936]
          - text: has a
          - img [ref=e15942]
          - text: "-dimensional gapless boundary. The first HOTI models are Benalcazar, Bernevig, Hughes (2017); the first material realisation (Bi"
          - img [ref=e15956]
          - text: Br
          - img [ref=e15963]
          - text: ) is 2018. The
          - img [ref=e15970]
          - text: index of Fu–Kane is
          - emphasis [ref=e15979]: insufficient
          - text: to characterise a HOTI; the new invariant is the
          - emphasis [ref=e15980]: quantised electric multipole moment
          - text: of the bulk. The founding papers do not discuss HOTIs at all.
        - listitem [ref=e15981]:
          - strong [ref=e15982]: Non-Hermitian topology.
          - text: The five papers assume a
          - emphasis [ref=e15983]: Hermitian
          - img [ref=e15985]
          - text: . Open quantum systems have non-Hermitian Hamiltonians with complex eigenvalues. The non-Hermitian Chern number, the non-Hermitian
          - img [ref=e15998]
          - text: index, and the
          - emphasis [ref=e16007]: non-Hermitian skin effect
          - text: are active research areas (Yao & Wang, PRL 121, 086803 (2018); Yokomizo & Murakami, PRL 123, 066404 (2019)). The founding papers do not discuss non-Hermitian systems.
        - listitem [ref=e16008]:
          - strong [ref=e16009]: Floquet topology.
          - text: The papers assume a
          - emphasis [ref=e16010]:
            - text: stati
            - code [ref=e16011]: c*' $H(\mathbf k)$. A *time-periodi
            - text: c
          - text: ’
          - img [ref=e16013]
          - text: has a topological classification in the Floquet basis; the Floquet TI and the anomalous Floquet TI have protected edge states even when
          - emphasis [ref=e16048]: all
          - text: the bulk Floquet bands are gapped. The “Thouless pump” is the 1D analogue. The founding papers do not discuss Floquet topology.
        - listitem [ref=e16049]:
          - strong [ref=e16050]: Symmetry-based indicators (SBI) and topological quantum chemistry.
          - text: The Fu–Kane parity criterion [Fu and Kane, 2006, eq. (15), p. 045312-4] works for crystals with inversion symmetry. For
          - emphasis [ref=e16051]: general
          - text: space groups, the symmetry-based indicator* classification of Po
          - emphasis [ref=e16052]: et al. (2017) and Song *et al.
          - text: (2018) extends the Fu–Kane machinery to arbitrary space-group symmetries. The founding papers do not discuss SBI.
        - listitem [ref=e16053]:
          - strong [ref=e16054]: Topological superconductors.
          - text: The 2010 Hasan–Kane review [Hasan and Kane, 2010, sec. VI, pp. 3061–3065]
          - emphasis [ref=e16055]: does
          - text: discuss topological superconductors (the 1D Kitaev chain, the 2D $p
          - list [ref=e16056]:
            - listitem [ref=e16057]:
              - text: ip$ superconductor, the 3D He-3 B phase), but the field has expanded enormously since 2010 (the prediction and observation of Majorana zero modes in semiconductor–superconductor nanowires, Fu & Kane 2008; Lutchyn
              - emphasis [ref=e16058]: et al.
              - text: 2010; Mourik et al.* 2012; the 2D topological superconductivity in magic-angle twisted bilayer graphene, 2020s). The founding papers are the
              - emphasis [ref=e16059]:
                - text: backgroun
                - code [ref=e16060]: d*
                - text: ", not the *cutting edge"
              - text: ", of topological superconductivity."
        - listitem [ref=e16061]:
          - strong [ref=e16062]: Machine-learning prediction of topological materials.
          - text: The prediction of new topological materials has been
          - emphasis [ref=e16063]: "industrialise`d"
          - text: ’ by machine-learning approaches (the “topological quantum chemistry” database of Bradlyn
          - emphasis [ref=e16064]: et al.
          - text: ", Science 353, 6299 (2016); the"
          - emphasis [ref=e16065]: Classification of Topological Quantum Chemistry
          - text: web tool of the Bilbao Crystallographic Server). These tools rely on the Fu–Kane parity criterion [Fu and Kane, 2006, eq. (15), p. 045312-4] and the Hasan–Kane classification [Hasan and Kane, 2010, p. 3047], but they apply them to
          - emphasis [ref=e16066]: millions
          - text: of materials in the ICSD. The founding papers anticipate none of this.
      - blockquote [ref=e16067]:
        - paragraph [ref=e16068]:
          - strong [ref=e16069]: Note.
          - text: The five founding papers are the
          - emphasis [ref=e16070]: necessary
          - text: background for every modern topological-materials calculation. A reader who wants to
          - emphasis [ref=e16071]: do
          - text: topological-materials DFT in 2026 must understand the Kane–Mele 2005 definition of the
          - img [ref=e16073]
          - text: invariant [Kane and Mele, 2005, p. 146802-1], the Fu–Kane 2006 Pfaffian formula [Fu and Kane, 2006, eq. (13), p. 045312-4], the BHZ 2006 model and the HgTe/CdTe prediction [Bernevig, Hughes, and Zhang, 2006, p. 1757], the Hasan–Kane 2010 review [Hasan and Kane, 2010, p. 3045], and — historically — the Weyl 1929 paper [Weyl, 1929, p. 330]. The modern extensions (HOTIs, non-Hermitian, Floquet, SBI, topological superconductors, ML) build on this foundation.
