        - text: "along a non-contractible loop of the BZ torus. The practical algorithm proceeds in three steps:"
      - list [ref=e8701]:
        - listitem [ref=e8702]:
          - strong [ref=e8703]: Discretise the loop.
          - text: Pick a closed 1-D loop
          - img [ref=e8705]
