      - heading "16.7.2 Wilson loops and the Wannier charge centres" [level=3] [ref=e8669]
      - paragraph [ref=e8670]:
        - text: Given the Wannier-interpolated Hamiltonian
        - img [ref=e8672]
        - text: on a fine
        - img [ref=e8693]
        - text: "-mesh, we can compute the"
