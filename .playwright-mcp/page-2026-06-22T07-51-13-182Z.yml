      - heading "16.14 What we left out" [level=2] [ref=e16154]
      - paragraph [ref=e16155]: This chapter scratched the surface of a deep and rapidly evolving subject. The omissions below are the most important for a complete picture.
      - list [ref=e16156]:
        - listitem [ref=e16157]:
          - strong [ref=e16158]: Non-Hermitian topology.
          - text: The whole chapter assumed a
          - emphasis [ref=e16159]: Hermitian
          - img [ref=e16161]
          - text: . Open quantum systems have
          - emphasis [ref=e16173]: non-Hermitian
          - text: Hamiltonians with complex eigenvalues (decay or pumping). The non-Hermitian Chern number, the non-Hermitian
          - img [ref=e16175]
          - text: index, and the
          - emphasis [ref=e16184]: non-Hermitian skin effect
          - text: (extensive edge-localised eigenstates) are active research areas. We did not cover them.
        - listitem [ref=e16185]:
          - strong [ref=e16186]: Floquet topology.
          - text: The chapter assumed a
          - emphasis [ref=e16187]:
            - text: stati
            - code [ref=e16188]: c*' $H(\mathbf k)$. A *time-periodi
            - text: c
          - text: ’
          - img [ref=e16190]
          - text: has a topological classification in the Floquet basis; the Floquet TI and the anomalous Floquet TI have protected edge states even when
          - emphasis [ref=e16225]: all
          - text: the bulk Floquet bands are gapped. The “Thouless pump” is the 1D analogue. We did not cover Floquet topology.
        - listitem [ref=e16226]:
          - strong [ref=e16227]: Fracton phases.
          - text: The 3D topological phases we covered (TIs, Dirac / Weyl semimetals) are
          - emphasis [ref=e16228]: particle-like
          - text: ": their topological excitations (the surface Dirac cone, the Fermi arc) move freely in space."
          - strong [ref=e16229]: Fracton phases
          - text: have excitations that are
          - emphasis [ref=e16230]: immobile
          - text: (fractons) or move only along sub-dimensional manifolds (lineons, planons). We did not cover them.
        - listitem [ref=e16231]:
          - strong [ref=e16232]: The full symmetry-based-indicator (SBI) machinery.
          - text: The Fu–Kane formula is a
          - emphasis [ref=e16233]: special case
          - text: of the more general SBI classification of Po
          - emphasis [ref=e16234]: et al.
          - text: and Song
          - emphasis [ref=e16235]: et al.
          - text: (2017–2018), which classifies all band structures consistent with a given space-group symmetry in terms of irreducible representations at the high-symmetry BZ points, and gives a complete list of all possible topological phases (TCIs, HOTIs, etc.) protected by that symmetry group. We did not cover the SBI machinery.
        - listitem [ref=e16236]:
          - strong [ref=e16237]: Topological superconductors.
          - text: The chapter focused on
          - emphasis [ref=e16238]: insulators
          - text: and semimetals. A parallel story is the
          - emphasis [ref=e16239]: topological superconductors
          - text: ": the 1D Kitaev chain, the 2D"
          - img [ref=e16241]
          - text: superconductor, the 3D He-3 B phase. The topological invariant of a superconductor is the
          - emphasis [ref=e16252]: Majorana number
          - text: ", the number of Majorana zero modes at the end of a 1D chain or in the vortex core of a 2D"
          - img [ref=e16254]
          - text: superconductor. We did not cover topological superconductors.
