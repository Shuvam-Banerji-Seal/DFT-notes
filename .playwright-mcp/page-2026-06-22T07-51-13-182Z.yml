        - text: edge states protected by TRS. The 2007 work of Bernevig, Hughes, and Zhang (BHZ) predicted the first realistic material platform — the HgTe/CdTe quantum well — and the experimental confirmation by König
        - emphasis [ref=e3905]: et al.
        - text: in 2007 launched the field of 2D and 3D TIs.
