      - heading "16.7.3 Surface state calculations in slab geometry" [level=3] [ref=e9163]
      - paragraph [ref=e9164]:
        - text: The most
        - emphasis [ref=e9165]: intuitive
        - text: way to confirm that a DFT band structure is topologically non-trivial is to
        - emphasis [ref=e9166]: plot the surface state
        - text: . The calculation is done in a
        - emphasis [ref=e9167]: slab geometry
        - text: ": a finite-thickness slab (typically 20–100 unit cells) with vacuum on either side. The slab has a 2D BZ (the projection of the 3D BZ onto the surface plane) and the band structure is a set of"
        - img [ref=e9169]
        - text: . The topological surface state, if it exists, appears as a
        - emphasis [ref=e9187]: gap-crossing
        - text: band that lives inside the bulk gap.
      - paragraph [ref=e9188]: "The slab calculation can be done directly with a DFT code that supports non-periodic boundary conditions in one direction (VASP, Quantum ESPRESSO, SIESTA, FLEUR, WIEN2k). The procedure:"
