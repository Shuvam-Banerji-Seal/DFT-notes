      - paragraph [ref=e7381]:
        - text: The Dirac node is a
        - emphasis [ref=e7382]: doubly-degenerate
        - text: "Weyl node: a superposition of two Weyl nodes of opposite chirality, sitting on top of each other in momentum space. Breaking the crystal symmetry (or breaking either TRS or inversion) splits the Dirac node into a pair of Weyl nodes, and the system becomes a Weyl semimetal."
      - heading "16.6.2 Weyl semimetals" [level=3] [ref=e7383]
      - paragraph [ref=e7384]:
        - text: A 3D Weyl semimetal has a
        - emphasis [ref=e7385]: "two-fol`d"
        - text: ’ band crossing near the Fermi energy, with the low-energy Hamiltonian
      - img [ref=e7387]
      - paragraph [ref=e7418]:
        - text: a 2×2 matrix in the basis of a single (spinless) Weyl fermion. The spectrum is
        - img [ref=e7420]
        - text: ", a"
