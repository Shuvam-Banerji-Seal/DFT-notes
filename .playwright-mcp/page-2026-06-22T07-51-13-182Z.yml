        - img [ref=e10013]
        - text: "-dimensional HOTI of order"
        - img [ref=e10019]
        - text: has a
        - emphasis [ref=e10024]: gapless
        - img [ref=e10026]
        - text: "-dimensional boundary, with all higher-dimensional boundaries *gappe"
        - code [ref=e10039]: d*
        - text: . The first explicit HOTI models (Benalcazar, Bernevig, Hughes, 2017) and the first realisation (Bi
        - img [ref=e10041]
        - text: Br
        - img [ref=e10048]
        - text: in 2018) launched the sub-field.
