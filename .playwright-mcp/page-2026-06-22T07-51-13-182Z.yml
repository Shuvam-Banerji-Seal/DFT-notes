      - heading "16.11 Problems" [level=2] [ref=e12586]
      - group [ref=e12587]:
        - generic "▸ Problem 1 (easy) — Berry phase of a spin-1/2 in a slowly rotating magnetic field" [ref=e12588] [cursor=pointer]
        - text: A spin-1/2 particle is placed in a magnetic field with fixed and slowly increasing from to . The Hamiltonian is . 1. Write the instantaneous ground state in the basis of eigenstates. 2. Compute the Berry connection . 3. Compute the Berry phase . 4. Show that for the *excited* state the Berry phase is .
      - group [ref=e12589]:
        - generic "▸ Show answer" [ref=e12590] [cursor=pointer]
        - text: "**Setup.** The instantaneous Hamiltonian is with the unit vector along . The eigenstates are the spin states quantised along : the ground state is spin *anti-parallel* to (energy ); the excited state is spin *parallel* (energy ). **1. Ground-state wavefunction.** Using the standard parameterisation of a spin-1/2 state on a cone, the ground-state eigenvector along is This is a *normalise`d*' state with . The *overall* phase of the eigenvector is conventional; we have chosen the phase so that the component is real and the component carries the azimuthal phase . **2. Berry connection.** Differentiate with respect to : Form the inner product with : The Berry connection is The connection is *constant* in (because the eigenvector depends on only through the *overall* phase of the component, which does not contribute to the connection after the inner product with the component cancels). **3. Berry phase.** Integrate around the closed loop: This is the well-known result: the Berry phase of a spin-1/2 adiabatically rotated around a cone of half-angle is , equal to half the solid angle subtended by the cone. For (rotation in the equatorial plane), . For (no rotation) or (rotation around the spin direction), . **4. Excited state.** The excited state in the same phase convention is . The same calculation gives and . The two Berry phases do *not* sum to zero in general (the field breaks TR symmetry), confirming that \"Berry phase\" is a property of the *eigenstate*, not of the *Hamiltonian*. **Geometric interpretation.** where is the solid angle subtended by the cone: Berry's \"half-solid-angle\" theorem for a spin-1/2."
      - group [ref=e12591]:
        - generic "▸ Problem 2 (medium) — Chern number of a massive Dirac Hamiltonian in 2D" [ref=e12592] [cursor=pointer]
        - text: Consider a 2D massive Dirac Hamiltonian where are Pauli matrices acting in a two-dimensional subspace, is the velocity, and is the mass. 1. Compute the Berry curvature of the lower band as a function of , , and . 2. Compute the Chern number of the lower band by integrating over the 2D -plane (not just the BZ — for the moment, take the model as defined on ). 3. Show that the Chern number jumps by as passes through . 4. Discuss the topological distinction between and .
      - group [ref=e12593]:
        - generic "▸ Show answer" [ref=e12594] [cursor=pointer]
        - text: "**1. Berry curvature.** Use the \"sum-over-states\" form . For a 2×2 Hamiltonian the only other band is , and the formula reduces to The partial derivatives are and . The non-trivial matrix element is so the curvature is The Berry curvature of the upper band is the negative of this: , as required by the sum rule for a 2×2 Hamiltonian. **2. Chern number of the lower band.** Integrate the Berry curvature over the 2D -plane. The integral is rotationally symmetric, so we use polar coordinates , : The factor of from the integral cancels the in the Chern number formula. Substitute , , so : For , . For , . **3. The Chern number is *not* an integer.** Something is wrong! The Chern number must be an integer, but our calculation gives . The reason is that is *not* defined on a compact momentum space: the integration region is . For a continuum model on , the \"Chern number\" is the **parity anomaly** of a 2D Dirac fermion (a half-integer). To get an integer, we need a *compact* integration region, i.e. a BZ (a torus ). **4. Resolution: compactify the model to a sphere .** The spectrum on the sphere is *discrete* (angular momentum ) and the Chern number is an integer: for , for , and the gap closes at . The change of by across is the *topological phase transition*. In a *lattice* model (e.g. the Haldane model on the honeycomb) the compactness is automatic and the Chern number is always an integer; the gap-closing happens at the Dirac point. The two lessons: (i) the Chern number is a *topological* invariant, changing only at a gap closing; (ii) it is an *integer* only when the model lives on a *compact* momentum space."
