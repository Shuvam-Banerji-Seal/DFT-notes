      - paragraph [ref=e12787]:
        - text: The Kane–Mele 2005 paper is the
        - emphasis [ref=e12788]: founding document
        - text: of the 2D topological insulator field. The paper is four pages long and is densely argued. The argument proceeds in three moves.
      - paragraph [ref=e12789]:
        - strong [ref=e12790]: Move 1 — the definition of the QSH state.
        - text: The paper opens by defining the quantum spin Hall state. A 2D TR-symmetric insulator is in the QSH phase if, at each edge, there is an
        - emphasis [ref=e12791]:
          - text: od
          - code [ref=e12792]: d*' number of Kramers pairs of counter-propagating, spin-filtered edge states [Kane and Mele, 2005, p. 146802-1]. This is the working definition; the rest of the paper derives a *bul
          - text: k
        - text: ’ diagnostic that distinguishes this phase from the trivial insulator.
      - paragraph [ref=e12793]:
        - text: "The formal QSH insulator definition is given in eq. (1) of the paper [Kane and Mele, 2005, eq. (1), p. 146802-1]: a many-body state of"
        - img [ref=e12795]
        - text: electrons is in the QSH phase if the
        - emphasis [ref=e12800]: many-body
        - text: expectation value of the TR operator
        - img [ref=e12802]
        - text: has eigenvalue
        - img [ref=e12808]
        - text: on the degenerate ground state. In symbols,
        - img [ref=e12816]
        - text: . The two signs distinguish the
        - emphasis [ref=e12845]: trivial
        - text: (eigenvalue
        - img [ref=e12847]
        - text: ) and the
        - emphasis [ref=e12854]: non-trivial
        - text: (eigenvalue
        - img [ref=e12856]
        - text: ) insulators. This is the
        - emphasis [ref=e12863]: many-body
        - img [ref=e12865]
        - text: index; the rest of the paper shows how to compute it from the
        - emphasis [ref=e12874]: single-particle
        - text: band structure.
      - paragraph [ref=e12875]:
        - strong [ref=e12876]: Move 2 — the time-reversal polarisation.
        - text: The key insight is that the bulk
        - img [ref=e12878]
        - text: index can be written as a
        - emphasis [ref=e12887]: time-reversal
        - text: polarisation. For a 1D TR-symmetric insulator, the electric polarisation
