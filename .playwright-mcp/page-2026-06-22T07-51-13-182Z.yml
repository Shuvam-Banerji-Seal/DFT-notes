        - text: "of the Weyl node:"
        - img [ref=e7516]
        - text: is a
        - emphasis [ref=e7523]: right-handed
        - text: ’ Weyl fermion,
        - img [ref=e7525]
        - text: is left-handed
        - emphasis [ref=e7532]: . The chirality is a property of the *Hamiltonian
        - text: ", not of the state, and it is conserved by smooth deformations that preserve the gap elsewhere."
      - paragraph [ref=e7533]:
        - strong [ref=e7534]: Nielsen–Ninomiya theorem
        - text: "(the “no-go” theorem for Weyl fermions in a BZ): the"
        - emphasis [ref=e7535]: sum
        - text: of the chiralities of all Weyl nodes in the Brillouin zone is zero. Weyl nodes come in pairs of opposite chirality related by the
        - emphasis [ref=e7536]: remaining
        - text: "symmetry when TRS or inversion is broken. The net rule:"
        - strong [ref=e7537]: the BZ always contains an even number of Weyl nodes, with equal numbers of left- and right-handed chiralities
        - text: .
      - paragraph [ref=e7538]: The two “textbook” Weyl semimetals are
      - list [ref=e7539]:
        - listitem [ref=e7540]:
          - strong [ref=e7541]: TaAs
          - text: (Weng
          - emphasis [ref=e7542]: et al.
          - text: ", Phys. Rev. X"
          - strong [ref=e7543]: "5"
          - text: ", 011029 (2015); Xu"
          - emphasis [ref=e7544]: et al.
          - text: ", Science"
          - strong [ref=e7545]: "349"
          - text: ", 613 (2015)): inversion-broken, TRS-preserved. 24 Weyl nodes split into two groups of 8 above and 8 below the"
          - img [ref=e7547]
          - text: plane, with chirality alternating around each group.
        - listitem [ref=e7559]:
          - strong [ref=e7560]: NbAs, NbP, TaP
          - text: ": same family as TaAs."
      - paragraph [ref=e7561]:
        - text: The defining experimental signature is the
        - strong [ref=e7562]: Fermi arc
        - text: ": a surface state connecting the"
        - emphasis [ref=e7563]: projections
        - text: of two bulk Weyl nodes of opposite chirality on the surface BZ. The arc is
        - emphasis [ref=e7564]: open
        - text: (a chord, not a loop); it merges into the bulk Weyl cone at each end.
      - heading "16.6.3 Nodal-line semimetals" [level=3] [ref=e7565]
      - paragraph [ref=e7566]:
        - text: A
        - emphasis [ref=e7567]: nodal-line semimetal
        - text: "has a line (1D) of two-fold band crossings in the BZ, rather than an isolated point. The low-energy Hamiltonian near a point on the line is the 2D massless Dirac Hamiltonian in the plane perpendicular to the line:"
      - img [ref=e7569]
      - paragraph [ref=e7616]:
        - text: where
        - img [ref=e7618]
        - text: is the displacement from the line,
        - img [ref=e7625]
        - text: are the components perpendicular to the line, and
        - img [ref=e7641]
        - text: are Pauli matrices in the two-band subspace. The dispersion is
        - img [ref=e7657]
        - text: in the perpendicular plane; along the line the two bands are degenerate and their dispersion is
        - emphasis [ref=e7692]: flat
        - text: (if the Hamiltonian has no
        - img [ref=e7694]
        - text: dependence on the line) or
        - emphasis [ref=e7702]: linear
        - text: (if it does).
      - paragraph [ref=e7703]:
        - text: Nodal lines are protected by
        - emphasis [ref=e7704]: mirror
        - text: symmetry, PT symmetry (the product of parity and TR), or — in non- centrosymmetric, non-magnetic crystals — by an
        - emphasis [ref=e7705]: antiunitary
        - text: symmetry that squares to
        - img [ref=e7707]
        - text: (e.g. the product of mirror and TR). When the protecting symmetry is broken (e.g. by spin–orbit coupling that breaks mirror symmetry), the nodal line gaps out into a pair of Weyl nodes, and the system becomes a Weyl semimetal. This is the
        - emphasis [ref=e7714]: symmetry-breaking
        - text: pathway between nodal-line and Weyl phases.
      - paragraph [ref=e7715]:
        - text: Material realisations of nodal-line semimetals include
        - strong [ref=e7716]: ZrSiS
        - text: (nodal line protected by the non-symmorphic symmetry of the body-centred tetragonal lattice, lying close to the Fermi energy),
        - strong [ref=e7717]:
          - text: PbTaSe
          - img [ref=e7719]
        - text: (an asymmetric, TR-symmetric mirror-protected nodal line), and the
        - strong [ref=e7725]:
          - text: antiperovskite Cu
          - img [ref=e7727]
          - text: PdN
        - text: family (TR-symmetric mirror-protected nodal lines around
        - img [ref=e7734]
        - text: ).
      - paragraph [ref=e7739]:
        - text: The family of semimetals covered in this section is the
        - emphasis [ref=e7740]: gapless
        - text: branch of the topology zoo. The full zoo — the
        - emphasis [ref=e7741]: gapped
        - text: ’ branch and the gapless branch, together — is summarised below.
