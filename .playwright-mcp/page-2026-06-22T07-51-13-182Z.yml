        - img [ref=e9417]
        - text: is the surface unit-cell Hamiltonian and
        - img [ref=e9429]
        - text: is the
        - strong [ref=e9434]: self-energy
        - text: "of the semi-infinite bulk:"
      - img [ref=e9436]
      - paragraph [ref=e9507]:
        - text: with
        - img [ref=e9509]
        - text: the surface-to-bulk coupling. The surface spectral function
      - img [ref=e9515]
      - paragraph [ref=e9581]:
        - text: has delta-function peaks at the energies of
        - emphasis [ref=e9582]: "true"
        - text: surface states (Tamm states localised at
        - img [ref=e9584]
        - text: ) and of the
        - emphasis [ref=e9593]: "projecte`d"
        - text: ’ bulk states. The topological surface state is the delta peak that lies
        - emphasis [ref=e9594]: inside
        - text: the bulk gap and is not in the projected bulk spectrum.
      - paragraph [ref=e9595]:
        - text: The surface Green’s function is implemented in
        - strong [ref=e9596]: WannierTools
        - text: (for Wannier-interpolated Hamiltonians) and in
        - strong [ref=e9597]: Z2Pack
        - text: (for tight-binding or first-principles Hamiltonians in the
        - emphasis [ref=e9598]: projector
        - text: form). Z2Pack in particular is a general-purpose topological-invariant calculator (Grubić
        - emphasis [ref=e9599]: et al.
        - text: ", Phys. Rev. B"
        - strong [ref=e9600]: "102"
        - text: ", 245132 (2020)) that computes the Chern number, the"
        - img [ref=e9602]
        - text: index, and the surface spectrum of any gapped (or nodal) band structure, with a clean Python interface.
      - blockquote [ref=e9611]:
        - paragraph [ref=e9612]:
          - strong [ref=e9613]: Tip.
          - text: "The relation between the slab calculation and the surface Green’s function is the same as the relation between the finite-cluster calculation and the Dyson equation: the slab is a"
          - emphasis [ref=e9614]: real-space
          - text: finite region; the surface Green’s function is the
          - emphasis [ref=e9615]: self-energy
          - text: "-dressed surface layer. The two should agree in the limit of an infinitely thick slab, but the surface Green’s function is much cheaper to compute and does not suffer from finite-size effects (the “finite-thickness” splitting of the two surfaces of a slab)."
