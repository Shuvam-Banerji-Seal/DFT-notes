        - paragraph [ref=e3900]:
          - strong [ref=e3901]: Tip.
          - text: The Hofstadter butterfly is realised in moiré superlattices of bilayer graphene (h-BN-encapsulated, twisted at the magic angle) and in optical lattices of cold atoms. The Chern numbers of the sub-bands in twisted-bilayer graphene at certain flux values are the origin of the
          - emphasis [ref=e3902]: fractional
          - text: "Chern insulator states observed in 2023. ## 16.4 The quantum spin Hall effect and 2D topological insulators"
      - paragraph [ref=e3903]:
        - text: "In 2005, Kane and Mele showed that a 2D time-reversal- symmetric insulator can be non-trivial in a way the IQHE is not. The quantum spin Hall (QSH) effect is the TR-symmetric analogue of the QAH: a bulk insulator with"
