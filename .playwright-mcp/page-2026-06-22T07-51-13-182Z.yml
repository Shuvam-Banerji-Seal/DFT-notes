      - paragraph [ref=e9309]:
        - text: "The slab calculation is intuitive but expensive: a 40-cell slab has 40× the atoms of a single bulk cell. The"
        - strong [ref=e9310]: surface Green’s function
        - text: method computes the
        - emphasis [ref=e9311]: same
        - text: surface spectrum at a cost comparable to a single bulk calculation.
