      - code [ref=e26691]: "# dft_notes/python_codes/chapter_01/02-harmonic-oscillator.py import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt from scipy.sparse import diags from scipy.sparse.linalg import eigsh def qho_eigensystem(L=8.0, N=800, n_eig=6): \"\"\"Lowest eigenpairs of the 1-D harmonic oscillator with hard walls.\"\"\" h = 2.0 * L / (N + 1) x = np.linspace(-L + h, L - h, N) # Kinetic: 3-point stencil; potential: diagonal. main = (1.0 / h**2) * np.full(N, 2.0) + 0.5 * x**2 off = -(1.0 / h**2) * np.full(N - 1, 1.0) H = diags([off, main, off], [-1, 0, 1]) evals, evecs = eigsh(H, k=n_eig, which=\"SM\") # Normalise the eigenvectors to unit L2 norm on the grid. evecs /= np.sqrt(h) return x, evals, evecs x, evals, evecs = qho_eigensystem() print(\"Harmonic-oscillator eigenvalues (numerical vs analytical):\") for n, E in enumerate(evals): print(f\" n={n} numerical={E:9.6f} exact={n + 0.5:9.6f} Δ={E - (n + 0.5):+.2e}\") # Plot the lowest four wavefunctions on top of the potential. fig, ax = plt.subplots(figsize=(7.0, 4.5)) xs = np.linspace(-6, 6, 400) ax.plot(xs, 0.5 * xs**2, \"k-\", lw=1.0, label=\"V(x) = x²/2\") for n in range(4): ax.axhline(n + 0.5, color=\"grey\", lw=0.5, ls=\":\") scale = 0.6 ax.plot(x, scale * evecs[:, n] + (n + 0.5), label=f\"$\\\\psi_$, E = {n + 0.5:.1f}\") ax.set_xlim(-6, 6) ax.set_ylim(-0.5, 4.5) ax.set_xlabel(\"x / $x_0$\") ax.set_ylabel(\"energy / $\\\\omega$\") ax.legend(fontsize=8, loc=\"upper right\") ax.set_title(\"1-D harmonic oscillator — finite-difference eigenstates\") fig.tight_layout() fig.savefig(\"plots/02-finite-square-well.png\", dpi=140)"
