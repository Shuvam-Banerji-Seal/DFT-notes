      - paragraph [ref=e1516]:
        - text: A short Python snippet that solves the same problem
        - strong [ref=e1517]: numerically
        - text: by discretising the Laplacian and calling
        - code [ref=e1518]: numpy.linalg.eigh
        - text: ":"
      - code [ref=e1522]: "# dft_notes/python_codes/chapter_01/01-particle-in-box.py import numpy as np def particle_in_a_box(L=1.0, N=400): \"\"\"Return the first 5 eigenpairs of a 1-D particle in a box of length L.\"\"\" h = L / (N + 1) # grid spacing x = np.linspace(h, L - h, N) # 3-point stencil for the second derivative diag_main = np.full(N, 2.0) diag_off = np.full(N - 1, -1.0) H = (np.diag(diag_main) + np.diag(diag_off, +1) + np.diag(diag_off, -1)) / (2 * h**2) evals, evecs = np.linalg.eigh(H) # Sort by absolute value; skip the trivial infinite-wall mode order = np.argsort(evals) return evals[order[:5]], evecs[:, order[:5]], x energies, _, x = particle_in_a_box() for n, E in enumerate(energies, start=1): exact = (np.pi * n)**2 / 2 print(f\" n={n} numerical={E:9.5f} exact={exact:9.5f} Δ={E - exact:+.2e}\")"
      - paragraph [ref=e1523]:
        - text: For a 400-point grid, the first five eigenvalues agree with the analytical formula to better than
        - img [ref=e1525]
        - text: Hartree.
      - blockquote [ref=e1537]:
        - paragraph [ref=e1538]:
          - strong [ref=e1539]: Warning.
          - text: A diagonalising eigensolver is
          - emphasis [ref=e1540]: never
          - text: the right way to solve a real quantum chemistry problem — it costs
          - img [ref=e1542]
          - text: and stores
          - img [ref=e1557]
          - text: . The point of the snippet is to make the formal eigenproblem
          - img [ref=e1572]
          - text: feel concrete. Production codes use
          - strong [ref=e1589]: iterative
          - text: eigensolvers (Lanczos, Davidson) that never materialise the full Hamiltonian.
