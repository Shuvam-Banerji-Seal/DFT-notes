      - heading "Chapter 01 — Schrödinger equation" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]: The single most important equation in non-relativistic quantum mechanics. Every other equation in these notes is a special case, a mean-field approximation, or a comment on this one.
      - paragraph [ref=e30]:
        - text: This chapter is the foundation under everything that follows. It does five things.
        - strong [ref=e31]: (1)
        - text: States the postulates that fix the formalism (section 1.2) and writes down the
        - strong [ref=e32]: time-independent
        - text: Schrödinger equation (TISE) for the electronic Hamiltonian in atomic units (section 1.1).
        - strong [ref=e33]: (2)
        - text: Walks through the particle in a box as a toy problem that lets us see the formalism in action, including a short Python finite-difference diagonalisation (section 1.3) and a catalogue of the operators that recur in every later chapter (section 1.4).
        - strong [ref=e34]: (3)
        - text: Derives the
        - strong [ref=e35]: time-dependent
        - text: Schrödinger equation (TDSE) from the time-dependent variational principle, reconstructs the TISE as the special case of a stationary state, and states the unitarity + continuity consequences (section 1.7).
        - strong [ref=e36]: (4)
        - text: Develops the
        - strong [ref=e37]: operator formalism
        - text: — linear operators on Hilbert space, the canonical commutation relations, the spectral theorem, and functions of operators such as the time-evolution operator
        - img [ref=e39]
        - text: (section 1.10) — and uses it to re-derive the time-evolution propagator, the stationary-state phase factor, and Fermi’s golden rule in operator language (section 1.11).
        - strong [ref=e72]: (5)
        - text: Closes the formal foundation with a preview of the
        - strong [ref=e73]: symmetry and conservation-law
        - text: "structure of quantum mechanics (section 1.12): Noether’s theorem, the discrete symmetries of parity / time-reversal / particle–hole, and the selection rules they imply. The two exactly soluble many-body problems that anchor all of quantum chemistry are then solved within that framework: the"
        - strong [ref=e74]: harmonic oscillator
        - text: (section 1.9) and the
        - strong [ref=e75]: hydrogen atom
        - text: (section 1.13). No prior quantum knowledge is assumed; every operator and every symbol is defined where it first appears.
