          - emphasis [ref=e27271]: first-quantised
          - text: ", with a fixed particle number. Processes that change particle number (pair creation, absorption) need a second-quantised or quantum-field-theoretic framework. TDDFT in the Floquet / strong-field regime touches field theory."
