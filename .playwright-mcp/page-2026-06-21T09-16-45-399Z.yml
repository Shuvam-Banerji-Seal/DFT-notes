      - 'heading "1.13.9 Worked example: hydrogen radial eigenfunctions" [level=3] [ref=e26468]'
      - paragraph [ref=e26469]:
        - text: We now make the abstract solution concrete. The script below evaluates the first few radial hydrogen eigenfunctions on a logarithmic grid (because the wavefunctions change scale by orders of magnitude between the inner turning point and the outer tail) and plots them. The script lives at
        - code [ref=e26470]: dft_notes/python_codes/chapter_01/03-hydrogen-radial.py
        - text: .
      - code [ref=e26474]: "# dft_notes/python_codes/chapter_01/03-hydrogen-radial.py import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt from scipy.special import genlaguerre # Hydrogen radial eigenfunctions R_{n,ell}(r) for Z=1. # Convention: R_{n,ell} * Y_l^m is normalised to unity in 3D. # Source: Messiah, Quantum Mechanics, vol I, eq. B.45. def R_nl(n, ell, r): \"\"\"Normalised hydrogen radial wavefunction R_{n,ell}(r).\"\"\" rho = 2.0 * r / n N = -np.sqrt((2.0 / n) ** 3 * np.math.factorial(n - ell - 1) / (2.0 * n * np.math.factorial(n + ell))) return N * np.exp(-r / n) * rho ** ell * genlaguerre(n - ell - 1, 2 * ell + 1)(rho) # Radial grid r = np.linspace(0.05, 30.0, 600) fig, ax = plt.subplots(figsize=(7.0, 4.5)) for n, ell, label in [(1, 0, \"1s\"), (2, 0, \"2s\"), (2, 1, \"2p\"), (3, 0, \"3s\"), (3, 1, \"3p\"), (3, 2, \"3d\")]: R = R_nl(n, ell, r) ax.plot(r, R, label=f\"$R_\\u007bn{label[1:]}\\u007d(r)$ E={-1/(2*n*n):+.4f} $E_h$\") ax.axhline(0, color=\"black\", lw=0.5) ax.set_xlabel(\"r / $a_0$\") ax.set_ylabel(\"$R_{n\\\\ell}(r)$ / $a_0^{-3/2}$\") ax.set_xlim(0, 25) ax.set_ylim(-0.5, 0.6) ax.legend(fontsize=8, loc=\"upper right\") ax.set_title(\"Hydrogen radial eigenfunctions (Z = 1)\") fig.tight_layout() fig.savefig(\"plots/03-hydrogen-orbitals.png\", dpi=140)"
      - paragraph [ref=e26475]:
        - text: "The script produces a single PNG that we will reference in the plot caption below. The expected output is six oscillating curves: 1s (nodeless, peaked at the origin), 2s (one node,"
        - img [ref=e26477]
        - text: ), 2p (proportional to
        - img [ref=e26492]
        - text: at the origin, single peak), 3s (two nodes), 3p (one node), 3d (no radial nodes, proportional to
        - img [ref=e26498]
        - text: at the origin).
      - paragraph [ref=e26506]:
        - 'img "Hydrogen radial eigenfunctions, $R_{n\\ell}(r)$ for $n = 1, 2, 3$ and $\\ell = 0, 1, 2$. Output of `dft_notes/python_codes/chapter_01/03-hydrogen-radial.py`." [ref=e26507]'
