        - img [ref=e11275]
        - text: electrons of an aromatic hydrocarbon as a tight-binding model on the carbon
        - img [ref=e11281]
        - text: orbitals, with a
        - emphasis [ref=e11291]: single
        - text: resonance integral
        - img [ref=e11293]
        - text: for every nearest-neighbour coupling and a
        - emphasis [ref=e11298]: single
        - text: on-site energy
        - img [ref=e11300]
        - text: for every carbon. The Hückel Hamiltonian is
      - img [ref=e11306]:
        - generic [ref=e11308]:
          - generic [ref=e11314]: ü
          - generic [ref=e11327]:
            - img [ref=e11331]
            - img [ref=e11333]
