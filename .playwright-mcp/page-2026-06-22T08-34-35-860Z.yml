      - heading "14.6 Semiempirical methods" [level=2] [ref=e11260]
      - paragraph [ref=e11261]:
        - text: The
        - emphasis [ref=e11262]: semiempirical
        - text: methods are a family of approximate quantum-chemistry methods that
        - emphasis [ref=e11263]: replace
        - text: the expensive two-electron integrals with
        - emphasis [ref=e11264]: empirical parameters
        - text: fitted to experiment or to high-accuracy calculations. The semiempirical family is
        - emphasis [ref=e11265]: older
        - text: than DFT (the
        - emphasis [ref=e11266]: Hückel
        - text: method is from 1930), and is the only quantum-chemistry approach that is
        - emphasis [ref=e11267]:
          - text: fast enoug
          - code [ref=e11268]: h*' for *millions* of atoms (molecular dynamics of proteins, molecular electronics, combinatorial chemistry). The *modern* semiempirical methods — PM3, PM6, PM7, DFTB — are *not* the Hückel method of the 1930s; they are *systematically improvable* approximations to the full electronic problem that retain the *spee
          - text: d
        - text: ’ of the historical methods and the
        - emphasis [ref=e11269]: accuracy
        - text: of the modern ones.
