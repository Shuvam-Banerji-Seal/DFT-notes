      - heading "14.12 What we left out" [level=2] [ref=e16038]
      - paragraph [ref=e16039]:
        - text: The chapter scratched the surface of a
        - emphasis [ref=e16040]: large
        - text: field. The five omissions below are the most important for a
        - emphasis [ref=e16041]: complete
        - text: picture of the post-HF landscape.
      - list [ref=e16042]:
        - listitem [ref=e16043]:
          - paragraph [ref=e16044]:
            - strong [ref=e16045]: Explicitly correlated (F12) methods.
            - text: The
            - emphasis [ref=e16046]: conventional
            - text: MP2, CCSD, and CCSD(T) methods have a
            - emphasis [ref=e16047]: slow
            - text: basis-set convergence because the electron–electron cusp is
            - emphasis [ref=e16048]: not
            - text: described by the finite Gaussian basis. The
            - strong [ref=e16049]: F12
            - text: methods (Hättig, Klopper, Tew, Valeev,
            - emphasis [ref=e16050]: Chem. Rev.
            - strong [ref=e16051]: "112"
            - text: ", 4 (2012)) add a"
            - emphasis [ref=e16052]: geminal
            - text: correlation factor
