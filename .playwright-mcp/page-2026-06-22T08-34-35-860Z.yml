        - text: The Hückel method has
        - emphasis [ref=e11398]: "no"
        - text: overlap matrix, no two-electron integrals, and
        - emphasis [ref=e11399]: "no"
        - text: geometry optimisation; the
        - img [ref=e11401]
        - text: energy is the sum of the eigenvalues of the
        - emphasis [ref=e11406]: topological
        - text: matrix of the carbon skeleton. The method is
        - emphasis [ref=e11407]: quantitatively
        - text: useless for any
        - emphasis [ref=e11408]: quantitative
        - text: purpose, but it is
        - emphasis [ref=e11409]: qualitatively
        - text: "correct for the aromatic* patterns of organic chemistry: the Hückel"
        - img [ref=e11411]
        - text: rule, the alternation of single and double bonds in polyenes, and the
        - emphasis [ref=e11422]: frontier
        - text: orbitals of conjugated systems. It is still taught in every undergraduate organic-chemistry course.
