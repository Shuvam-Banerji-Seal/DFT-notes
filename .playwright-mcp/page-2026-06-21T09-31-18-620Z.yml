      - paragraph [ref=e363]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e364] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.5 (“Range-separated hybrids”).
      - paragraph [ref=e365]:
        - text: The HSE06 functional is the standard range-separated hybrid for solid-state DFT. It splits the Coulomb interaction into a short-range part treated at the PBE level and a long-range part treated with 25% exact exchange, using the complementary error function
        - code [ref=e366]: erfc(ω r)
        - text: as the partition (with
        - img [ref=e368]
        - text: bohr
        - img [ref=e381]
        - text: — the inverse screening length). The screening makes the exact-exchange integral short-ranged (so it can be evaluated in a plane-wave basis with a modest real-space cutoff). HSE06 is the default functional in many solid-state codes (VASP, FHI-aims, Quantum ESPRESSO) for production runs.
      - separator [ref=e390]
      - heading "2.6 Tao, Perdew, Staroverov & Scuseria (2003) — TPSS meta-GGA" [level=3] [ref=e391]
      - paragraph [ref=e392]:
        - strong [ref=e393]: Tao, J.; Perdew, J. P.; Staroverov, V. N.; Scuseria, G. E.
        - text: "“Climbing the Density-Functional Ladder: Nonempirical Meta–Generalized Gradient Approximation Designed for Molecules and Solids.”"
        - emphasis [ref=e394]: Physical Review Letters
        - strong [ref=e395]: "2003"
        - text: ","
        - emphasis [ref=e396]: "91"
        - text: (14),
      - list [ref=e397]:
        - listitem [ref=e398]:
          - text: "DOI:"
