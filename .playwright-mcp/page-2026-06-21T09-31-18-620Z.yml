      - separator [ref=e56]
      - heading "1. Foundational DFT papers" [level=2] [ref=e57]
      - paragraph [ref=e58]: The seven papers below are the theoretical foundation of Kohn–Sham DFT. Every chapter of these notes (except chapter 01) cites at least one of them.
      - heading "1.1 Hohenberg & Kohn (1964) — Inhomogeneous electron gas" [level=3] [ref=e59]
      - paragraph [ref=e60]:
        - strong [ref=e61]: Hohenberg, P.; Kohn, W.
        - text: “Inhomogeneous Electron Gas.”
        - emphasis [ref=e62]: Physical Review
        - strong [ref=e63]: "1964"
        - text: ","
        - emphasis [ref=e64]: "136"
        - text: "(3B), B864–B871. DOI:"
        - link "10.1103/PhysRev.136.B864" [ref=e65] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRev.136.B864
        - text: ". URL:"
        - link "https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864" [ref=e66] [cursor=pointer]:
          - /url: https://journals.aps.org/pr/abstract/10.1103/PhysRev.136.B864
        - text: .
      - paragraph [ref=e67]:
        - text: "Cited in:"
        - link "chapter 04" [ref=e68] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.1; also
        - link "chapter 02" [ref=e69] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-02/
        - text: and
        - link "chapter 03" [ref=e70] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-03/
        - text: in their historical-context paragraphs.
      - paragraph [ref=e71]:
        - text: "Two theorems: (i) the ground-state density of a non-relativistic system of interacting electrons in an external potential determines that potential uniquely (up to a constant), so every ground-state observable is a functional of the density alone; and (ii) the density-functional energy is minimised by the ground-state density. The 1964 paper proves"
        - emphasis [ref=e72]: existence
        - text: of the density functional, but does not give a practical algorithm — that is what Kohn–Sham 1965 adds.
      - heading "1.2 Kohn & Sham (1965) — Self-consistent equations" [level=3] [ref=e73]
      - paragraph [ref=e74]:
        - strong [ref=e75]: Kohn, W.; Sham, L. J.
        - text: “Self-Consistent Equations Including Exchange and Correlation Effects.”
        - emphasis [ref=e76]: Physical Review
        - strong [ref=e77]: "1965"
        - text: ","
        - emphasis [ref=e78]: "140"
        - text: "(4A), A1133–A1138. DOI:"
        - link "10.1103/PhysRev.140.A1133" [ref=e79] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRev.140.A1133
        - text: ". URL:"
        - link "https://journals.aps.org/pr/abstract/10.1103/PhysRev.140.A1133" [ref=e80] [cursor=pointer]:
          - /url: https://journals.aps.org/pr/abstract/10.1103/PhysRev.140.A1133
        - text: .
      - paragraph [ref=e81]:
        - text: "Cited in:"
        - link "chapter 04" [ref=e82] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.2–4.4 (“The Kohn–Sham ansatz”, “Why the reformulation is exact”, “The KS self-consistent loop”).
      - paragraph [ref=e83]:
        - text: The paper that makes DFT computable. Introduces the fictitious non-interacting reference system whose density equals the interacting density, and writes down the one-electron eigenvalue equation — the Kohn–Sham equations — that determines the orbitals self-consistently with the effective potential. All of the error in a KS calculation is now confined to a single unknown functional,
        - img [ref=e85]
        - text: . The 1965 paper also introduces the L(S)DA, the local approximation to
        - img [ref=e101]
        - text: using the homogeneous electron gas as the local reference.
      - heading "1.3 Sham & Kohn (1966) — Uniform electron gas" [level=3] [ref=e110]
      - paragraph [ref=e111]:
        - strong [ref=e112]: Sham, L. J.; Kohn, W.
        - text: “One-Particle Properties of an Inhomogeneous Interacting Electron Gas.”
        - emphasis [ref=e113]: Physical Review
        - strong [ref=e114]: "1966"
        - text: ","
        - emphasis [ref=e115]: "145"
        - text: "(2), 561–567. DOI:"
        - link "10.1103/PhysRev.145.561" [ref=e116] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRev.145.561
        - text: ". URL:"
        - link "https://journals.aps.org/pr/abstract/10.1103/PhysRev.145.561" [ref=e117] [cursor=pointer]:
          - /url: https://journals.aps.org/pr/abstract/10.1103/PhysRev.145.561
        - text: .
      - paragraph [ref=e118]:
        - text: "Cited in:"
        - link "chapter 04" [ref=e119] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.3 as the source of the “uniform electron gas” reference for the LDA.
      - paragraph [ref=e120]: The companion paper to Kohn–Sham 1965. Establishes the connection between the KS one-particle eigenvalues and the occupation-number derivative of the total energy — the foundation of Koopmans-type analyses in DFT (later extended by Janak 1978). The paper also works out the L(S)DA for the spin-unpolarised case and demonstrates that the local approximation is well defined for the XC energy, the XC potential, and the quasiparticle spectrum alike.
      - heading "1.4 Perdew & Zunger (1981) — Self-interaction correction" [level=3] [ref=e121]
      - paragraph [ref=e122]:
        - strong [ref=e123]: Perdew, J. P.; Zunger, A.
        - text: “Self-interaction correction to density-functional approximations for many-electron systems.”
        - emphasis [ref=e124]: Physical Review B
        - strong [ref=e125]: "1981"
        - text: ","
        - emphasis [ref=e126]: "23"
        - text: "(10), 5048–5079. DOI:"
        - link "10.1103/PhysRevB.23.5048" [ref=e127] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevB.23.5048
        - text: ". URL:"
        - link "https://journals.aps.org/prb/abstract/10.1103/PhysRevB.23.5048" [ref=e128] [cursor=pointer]:
          - /url: https://journals.aps.org/prb/abstract/10.1103/PhysRevB.23.5048
        - text: .
      - paragraph [ref=e129]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e130] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.1–5.2 as the modern parameterisation of the LDA in terms of the Ceperley–Alder Monte Carlo data.
      - paragraph [ref=e131]:
        - text: "The first systematic treatment of the self-interaction error (SIE) that is present in every LDA/GGA functional: the Coulomb energy of the density with itself is not cancelled by the corresponding exchange–correlation piece. The Perdew–Zunger SIC subtracts the SIE on an orbital-by-orbital basis and produces significantly improved atomisation energies and ionisation potentials. The paper is also the standard source for the LDA parameterisation in terms of"
        - img [ref=e133]
        - text: using the Ceperley–Alder (1980) quantum Monte Carlo data.
      - heading "1.5 Perdew & Wang (1992) — LDA parameterisation" [level=3] [ref=e141]
      - paragraph [ref=e142]:
        - strong [ref=e143]: Perdew, J. P.; Wang, Y.
        - text: “Accurate and simple analytic representation of the electron-gas correlation energy.”
        - emphasis [ref=e144]: Physical Review B
        - strong [ref=e145]: "1992"
        - text: ","
        - emphasis [ref=e146]: "45"
        - text: "(23), 13244–13249. DOI:"
        - link "10.1103/PhysRevB.45.13244" [ref=e147] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevB.45.13244
        - text: ". URL:"
        - link "https://journals.aps.org/prb/abstract/10.1103/PhysRevB.45.13244" [ref=e148] [cursor=pointer]:
          - /url: https://journals.aps.org/prb/abstract/10.1103/PhysRevB.45.13244
        - text: .
      - paragraph [ref=e149]:
        - text: "Cited in:"
        - link "chapter 04" [ref=e150] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.8.2 (“The spin-DFT energy functional”) and
        - link "chapter 05" [ref=e151] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.1, as the standard “PW92” parameterisation of the LSDA XC energy.
      - paragraph [ref=e152]:
        - text: A high-accuracy closed-form fit to the Ceperley–Alder quantum-Monte-Carlo data for the homogeneous electron gas across the metallic density range (
        - img [ref=e154]
        - text: ). Combined with the Perdew–Zunger (1981) exchange, this defines the “LDA” used in essentially every production DFT code from 1992 onward. The PW92 fit reproduces the QMC data to better than 1 mHartree/electron.
      - heading "1.6 Perdew, Burke & Ernzerhof (1996) — PBE" [level=3] [ref=e171]
      - paragraph [ref=e172]:
        - strong [ref=e173]: Perdew, J. P.; Burke, K.; Ernzerhof, M.
        - text: “Generalized Gradient Approximation Made Simple.”
        - emphasis [ref=e174]: Physical Review Letters
        - strong [ref=e175]: "1996"
        - text: ","
        - emphasis [ref=e176]: "77"
        - text: "(18), 3865–3868. DOI:"
        - link "10.1103/PhysRevLett.77.3865" [ref=e177] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevLett.77.3865
        - text: ". URL:"
        - link "https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.77.3865" [ref=e178] [cursor=pointer]:
          - /url: https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.77.3865
        - text: .
      - paragraph [ref=e179]:
        - text: "Erratum:"
        - emphasis [ref=e180]: Physical Review Letters
        - strong [ref=e181]: "1997"
        - text: ","
        - emphasis [ref=e182]: "78"
        - text: "(7), 1396. DOI:"
        - link "10.1103/PhysRevLett.78.1396" [ref=e183] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevLett.78.1396
        - text: ". URL:"
        - link "https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.78.1396" [ref=e184] [cursor=pointer]:
          - /url: https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.78.1396
        - text: .
      - paragraph [ref=e185]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e186] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.2 (“GGA — adding the gradient”), as the canonical non-empirical GGA; also
        - link "chapter 05" [ref=e187] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: "§5.9.1 (“The PBE paper: a literature deep-dive”)."
      - paragraph [ref=e188]:
        - text: The PBE functional replaces the earlier ad-hoc PW91 form with a
        - emphasis [ref=e189]: constraint-satisfying
        - text: "GGA: the enhancement factor over LDA exchange and correlation is constructed to obey all the known exact conditions on"
        - img [ref=e191]
        - text: that the authors could enumerate — the LDA limit, the uniform scaling to the high-density limit, the Lieb–Oxford bound, the gradient expansion at small
        - img [ref=e213]
        - text: ", and several more. PBE has"
        - emphasis [ref=e224]: no fitted parameters
        - text: and is the most-cited functional in the solid-state literature. The 1997 erratum fixes the sign of one of the constraints.
      - heading "1.7 Sun, Ruzsinszky & Perdew (2015) — SCAN" [level=3] [ref=e225]
      - paragraph [ref=e226]:
        - strong [ref=e227]: Sun, J.; Ruzsinszky, A.; Perdew, J. P.
        - text: “Strongly Constrained and Appropriately Normed Semilocal Density Functional.”
        - emphasis [ref=e228]: Physical Review Letters
        - strong [ref=e229]: "2015"
        - text: ","
        - emphasis [ref=e230]: "115"
        - text: "(3), 036402. DOI:"
        - link "10.1103/PhysRevLett.115.036402" [ref=e231] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevLett.115.036402
        - text: ". URL:"
        - link "https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.115.036402" [ref=e232] [cursor=pointer]:
          - /url: https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.115.036402
        - text: .
      - paragraph [ref=e233]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e234] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.3 (“Meta-GGA — adding the kinetic-energy density”), as the canonical non-empirical meta-GGA.
      - paragraph [ref=e235]:
        - text: SCAN is the highest-rung
        - emphasis [ref=e236]: parameter-free
        - text: functional in common use. It is built by satisfying 17 known exact constraints on the XC functional of the meta-GGA form
        - img [ref=e238]
        - text: (where
        - img [ref=e264]
        - text: is the positive-definite orbital kinetic-energy density), and is “appropriately normed” by reproducing the exact XC energy of the hydrogen atom. Significantly better than PBE for diversely-bonded systems — surfaces, 2-D materials, ions in solution, transition-metal complexes — at the same meta-GGA cost (
        - img [ref=e270]
        - text: per SCF iteration). The 2021 r²SCAN regularisation restores numerical stability.
      - separator [ref=e282]
      - heading "2. XC functionals" [level=2] [ref=e283]
      - paragraph [ref=e284]: The XC zoo — from the local-density approximation through hybrids and range-separated hybrids. Each functional below adds one more ingredient to the local-density picture.
      - heading "2.1 Vosko, Wilk & Nusair (1980) — VWN" [level=3] [ref=e285]
      - paragraph [ref=e286]:
        - strong [ref=e287]: Vosko, S. H.; Wilk, L.; Nusair, M.
        - text: "“Accurate spin-dependent electron liquid correlation energies for local spin density calculations: a critical analysis.”"
        - emphasis [ref=e288]: Canadian Journal of Physics
        - strong [ref=e289]: "1980"
        - text: ","
        - emphasis [ref=e290]: "58"
        - text: "(8), 1200–1211. DOI:"
        - link "10.1139/p80-159" [ref=e291] [cursor=pointer]:
          - /url: https://doi.org/10.1139/p80-159
        - text: ". URL:"
        - link "https://doi.org/10.1139/p80-159" [ref=e292] [cursor=pointer]:
          - /url: https://doi.org/10.1139/p80-159
        - text: .
      - paragraph [ref=e293]:
        - text: "Cited in:"
        - link "chapter 04" [ref=e294] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.8.2 and
        - link "chapter 05" [ref=e295] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.4 (as a component of B3LYP); also
        - link "chapter 05" [ref=e296] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: "§5.9.2 (“The VWN paper: a literature deep-dive”)."
      - paragraph [ref=e297]: The standard closed-form parameterisation of the LSDA correlation energy, derived from the Ceperley–Alder (1980) quantum Monte Carlo data. The “VWN” functional (re-parameterised “VWN5” in the 1980 erratum, and a simplified “VWN3” form) is the most-cited LSDA correlation parameterisation in chemistry-focused DFT codes. It enters many composite functionals (notably B3LYP) as a component.
      - heading "2.2 Becke (1988) — B88 exchange" [level=3] [ref=e298]
      - paragraph [ref=e299]:
        - strong [ref=e300]: Becke, A. D.
        - text: “Density-functional exchange-energy approximation with correct asymptotic behavior.”
        - emphasis [ref=e301]: Physical Review A
        - strong [ref=e302]: "1988"
        - text: ","
        - emphasis [ref=e303]: "38"
        - text: "(6), 3098–3100. DOI:"
        - link "10.1103/PhysRevA.38.3098" [ref=e304] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevA.38.3098
        - text: ". URL:"
        - link "https://journals.aps.org/pra/abstract/10.1103/PhysRevA.38.3098" [ref=e305] [cursor=pointer]:
          - /url: https://journals.aps.org/pra/abstract/10.1103/PhysRevA.38.3098
        - text: .
      - paragraph [ref=e306]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e307] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.2 and §5.4 (as the exchange component of BLYP and B3LYP); also
        - link "chapter 05" [ref=e308] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: "§5.9.3 (“The B88 paper: a literature deep-dive”)."
      - paragraph [ref=e309]:
        - text: The B88 exchange functional was the first GGA exchange to fix the LDA’s spurious self-interaction by adding a gradient correction that recovers the correct
        - img [ref=e311]
        - text: asymptotic behaviour of the exchange energy density. Fitted to the exchange energies of six noble-gas atoms, B88 is the empirical counterpart to the constraint-based PBE. It is the most widely used GGA exchange in chemistry-focused DFT (B88-PW91, B88-LYP, B88-P86, B3LYP).
      - heading "2.3 Lee, Yang & Parr (1988) — LYP correlation" [level=3] [ref=e323]
      - paragraph [ref=e324]:
        - strong [ref=e325]: Lee, C.; Yang, W.; Parr, R. G.
        - text: “Development of the Colle–Salvetti correlation-energy formula into a functional of the electron density.”
        - emphasis [ref=e326]: Physical Review B
        - strong [ref=e327]: "1988"
        - text: ","
        - emphasis [ref=e328]: "37"
        - text: "(2), 785–789. DOI:"
        - link "10.1103/PhysRevB.37.785" [ref=e329] [cursor=pointer]:
          - /url: https://doi.org/10.1103/PhysRevB.37.785
        - text: ". URL:"
        - link "https://journals.aps.org/prb/abstract/10.1103/PhysRevB.37.785" [ref=e330] [cursor=pointer]:
          - /url: https://journals.aps.org/prb/abstract/10.1103/PhysRevB.37.785
        - text: .
      - paragraph [ref=e331]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e332] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.4 (as the correlation component of BLYP and B3LYP); also
        - link "chapter 05" [ref=e333] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: "§5.9.4 (“The LYP paper: a literature deep-dive”)."
      - paragraph [ref=e334]:
        - text: The LYP correlation functional is derived from the Colle–Salvetti (1975) expression for the correlation energy of a two-electron Hartree–Fock pair density, reformulated as a functional of the density and its Laplacian. It is purely empirical (four parameters fit to the helium atom) and has no LDA component — it is used as a
        - emphasis [ref=e335]: replacement
        - text: for the LSDA correlation, not a correction. Combined with B88 exchange it gives the famous “BLYP” functional, the default GGA in pre-B3LYP computational chemistry.
      - heading "2.4 Becke (1993) — B3LYP hybrid" [level=3] [ref=e336]
      - paragraph [ref=e337]:
        - strong [ref=e338]: Becke, A. D.
        - text: “Density-functional thermochemistry. III. The role of exact exchange.”
        - emphasis [ref=e339]: The Journal of Chemical Physics
        - strong [ref=e340]: "1993"
        - text: ","
        - emphasis [ref=e341]: "98"
        - text: "(7), 5648–5652. DOI:"
        - link "10.1063/1.464913" [ref=e342] [cursor=pointer]:
          - /url: https://doi.org/10.1063/1.464913
        - text: ". URL:"
        - link "https://doi.org/10.1063/1.464913" [ref=e343] [cursor=pointer]:
          - /url: https://doi.org/10.1063/1.464913
        - text: .
      - paragraph [ref=e344]:
        - text: "Cited in:"
        - link "chapter 05" [ref=e345] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: §5.4 (“Hybrids — adding a fraction of exact exchange”).
      - paragraph [ref=e346]: The B3LYP functional is the most-cited density functional in all of computational chemistry. It mixes 20% of exact (non-local) Hartree–Fock exchange with 80% B88 GGA exchange, combined with 81% LYP correlation and 19% VWN (LSDA) correlation, with three parameters fit to a training set of 56 atomisation energies, 42 ionisation potentials, 8 proton affinities, and 10 total atomic energies. B3LYP is the default of essentially every quantum-chemistry code from 1993 onward and remains the workhorse of organic thermochemistry.
      - heading "2.5 Heyd, Scuseria & Ernzerhof (2003) — HSE" [level=3] [ref=e347]
      - paragraph [ref=e348]:
        - strong [ref=e349]: Heyd, J.; Scuseria, G. E.; Ernzerhof, M.
        - text: “Hybrid functionals based on a screened Coulomb potential.”
        - emphasis [ref=e350]: The Journal of Chemical Physics
        - strong [ref=e351]: "2003"
        - text: ","
