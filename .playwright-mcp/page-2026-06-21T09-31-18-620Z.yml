      - separator [ref=e2851]
      - heading "10. Standard textbooks" [level=2] [ref=e2852]
      - paragraph [ref=e2853]:
        - text: The five monographs that should sit on the shelf of anyone working in electronic-structure theory. They are not cited in the chapters directly — the chapters are self-contained — but they are the
        - emphasis [ref=e2854]: next step
        - text: after these notes for a reader who wants the full mathematical apparatus, the historical context, or the production-code perspective.
      - heading "10.1 Parr & Yang (1989) — Density-Functional Theory of Atoms and Molecules" [level=3] [ref=e2855]
      - paragraph [ref=e2856]:
        - strong [ref=e2857]: Parr, R. G.; Yang, W.
        - emphasis [ref=e2858]: Density-Functional Theory of Atoms and Molecules
        - text: ;
        - strong [ref=e2859]: Oxford University Press
        - text: ": New York,"
        - strong [ref=e2860]: "1989"
        - text: "; ix + 333 pp. ISBN: 978-0-19-509276-9 (paperback) / 0-19-504279-4 (hardcover). URL:"
        - link "https://global.oup.com/academic/product/density-functional-theory-of-atoms-and-molecules-9780195092769" [ref=e2861] [cursor=pointer]:
          - /url: https://global.oup.com/academic/product/density-functional-theory-of-atoms-and-molecules-9780195092769
        - text: .
      - paragraph [ref=e2862]:
        - text: A monograph written from the chemistry perspective. Covers the Hohenberg–Kohn theorem, the Kohn–Sham equations, the L(S)DA, the connection to chemical concepts (chemical potential, hardness, Fukui functions, electronegativity equalisation), and the early GGAs. The book is the
        - emphasis [ref=e2863]: bridge
        - text: between the physics of the KS equations and the language of conceptual DFT that chemists use. It assumes only an undergraduate background in quantum mechanics and is the most accessible entry in this section.
      - heading "10.2 Martin (2004) — Electronic Structure" [level=3] [ref=e2864]
      - paragraph [ref=e2865]:
        - strong [ref=e2866]: Martin, R. M.
        - emphasis [ref=e2867]: "Electronic Structure: Basic Theory and Practical Methods"
        - text: ;
        - strong [ref=e2868]: Cambridge University Press
        - text: ": Cambridge, UK,"
        - strong [ref=e2869]: "2004"
        - text: "; xxi + 640 pp. ISBN: 978-0-521-78285-6 (paperback) / 0-521-78285-6 (hardcover). URL:"
        - link "https://www.cambridge.org/9780521782856" [ref=e2870] [cursor=pointer]:
          - /url: https://www.cambridge.org/9780521782856
        - text: .
      - paragraph [ref=e2871]:
        - text: The single most comprehensive textbook on the electronic-structure problem at the graduate level. Covers tight binding, the nearly-free-electron model, density functional theory (Hohenberg–Kohn, KS, LDA, GGA, hybrids, TDDFT), pseudopotentials, the plane-wave method, the full-potential LAPW method, forces and stress, phonons (frozen phonon and DFPT), electron–phonon coupling, the GW approximation, and the Bethe–Salpeter equation. The mathematical apparatus is given in full, the connections to production codes are made explicit, and the worked examples and problem sets are uniformly excellent.
        - strong [ref=e2872]: The book to own if you can own only one.
      - heading "10.3 Dreizler & Gross (1990) — Density Functional Theory" [level=3] [ref=e2873]
      - paragraph [ref=e2874]:
        - strong [ref=e2875]: Dreizler, R. M.; Gross, E. K. U.
        - emphasis [ref=e2876]: "Density Functional Theory: An Approach to the Quantum Many-Body Problem"
        - text: ;
        - strong [ref=e2877]: Springer-Verlag
        - text: ": Berlin,"
        - strong [ref=e2878]: "1990"
        - text: "; xii + 302 pp. ISBN: 978-3-540-51991-7 / 3-540-51991-1. URL:"
        - link "https://link.springer.com/book/10.1007/978-3-642-86105-5" [ref=e2879] [cursor=pointer]:
          - /url: https://link.springer.com/book/10.1007/978-3-642-86105-5
        - text: .
      - paragraph [ref=e2880]: The first comprehensive DFT textbook, written from the many-body physics perspective. Covers the Hohenberg–Kohn theorem and its extensions (spin DFT, current DFT, time dependent), the Kohn–Sham equations, the L(S)DA and its limitations, the early GGAs, and the time-dependent formalism (Runge–Gross, linear response, the Casida equations). More mathematical than Parr–Yang, more physics-oriented than Martin; the standard reference on the formal side of DFT.
      - heading "10.4 Szabo & Ostlund (1989) — Modern Quantum Chemistry" [level=3] [ref=e2881]
      - paragraph [ref=e2882]:
        - strong [ref=e2883]: Szabo, A.; Ostlund, N. S.
        - emphasis [ref=e2884]: "Modern Quantum Chemistry: Introduction to Advanced Electronic Structure Theory"
        - text: ;
        - strong [ref=e2885]: McGraw-Hill
        - text: ": New York,"
        - strong [ref=e2886]: "1989"
        - text: "; xv + 466 pp. ISBN: 0-07-062739-8 (1st ed.). Revised Dover edition:"
        - emphasis [ref=e2887]: Dover Publications
        - text: ": Mineola, NY,"
        - strong [ref=e2888]: "1996"
        - text: "; 480 pp. ISBN: 978-0-486-69186-2. URL:"
        - link "https://store.doverpublications.com/9780486691862.html" [ref=e2889] [cursor=pointer]:
          - /url: https://store.doverpublications.com/9780486691862.html
        - text: .
      - paragraph [ref=e2890]:
        - text: The standard introduction to
        - emphasis [ref=e2891]: wavefunction-based
        - text: quantum chemistry. Covers the postulates, the hydrogen atom, the Hartree–Fock method, the Roothaan–Hall equations, electron correlation (CI, MP, CC), and the Gaussian basis, with worked numerical examples (the H
        - img [ref=e2893]
        - text: STO-3G calculation that is the anchor of
        - link "chapter 06" [ref=e2899] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.9 is table 3.5 of Szabo & Ostlund). The book assumes an undergraduate physical-chemistry background and is the
        - emphasis [ref=e2900]: only
        - text: quantum-chemistry text that consistently derives each equation step-by-step before quoting it. Out of print from McGraw-Hill but freely available from the Dover edition.
      - heading "10.5 Helgaker, Jorgensen & Olsen (2000) — Molecular Electronic-Structure Theory" [level=3] [ref=e2901]
      - paragraph [ref=e2902]:
        - strong [ref=e2903]: Helgaker, T.; Jørgensen, P.; Olsen, J.
        - emphasis [ref=e2904]: Molecular Electronic-Structure Theory
        - text: ;
        - strong [ref=e2905]: John Wiley & Sons
        - text: ": Chichester, UK,"
        - strong [ref=e2906]: "2000"
        - text: "; xiv + 908 pp. ISBN: 978-0-471-96755-3 / 0-471-96755-6. URL:"
        - link "https://www.wiley.com/en-us/Molecular+Electronic+Structure+Theory-p-9780471967553" [ref=e2907] [cursor=pointer]:
          - /url: https://www.wiley.com/en-us/Molecular+Electronic+Structure+Theory-p-9780471967553
        - text: .
      - paragraph [ref=e2908]:
        - text: The encyclopedic reference for wavefunction-based quantum chemistry. Covers the Hartree–Fock method, Møller–Plesset perturbation theory, configuration interaction, coupled-cluster theory (CCSD, CCSDT, CCSD(T)), multiconfigurational SCF (CASSCF), and the geometry optimisation and response-theory machinery, at a level of detail suitable for
        - emphasis [ref=e2909]: implementing
        - text: the methods from scratch. The book is the standard reference for the mathematical structure of the methods, the algorithmic details, and the benchmark calculations. Every quantum chemist who writes production code keeps a copy of Helgaker–Jørgensen–Olsen within arm’s reach.
