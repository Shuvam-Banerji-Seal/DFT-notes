        - text: "**Step 1: Bloch ansatz.** Substitute and into : Re-arranging, which is . The same substitution into gives . **Step 2: eigenvalue problem.** Bring the and terms to the left: This is a homogeneous linear system in . A non-trivial solution exists iff the determinant vanishes, which is . **Step 3: Solve the quadratic in .** Expand : Using : Apply the quadratic formula with : Factor from under the square root: So which is . **Step 4: Reduce to the monoatomic case.** Set : So and . These look like *two* different branches, but they are not! Using the identity , one finds that *bot`h*' branches reduce to the same monoatomic-chain dispersion but on *halve`d*' Brillouin zones — the \"diatomic\" chain with has the same dispersion as the monoatomic chain with a *halve`d*' lattice constant . The original is *not* the primitive lattice constant of the chain (it is twice the primitive constant), so the \"first\" BZ is only by accident; the true primitive BZ is , and the \"optical\" branch in the wrong BZ folds back onto the acoustic branch in the right BZ. Folding the dispersion back gives the standard monoatomic chain."
      - group [ref=e16058]:
        - generic "▸ Problem 3 (hard) — The Eliashberg function α²F(ω)" [ref=e16059] [cursor=pointer]
        - text: "Starting from the electron-phonon matrix element of and the definition of the Eliashberg function : 1. Show that the dimensionless coupling constant of is bounded above by , where is the Fermi-surface average of the squared matrix element, is a typical atomic mass, and is a Fermi-surface-and-phonon-weighted average of . 2. Use the Eliashberg equation (in the weak-coupling, constant- limit) to derive the McMillan formula . State the *physical* content of the Coulomb pseudopotential in one or two sentences. 3. Estimate for elemental Pb, which has , meV, and . Compare to the experimental K."
      - group [ref=e16060]:
        - generic "▸ Show answer" [ref=e16061] [cursor=pointer]
        - text: "**Part 1.** The Eliashberg function is a *four-current* average: two Fermi-surface delta functions restrict the electronic indices to the Fermi level; the phonon-energy delta function fixes the phonon frequency; the matrix element is a *squared amplitude* for the electron-phonon coupling. Pulling the matrix element outside the average and defining the Fermi-surface average we have The standard Fermi-surface-averaged squared matrix element is where the factor is the *phonon zero-point amplitude* (this is what the prefactor in gives). Substituting into : This is the bound on in the strong-coupling limit where all phonons are at the *same* frequency . For a real Eliashberg function with a distribution of phonon frequencies, the relationship is more nuanced, but the scaling holds. **Part 2.** The Eliashberg equation for the *superconducting ga`p*' at the Matsubara frequency is where is the Matsubara-frequency-space version of the Eliashberg function, The Coulomb pseudopotential appears as the *constant piece of the kernel that subtracts the *high-frequency* Coulomb repulsion (which is treated as instantaneous in the Eliashberg formalism). Its physical content is: the bare Coulomb repulsion between electrons is screened by the high-frequency dielectric constant of the crystal, and the *residual* repulsion after this screening (parametrised by ) opposes the electron-phonon-mediated attraction. In the *weak-coupling* limit and , the Eliashberg equation reduces to the BCS self-consistency equation which gives This is the BCS limit of the McMillan formula; the *strong- coupling* correction (the factor of in the denominator) accounts for the fact that, when is comparable to 1, the renormalisation of the electronic quasiparticle mass by the electron-phonon coupling *suppresses* relative to the weak-coupling estimate. The full McMillan formula is an *interpolation* between the BCS and the strong-coupling limits, calibrated against numerical solutions of the Eliashberg equation for a range of shapes. **Part 3.** Substitute into the McMillan formula: The denominator is . So Converting to temperature: K. Hmm, that's higher than the experimental 7.2 K. The reason is that the McMillan formula in the form is *quantitative* only for ; for stronger coupling it *overestimates* by a factor of 2–10. The **Allen–Dynes修正 formula** of [Allen & Dynes (1975)](<https://doi.org/10.1103/PhysRevB.12.905>) extends the McMillan formula to strong coupling: where and are *strong-coupling correction factors* that depend on , , and the *shape* of (specifically, on the *second moment* ). For Pb with , the correction factors are and , giving a *correcte`d*' of K — in much better agreement with experiment. The lesson is that the McMillan formula is a *first-order* approximation: it captures the *qualitative* dependence of on , , and , but for *quantitative* predictions of in strong-coupling superconductors one must solve the full Eliashberg equations numerically (or use the Allen–Dynes修正 formula as a *correction*). Pb is on the strong-coupling side of the McMillan regime, and the discrepancy with experiment is *expecte`d*`."
