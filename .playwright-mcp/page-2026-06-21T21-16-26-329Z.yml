      - paragraph [ref=e15722]: The relevant code is reproduced below; the script is the source of truth.
      - code [ref=e15726]: "# dft_notes/python_codes/chapter_10/01-diatomic-chain.py import os import numpy as np import matplotlib matplotlib.use(\"Agg\") # headless - no display required import matplotlib.pyplot as plt M1 = 12.0 # mass of atom 1, amu M2 = 16.0 # mass of atom 2, amu K = 10.0 # force constant, eV/Å^2 A = 5.0 # lattice constant, Å eV_to_J = 1.602176634e-19 A_to_m = 1.0e-10 amu_to_kg = 1.66053906660e-27 THz_to_Hz = 1.0e12 K_SI = K * eV_to_J / A_to_m ** 2 M1_SI = M1 * amu_to_kg M2_SI = M2 * amu_to_kg N_Q = 401 q_frac = np.linspace(0.0, 1.0, N_Q) q_vals = q_frac * np.pi / A sum_inv = 1.0 / M1_SI + 1.0 / M2_SI inside = sum_inv ** 2 - 4.0 * np.sin(q_vals * A / 2.0) ** 2 / (M1_SI * M2_SI) omega_sq_plus = K_SI * (sum_inv + np.sqrt(inside)) omega_sq_minus = K_SI * (sum_inv - np.sqrt(inside)) nu_plus_THz = np.sqrt(omega_sq_plus) / (2.0 * np.pi) * 1.0e-12 nu_minus_THz = np.sqrt(omega_sq_minus) / (2.0 * np.pi) * 1.0e-12 fig, ax = plt.subplots(figsize=(8, 6)) ax.plot(q_frac, nu_minus_THz, color=\"#cc785c\", lw=2.2, label=r\"acoustic $\\omega_-(q)$\") ax.plot(q_frac, nu_plus_THz, color=\"#5db8a6\", lw=2.2, label=r\"optical $\\omega_+(q)$\") ax.axvline(1.0, color=\"#3d3d3a\", lw=0.8, ls=\"--\", alpha=0.5) ax.set_xlabel(r\"$q\\, a\\,/\\,\\pi$\") ax.set_ylabel(r\"$\\nu$ (THz)\") ax.set_title(r\"1-D diatomic chain: $M_1 = 12$ amu, $M_2 = 16$ amu, \" r\"$K = 10$ eV/Å$^2$, $a = 5$ Å\") ax.legend(frameon=False, loc=\"lower right\") ax.grid(True, alpha=0.25) ax.set_xlim(0.0, 1.0) for spine in (\"top\", \"right\"): ax.spines[spine].set_visible(False) fig.tight_layout() here = os.path.dirname(os.path.abspath(__file__)) plots_dir = os.path.join(here, \"plots\") os.makedirs(plots_dir, exist_ok=True) out = os.path.join(plots_dir, \"01-diatomic-chain.png\") fig.savefig(out, dpi=150, bbox_inches=\"tight\") print(f\"Wrote {out}\")"
