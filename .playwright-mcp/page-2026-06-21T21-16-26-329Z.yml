      - list [ref=e16064]:
        - listitem [ref=e16065]:
          - strong [ref=e16066]: Phonon linewidths and anharmonic self-energies in detail.
          - text: Equation
          - img [ref=e16068]:
            - link [ref=e16071] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-10-pp-width"
          - text: is the
          - emphasis [ref=e16079]: second-order
          - text: expression for the linewidth from cubic anharmonicity. The
          - emphasis [ref=e16080]: full
          - text: anharmonic self-energy requires a self-consistent summation of diagrams (the “self-consistent phonon” or “renormalisation-group” approaches), and the
          - emphasis [ref=e16081]: fourth-order
          - img [ref=e16083]
          - text: contributes both a frequency shift and a
          - emphasis [ref=e16096]: "quarti`c"
          - text: ’ broadening. We did not derive the full diagrammatic machinery; see
          - link "Maradudin & Fein (1962)" [ref=e16097] [cursor=pointer]:
            - /url: https://doi.org/10.1103/PhysRev.128.2589
          - text: for the original treatment.
        - listitem [ref=e16098]:
          - strong [ref=e16099]: The Allen–Heine–Cardona formalism in detail.
          - text: Equation
          - img [ref=e16101]:
            - link [ref=e16104] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-10-ahc"
          - text: is the
          - emphasis [ref=e16112]: zero-order
          - text: (i.e. non-self- consistent) version of the AHC theory. The
          - emphasis [ref=e16113]: self-consistent
          - text: version (sometimes called the “AHC-SC” or “cumulant” expansion) accounts for the
          - emphasis [ref=e16114]: renormalisation
          - text: of the electronic states by the phonon self-energy, and gives quantitatively accurate band-gap renormalisations even in strongly anharmonic materials. The implementation in modern DFPT codes (Quantum ESPRESSO, ABINIT) is non-trivial and we did not give the formulas.
        - listitem [ref=e16115]:
          - strong [ref=e16116]: Phonons in magnetic materials.
          - text: In a magnetically ordered crystal (ferromagnet, antiferromagnet) the spin degrees of freedom couple to the lattice, and there are
          - emphasis [ref=e16117]: magnon–phonon
          - text: hybrid modes. The spin–lattice coupling is a separate electron-phonon-like matrix element involving the
          - emphasis [ref=e16118]: spin
          - text: density rather than the charge density, and is not covered by the formalism of §10.8. We did not treat it.
        - listitem [ref=e16119]:
          - strong [ref=e16120]: Phonons at surfaces and interfaces.
          - text: The translational symmetry of a surface or interface is
          - emphasis [ref=e16121]: broken
          - text: in the direction normal to the surface, so the surface-phonon dispersion lives in a 2-D Brillouin zone and has
          - emphasis [ref=e16122]: additional
          - text: modes (the Rayleigh surface acoustic wave, the Lucas modes, the Fuchs–Kliewer modes at surfaces of ionic crystals). The
          - emphasis [ref=e16123]: ab initio
          - text: treatment follows the same DFPT recipe as for bulk, but the supercell must contain enough vacuum to isolate the two surfaces. We did not give the formulas.
        - listitem [ref=e16124]:
          - strong [ref=e16125]: Phonon dynamics in real time.
          - text: The harmonic approximation gives
          - emphasis [ref=e16126]: static
          - text: ’ normal modes. To describe real-time phonon dynamics (e.g. coherent-phonon experiments, phonon Boltzmann transport in the
          - emphasis [ref=e16127]: transient
          - text: regime) one needs the
          - emphasis [ref=e16128]: time-dependent
          - text: extension of the harmonic Hamiltonian, the
          - emphasis [ref=e16129]: phonon Boltzmann transport equation
          - text: ", or ab initio molecular dynamics. The state of the art is the"
          - emphasis [ref=e16130]: non-equilibrium
          - text: Green’s function (NEGF) treatment of phonons, which generalises the phonon self-energy to a
          - img [ref=e16132]
          - text: matrix in Keldysh space. We did not derive it.
        - listitem [ref=e16141]:
          - strong [ref=e16142]: Phonon–photon coupling (polaritons).
          - text: In an ionic crystal, the
          - emphasis [ref=e16143]: "long-wavelengt`h"
          - text: ’ TO phonons couple to
          - emphasis [ref=e16144]: infrared photons
          - text: through the macroscopic electric field, and the resulting
          - emphasis [ref=e16145]: polariton
          - text: modes are hybrid phonon–photon excitations. The polariton dispersion is a textbook example of
          - emphasis [ref=e16146]: strong coupling
          - text: between two bosonic modes, and is the foundation of
          - emphasis [ref=e16147]: infrared spectroscopy
          - text: of solids. We did not give the polariton dispersion relation; see
          - link "Kittel,Introduction to Solid State Physics" [ref=e16148] [cursor=pointer]:
            - /url: https://www.wiley.com/en-us/Introduction+to+Solid+State+Physics%2C+8th+Edition-p-9780471415268
            - text: Kittel,
            - emphasis [ref=e16149]: Introduction to Solid State Physics
          - text: chapter on optical processes.
      - blockquote [ref=e16150]:
        - paragraph [ref=e16151]:
          - text: "Next:"
          - link "chapter 11" [ref=e16152] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: "— Band structures: the electronic density of states, projected DOS, Fermi-surface topology, and the connection to transport."
