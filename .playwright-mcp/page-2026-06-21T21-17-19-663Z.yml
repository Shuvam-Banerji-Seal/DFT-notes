        - strong [ref=e13978]: Runge and Gross (1984)
        - text: ","
        - strong [ref=e13979]: Casida (1995)
        - text: ","
        - strong [ref=e13980]: Petersilka, Gossmann, and Gross (1996)
        - text: ", and"
        - strong [ref=e13981]: Marques and Gross (2004)
        - text: — each a small paper (4–30 pages) that, in order, lays the foundation of TDDFT, derives the practical Casida eigenvalue problem, closes the gap between TDDFT excitation energies and KS orbital energies, and reviews the modern adiabatic and EXX kernels.
