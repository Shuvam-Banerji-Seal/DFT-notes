                - generic [ref=e16495]: Ref. Annu. Rev. 55, 427
        - button "Download this diagram as a PNG" [ref=e16496] [cursor=pointer]:
          - img [ref=e16497]
          - generic [ref=e16500]: Download PNG
      - paragraph [ref=e16501]:
        - text: The
        - strong [ref=e16502]: left-to-right
        - text: flow is the
        - emphasis [ref=e16503]: time
        - text: axis. The
        - emphasis [ref=e16504]: first three
        - text: boxes (RG theorem, TD KS equations, Mearns–Kohn response) are the
        - emphasis [ref=e16505]: foundation
        - text: ; the
        - emphasis [ref=e16506]: Casida
        - text: ’ box is the practical realisation; the
        - emphasis [ref=e16507]: PGG
        - text: box is the first rigorous result that connects TDDFT to KS orbital energies; the
        - emphasis [ref=e16508]: Marques–Gross
        - text: box is the modern review. The
        - emphasis [ref=e16509]: output
        - text: is the absorption spectrum.
      - heading "12.14.6 What these papers don’t say" [level=3] [ref=e16510]
      - paragraph [ref=e16511]:
        - text: The four papers above are the foundation of TDDFT, but they are not the
        - emphasis [ref=e16512]: complete
        - text: story. Several important topics are
        - emphasis [ref=e16513]: not
        - text: covered in the original 1984, 1995, 1996, and 2004 papers, or are covered only in passing. The list below is in order of
        - emphasis [ref=e16514]: practical importance
        - text: .
      - heading "12.14.6.1 Double and multiple excitations" [level=4] [ref=e16515]
      - paragraph [ref=e16516]:
        - text: The Casida equation is built on the
        - emphasis [ref=e16517]: single- excitation
        - text: basis
        - img [ref=e16519]
        - text: and cannot describe
        - emphasis [ref=e16532]: double
        - text: excitations
        - img [ref=e16534]
        - text: in the
        - emphasis [ref=e16555]:
          - text: standar
          - code [ref=e16556]: d*' form, because the single-excitation basis does not contain the double-excitation configurations [Marques and Gross, 2004, p. 446]. The *exact* response function does contain double excitations, but the *adiabati
          - text: c
        - text: ’ kernel of section 12.14.5.3 does
        - emphasis [ref=e16557]: not
        - text: mix singles with doubles. Practical workarounds include the
        - strong [ref=e16558]: spin-flip
        - text: TDDFT of Shao et al. (2003) and the
        - strong [ref=e16559]: double-hybrid
        - text: functionals that mix TDDFT with configuration- interaction doubles [Marques and Gross, 2004, p. 446]. The 1995 Casida chapter is
        - emphasis [ref=e16560]: explicitly
        - text: a single-excitation formalism [Casida, 1995, p. 170, footnote 4]; the 1996 PGG paper mentions double excitations only in the
        - emphasis [ref=e16561]: conclusion
        - text: "[Petersilka, Gossmann, and Gross, 1996, p. 1214]."
      - heading "12.14.6.2 The wrong long-range asymptote of the ALDA kernel" [level=4] [ref=e16562]
      - paragraph [ref=e16563]:
        - text: The ALDA kernel is
        - emphasis [ref=e16564]:
          - text: short-range
          - code [ref=e16565]: "d*' — it is local in $\\mathbf r$, and falls off as a $\\delta$-function. The *exact* $f_\\text{xc}$ has a long-range $-\\alpha/|\\mathbf r - \\mathbf r'|$ tail that comes from the *screene"
          - text: d
        - text: ’ Coulomb interaction
        - img [ref=e16567]
        - text: "[Marques and Gross, 2004, p. 444]. The missing long-range tail is why ALDA TDDFT"
        - emphasis [ref=e16578]: fails
        - text: for charge-transfer excitations (in molecules) and for excitons (in solids). The
        - emphasis [ref=e16579]: fix
        - text: is the
        - strong [ref=e16580]: range-separated hybrid
        - text: (CAM-B3LYP,
        - img [ref=e16582]
        - text: B97X), which is a
        - emphasis [ref=e16587]: "hybri`d"
        - text: ’ kernel with the correct long-range behaviour — a
        - emphasis [ref=e16588]: post-2004
        - text: development [Marques and Gross, 2004, p. 444–446].
      - heading "12.14.6.3 The magnetic-field response" [level=4] [ref=e16589]
      - paragraph [ref=e16590]:
        - text: The Runge–Gross theorem is for
        - emphasis [ref=e16591]: scalar
        - text: external potentials
        - img [ref=e16593]
        - text: . It does
        - emphasis [ref=e16614]: not
        - text: cover vector potentials
        - img [ref=e16616]
        - text: — i.e. magnetic fields. The extension to
        - strong [ref=e16633]: current-density functional theory
        - text: (CDFT) is by Vignale and Rasolt (1988), and is
        - emphasis [ref=e16634]: not
        - text: in the 1984 Runge–Gross paper. The 2004 Marques–Gross review discusses the Vignale–Rasolt formulation on
        - strong [ref=e16635]: p. 445
        - text: "[Marques and Gross, 2004, p. 445], but the practical implementation of the Vignale–Rasolt kernel is rare; the"
        - emphasis [ref=e16636]: "standar`d"
        - text: ’ production TDDFT codes do
        - emphasis [ref=e16637]: not
        - text: include the magnetic-field response [Marques and Gross, 2004, p. 445].
      - heading "12.14.6.4 The dispersion (van der Waals) interaction" [level=4] [ref=e16638]
      - paragraph [ref=e16639]:
        - text: The
        - strong [ref=e16640]: dispersion interaction
        - text: (the long-range
        - img [ref=e16642]
        - text: tail of the inter-molecular van der Waals force) is
        - emphasis [ref=e16660]: not
        - text: captured by the local or
        - emphasis [ref=e16661]: semi-local
        - text: xc functionals of standard TDDFT. The
        - emphasis [ref=e16662]: exact
        - img [ref=e16664]
        - text: does contain the dispersion force as a
        - emphasis [ref=e16673]: non-local
        - text: effect, but the ALDA does not. The
        - emphasis [ref=e16674]: fix
        - text: is the
        - strong [ref=e16675]: vdW-DF
        - text: functional of Dion et al. (2004) or the
        - strong [ref=e16676]: many-body dispersion
        - text: (MBD) of Tkatchenko et al. (2012), both of which are
        - emphasis [ref=e16677]: post-2004
        - text: developments [Marques and Gross, 2004, p. 444–446]. The 2004 Marques–Gross review mentions dispersion as an
        - emphasis [ref=e16678]: "outloo`k"
        - text: ’ topic on
        - strong [ref=e16679]: p. 446
        - text: "[Marques and Gross, 2004, p. 446]."
      - blockquote [ref=e16680]:
        - paragraph [ref=e16681]:
          - strong [ref=e16682]: Note.
          - text: Other topics that are
          - emphasis [ref=e16683]: not
          - text: "in the four foundational papers include: the"
          - strong [ref=e16684]: super-fluid
          - text: response of Helium-4, the
          - strong [ref=e16685]: topological
          - text: response of insulators, the
          - strong [ref=e16686]: strong-field
          - text: response of atoms in intense laser pulses, and the
          - strong [ref=e16687]: non-adiabatic
          - text: coupling of electrons and ions at conical intersections. Each is a
          - emphasis [ref=e16688]: "specialise`d"
          - text: ’ sub-field of TDDFT that post-dates the four foundational papers.
