      - paragraph [ref=e16163]:
        - text: The PGG result is on
        - strong [ref=e16164]: p. 1212–1213
        - text: "of the original paper [Petersilka, Gossmann, and Gross, 1996, p. 1212–1213]. The textual statement is:"
      - blockquote [ref=e16165]:
        - paragraph [ref=e16166]:
          - text: In the limit of the
          - emphasis [ref=e16167]: exact
          - text: time-dependent xc kernel, the lowest TDDFT excitation energy of a many-electron system converges to the
          - emphasis [ref=e16168]: "Kohn–Sham ga`p"
          - text: ’ — the difference between the Kohn–Sham HOMO and LUMO eigenvalues [Petersilka, Gossmann, and Gross, 1996, p. 1213].
      - paragraph [ref=e16169]:
        - text: The proof is in the right column of p. 1213, and uses the
        - strong [ref=e16170]: Dyson equation
        - text: "for the response function: in the limit of the exact"
        - img [ref=e16172]
        - text: ", the poles of the response function coincide with the"
        - emphasis [ref=e16181]: "true"
        - text: many-body excitation energies. For the
        - emphasis [ref=e16182]: lowest
        - text: excitation, the dominant term in the Dyson equation is the
        - emphasis [ref=e16183]: bare
        - text: "KS excitation energy $\\omega_\\text{HOMO, LUMO} = \\varepsilon_\\text{LUMO}"
      - list [ref=e16184]:
        - listitem [ref=e16185]:
          - text: "\\varepsilon_\\text{HOMO}$, and the kernel correction is"
          - emphasis [ref=e16186]: small
          - text: in the limit of weak correlation [Petersilka, Gossmann, and Gross, 1996, p. 1213, right column]. The text on p. 1212 notes that the
          - emphasis [ref=e16187]: bare
          - text: KS excitation energies “are the natural starting point for a TDDFT calculation of excitation energies”, and that the
          - emphasis [ref=e16188]: "true"
          - text: excitation energies are obtained by
          - emphasis [ref=e16189]: correcting
          - text: the bare values with
          - img [ref=e16191]
          - text: "[Petersilka, Gossmann, and Gross, 1996, p. 1212, left column]. The PGG paper applies the result to the"
          - emphasis [ref=e16200]: test case
          - text: of two-electron atoms (He, Be
          - img [ref=e16202]
          - text: ", …) on"
          - strong [ref=e16211]: p. 1213–1214
          - text: ; the conclusion is that the
          - emphasis [ref=e16212]: exact
          - img [ref=e16214]
          - text: recovers the exact excitation energies, while the ALDA and EXX approximations introduce errors of order 0.1–1.0 eV [Petersilka, Gossmann, and Gross, 1996, p. 1214].
      - paragraph [ref=e16223]:
        - text: The PGG result is significant for two reasons. (1)
        - strong [ref=e16224]:
          - text: It validates the
          - emphasis [ref=e16225]: use
          - text: of the Casida equation
        - text: ": the Casida equation is exact in the limit of the"
        - emphasis [ref=e16226]: exact
        - img [ref=e16228]
        - text: ", so the practical value of the equation is limited only by the quality of the"
        - img [ref=e16238]
        - text: approximation [Petersilka, Gossmann, and Gross, 1996, p. 1213]. (2)
        - strong [ref=e16247]:
          - text: It explains the
          - emphasis [ref=e16248]: practical success
          - text: "of ALDA TDDFT:"
        - text: the error in the
        - emphasis [ref=e16249]: lowest
        - text: excitation energy is small (
        - img [ref=e16251]
        - text: –
        - img [ref=e16261]
        - text: eV for valence excitations of organic molecules) because the kernel correction is small for the
        - emphasis [ref=e16268]: lowest
        - text: excitation. The ALDA is
        - emphasis [ref=e16269]: less
        - text: accurate for higher excitations, and
        - emphasis [ref=e16270]: "muc`h"
        - text: ’ less accurate for charge-transfer and Rydberg excitations, where the kernel correction is large [Petersilka, Gossmann, and Gross, 1996, p. 1214].
      - blockquote [ref=e16271]:
        - paragraph [ref=e16272]:
          - strong [ref=e16273]: Reading note.
          - text: The PGG result is
          - emphasis [ref=e16274]: not
          - text: a theorem in the strict sense — it is a
          - emphasis [ref=e16275]: limit
          - text: statement about the
          - emphasis [ref=e16276]: exact
          - img [ref=e16278]
          - text: . For
          - emphasis [ref=e16287]: approximate
          - img [ref=e16289]
          - text: the result does not hold, and the lowest TDDFT excitation energy can differ from the KS gap by several eV. The PGG paper is honest about this on p. 1213, and notes that the practical accuracy of TDDFT depends on the
          - emphasis [ref=e16298]: kernel choice
          - text: "[Petersilka, Gossmann, and Gross, 1996, p. 1213, right column]. The result is also the"
          - emphasis [ref=e16299]: time-dependent
          - text: analogue of the
          - emphasis [ref=e16300]: Janak theorem
          - text: "of static DFT (Janak, 1978): the lowest TDDFT excitation energy converges to the static Janak derivative in the limit of weak perturbation."
