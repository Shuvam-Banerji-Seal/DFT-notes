      - code [ref=e172]: "$$ > \\begin{equation} > \\label{eq:ch-12-rg-map} > v_\\text{ext}(\\mathbf r, t) \\;\\longmapsto\\; \\rho(\\mathbf r, t) > \\end{equation> is, for a given $|\\Psi_0\\rangle$, one-to-one up > to an additive purely time-dependent function > $c(t)$. Concretely: if two external potentials $v_\\text{ext}(\\mathbf r, t)$ and $v'_\\text{ext}(\\mathbf r, t)$ differ by more than a purely time-dependent function $c(t)$ at the initial time $t_0$ — i.e. if their Taylor coefficients $\\partial_t^k (v_\\text{ext} - v'_\\text{ext})|_{t_0}$ are not all equal to a single constant in $\\mathbf r$ for some $k$ — then the resulting time-dependent densities $\\rho(\\mathbf r, t)$ and $\\rho'(\\mathbf r, t)$ are different for $t > t_0$ (for short times in a neighbourhood of $t_0$). The proof of \\eqref{eq:ch-12-rg-map} is the subject of section 12.3. For now we only need the **consequence**: every observable of the time-evolving system, evaluated at $t > t_0$, is a functional of $\\rho(\\mathbf r, t)$ and $|\\Psi_0\\rangle$. In particular the external potential is, up to $c(t)$, a functional of the time-dependent density. This is the foundation of the rest of the chapter. > **Tip.** The \"up to $c(t)$\" freedom is the time-dependent analogue > of the \"up to a constant\" freedom in Hohenberg–Kohn. Adding > $c(t)$ to $v_\\text{ext}$ adds $-c(t)$ to the wavefunction's > global phase, and leaves every gauge-invariant observable > unchanged. The density is manifestly gauge-invariant, so the > freedom drops out of the density-to-potential map. ### 12.1.1 Diagram — the Runge–Gross one-to-one mapping The Runge–Gross theorem is the *foundation* of TD-DFT: it guarantees that the time-dependent external potential $v_\\text{ext}(\\mathbf r, t)$ is in one-to-one correspondence with the time-dependent density $\\rho(\\mathbf r, t)$ (up to a gauge $c(t)$), given a fixed initial state $|\\Psi_0\\rangle$. The diagram below shows the *forwar`d*' map (potential → wave function → density, the natural arrow of the Schrödinger equation) and the *Runge–Gross* inverse (density → potential, which is what makes TD-DFT possible). The **solid** arrows are the forward map — the Schrödinger equation determines the wave function from the potential, and the density is the diagonal of the one-body density matrix. The **dashe`d** arrow is the Runge–Gross* inverse, which says: given the *density* $\\rho(\\mathbf r, t)$ and the initial state $|\\Psi_0\\rangle$, the potential $v_\\text{ext}(\\mathbf r, t)$ is *uniquely* determined (up to a purely time-dependent function $c(t)$). This is the time-dependent analogue of the Hohenberg–Kohn theorem (chapter 04) and is the foundation of *every* practical TD-DFT calculation: it is what justifies writing the time-dependent KS potential as a *functional* of the time-dependent density. ## 12.2 The time-dependent Kohn–Sham equations The Runge–Gross theorem guarantees the *existence* of a density-to-potential map. To use it computationally we follow Kohn and Sham's 1965 strategy (chapter 04, section 4.2) and introduce an **auxiliary system of non-interacting electrons** that reproduces the interacting density $\\rho(\\mathbf r, t)$ at all times. ### 12.2.1 The auxiliary system Consider a fictitious system of $N$ non-interacting electrons in an effective time-dependent potential $v_\\text{eff}(\\mathbf r, t)$. Its one-body Hamiltonian is \\begin{equation} \\label{eq:ch-12-tdks-hamiltonian} \\hat H_s(t) \\;=\\; -\\frac{1}{2}\\nabla^2 + v_\\text{eff}(\\mathbf r, t) , \\end{equation} $$ and its wavefunction is a single time-dependent Slater determinant $\\Phi_s(t)$ built from $N$ orthonormal orbitals $\\{\\phi_i(\\mathbf r, t)\\}$ that satisfy $$ \\begin{equation} \\label{eq:ch-12-tdks-orbital} i\\, \\frac{\\partial}{\\partial t}\\, \\phi_i(\\mathbf r, t) \\;=\\; \\hat H_s(t)\\, \\phi_i(\\mathbf r, t) . \\end{equation} $$ The auxiliary density is $$ \\begin{equation} \\label{eq:ch-12-tdks-density} \\rho(\\mathbf r, t) \\;=\\; 2 \\sum_{i=1}^{N/2} |\\phi_i(\\mathbf r, t)|^2 \\end{equation} $$ for a closed-shell (spin-paired) system, the factor of 2 again accounting for Kramers-paired spins. ### 12.2.2 The effective potential Equation \\eqref{eq:ch-12-tdks-orbital} becomes useful when we constrain the auxiliary density \\eqref{eq:ch-12-tdks-density} to *equal* the interacting density. The Runge–Gross theorem then guarantees that there is a unique (up to $c(t)$) effective potential $v_\\text{eff}(\\mathbf r, t)$ that does this. The standard decomposition of $v_\\text{eff}$ mirrors the static case: $$ \\begin{equation} \\label{eq:ch-12-veff} v_\\text{eff}[\\rho](\\mathbf r, t) \\;=\\; v_\\text{ext}(\\mathbf r, t) + v_\\text{H}[\\rho_t](\\mathbf r, t) + v_\\text{xc}[\\rho_{\\le t}](\\mathbf r, t) . \\end{equation} $$ Three comments on \\eqref{eq:ch-12-veff}: 1. **The Hartree term** $v_\\text{H}[\\rho_t](\\mathbf r, t)$ is the *instantaneous* classical Coulomb potential of the density $$ \\begin{equation} \\label{eq:ch-12-vh} v_\\text{H}[\\rho](\\mathbf r, t) \\;=\\; \\int \\frac{\\rho(\\mathbf r', t)}{|\\mathbf r - \\mathbf r'|}\\, d\\mathbf r' . \\end{equation} $$ The subscript $\\rho_t$ emphasises that the Hartree potential at time $t$ depends on the density at the *same* time $t$ — i.e. it is **instantaneous** in the time-dependent sense, even though physically there is a retardation built in by the fact that $\\rho(\\mathbf r, t)$ is itself a solution of the time-dependent problem. 2. **The xc term** $v_\\text{xc}[\\rho_{\\le t}](\\mathbf r, t)$ is in principle a functional of the *entire history* of the density $\\{\\rho(\\mathbf r, \\tau) : \\tau \\le t\\}$ — it is **non-local in time**. This is a fundamental difference from ground-state DFT, where $v_\\text{xc}$ depends on $\\rho$ at one point in time. Memory effects are part of the exact time- dependent xc potential. The vast majority of practical calculations use the **adiabatic** approximation $v_\\text{xc}^\\text{ad}[\\rho](\\mathbf r, t) = v_\\text{xc}^\\text{gs}[\\rho(t)](\\mathbf r)$ — i.e. the static xc potential evaluated on the *instantaneous* density — which has no memory. Section 12.4 discusses this approximation in detail. 3. **The KS equations are nonlinear.** The effective potential \\eqref{eq:ch-12-veff} depends on the orbitals (through $\\rho$), and the orbitals evolve under the effective potential. Unlike in linear-response theory (section 12.5) the equations are not linear, and closed-form solutions exist only for very special $v_\\text{ext}$. The numerical work is to time-step \\eqref{eq:ch-12-tdks-orbital} — see section 12.8. > **Warning.** The \"adiabatic\" approximation is consistent with > the static functional only in the limit of *infinitely slow* > time variation. For a true time-dependent problem, where > $\\rho(\\mathbf r, t)$ changes on a time scale comparable to the > internal electron dynamics, the adiabatic approximation > introduces uncontrolled errors. We will see this in practice in > the worked example of section 12.10. ### 12.2.3 The van Leeuwen–Baerends fixed-point formulation The decomposition \\eqref{eq:ch-12-veff} is a *definition* of $v_\\text{xc}$ as \"what is left over\". A complementary and very useful reformulation is due to van Leeuwen and Baerends (1994): the effective potential $v_\\text{eff}(\\mathbf r, t)$ is the **fixed point** of an integral equation whose kernel is the inverse of the non-interacting KS response function. We will not derive this explicitly (it appears in many standard references) but we use the idea in section 12.5 when we connect $v_\\text{xc}$ to the exchange–correlation kernel $f_\\text{xc}$. ### 12.2.4 The time-dependent KS equations, restated Putting it all together, the **time-dependent Kohn–Sham equations** are the coupled system $$ \\begin{equation} \\label{eq:ch-12-tdks-coupled} \\boxed{ \\begin{aligned} i\\, \\partial_t \\phi_i(\\mathbf r, t) &= \\Bigl[-\\tfrac{1}{2}\\nabla^2 + v_\\text{eff}[\\rho_t](\\mathbf r, t) \\Bigr]\\, \\phi_i(\\mathbf r, t) , \\\\\\ \\rho(\\mathbf r, t) &= 2 \\sum_{i=1}^{N/2} |\\phi_i(\\mathbf r, t)|^2 , \\\\\\ v_\\text{eff}[\\rho](\\mathbf r, t) &= v_\\text{ext}(\\mathbf r, t) + v_\\text{H}[\\rho_t](\\mathbf r, t) + v_\\text{xc}[\\rho_{\\le t}](\\mathbf r, t) . \\end{aligned} } \\end{equation} $$ The first equation is a (nonlinear) one-body Schrödinger equation; the second is the density reconstruction from the occupied orbitals; the third defines the effective potential in terms of the density. The system is closed: given $v_\\text{ext}(\\mathbf r, t)$ and the initial state $\\Phi_s(t_0)$, the equations determine $\\rho(\\mathbf r, t)$ and $\\phi_i(\\mathbf r, t)$ for all $t > t_0$. The only unknown is the **functional form of $v_\\text{xc}$**, which is the subject of section 12.4. ## 12.3 Derivation of the Runge–Gross theorem This is the section where every step is written out. The argument follows Runge and Gross's 1984 paper; the **action-functional** version uses the reformulation by Ghosh and Dhara (1988) and van Leeuwen (1998). We give the fixed-point action derivation, which is the cleanest. ### 12.3.1 The quantum-mechanical action For a system with Hamiltonian $\\hat H(t) = \\hat T + \\hat W + \\hat V(t)$ and a state $|\\Psi(t)\\rangle$ that solves the time-dependent Schrödinger equation $i\\, \\partial_t |\\Psi(t)\\rangle = \\hat H(t) |\\Psi(t)\\rangle$ with initial condition $|\\Psi(t_0)\\rangle = |\\Psi_0\\rangle$, the **quantum-mechanical action functional** is $$ \\begin{equation} \\label{eq:ch-12-action} \\mathcal A[\\Psi] \\;=\\; \\int_{t_0}^{t_1} \\Bigl\\langle \\Psi(t) \\Big| i\\, \\partial_t - \\hat H(t) \\Big| \\Psi(t) \\rangle \\Bigr\\rangle\\, dt . \\end{equation} $$ The action is **stationary** ($\\delta \\mathcal A = 0$) at the physical $|\\Psi(t)\\rangle$, with fixed endpoints $|\\Psi(t_0)\\rangle = |\\Psi_0\\rangle$ and $|\\Psi(t_1)\\rangle = |\\Psi_1\\rangle$. The proof is a standard functional variation; expanding $|\\Psi\\rangle \\to |\\Psi\\rangle + \\epsilon |\\delta\\Psi\\rangle$ and collecting terms of order $\\epsilon$ gives the time-dependent Schrödinger equation back, with the boundary-condition term $\\langle \\delta\\Psi(t_1) | \\Psi(t_1) \\rangle - \\langle \\delta\\Psi(t_0) | \\Psi(t_0) \\rangle$ vanishing because the endpoints are fixed. ### 12.3.2 The Keldysh contour For a system with a *time-dependent* Hamiltonian, the natural contour for the time integral is the **Keldysh contour** $\\gamma$ that runs from $t_0$ to $t_1$ on the upper branch and back from $t_1$ to $t_0$ on the lower branch, with $t_0 \\to -\\infty$ and $t_1 \\to +\\infty$ at the end. The reason is that the density matrix at time $t$ — and hence the action that generates it — involves both forward and backward propagation in time. Define $$ \\begin{equation} \\label{eq:ch-12-keldysh-action} \\mathcal A_\\gamma[\\Psi] \\;=\\; \\int_\\gamma \\Bigl\\langle \\Psi(\\bar t) \\Big| i\\, \\partial_{\\bar t} - \\hat H(\\bar t) \\Big| \\Psi(\\bar t) \\rangle \\Bigr\\rangle\\, d\\bar t , \\end{equation} $$ where $\\bar t$ parameterises the contour. The integrand on the upper branch is the same as in \\eqref{eq:ch-12-action}; on the lower branch $\\partial_{\\bar t} = -\\partial_t$, so the sign of the kinetic term flips. The result is that the action \\eqref{eq:ch-12-keldysh-action} is *real* and stationary at the physical forward–backward trajectory. The vanishing of $\\delta \\mathcal A_\\gamma = 0$ for variations with fixed endpoints at $t_0$ is again equivalent to the time-dependent Schrödinger equation on each branch. ### 12.3.3 The Runge–Gross action The Keldysh action \\eqref{eq:ch-12-keldysh-action} is a functional of $|\\Psi(t)\\rangle$ and of $v_\\text{ext}(\\mathbf r, t)$. The first variation with respect to the wavefunction gives the Schrödinger equation, which we already used. The Runge–Gross trick is to instead **eliminate** the wavefunction in favour of the density. To do this, write the interacting action as $$ \\begin{equation} \\label{eq:ch-12-rg-action} \\mathcal A_\\gamma[v_\\text{ext}, \\Psi] \\;=\\; \\mathcal B_\\gamma[\\Psi] - \\int_\\gamma \\int d\\mathbf r\\, \\rho_\\Psi(\\mathbf r, \\bar t)\\, v_\\text{ext}(\\mathbf r, \\bar t) , \\end{equation} $$ where $\\mathcal B_\\gamma[\\Psi] = \\int_\\gamma d\\bar t\\, \\langle \\Psi | i\\partial_{\\bar t} - \\hat T - \\hat W | \\Psi \\rangle$ is the **universal** part (independent of $v_\\text{ext}$) and the second term is the coupling to the external potential, $\\rho_\\Psi(\\mathbf r, \\bar t) = \\langle \\Psi(\\bar t) | \\hat\\rho(\\mathbf r) | \\Psi(\\bar t) \\rangle$ being the time-dependent density. Now define the **density functional** $$ \\begin{equation} \\label{eq:ch-12-A-density-functional} \\mathcal A_\\gamma[v_\\text{ext}, \\rho] \\;=\\; \\mathcal B_\\gamma[\\rho] - \\int_\\gamma \\int d\\mathbf r\\, \\rho(\\mathbf r, \\bar t)\\, v_\\text{ext}(\\mathbf r, \\bar t) , \\end{equation} $$ where $\\mathcal B_\\gamma[\\rho]$ is the **Levy–Lieb** constrained- search functional $$ \\begin{equation} \\label{eq:ch-12-B-rho} \\mathcal B_\\gamma[\\rho] \\;=\\; \\min_{\\Psi \\to \\rho} \\int_\\gamma d\\bar t\\, \\Bigl\\langle \\Psi \\Big| i\\partial_{\\bar t} - \\hat T - \\hat W \\Big| \\Psi \\Bigr\\rangle , \\end{equation} $$ with the minimum taken over all $N$-electron states $|\\Psi(\\bar t)\\rangle$ on the contour whose density equals $\\rho(\\mathbf r, \\bar t)$ for each $\\bar t$ on $\\gamma$. (The constraint is the obvious time-dependent generalisation of the Levy–Lieb functional of static DFT, [chapter 02](/DFT-notes/dft-notes/chapter-02/), section 2.4.) For a $v_\\text{ext}$-representable density, the minimum is attained at the physical $|\\Psi(\\bar t)\\rangle$ and $\\mathcal B_\\gamma[\\rho] = \\mathcal B_\\gamma[\\Psi]$. ### 12.3.4 The fixed-point equation for the density Vary \\eqref{eq:ch-12-A-density-functional} with respect to $\\rho(\\mathbf r, \\bar t)$ on the upper branch of the contour (for $\\bar t \\in (t_0, t_1)$). The first variation gives $$ \\begin{equation} \\label{eq:ch-12-fp-equation} \\frac{\\delta \\mathcal B_\\gamma}{\\delta \\rho(\\mathbf r, \\bar t)} \\;-\\; v_\\text{ext}(\\mathbf r, \\bar t) \\;=\\; 0 . \\end{equation} $$ The functional derivative $\\delta \\mathcal B_\\gamma / \\delta \\rho$ is taken with $\\rho$ held fixed on the lower branch, by the chain rule of contour-ordered functional differentiation. The physical density $\\rho(\\mathbf r, \\bar t)$ is the **unique** solution of \\eqref{eq:ch-12-fp-equation} for a given $v_\\text{ext}(\\mathbf r, \\bar t)$ and initial state $|\\Psi_0\\rangle$ — uniqueness of the forward-propagated state under a given Hamiltonian is just unitarity of time evolution. Now suppose two external potentials $v_\\text{ext}(\\mathbf r, t)$ and $v'_\\text{ext}(\\mathbf r, t)$ produce the same density $\\rho(\\mathbf r, t)$ on the upper branch for the same initial state. By the same fixed-point argument applied to $v'_\\text{ext}$, the density is also a fixed point of $$ \\begin{equation} \\label{eq:ch-12-fp-equation-prime} \\frac{\\delta \\mathcal B_\\gamma}{\\delta \\rho(\\mathbf r, \\bar t)} \\;-\\; v'_\\text{ext}(\\mathbf r, \\bar t) \\;=\\; 0 . \\end{equation} $$ Subtracting \\eqref{eq:ch-12-fp-equation} from \\eqref{eq:ch-12-fp-equation-prime}, $$ \\begin{equation} \\label{eq:ch-12-difference} v'_\\text{ext}(\\mathbf r, t) - v_\\text{ext}(\\mathbf r, t) \\;=\\; 0 . \\end{equation} $$ This is the original Runge–Gross conclusion: **two external potentials that give the same density must be equal as functions of $\\mathbf r$ (and not just equal up to a constant)** — and, by the assumption of Taylor-expandability used to fix the freedom, they differ by at most a constant $c(t)$ that is the same at $t_0$. ### 12.3.5 The full statement To make the proof work with the \"up to $c(t)$\" caveat rather than \"exactly equal\", the technical argument needs the **$v$-representability** of the density on both branches and the **Taylor-expandability** of the potentials about $t_0$. The latter is needed because the constraint $|\\Psi(t_0)\\rangle = |\\Psi_0\\rangle$ fixes the initial state, and the time-evolution operator $\\hat U(t, t_0)$ depends on the *whole* function $v_\\text{ext}(\\cdot, t)$, not just on its value at $t_0$. To show that $v'_\\text{ext} - v_\\text{ext} = c(t)$ requires matching the potentials and all their time derivatives at $t_0$, which is precisely what Taylor-expandability delivers. The final statement of the Runge–Gross theorem is therefore: > **Runge–Gross theorem (1984).** Let $v_\\text{ext}(\\mathbf r, > t)$ and $v'_\\text{ext}(\\mathbf r, t)$ be two real-valued > analytic functions of $t$ in a neighbourhood of $t_0$ for > which the many-body problem with initial state $|\\Psi_0\\rangle$ > has a unique solution. Suppose that, for some $k \\ge 0$, $$ > \\begin{equation} > \\label{eq:ch-12-rg-condition} > \\left.\\frac{\\partial^k}{\\partial t^k} > \\big[ v'_\\text{ext}(\\mathbf r, t) - v_\\text{ext}(\\mathbf r, t) \\big] > \\right|_{t=t_0} \\neq \\text{const in } \\mathbf r . > \\end{equation} $$ > Then the time-dependent densities produced by the two > potentials differ infinitesimally close to $t_0$: > $\\rho'(\\mathbf r, t) \\neq \\rho(\\mathbf r, t)$ for $t$ in some > right-neighbourhood of $t_0$. The \"up to a constant\" caveat is the $\\partial^k/\\partial t^k$ piece of the difference being spatially constant — when *all* the derivatives are spatially constant, the two potentials differ by $c(t) = v'_\\text{ext}(\\mathbf r, t) - v_\\text{ext}(\\mathbf r, t)$ and the densities are equal. > **Note.** Runge and Gross's original 1984 paper proved the > theorem for potentials that are analytic in time and for > systems that are non-degenerate at $t_0$. The \"up to a > constant\" caveat was made explicit by van Leeuwen (1998) in > the action-functional reformulation we have used here. The > 1994 paper by van Leeuwen and Baerends gives the > fixed-point equation for $v_\\text{eff}$ in terms of the > non-interacting response, which is the practical route to > the time-dependent KS system. ## 12.4 The time-dependent xc potential Equation \\eqref{eq:ch-12-veff} hides the only unknown in the time-dependent KS equations: the **time-dependent xc potential** $v_\\text{xc}[\\rho_{\\le t}](\\mathbf r, t)$. The exact functional is unknown. Three practical approximations are described in this section, in increasing order of accuracy and cost. ### 12.4.1 The adiabatic LDA (ALDA) The simplest and most-used approximation is the **adiabatic local-density approximation** (ALDA, sometimes \"ALDA\" or just \"adiabatic LDA\"). It evaluates the static LDA xc potential on the *instantaneous* density: $$ \\begin{equation} \\label{eq:ch-12-alda} v_\\text{xc}^\\text{ALDA}[\\rho](\\mathbf r, t) \\;=\\; v_\\text{xc}^\\text{LDA}\\big[\\rho(\\mathbf r, t)\\big](\\mathbf r) . \\end{equation} $$ In a spin-paired, spin-unpolarised system the LDA xc potential is the functional derivative of the LDA xc energy, $v_\\text{xc}^\\text{LDA}(\\mathbf r) = \\partial[\\rho(\\mathbf r) \\varepsilon_\\text{xc}(\\rho(\\mathbf r))]/\\partial\\rho(\\mathbf r)$ evaluated at $\\rho = \\rho(\\mathbf r, t)$. The adiabatic approximation sets $v_\\text{xc}$ to depend *only* on the density at the *current* time — i.e. it is **memory-free**. The ALDA is exact in two limits: 1. **Slowly-varying** potentials, where the density has time to track the perturbation and the xc kernel acts quasi-instantaneously. 2. **Linear response** of the homogeneous electron gas, where the ALDA reproduces the exact high-frequency limit of the xc kernel $f_\\text{xc}(\\mathbf q, \\omega) \\to f_\\text{xc}^\\text{ALDA}(\\mathbf q)$ as $\\omega \\to \\infty$. In between, the ALDA has the well-known failure that it misses the long-range tail of the xc kernel: the derivative discontinuity and the step structure in finite systems, the excitonic effects that bind an electron and a hole in solids, and the polarisation-dependence of the xc kernel in time-dependent phenomena. We will see some of these failures in the worked example of section 12.10. The adiabatic **GGA** (adiabatic PBE, etc.) and adiabatic **hybrid** functionals follow the same pattern, with the static functional plugged in at the instantaneous density. They do not introduce any new physics beyond ALDA — they only improve the *stati`c*' xc potential that is being evaluated adiabatically. > **Tip.** The \"adiabatic\" label is a physical statement, not a > technical one. The static LDA, GGA, or hybrid xc potential is > a *snapshot* functional: it takes one density as input and > returns one potential. By *adiabatically* evaluating it on > $\\rho(\\mathbf r, t)$ we are saying that the xc potential at > time $t$ depends only on the density at that same time, with > no memory of how $\\rho$ got there. This is correct only when > the density changes slowly. ### 12.4.2 The exact-exchange (EXX) kernel The **exact-exchange** (EXX) approximation is the time-dependent analogue of the hybrid functionals of [chapter 04](/DFT-notes/dft-notes/chapter-04/) (section 4.5). At the time-dependent level, \"exact exchange\" means that the xc kernel $f_\\text{xc}(\\mathbf r, \\mathbf r', t - t')$ is approximated by the **Fock exchange kernel** of the KS orbitals: $$ \\begin{equation} \\label{eq:ch-12-exx-kernel} f_\\text{x}^\\text{EXX}(\\mathbf r, \\mathbf r', t - t') \\;=\\; -\\frac{1}{2} \\sum_{\\sigma} \\frac{|\\gamma_s(\\mathbf r, \\mathbf r'; t, t')|^2} {|\\mathbf r - \\mathbf r'|\\, \\rho(\\mathbf r, t)\\, \\rho(\\mathbf r', t')}\\, \\delta(t - t') . \\end{equation} $$ (The $\\delta(t - t')$ enforces the *adiabati`c*' approximation; EXX is, in practice, almost always used adiabatically.) The \"$\\frac{1}{2}$\" is the same exchange factor as in Hartree–Fock; the sum runs over the Kramers spin pair; and $\\gamma_s(\\mathbf r, \\mathbf r'; t, t')$ is the one-body density matrix of the KS Slater determinant. The EXX kernel captures the **long-range $-\\!1/r$ tail** that ALDA misses, and the related derivative discontinuity in the xc potential at particle-number changes. In practice EXX is implemented by the same frequency-dependent kernel that the Bethe–Salpeter equation uses (next subsection); a fully time-dependent EXX code is rare. The practical cost of EXX scales as $\\mathcal O(K^4)$ in a Gaussian basis (the same as HF exchange), making it 1–2 orders of magnitude more expensive than ALDA but still much cheaper than BSE. ### 12.4.3 The Bethe–Salpeter equation (BSE) The **Bethe–Salpeter equation** (BSE) is not, strictly, a time-dependent xc *functional*: it is a four-point equation for the two-particle Green's function $L(1, 2; 3, 4)$ that lives at a higher level of the many-body hierarchy. But it is the standard *bridge* between TD-DFT and a description of two- particle excitations (excitons), and we include it here for completeness. The BSE for the two-particle correlation function $L(1, 2; 3, 4)$ is $$ \\begin{equation} \\label{eq:ch-12-bse} L(1, 2; 3, 4) \\;=\\; L_0(1, 2; 3, 4) + \\int d5\\, d6\\, d7\\, d8\\, L_0(1, 5; 3, 7)\\, K(5, 6; 7, 8)\\, L(8, 6; 2, 4) , \\end{equation} $$ where $L_0$ is the non-interacting two-particle propagator (built from the KS orbitals and quasiparticle energies), and $K$ is the **Bethe–Salpeter kernel**. In the standard approximation $K = K^x + K^\\text{direct}$ where $K^x = -W$ is the **exchange** kernel (a statically screened Coulomb interaction $W$) and $K^\\text{direct} = -\\bar v$ is the **direct** (unscreened) Coulomb interaction. The BSE captures the **electron–hole interaction** that binds an exciton in a semiconductor. Standard ALDA TD-DFT misses this entirely because the ALDA xc kernel is short-ranged; BSE recovers it because the BSE kernel contains the long-range Coulomb interaction. The price is that the BSE is an $\\mathcal O(N^6)$ eigenvalue problem in a basis of single- particle transitions (or $\\mathcal O(N^4)$ in storage for the matrix), where $N$ is the number of KS states. We do not derive the BSE here — the standard references are Strinati (1988), Rohlfing and Louie (2000), and the review by Onida, Reining, and Rubio (2002). > **Note.** The hierarchy of TD-DFT, BSE, and the GW approximation > (a related many-body method) is intricate. ALDA TD-DFT is a > long-wave-approximation limit of BSE. EXX TD-DFT is the > adiabatic limit of BSE with $K = K^x$ (the exchange kernel > only, no direct term). Full BSE with the screened-Coulomb > kernel is the most accurate and the most expensive of the > three. We summarise the relationships in section 12.11. ## 12.5 Linear-response TD-DFT (TD-DFRT) The exact time-dependent KS equations are nonlinear. The **linear-response** regime — the response to a *wea`k*' perturbation — is far more tractable and is the workhorse of practical TD-DFT for excitation spectra. ### 12.5.1 The density-density response function For a system in its ground state $|\\Psi_0\\rangle$, the response of the density to a weak external perturbation $\\delta v_\\text{ext}(\\mathbf r, t)$ is described by the **density-density response function** $\\chi$: $$ \\begin{equation} \\label{eq:ch-12-chi-def} \\delta\\rho(\\mathbf r, t) \\;=\\; \\int dt' \\int d\\mathbf r'\\, \\chi(\\mathbf r, t; \\mathbf r', t')\\, \\delta v_\\text{ext}(\\mathbf r', t') . \\end{equation} $$ In a time-translation-invariant system the response depends only on $t - t'$, and the Fourier transform with respect to $\\tau = t - t'$ gives the **frequency-dependent** response function $\\chi(\\mathbf r, \\mathbf r'; \\omega)$: $$ \\begin{equation} \\label{eq:ch-12-chi-fourier} \\delta\\rho(\\mathbf r, \\omega) \\;=\\; \\int d\\mathbf r'\\, \\chi(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta v_\\text{ext}(\\mathbf r', \\omega) . \\end{equation} $$ The poles of $\\chi(\\mathbf r, \\mathbf r'; \\omega)$ as a function of $\\omega$ give the **neutral excitation energies** of the interacting system. The residues at the poles give the **oscillator strengths** — the same quantities that enter Fermi's golden rule for photon absorption. This is the content of section 12.6. ### 12.5.2 The KS response function The non-interacting KS system has its own response function, $\\chi_s$, which describes how the KS density responds to a weak perturbation of the KS effective potential: $$ \\begin{equation} \\label{eq:ch-12-chi-s-def} \\delta\\rho_s(\\mathbf r, \\omega) \\;=\\; \\int d\\mathbf r'\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta v_\\text{eff}(\\mathbf r', \\omega) . \\end{equation} $$ In a basis of KS orbitals the KS response function is **independent** of the time-dependent xc potential; it depends only on the KS orbitals and eigenvalues. Its Lehmann representation is $$ \\begin{equation} \\label{eq:ch-12-chi-s-lehmann} \\chi_s(\\mathbf r, \\mathbf r'; \\omega) \\;=\\; 2 \\sum_{i}^\\text{occ} \\sum_{a}^\\text{virt} \\frac{\\phi_i^*(\\mathbf r)\\, \\phi_a(\\mathbf r)\\, \\phi_a^*(\\mathbf r')\\, \\phi_i(\\mathbf r')} {\\omega - (\\varepsilon_a - \\varepsilon_i) + i\\eta} \\;-\\; \\text{c.c.}(\\omega \\to -\\omega) . \\end{equation} $$ The \"2\" is again the Kramers spin-pairing factor; the sum is over occupied ($i$) and virtual ($a$) KS orbitals; and the \"c.c.\" term subtracts the same expression with $\\omega$ sent to $-\\omega$ to enforce the proper-particle / hole asymmetry. The infinitesimal $i\\eta$ with $\\eta \\to 0^+$ picks out the retarded response function. The poles of $\\chi_s$ sit at the **KS single-particle excitation energies** $\\varepsilon_a - \\varepsilon_i$ — *not* at the true many-body excitation energies. The whole point of the Dyson equation (next subsection) is to dress $\\chi_s$ with the electron–electron interaction and shift the poles to the correct many-body positions. ### 12.5.3 The Dyson equation The full interacting response function $\\chi$ is connected to the KS response $\\chi_s$ by the **Dyson equation** $$ \\begin{equation} \\label{eq:ch-12-dyson} \\boxed{ \\chi(\\mathbf r, \\mathbf r'; \\omega) \\;=\\; \\chi_s(\\mathbf r, \\mathbf r'; \\omega) + \\int d\\mathbf r''\\, d\\mathbf r'''\\, \\chi_s(\\mathbf r, \\mathbf r''; \\omega)\\, \\Bigl[ v_\\text{H}(\\mathbf r'', \\mathbf r''') + f_\\text{xc}(\\mathbf r'', \\mathbf r''', \\omega) \\Bigr]\\, \\chi(\\mathbf r''', \\mathbf r'; \\omega) . } \\end{equation} $$ The kernel is the sum of the **Hartree kernel** $v_\\text{H}(\\mathbf r, \\mathbf r') = 1/|\\mathbf r - \\mathbf r'|$ and the **exchange–correlation kernel** $$ \\begin{equation} \\label{eq:ch-12-fxc} f_\\text{xc}(\\mathbf r, \\mathbf r', \\omega) \\;=\\; \\frac{\\delta v_\\text{xc}(\\mathbf r, \\omega)} {\\delta \\rho(\\mathbf r', \\omega)} , \\end{equation} $$ which is the *functional derivative* of the time-dependent xc potential with respect to the density, evaluated on the frequency-diagonal piece of the response. The frequency dependence of $f_\\text{xc}$ is the memory effect: the xc potential at frequency $\\omega$ depends on the density at all frequencies via $f_\\text{xc}(\\omega)$, and the Dyson equation couples these through $\\chi_s$ (which already contains the orbital energy denominators). **Derivation of the Dyson equation.** The KS density must equal the interacting density: $\\delta\\rho = \\delta\\rho_s$. The perturbation that the *electrons* actually feel, however, is not the bare $\\delta v_\\text{ext}$ but the *self-consistent* $\\delta v_\\text{eff}$: $$ \\begin{equation} \\label{eq:ch-12-veff-response} \\delta v_\\text{eff}(\\mathbf r, \\omega) \\;=\\; \\delta v_\\text{ext}(\\mathbf r, \\omega) + \\int d\\mathbf r'\\, v_\\text{H}(\\mathbf r, \\mathbf r')\\, \\delta\\rho(\\mathbf r', \\omega) + \\int d\\mathbf r'\\, f_\\text{xc}(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta\\rho(\\mathbf r', \\omega) . \\end{equation} $$ Substitute into \\eqref{eq:ch-12-chi-s-def} and use $\\delta\\rho = \\delta\\rho_s$: \\begin{align} \\delta\\rho(\\mathbf r, \\omega) &= \\int d\\mathbf r'\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\Bigl[ \\delta v_\\text{ext}(\\mathbf r', \\omega) + \\int d\\mathbf r''\\, v_H(\\mathbf r', \\mathbf r'')\\, \\delta\\rho(\\mathbf r'', \\omega) + \\int d\\mathbf r''\\, f_\\text{xc}(\\mathbf r', \\mathbf r''; \\omega)\\, \\delta\\rho(\\mathbf r'', \\omega) \\Bigr] . \\end{align} Use \\eqref{eq:ch-12-chi-fourier} to replace $\\delta v_\\text{ext}$ with $\\delta\\rho$ on the right-hand side, and rearrange: \\begin{align} \\delta\\rho(\\mathbf r, \\omega) &= \\int d\\mathbf r'\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta v_\\text{ext}(\\mathbf r', \\omega) \\\\\\ &\\quad + \\int d\\mathbf r'\\, d\\mathbf r''\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\Bigl[ v_H(\\mathbf r', \\mathbf r'') + f_\\text{xc}(\\mathbf r', \\mathbf r''; \\omega) \\Bigr]\\, \\delta\\rho(\\mathbf r'', \\omega) . \\end{align} Identifying the first term on the right-hand side as $\\int \\chi_s\\, \\delta v_\\text{ext}$ and the rest as the integral operator applied to $\\delta\\rho$, we recognise the linear integral equation for $\\chi$, with $\\delta v_\\text{ext}$ as the inhomogeneous source. Reading off the kernel of the equation gives \\eqref{eq:ch-12-dyson}. > **Note.** The Dyson equation \\eqref{eq:ch-12-dyson} is the > time-dependent analogue of the static Dyson equation > $G = G_0 + G_0 \\Sigma G$ of many-body theory. In the > language of the previous chapter, $\\chi$ plays the role of > the full Green's function $G$, $\\chi_s$ the role of $G_0$, > and $v_H + f_\\text{xc}$ the role of the self-energy > $\\Sigma$. The KS orbitals take the place of the > mean-field orbitals of the Hartree–Fock starting point. ### 12.5.4 The two-particle-like structure Although \\eqref{eq:ch-12-dyson} is a two-point function equation, it has a **four-index matrix** structure when discretised. In a basis of $K$ spatial functions, $\\chi(\\mathbf r, \\mathbf r'; \\omega)$ becomes a $K \\times K$ matrix $\\chi(\\omega)$, and the integral $\\int d\\mathbf r''\\, d\\mathbf r'''$ becomes matrix multiplication: $$ \\begin{equation} \\label{eq:ch-12-dyson-matrix} \\boldsymbol\\chi(\\omega) \\;=\\; \\boldsymbol\\chi_s(\\omega) + \\boldsymbol\\chi_s(\\omega)\\, \\Bigl[ \\mathbf v_H + \\mathbf f_\\text{xc}(\\omega) \\Bigr]\\, \\boldsymbol\\chi(\\omega) . \\end{equation} $$ This is a $K \\times K$ matrix equation for the $K \\times K$ matrix $\\boldsymbol\\chi(\\omega)$. Solving it for $\\boldsymbol\\chi$ at each frequency — or, more efficiently, finding its poles and residues — is the practical work of linear-response TD-DFT. ## 12.6 Excitations The poles of the response function $\\chi(\\mathbf r, \\mathbf r'; \\omega)$ are the **neutral excitation energies** of the system. To see this, write the Dyson equation \\eqref{eq:ch-12-dyson-matrix} in operator form as $$ \\begin{equation} \\label{eq:ch-12-chi-resolvent} \\boldsymbol\\chi(\\omega) \\;=\\; \\Bigl[ \\mathbf 1 - \\boldsymbol\\chi_s(\\omega)\\, \\Bigl( \\mathbf v_H + \\mathbf f_\\text{xc}(\\omega) \\Bigr) \\Bigr]^{-1}\\, \\boldsymbol\\chi_s(\\omega) . \\end{equation} $$ The poles of $\\boldsymbol\\chi(\\omega)$ are the frequencies $\\omega_I$ at which the bracketed matrix is singular, i.e. at which $$ \\begin{equation} \\label{eq:ch-12-pole-equation} \\det\\Bigl[ \\mathbf 1 - \\boldsymbol\\chi_s(\\omega_I)\\, \\Bigl( \\mathbf v_H + \\mathbf f_\\text{xc}(\\omega_I) \\Bigr) \\Bigr] \\;=\\; 0 . \\end{equation} $$ At such a frequency the response is *infinite* for a finite perturbation — i.e. a *resonance* of the system. The $\\omega_I$ for which the response blows up are the **excitation energies**. ### 12.6.1 Oscillator strengths The **oscillator strength** $f_I$ of an excitation at energy $\\omega_I$ is the residue of $\\boldsymbol\\chi$ at the pole $\\omega = \\omega_I$. It measures the strength of the excitation's coupling to a uniform electric field (in the dipole approximation) and is directly comparable to experimental absorption cross-sections via the relation $$ \\begin{equation} \\label{eq:ch-12-oscillator-strength} \\sigma(\\omega) \\;=\\; \\frac{2\\pi^2}{c} \\sum_I f_I\\, \\delta(\\omega - \\omega_I) , \\end{equation} $$ where $\\sigma(\\omega)$ is the cross-section for absorption of a photon of energy $\\omega$. For a closed-shell, dipole-allowed excitation the oscillator strength in the dipole-length gauge is $$ \\begin{equation} \\label{eq:ch-12-fI} f_I \\;=\\; \\frac{2\\, m\\, \\omega_I}{3\\hbar}\\, \\sum_{\\alpha = x, y, z} \\Bigl| \\langle \\Psi_I | \\hat r_\\alpha | \\Psi_0 \\rangle \\Bigr|^2 , \\end{equation} $$ with $\\Psi_0$ the ground state, $\\Psi_I$ the excited state, and $\\hat r_\\alpha$ the dipole operator in the $\\alpha$ direction. The factor 2 in front is the standard convention in the *length*' gauge; the velocity gauge uses $|\\langle \\Psi_I | \\hat p_\\alpha | \\Psi_0 \\rangle|^2$ instead. > **Tip.** The oscillator strength is dimensionless. The > \"Thomas–Reiche–Kuhn sum rule\" (problem 1) says that the sum > of all oscillator strengths of a one-electron system is > exactly 1. For a many-electron system the sum is $N$, the > number of electrons. The sum rule is the most important > sanity check on any computed spectrum. ## 12.7 The Casida formulation The most widely-used form of the linear-response TD-DFT eigenvalue problem is due to **Mark Casida** (1995, 1996). It reduces the search for the poles of $\\chi$ to a single generalised matrix eigenvalue equation of dimension $N_\\text{trans} = N_\\text{occ}\\, N_\\text{virt}$, where $N_\\text{occ}$ and $N_\\text{virt}$ are the number of occupied and virtual KS orbitals. ### 12.7.1 The Casida matrix The Casida formulation works in the space of single-particle excitations $|i \\to a\\rangle$ (one occupied orbital $i$, one virtual orbital $a$). In this basis the Dyson equation \\eqref{eq:ch-12-dyson} reduces to a matrix equation. The derivation below is the original Casida (1995) form (Casida, \"Time-dependent density functional response theory for molecules\", in *Recent Advances in Density Functional Methods*, ed. D. P. Chong, World Scientific, 1995, pp. 155-192; equation numbers below are from the printed proceedings, pp. 165-168), with the modern $X$/$Y$ matrix form that Petersilka, Gossmann & Gross (PRL **76**, 1212, 1996, Eqs. (8)-(9)) re-derived in a slightly different way. **Step 1 — the single-particle transition density.** Define $$ \\begin{equation} \\label{eq:ch-12-transition-density} \\xi_{ia}(\\mathbf r) \\;=\\; \\phi_i^*(\\mathbf r)\\, \\phi_a(\\mathbf r) , \\end{equation} $$ the product of an occupied and a virtual KS orbital. The set $\\{\\xi_{ia}\\}$ for all pairs $(i, a)$ is the basis in which the Casida matrix is written. The number of basis functions is $N_\\text{trans} = N_\\text{occ}\\, N_\\text{virt}$ (typically $10^3$ to $10^7$ for a molecule or solid; the eigenvalue problem is the bottleneck of linear-response TDDFT). **Step 2 — the KS response in the transition basis.** The KS response function \\eqref{eq:ch-12-chi-s-lehmann} in this basis is diagonal (this is the *defining* property of the KS response function — the KS system has no coupling between different particle–hole pairs): $$ \\begin{equation} \\label{eq:ch-12-chi-s-lehmann-basis} \\chi_s(\\mathbf r, \\mathbf r'; \\omega) \\;=\\; 2 \\sum_{ia} \\xi_{ia}(\\mathbf r)\\, \\Bigl[ (\\omega - \\omega_{ia} + i\\eta)^{-1} - (\\omega + \\omega_{ia} - i\\eta)^{-1} \\Bigr]\\, \\xi_{ia}^*(\\mathbf r') , \\end{equation} $$ with $\\omega_{ia} = \\varepsilon_a - \\varepsilon_i > 0$ the KS excitation energy of the transition $i \\to a$. The factor 2 is the spin sum (closed shell; for an open-shell system it is replaced by a $2 \\times 2$ spin structure). The $i\\eta$ is the standard Feynman prescription that places the poles in the lower half of the complex $\\omega$ plane (so that the response is causal). **Step 3 — the density ansatz in the transition basis.** At a pole of $\\chi$ (i.e. at an excitation energy $\\omega = \\omega_I$), the first-order density response has a *resonant* (positive $\\omega$) and an *anti-resonant* (negative $\\omega$) component. Write it as $$ \\begin{equation} \\label{eq:ch-12-rho-ansatz} \\delta\\rho(\\mathbf r, \\omega_I) \\;=\\; 2 \\sum_{ia} \\Bigl[ X_{ia}\\, \\xi_{ia}(\\mathbf r) + Y_{ia}\\, \\xi_{ia}(\\mathbf r) \\Bigr] , \\end{equation} $$ where $X_{ia}$ and $Y_{ia}$ are the *resonant* and anti-resonant amplitudes of the $ia$ transition in the eigenstate $I$. Both are real in the spin-summed, time-reversal-symmetric case. The factor 2 is again the spin sum. **Step 4 — the self-consistent effective perturbation.** The effective potential that drives the KS response is the sum of the external perturbation and the induced Hartree–xc perturbation \\eqref{eq:ch-12-f-Hxc}: $$ \\begin{equation} \\label{eq:ch-12-v-eff} \\delta v_\\text{eff}(\\mathbf r, \\omega) \\;=\\; \\delta v_\\text{ext}(\\mathbf r, \\omega) + \\int\\! d\\mathbf r'\\, f_\\text{Hxc}(\\mathbf r, \\mathbf r')\\, \\delta\\rho(\\mathbf r', \\omega) . \\end{equation} $$ At the *pole* of $\\chi$, the response diverges for a finite $\\delta v_\\text{ext}$, so we drop the source and look for a self-sustaining $\\delta v_\\text{eff}$: $$ \\begin{equation} \\label{eq:ch-12-v-eff-pole} \\delta v_\\text{eff}(\\mathbf r, \\omega_I) \\;=\\; \\int\\! d\\mathbf r'\\, f_\\text{Hxc}(\\mathbf r, \\mathbf r')\\, \\delta\\rho(\\mathbf r', \\omega_I) . \\end{equation} $$ Project onto the transition basis $\\xi_{ia}^*(\\mathbf r)$ and integrate over $\\mathbf r$: $$ \\begin{equation} \\label{eq:ch-12-v-eff-ia} [\\delta v_\\text{eff}]_{ia} \\;=\\; \\sum_{jb} K_{ia, jb}\\, 2\\,(X_{jb} + Y_{jb}) , \\end{equation} $$ where the **coupling matrix** $\\mathbf K$ is $$ \\begin{equation} \\label{eq:ch-12-casida-K} K_{ia, jb} \\;=\\; \\iint d\\mathbf r\\, d\\mathbf r'\\, \\xi_{ia}^*(\\mathbf r)\\, \\Bigl[ v_H(\\mathbf r, \\mathbf r') + f_\\text{xc}(\\mathbf r, \\mathbf r') \\Bigr]\\, \\xi_{jb}(\\mathbf r') . \\end{equation} $$ The factor of 2 in \\eqref{eq:ch-12-v-eff-ia} comes from the spin sum in the density ansatz \\eqref{eq:ch-12-rho-ansatz}. **Step 5 — the KS response in the transition basis.** The KS response is *linear* in $\\delta v_\\text{eff}$ and diagonal in the transition basis: $$ \\begin{equation} \\label{eq:ch-12-rho-from-vs} \\delta\\rho(\\mathbf r, \\omega) \\;=\\; \\int\\! d\\mathbf r'\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta v_\\text{eff}(\\mathbf r', \\omega) . \\end{equation} $$ Substituting the Lehmann form \\eqref{eq:ch-12-chi-s-lehmann-basis} for $\\chi_s$ and projecting onto $\\xi_{ia}^*(\\mathbf r)$ gives $$ \\begin{equation} \\label{eq:ch-12-rho-ia} 2\\,(X_{ia} + Y_{ia}) \\;=\\; 2\\,\\Bigl[ g_{ia}(\\omega_I) + g_{ia}(-\\omega_I) \\Bigr]\\, [\\delta v_\\text{eff}]_{ia} , \\end{equation} $$ where we have defined the *single-particle propagator* $$ \\begin{equation} \\label{eq:ch-12-g-ia} g_{ia}(\\omega) \\;=\\; \\frac{1}{\\omega - \\omega_{ia} + i\\eta} , \\end{equation} $$ whose value at $\\omega = \\omega_I$ is the relevant object because $\\omega_I$ is the (unknown) pole frequency. Note that $g_{ia}(-\\omega_I) = 1/(-\\omega_I - \\omega_{ia})$ is small and regular; only $g_{ia}(\\omega_I)$ carries the pole structure. **Step 6 — separating the resonant and anti-resonant parts.** Equation \\eqref{eq:ch-12-rho-ia} couples $X_{ia}$ and $Y_{ia}$ together. We *separate* them by multiplying the equation by $g_{ia}(\\omega_I)$ and $g_{ia}(-\\omega_I)$ separately and using the identities $g_{ia}(\\omega_I) \\cdot (\\omega_I - \\omega_{ia}) = 1$ and $g_{ia}(-\\omega_I) \\cdot (-\\omega_I - \\omega_{ia}) = 1$. For the *resonant* part: multiply the resonant piece of \\eqref{eq:ch-12-rho-ia} (the piece proportional to $g_{ia}(\\omega_I)$) by $(\\omega_I - \\omega_{ia})$: $$ \\begin{equation} \\label{eq:ch-12-X-equation} X_{ia} \\;=\\; g_{ia}(\\omega_I)\\, [\\delta v_\\text{eff}]_{ia} , \\end{equation} $$ which gives $$ \\begin{equation} \\label{eq:ch-12-X-equation-2} (\\omega_I - \\omega_{ia})\\, X_{ia} \\;=\\; [\\delta v_\\text{eff}]_{ia} . \\end{equation} $$ Substituting \\eqref{eq:ch-12-v-eff-ia} for $[\\delta v_\\text{eff}]_{ia}$: $$ \\begin{equation} \\label{eq:ch-12-X-equation-3} \\omega_I\\, X_{ia} \\;=\\; \\omega_{ia}\\, X_{ia} + 2 \\sum_{jb} K_{ia, jb}\\, (X_{jb} + Y_{jb}) . \\end{equation} $$ For the *anti-resonant* part: multiply the anti-resonant piece of \\eqref{eq:ch-12-rho-ia} (the piece proportional to $g_{ia}(-\\omega_I)$) by $(-\\omega_I - \\omega_{ia})$: $$ \\begin{equation} \\label{eq:ch-12-Y-equation} (-\\omega_I - \\omega_{ia})\\, Y_{ia} \\;=\\; [\\delta v_\\text{eff}]_{ia} . \\end{equation} $$ (The resonant part contributes nothing because $g_{ia}(\\omega_I)$ is small compared to $g_{ia}(-\\omega_I)$ near the negative frequency pole.) Substituting \\eqref{eq:ch-12-v-eff-ia}: $$ \\begin{equation} \\label{eq:ch-12-Y-equation-2} -\\omega_I\\, Y_{ia} \\;=\\; \\omega_{ia}\\, Y_{ia} + 2 \\sum_{jb} K_{ia, jb}\\, (X_{jb} + Y_{jb}) . \\end{equation} $$ (After multiplying out the sign in $(-\\omega_I - \\omega_{ia}) = -(\\omega_I + \\omega_{ia})$.) **Step 7 — the Casida equation in modern form.** Equations \\eqref{eq:ch-12-X-equation-3} and \\eqref{eq:ch-12-Y-equation-2} form a $2N_\\text{trans}$-dimensional matrix eigenvalue problem. Writing it in block-matrix form with the diagonal of the matrix $\\mathbf A$ given by the bare excitation energies $\\omega_{ia}$ and the off-diagonal coupling given by $\\mathbf K$: $$ \\begin{equation} \\label{eq:ch-12-casida} \\boxed{ \\begin{pmatrix} \\mathbf A & \\mathbf B \\\\\\ \\mathbf B & \\mathbf A \\end{pmatrix} \\begin{pmatrix} \\mathbf X \\\\\\\\ \\mathbf Y \\end{pmatrix} \\;=\\; \\omega_I\\, \\begin{pmatrix} \\mathbf 1 & \\mathbf 0 \\\\\\ \\mathbf 0 & -\\mathbf 1 \\end{pmatrix} \\begin{pmatrix} \\mathbf X \\\\\\\\ \\mathbf Y \\end{pmatrix} . } \\end{equation} $$ The two blocks $\\mathbf A$ and $\\mathbf B$ are $$ \\begin{equation} \\label{eq:ch-12-casida-A} A_{ia, jb} \\;=\\; \\delta_{ij}\\, \\delta_{ab}\\, \\omega_{ia} + K_{ia, jb} , \\end{equation} $$ $$ \\begin{equation} \\label{eq:ch-12-casida-B} B_{ia, jb} \\;=\\; K_{ia, jb} , \\end{equation} $$ i.e. the diagonal is the bare KS excitation energy and the off-diagonal is the same coupling matrix in both blocks. The identity matrix $\\mathbf 1$ and the minus sign on the lower right come from the *opposite* sign of the pole in the anti-resonant equation \\eqref{eq:ch-12-Y-equation-2}. **Step 8 — the $\\omega^2$ form (Casida 1995, original).** A common alternative form is obtained by adding and subtracting the two halves of the eigenvalue problem. Let $\\mathbf F \\equiv \\mathbf X + \\mathbf Y$ and $\\mathbf G \\equiv \\mathbf X - \\mathbf Y$. Adding and subtracting the two halves of \\eqref{eq:ch-12-casida} gives $$ \\begin{equation} (\\mathbf A + \\mathbf B)\\, \\mathbf F = \\omega_I\\, \\mathbf G , \\tag{12.7.a} \\end{equation} $$ $$ \\begin{equation} (\\mathbf A - \\mathbf B)\\, \\mathbf G = \\omega_I\\, \\mathbf F . \\tag{12.7.b} \\end{equation} $$ With $\\mathbf A - \\mathbf B = \\mathrm{diag}(\\omega_{ia})$ (the coupling cancels because both $\\mathbf A$ and $\\mathbf B$ have the same off-diagonal $\\mathbf K$) and $\\mathbf A + \\mathbf B = \\mathrm{diag}(\\omega_{ia}) + 2\\mathbf K$, equation \\eqref{eq:ch-12-b} gives $\\mathbf G = \\omega_I^{-1}\\, \\mathrm{diag}(\\omega_{ia})\\, \\mathbf F$ componentwise, i.e. $G_{ia} = \\omega_{ia}\\, F_{ia} / \\omega_I$. Substituting into \\eqref{eq:ch-12-a}: $$ \\begin{equation} \\label{eq:ch-12-casida-omega2} \\boxed{ \\Bigl[ \\mathrm{diag}(\\omega_{ia}) + 2\\, \\mathbf K \\Bigr]\\, \\mathrm{diag}(\\omega_{ia})\\, \\mathbf F \\;=\\; \\omega_I^2\\, \\mathbf F , } \\end{equation} $$ or, in components, $$ \\begin{equation} \\label{eq:ch-12-casida-omega2-comp} \\sum_{jb} \\Bigl[ \\delta_{ij}\\delta_{ab}\\, \\omega_{ia} + 2\\, K_{ia, jb} \\Bigr]\\, \\omega_{jb}\\, F_{jb} \\;=\\; \\omega_I^2\\, F_{ia} . \\end{equation} $$ This is the **Casida equation in the symmetric form** (Casida 1995, Eq. (3.16), p. 168). The matrix on the left, $\\Omega_{ia, jb} = \\delta_{ij}\\delta_{ab}\\, \\omega_{ia}^2 + 2 \\sqrt{\\omega_{ia} \\omega_{jb}}\\, K_{ia, jb}$ (after the rescaling $F_{ia} \\to F_{ia}/\\sqrt{\\omega_{ia}}$), is real-symmetric for closed-shell systems, so the eigenvalues $\\omega_I^2$ are real and non-negative. The square-root rescaling symmetrises the equation and is the standard presentation; the original form \\eqref{eq:ch-12-casida-omega2-comp} is the form actually derived above. In the **Tamm–Dancoff approximation** (TDA, equivalent to neglecting the $\\mathbf B$ block, i.e. setting $Y_{ia} = 0$), the equation reduces to the simpler eigenvalue problem $$ \\begin{equation} \\label{eq:ch-12-casida-TDA} \\mathbf A \\mathbf X \\;=\\; \\omega_I\\, \\mathbf X , \\end{equation} $$ i.e. $\\omega_I X_{ia} = \\omega_{ia} X_{ia} + 2 \\sum_{jb} K_{ia, jb} X_{jb}$. The TDA is exact for *single* excitations in the limit of no coupling between particle–hole pairs (i.e. $\\mathbf K = 0$) and is a good approximation for *single excitations* in general; it underestimates the oscillator strength of *double* excitations (which require the $\\mathbf Y$ block to be present). ### 12.7.2 The oscillator strength from the Casida eigenvectors The dipole oscillator strength of excitation $I$ is $$ \\begin{equation} \\label{eq:ch-12-casida-f} f_I \\;=\\; \\frac{2}{3} \\sum_{\\alpha = x, y, z} \\Bigl| \\sum_{ia} \\sqrt{\\frac{\\omega_{ia}}{\\omega_I}}\\, (X_{ia} + Y_{ia})\\, \\langle \\phi_a | \\hat r_\\alpha | \\phi_i \\rangle \\Bigr|^2 . \\end{equation} $$ The sum runs over all single-particle transitions, weighted by the eigenvectors $(\\mathbf X, \\mathbf Y)$ of the $I$-th eigenvalue of \\eqref{eq:ch-12-casida}. The factor $\\sqrt{\\omega_{ia}/\\omega_I}$ is the standard velocity-gauge rescaling. ### 12.7.3 The form of the coupling matrix The kernel in \\eqref{eq:ch-12-casida-K} separates into a **Coulomb** part (the Hartree kernel $v_H$) and an **xc** part (the kernel $f_\\text{xc}$). The Coulomb part drives the **de-excitation** direction in the Casida matrix (it appears with a $-$ sign in the full equation, but is absorbed in the structure of $\\mathbf A$, $\\mathbf B$); the xc part is what shifts the KS excitation energies to the true many-body ones. In the **ALDA** $f_\\text{xc}^\\text{ALDA}(\\mathbf r) = d^2[\\rho \\varepsilon_\\text{xc}(\\rho)]/d\\rho^2$, a *purely local* kernel. The coupling matrix in this case is often written in terms of spin densities and the spin- unpolarised or spin-polarised HEG response. The ALDA is **frequency-independent** — the kernel $f_\\text{xc}$ is a function of $\\mathbf r$ only, not of $\\omega$. The BSE kernel is frequency-dependent (it is built from the dynamically screened Coulomb interaction $W(\\omega)$); the EXX kernel is non-local in $\\mathbf r$ but frequency-independent. > **Note.** The dimension of the Casida matrix is > $2\\, N_\\text{occ}\\, N_\\text{virt}$. For a small molecule > with $N_\\text{occ} = 5$ and $N_\\text{virt} = 50$ this is > a $500 \\times 500$ matrix — easily diagonalised. For a > solid with $N_\\text{occ} = 20$ and $N_\\text{virt} = 1000$ > it is $40{,}000 \\times 40{,}000$, which demands > iterative eigensolvers. The Casida equation is the > practical backbone of production TD-DFT codes (Q-Chem, > TURBOMOLE, ORCA, NWChem). ### 12.7.4 Diagram — the Casida construction pipeline The Casida equation is the practical realisation of linear-response TD-DFT for *excitation spectr`a*`. The pipeline runs from a *ground-state* calculation (which provides the KS orbitals and energies) through the *KS response function* $\\chi_s$, the *coupling matrix* $\\mathbf K$ (which contains the electron–electron interaction through the kernel $f_\\text{xc}$), and finally a *matrix eigenvalue problem* whose eigenvalues are the excitation energies $\\omega_I$ and whose eigenvectors $(\\mathbf X, \\mathbf Y)$ are the *excitation amplitudes*. ```mermaid %%{init: {'flowchart': {'htmlLabels': true, 'curve': 'basis'}}}%% graph TD GS[\"Ground state<br/>phi_i, phi_a, eps_i, eps_a<br/>(chapter 04)\"] --> TD[\"Transition densities<br/>xi_ia(r) = phi_i* phi_a\"] TD --> CHI[\"KS response function<br/>chi_s(omega)<br/>(Lehmann representation)\"] CHI --> KERN{\"Choose kernel<br/>f_xc(omega)\"} KERN -->|\"ALDA\"| ALDA[\"f_xc = d^2(rho eps_xc)/drho^2<br/>local, omega-independent\"] KERN -->|\"EXX\"| EXX[\"f_xc^EXX<br/>non-local, omega-independent\"] KERN -->|\"BSE\"| BSE[\"K^x + K^direct<br/>non-local, omega-dependent\"] ALDA --> K[\"Coupling matrix<br/>K_ia,jb<br/>(eq. 12.78)\"] EXX --> K BSE --> K CHI --> A[\"Diagonal A_ia,jb<br/>= delta_ij delta_ab omega_ia<br/>+ K_ia,jb\"] K --> A K --> B[\"Off-diagonal B_ia,jb<br/>= K_ia,jb\"] A --> EIG[\"Casida eigenvalue problem<br/>(2 N_occ N_virt) x<br/>(2 N_occ N_virt)\"] B --> EIG EIG --> OMEGA[\"Excitation energies<br/>omega_I<br/>(eigenvalues)\"] EIG --> XY[\"Excitation amplitudes<br/>(X_I, Y_I)\"] XY --> FOSC[\"Oscillator strength f_I<br/>(eq. 12.80)\"] OMEGA --> SPEC[\"UV/vis absorption<br/>spectrum\"] FOSC --> SPEC classDef inp fill:#eef0e6,stroke:#3a4031,color:#1c1f17; classDef step fill:#d6dcc8,stroke:#3a4031,color:#1c1f17; classDef out fill:#cc785c,stroke:#1c1f17,color:#ffffff; class GS inp class TD step class CHI step class KERN step class ALDA step class EXX step class BSE step class K step class A step class B step class EIG step class XY step class FOSC step class OMEGA out class SPEC out"
