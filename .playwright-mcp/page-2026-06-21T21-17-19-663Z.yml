      - heading "12.10 The Bethe–Salpeter equation (BSE)" [level=2] [ref=e7633]
      - paragraph [ref=e7634]:
        - text: The Casida equation of section 12.9 is the workhorse of TD-DFT for
        - emphasis [ref=e7635]: molecular
        - text: excitation spectra. For the
        - emphasis [ref=e7636]: optical
        - text: spectra of solids — semiconductors, insulators, wide-gap materials — a different formalism is required. The reason is the
        - strong [ref=e7637]: exciton
        - text: ": a bound electron–hole pair with a binding energy of order"
        - img [ref=e7639]
        - text: –
        - img [ref=e7647]
        - text: eV that lives
        - emphasis [ref=e7654]: below
        - text: the fundamental band gap and dominates the optical absorption edge. The Casida equation, with the
        - emphasis [ref=e7655]: "adiabati`c"
        - text: ’ kernel of section 12.9.5, fails to bind the exciton because the adiabatic kernel has no long-range component. The
        - strong [ref=e7656]: Bethe–Salpeter equation
        - text: (BSE) is the formalism that does.
      - paragraph [ref=e7657]: This section is the full treatment of the BSE for optical spectra. It assumes the Casida equation of section 12.9 and the GW self-energy of the previous chapter (we use the GW quasiparticle energies as the input to the BSE matrix). We do not derive the BSE from the two-particle Green’s function in full generality — the standard references are Strinati (1988), Rohlfing and Louie (2000), and the Onida– Reining–Rubio (2002) review.
      - heading "12.10.1 Why BSE?" [level=3] [ref=e7658]
      - paragraph [ref=e7659]:
        - text: The
        - strong [ref=e7660]: exciton
        - text: is a bound state of an electron in the conduction band and a hole in the valence band. Its binding energy — the difference between the optical gap (the energy of the first bright excitonic peak) and the
        - emphasis [ref=e7661]: fundamental
        - text: band gap (electron addition minus electron removal) — is
        - img [ref=e7663]
        - text: –
        - img [ref=e7671]
        - text: eV in typical semiconductors. In organic molecular crystals it can be even larger.
      - paragraph [ref=e7678]:
        - text: The Casida equation of section 12.9
        - emphasis [ref=e7679]: can
        - text: in principle describe excitons — the Dyson equation
        - img [ref=e7681]:
          - link [ref=e7684] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-12-09-dyson"
        - text: is exact, and the exact
        - img [ref=e7693]
        - text: would bind the electron–hole pair through its long-range component. The problem is the
        - emphasis [ref=e7702]:
          - text: adiabati
          - code [ref=e7703]: "c*' approximation. The adiabatic kernel of \\eqref{eq:ch-12-09-adiabatic} is built from the *stati"
          - text: c
        - text: ’ xc energy functional of the KS ground state, and a static functional has no way to generate a frequency-dependent xc response of the kind required for a long-range, retarded electron–hole attraction.
      - blockquote [ref=e7704]:
        - paragraph [ref=e7705]:
          - strong [ref=e7706]: The deep reason.
          - text: The xc kernel
          - img [ref=e7708]
          - text: has a long- range
          - img [ref=e7737]
          - text: tail that comes from the
          - emphasis [ref=e7763]:
            - text: screene
            - code [ref=e7764]: d*' Coulomb interaction $W(\omega)$, not from the *bare* Hartree kernel $v_H = 1/|\mathbf r - \mathbf r'|$. The adiabatic kernel of the KS DFT has *no* $W$ in it. Only kernels built from a *two-particle* propagator (BSE) or from a *range-separate
            - text: d
          - text: ’ hybrid (CAM- B3LYP,
          - img [ref=e7766]
          - text: B97X) recover the long-range tail.
      - paragraph [ref=e7771]:
        - text: The BSE is a kernel of the right form. In the “GW + BSE” workflow the kernel is the statically screened Coulomb interaction
        - img [ref=e7773]
        - text: built from the GW dielectric function. The screening
        - emphasis [ref=e7800]: reduces
        - text: the bare
        - img [ref=e7802]
        - text: tail to a finite-range Yukawa- like
        - img [ref=e7813]
        - text: ", which still binds the exciton. The Casida equation with the"
        - strong [ref=e7831]: EXX
        - text: kernel (section 12.4.2) is the
        - emphasis [ref=e7832]:
          - text: unscreene
          - code [ref=e7833]: d*' limit of the BSE and over-binds the exciton; the Casida equation with the **BSE kernel** is the *screene
          - text: d
        - text: ’ limit and is the correct treatment.
      - heading "12.10.2 The two-particle Green’s function" [level=3] [ref=e7834]
