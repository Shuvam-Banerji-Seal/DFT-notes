      - heading "12.11.6 Ehrenfest dynamics" [level=3] [ref=e13355]
      - paragraph [ref=e13356]:
        - text: For coupled electron–ion dynamics, the time-dependent KS equations
        - img [ref=e13358]:
          - link [ref=e13361] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-12-11-tdks-restated"
        - text: are coupled to
        - strong [ref=e13369]: classical
        - text: nuclear dynamics via the
        - strong [ref=e13370]: Ehrenfest
        - text: mean-field force. The nuclei move on the
        - emphasis [ref=e13371]: instantaneous
        - text: KS potential energy surface — the time-dependent KS energy at the current orbitals, evaluated at the current nuclear coordinates.
      - paragraph [ref=e13372]: The nuclear equation of motion is
      - img [ref=e13374]:
        - generic [ref=e13378]:
          - img [ref=e13379]
          - img [ref=e13478]
      - paragraph [ref=e13487]:
        - text: The right-hand side is the gradient of the time-dependent KS energy with respect to the nuclear coordinate
        - img [ref=e13489]
        - text: ", taken with the"
        - emphasis [ref=e13498]: orbitals
        - img [ref=e13500]
        - text: held fixed. The orbital and nuclear equations are *couple
        - code [ref=e13519]: d*
        - text: ": the orbitals depend on the nuclear coordinates (through the external potential"
        - img [ref=e13521]
        - text: ), and the nuclear trajectory depends on the orbitals (through the expectation value of the Hamiltonian).
      - paragraph [ref=e13531]:
        - text: The Ehrenfest method is the workhorse of
        - emphasis [ref=e13532]: ab initio
        - text: molecular dynamics with electronic excitations. It captures the
        - emphasis [ref=e13533]: "mean-fiel`d"
        - text: ’ response of the electrons to the nuclear motion — including the non-adiabatic transitions between electronic states that are
        - emphasis [ref=e13534]: not
        - text: accessible to a Born–Oppenheimer trajectory. The Ehrenfest method is
        - emphasis [ref=e13535]: approximate
        - text: ": the nuclear wavepacket is replaced by a"
        - emphasis [ref=e13536]: single
        - text: classical trajectory, and the branching between different adiabatic surfaces (the “surface-hopping” picture) is missed. For problems where the surface- hopping is important — conical intersections, intersystem crossing, charge migration in bio-molecules — the
        - strong [ref=e13537]: fewest- switches surface-hopping
        - text: (FSSH) method of Tully is the standard alternative.
      - blockquote [ref=e13538]:
        - paragraph [ref=e13539]:
          - strong [ref=e13540]: Note.
          - text: The Ehrenfest force on the right-hand side of
          - img [ref=e13542]:
            - link [ref=e13545] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-12-11-ehrenfest"
          - text: is a
          - emphasis [ref=e13553]: "mean-fiel`d"
          - text: ’ force. The forces on
          - emphasis [ref=e13554]: different
          - text: nuclei are correlated through the time-dependent KS wavefunction — the dynamics is
          - emphasis [ref=e13555]: coherent
          - text: in the electronic sector. This is a feature (the correlation between nuclei is captured) and a limitation (the decoherence between different adiabatic surfaces is missing).
