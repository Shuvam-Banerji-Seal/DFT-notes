      - heading "12.11.2 The velocity gauge vs the length gauge" [level=3] [ref=e11587]
      - paragraph [ref=e11588]:
        - text: A uniform external electric field
        - img [ref=e11590]
        - text: couples to the electrons in two equivalent ways. In the
        - strong [ref=e11602]: length gauge
        - text: the coupling is through the
        - emphasis [ref=e11603]: position
        - text: "operator:"
      - img [ref=e11605]:
        - generic [ref=e11609]:
          - img [ref=e11610]
          - img [ref=e11673]
      - paragraph [ref=e11682]:
        - text: The position operator is unbounded (it grows with the system size), and the length gauge is
        - emphasis [ref=e11683]: not
        - text: periodic — it breaks the translation symmetry of a periodic solid. The advantage is that the matrix elements of
        - img [ref=e11685]
        - text: between localised basis functions (Gaussians, numerical atomic orbitals) are easy to compute.
      - paragraph [ref=e11695]:
        - text: In the
        - strong [ref=e11696]: velocity gauge
        - text: the coupling is through the
        - emphasis [ref=e11697]: momentum
        - text: "operator:"
      - img [ref=e11699]:
        - generic [ref=e11703]:
          - img [ref=e11704]
          - img [ref=e11835]
      - paragraph [ref=e11844]:
        - text: The vector potential
        - img [ref=e11846]
        - text: is the time integral of the field. The velocity gauge is
        - emphasis [ref=e11886]: "periodi`c"
        - text: ’ — the operator
        - img [ref=e11888]
        - text: commutes with lattice translations — and is the natural gauge for plane-wave calculations. The disadvantage is that the matrix elements of
        - img [ref=e11907]
        - text: between localised basis functions are not as straightforward as the matrix elements of
        - img [ref=e11918]
        - text: .
      - blockquote [ref=e11928]:
        - paragraph [ref=e11929]:
          - strong [ref=e11930]: Tip.
          - text: For finite systems (molecules, atoms, clusters) the length gauge is preferred — the matrix elements are simple, and the absence of translational symmetry is not a constraint. For periodic systems (solids, surfaces) the velocity gauge is preferred — it preserves the Bloch structure of the KS orbitals, and the time-dependent vector potential can be added to the periodic Hamiltonian as a pure momentum shift. The two gauges give the
          - emphasis [ref=e11931]: same
          - text: absorption spectrum in a complete basis, but the
          - emphasis [ref=e11932]: numerical convergence
          - text: with respect to basis size, time step, and supercell size differs.
