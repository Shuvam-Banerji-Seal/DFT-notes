          - text: and compared with experiment. The accuracy of ALDA TD-DFT is typically
          - img [ref=e1422]
          - text: eV for valence excitations of organic molecules; range-separated hybrids (CAM-B3LYP,
          - img [ref=e1432]
          - text: B97X) push this to
          - img [ref=e1438]
          - text: eV. Rydberg and charge-transfer excitations remain hard for ALDA — they need a long-range-corrected functional or BSE.
        - listitem [ref=e1447]:
          - strong [ref=e1448]: Excited-state geometries.
          - text: Optimising the geometry of an excited state requires the gradient of the excited-state energy with respect to nuclear coordinates. In TD-DFT this is the gradient of the Casida eigenvalue
          - img [ref=e1450]
          - text: with respect to the Hamiltonian; the calculation is more involved than the ground-state gradient of
          - link "chapter 09" [ref=e1458] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-09/
          - text: "but is implemented in production codes. The result gives the equilibrium geometry of the excited state and the adiabatic excitation energy $E_I^\\text{ad} = E(\\mathbf R_I^"
          - emphasis [ref=e1459]: ) - E(\mathbf R_0^
          - text: )$.
        - listitem [ref=e1460]:
          - strong [ref=e1461]: Excited-state dynamics.
          - text: The time-dependent KS equations are propagated
          - emphasis [ref=e1462]: together
          - text: with classical nuclear dynamics; the result is a
          - emphasis [ref=e1463]: trajectory
          - text: in configuration space along which the system decays from the Franck–Condon region to the ground state via non-adiabatic transitions at conical intersections. The Ehrenfest and surface-hopping methods are the two main schemes. The non-adiabatic couplings are computed from the time-dependent KS orbitals.
        - listitem [ref=e1464]:
          - strong [ref=e1465]: Optical response of solids.
          - text: The macroscopic dielectric function
          - img [ref=e1467]
          - text: of a periodic solid is obtained from the Casida equation in the Bloch basis, with the momentum operator
          - img [ref=e1482]
          - text: providing the dipole coupling. The resulting spectrum has the same role in linear optics that the ground- state band structure has for static properties.
        - listitem [ref=e1492]:
          - strong [ref=e1493]: Strong-field and attosecond phenomena.
          - text: Real-time TD-DFT with intense laser pulses (
          - img [ref=e1495]
          - text: W/cm²) describes tunnel ionisation, high-harmonic generation, and charge migration in molecules. These phenomena are highly non-perturbative and the linear-response Casida equation does not apply.
        - listitem [ref=e1510]:
          - strong [ref=e1511]: Electronic stopping and warm dense matter.
          - text: When a swift ion traverses a material, the electronic subsystem is driven far from equilibrium. Real-time TD-DFT in a supercell captures the energy deposition rate and the time-dependent electron distribution.
        - listitem [ref=e1512]:
          - strong [ref=e1513]: Singlet fission and triplet formation.
          - text: These spin-dependent phenomena require
          - strong [ref=e1514]: spin-flip
          - text: TD-DFT, in which the spin-restriction of the ground state is lifted in the linear response. The Casida equation is augmented with spin-flip matrix elements, and the relevant excitations are identified by their
          - img [ref=e1516]
          - text: content.
      - blockquote [ref=e1524]:
        - paragraph [ref=e1525]:
          - strong [ref=e1526]: Note.
          - text: The discussion above is necessarily a
          - emphasis [ref=e1527]: summary
          - text: . Production TD-DFT calculations involve many technicalities — basis-set convergence, the treatment of the ALDA’s missing long-range kernel, the choice of the adiabatic approximation, the evaluation of oscillator strengths in velocity vs. length gauge, the treatment of spin-flip transitions, the handling of conical intersections in non-adiabatic dynamics, and the inclusion of environment effects via explicit solvent or implicit PCM models — that are out of scope here.
