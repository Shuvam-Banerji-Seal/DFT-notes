      - heading "12.11 Real-time TDDFT propagation" [level=2] [ref=e11103]
      - paragraph [ref=e11104]:
        - text: Section 12.8 introduced real-time TD-DFT as the
        - emphasis [ref=e11105]: non-perturbative
        - text: "alternative to the Casida equation. In the present section we go one level deeper: we restate the time-dependent KS equations in the form that is actually solved numerically, we discuss the two"
        - emphasis [ref=e11106]: gauges
        - text: (length and velocity), we survey the
        - emphasis [ref=e11107]: time-propagation algorithms
        - text: in current use, we set the
        - emphasis [ref=e11108]: "time ste`p"
        - text: ", we show how the"
        - emphasis [ref=e11109]: absorption spectrum is extracted from a real-time propagation, we introduce the *Ehrenfest
        - text: extension for coupled electron–ion dynamics, and we close with a worked example on a real system — the absorption spectrum of
        - img [ref=e11111]
        - text: computed by real-time TD-DFT.
      - paragraph [ref=e11121]: The treatment assumes the matrix form of the time-dependent KS equations of section 12.2 and the time-propagation loop of section 12.8.4. We do not assume the reader has implemented a TD-DFT code; we write the equations in the form a code would use.
