      - paragraph [ref=e16710]:
        - text: A
        - emphasis [ref=e16711]: primary
        - text: reference for each paper is the journal publication; the
        - emphasis [ref=e16712]: secondary
        - text: references (Casida 1996 in
        - emphasis [ref=e16713]: Int. J. Quantum Chem.
        - text: ", the Dreizler–Gross 1990 textbook, the 2006"
        - emphasis [ref=e16714]: Time-Dependent Density Functional Theory
        - text: textbook of Marques, Ullrich, Nogueira, Rubio, Burke, and Gross) are useful follow-up reading but are not cited in this section.
      - heading "12.13 What we left out" [level=2] [ref=e16715]
      - paragraph [ref=e16716]:
        - text: The chapter covered the foundations and the most-used methods of TD-DFT, but a complete account would need several more volumes. We list, in order of importance, the topics we did
        - emphasis [ref=e16717]: not
        - text: cover.
      - list [ref=e16718]:
        - listitem [ref=e16719]:
          - strong [ref=e16720]: The full derivation of the Casida equation in a non-orthogonal basis
          - text: ", with the overlap matrix"
          - img [ref=e16722]
          - text: appearing in the eigenvalue problem. We used an orthogonal basis for clarity. The generalisation to non-orthogonal bases is a standard exercise that introduces the
          - img [ref=e16729]
          - text: preconditioning and the
          - img [ref=e16747]
          - text: metric, but the conceptual content is the same.
        - listitem [ref=e16756]:
          - strong [ref=e16757]: The Tamm–Dancoff approximation (TDA)
          - text: in detail. We mentioned it as the diagonal-only limit of the Casida equation, but the systematic comparison of TDA vs. full Casida for charge-transfer and double-excitation problems is its own chapter. The TDA misses the
          - emphasis [ref=e16758]: de-excitation
          - text: block
          - img [ref=e16760]
          - text: and is known to under-estimate the singlet–triplet gap in organic molecules.
        - listitem [ref=e16766]:
          - strong [ref=e16767]: Real-time TD-DFT for non-perturbative dynamics.
          - text: The strong-field regime (HHG, tunnel ionisation, charge migration in bio-molecules) requires the full nonlinear propagation of section 12.8,
          - emphasis [ref=e16768]: not
          - text: the linear-response Casida equation. The numerical methods for this regime (Crank–Nicolson, Magnus expansion, time-dependent basis sets) are specialised, and the gauge (length vs. velocity) treatment becomes important.
        - listitem [ref=e16769]:
          - strong [ref=e16770]: The Bethe–Salpeter equation in full.
          - text: We sketched the BSE in section 12.4.3 to compare with the TD-DFT xc kernels, but the full BSE machinery (Strinati equation, GW + BSE workflow, optical spectrum from the macroscopic dielectric function) is a separate topic. See Onida, Reining, and Rubio (2002) for the standard review.
        - listitem [ref=e16771]:
          - strong [ref=e16772]: Spin-flip TD-DFT
          - text: for diradicals, singlet fission, and triplet excitations. Spin-flip TD-DFT lifts the spin-restriction of the ground state and includes triplet as well as singlet excitations; the formalism is a small modification of the Casida equation but the application domain is distinct.
        - listitem [ref=e16773]:
          - strong [ref=e16774]: Range-separated hybrids and the long-range correction.
          - text: Standard ALDA fails for charge- transfer excitations because the ALDA xc kernel is short-ranged. The fix is the
          - emphasis [ref=e16775]:
            - text: "*range-separated hybri"
            - code [ref=e16776]: d*
          - text: ", in which a fraction of exact exchange is used at long range to recover the"
          - img [ref=e16778]
          - text: tail of the true kernel. CAM-B3LYP and
          - img [ref=e16791]
          - text: B97X are the standard parameterisations. We did not discuss them.
        - listitem [ref=e16796]:
          - strong [ref=e16797]: The Vignale–Rasolt current-dependent xc kernel.
          - text: For time-dependent phenomena in the
          - strong [ref=e16798]: long- wavelength limit
          - text: — i.e. the response to a uniform electric field, which is a
          - emphasis [ref=e16799]: current
          - text: not a density perturbation — the standard
          - img [ref=e16801]
          - text: functional is insufficient. Vignale and Rasolt (1988) showed that the proper functional depends on the
          - strong [ref=e16816]: paramagnetic current density
          - img [ref=e16818]
          - text: as well as on the density. We did not discuss this.
        - listitem [ref=e16838]:
          - strong [ref=e16839]: TD-DFT for molecular junctions and open systems.
          - text: When the system is connected to
          - emphasis [ref=e16840]: external leads
          - text: ", the time-dependent KS system is no longer Hamiltonian, and a Lindblad-like dissipative term must be added. The resulting"
          - strong [ref=e16841]: non-equilibrium Green’s function
          - text: (NEGF) + TD-DFT machinery is the standard tool for molecular electronics and photochemistry at metal surfaces.
        - listitem [ref=e16842]:
          - strong [ref=e16843]: Coupled-cluster and TD-DFT benchmarks.
          - text: The assessment of TD-DFT functionals on large benchmark sets (the GMTKN55 database, the Thiel set, the QUEST database) is its own sub-field. We did not survey the benchmarks.
