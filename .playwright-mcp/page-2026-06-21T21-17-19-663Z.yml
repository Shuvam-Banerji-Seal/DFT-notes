          - img [ref=e7265]
          - text: tail. We do not derive the range- separated hybrids here; the chapter on screened hybrids gives the full treatment.
      - heading "12.9.6 The Tamm–Dancoff approximation (TDA)" [level=3] [ref=e7277]
      - paragraph [ref=e7278]:
        - text: The Tamm–Dancoff approximation (TDA) is the simplest practical approximation to the full Casida equation. It drops the de-excitation block
        - img [ref=e7280]
        - text: ":"
      - img [ref=e7287]:
        - generic [ref=e7291]:
          - img [ref=e7292]
          - img [ref=e7326]
      - paragraph [ref=e7335]:
        - text: Equation
        - img [ref=e7337]:
          - link [ref=e7340] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-12-09-tda"
        - text: is a standard
        - img [ref=e7349]
        - text: "-dimensional Hermitian eigenvalue problem; it is half the dimension of the full Casida equation"
        - img [ref=e7362]:
          - link [ref=e7365] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-12-09-casida"
        - text: and is therefore about a factor of 8 cheaper to diagonalise. The eigenvectors
        - img [ref=e7374]
        - text: are the
        - emphasis [ref=e7383]: single-excitation amplitudes
        - text: ; there is no de-excitation direction.
      - paragraph [ref=e7384]:
        - text: The TDA is a
        - strong [ref=e7385]: decent
        - text: approximation for
        - emphasis [ref=e7386]: high-energy
        - text: excitations (X-ray, core-level) where the resonant channel dominates. It is
        - emphasis [ref=e7387]: less
        - text: accurate for low- energy* excitations of organic molecules, where the de-excitation block shifts the singlet–triplet gap and the position of charge-transfer states by a few tenths of an eV. The TDA systematically over-estimates the singlet excitation energies of conjugated systems by
        - img [ref=e7389]
        - text: –
        - img [ref=e7399]
        - text: eV.
      - blockquote [ref=e7406]:
        - paragraph [ref=e7407]:
          - strong [ref=e7408]: Note.
          - text: The TDA is
          - emphasis [ref=e7409]: not
          - text: the same as the
          - strong [ref=e7410]: Tamm–Dancoff approximation of nuclear physics
          - text: ", which drops the backward-propagating holes in a many-body Green’s function. The TD-DFT TDA is a particular decoupling of the"
          - emphasis [ref=e7411]: resonant
          - text: and anti- resonant* parts of the Casida equation, named after Tamm (1945) and Dancoff (1950) in the context of nuclear physics but used here in a different setting.
      - heading "12.9.7 Diagram — the Casida flow" [level=3] [ref=e7412]
