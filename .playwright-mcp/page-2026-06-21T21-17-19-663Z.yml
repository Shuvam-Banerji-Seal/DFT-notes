      - heading "12.12 Problems" [level=2] [ref=e3572]
      - paragraph [ref=e3573]: Three problems, ranging from a one-line sanity check (easy) to the full linear-response derivation (hard). The detailed answers follow the same step-by-step convention as the rest of the chapter.
      - group [ref=e3574]:
        - generic "▸ Problem 1 (easy) — Thomas–Reiche–Kuhn sum rule" [ref=e3575] [cursor=pointer]
        - text: For a one-electron system, the **oscillator strengths** of all dipole-allowed transitions from the ground state satisfy the **Thomas–Reiche–Kuhn (TRK) sum rule** . For a many-electron system the sum is , the number of electrons. Derive the TRK sum rule from the Casida eigenvectors of , in the case where the xc kernel is frequency-independent and the basis is complete.
      - group [ref=e3576]:
        - generic "▸ Show answer" [ref=e3577] [cursor=pointer]
        - text: "The oscillator strength of excitation is given by . In a complete basis, the dipole operator has matrix elements between *all* pairs of orbitals, and the sum rule follows from the **commutator identity** (atomic units). The double-commutator reduces to in the absence of a magnetic field, and the trace of this commutator in the ground state is the sum of all weighted by : Evaluating the double commutator, and in a field-free Hamiltonian, so the inner commutator is For a Hamiltonian with at most quadratic momentum dependence (no magnetic field) this gives — the sum rule in this form is ? No — the standard form is For a one-electron system ( ) this gives the TRK sum rule . The key identity that the commutator produces the number operator is (in atomic units), so the matrix element in is Multiplying by gives the sum rule. The full details — including the proof that involves a triple commutator and produces the kinetic-energy contribution — are in the standard references (e.g. Fetter & Walecka, chapter 3; or Bethe & Salpeter, chapter 4). The conclusion is with for the one-electron case. In atomic units the rule is *independent* of the level spacing, the basis set, and the xc kernel — it is a *consequence of the commutation relation* alone, and is a powerful sanity check on any computed spectrum."
      - group [ref=e3578]:
        - generic "▸ Problem 2 (medium) — Derive the Casida equation from the Dyson equation" [ref=e3579] [cursor=pointer]
        - text: Starting from the Dyson equation and the Lehmann representation of the KS response function, derive the Casida eigenvalue problem for the excitation energies and the eigenvector equation – for the matrices and . You may assume (a) the kernel is frequency-independent (the adiabatic approximation), and (b) the frequency-dependence of the response function comes only from the KS response .
      - group [ref=e3580]:
        - generic "▸ Show answer" [ref=e3581] [cursor=pointer]
        - text: "**Step 1.** Write the KS response in a compact form. Define the **single-particle transition density** . The Lehmann representation is then with and . **Step 2.** Insert this form into the Dyson equation and assume the kernel is real, symmetric, and frequency-independent. The Dyson equation is **Step 3.** Look for the poles of . Write and rearrange as . The poles of are the zeros of the bracketed operator, , which is *singular* at and well-defined elsewhere. Resumming the geometric series of the Dyson equation around each pole gives the Casida equation. **Step 4.** Define the **resonant part** of as the piece with positive frequencies, . The \"anti-resonant\" part is the negative-frequency piece. In the adiabatic approximation the kernel acts identically on both parts. Resumming the Dyson equation using the two separate denominators gives two coupled equations for the resonant and anti-resonant parts of . For the eigenvalue problem these decouple into with , given by – . The two equations can be combined into the single block-matrix equation . **Step 5.** Add and subtract the two equations of to decouple the excitation and de-excitation directions. The positive- frequency eigenvalue equation becomes This is the form solved in the standard **Tamm–Dancoff + BSE** literature. For the full Casida problem one solves the block eigenvalue problem directly. The result is the Casida equation with and as in – . The first eigenvalues (positive ) are the **excitation energies**; the second eigenvalues (negative ) are the **de-excitation energies** of the dressed system. The oscillator strength is given by ."
      - group [ref=e3582]:
        - generic "▸ Problem 3 (hard) — Linear-response TD-DFT from the Runge–Gross theorem" [ref=e3583] [cursor=pointer]
        - text: "Starting from the Runge–Gross theorem (section 12.3) and the van Leeuwen–Baerends fixed-point formulation, derive the **full linear-response TD-DFT equations** of section 12.5: the response function in terms of , the Dyson equation , the kernel , and the *gauge invariance* of the response function with respect to a spatially-constant shift in the external potential. This is the *most difficult* problem in the chapter. You will need to use the Keldysh action explicitly and to expand it to second order in the density perturbation."
      - group [ref=e3584]:
        - generic "▸ Show answer" [ref=e3585] [cursor=pointer]
        - text: "**Step 1. The Keldysh action, second order.** Expand the Keldysh action in the density perturbation around the ground state. The zeroth-order term is the ground-state energy. The first-order term is the linear coupling of the perturbation to the external potential, . The second-order term is the kernel where is the **Hartree–xc kernel** of the interacting system. The minus sign is conventional. The Hartree part is time-local; the xc part has memory. **Step 2. The KS action, second order.** The auxiliary KS action is a functional of the KS density. It has the same second-order expansion, but the kernel is the **non-interacting** one: , which in the time domain is In frequency space the kernel of the KS action is — i.e. the **inverse** of the KS response function. **Step 3. Equality of the actions.** For a -representable density, the interacting and the KS action give the *same* dynamics when evaluated on the physical density. Therefore the second-order kernels satisfy where is the Hartree kernel and is the xc kernel. **Step 4. The Dyson equation.** Invert the relation. Multiplying on the left by and on the right by and using , we get Solving for , This is the Dyson equation . QED. **Step 5. Gauge invariance.** A spatially-constant shift does not change the density (it is a pure gauge transformation that adds a time-dependent phase to the wavefunction). Therefore the response function must satisfy In the Dyson equation, this implies that the kernel must satisfy the same condition: The Hartree kernel has the right property (the component of is compensated by the uniform-background charge neutrality condition). The xc kernel must be chosen to also have zero component — i.e. for all . The ALDA satisfies this property by construction; the EXX kernel does too; the BSE kernel does *not* — the BSE must be supplemented with the subtraction of the long-range Coulomb to give the proper transverse response. This is the origin of the **long-range correction** in range-separated hybrids and in BSE implementations. The full linear-response TD-DFT machinery is therefore a *consequence* of the Runge–Gross theorem and the Keldysh-action formalism — the Dyson equation is the \"time-dependent KS equation, linearised\". The exact functional remains unknown, but its *linear response* is the only additional unknown that linear-response TD-DFT introduces."
