      - paragraph [ref=e2354]: "The companion script `dft_notes/python_codes/chapter_12/01-two-level-absorption.py’ implements both the Casida calculation and the real-time propagation, and plots the absorption spectrum. The Casida part reduces to the two-line computation"
      - code [ref=e2358]: "# dft_notes/python_codes/chapter_12/01-two-level-absorption.py # Casida eigenvalues for a 2-level system with one occupied # and one virtual orbital. K is the (only) coupling matrix # element of (12.7.1). The excitation energy is the # positive eigenvalue of the 2x2 Casida matrix. import numpy as np def casida_2level(omega_12, K): \"\"\"Excitation energy and oscillator strength of a 2-level system. The Casida matrix has a single (1,1) block. \"\"\" A = omega_12 + K B = K omega_exc = np.sqrt(A * A - B * B) # = sqrt(w12(w12+2K)) # Oscillator strength in the dipole-length gauge is # 2/3 * omega_exc * d^2 (X + Y)^2 with (X, Y) the # Casida eigenvectors of the positive eigenvalue. X = np.sqrt(0.5 * (1.0 + A / omega_exc)) Y = np.sign(B) * np.sqrt(0.5 * (1.0 - A / omega_exc)) f_osc = (2.0 / 3.0) * omega_exc * d12**2 * (X + Y)**2 return omega_exc, f_osc"
