      - heading "12.14.4 The Petersilka–Gossmann–Gross theorem (1996)" [level=3] [ref=e16158]
      - paragraph [ref=e16159]:
        - text: The 1996 Petersilka–Gossmann–Gross (PGG) paper in
        - emphasis [ref=e16160]: Phys. Rev. Lett.
        - strong [ref=e16161]: "76"
