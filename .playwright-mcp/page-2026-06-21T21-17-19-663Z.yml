        - text: perspective, in which the time-dependent xc functional is discussed in the language of
        - strong [ref=e16307]: current-density functional theory
        - text: (CDFT) and the
        - strong [ref=e16308]: adiabatic approximation
        - text: is dissected. The review of the Runge–Gross theorem is on
