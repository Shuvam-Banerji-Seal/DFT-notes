      - code [ref=e2915]: "# dft_notes/python_codes/chapter_12/01-two-level-absorption.py # Real-time propagation of a 2-level system. # The state is (c_1, c_2) in the |1>, |2> basis. def propagate_2level(omega_12, d12, kick, t_max, n_steps, eta): \"\"\"Return times and the dipole moment mu(t) = <Psi|hat d|Psi>.\"\"\" t = np.linspace(0.0, t_max, n_steps + 1) dt = t[1] - t[0] # Initial state: ground state |1>. c = np.array([1.0 + 0.0j, 0.0 + 0.0j], dtype=complex) # Apply the delta-kick at t=0: rotate by exp(-i k d). c = np.cos(kick * d12) * c - 1j np.sin(kick d12) \\ * np.array([0.0, 1.0], dtype=complex) # Time-evolution matrix in the |1>, |2> basis: # H = diag(0, omega_12). After kick, the state is a # superposition; the |1> and |2> amplitudes get an # oscillation at omega_12. mu = np.zeros_like(t) for n, tn in enumerate(t): phase = np.exp(-1j * omega_12 * tn) np.exp(-eta tn) c_t = np.array([c[0], c[1] * phase], dtype=complex) mu[n] = 2.0 * np.real(d12 * np.conj(c_t[0]) c_t[1]) return t, mu"
