        - text: "[Marques and Gross, 2004, p. 432–435] —"
        - emphasis [ref=e16310]: "muc`h"
        - text: ’ more detailed than the original 1984 paper, with the full Keldysh-contour action formulation, the van Leeuwen (1998) reformulation, and the modern “up to
        - img [ref=e16312]
        - text: ” caveat [Marques and Gross, 2004, p. 432–433]. The linear-response formalism is reviewed on
        - strong [ref=e16323]: pp. 437–440
        - text: "[Marques and Gross, 2004, p. 437–440], with the Dyson equation, the Lehmann representation, and the Casida equation in the modern"
        - img [ref=e16325]
        - text: basis on p. 438 [Marques and Gross, 2004, p. 438].
