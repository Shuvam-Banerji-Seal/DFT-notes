      - code [ref=e8903]: "# dft_notes/python_codes/chapter_04/nm-05-davidson.py # Minimal Davidson's method for a sparse symmetric matrix, # eqs. (nm-eig-davidson) and the subspace-Hamiltonian # construction. Tested on a 1-D Laplacian-like matrix. # # Requires: numpy, scipy.sparse, matplotlib (Agg backend). # Run: python nm-05-davidson.py # Output: nm-05-davidson.png (eigenvalue convergence) # # Author: agent:docs-keeper, June 2026 import numpy as np import scipy.sparse as sp import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def davidson(A, k=4, tol=1e-8, max_iter=200, preconditioner=\"diagonal\"): \"\"\"Davidson's method for the lowest k eigenpairs of a symmetric sparse matrix A. Eq. (nm-eig-davidson). Parameters ---------- A : (n, n) scipy.sparse matrix (or dense ndarray). k : number of eigenpairs to compute. tol : convergence tolerance on the residual norm. max_iter : safety bound. preconditioner : 'diagonal' (default) or 'identity'. \"\"\" A = sp.csr_matrix(A) if sp.issparse(A) else np.asarray(A) n = A.shape[0] diag_A = np.asarray(A.diagonal()) if sp.issparse(A) else np.diag(A) rng = np.random.default_rng(0) V = rng.standard_normal((n, k)) V, _ = np.linalg.qr(V) history = [] for it in range(max_iter): H = V.T @ (A @ V) lam, y = np.linalg.eigh(H) X = V @ y R = (A @ X) - X @ np.diag(lam) norms = np.linalg.norm(R, axis=0) history.append(norms.max()) if norms.max() < tol: break T = np.asarray(diag_A) - lam[np.newaxis, :] T = np.where(np.abs(T) < 1e-12, 1e-12, T) Q = R / T V_new = np.column_stack([V, Q]) V, _ = np.linalg.qr(V_new) return lam, X, history def main(): n = 200 diag = 2.0 * np.ones(n) off = -1.0 * np.ones(n - 1) A = sp.diags([off, diag, off], offsets=[-1, 0, 1], format=\"csr\") eigs, vecs, hist = davidson(A, k=4, tol=1e-10, max_iter=200) eigs_ref = np.sort(np.linalg.eigvalsh(A.toarray()))[:4] fig, ax = plt.subplots(figsize=(6, 4)) ax.semilogy(hist, \"o-\", label=r\"$\\max_i \\| r_i \\|$\") ax.set_xlabel(\"Davidson iteration\") ax.set_ylabel(\"max residual norm\") ax.set_title(\"Davidson convergence (1-D Laplacian, n=200)\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-05-davidson.png\", dpi=150) print(f\"Davidson eigs: {eigs}\") print(f\"eigvalsh ref: {eigs_ref}\") print(f\"max |diff|: {np.max(np.abs(eigs - eigs_ref)):.3e}\") if __name__ == \"__main__\": main()"
