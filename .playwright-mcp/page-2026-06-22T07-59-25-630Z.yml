      - 'heading "1.7 A minimal Python implementation: DIIS for a 2x2 Kohn–Sham toy" [level=3] [ref=e2462]'
      - paragraph [ref=e2463]:
        - text: This section presents a complete, runnable implementation of linear mixing and Pulay’s DIIS, applied to a 2x2 Kohn–Sham
        - emphasis [ref=e2464]: toy
        - text: model. The same machinery runs in every quantum-chemistry code, with a bigger basis and a real ERI back-end. The toy problem is borrowed from
        - link "chapter 04" [ref=e2465] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.10.1, where it is the worked example that exposes the convergence behaviour of mixing, DIIS, and Broyden.
      - paragraph [ref=e2466]:
        - text: The example is
        - emphasis [ref=e2467]: not
        - text: the full H₂ STO-3G calculation (those are in
        - link "chapter 03" [ref=e2468] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-03/
        - text: §3.6.7 and
        - link "chapter 06" [ref=e2469] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.4); it is a
        - emphasis [ref=e2470]: toy
        - text: SCF map on a 2x2 Kohn–Sham model that has the same convergence behaviour as the real SCF.
      - code [ref=e2474]: "# dft_notes/python_codes/chapter_04/nm-01-scf-diis-toy.py # Minimal SCF iteration with linear mixing and Pulay's DIIS, # applied to a 2x2 Kohn–Sham toy model. # # This script reproduces the behaviour the user sees in # chapter 04 §4.10.1, but in a self-contained 80-line file. # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-01-scf-diis-toy.py # Output: nm-01-scf-diis-toy.png (convergence plot) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") # headless import matplotlib.pyplot as plt def build_scf_map(A, B): \"\"\"Build the SCF map rho_out = F(rho_in) for a 2x2 Kohn–Sham model. The density is encoded as the diagonal of the 2x2 density matrix P, and F is the three-step KS map: 1. build v_diag = diag(B) * rho (the diagonal effective potential in the basis of eigenvectors of P) 2. solve H(v_diag) C = C eps 3. P_out = 2 C_occ C_occ^T (closed-shell, one occ orbital) The toy model is non-trivial enough that DIIS outperforms linear mixing by an order of magnitude. \"\"\" def F(rho): v = np.diag(B) + 0.3 * rho H = A + np.diag(v) eps, C = np.linalg.eigh(H) P = 2.0 * np.outer(C[:, 0], C[:, 0]) return np.diag(P) return F def linear_mixing(F, rho0, alpha=0.3, max_iter=80, tol=1e-9): \"\"\"Linear-mixing fixed-point iteration, eq. (nm-scf-linear-mix).\"\"\" rho = rho0.copy() history = [np.linalg.norm(F(rho) - rho)] for _ in range(max_iter): rho_new = (1 - alpha) * rho + alpha * F(rho) history.append(np.linalg.norm(rho_new - rho)) if history[-1] < tol: break rho = rho_new return rho, history def diis(F, rho0, m_max=6, alpha=0.3, max_iter=40, tol=1e-9, eps=1e-10): \"\"\"Pulay's DIIS, eqs. (nm-scf-diis-extrap) to (nm-scf-diis-aug). Parameters ---------- F : callable, the SCF map. rho0 : initial density (1-D array, the basis-representation). m_max : maximum DIIS subspace size. alpha : mixing parameter used in the very first iteration (before the history is large enough for DIIS). max_iter : safety bound. tol : convergence on the L2 norm of the residual. eps : diagonal shift in the DIIS metric, the epsilon discussed in §1.5.1. \"\"\" rho = rho0.copy() residuals = [] densities = [] history = [np.linalg.norm(F(rho) - rho)] for it in range(max_iter): rho_new = (1 - alpha) * rho + alpha * F(rho) R_new = F(rho_new) - rho_new residuals.append(R_new) densities.append(rho_new) history.append(np.linalg.norm(R_new)) if history[-1] < tol: break m = len(residuals) if m >= 2: m_use = min(m, m_max) Rs = residuals[-m_use:] ds = densities[-m_use:] B = np.array([[np.dot(Ri, Rj) for Rj in Rs] for Ri in Rs]) B += eps * np.eye(m_use) aug = np.zeros((m_use + 1, m_use + 1)) aug[:m_use, :m_use] = B aug[:m_use, m_use] = 1.0 aug[ m_use, :m_use] = 1.0 rhs = np.zeros(m_use + 1) rhs[-1] = 1.0 try: sol = np.linalg.solve(aug, rhs) c = sol[:m_use] rho_new = sum(ci * di for ci, di in zip(c, ds)) R_new = F(rho_new) - rho_new history.append(np.linalg.norm(R_new)) except np.linalg.LinAlgError: pass rho = rho_new return rho, history def main(): A = np.array([[1.0, 0.5], [0.5, 1.2]]) B = np.array([[0.8, 0.0], [0.0, 0.6]]) F = build_scf_map(A, B) rho0 = np.array([0.5, 0.5]) rho_lin, h_lin = linear_mixing(F, rho0, alpha=0.3, max_iter=80) rho_diis, h_diis = diis(F, rho0, m_max=6, alpha=0.3, max_iter=40) fig, ax = plt.subplots(figsize=(6, 4)) ax.semilogy(h_lin, \"o-\", label=\"linear mixing (alpha=0.3)\") ax.semilogy(h_diis, \"s-\", label=\"Pulay DIIS (m=6)\") ax.set_xlabel(\"SCF iteration\") ax.set_ylabel(r\"$\\| F[\\rho] - \\rho \\|$\") ax.set_title(\"SCF convergence: linear mixing vs DIIS (2x2 toy KS)\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-01-scf-diis-toy.png\", dpi=150) print(f\"linear: {len(h_lin)-1} iters, final |R| = {h_lin[-1]:.2e}\") print(f\"DIIS: {len(h_diis)-1} iters, final |R| = {h_diis[-1]:.2e}\") if __name__ == \"__main__\": main()"
