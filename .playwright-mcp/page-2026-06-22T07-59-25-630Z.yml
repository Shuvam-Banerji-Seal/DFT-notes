      - list [ref=e12300]:
        - listitem [ref=e12301]:
          - strong [ref=e12302]: §1 (SCF).
          - link "Martin" [ref=e12303] [cursor=pointer]:
            - /url: https://www.cambridge.org/9780521534406
          - text: ","
