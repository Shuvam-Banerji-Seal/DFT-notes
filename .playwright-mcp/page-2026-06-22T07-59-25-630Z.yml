        - listitem [ref=e12305]:
          - strong [ref=e12306]: §2 (Optimisation).
          - text: Nocedal & Wright,
          - emphasis [ref=e12307]: Numerical Optimization
          - text: (Springer, 2nd ed., 2006), chapters 6 (BFGS) and 4 (line search / trust region). The de facto standard.
        - listitem [ref=e12308]:
          - strong [ref=e12309]: §3 (BZ integration).
          - link "Martin" [ref=e12310] [cursor=pointer]:
            - /url: https://www.cambridge.org/9780521534406
          - text: ", §8 (Monkhorst–Pack, smearing). The Blöchl (1994) paper is the canonical reference for the corrected tetrahedron method."
        - listitem [ref=e12311]:
          - strong [ref=e12312]: §4 (Diagonalisation).
          - text: Trefethen & Bau,
          - emphasis [ref=e12313]:
            - text: Numerical Linear Algebr
            - code [ref=e12314]: a*' (SIAM, 1997), lectures 24–28. Demmel, *Applied Numerical Linear Algebr
            - text: a
          - text: ’ (SIAM, 1997), chapter 4.
        - listitem [ref=e12315]:
          - strong [ref=e12316]: §5 (Iterative eigensolvers).
          - text: Saad,
          - emphasis [ref=e12317]: Iterative Methods for Sparse Linear Systems
          - text: (SIAM, 2nd ed., 2003), chapter 6. The Knyazev (2001) paper is the canonical reference for LOBPCG.
        - listitem [ref=e12318]:
          - strong [ref=e12319]: §6 (Mixing / preconditioners).
          - text: The Kerker (1981) paper is one page long and well worth reading. For Pulay–Kerker mixing, the VASP manual (
          - link "vasp.at" [ref=e12320] [cursor=pointer]:
            - /url: https://www.vasp.at/wiki/index.php/IMIX
          - text: ) has the practical recipe.
        - listitem [ref=e12321]:
          - strong [ref=e12322]: §7 (Pseudopotentials).
          - link "Martin" [ref=e12323] [cursor=pointer]:
            - /url: https://www.cambridge.org/9780521534406
          - text: ", chapter 11. The original Hamann–Schlüter–Chiang (1979) paper is the canonical reference for norm conservation."
        - listitem [ref=e12324]:
          - strong [ref=e12325]: §8 (Phonons / DFPT).
          - text: Baroni, de Gironcoli, Dal Corso (2001),
          - emphasis [ref=e12326]: Rev. Mod. Phys.
          - strong [ref=e12327]: "73"
          - text: ", 515 — the canonical review of DFPT. The Gonze–Lee (1997) paper introduces the modern “density-functional perturbation theory” formalism."
      - blockquote [ref=e12328]:
        - paragraph [ref=e12329]:
          - strong [ref=e12330]: Disclaimer.
          - text: This appendix is a
          - emphasis [ref=e12331]: reference
          - text: ", not a textbook. Each section is stated as a"
          - emphasis [ref=e12332]: "self-containe`d"
          - text: ’ algorithm; the convergence proofs and the detailed error analyses are in the references above. Cite the original papers, not this appendix, in any publication that uses one of these methods.
