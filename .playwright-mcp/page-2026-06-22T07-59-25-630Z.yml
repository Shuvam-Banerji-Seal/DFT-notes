      - code [ref=e11040]: "# dft_notes/python_codes/chapter_08/nm-07-troullier-martins.py # Minimal Troullier–Martins pseudopotential for hydrogen 1s. # The construction: integrate the all-electron radial # Schrodinger equation, then fit a polynomial p(r) inside # r_c so that the pseudo-wavefunction u_tilde(r) = r*exp(p(r)) # matches the all-electron wavefunction smoothly at r_c and # conserves the norm inside r_c. # # Requires: numpy, scipy, matplotlib (Agg backend). # Run: python nm-07-troullier-martins.py # Output: nm-07-troullier-martins.png (wavefunction + potential) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt from scipy.integrate import odeint def hydrogen_all_electron(E=-0.5, r_max=20.0, n_grid=2000): \"\"\"Integrate the radial Schrodinger equation for H 1s.\"\"\" r = np.linspace(1e-10, r_max, n_grid) def rhs(u, r): u0, u1 = u return [u1, 2 * (-1.0 / r - E) * u0] sol = odeint(rhs, [0.0, 1e-6], r) return r, sol[:, 0] def hydrogen_pseudo_fit(r_c=1.2): \"\"\"Construct the Troullier–Martins pseudo for H 1s.\"\"\" r_ae, u_ae = hydrogen_all_electron() r = np.exp(np.linspace(np.log(1e-4), np.log(20.0), 2000)) u_ae_i = np.interp(r, r_ae, u_ae) rc_idx = np.argmin(np.abs(r - r_c)) rc = r[rc_idx] u_at_rc = u_ae_i[rc_idx] u_prime_at_rc = (u_ae_i[rc_idx + 1] - u_ae_i[rc_idx - 1]) / (r[rc_idx + 1] - r[rc_idx - 1]) coeffs = np.array([0.1, -0.05, 0.01, -0.001, 0.0001]) def residuals(c): a0, a1, a2, a3, a4 = c p_rc = a0 + a1 * rc*'2 + a2 rc*4 + a3 * rc'6 + a4 * rc*`8 u_tilde_rc = rc * np.exp(p_rc) res1 = u_tilde_rc - u_at_rc p_prime_rc = 2 * rc * a1 + 4 r'c**3 a2 + 6 * rc*'5 a3 + 8 * rc*7 a4 res2 = 2 * rc * p_prime_rc - (u_prime_at_rc / u_at_rc) rc + 1 mask = r < r_c norm_ae = np.trapz(u_ae_i[mask]**2, r[mask]) u_tilde = np.where(mask, r * np.exp(a0 + a1 * r**2 + a2 * r**4 + a3 * r**6 + a4 * r**8), u_ae_i) norm_tilde = np.trapz(u_tilde[mask]**2, r[mask]) res3 = norm_tilde - norm_ae return [res1, res2, res3, 0, 0] from scipy.optimize import fsolve sol = fsolve(residuals, coeffs) return r, u_ae_i, sol, r_c def main(): r, u_ae, coeffs, r_c = hydrogen_pseudo_fit(r_c=1.2) a0, a1, a2, a3, a4 = coeffs p = a0 + a1 * r**2 + a2 * r**4 + a3 * r**6 + a4 * r**8 u_tilde = r * np.exp(p) u_tilde = np.where(r < r_c, u_tilde, u_ae) h = r[1] - r[0] u_pp_s = u_tilde u_pp_dd = np.gradient(np.gradient(u_pp_s, h), h) E = -0.5 V_eff = E + 0.5 * u_pp_dd / np.where(np.abs(u_pp_s) < 1e-12, 1e-12, u_pp_s) V_eff = np.where(r < r_c, V_eff, -1.0 / r) V_ps = np.where(r < r_c, V_eff, -1.0 / r) fig, axes = plt.subplots(1, 2, figsize=(11, 4)) axes[0].plot(r, u_ae, \"b-\", label=r\"all-electron $u(r)$\") axes[0].plot(r, u_tilde, \"r--\", label=r\"pseudo $\\tilde u(r)$\") axes[0].axvline(r_c, color=\"grey\", ls=\":\", label=r\"$r_c$\") axes[0].set_xlabel(\"r (bohr)\") axes[0].set_ylabel(\"u(r)\") axes[0].set_title(\"H 1s: all-electron vs pseudo wavefunction\") axes[0].legend() axes[0].set_xlim(0, 6) axes[0].grid(True, alpha=0.3) axes[1].plot(r, -1.0 / r, \"b-\", label=r\"all-electron $-1/r$\") axes[1].plot(r, V_ps, \"r--\", label=r\"pseudopotential $V_{ps}(r)$\") axes[1].axvline(r_c, color=\"grey\", ls=\":\") axes[1].set_xlabel(\"r (bohr)\") axes[1].set_ylabel(\"V(r) (Hartree)\") axes[1].set_title(\"H 1s pseudopotential\") axes[1].legend() axes[1].set_xlim(0, 6) axes[1].set_ylim(-2, 1) axes[1].grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-07-troullier-martins.png\", dpi=150) print(\"wrote nm-07-troullier-martins.png\") if __name__ == \"__main__\": main()"
