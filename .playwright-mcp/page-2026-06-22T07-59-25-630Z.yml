      - code [ref=e7546]: "# dft_notes/python_codes/chapter_03/nm-04-qr-eigensolver.py # Minimal QR algorithm for symmetric matrices, eq. (nm-diag-qr-iter). # Not numerically stable in production (no Wilkinson shift, # no Hessenberg reduction), but the clearest illustration of # the basic iteration. # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-04-qr-eigensolver.py # Output: nm-04-qr-eigensolver.png (eigenvalue convergence) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def qr_eigenvalues(A, max_iter=200, tol=1e-12): \"\"\"The basic QR iteration, eq. (nm-diag-qr-iter). Returns the eigenvalues (the diagonal of the converged matrix) and the convergence history of the off-diagonal Frobenius norm. \"\"\" A = A.copy().astype(float) n = A.shape[0] history = [np.linalg.norm(A - np.diag(np.diag(A)))] for _ in range(max_iter): Q, R = np.linalg.qr(A) A = R @ Q off = np.linalg.norm(A - np.diag(np.diag(A))) history.append(off) if off < tol: break return np.sort(np.diag(A)), history def main(): rng = np.random.default_rng(42) M = rng.standard_normal((4, 4)) A = (M + M.T) / 2.0 A += 5.0 * np.eye(4) eigs_qr, hist = qr_eigenvalues(A, max_iter=200) eigs_ref = np.sort(np.linalg.eigvalsh(A)) fig, ax = plt.subplots(figsize=(6, 4)) ax.semilogy(hist, \"o-\", label=r\"$\\| A - \\mathrm{diag}(A) \\|_F$\") ax.set_xlabel(\"QR iteration\") ax.set_ylabel(\"off-diagonal Frobenius norm\") ax.set_title(\"QR algorithm convergence (4x4 symmetric matrix)\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-04-qr-eigensolver.png\", dpi=150) print(f\"QR eigenvalues : {eigs_qr}\") print(f\"eigvalsh ref : {eigs_ref}\") print(f\"max |diff| : {np.max(np.abs(eigs_qr - eigs_ref)):.3e}\") if __name__ == \"__main__\": main()"
