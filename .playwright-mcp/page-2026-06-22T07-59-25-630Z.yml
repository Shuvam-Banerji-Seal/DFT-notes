      - 'heading "2.8 A minimal Python implementation: BFGS for a 2-D problem" [level=3] [ref=e4740]'
      - paragraph [ref=e4741]:
        - text: The Python listing below implements the
        - strong [ref=e4742]: BFGS update
        - text: of
        - img [ref=e4744]:
          - link [ref=e4747] [cursor=pointer]:
            - /url: "#"
        - text: and tests it on a simple 2-D Rosenbrock-like function. The point is
        - emphasis [ref=e4756]: not
        - text: the test function — the Rosenbrock function is famous because it has a narrow curved valley that fools steepest descent — but the
        - emphasis [ref=e4757]: update
        - text: ": BFGS catches the curvature of the valley in the first few steps and converges in 10–20 iterations vs the hundreds of steepest descent."
      - code [ref=e4761]: "# dft_notes/python_codes/chapter_09/nm-02-bfgs-rosenbrock.py # Minimal BFGS for the 2-D Rosenbrock function, illustrating # the super-linear convergence of quasi-Newton over steepest # descent. No DFT, no SCF — just the optimiser update. # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-02-bfgs-rosenbrock.py # Output: nm-02-bfgs-rosenbrock.png (convergence plot) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def rosenbrock(x): \"\"\"The 2-D Rosenbrock function: f(x, y) = (1-x)^2 + 100 (y - x^2)^2. The minimum is at (1, 1) with f(1, 1) = 0. The valley is narrow and parabolic: a steepest-descent step zig-zags across the valley walls. BFGS catches the curvature and converges super-linearly. \"\"\" return (1 - x[0])**2 + 100.0 * (x[1] - x[0]**2)**2 def rosenbrock_grad(x): \"\"\"The analytic gradient of rosenbrock(x).\"\"\" dfdx = -2 * (1 - x[0]) - 400 * x[0] (x[1] - x[0]**2) dfdy = 200 * (x[1] - x[0]**2) return np.array([dfdx, dfdy]) def steepest_descent(f, grad, x0, alpha=1e-3, max_iter=5000, tol=1e-8): \"\"\"Plain steepest-descent, eq. (nm-opt-sd) with fixed step alpha.\"\"\" x = x0.copy() history = [f(x)] for _ in range(max_iter): g = grad(x) x_new = x - alpha * g history.append(f(x_new)) if np.linalg.norm(g) < tol: break x = x_new return x, history def bfgs(f, grad, x0, B0=None, max_iter=100, tol=1e-8, armijo_c1=1e-4, armijo_rho=0.5): \"\"\"BFGS with a backtracking Armijo line search, eq. (nm-opt-bfgs-update). The implementation is the textbook one (Nocedal & Wright, Algorithm 6.1). At each step we (i) compute the search direction p = -B^{-1} F, (ii) backtrack along p until the Armijo condition is satisfied, (iii) update B with the new s, y pair. \"\"\" n = len(x0) x = x0.copy() B = B0 if B0 is not None else np.eye(n) history = [f(x)] for _ in range(max_iter): g = grad(x) if np.linalg.norm(g) < tol: break p = -np.linalg.solve(B, g) alpha = 1.0 while f(x + alpha * p) > f(x) + armijo_c1 * alpha np.dot(g, p): alpha *= armijo_rho if alpha < 1e-12: break x_new = x + alpha * p s = x_new - x y = grad(x_new) - g if np.dot(y, s) > 0: Bs = B @ s B = B - np.outer(Bs, Bs) / (s @ Bs) + np.outer(y, y) / (y @ s) x = x_new history.append(f(x)) return x, history def main(): x0 = np.array([-1.2, 1.0]) x_sd, h_sd = steepest_descent(rosenbrock, rosenbrock_grad, x0, alpha=1e-3, max_iter=20000) x_bf, h_bf = bfgs(rosenbrock, rosenbrock_grad, x0, max_iter=100) fig, ax = plt.subplots(figsize=(6, 4)) ax.semilogy(h_sd, \"-\", label=f\"steepest descent ({len(h_sd)} iters)\") ax.semilogy(h_bf, \"o-\", label=f\"BFGS ({len(h_bf)} iters)\") ax.set_xlabel(\"iteration\") ax.set_ylabel(r\"$f(\\mathbf x)$\") ax.set_title(\"Rosenbrock 2-D: steepest descent vs BFGS\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-02-bfgs-rosenbrock.png\", dpi=150) print(f\"SD: {len(h_sd)} iters, f = {h_sd[-1]:.3e}\") print(f\"BFGS: {len(h_bf)} iters, f = {h_bf[-1]:.3e}\") if __name__ == \"__main__\": main()"
