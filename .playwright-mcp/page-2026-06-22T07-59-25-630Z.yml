      - 'heading "6.6 A minimal Python implementation: Pulay mixing for a toy map" [level=3] [ref=e9895]'
      - paragraph [ref=e9896]:
        - text: The Python listing below implements
        - strong [ref=e9897]: Pulay’s DIIS
        - text: with the
        - emphasis [ref=e9898]: flat
        - text: inner product of §1, applied to a toy non-linear SCF map. The example illustrates the
        - emphasis [ref=e9899]: mixing
        - text: in density-matrix space, not the full HF/KS machinery.
      - code [ref=e9903]: "# dft_notes/python_codes/chapter_04/nm-06-pulay-toy.py # Minimal Pulay mixing (DIIS) for a toy non-linear SCF map. # Illustrates the DIIS sub-problem of eq. (nm-scf-diis-aug) # and the convergence behaviour on a small problem. # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-06-pulay-toy.py # Output: nm-06-pulay-toy.png (convergence plot) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def diis_step(residuals, densities, m_max=6, eps=1e-10): \"\"\"Solve the DIIS sub-problem, eq. (nm-scf-diis-aug), and return the extrapolated density. Parameters ---------- residuals : list of 1-D arrays, the residuals R_i. densities : list of 1-D arrays, the densities rho_i. m_max : max subspace size. eps : diagonal shift. \"\"\" m = len(residuals) m_use = min(m, m_max) Rs = residuals[-m_use:] ds = densities[-m_use:] B = np.array([[np.dot(Ri, Rj) for Rj in Rs] for Ri in Rs]) B += eps * np.eye(m_use) aug = np.zeros((m_use + 1, m_use + 1)) aug[:m_use, :m_use] = B aug[:m_use, m_use] = 1.0 aug[ m_use, :m_use] = 1.0 rhs = np.zeros(m_use + 1) rhs[-1] = 1.0 sol = np.linalg.solve(aug, rhs) c = sol[:m_use] return sum(ci * di for ci, di in zip(c, ds)) def toy_scf_map(P): \"\"\"A toy SCF map on the 2x2 H2 density matrix. P is the (1, 1) and (2, 2) diagonal of the density matrix, encoded as a 1-D array. The SCF map is a non-trivial non-linear map that has a unique fixed point. \"\"\" P = np.asarray(P) out = np.zeros_like(P) out[0] = 0.6 + 0.2 * np.tanh(2.0 * (P[0] - 0.5)) + 0.1 P[1] out[1] = 0.5 + 0.2 * np.tanh(2.0 * (P[1] - 0.4)) + 0.1 P[0] return out def linear_mixing(F, P0, alpha=0.3, max_iter=80, tol=1e-9): P = P0.copy() history = [np.linalg.norm(F(P) - P)] for _ in range(max_iter): P_new = (1 - alpha) * P + alpha * F(P) history.append(np.linalg.norm(P_new - P)) if history[-1] < tol: break P = P_new return P, history def pulay_mixing(F, P0, m_max=6, alpha=0.3, max_iter=40, tol=1e-9, eps=1e-10): P = P0.copy() residuals, densities, history = [], [], [np.linalg.norm(F(P) - P)] for it in range(max_iter): P_new = (1 - alpha) * P + alpha * F(P) R_new = F(P_new) - P_new residuals.append(R_new) densities.append(P_new) history.append(np.linalg.norm(R_new)) if history[-1] < tol: break if len(residuals) >= 2: P_new = diis_step(residuals, densities, m_max=m_max, eps=eps) R_new = F(P_new) - P_new history.append(np.linalg.norm(R_new)) P = P_new return P, history def main(): P0 = np.array([0.5, 0.5]) P_lin, h_lin = linear_mixing(toy_scf_map, P0, alpha=0.3, max_iter=80) P_pul, h_pul = pulay_mixing(toy_scf_map, P0, m_max=6, alpha=0.3, max_iter=40) fig, ax = plt.subplots(figsize=(6, 4)) ax.semilogy(h_lin, \"o-\", label=f\"linear (alpha=0.3)\") ax.semilogy(h_pul, \"s-\", label=f\"Pulay DIIS (m=6)\") ax.set_xlabel(\"SCF iteration\") ax.set_ylabel(r\"$\\| F[\\rho] - \\rho \\|$\") ax.set_title(\"Pulay mixing convergence (toy non-linear map)\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-06-pulay-toy.png\", dpi=150) print(f\"linear: {len(h_lin)-1} iters, |R| = {h_lin[-1]:.2e}\") print(f\"Pulay: {len(h_pul)-1} iters, |R| = {h_pul[-1]:.2e}\") if __name__ == \"__main__\": main()"
