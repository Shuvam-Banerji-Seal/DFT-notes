      - 'heading "3.6 A minimal Python implementation: Monkhorst–Pack grid" [level=3] [ref=e6520]'
      - paragraph [ref=e6521]: The listing below generates a Monkhorst–Pack mesh in 3-D, applies the point-group symmetry reduction, and produces a plot of the BZ and the IBZ points for a simple cubic lattice.
      - code [ref=e6525]: "# dft_notes/python_codes/chapter_07/nm-03-monkhorst-pack.py # Minimal Monkhorst–Pack mesh generator with symmetry # reduction for the simple cubic lattice. # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-03-monkhorst-pack.py # Output: nm-03-monkhorst-pack.png (BZ + IBZ plot) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def monkhorst_pack(n1, n2, n3, shift=(0.0, 0.0, 0.0)): \"\"\"Generate a Monkhorst–Pack mesh of (n1 x n2 x n3) points, eq. (nm-bz-mp). The default is the centred mesh; pass shift = (0.5, 0.5, 0.5) for a shifted mesh. Returns the mesh as an (N, 3) array in units of 2*pi/a. \"\"\" out = [] for m1 in range(n1): for m2 in range(n2): for m3 in range(n3): kx = (2 * m1 - n1 + 1) / (2 * n1) + shift[0] / n1 ky = (2 * m2 - n2 + 1) / (2 * n2) + shift[1] / n2 kz = (2 * m3 - n3 + 1) / (2 * n3) + shift[2] / n3 out.append([kx, ky, kz]) return np.array(out) def reduce_to_ibz_simple_cubic(klist, atol=1e-9): \"\"\"Reduce a k-list to the irreducible BZ of the simple cubic point group Oh (48 operations). Each k is mapped to its image under every operation, and a canonical representative is chosen. \"\"\" mats = [] for sx in (-1, 1): for sy in (-1, 1): for sz in (-1, 1): for p in [(0, 1, 2), (0, 2, 1), (1, 0, 2), (1, 2, 0), (2, 0, 1), (2, 1, 0)]: M = np.zeros((3, 3)) M[0, p[0]] = sx M[1, p[1]] = sy M[2, p[2]] = sz mats.append(M) seen = set() ibz = [] for k in klist: images = [M @ k for M in mats] canon = min(images, key=lambda v: tuple(np.round(v, 8))) key = tuple(np.round(canon, 8)) if key not in seen: seen.add(key) ibz.append(canon) return np.array(ibz) def main(): n = 4 mesh = monkhorst_pack(n, n, n) ibz = reduce_to_ibz_simple_cubic(mesh) print(f\"4x4x4 MP mesh: {len(mesh)} points total, {len(ibz)} in IBZ\") fig, ax = plt.subplots(figsize=(6, 6)) cube = np.array([[-0.5, -0.5, -0.5], [0.5, -0.5, -0.5], [0.5, 0.5, -0.5], [-0.5, 0.5, -0.5], [-0.5, -0.5, 0.5], [0.5, -0.5, 0.5], [0.5, 0.5, 0.5], [-0.5, 0.5, 0.5]]) for i, j in [(0, 1), (1, 2), (2, 3), (3, 0), (4, 5), (5, 6), (6, 7), (7, 4), (0, 4), (1, 5), (2, 6), (3, 7)]: ax.plot([cube[i, 0], cube[j, 0]], [cube[i, 1], cube[j, 1]], \"k-\", lw=0.5) ax.scatter(mesh[:, 0], mesh[:, 1], s=20, c=\"lightblue\", label=f\"all k ({len(mesh)})\", zorder=2) ax.scatter(ibz[:, 0], ibz[:, 1], s=40, c=\"red\", marker=\"x\", label=f\"IBZ ({len(ibz)})\", zorder=3) ax.scatter([0], [0], s=80, c=\"black\", marker=\"*\", label=\"Gamma\", zorder=4) ax.set_xlim(-0.55, 0.55) ax.set_ylim(-0.55, 0.55) ax.set_aspect(\"equal\") ax.set_xlabel(r\"$k_x / (2\\pi/a)$\") ax.set_ylabel(r\"$k_y / (2\\pi/a)$\") ax.set_title(f\"Monkhorst–Pack {n}x{n}x{n} mesh (simple cubic)\") ax.legend(loc=\"upper right\") ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-03-monkhorst-pack.png\", dpi=150) print(\"wrote nm-03-monkhorst-pack.png\") if __name__ == \"__main__\": main()"
