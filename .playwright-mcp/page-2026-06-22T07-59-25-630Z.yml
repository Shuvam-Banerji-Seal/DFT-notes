        - text: ; the
        - strong [ref=e11092]: PAW
        - text: method (Blöchl, 1994) is the modern generalisation that splits the wavefunction into a smooth part (plane waves) and an atomic-like augmentation inside the augmentation sphere. PAW is the default in VASP, GPAW, and ABINIT; ultrasoft is the default in VASP for heavy elements.
      - separator [ref=e11093]
      - heading "8. Phonon and DFPT machinery" [level=2] [ref=e11094]
      - paragraph [ref=e11095]:
        - text: The
        - strong [ref=e11096]: frozen-phonon
        - text: supercell and the
        - strong [ref=e11097]: density-functional perturbation theory
        - text: (DFPT) are the two pillars of phonon calculations in DFT. This section collects the algorithms.
      - heading "8.1 The frozen-phonon supercell" [level=3] [ref=e11098]
      - paragraph [ref=e11099]:
        - text: The
        - strong [ref=e11100]: frozen-phonon
        - text: approach computes the phonon frequencies by
        - emphasis [ref=e11101]: finite difference
        - text: on a supercell. Displace atom
        - img [ref=e11103]
        - text: by
        - img [ref=e11109]
        - text: in direction
        - img [ref=e11119]
        - text: ", recompute the total energy"
        - img [ref=e11125]
        - text: ", and fit"
      - img [ref=e11138]
      - paragraph [ref=e11238]:
        - text: to a quadratic. The second-derivative matrix
        - img [ref=e11240]
        - text: is the
        - emphasis [ref=e11256]: force-constant matrix
        - text: ; the phonon dispersion is the eigenvalue spectrum of the dynamical matrix
      - img [ref=e11258]
      - paragraph [ref=e11347]:
        - text: The supercell must be large enough that the atoms in adjacent cells are not interacting (the force constants decay exponentially in insulators, as
        - img [ref=e11349]
        - text: in metals). A
        - img [ref=e11363]
        - text: supercell of a 2-atom primitive cell is
        - emphasis [ref=e11376]: not
        - text: enough for a converged phonon dispersion at small
        - img [ref=e11378]
        - text: ; a
        - img [ref=e11385]
        - text: is usually the minimum.
      - heading "8.2 The dynamical matrix" [level=3] [ref=e11398]
      - paragraph [ref=e11399]:
        - text: The
        - strong [ref=e11400]: dynamical matrix
        - text: "is the Fourier transform of the real-space force constants:"
      - img [ref=e11402]
      - paragraph [ref=e11491]:
        - text: The
        - strong [ref=e11492]: acoustic sum rule
        - text: (ASR) is the constraint
      - img [ref=e11494]
      - paragraph [ref=e11532]:
        - text: which guarantees that a uniform translation of the crystal produces no restoring force. The ASR is broken in any supercell calculation (the finite supercell is not a real crystal) and must be
        - emphasis [ref=e11533]: "enforce`d"
        - text: ’ by hand. The standard enforcement is the
        - strong [ref=e11534]: acoustic-sum-rule projection
        - text: "of Gonze et al. (1994): after computing"
        - img [ref=e11536]
        - text: ", replace it by"
      - img [ref=e11549]
      - paragraph [ref=e11680]:
        - text: with “ref” a
        - emphasis [ref=e11681]: reference atom
        - text: (typically the centre of mass). The projection restores the ASR at every
        - img [ref=e11683]
        - text: .
      - heading "8.3 Fourier interpolation" [level=3] [ref=e11689]
      - paragraph [ref=e11690]:
        - text: The force-constants
        - img [ref=e11692]
        - text: are
        - emphasis [ref=e11715]: real-space
        - text: objects defined on the supercell. A phonon dispersion* requires them on a fine
        - img [ref=e11717]
        - text: "-mesh. The"
        - strong [ref=e11723]: Fourier interpolation
        - text: "of §8.2 is the natural bridge:"
      - img [ref=e11725]
      - paragraph [ref=e11805]:
        - text: In practice the force-constants are computed on a coarse
        - img [ref=e11807]
        - text: "-mesh (or, equivalently, on a coarse supercell) and interpolated to a fine mesh for the dispersion plot. The interpolation is exact at the computed"
        - img [ref=e11814]
        - text: ’s and
        - emphasis [ref=e11820]: exact
        - text: in between only if the force-constants decay fast enough — in practice the interpolation has a
        - img [ref=e11822]
        - text: –
        - img [ref=e11830]
        - text: error at the un-computed
        - img [ref=e11839]
        - text: ’s, dominated by the
        - strong [ref=e11845]: long-range dipole-dipole interaction
        - text: in ionic crystals (LO-TO splitting at
        - img [ref=e11847]
        - text: ).
      - paragraph [ref=e11852]:
        - text: The fix is to split the force constants into a
        - emphasis [ref=e11853]: short-range
        - text: part (handled by Fourier interpolation) and a
        - emphasis [ref=e11854]: long-range
        - text: analytical part (the dipole-dipole sum). The
        - strong [ref=e11855]: Gonze–Lee–Mauro
        - text: approach is the standard production recipe.
      - heading "8.4 DFPT (linear response, the theorem)" [level=3] [ref=e11856]:
        - text: 8.4 DFPT (linear response, the
        - img [ref=e11858]
        - text: theorem)
      - paragraph [ref=e11869]:
        - text: The
        - strong [ref=e11870]: density-functional perturbation theory
        - text: (DFPT) computes the phonon dispersion by
        - emphasis [ref=e11871]: linear response
        - text: . The key insight is the
        - strong [ref=e11872]:
          - img [ref=e11874]
          - text: theorem
        - text: ": the energy to order"
        - img [ref=e11886]
        - text: in a perturbation can be computed from the wavefunctions to order
        - img [ref=e11898]
        - text: . For phonons (
        - img [ref=e11904]
        - text: ), the
        - emphasis [ref=e11913]: force constants
        - text: (the second derivative of the energy) can be computed from the
        - emphasis [ref=e11914]: first-order
        - text: wavefunctions alone — no second-order wavefunctions are needed.
      - paragraph [ref=e11915]:
        - text: The DFPT equation is the
        - strong [ref=e11916]: Sternheimer equation
      - img [ref=e11918]
      - paragraph [ref=e12000]:
        - text: where
        - img [ref=e12002]
        - text: is the projector onto the
        - emphasis [ref=e12050]: conduction
        - text: subspace (the occupied states are projected out to avoid the zero-frequency divergence). The first-order Hamiltonian
        - img [ref=e12052]
        - text: contains the derivative of the KS potential with respect to the perturbation.
      - paragraph [ref=e12069]:
        - text: DFPT is the production method for phonon dispersions (Quantum ESPRESSO, ABINIT, CASTEP). The cost is
        - img [ref=e12071]
        - text: for a single perturbation — formidable, but only a
        - emphasis [ref=e12092]: small constant
        - text: (a few) such perturbations are needed per
        - img [ref=e12094]
        - text: (one per atomic displacement direction).
      - 'heading "8.5 A minimal Python implementation: frozen-phonon dispersion for a 1-D chain" [level=3] [ref=e12100]'
      - paragraph [ref=e12101]:
        - text: The Python listing below implements a
        - strong [ref=e12102]: frozen-phonon calculation
        - text: "for a 1-D diatomic chain. The model is the textbook example: a 1-D chain of alternating masses"
        - img [ref=e12104]
        - text: and
        - img [ref=e12113]
        - text: with spring constant
        - img [ref=e12122]
        - text: . The analytical dispersion relation is
      - img [ref=e12128]
      - paragraph [ref=e12248]:
        - text: with
        - img [ref=e12250]
        - text: the unit-cell length. The frozen-phonon code extracts the two force constants by finite difference and reconstructs the dispersion.
      - code [ref=e12258]: "# dft_notes/python_codes/chapter_10/nm-08-frozen-phonon-1d.py # Minimal frozen-phonon calculation for a 1-D diatomic chain. # Compares the force-constant fit to the analytical # dispersion relation of eq. (nm-ph-chain-disp). # # Requires: numpy, matplotlib (Agg backend). # Run: python nm-08-frozen-phonon-1d.py # Output: nm-08-frozen-phonon-1d.png (dispersion plot) # # Author: agent:docs-keeper, June 2026 import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt def energy_of_displacement(M1, M2, K, a, u1, u2): \"\"\"Total energy of a 1-D diatomic chain with displacements u1 (atom 1) and u2 (atom 2) of the central cell, all other cells at rest. \"\"\" # each cell contributes 0.5 * K * (u_{i+1} - u_i)^2 to the energy # with u_{i+1} = u_{i-1} = 0 (all other cells at rest) # so the energy is 0.5 * K * (u1 - 0)^2 + 0.5 K (0 - u2)^2 # = 0.5 * K * (u1^2 + u2^2) (the central cell is special) return 0.5 * K * (u1**2 + u2**2) def force_constants(M1, M2, K, a, eps=0.01): \"\"\"Compute the 2x2 force-constant matrix Phi_{IJ} for the diatomic unit cell by finite difference of the energy. \"\"\" Phi = np.zeros((2, 2)) # diagonal: Phi_{ii} = d^2 E / du_i^2 for i in range(2): E_plus = energy_of_displacement(M1, M2, K, a, eps if i == 0 else 0.0, eps if i == 1 else 0.0) E_minus = energy_of_displacement(M1, M2, K, a, -eps if i == 0 else 0.0, -eps if i == 1 else 0.0) E_0 = energy_of_displacement(M1, M2, K, a, 0.0, 0.0) Phi[i, i] = (E_plus + E_minus - 2 * E_0) / eps**2 # off-diagonal: Phi_{01} = d^2 E / (du_0 du_1) = K (the cross term) E_pp = energy_of_displacement(M1, M2, K, a, eps, eps) E_pm = energy_of_displacement(M1, M2, K, a, eps, -eps) E_mp = energy_of_displacement(M1, M2, K, a, -eps, eps) E_mm = energy_of_displacement(M1, M2, K, a, -eps, -eps) Phi[0, 1] = (E_pp + E_mm - E_pm - E_mp) / (4 * eps**2) Phi[1, 0] = Phi[0, 1] return Phi def analytical_dispersion(M1, M2, K, a, nq=200): \"\"\"The analytical dispersion relation, eq. (nm-ph-chain-disp).\"\"\" q = np.linspace(0, np.pi / a, nq) mu = 1.0 / M1 + 1.0 / M2 delta = np.sqrt(mu**2 - 4.0 * np.sin(q * a / 2)**2 / (M1 * M2)) omega_plus = np.sqrt(K * (mu + delta)) omega_minus = np.sqrt(K * (mu - delta)) return q, omega_minus, omega_plus def frozen_phonon_dispersion(M1, M2, K, a, nq=200): \"\"\"Build the dynamical matrix D(q) and diagonalise it.\"\"\" Phi = force_constants(M1, M2, K, a) q_arr = np.linspace(0, np.pi / a, nq) bands = np.zeros((2, nq)) for iq, q in enumerate(q_arr): D = np.zeros((2, 2)) for I in range(2): for J in range(2): phase = 1.0 if I == J else np.exp(-1j * q * a (J - I)) D[I, J] = Phi[I, J] / np.sqrt(M1 if I == 0 else M2) / np.sqrt(M1 if J == 0 else M2) * phase D = (D + D.conj().T) / 2 # symmetrise e = np.linalg.eigvalsh(D) bands[:, iq] = np.sqrt(np.abs(e)) return q_arr, bands def main(): M1, M2, K, a = 1.0, 3.0, 1.0, 1.0 q_an, om_an_lo, om_an_hi = analytical_dispersion(M1, M2, K, a) q_fp, bands = frozen_phonon_dispersion(M1, M2, K, a) fig, ax = plt.subplots(figsize=(6, 4)) ax.plot(q_an, om_an_lo, \"b-\", label=\"analytical (acoustic)\") ax.plot(q_an, om_an_hi, \"r-\", label=\"analytical (optical)\") ax.plot(q_fp, bands[0], \"b--o\", label=\"frozen-phonon (acoustic)\", ms=3) ax.plot(q_fp, bands[1], \"r--s\", label=\"frozen-phonon (optical)\", ms=3) ax.set_xlabel(r\"wavevector $q$ (rad / a)\") ax.set_ylabel(r\"frequency $\\omega$ (sqrt(K / M))\") ax.set_title(\"1-D diatomic chain: analytical vs frozen-phonon dispersion\") ax.legend() ax.grid(True, alpha=0.3) plt.tight_layout() plt.savefig(\"nm-08-frozen-phonon-1d.png\", dpi=150) print(\"wrote nm-08-frozen-phonon-1d.png\") if __name__ == \"__main__\": main()"
      - paragraph [ref=e12259]:
        - text: "The output is a two-band dispersion plot: the analytical acoustic and optical branches as solid lines, the frozen-phonon reconstruction as markers. The agreement is at the 0.1% level (the finite-difference step is"
        - img [ref=e12261]
        - text: in the example). A production calculation would use a smaller
        - img [ref=e12274]
        - text: and a finite-difference of
        - emphasis [ref=e12279]: "thir`d"
        - text: ’ order to reduce the error.
      - blockquote [ref=e12280]:
        - paragraph [ref=e12281]:
          - strong [ref=e12282]: Cross-reference.
          - text: The full phonon machinery is in
          - link "chapter 10" [ref=e12283] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: (phonons, frozen-phonon supercells, DFPT,
          - img [ref=e12285]
          - text: "theorem). The Python file `dft_notes/python_codes/chapter_10/01-diatomic-chain.py’ is the production version with a more realistic model (long-range interactions, Born–von Kármán boundary conditions)."
