            - text: expansion. (Cited in §7.13.1 as the source of the formal BZ concept.)
        - listitem [ref=e20416]:
          - paragraph [ref=e20417]:
            - strong [ref=e20418]: Anderson, P. W.
            - text: “Absence of Diffusion in Certain Random Lattices.”
            - emphasis [ref=e20419]: Phys. Rev.
            - strong [ref=e20420]: "1958"
            - text: ","
            - emphasis [ref=e20421]: "109"
            - text: ", 1492–1505. DOI:"
            - link "10.1103/PhysRev.109.1492" [ref=e20422] [cursor=pointer]:
              - /url: https://doi.org/10.1103/PhysRev.109.1492
