      - 'heading "7.13 The original Bloch theorem and textbook derivations: a literature deep-dive" [level=2] [ref=e16518]'
      - paragraph [ref=e16519]:
        - text: The proof of Bloch’s theorem in §7.3 above is one of several. The result is so central to solid-state physics that every solid-state textbook has its own version, and the
        - emphasis [ref=e16520]: original
        - text: 1929 paper is well worth a careful read. This section is a heavily-cited, page-by-page walk through the original paper, the standard textbook derivations, the BSW symmetry classification of the cubic Brillouin zone, and the limitations of the original statement. Every inline citation gives the page number of the original source so the reader can verify the claim against the primary literature.
      - heading "7.13.1 The original Bloch theorem (1929)" [level=3] [ref=e16521]
      - paragraph [ref=e16522]:
        - text: The paper is Felix Bloch’s
        - emphasis [ref=e16523]: Über die Quantenmechanik der Elektronen in Kristallgittern
        - text: ","
        - emphasis [ref=e16524]: Z. Physik
        - strong [ref=e16525]: "52"
