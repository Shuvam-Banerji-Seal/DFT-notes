      - heading "7.10.3 The 230 space groups" [level=3] [ref=e10179]
      - paragraph [ref=e10180]:
        - text: Given a Bravais lattice, a basis set, and a point group, the space group is determined by the
        - strong [ref=e10181]: Wyckoff positions
        - text: of the basis atoms. Counting all distinct possibilities gives exactly
        - strong [ref=e10182]: "230"
        - text: space groups in 3-D — a theorem proved independently by Schoenflies (1891), Fedorov (1891), and Barlow (1894), and tabulated in the
        - emphasis [ref=e10183]: International Tables for Crystallography
        - text: (vol. A, 6th ed., 2016). Each entry includes the space-group number (1–230), Hermann–Mauguin and Schoenflies symbols, the Wyckoff positions, the generators, and the maximal subgroups.
