      - paragraph [ref=e9440]: The relevant code is reproduced below; the script is the source of truth.
      - code [ref=e9444]: "# dft_notes/python_codes/chapter_07/01-free-electron-bands.py import os import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt # --- Parameters -------------------------------------------------------- A = 5.0 # lattice constant, bohr V0 = -0.5 # potential depth, Hartree N_PW = 21 # number of plane waves N_K = 100 # number of k-points in the 1st BZ B = 2 * np.pi / A # reciprocal lattice constant # --- Reciprocal lattice ------------------------------------------------ m_vals = np.arange(-(N_PW // 2), N_PW // 2 + 1) # -10..+10 G_vals = m_vals * B # 21 G values # --- k-mesh in the 1st Brillouin zone ---------------------------------- k_vals = np.linspace(-np.pi / A, np.pi / A, N_K, endpoint=False) # --- Fourier coefficients of V(x) -------------------------------------- # V(x) = -0.5 cos(2pi x / a) ==> V(G=+/- 2pi/a) = -0.25 V_GG = np.zeros((N_PW, N_PW)) for i in range(N_PW): for j in range(N_PW): d = m_vals[i] - m_vals[j] if d == 1: V_GG[i, j] = -0.25 # G_i = G_j + 2pi/a elif d == -1: V_GG[i, j] = -0.25 # G_i = G_j - 2pi/a # else V_GG[i, j] = 0 (already) # --- Diagonalise at every k-point -------------------------------------- bands = np.zeros((N_K, N_PW)) for ik, k in enumerate(k_vals): H_kin = 0.5 * (k + G_vals) ** 2 # diagonal kinetic H = np.diag(H_kin) + V_GG bands[ik, :] = np.linalg.eigvalsh(H) # Hermitian -> real evals # --- Plot the first 4 bands ------------------------------------------- fig, ax = plt.subplots(figsize=(8, 6)) palette = [\"#cc785c\", \"#e8a55a\", \"#5db8a6\", \"#a9583e\"] for n in range(4): ax.plot(k_vals * A / np.pi, bands[:, n], color=palette[n], lw=2.0, label=rf\"band {n + 1}\") # Reference free-electron parabolas for m in (0, -1, 1, -2): ax.plot(k_vals * A / np.pi, 0.5 * (k_vals + m * B) ** 2, color=\"#a09d96\", lw=0.7, alpha=0.4) ax.axvline(-1.0, color=\"#3d3d3a\", lw=0.8, ls=\"--\", alpha=0.5) ax.axvline(+1.0, color=\"#3d3d3a\", lw=0.8, ls=\"--\", alpha=0.5) ax.set_xlabel(r\"$k a / \\pi$\") ax.set_ylabel(r\"$\\varepsilon_n(k)$ (Hartree)\") ax.set_title(\"1-D band structure, $a = 5$ bohr, $V(x) = -0.5 \\cos(2\\pi x/a)$\") ax.legend(frameon=False) ax.grid(alpha=0.3) fig.tight_layout() # --- Save the plot ----------------------------------------------------- here = os.path.dirname(os.path.abspath(__file__)) plots_dir = os.path.join(here, \"plots\") os.makedirs(plots_dir, exist_ok=True) out = os.path.join(plots_dir, \"01-free-electron-bands.png\") fig.savefig(out, dpi=150, bbox_inches=\"tight\") print(f\"Wrote {out}\")"
