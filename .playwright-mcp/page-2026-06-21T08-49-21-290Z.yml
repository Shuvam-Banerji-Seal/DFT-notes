      - blockquote [ref=e20432]:
        - paragraph [ref=e20433]:
          - strong [ref=e20434]: Cross-references.
          - text: The Bloch theorem is also proved in chapter 06 §6.7 (in the plane-wave context) and the Brillouin zone is constructed geometrically in
          - link "chapter 10" [ref=e20435] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: §10.2 (“Crystallography and reciprocal space”). The BSW labels are used in
          - link "chapter 11" [ref=e20436] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: §11.6 (“Band representations and topological indices”). The limitations of §7.13.6 are covered in detail in
          - link "chapter 12" [ref=e20437] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: (many-body physics) and
          - link "chapter 13" [ref=e20438] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: (disorder and correlated materials).
      - heading "7.14 What we left out" [level=2] [ref=e20439]
      - paragraph [ref=e20440]:
        - text: The chapter has been a self-contained introduction to Bloch’s theorem, the Brillouin zone, plane-wave basis sets, and k-point sampling. A non-exhaustive list of the topics we have
        - emphasis [ref=e20441]: not
        - text: "covered:"
      - list [ref=e20442]:
        - listitem [ref=e20443]:
          - strong [ref=e20444]: Spin–orbit coupling.
          - text: The Hamiltonian
          - img [ref=e20446]:
            - link [ref=e20449] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-07-hamiltonian"
          - text: is spin-free. For solids with heavy elements (5
          - emphasis [ref=e20456]: d
          - text: ", 6"
          - emphasis [ref=e20457]: p
          - text: ", f-electron systems), the spin–orbit term"
          - img [ref=e20459]
          - text: has to be added; the Bloch factor
          - img [ref=e20499]
          - text: becomes a 2 × 2 spinor matrix. This is essential for the correct band topology of topological insulators and transition-metal dichalcogenides.
        - listitem [ref=e20516]:
          - strong [ref=e20517]: Non-collinear magnetism and spin textures.
          - text: The Bloch theorem generalises to spinor wavefunctions; the “bands” become vector-valued and can carry non-trivial spin textures (skyrmions, Rashba splitting, …).
        - listitem [ref=e20518]:
          - strong [ref=e20519]: Symmetry-adapted k-points and time-reversal.
          - text: The Monkhorst–Pack mesh can be folded onto the irreducible BZ using the crystal point-group symmetries, giving the “irreducible k-point” set. Time-reversal symmetry
          - img [ref=e20521]
          - text: at
          - img [ref=e20535]
          - text: (for spinless, time-reversal-invariant systems) can be used to halve the mesh again.
        - listitem [ref=e20564]:
          - strong [ref=e20565]: Projector-augmented waves (PAW), ultrasoft pseudopotentials.
          - text: The plane-wave basis is great for valence electrons but hopeless for the tightly-bound core. The PAW and ultrasoft-pseudopotential methods of
          - link "chapter 08" [ref=e20566] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: augment the plane-wave basis near the nuclei with localised functions, and reconstitute the all-electron wavefunction in the augmentation region. This is what every production plane-wave code actually uses.
        - listitem [ref=e20567]:
          - strong [ref=e20568]: Linear-response / DFPT.
          - text: Frozen-phonon and density-functional perturbation theory (
          - link "chapter 10" [ref=e20569] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: ) compute phonons and electron–phonon coupling from the linear response of the periodic ground state. The same plane-wave machinery is used, but the perturbation is itself a Bloch wave with crystal momentum
          - img [ref=e20571]
          - text: .
        - listitem [ref=e20577]:
          - strong [ref=e20578]: Wannier functions, Berry phase, and modern theory of polarisation.
          - text: The Bloch functions are not the only complete basis; the Wannier functions obtained by Fourier-transforming the Bloch waves are localised in real space and are the natural basis for tight-binding models. Berry-phase quantities (polarisation, orbital magnetisation, Chern number) are essential for
          - link "chapter 11" [ref=e20579] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: .
        - listitem [ref=e20580]:
          - strong [ref=e20581]:
            - text: Many-body perturbation theory (
            - img [ref=e20583]
            - text: ", BSE)."
          - text: The Kohn–Sham eigenvalues of chapter 04 are not quasiparticle energies.
          - img [ref=e20591]
          - text: corrections and the Bethe–Salpeter equation are the standard ways to compute band gaps and excitons in solids.
        - listitem [ref=e20604]:
          - strong [ref=e20605]: Quantum-chemistry-style methods in periodic boundary conditions.
          - text: Localised-orbital methods (Gaussian-basis DFT, quantum-chemistry methods like CCSD(T) in a periodic supercell) provide an alternative to plane waves, with different strengths and weaknesses. We have not covered them.
      - blockquote [ref=e20606]:
        - paragraph [ref=e20607]:
          - text: "Next:"
          - link "chapter 08" [ref=e20608] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: "— pseudopotentials: why plane waves cannot describe tightly-bound core electrons, and how the projector-augmented-wave method fixes it."
