        - img [ref=e18923]
        - text: point.
      - paragraph [ref=e18929]:
        - strong [ref=e18930]: The BSW notation.
        - text: The convention introduced by BSW is that subscripted labels are written in the order in which the representations appear in their tables, with a
        - emphasis [ref=e18931]: prime
        - text: "(′) to distinguish representations that are even vs. odd under inversion [Bouckaert, Smoluchowski, and Wigner, 1936, p. 61]. For example:"
      - list [ref=e18932]:
        - listitem [ref=e18933]:
          - img [ref=e18935]
          - text: — the
          - emphasis [ref=e18943]: identity
          - text: representation (1D, fully symmetric).
        - listitem [ref=e18944]:
          - img [ref=e18946]
          - text: — the
          - emphasis [ref=e18954]: parity-odd
          - text: identity (1D).
        - listitem [ref=e18955]:
          - img [ref=e18957]
          - text: — a 2D representation that is even under inversion.
        - listitem [ref=e18967]:
          - img [ref=e18969]
          - text: — a 3D representation that is
          - emphasis [ref=e18982]: odd
          - text: under inversion (the prime indicates oddness).
        - listitem [ref=e18983]:
          - img [ref=e18985]
          - text: — a 3D representation that is
          - emphasis [ref=e18998]: odd
          - text: under inversion (this is the famous
          - img [ref=e19000]
          - text: "-like representation)."
      - paragraph [ref=e19005]:
        - text: "[Bouckaert, Smoluchowski, and Wigner, 1936, table II, p. 64]. In a band-structure plot, the bands at"
        - img [ref=e19007]
        - text: are labelled by these irreps, and the
        - emphasis [ref=e19012]: degeneracy
        - text: of each band is the dimension of the corresponding irrep. A typical Si band structure has
        - img [ref=e19014]
        - text: as the lowest conduction-band minimum (1D, non-degenerate) and
        - img [ref=e19023]
        - text: as the top of the valence band (3D, threefold degenerate without spin–orbit; split into
        - img [ref=e19037]
        - text: (4D) and
        - img [ref=e19048]
        - text: (2D) with spin–orbit) [Bouckaert, Smoluchowski, and Wigner, 1936, p. 65].
      - paragraph [ref=e19058]:
        - strong [ref=e19059]: Compatibility relations.
        - text: Bands at a high-symmetry point are connected continuously to bands along a high-symmetry
        - emphasis [ref=e19060]: line
        - text: ; the little group of the line is a subgroup of the little group of the point, so the irreps of the point must
        - emphasis [ref=e19061]: restrict
        - text: to the irreps of the line. The rules for which representations of the point are compatible with which representations of the line are the
        - strong [ref=e19062]: compatibility relations
        - text: of the BZ [Bouckaert, Smoluchowski, and Wigner, 1936, table IV, p. 66]. As an example, along the
        - img [ref=e19064]
        - text: line from
        - img [ref=e19070]
        - text: to
        - img [ref=e19076]
        - text: ", the compatibility is"
      - paragraph [ref=e19081]:
        - img [ref=e19083]:
          - generic [ref=e19087]:
            - img [ref=e19088]
            - img [ref=e19185]
      - paragraph [ref=e19194]:
        - text: "[Bouckaert, Smoluchowski, and Wigner, 1936, p. 66]. These relations are the basis of the"
        - emphasis [ref=e19195]: band connectivity
        - text: "in a band-structure plot: they tell us which bands at"
        - img [ref=e19197]
        - text: are connected to which bands at
        - img [ref=e19203]
        - text: along
        - img [ref=e19209]
        - text: "[Bouckaert, Smoluchowski, and Wigner, 1936, fig. 3, p. 67]."
      - paragraph [ref=e19214]:
        - strong [ref=e19215]: The 48-element group and double groups.
        - text: The 48-element group
        - img [ref=e19217]
        - text: has 10
        - emphasis [ref=e19225]: single-valued
        - text: "irreducible representations: 5 1-dimensional ("
        - img [ref=e19227]
        - text: ","
        - img [ref=e19236]
        - text: ), 1 2-dimensional (
        - img [ref=e19245]
        - text: ), and 2 3-dimensional (
        - img [ref=e19256]
        - text: ","
        - img [ref=e19270]
        - text: ) [Bouckaert, Smoluchowski, and Wigner, 1936, table II, p. 64]. When spin is included, the
        - emphasis [ref=e19283]: double group
        - text: of
        - img [ref=e19285]
        - text: "is required:"
        - img [ref=e19294]
        - text: has 8 additional
        - emphasis [ref=e19302]: double-valued
        - text: irreps (
        - img [ref=e19304]
        - text: ","
        - img [ref=e19315]
        - text: ","
        - img [ref=e19326]
        - text: ","
        - img [ref=e19337]
        - text: ", etc.) [Bouckaert, Smoluchowski, and Wigner, 1936, p. 65]. The double-valued irreps are the"
        - emphasis [ref=e19347]: Kramers-degenerate
        - text: "bands: a band labelled"
        - img [ref=e19349]
        - text: is 2D (one Kramers pair),
        - img [ref=e19360]
        - text: is 4D (two Kramers pairs), and so on.
      - paragraph [ref=e19370]:
        - text: The full classification at
        - img [ref=e19372]
        - text: (single + double valued) is tabulated in modern references; the original BSW paper has the single-valued part, and the spin-orbit extension is in Elliott’s 1954 paper and Dresselhaus’ 1955 thesis [Bouckaert, Smoluchowski, and Wigner, 1936, p. 65].
      - paragraph [ref=e19377]:
        - strong [ref=e19378]: The Mermaid diagram.
        - text: "The following Mermaid diagram maps the high-symmetry points and lines of the FCC Brillouin zone to the little groups that act on the Bloch states at each point. It is the symmetry analogue of the Setyawan–Curtarolo table in §7.4.3. ```mermaid graph LR G[“Γ(0,0,0)O_h (48)Γ₁, Γ₂, Γ₁₂, Γ₁₅’, Γ₂₅’”] X[“X(1,0,0)D_{4h} (16)X₁–X₅”] L[“L(1/2,1/2,1/2)D_{3d} (12)L₁–L₅”] W[“W(1,1/2,0)D_{2d} (8)W₁–W₆”] K[“K(3/4,3/4,0)C_{2v} (4)K₁–K₄”] U[“U(3/4,1/2,1/4)C_{2v} (4)U₁–U₄”] Delta[“ΔΓ → XC_{2v} (4)”] Lambda[“ΛΓ → LC_{3v} (6)”] Sigma[“ΣΓ → KC_{2v} (4)”]"
      - paragraph [ref=e19379]: G – Δ –> X G – Λ –> L G – Σ –> K X – S –> W L – Q –> W W – Z –> K K – M –> X X – T –> W G -.compatibility.-> Delta G -.compatibility.-> Lambda G -.compatibility.-> Sigma Delta -.compat.-> X Lambda -.compat.-> L Sigma -.compat.-> K
      - paragraph [ref=e19380]: "```"
      - paragraph [ref=e19381]:
        - text: "The boxes are the high-symmetry points; the solid arrows are the high-symmetry lines (each labelled by its name:"
        - img [ref=e19383]
        - text: ","
        - img [ref=e19389]
        - text: ","
        - img [ref=e19395]
        - text: ","
        - img [ref=e19401]
        - text: ","
        - img [ref=e19407]
        - text: ","
        - img [ref=e19413]
        - text: ","
        - img [ref=e19419]
        - text: ","
        - img [ref=e19425]
        - text: ). The dotted arrows indicate the compatibility relations of
        - img [ref=e19431]:
          - link [ref=e19434] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-07-BSW-compat"
        - text: ": the representations at the line endpoints are the restrictions of the representations at the points. The notation"
        - img [ref=e19443]
        - text: in the legend means “the little group of the line is a subgroup of the little group of the endpoint” and the irreps of the endpoint must restrict to the irreps of the line. The diagram does not show the double-valued (spin–orbit) irreps for compactness; they are in the BSW paper table III [Bouckaert, Smoluchowski, and Wigner, 1936, table III, p. 65].
      - blockquote [ref=e19452]:
        - paragraph [ref=e19453]:
          - strong [ref=e19454]: Note.
          - text: The BSW paper uses the
          - emphasis [ref=e19455]: Bethe
          - text: notation for the point groups, not the Hermann–Mauguin notation we use in §7.10. In Bethe’s notation,
          - img [ref=e19457]
          - text: "is $\\mathfrak{O}"
          - emphasis [ref=e19465]:
            - text: h
            - img [ref=e19467]
            - text: D
          - text: "{4h}"
          - img [ref=e19473]
          - text: "\\mathfrak{D}_{4h}"
          - img [ref=e19481]
          - text: \Gamma_1, X_1, L_1, \ldots$) are BSW’s own invention and have survived as the
          - emphasis [ref=e19616]: standard
          - text: notation in band-structure theory.
      - heading "7.13.5 The connection to DFT" [level=3] [ref=e19617]
      - paragraph [ref=e19618]:
        - text: The Bloch theorem is the foundation of
        - emphasis [ref=e19619]: every
        - text: "plane-wave DFT code in production. The chain of reasoning is:"
      - list [ref=e19620]:
        - listitem [ref=e19621]:
          - strong [ref=e19622]: Bloch’s theorem
          - text: says that the eigenstates of the Kohn–Sham Hamiltonian (in a periodic solid) are labelled by
          - img [ref=e19624]
          - text: and band index
          - img [ref=e19631]
          - text: ", with the form"
          - img [ref=e19637]:
            - link [ref=e19640] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-07-bloch"
          - text: . The eigenstates are
          - emphasis [ref=e19647]: not
          - text: labelled by a single integer, but by a continuous vector and a discrete index. (See §7.3.)
        - listitem [ref=e19648]:
          - strong [ref=e19649]: The Brillouin zone
          - text: is the unique domain of
          - img [ref=e19651]
          - text: . The BZ integral
          - img [ref=e19658]:
            - link [ref=e19661] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-07-bz-integral"
          - text: is the natural generalisation of the molecular sum
          - img [ref=e19670]
          - text: to a periodic solid. (See §7.4.)
        - listitem [ref=e19678]:
          - strong [ref=e19679]: The plane-wave basis
          - text: "is the set of plane waves ${e^{i(\\mathbf k + \\mathbf G) \\cdot \\mathbf r}}"
          - emphasis [ref=e19680]:
            - text: \mathbf G
            - img [ref=e19682]
            - text: c
          - text: "{n\\mathbf k}(\\mathbf G)$. (See §7.5.)"
        - listitem [ref=e19888]:
          - strong [ref=e19889]: The Kohn–Sham Hamiltonian
          - text: in the plane-wave basis is the matrix
          - img [ref=e19891]:
            - link [ref=e19894] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-07-pw-hamiltonian"
          - text: ", with a diagonal kinetic part and a circulant potential part. (See §7.5.2.)"
        - listitem [ref=e19902]:
          - strong [ref=e19903]: The BZ integral
          - text: is evaluated as a sum over a Monkhorst–Pack mesh of
          - img [ref=e19905]
          - text: points
          - img [ref=e19912]:
            - link [ref=e19915] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-07-mp-sum"
          - text: or by the tetrahedron method (§7.11).
        - listitem [ref=e19923]:
          - strong [ref=e19924]: The plane-wave cutoff
          - img [ref=e19926]
          - text: truncates the basis to a finite set, and the diagonalisation is done by standard linear algebra. (See §7.5.3.)
      - paragraph [ref=e19936]:
        - text: The whole of plane-wave DFT rests on step 1 — without Bloch’s theorem, the infinite Hilbert space of the solid could not be reduced to a countable set of finite matrix problems indexed by
        - img [ref=e19938]
        - text: .
      - paragraph [ref=e19944]:
        - text: This connection is made explicit in
        - link "chapter 06" [ref=e19945] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.7 (“Plane waves”) and
        - link "chapter 08" [ref=e19946] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-08/
        - text: §8.7 (“PAW”). The reader who wants to see the plane-wave basis in action in a working code should look at the VASP, Quantum ESPRESSO, or ABINIT tutorials; the underlying algebra is exactly the matrix
        - img [ref=e19948]:
          - link [ref=e19951] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-07-pw-hamiltonian"
        - text: of §7.5.2. >
        - strong [ref=e19959]: Tip.
        - text: The plane-wave basis is
        - emphasis [ref=e19960]: not
        - text: the only choice. The
      - blockquote [ref=e19961]:
        - paragraph [ref=e19962]:
          - text: augmented-plane-wave (APW) basis of Slater (1937), the KKR basis of Kohn and Rostoker (1954), the LMTO basis of Andersen (1975), and the localised-orbital basis of chapter 06 are all
          - emphasis [ref=e19963]: alternative
          - text: realisations of the same Bloch-theorem reduction. See
          - link "chapter 13" [ref=e19964] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: for the comparative discussion.
      - heading "7.13.6 What these papers don’t say" [level=3] [ref=e19965]
      - paragraph [ref=e19966]:
        - text: The original Bloch theorem — and the standard textbook treatments — all work in the
        - emphasis [ref=e19967]: same
        - text: "setting: a non-relativistic, spin-free, perfectly periodic, time-independent, one-electron Hamiltonian. Each of these restrictions is a non-trivial idealisation, and relaxing any of them is a separate field of solid-state physics. We list the most important omissions, with the year the missing piece appeared and the chapter in these notes where it is covered:"
      - list [ref=e19968]:
        - listitem [ref=e19969]:
          - strong [ref=e19970]: Spin.
          - text: The original Bloch theorem is for the
          - emphasis [ref=e19971]: spinless
          - text: Schrödinger equation. The 2 × 2 spinor Pauli Hamiltonian
          - img [ref=e19973]
          - text: with spin–orbit coupling
          - img [ref=e20029]
          - text: gives a
          - emphasis [ref=e20087]: spinor
          - text: Bloch theorem; the eigenfunctions become 2-component Pauli spinors
          - img [ref=e20089]
          - text: ", and the little-group irreps must be taken of the"
          - emphasis [ref=e20108]: double
          - text: group (Dresselhaus, 1955; Elliott, 1954). For topological insulators and transition-metal dichalcogenides, the spinor structure is essential. See
          - link "chapter 11" [ref=e20109] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: §11.6 and “What we left out” below.
        - listitem [ref=e20110]:
          - strong [ref=e20111]: Time dependence.
          - text: Bloch’s theorem is for the
          - emphasis [ref=e20112]: time-independent
          - text: "Schrödinger equation. The time-dependent analogue is the time-dependent Bloch theorem: the time-evolving state of a system driven by a time-dependent"
          - emphasis [ref=e20113]: periodic
          - text: perturbation has the form
          - img [ref=e20115]
          - text: ", with"
          - img [ref=e20175]
          - emphasis [ref=e20187]:
            - text: periodic in
            - img [ref=e20189]
          - text: but not necessarily in
          - img [ref=e20196]
          - text: . The full time-dependent theory is the
          - strong [ref=e20201]: Runge–Gross theorem
          - text: of TDDFT [Runge and Gross, 1984]. See
          - link "chapter 04" [ref=e20202] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: §4.10.3.
        - listitem [ref=e20203]:
          - strong [ref=e20204]: Disorder.
          - text: Bloch’s theorem requires
          - emphasis [ref=e20205]: perfect
          - text: periodicity. A crystal with a finite concentration of impurities, vacancies, or compositional disorder does
          - emphasis [ref=e20206]: not
          - text: have a Bloch theorem; the wavefunctions are no longer plane-wave-modulated. The modern theory is the
          - strong [ref=e20207]: Anderson localisation
          - text: of 1958 [Anderson, 1958], and the
          - strong [ref=e20208]: coherent potential approximation (CPA)
          - text: of Soven (1967) and Velický (1969) for disordered alloys. See
          - link "chapter 13" [ref=e20209] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: §13.5 for the CPA discussion.
        - listitem [ref=e20210]:
          - strong [ref=e20211]: Electron–electron interaction.
          - text: Bloch’s theorem is a
          - emphasis [ref=e20212]: one-electron
          - text: theorem. The many-electron Hamiltonian
          - img [ref=e20214]
          - text: is not one-electron-separable, and the eigenfunctions are not Bloch waves. The modern reduction is the
          - strong [ref=e20301]: quasiparticle picture
          - text: of Landau’s Fermi-liquid theory (1956) and the
          - strong [ref=e20302]:
            - img [ref=e20304]
            - text: approximation
          - text: of Hedin (1965). See
          - link "chapter 12" [ref=e20311] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: for the
          - img [ref=e20313]
          - text: discussion.
        - listitem [ref=e20320]:
          - strong [ref=e20321]: Strong electron correlation.
          - text: The Kohn–Sham band structure of
          - link "chapter 04" [ref=e20322] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: is a single-particle theory; for Mott insulators and heavy-fermion materials the Bloch bands are qualitatively wrong (the paramagnetic metal
          - img [ref=e20324]
          - text: is predicted to be a metal by LSDA; it is in fact an insulator). The fix is
          - strong [ref=e20337]:
            - text: DFT+
            - img [ref=e20339]
          - text: (Anisimov, 1991) or
          - strong [ref=e20344]: DMFT
          - text: (Georges, 1996). See
          - link "chapter 12" [ref=e20345] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: .
        - listitem [ref=e20346]:
          - strong [ref=e20347]: Topological band theory.
          - text: The original Bloch theorem classifies the eigenstates by a vector
          - img [ref=e20349]
          - text: in the BZ. In the modern topological classification, the
          - emphasis [ref=e20355]: bundle
          - text: of Bloch states over the BZ is a
          - emphasis [ref=e20356]: vector bundle
          - text: ", and the topological invariants of this bundle (Chern number,"
          - img [ref=e20358]
          - text: invariant) classify the topological phases of matter. The first appearance of the topological classification in solid-state physics is the
          - strong [ref=e20367]: TKNN paper
          - text: of Thouless, Kohmoto, Nightingale, and den Nijs (1982) for the integer quantum Hall effect. See
          - link "chapter 11" [ref=e20368] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: for the modern topological classification.
        - listitem [ref=e20369]:
          - strong [ref=e20370]: Phonons and electron–phonon coupling.
          - text: The original Bloch theorem is for
          - emphasis [ref=e20371]: electrons in a fixed lattice
          - text: . The generalisation to a
          - emphasis [ref=e20372]: vibrating
          - text: lattice is the
          - strong [ref=e20373]: adiabatic Born–Oppenheimer
          - text: "approximation: the electrons are assumed to follow the ionic motion instantaneously, and the electron–phonon coupling appears as a small correction to the Bloch Hamiltonian. The full theory is"
          - strong [ref=e20374]: many-body perturbation theory
          - text: (Migdal, 1958; Eliashberg, 1960). See
          - link "chapter 10" [ref=e20375] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: for the phonon and electron–phonon discussion.
      - paragraph [ref=e20376]:
        - text: "In short: the original Bloch theorem is"
        - emphasis [ref=e20377]: one
        - text: cornerstone of modern solid-state physics, but the building has grown considerably in the 95 years since 1929. Every modern extension is a chapter in its own right; the standard references are the
        - strong [ref=e20378]: Ziman
        - emphasis [ref=e20379]: Principles of the Theory of Solids
        - text: (1964),
        - strong [ref=e20380]: Mahan
        - emphasis [ref=e20381]: Many-Particle Physics
        - text: (3rd ed., 2000), and the
        - strong [ref=e20382]: Marder
        - emphasis [ref=e20383]: Condensed Matter Physics
        - text: (2nd ed., 2010).
