        - text: "**Part 1.** The BvK conditions on a supercell of primitive cells are A Bloch wave satisfies these iff The allowed are therefore a uniform mesh with points along each primitive direction, giving exactly mesh points in the BZ. **Part 2.** The volume of the first Brillouin zone is (from ). The k-point density is But \"density\" should not depend on — in the BvK formalism is a *mesh* parameter, not a physical one. The right thing to count is the number of k-points *per unit cell*: k-points live in the first BZ, and the first BZ itself is associated with one primitive cell, so the density of k-points per unit volume of the BZ, when properly normalised, is **Part 3.** Convert the sum to an integral using the spacing in each direction. The volume of one mesh cell is The Riemann sum is then The factor is the same as the one in , and the equality is exact in the limit. In practice the equality is approximate at finite , with the convergence rate ."
      - group [ref=e9564]:
        - generic "▸ Problem 3 (hard) — Methfessel–Paxton smearing and the Fermi level" [ref=e9565] [cursor=pointer]
        - text: In a metallic calculation, the Methfessel–Paxton (MP) smearing scheme replaces the discontinuous Fermi–Dirac occupation at by a smooth function of width in energy. The occupations are where is the physicist's Hermite polynomial, are fixed coefficients, and is the *smearing chemical potential* determined by the constraint 1. Show that the MP occupations sum to for any choice of , by construction. (State which property of the Hermite polynomials makes this work.) 2. Show that the electronic entropy contribution to the free energy is for some smooth function , and identify for (Gaussian smearing). 3. The "true" total energy is where . Explain why the extrapolation converges more rapidly than the original (unsmeared) sum for a metal, and identify the leading-order correction in for MP smearing with .
      - group [ref=e9566]:
        - generic "▸ Show answer" [ref=e9567] [cursor=pointer]
        - text: "**Part 1.** The MP occupation function is constructed so that its integral over all energies equals the number of states below for any . This works because the Hermite polynomials with are odd functions of , and they are orthogonal to the constant function on the real line with the Gaussian weight. The constant term in reproduces the Heaviside-step integral exactly; the odd-Hermite corrections average to zero. The constraint is then a one-dimensional nonlinear equation for at fixed , solvable by Newton iteration or bisection. **Part 2.** The electronic entropy of a Fermi–Dirac distribution is For Gaussian smearing ( ), the occupations are . Inserting into the entropy gives, after a Gaussian integral, (The factor comes from the prefactor of .) In other words, the entropy contribution per state is with . **Part 3.** For an unsmeared metal, the sum converges to the integral only as because of the step at the Fermi surface. With smearing, the integrand is smooth in (the varies on a scale ), so the same mesh approximates the integral to provided the mesh is fine enough to resolve the smoothed function. The remaining error is the *systematic* error from using a smeared occupation instead of the true step function. For (Gaussian smearing), this error is : the leading correction to is quadratic in . For (first-order MP), the leading correction is : the second-order term in the Hermite expansion of the step function exactly cancels the quadratic correction of the Gaussian. (To see this, note that the coefficient is chosen so that the integral of the first-Hermite term is zero; the remaining error comes from the next non-zero term, which is .) A practical strategy: run the calculation with several values of (e.g. Hartree), plot vs. (for ) or vs. (for ), and extrapolate linearly to . The extrapolated value is the total energy."
