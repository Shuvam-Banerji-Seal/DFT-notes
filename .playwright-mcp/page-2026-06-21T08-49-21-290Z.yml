      - heading "Chapter 07 — Solids & periodic boundary conditions" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]: A perfect crystal has a Hamiltonian that commutes with every translation by a lattice vector. The eigenfunctions are plane waves modulated by a cell-periodic function — and that single fact is the reason solid-state physics has its own language.
      - paragraph [ref=e30]:
        - text: Up to chapter 06 we have been talking about
        - emphasis [ref=e31]: finite
        - text: "systems: atoms and molecules in a box. A real solid is not a finite system. It is an infinite, perfectly periodic array of nuclei, and the electron moves through this array forever. The Schrödinger equation we have to solve is therefore not the molecular one of"
        - link "chapter 01" [ref=e32] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-01/
        - text: ", nor the molecular orbital problem of"
        - link "chapter 04" [ref=e33] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: — it is the
        - emphasis [ref=e34]: same
        - text: "Schrödinger equation, but on a Hamiltonian that has the discrete translational symmetry of the crystal. This chapter is about the consequence of that symmetry: the eigenfunctions factorise into a plane wave and a cell-periodic piece, the energy levels become continuous"
        - emphasis [ref=e35]: bands
        - text: parametrised by a crystal momentum
        - strong [ref=e36]: k
        - text: that lives in a small region of reciprocal space, and the practical calculation collapses from an infinite matrix to a finite matrix indexed by a small set of
        - strong [ref=e37]: k-points
        - text: and a small set of
        - strong [ref=e38]: plane waves
        - text: . The machinery that does this is what every production solid-state code (VASP, Quantum ESPRESSO, CASTEP, ABINIT, …) is built on.
      - blockquote [ref=e39]:
