        - text: Neil Ashcroft and David Mermin’s
        - emphasis [ref=e17516]: Solid State Physics
        - text: (Holt, Rinehart and Winston, 1976; ISBN 978-0030839931) is the standard graduate reference. The relevant chapters for the present section are chapter 8 (
        - emphasis [ref=e17517]: The Structure of Crystals
        - text: ", pp. 64–83) and chapter 9 ("
        - emphasis [ref=e17518]: The Reciprocal Lattice
        - text: ", pp. 85–110) [Ashcroft and Mermin, 1976, p. 64, p. 85]. The Bloch-theorem proof is in chapter 9."
        - strong [ref=e17519]: Chapter 8 — the lattice (pp. 64–83).
        - text: The chapter opens with the formal definition of a Bravais lattice as a discrete set of points
        - img [ref=e17521]
        - text: such that translation by any
        - img [ref=e17529]
        - text: maps the lattice onto itself [Ashcroft and Mermin, 1976, eq. (2.1), p. 65]. The primitive vectors
        - img [ref=e17536]
        - text: are introduced on p. 67, with the explicit statement that any lattice vector is an integer combination
        - img [ref=e17562]
        - text: "[Ashcroft and Mermin, 1976, eq. (2.5), p. 67]. The 14 Bravais lattices and the 7 crystal systems are tabulated on pp. 73–74 [Ashcroft and Mermin, 1976, table 2.1, p. 73]. The Wigner–Seitz cell is defined on p. 75 [Ashcroft and Mermin, 1976, fig. 2.7, p. 75]. None of this material"
        - emphasis [ref=e17607]: uses
