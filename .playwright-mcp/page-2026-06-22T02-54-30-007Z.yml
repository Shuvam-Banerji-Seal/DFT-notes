        - emphasis [ref=e359]: systematic
        - text: "’ failure mode: the single-reference assumption that underlies MP2, CCSD, and CCSD(T) breaks down for bond breaking, diradicals, and excited states of the same symmetry as the ground state — which is the topic of § 14.5. The rest of the chapter unpacks the ladder. We start with the perturbation-theory machinery that gives MP2 (§ 14.2), build the configuration-interaction hierarchy (§ 14.3) and its size-extensivity failure (§ 14.3.4), introduce the coupled-cluster exponential ansatz that fixes the failure (§ 14.4), survey the multireference methods for the problems that defeat single-reference theories (§ 14.5), and close with the semiempirical family (§ 14.6) and the basis-set extrapolation that any practical calculation must use to reach the “complete-basis-set” limit (§ 14.7)."
      - heading "14.2 Møller–Plesset perturbation theory" [level=2] [ref=e360]
      - paragraph [ref=e361]:
        - text: Møller–Plesset perturbation theory is the simplest wavefunction-based correction of Hartree–Fock. The
        - emphasis [ref=e362]: zeroth order
        - text: is HF; the first order reproduces the HF energy exactly (the perturbation is by construction zero at first order); the
        - emphasis [ref=e363]: second order
        - text: — MP2 — is the first non-trivial correction, and is a
        - img [ref=e365]
        - text: sum over pairs of occupied and pairs of virtual orbitals. MP2 is the cheapest method that captures
        - emphasis [ref=e380]: dynamic correlation
        - text: — the short-range electron-electron cusp that HF misses — and is the default in many production codes for systems too large for CCSD(T).
