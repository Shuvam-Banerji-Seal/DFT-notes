      - heading "14.12 What we left out" [level=2] [ref=e14619]
      - paragraph [ref=e14620]:
        - text: The chapter scratched the surface of a
        - emphasis [ref=e14621]: large
        - text: field. The five omissions below are the most important for a
        - emphasis [ref=e14622]: complete
        - text: picture of the post-HF landscape.
      - list [ref=e14623]:
        - listitem [ref=e14624]:
          - paragraph [ref=e14625]:
            - strong [ref=e14626]: Explicitly correlated (F12) methods.
            - text: The
            - emphasis [ref=e14627]: conventional
            - text: MP2, CCSD, and CCSD(T) methods have a
            - emphasis [ref=e14628]: slow
            - text: basis-set convergence because the electron–electron cusp is
            - emphasis [ref=e14629]: not
            - text: described by the finite Gaussian basis. The
            - strong [ref=e14630]: F12
            - text: methods (Hättig, Klopper, Tew, Valeev,
            - emphasis [ref=e14631]: Chem. Rev.
            - strong [ref=e14632]: "112"
            - text: ", 4 (2012)) add a"
            - emphasis [ref=e14633]: geminal
            - text: correlation factor
            - img [ref=e14635]
            - text: that
            - emphasis [ref=e14651]: explicitly
            - text: describes the cusp, and achieve
            - emphasis [ref=e14652]: cc-pVDZ-F12
            - text: accuracy comparable to
            - emphasis [ref=e14653]: cc-pVQZ
            - text: at a much lower cost. F12 is the
            - emphasis [ref=e14654]: production
            - text: standard in modern high-accuracy quantum chemistry. We did not derive the F12 ansatz, the F12-specific integrals, or the F12-CASPT2 generalisation of § 14.5.3. -
            - strong [ref=e14655]: Quantum Monte Carlo (QMC) and full-CI QMC.
            - text: The
            - strong [ref=e14656]: VMC
            - text: (variational) and
            - strong [ref=e14657]: DMC
            - text: (diffusion) Monte Carlo methods (Anderson,
