      - paragraph [ref=e10789]:
        - text: The
        - emphasis [ref=e10790]: semiempirical
        - text: methods are a family of approximate quantum-chemistry methods that
        - emphasis [ref=e10791]: replace
        - text: the expensive two-electron integrals with
        - emphasis [ref=e10792]: empirical parameters
        - text: fitted to experiment or to high-accuracy calculations. The semiempirical family is
        - emphasis [ref=e10793]: older
        - text: than DFT (the
        - emphasis [ref=e10794]: Hückel
        - text: method is from 1930), and is the only quantum-chemistry approach that is
        - emphasis [ref=e10795]:
          - text: fast enoug
          - code [ref=e10796]: h*' for *millions* of atoms (molecular dynamics of proteins, molecular electronics, combinatorial chemistry). The *modern* semiempirical methods — PM3, PM6, PM7, DFTB — are *not* the Hückel method of the 1930s; they are *systematically improvable* approximations to the full electronic problem that retain the *spee
          - text: d
        - text: ’ of the historical methods and the
        - emphasis [ref=e10797]: accuracy
        - text: of the modern ones.
