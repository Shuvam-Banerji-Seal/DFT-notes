        - text: of the semiempirical family. It treats the
        - img [ref=e10803]
        - text: electrons of an aromatic hydrocarbon as a tight-binding model on the carbon
        - img [ref=e10809]
        - text: orbitals, with a
        - emphasis [ref=e10819]: single
        - text: resonance integral
        - img [ref=e10821]
        - text: for every nearest-neighbour coupling and a
        - emphasis [ref=e10826]: single
        - text: on-site energy
        - img [ref=e10828]
        - text: for every carbon. The Hückel Hamiltonian is
      - img [ref=e10834]:
        - generic [ref=e10836]:
          - generic [ref=e10842]: ü
          - generic [ref=e10855]:
            - img [ref=e10859]
            - img [ref=e10861]
