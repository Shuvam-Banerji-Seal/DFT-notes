        - text: per SCF iteration, dominated by the four-centre exchange integrals. The accuracy gain over PBE on main-group thermochemistry is roughly a factor of 4 — B3LYP atomisation MAE on G2 is
        - img [ref=e6548]
        - text: kcal/mol vs PBE’s
        - img [ref=e6556]
        - text: kcal/mol — but the gain on transition-metal chemistry, band gaps, and non-covalent interactions is small or negative.
        - strong [ref=e6564]: B3LYP is the historical default of organic chemistry, not a universal default
        - text: .
      - paragraph [ref=e6565]:
        - strong [ref=e6566]: PBE0.
        - text: The
        - strong [ref=e6567]: PBE0
        - text: functional (also called PBE1PBE) is the
        - emphasis [ref=e6568]: non-empirical
        - text: "cousin of B3LYP: the mixing parameter is fixed at"
        - img [ref=e6570]
        - text: by the ACFDT argument above, and the remaining ingredients are PBE exchange and PBE correlation. The PBE0 atomisation MAE on G2 is
