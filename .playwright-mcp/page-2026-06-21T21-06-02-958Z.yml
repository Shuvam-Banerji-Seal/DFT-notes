        - text: The error pattern is
        - strong [ref=e9466]: diagnostic of the rung
        - text: ":"
      - list [ref=e9467]:
        - listitem [ref=e9468]:
          - strong [ref=e9469]: HF
          - text: under-correlates (it has
          - emphasis [ref=e9470]: "no"
