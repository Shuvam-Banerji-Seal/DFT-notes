        - text: ", electron–nuclear"
        - img [ref=e79]
        - text: ", Hartree"
        - img [ref=e94]
        - text: ", and nuclear–nuclear"
        - img [ref=e106]
        - text: — and one piece we
        - emphasis [ref=e115]: cannot
        - text: ":"
        - img [ref=e117]
        - text: ". The whole of modern density-functional theory is, in practice, a search for ever-better approximations to that one piece. This chapter is a guided tour of the approximations that have mattered: the"
        - strong [ref=e132]: local density approximation
        - text: (LDA), the
        - strong [ref=e133]: generalised-gradient approximation
        - text: (GGA), the
        - strong [ref=e134]: meta-GGA
        - text: ", the"
        - strong [ref=e135]: hybrid
        - text: functionals (B3LYP, PBE0), the
        - strong [ref=e136]: range-separated
        - text: hybrids (CAM-B3LYP, LC-
        - img [ref=e138]
        - text: PBE,
        - img [ref=e144]
        - text: B97X), the
        - strong [ref=e149]: double
        - text: hybrids (B2-PLYP, DSD-PBEP86), and the various
        - strong [ref=e150]: dispersion corrections
        - text: (D3, D4, MBD, vdW-DF) that retro-fit the missing van-der-Waals physics. We close with a worked total-energy comparison of helium across LDA, PBE, and Hartree–Fock, three problems that exercise the formulas, and a decision tree for picking a functional in practice.
      - heading "5.1 The claim" [level=2] [ref=e151]
