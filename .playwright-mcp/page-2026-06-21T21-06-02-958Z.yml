        - paragraph [ref=e6603]:
          - strong [ref=e6604]: Note.
          - text: The 1/4 of PBE0 and the 0.20 of B3LYP are
          - emphasis [ref=e6605]: not
          - text: the same number. The PBE0 1/4 is the second-order GL2 prediction; the B3LYP 0.20 is a fit to atomisation energies. The two functionals use the
          - emphasis [ref=e6606]: same
          - text: PBE exchange and different correlation (PBE correlation for PBE0, LYP for B3LYP), so the comparison is not apples-to-apples. A more controlled comparison is PBE0 vs
          - strong [ref=e6607]: PBE0 with LYP correlation
          - text: (“PBE0-LYP” in some codes); on G2, PBE0-LYP is
          - emphasis [ref=e6608]: better
          - text: than PBE0 by about 1 kcal/mol MAE, but
          - emphasis [ref=e6609]: worse
          - text: than B3LYP by about 1 kcal/mol MAE. The fitted mixing fraction is a
          - emphasis [ref=e6610]: real
          - text: effect, not just noise.
