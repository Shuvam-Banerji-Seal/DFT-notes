        - img [ref=e9638]
        - text: vs
        - img [ref=e9650]
        - text: ). The big effect of exact exchange on He is the
        - emphasis [ref=e9666]: self-interaction error
        - text: ": with a single orbital, the HF exchange exactly cancels the Hartree self-interaction, so the"
        - emphasis [ref=e9667]: exact-exchange-only
        - text: energy of He is much closer to the truth than the LDA. With a GGA already in place, the additional HF exchange is a small correction.
      - paragraph [ref=e9668]:
        - strong [ref=e9669]: B3LYP on helium.
        - text: B3LYP gives
        - img [ref=e9671]
        - text: on He — closer to the exact than PBE0, despite using
        - emphasis [ref=e9699]: less
        - text: exact exchange (20% vs 25%). The reason is the LYP correlation part, which is
        - emphasis [ref=e9700]: more accurate
        - text: than PBE correlation for small atoms. This is a
        - emphasis [ref=e9701]: "systemati`c"
        - text: "’ difference between PBE0 and B3LYP: B3LYP is tuned for small-molecule thermochemistry; PBE0 is tuned for solids."
