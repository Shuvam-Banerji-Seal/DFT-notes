rror pattern is the diagnostic one of the chapter: - HF: error kcal/mol (no correlation, exact exchange). - LDA: error kcal/mol (over-correlates — too negative correlation, too small exchange). - PBE: error kcal/mol (much better — gradient correction fixes most of the LDA failure). - PBE0: error kcal/mol (adding 25% exact exchange reduces the error by a factor of 4). **Step 4. Why does adding exact exchange *improve* the LDA?** The LDA *over-estimates* the magnitude of the correlation energy of He. The PBE gradient correction *reduces* the magnitude of the correlation (PBE correlation is less negative than LDA correlation, by about in this case), getting it closer to the truth. The HF exchange is *also* less negative than the LDA exchange ( vs in absolute value: HF is *more* negative than LDA in this case, by ). The PBE0 mix *combines* the HF and PBE exchange — 0.25 of HF + 0.75 of PBE — and the result is *less* negative than the LDA exchange but *more* negative than the PBE exchange, in the right balance to compensate the residual LDA correlation error. The deeper point is that LDA exchange and LDA correlation *both*' have self-interaction errors that partially cancel in the LDA total. Adding a fraction of exact exchange (which has *no* self-interaction error) shifts the balance, and a *smaller* correlation error is needed in the DFT part to match the total. This is the \"serendipitous cancellation\" of errors that makes LDA surprisingly good for many properties — and that the hybrid functionals are designed to preserve *an`d*' improve. **Headline answer.** The variational HF energy of He with a single Slater determinant is and , an error of kcal/mol. The PBE0 total energy is , an error of kcal/mol — the best of the four methods and close to the chemical-accuracy threshold. The error pattern across HF / LDA / PBE / PBE0 is the canonical diagnostic of the rungs of Jacob's ladder."
      - heading "5.7 Cross-references" [level=2] [ref=e9734]
      - paragraph [ref=e9735]:
        - text: The XC functional is the
        - emphasis [ref=e9736]: central
        - text: design choice of a DFT calculation, and it touches every other chapter of these notes.
      - paragraph [ref=e9737]:
        - strong [ref=e9738]: Prerequisites (in order).
      - list [ref=e9739]:
        - listitem [ref=e9740]:
          - link "Chapter 01" [ref=e9741] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-01/
          - text: — the postulates of quantum mechanics and the Born–Oppenheimer separation. The XC functional lives inside the Born–Oppenheimer energy expression for fixed nuclei.
        - listitem [ref=e9742]:
          - link "Chapter 02" [ref=e9743] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-02/
          - text: — the Hohenberg–Kohn existence theorem. The XC functional is
          - emphasis [ref=e9744]: the
          - text: universal functional of the HK theorem.
        - listitem [ref=e9745]:
          - link "Chapter 03" [ref=e9746] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-03/
          - text: — the Hartree–Fock method. The exact-exchange part of the hybrid functionals of section 5.2.6 is the same exchange operator as in HF; the difference is that the orbitals are KS orbitals, not HF orbitals.
        - listitem [ref=e9747]:
          - link "Chapter 04" [ref=e9748] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: — the Kohn–Sham equations. The XC functional is the
          - emphasis [ref=e9749]: only
          - text: unknown piece of the KS energy expression; the rest of the chapter is exact given a choice of functional.
      - paragraph [ref=e9750]:
        - strong [ref=e9751]: Forwards (the XC functional choice matters for).
      - list [ref=e9752]:
        - listitem [ref=e9753]:
          - link "Chapter 06" [ref=e9754] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-06/
          - text: — basis sets. The BSIE (basis-set incompleteness error) of a DFT calculation is
          - emphasis [ref=e9755]:
            - text: entangle
            - code [ref=e9756]: "d*' with the functional choice: a hybrid functional with exact exchange has a *slower* basis-set convergence than a GGA, because the exact exchange integral is more sensitive to the tail of the basis. The reader should *not* quote a DFT energy without naming both the functional *an"
            - text: d
          - text: ’ the basis.
        - listitem [ref=e9757]:
          - link "Chapter 08" [ref=e9758] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: — pseudopotentials. Most pseudopotentials are
          - emphasis [ref=e9759]: frozen-core
          - text: approximations that were constructed at a specific XC functional. The use of a GGA pseudopotential with an LDA calculation, or vice versa, is a common source of error.
        - listitem [ref=e9760]:
          - link "Chapter 09" [ref=e9761] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-09/
          - text: — forces and geometry optimisation. The forces of a DFT calculation are
          - emphasis [ref=e9762]: derivatives
          - text: of the total energy with respect to nuclear coordinates, so the functional choice affects the optimised geometry. Different functionals can give bond lengths that differ by 0.01–0.05 Å; a “PBE geometry” is different from a “B3LYP geometry”.
        - listitem [ref=e9763]:
          - link "Chapter 13" [ref=e9764] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: — DFT+U. The DFT+U method adds an on-site Coulomb correction to the standard DFT energy, designed to fix the failure of LDA/GGA for strongly-correlated
