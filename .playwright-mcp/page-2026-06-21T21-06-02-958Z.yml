        - text: tail between two non-overlapping density fragments — is
        - emphasis [ref=e7864]: absent
        - text: from every LDA, GGA, meta-GGA, and most hybrids. The DFT integrand is a
        - emphasis [ref=e7865]: local
        - text: (or semi-local) function of the density; the vdW tail is a
        - emphasis [ref=e7866]: non-local
        - text: functional of the density at two points
        - img [ref=e7868]
        - text: and
        - img [ref=e7878]
        - text: that are
