      - paragraph [ref=e17463]:
        - strong [ref=e17464]: Why LYP is the standard GGA correlation.
        - text: "Three reasons explain why LYP, not PBE correlation or PW91 correlation, is the GGA correlation paired with B88 in BLYP and with B88-LSD in B3LYP:"
      - list [ref=e17465]:
        - listitem [ref=e17466]:
          - paragraph [ref=e17467]:
            - strong [ref=e17468]: It is “non-empirical” in a different sense from PBE.
            - text: PBE correlation (Eq.
            - img [ref=e17470]:
              - link [ref=e17473] [cursor=pointer]:
                - /url: "#mjx-eqn%3Aeq%3Ach-05-lit-pbe-h"
            - text: of §5.9.1 above) is
            - emphasis [ref=e17481]: constraint-based
            - text: ’ but not fitted* — it
            - emphasis [ref=e17482]: replaces
            - text: the LDA correlation with a correction to it. LYP is a
            - emphasis [ref=e17483]: replacement
            - text: of the LDA correlation that does not have the LDA correlation as its base. For a
            - emphasis [ref=e17484]: replacement
            - text: correlation, fitting to a single atom (helium) is more transferable than building a constraint ladder.
        - listitem [ref=e17485]:
          - paragraph [ref=e17486]:
            - strong [ref=e17487]:
              - text: It is the only GGA correlation with a closed-form
              - img [ref=e17489]
              - text: dependence.
            - text: The Laplacian term in
            - img [ref=e17500]:
              - link [ref=e17503] [cursor=pointer]:
                - /url: "#mjx-eqn%3Aeq%3Ach-05-lit-lyp-form"
            - text: is the only local GGA-correlation ingredient that is
            - emphasis [ref=e17511]: not
            - text: in PBE or PW91. For systems where the
            - emphasis [ref=e17512]: curvature
            - text: of the density matters — covalent bonds, transition-metal complexes, aromatic systems — the Laplacian gives LYP an advantage that PBE’s reduced-gradient form does not. The Laplacian is also the reason LYP can be reformulated with the kinetic-energy density
            - img [ref=e17514]
            - text: via the identity
            - img [ref=e17520]
            - text: in the two-electron case (Miehlich
            - emphasis [ref=e17536]: et al.
            - text: 1989 reformulation).
        - listitem [ref=e17537]:
          - paragraph [ref=e17538]:
            - strong [ref=e17539]: It works well with B88 exchange.
            - text: Becke’s 1988 B88 paper (above) used a placeholder correlation (the LDA form), and Becke explicitly stated (PRA 38, 3099, second column) that “the natural correlation partner for B88 exchange is the Lee–Yang–Parr (LYP) correlation, which we have used in our subsequent work [B3LYP 1993]”. B88 exchange + LYP correlation =
            - strong [ref=e17540]: BLYP
            - text: ", the canonical GGA of organic chemistry. The B3LYP 1993 paper (Becke, J. Chem. Phys. 98, 5648) uses the LYP correlation as its"
            - emphasis [ref=e17541]: full
            - text: correlation, not as a
            - emphasis [ref=e17542]: correction
            - text: to VWN, with VWN3 (not VWN5) as a minor secondary* correlation term that contributes
            - img [ref=e17544]
            - text: of the total.
