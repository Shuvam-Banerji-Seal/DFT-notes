      - paragraph [ref=e8736]:
        - text: The ladder has two important properties. First,
        - strong [ref=e8737]: higher rungs are not always better
        - text: ": a"
        - emphasis [ref=e8738]: low
        - text: rung (LDA) can outperform a
        - emphasis [ref=e8739]: "hig`h"
        - text: ’ rung (a poorly-tuned hybrid) for a particular system. The ladder is a
        - emphasis [ref=e8740]: cost–complexity
        - text: ordering, not a monotonic- accuracy ordering. Second,
        - strong [ref=e8741]: chemical accuracy
        - text: (errors
        - img [ref=e8743]
        - text: kcal/mol on atomisation energies,
        - img [ref=e8751]
        - text: Å on bond lengths) is
        - emphasis [ref=e8761]: not
        - text: "reached by LDA or GGA: the typical LDA error is 30–50 kcal/mol per bond; the typical GGA error is 10–30 kcal/mol. The threshold of 1 kcal/mol is reached"
        - emphasis [ref=e8762]: only
        - text: by the top of the ladder (double hybrids, RPA) and
        - emphasis [ref=e8763]: only
        - text: for main-group thermochemistry.
      - blockquote [ref=e8764]:
        - paragraph [ref=e8765]:
          - strong [ref=e8766]: Tip.
          - text: "“Climb the ladder as high as you can afford” is a reasonable first approximation to choosing a functional. Two practical refinements: (i) match the rung to the"
          - emphasis [ref=e8767]: system class
          - text: (solids, molecules, surfaces, layered materials all have different sweet spots); (ii) always include a dispersion correction on the fifth rung and above — the top of the ladder is no good for vdW-dominated systems without it.
      - heading "5.3 The code" [level=2] [ref=e8768]
      - paragraph [ref=e8769]:
        - text: The first script of the chapter, in
        - code [ref=e8770]: dft_notes/python_codes/chapter_05/01-ueg-xc-vs-rs.py
        - text: ", computes the"
        - strong [ref=e8771]: Dirac exchange
        - text: and the
        - strong [ref=e8772]: Perdew–Zunger correlation
        - text: of the UEG as a function of
        - img [ref=e8774]
        - text: and writes them to a PNG. The script is the runnable counterpart of the formulas in section 5.2.1. We inline the loadable parts here.
      - code [ref=e8785]: "# dft_notes/python_codes/chapter_05/01-ueg-xc-vs-rs.py # (full file is 248 lines; we inline the importable parts) import os import numpy as np import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt # ─── Reference values ────────────────────────────────────────────── # The Dirac-LDA exchange coefficient. eps_x(r_s) = -Cx / r_s with # Cx = (3 / (4 pi)) * (9 pi / 4)^{1/3} = 0.45816519... DIRAC_X_COEF = 0.458165 # Perdew-Zunger (1981), Table I, unpolarized UEG. # High-density branch: eps_c = B + A * ln(rs) + D * rs + C rs ln(rs) PZ_HIGH_DENSITY = { \"A\": 0.0311, \"B\": -0.0480, \"C\": 0.0020, \"D\": -0.0116, } # Low-density branch: eps_c = A_pz / (1 + B_pz * sqrt(rs) + C_pz * rs) PZ_LOW_DENSITY = { \"A\": -0.1423, \"B\": 1.0529, \"C\": 0.3334, } def dirac_exchange(rs): \"\"\"LDA exchange per particle (Dirac, 1930) in Hartree. eps_x(r_s) = -Cx / r_s \"\"\" return -DIRAC_X_COEF / rs def pz81_correlation_unpolarized(rs): \"\"\"Perdew-Zunger (1981) fit to Ceperley-Alder QMC, unpolarized.\"\"\" rs = np.asarray(rs, dtype=float) ec = np.empty_like(rs) mask_lo = rs < 1.0 rs_lo = rs[mask_lo] c = PZ_HIGH_DENSITY ec[mask_lo] = ( c[\"B\"] + c[\"A\"] * np.log(rs_lo) + c[\"D\"] * rs_lo + c[\"C\"] * rs_lo * np.log(rs_lo) ) rs_hi = rs[~mask_lo] c = PZ_LOW_DENSITY ec[~mask_lo] = c[\"A\"] / (1.0 + c[\"B\"] * np.sqrt(rs_hi) + c[\"C\"] * rs_hi) return ec def main() -> None: rs = np.linspace(0.5, 10.0, 500) ex = dirac_exchange(rs) ec_pz = pz81_correlation_unpolarized(rs) exc = ex + ec_pz print(\"=\" * 60) print(\"UEG exchange-correlation energy per particle\") print(\"Perdew-Zunger (1981) fit to Ceperley-Alder QMC,\") print(\"unpolarized UEG.\") print(\"=\" * 60) print(f\" At r_s = 2.00 bohr (close to Al):\") print(f\" eps_x = {dirac_exchange(np.array([2.0]))[0]:+.6f} E_h\") print(f\" eps_c (PZ81) = {pz81_correlation_unpolarized(np.array([2.0]))[0]:+.6f} E_h\") print(f\" eps_xc = {(dirac_exchange(np.array([2.0])) + pz81_correlation_unpolarized(np.array([2.0])))[0]:+.6f} E_h\")"
