        - emphasis [ref=e8485]: r-dependence
        - text: of the exchange; double hybrid sees the
        - emphasis [ref=e8486]: virtual
        - text: KS orbitals through MP2; dispersion sees the
        - emphasis [ref=e8487]: tail
        - text: of the density.
