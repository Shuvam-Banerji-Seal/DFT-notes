        - text: "the Kohn–Sham machinery is in place: we have a self-consistent one-body eigenvalue equation whose"
        - strong [ref=e48]: only
        - text: unphysical ingredient is the exchange–correlation functional
        - img [ref=e50]
        - text: . The Hohenberg– Kohn theorems (
        - link "chapter 02" [ref=e65] [cursor=pointer]:
