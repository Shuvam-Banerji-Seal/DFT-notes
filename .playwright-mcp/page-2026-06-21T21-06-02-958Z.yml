          - strong [ref=e9536]: LDA
          - text: over-correlates (it has
          - emphasis [ref=e9537]: "too muc`h"
          - text: ’ correlation in the low-density region of the He atom, because the LDA estimate of the
          - emphasis [ref=e9538]: correlation
          - text: "contribution from the density tail is too negative): error is"
          - img [ref=e9540]
          - text: above the exact. The LDA error is
          - emphasis [ref=e9556]: larger
          - text: than the HF error on He, which is the
          - emphasis [ref=e9557]: opposite
          - text: "of the standard message “LDA is better than HF”. The reader should remember: LDA is"
          - emphasis [ref=e9558]: not
          - text: uniformly better than HF, and the GGA is the rung that
          - emphasis [ref=e9559]: first
