      - heading "5.8 What we left out" [level=2] [ref=e9806]
      - paragraph [ref=e9807]:
        - text: This chapter is already long, but the subject of XC functionals is a
        - emphasis [ref=e9808]: literature
        - text: ", not a chapter, and a number of topics have been omitted for length. The reader should be aware of the following gaps."
      - list [ref=e9809]:
        - listitem [ref=e9810]:
          - strong [ref=e9811]: Screened hybrids in detail (HSE03, HSE06, PBE0-1/3).
          - text: The screened hybrids of section 5.2.7 are the workhorse of solid-state hybrid DFT, and the
          - emphasis [ref=e9812]: full
          - text: treatment of the range-separation error cancellation, the auxiliary basis used to evaluate the screened exchange, and the convergence properties of HSE vs PBE0 in plane-wave codes deserves more than a single paragraph. We gave the form of HSE06 and mentioned the screening parameter
          - img [ref=e9814]
          - text: ", but did not derive the"
          - emphasis [ref=e9826]: screening
          - text: itself.
        - listitem [ref=e9827]:
          - strong [ref=e9828]: Görling–Levy perturbation theory (GLPT).
          - text: The ACFDT argument of section 5.2.6 is the
          - emphasis [ref=e9829]: "physically motivate`d"
          - text: ’ derivation of the mixing fraction
          - img [ref=e9831]
          - text: . The
          - emphasis [ref=e9845]: mathematically rigorous
          - text: derivation is the Görling–Levy perturbation theory, which expands the interacting wavefunction in powers of the
          - emphasis [ref=e9846]: difference
          - text: between the true electron–electron interaction and the KS effective interaction, and shows that the GL2 (second-order) gives the
          - emphasis [ref=e9847]: exact
          - text: exchange and* the MP2-like correlation. We used the ACFDT language throughout for its physical clarity, but the GLPT machinery is the rigorous version. The reader interested in the
          - emphasis [ref=e9848]: derivation
          - text: should consult Görling and Levy’s original 1993–1994 papers.
        - listitem [ref=e9849]:
          - strong [ref=e9850]:
            - text: RPA and quantum-chemical composite methods (GNOF,
            - img [ref=e9852]
            - text: "-functionals, MC-PDFT)."
          - text: The
          - emphasis [ref=e9857]: "to`p"
          - text: ’ of Jacob’s ladder is the random-phase approximation (RPA), which uses the
          - emphasis [ref=e9858]: exact
          - text: (adiabatic) exchange and the ring-Coulomb* correlation. RPA is expensive (
          - img [ref=e9860]
          - text: to
          - img [ref=e9876]
          - text: ) and has a notorious
          - emphasis [ref=e9891]: self-correlation
          - text: error that makes it
          - emphasis [ref=e9892]: worse
          - text: than PBE0 on atomisation energies of small molecules. The
          - strong [ref=e9893]: multiconfiguration pair-density functional theory
          - text: (MC-PDFT) of Li Manni et al. and the
          - strong [ref=e9894]: generalised natural-orbital functional
          - text: (GNOF) of Piris and co-workers are the
          - emphasis [ref=e9895]: next
          - text: generation of post-KS methods that try to fix the self-correlation error of RPA. We did not cover any of them.
        - listitem [ref=e9896]:
          - strong [ref=e9897]: Machine-learned functionals (DeepMind’s DM21, OrbNet, SchNet).
          - text: The most recent (2021–present) development in the XC world is the
          - emphasis [ref=e9898]: machine-learning
          - text: of the XC functional. The DM21 functional of DeepMind (Kirkpatrick et al. 2021) was trained on a large set of
          - emphasis [ref=e9899]: exact
          - text: exchange–correlation energies from the hierarchical equations of motion and shows
          - emphasis [ref=e9900]: "systemati`c"
          - text: ’ improvements over hybrid functionals on a wide range of benchmarks. The functional is not a
          - emphasis [ref=e9901]: formula
          - text: ’ — it is a neural network* — so it does not fit neatly into the Jacob’s ladder picture. We did not cover it because the methodology is still rapidly evolving and the
          - emphasis [ref=e9902]: form
          - text: of the functional is not yet standardised.
        - listitem [ref=e9903]:
          - strong [ref=e9904]: The “rung above double hybrid” (rung 7) is not standardised.
          - text: The
          - emphasis [ref=e9905]: "sevent`h"
          - text: ’ rung of Jacob’s ladder is variously identified with RPA, with quantum-chemical composite methods like CCSD(T), or with multireference methods. There is no single “rung 7” that the community agrees on; the top of the ladder is
          - emphasis [ref=e9906]: open
          - text: . We left this gap in the table of section 5.2.10 explicit, but did not resolve it.
        - listitem [ref=e9907]:
          - strong [ref=e9908]: Self-interaction error and its fixes.
          - text: The self-interaction error of LDA/GGA — the fact that a one-electron system has a
          - emphasis [ref=e9909]: non-zero
          - img [ref=e9911]
          - text: in LDA — is a
          - emphasis [ref=e9920]:
            - text: systemati
            - code [ref=e9921]: c*' failure of all the local and semi-local rungs. The exact-exchange-only self-interaction correction (SIC) of Perdew and Zunger and the range-separated SIC of Vydrov and Scuseria are *systemati
            - text: c
          - text: ’ fixes. We mentioned the self-interaction error in passing in the worked example (section 5.5) but did not derive the SIC machinery.
