        - text: The full numerical demonstration is in
        - code [ref=e9703]: dft_notes/python_codes/chapter_05/02-pbe-vs-lda-atoms.py
        - text: ", which uses a Slater-type trial density for the He and Be atoms and integrates the LDA and PBE integrands on a radial grid. The script produces a bar chart comparing the LDA and PBE exchange and correlation energies of He and Be, and prints the PBE/LDA ratio of the exchange energy to the console."
