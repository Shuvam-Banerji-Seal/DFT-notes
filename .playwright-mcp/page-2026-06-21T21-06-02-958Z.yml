        - text: above the exact value (i.e. an LDA-like error) is almost certainly a bug in the gradient-enhancement code, not a feature of PBE.
      - paragraph [ref=e9606]:
        - strong [ref=e9607]: PBE0 on helium.
        - text: Adding 25% exact exchange (the PBE0 mix of section 5.2.6) gives
