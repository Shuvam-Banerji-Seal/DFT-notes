      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: Every approximation in this chapter has the form “guess the shape of
          - img [ref=e31]
          - text: ”. They differ in what they guess from — uniform electron gas, gradient expansions, exact exchange on a model system, empirical fits to a training set — and in how well they generalise.
      - paragraph [ref=e46]:
        - text: By the end of
        - link "chapter 04" [ref=e47] [cursor=pointer]:
