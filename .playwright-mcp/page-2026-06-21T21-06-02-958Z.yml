        - text: )
        - emphasis [ref=e66]: guarantee
        - text: that a unique such functional exists, but they say nothing about how to
        - emphasis [ref=e67]: write it down
        - text: . The Kohn–Sham reformulation (
        - link "chapter 04" [ref=e68] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: § 4.2) splits the exact energy into four pieces we can compute — non-interacting kinetic
