        - text: — a local density piece, a gradient piece, a kinetic-energy piece, a fraction of exact non-local Hartree–Fock exchange, a range-separation of that exchange, an MP2-like correlation correction, and an empirical dispersion patch. The “Jacob’s ladder” metaphor of Perdew and Schmidt (
