        - text: "[Kresse and Joubert, 1999, p. 1767]. This is the test that convinced the solid-state community that PAW is the"
        - emphasis [ref=e24286]: production
        - text: method of choice for magnetic transition-metal systems, and it is the single most-cited result of the 1999 paper [Kresse and Joubert, 1999, p. 1767].
      - paragraph [ref=e24287]:
        - text: The paper also includes a careful discussion of when the linearised US-PP functional
        - emphasis [ref=e24288]: fails
        - text: "[Kresse and Joubert, 1999, p. 1766]. The linearisation is poor when the augmentation charge"
        - img [ref=e24290]
        - text: is large (i.e. when the deficit between the all-electron and pseudo norm is large), which happens for shallow valence orbitals with high
        - img [ref=e24301]
        - text: character [Kresse and Joubert, 1999, p. 1766]. The
        - img [ref=e24307]
        - text: electrons of the late transition metals fall in this category, and the linearisation error of USPP for these systems is the
        - emphasis [ref=e24314]: physical
        - text: reason for the PAW accuracy advantage [Kresse and Joubert, 1999, p. 1766].
      - blockquote [ref=e24315]:
        - paragraph [ref=e24316]:
          - strong [ref=e24317]: Note.
          - text: "The 1999 paper has 50 references and is built almost entirely on the two preceding papers: Blöchl 1994 (ref. 8) and Vanderbilt 1990 (ref. 7) [Kresse and Joubert, 1999, refs. 7, 8, p. 1758]. The 1999 paper is not a"
          - emphasis [ref=e24318]: new
          - text: "method but a careful implementation paper: it derives the working equations, validates them against LAPW, and shows that the production cost of PAW is comparable to USPP. This is the paper that turned PAW from “Blöchl’s clever but expensive construction” into the default method of VASP and (later) of every other major plane-wave code [Kresse and Joubert, 1999, p. 1758]."
      - heading "8.15.5 Comparison of the three approaches" [level=3] [ref=e24319]
      - paragraph [ref=e24320]:
        - text: The three approaches — NC-PP, US-PP, and PAW — are
