      - paragraph [ref=e6555]: In practice, ultrasoft pseudopotentials (USPP) are about a factor of 2–3 more efficient than norm-conserving pseudo- potentials at the same accuracy for the same element. They are the workhorse of modern plane-wave DFT codes (VASP, Quantum ESPRESSO, CASTEP, ABINIT) for systems containing transition metals or rare earths.
