        - text: For the hydrogen pseudo constructed in § 8.8 with , use the inversion formula to show that is finite. Compute the value using the coefficients and confirm it is on the order of . Then argue, in one or two sentences, why the plane-wave cutoff required to expand a wavefunction in the pseudo-potential is much smaller than that required to expand the all-electron wavefunction.
