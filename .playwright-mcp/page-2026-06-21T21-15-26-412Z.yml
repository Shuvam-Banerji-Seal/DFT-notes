            - text: DFT+
            - img [ref=e20564]
            - text: is almost always required for
            - img [ref=e20570]
            - text: "-electron systems. The"
            - img [ref=e20576]
            - text: parameter is fitted to reproduce a known experimental property (band gap, oxidation energetics, lattice parameter) and is typically
            - img [ref=e20582]
            - text: –
            - img [ref=e20598]
            - text: for the lanthanides and
            - img [ref=e20607]
            - text: –
            - img [ref=e20623]
            - text: for the actinides.
        - listitem [ref=e20631]:
          - paragraph [ref=e20632]:
            - strong [ref=e20633]: Benchmark against an all-electron reference.
            - text: For production calculations on a new
            - img [ref=e20635]
            - text: "-electron system, it is worth running a small all-electron calculation (LAPW or full-potential PAW) on a representative structure to validate the pseudo choice. The cost of one all-electron calculation is typically"
            - img [ref=e20641]
            - text: –
            - img [ref=e20650]
            - text: times that of the PAW calculation, so this is a one-time validation, not a production cost.
      - blockquote [ref=e20657]:
        - paragraph [ref=e20658]:
          - strong [ref=e20659]: Tip.
          - text: The PAW reconstruction (§ 8.12) of an all-electron
          - img [ref=e20661]
          - text: orbital is
          - emphasis [ref=e20668]: very
          - text: accurate if the augmentation sphere contains the orbital’s first node (typically at
          - img [ref=e20670]
          - text: –
          - img [ref=e20680]
          - text: for the lanthanide
          - img [ref=e20693]
          - text: orbital) and the partial-wave basis includes the
          - img [ref=e20701]
          - text: channel. The error of the PAW reconstruction for a
          - img [ref=e20709]
          - text: eigenvalue is typically
          - img [ref=e20717]
          - text: –
          - img [ref=e20725]
          - text: ", which is well below the DFT error of"
          - img [ref=e20736]
          - text: –
          - img [ref=e20746]
          - text: for the same orbital. PAW is therefore
          - emphasis [ref=e20754]: the
          - text: method of choice for
          - img [ref=e20756]
          - text: "-electron systems, and the small-core / large-core choice is a"
          - emphasis [ref=e20761]: physics
          - text: decision (do the
          - img [ref=e20763]
          - text: electrons participate in the chemistry?) rather than a
          - emphasis [ref=e20768]: numerics
          - text: decision.
        - paragraph [ref=e20769]:
          - strong [ref=e20770]: Cross-reference.
          - text: The DFT+
          - img [ref=e20772]
          - text: method for treating strong correlation in
          - img [ref=e20778]
          - text: "-electron systems is in"
          - link "chapter 13" [ref=e20783] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: . The combination “small-core PAW + DFT+
          - img [ref=e20785]
          - text: ” is the standard tool for actinide chemistry (UO
          - img [ref=e20791]
          - text: ", PuO"
          - img [ref=e20798]
          - text: ", CmO"
          - img [ref=e20805]
          - text: ", etc.) and is used in nuclear-fuel modelling and waste-form design."
      - 'heading "8.15 The original pseudopotential papers: a literature deep-dive" [level=2] [ref=e20811]'
      - paragraph [ref=e20812]:
        - text: "The four papers below are the foundational documents of the modern pseudopotential field. Every production plane-wave DFT code — VASP, Quantum ESPRESSO, CASTEP, ABINIT, GPAW, CP2K, SIESTA — descends from one of them, and every “modern pseudopotential” in active use today can be traced back to one of their constructions. This section is a page-by-page walk through the original publications, with exact page numbers and equation references, so the reader can open the papers and find the derivation we are paraphrasing. The section complements §§ 8.1–8.14: those sections taught"
        - emphasis [ref=e20813]: what the methods do
        - text: ; this section teaches
        - emphasis [ref=e20814]: what the original authors said and where they said it
        - text: .
      - heading "8.15.1 The norm-conserving pseudopotential — Hamann, Schlüter & Chiang (1979)" [level=3] [ref=e20815]
      - paragraph [ref=e20816]: The paper that defined the modern norm-conserving pseudopotential is four pages long, has a single figure, and is one of the most-cited papers in all of computational physics (over 3,500 citations by 2024) [Hamann, Schlüter, and Chiang, 1979, abstract, p. 1494]. The authors are at Bell Laboratories; the paper was received 1 August 1979 and published 12 November 1979 [Hamann, Schlüter, and Chiang, 1979, p. 1494].
      - paragraph [ref=e20817]:
        - text: "The claim of the paper is on p. 1494, eq. (1): the pseudopotential is constructed so that, outside a chosen cutoff radius"
        - img [ref=e20819]
        - text: ", three quantities match between the all-electron wavefunction"
