      - paragraph [ref=e23547]:
        - strong [ref=e23548]: The frozen-core approximation
        - text: is discussed on p. 17958 [Blöchl, 1994, p. 17958]. The PAW formalism is
        - emphasis [ref=e23549]: exact
        - text: in the all-electron limit (no frozen core), but the practical calculation typically uses a
        - emphasis [ref=e23550]: frozen-core
        - text: PAW potential in which the core electrons are confined to the augmentation sphere and treated as rigid [Blöchl, 1994, p. 17958]. The paper notes that this is the same frozen-core approximation as in the NC-PP and USPP methods, with the
        - emphasis [ref=e23551]: advantage
        - text: over NC-PP/USPP that the on-site density matrix
        - img [ref=e23553]
        - text: still gives the
        - emphasis [ref=e23566]: exact
        - text: core density inside
        - img [ref=e23568]
        - text: (because the all-electron partial waves are used) [Blöchl, 1994, p. 17958]. The PAW frozen-core error is therefore much smaller than the NC-PP frozen-core error at the same plane-wave cutoff, and
        - emphasis [ref=e23576]: this
        - text: is the practical reason PAW is the method of choice for heavy elements with deep cores [Blöchl, 1994, p. 17958].
      - blockquote [ref=e23577]:
        - paragraph [ref=e23578]:
          - strong [ref=e23579]: Note.
          - text: "The 1994 paper has 75 references and cites both Hamann 1979 and Vanderbilt 1990 in the construction (refs. 8 and 9) [Blöchl, 1994, refs. 8, 9, p. 17953]. The relationship to the ultrasoft formalism is explicit: § II.E of the paper (p. 17956) shows that the ultrasoft construction is recovered in the limit of"
          - emphasis [ref=e23580]: one partial wave per channel
          - text: with the occupation matrix linearised [Blöchl, 1994, p. 17956]. This is the foundational connection that Kresse and Joubert will exploit five years later in their 1999 implementation paper.
      - heading "8.15.4 The Kresse–Joubert PAW implementation (1999)" [level=3] [ref=e23581]
      - paragraph [ref=e23582]: Kresse and Joubert’s 1999 paper is 18 pages long and is the paper that turned PAW from a mathematical construction into a working plane-wave code [Kresse and Joubert, 1999, p. 1758]. The authors were at TU Wien (Kresse) and the University of the Witwatersrand (Joubert); the paper was received 6 July 1998 and published 15 January 1999 [Kresse and Joubert, 1999, p. 1758]. It has over 71,000 citations, and is the standard reference for the VASP implementation of PAW [Kresse and Joubert, 1999, p. 1758].
      - paragraph [ref=e23583]:
        - strong [ref=e23584]: The transformation from US-PP to PAW
        - text: is eqs. (4)–(5), p. 1761 [Kresse and Joubert, 1999, eqs. (4)–(5), p. 1761]. The key observation is that the Vanderbilt ultrasoft energy functional [eq. (3) of the paper, p. 1760] can be obtained by
        - emphasis [ref=e23585]: linearising
