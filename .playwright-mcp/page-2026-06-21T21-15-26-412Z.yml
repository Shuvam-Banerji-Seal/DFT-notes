      - paragraph [ref=e20112]:
        - text: The Frobenius-norm cost function
        - img [ref=e20114]:
          - link [ref=e20117] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-08-hgh-cost"
        - text: "is a stronger transferability criterion than the single-configuration TM construction of § 8.4: it requires the pseudo to reproduce the energy dependence of the log-derivative"
        - emphasis [ref=e20125]: across
        - text: a set of configurations, not just at the single reference used for the construction. The resulting pseudos are more transferable at the cost of being slightly less smooth (the additional constraints require a smaller cutoff or more parameters).
      - paragraph [ref=e20126]:
        - text: "The HGH library is distributed in several formats:"
        - strong [ref=e20127]: HGH
        - text: (numerical tabulated potentials, the original form),
        - strong [ref=e20128]: GTH
        - text: (Goedecker–Teter–Hutter, an analytical-fit form optimised for Gaussian basis sets in CP2K), and
        - strong [ref=e20129]: ONCV
        - text: (Optimised Norm-Conserving Vanderbilt, the modern descendant in Quantum ESPRESSO and ABINIT). For
        - img [ref=e20131]
        - text: "-electron systems the ONCV form is the most widely used, as it combines the HGH transferability criterion with the smoothness of the Vanderbilt form. The ONCV-PSlibrary (Dal Corso, 2014) provides"
        - img [ref=e20137]
        - text: "-electron ONCV potentials for the entire lanthanide and actinide series, with both small-core and large-core options where applicable."
