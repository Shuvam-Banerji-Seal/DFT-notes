        - generic "▸ Show answer" [ref=e11862] [cursor=pointer]
        - text: "For the TM ansatz with , the pseudo-wavefunction is . Substituting into : The potentially singular term is . With : which is finite at (no divergence). The remaining terms and are also finite at the origin. So exists and equals With the analytical 3-parameter values from : The 4-parameter TM form (computed by the script) gives , which is within of the analytical value; the difference is the norm-conservation correction. The all-electron potential at the same point is , and at it is . The plane-wave cutoff needed to resolve a potential of depth is roughly (because the wavefunction has oscillations per unit length inside the well, and the Fourier spectrum of an oscillating function of frequency decays on the scale ). The pseudo-potential well has depth , requiring . The all-electron well diverges, so any finite is insufficient to converge; the all-electron problem *cannot* be solved in a plane-wave basis without resorting to a pseudo."
      - group [ref=e11863]:
        - generic "▸ Problem 2 (medium) — verify norm conservation numerically" [ref=e11864] [cursor=pointer]
        - text: For the hydrogen pseudo of § 8.8, evaluate the two integrals and confirm that they agree to numerical precision when the four-parameter TM form is used. The all-electron integral has the closed form ; the pseudo integral must be evaluated by quadrature. Then repeat the calculation for the *three*-parameter TM form (i.e. set and re-solve conditions 1, 2, 3 only). How large is the norm-conservation error ? What does this tell you about the trade-off between the number of free parameters and the transferability of the resulting pseudo-potential?
      - group [ref=e11865]:
        - generic "▸ Show answer" [ref=e11866] [cursor=pointer]
        - text: "**Closed form for .** Differentiate twice by parts, or recognise the standard integral So At : **Pseudo integral for the 4-parameter form.** With from : This is computed by quadrature in the script. The TM 4-parameter form was constructed with the norm conservation as an explicit constraint, so the result is to machine precision. (The `fsolve`' solver iterates until the residual is below .) **3-parameter form.** With , the linear conditions , , give (working through the algebra as in § 8.8): Evaluating for this case: The norm-conservation error is or about in relative terms. **Interpretation.** The 3-parameter form matches the all-electron value, first derivative, and second derivative at exactly; the norm is then *approximately* conserved, with an error of order . For a 3-parameter form, the norm error of translates to a logarithmic-derivative mismatch of in a perturbed environment. For most applications this is acceptable; for high-pressure or high-strain calculations where the chemical environment changes significantly from the construction reference, the 6-parameter TM form is preferred."
      - group [ref=e11867]:
        - generic "▸ Problem 3 (hard) — derive the log-derivative identity" [ref=e11868] [cursor=pointer]
        - text: In § 8.3 we used the identity to prove the transferability theorem. Re-derive this identity from the radial Schrödinger equation by the following steps. 1. Write the radial equation with , and the analogous equation for the energy derivative . 2. Multiply the equation for by and the equation for by , subtract, and integrate from to . Use the boundary conditions , to drop the lower-limit terms. 3. Combine the two resulting boundary terms at into a single expression, then divide by to recognise the energy derivative of the logarithmic derivative . 4. Finally, use the *normalisation* constraint to argue that the change in norm on is small, so the integral can be neglected. (The assumption is exact when is beyond the first radial node of .)
      - group [ref=e11869]:
        - generic "▸ Show answer" [ref=e11870] [cursor=pointer]
        - text: "**Step 1 — the two radial equations.** The all-electron radial Schrödinger equation is Differentiate with respect to : where . Equivalently, **Step 2 — subtract and integrate.** Multiply by and by , then subtract: The terms cancel, leaving Integrate from to : **Step 3 — integration by parts.** Integrate the second term by parts once: Integrate the first term by parts once: The two integrals are identical, so they cancel. The boundary terms give (with , ): Rearranging: **Step 4 — the log-derivative identity.** Divide by . The right-hand side is a known integral; the left-hand side is, by the quotient rule, (Note the minus sign from the order in the quotient rule: , , which is the negative of the left-hand side of ( ) divided by .) So This is equation of § 8.3. **Step 5 — the normalisation assumption.** The derivation above did *not* use the normalisation constraint. The result is exact as written. The *additional* step that lets us drop the term in § 8.3 came from the *boundary* form of the integral, not the volume form. The volume form would be which is non-zero in general. We can drop it in ( )-style derivations only when the energy derivative of the *total* normalisation is zero (i.e. when the normalisation is preserved), and the energy derivative of the *outside* norm is also zero. The latter is exact when is at or beyond the first radial node of — the wavefunction outside then has fixed shape and its squared-norm only changes by the trivial normalisation correction. (For a hydrogen orbital, has no nodes at all, so the assumption is approximate; the correction is small and proportional to the energy derivative of the exponential tail, which is also small.)"
      - heading "8.11 What we left out" [level=2] [ref=e11871]
      - paragraph [ref=e11872]: Pseudopotential theory is a deep subject with many branches we did not cover. The following are the most important omissions.
      - list [ref=e11873]:
        - listitem [ref=e11874]:
          - paragraph [ref=e11875]:
            - strong [ref=e11876]: Non-linear core corrections (NLCC).
            - text: When the pseudo-potential is used in an environment where the valence density overlaps significantly with the core (high-pressure phases,
            - img [ref=e11878]
            - text: transition metals with semicore states, alkali metals), the linear-response transferability theorem of § 8.3 is not enough. The correction is to add a partial core density
            - img [ref=e11886]
            - text: to the XC potential computation, evaluated self-consistently. Louie, Froyen, and Cohen,
            - emphasis [ref=e11903]: Phys. Rev. B
            - strong [ref=e11904]: "26"
            - text: ", 1738 (1982)."
        - listitem [ref=e11905]:
          - paragraph [ref=e11906]:
            - strong [ref=e11907]: Relativistic and scalar-relativistic pseudo-potentials.
            - text: For
            - img [ref=e11909]
            - text: the all-electron reference must be a four-component Dirac–Fock (or scalar-relativistic approximation). The resulting pseudo has a spin–orbit term that we did not write down. Kleinman,
            - emphasis [ref=e11919]: Phys. Rev. B
            - strong [ref=e11920]: "21"
            - text: ", 2630 (1980)."
        - listitem [ref=e11921]:
          - paragraph [ref=e11922]:
            - strong [ref=e11923]: Frobenius norm and multi-reference optimisation.
            - text: The TM construction in § 8.4 uses a
            - emphasis [ref=e11924]: single
            - text: reference configuration (typically the neutral atom ground state). For elements with several competing valence configurations (e.g. Mn with
            - img [ref=e11926]
            - text: vs
            - img [ref=e11944]
            - text: ), one must minimise the error across
            - emphasis [ref=e11961]: all
            - text: reference states simultaneously. The construction then becomes a non-linear optimisation in a high-dimensional parameter space; the “fingerprint” test of accuracy is the reproduction of the all-electron eigenvalue spectrum across the reference set. Hamann,
            - emphasis [ref=e11962]: Phys. Rev. B
            - strong [ref=e11963]: "88"
            - text: ", 085117 (2013)."
        - listitem [ref=e11964]:
          - paragraph [ref=e11965]:
            - strong [ref=e11966]:
              - text: The
              - img [ref=e11968]
              - text: "-channel and beyond."
            - text: Our example used
            - img [ref=e11974]
            - text: only. For each new
            - img [ref=e11984]
            - text: the same recipe applies, but the polynomial ansatz must be re-parameterised and the matching conditions re-evaluated. In practice one constructs
            - img [ref=e11990]
            - text: up to
            - img [ref=e12000]
            - text: (typically
            - img [ref=e12015]
            - text: or
            - img [ref=e12030]
            - text: ) explicitly and uses a local part
            - img [ref=e12036]
            - text: for all higher
            - img [ref=e12067]
            - text: — the high-
            - img [ref=e12073]
            - text: channels see only a tiny fraction of the core and are well approximated by the local part alone.
        - listitem [ref=e12078]:
          - paragraph [ref=e12079]:
            - strong [ref=e12080]: The on-the-fly generation of pseudo-potentials.
            - text: Modern all-electron codes (FLEUR, exciting, Elk) do not use tabulated pseudo-potentials at all; they solve the all-electron problem in a muffin-tin geometry. This is conceptually simpler (no pseudo-potential construction) but computationally more demanding and harder to combine with plane-wave basis sets.
        - listitem [ref=e12081]:
          - paragraph [ref=e12082]:
            - strong [ref=e12083]: Frozen-core vs. all-electron PAW.
            - text: The PAW method of § 8.7 was presented as “exact within the partial- wave basis”, but the partial-wave basis is itself a choice. The deeper the partial waves are taken (i.e. the larger the augmentation-sphere radius), the more accurate the PAW reconstruction, but the more expensive the computation. The trade-off is
            - emphasis [ref=e12084]: exactly
            - text: the same as the choice of
            - img [ref=e12086]
            - text: in a norm-conserving pseudo.
