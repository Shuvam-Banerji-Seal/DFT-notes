      - heading "8.14.5 Practical recommendations" [level=3] [ref=e20476]
      - paragraph [ref=e20477]:
        - text: For an
        - img [ref=e20479]
        - text: "-electron calculation in a modern plane-wave code, the recommended workflow is:"
      - list [ref=e20484]:
        - listitem [ref=e20485]:
          - paragraph [ref=e20486]:
            - strong [ref=e20487]: Decide on the core/valence partition.
            - text: For the early lanthanides (La–Nd) and for the actinides (Ac–Cm), the
            - img [ref=e20489]
            - text: electrons are chemically active and a small-core potential is almost always required. For the late lanthanides (Tb–Lu) where the
            - img [ref=e20495]
            - text: shell is half-filled or more, a large-core potential may be acceptable for properties that do not involve
            - img [ref=e20503]
            - text: excitations.
        - listitem [ref=e20508]:
          - paragraph [ref=e20509]:
            - strong [ref=e20510]: Check the reference configuration.
            - text: The pseudo’s transferability is anchored to the reference configuration used in the construction. If the actual valence configuration is far from the reference (e.g. Ce
            - img [ref=e20512]
            - text: in CeO
            - img [ref=e20522]
            - text: with no
            - img [ref=e20529]
