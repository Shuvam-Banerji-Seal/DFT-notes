      - paragraph [ref=e24258]:
        - text: A second test is the magnetic energy of bcc Fe, hcp Co, and fcc Ni [Kresse and Joubert, 1999, p. 1767]. The PAW calculation gives a Curie temperature and a magnetic moment within
        - img [ref=e24260]
        - text: of the LAPW reference, while USPP underestimates the moment by
