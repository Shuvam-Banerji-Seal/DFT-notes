          - text: (zero curvature of the pseudo-potential at the origin)
      - paragraph [ref=e5950]:
        - text: The last condition is a
        - emphasis [ref=e5951]: shape
        - text: "constraint: it forces the pseudo-potential to be flat at the origin, which is what physically reasonable effective potentials look like. With these four conditions and four parameters, the system is determined."
      - paragraph [ref=e5952]: The HST form is what one finds in the older Bachelet–Hamann–Schlüter (BHS) tabulations (BHS 1982) and in the original Vanderbilt norm-conserving tables. It is sufficiently accurate for most solid-state applications but yields a pseudo-wavefunction that is slightly less smooth than TM (because there are fewer free parameters to absorb the constraint violations). For a worked example the differences between HST and TM are minor; for a high-throughput production pseudo-potential library, TM is the standard.
      - blockquote [ref=e5953]:
        - paragraph [ref=e5954]:
          - strong [ref=e5955]: Tip.
          - text: The norm-conservation condition in HST is
          - emphasis [ref=e5956]: not
