      - heading "8.15.3 The PAW method — Blöchl (1994)" [level=3] [ref=e22626]
      - paragraph [ref=e22627]:
        - text: Blöchl’s 1994 paper is 27 pages long and is one of the longest foundational papers in the field [Blöchl, 1994, p. 17953]. The author was then at IBM Zurich; the paper was received 22 August 1994 and published 15 December 1994 [Blöchl, 1994, p. 17953]. It has over 77,000 citations and is the
        - emphasis [ref=e22628]: Physical Review B
        - text: 50th Anniversary Milestone [Blöchl, 1994, p. 17953].
      - paragraph [ref=e22629]: The paper is organised in seven sections (numbered I–VII in the original), and the structure of the PAW method is built up over the first three sections. Section I introduces the linear transformation; Section II defines the partial waves and projectors; Section III reconstructs the all-electron wavefunction; Section IV applies the transformation to expectation values; Section V derives forces; Section VI gives applications; and Section VII contains the frozen-core discussion [Blöchl, 1994, p. 17953–17954].
