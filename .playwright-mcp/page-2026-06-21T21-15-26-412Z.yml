      - paragraph [ref=e5673]:
        - text: The
        - strong [ref=e5674]: Hamann–Schlüter–Teter (HST, 1979)
        - text: form is the predecessor of the TM construction. It uses the same exponential-in-
        - img [ref=e5676]
        - text: "ansatz as TM, but with a smaller number of parameters and a slightly different set of matching conditions:"
