      - heading "8.14.3 The HGH and ONCV potentials (ABINIT, CP2K, Quantum ESPRESSO)" [level=3] [ref=e19897]
      - paragraph [ref=e19898]:
        - text: The
        - strong [ref=e19899]: Hamann-generated HGH
        - text: (Hamann, 2013) pseudopotentials are an alternative family that focuses on
        - emphasis [ref=e19900]: transferability
        - text: "through a multireference optimisation. The construction procedure is:"
      - list [ref=e19901]:
        - listitem [ref=e19902]: Solve the all-electron problem (scalar relativistic, including the mass-velocity and Darwin corrections) for several reference configurations spanning the expected oxidation states of the element.
        - listitem [ref=e19903]:
          - text: Construct the pseudo-wavefunctions
