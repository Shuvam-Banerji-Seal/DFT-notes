      - paragraph [ref=e20963]:
        - strong [ref=e20964]: The construction procedure
        - text: "is on p. 1495–1496 [Hamann, Schlüter, and Chiang, 1979, p. 1495–1496]. The recipe is, in modern notation:"
      - list [ref=e20965]:
