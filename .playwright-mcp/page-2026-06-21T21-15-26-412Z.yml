      - heading "8.2 Why pseudopotentials" [level=2] [ref=e714]
      - paragraph [ref=e715]: Three motivations, in increasing order of practical importance.
      - paragraph [ref=e716]:
        - strong [ref=e717]: (1) Smoothness of the wavefunction.
        - text: The all-electron
        - img [ref=e719]
        - text: orbital of a heavy atom has
        - img [ref=e727]
        - text: oscillations inside a Bohr radius. Expanding such a function in a plane-wave basis (the natural basis for periodic solids,
        - link "chapter 07" [ref=e734] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: ", and one of the two main basis families of"
        - link "chapter 06" [ref=e735] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: ) requires a cutoff
        - img [ref=e737]
        - text: — a prohibitive cost. The pseudo-wavefunction is nodeless inside
        - img [ref=e767]
        - text: ", so its Fourier transform decays as"
        - img [ref=e776]
        - text: for small
        - img [ref=e798]
        - text: and the required cutoff drops to
        - img [ref=e804]
        - text: –
        - img [ref=e813]
        - text: ", independent of"
        - img [ref=e823]
        - text: . This is the single biggest reason plane-wave DFT is feasible at all.
      - paragraph [ref=e828]:
        - strong [ref=e829]: (2) Absorption of relativistic effects.
        - text: Near a heavy nucleus, the electron moves at a significant fraction of the speed of light and the non-relativistic Schrödinger equation breaks down. With a pseudopotential, the relativistic correction is absorbed into
        - img [ref=e831]
        - text: at
        - emphasis [ref=e852]: construction time
        - text: (using a four-component Dirac–Fock all-electron reference instead of a non-relativistic one) and the valence calculation can stay non-relativistic.
      - paragraph [ref=e853]:
        - strong [ref=e854]: (3) Valence-only chemistry.
        - text: Chemistry is determined by the valence electrons. A carbon atom inside a methane molecule and a carbon atom inside a benzene ring have nearly identical
        - img [ref=e856]
        - text: orbitals. Treating only the 4 valence electrons instead of all 12 cuts the cost of the SCF loop by a factor of 3
        - emphasis [ref=e863]: "an`d"
        - text: "’ removes a stiff constraint (the orthogonality of valence orbitals to the core) that would otherwise force the valence basis to span the rapidly- oscillating core. The frozen-core approximation is implicit in every pseudopotential: the core is assumed to be the same in every chemical environment."
