          - img [ref=e5967]
          - text: shape constraint. The HST pseudo is therefore only
          - emphasis [ref=e5996]: approximately
          - text: norm-conserving; the
          - img [ref=e5998]
          - text: integral differs from the all-electron value by an amount that depends on
          - img [ref=e6024]
          - text: and on the orbital. For transferability, one often
          - emphasis [ref=e6032]: re-scales
          - text: the pseudo-potential after the HST construction to enforce norm-conservation exactly; this is the “norm-conserving HST” variant in some libraries.
