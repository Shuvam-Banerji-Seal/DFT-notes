      - paragraph [ref=e24581]:
        - text: "The table makes a hierarchy explicit: NC-PP is the"
        - emphasis [ref=e24582]: cheapest
        - text: and least accurate, US-PP is the
        - emphasis [ref=e24583]: cheaper
        - text: and more accurate for soft elements, and PAW is the
        - emphasis [ref=e24584]: most expensive
        - text: and most accurate for
        - emphasis [ref=e24585]: all
        - text: "elements. The three are not competitors for the same niche: NC-PP is the right tool for a"
        - emphasis [ref=e24586]: small, soft-element
        - text: molecule where every millihartree matters; US-PP is the right tool for a
        - emphasis [ref=e24587]: large, soft-to-medium
        - text: solid where the cost saving from the lower cutoff dominates; PAW is the right tool for
        - emphasis [ref=e24588]: any system containing hard elements
        - text: (transition metals, rare earths, actinides) and for
        - emphasis [ref=e24589]: production workflows
        - text: where the additional implementation complexity is acceptable [Kresse and Joubert, 1999, p. 1766–1767].
      - paragraph [ref=e24590]: The unification of the three approaches in the Blöchl transformation is illustrated in the Mermaid diagram below. The diagram shows the three “approximations” one can make to the full PAW energy — dropping the non-linear terms gives USPP; dropping the augmentation entirely and using a single projector gives NC-PP — and the resulting trade-off between accuracy and computational cost.
