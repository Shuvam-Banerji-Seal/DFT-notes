      - paragraph [ref=e21730]:
        - text: The paper emphasises two consequences of the norm-conservation condition that are easy to miss [Hamann, Schlüter, and Chiang, 1979, p. 1495]. First, the condition makes the pseudo
        - emphasis [ref=e21731]: charge-state dependent
        - text: ": for an atom in the configuration"
        - img [ref=e21733]
        - text: the core charge
        - img [ref=e21747]
        - text: depends on
        - img [ref=e21787]
        - text: and
        - img [ref=e21793]
        - text: ", so a different pseudo is required for each oxidation state [Hamann, Schlüter, and Chiang, 1979, p. 1495]. This was a major issue in the 1979 paper and is the main reason later authors (BHS 1982, TM 1991) introduced multi-reference optimisation. Second, the norm-conservation condition makes the pseudo"
        - emphasis [ref=e21798]: non-linear
        - text: "in the occupation: the energy functional contains"
        - img [ref=e21800]
        - text: terms that depend on the wavefunction normalisation, and these terms must be included self-consistently [Hamann, Schlüter, and Chiang, 1979, p. 1495].
      - paragraph [ref=e21832]:
        - strong [ref=e21833]: The test calculation on Si
        - text: is on p. 1496 [Hamann, Schlüter, and Chiang, 1979, p. 1496]. The authors construct a norm-conserving
        - img [ref=e21835]
        - text: and
        - img [ref=e21841]
        - text: pseudo for the silicon valence (
        - img [ref=e21847]
        - text: ", core ="
        - img [ref=e21865]
        - text: = 10 electrons) and use it in a self-consistent plane-wave calculation of the silicon crystal [Hamann, Schlüter, and Chiang, 1979, p. 1496]. The resulting band structure matches the all-electron calculation to within
        - img [ref=e21890]
        - text: across the valence and lower conduction bands, with the
        - emphasis [ref=e21902]: transferability test
        - text: (the pseudo built from a Si
        - img [ref=e21904]
        - text: reference gives the correct Si
        - img [ref=e21912]
        - text: bands) passed to within the same tolerance [Hamann, Schlüter, and Chiang, 1979, p. 1496]. This is the first demonstration that a norm-conserving pseudopotential is
        - emphasis [ref=e21918]: transferable
        - text: between different chemical environments, and it is the result that made the construction the workhorse of solid-state DFT for the next decade [Hamann, Schlüter, and Chiang, 1979, p. 1496].
      - paragraph [ref=e21919]:
        - text: "The same 1979 paper also reports the first “fingerprint” test for pseudopotential transferability: the logarithmic derivative"
        - img [ref=e21921]
        - text: is plotted as a function of energy, and the all-electron and pseudo curves are compared over an energy range of several eV [Hamann, Schlüter, and Chiang, 1979, p. 1496]. A norm-conserving pseudo matches the all-electron
        - img [ref=e21943]
        - text: to first order in
        - img [ref=e21965]
        - text: over this range, and the residual discrepancy is a quantitative measure of the “transferability error” [Hamann, Schlüter, and Chiang, 1979, p. 1496]. The fingerprint test is still used today (e.g. in the ONCV library, § 8.14.3) as the standard diagnostic for pseudopotential quality.
      - blockquote [ref=e21977]:
        - paragraph [ref=e21978]:
          - strong [ref=e21979]: Note.
          - text: "The 1979 paper is short enough (4 pages, 12 references) that the entire construction fits in one sitting. The references are revealing: 4 of the 12 cite earlier pseudopotential work (Appelbaum–Hamann, Schlüter–Chelikowsky–Louie–Cohen, Zunger–Cohen, Shaw–Harrison), and only one (Louie 1978) predates the norm-conservation condition [Hamann, Schlüter, and Chiang, 1979, refs. 2, 10, p. 1494]. The norm-conservation condition is therefore the 1979 paper’s central conceptual contribution; the inversion construction was already standard."
