      - paragraph [ref=e7139]:
        - text: "The trade-off: PAW is more expensive than USPP per atom (typically a factor of 2–5), but the augmentation-sphere treatment of the core is much more accurate and the method admits a wide variety of partial-wave basis sets (including"
