      - blockquote [ref=e7164]:
        - paragraph [ref=e7165]:
          - strong [ref=e7166]: Tip.
          - text: PAW is the “no frozen core” limit of USPP. The augmentation charge in USPP is a single function per channel; in PAW it is a sum of partial-wave densities weighted by the projector overlaps. The USPP formalism can be derived as a linearised, single-projector version of PAW; conversely, PAW can be derived as the “non-linear, complete-projector” version of USPP. The two methods live on the same continuum.
        - paragraph [ref=e7167]:
