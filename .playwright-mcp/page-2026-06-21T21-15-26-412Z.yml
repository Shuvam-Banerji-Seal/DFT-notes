          - strong [ref=e18796]: spin-orbit coupling
          - text: "can be included as a non-collinear extension of the standard collinear spin-polarisation framework: the Kohn–Sham wavefunctions become two-component Pauli spinors"
          - img [ref=e18798]
          - text: ", and the Hamiltonian includes a"
          - img [ref=e18852]
          - text: matrix in spin space. The pseudopotential contributes a
          - img [ref=e18862]
          - text: term that couples
          - img [ref=e18874]
          - text: to
          - img [ref=e18886]
          - text: . The cost increase over a non-spin-orbit calculation is typically a factor of 2 in the diagonalisation and 4–8 in memory (because the wavefunction is now
          - img [ref=e18898]
          - text: complex numbers instead of
          - img [ref=e18906]
          - text: ).
        - paragraph [ref=e18911]:
          - strong [ref=e18912]: Cross-reference.
          - text: Spin-orbit coupling is essential for the topological classification of band structures (
          - link "chapter 07" [ref=e18913] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: ). The
          - img [ref=e18915]
          - text: invariant of a 2D or 3D topological insulator is defined from the occupied-band wavefunctions
          - emphasis [ref=e18924]: including
          - text: spin-orbit coupling; without it, every insulator is trivial.
