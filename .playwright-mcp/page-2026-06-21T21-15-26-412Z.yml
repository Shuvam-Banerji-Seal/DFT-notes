      - heading "Chapter 08 — Pseudopotentials" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: The whole valence-electron problem can be solved without ever describing the core electrons explicitly, provided we replace the true nuclear-plus-core potential by an
          - emphasis [ref=e30]: effective
          - text: potential that reproduces what the valence electron actually feels outside a cutoff radius
          - img [ref=e32]
          - text: . The construction is exact in the limit
          - img [ref=e41]
          - text: and very accurate in practice for
          - img [ref=e54]
          - text: between half and twice the core radius.
      - paragraph [ref=e62]:
        - text: A self-consistent Kohn–Sham calculation (
        - link "chapter 04" [ref=e63] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: ) treats
        - emphasis [ref=e64]: every
        - text: "electron in the system on the same footing. For a silicon atom this is 14 electrons; for a platinum atom it is 78. Of these, the inner-shell electrons never participate in chemistry — they sit in tight orbitals close to the nucleus, contribute a nearly-constant charge density at the bond length scale, and barely respond to changes in the chemical environment. The cost of treating them in the basis is enormous: their wavefunctions oscillate rapidly near the nucleus (an atomic unit of length is"
        - img [ref=e66]
        - text: ", so the"
        - img [ref=e79]
        - text: orbital of uranium has 30 oscillations inside a typical basis-set cutoff). The
        - strong [ref=e86]: pseudopotential approximation
        - text: replaces the all-electron problem with a much smaller
        - emphasis [ref=e87]: valence-only
        - text: problem that, by construction, reproduces the all-electron valence wavefunction outside a chosen
        - strong [ref=e88]: cutoff radius
        - img [ref=e90]
        - text: . Inside
        - img [ref=e99]
        - text: the wavefunction is replaced by a smooth
        - strong [ref=e107]: pseudo-wavefunction
        - text: that has
        - emphasis [ref=e108]: no nodes
        - text: and matches the all-electron one continuously. The replacement is not a mathematical identity; it is an
        - emphasis [ref=e109]: approximation
        - text: whose accuracy is controlled by the choice of
        - img [ref=e111]
        - text: and by the
        - strong [ref=e119]: norm-conservation condition
        - text: that ensures the pseudo-potential is
        - emphasis [ref=e120]: transferable
        - text: between different chemical environments. This chapter is the construction recipe, the proofs, and the algorithms (Troullier– Martins, Hamann–Schlüter–Teter, Vanderbilt ultrasoft, and Blöchl’s PAW) by which the approximation is made usable.
