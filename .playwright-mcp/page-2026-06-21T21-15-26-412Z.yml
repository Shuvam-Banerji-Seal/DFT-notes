      - paragraph [ref=e24668]:
        - text: "The diagram encodes the central message of the 1999 Kresse–Joubert paper: the three methods are"
        - emphasis [ref=e24669]: limits of a single formalism
        - text: ", and the choice between them is a choice about"
        - emphasis [ref=e24670]: "which terms in the energy expression to kee`p"
        - text: "’ [Kresse and Joubert, 1999, p. 1761]. The “expensive” path through full PAW gives the best accuracy; the “cheap” path through NC-PP gives the lowest cost; the “moderate” path through USPP is the historical sweet spot of VASP versions 1–4. ### 8.15.6 What these papers don’t say"
      - paragraph [ref=e24671]:
        - text: The four foundational papers are remarkably complete on the formal side — between them, they cover every pseudopotential concept in active use today. But they are also
        - emphasis [ref=e24672]:
          - text: historically situate
          - code [ref=e24673]: d*
          - text: ", and several topics that the modern user takes for granted are *absent"
        - text: from the original papers. The list below spells out the most important omissions.
      - paragraph [ref=e24674]:
        - strong [ref=e24675]: (1) No relativistic effects.
        - text: "The Hamann 1979 construction is non-relativistic; the all-electron reference is a non-relativistic Schrödinger solution [Hamann, Schlüter, and Chiang, 1979, p. 1495]. Vanderbilt 1990 is also non-relativistic [Vanderbilt, 1990, p. 7893]. Blöchl 1994 mentions relativistic effects in the conclusion (p. 17979) but does not give a working relativistic PAW construction [Blöchl, 1994, p. 17979]. Kresse and Joubert 1999 do include a scalar-relativistic discussion, but the spin-orbit extension of the formalism is not in the paper [Kresse and Joubert, 1999, p. 1768]. The fully relativistic (four-component Dirac) PAW construction had to wait for later work (e.g. Devereux 2007 and the BERTHA / DIRAC codes). The practical implication: for elements with"
        - img [ref=e24677]
        - text: ", the modern user must use a relativistic extension of the formalism — which the original papers do not provide."
      - paragraph [ref=e24687]:
        - strong [ref=e24688]: (2) No non-linear core corrections (NLCC).
        - text: The NC-PP construction of 1979 has
        - emphasis [ref=e24689]: "no"
        - text: partial-core density; the core is replaced by a rigid effective potential [Hamann, Schlüter, and Chiang, 1979, p. 1495]. The PAW reconstruction of 1994
        - emphasis [ref=e24690]: does
        - text: allow non-linear core corrections through the on-site density matrix, but the paper does not emphasise this point and does not test the resulting formalism [Blöchl, 1994, p. 17958]. The Louie– Froyen–Cohen NLCC for NC-PP [Phys. Rev. B
        - strong [ref=e24691]: "26"
        - text: ", 1738 (1982)] is the standard textbook reference, but it is not in the four papers. The modern user who needs accurate alkali or alkaline-earth chemistry must add NLCC manually, or use a small-core / large-core choice as in § 8.14."
        - strong [ref=e24692]: (3) No spin polarisation in the original construction.
        - text: The norm-conservation condition of eq. (1) of Hamann 1979 is
        - emphasis [ref=e24693]:
          - text: spin-average
          - code [ref=e24694]: d*
          - text: ": it applies to a single"
          - img [ref=e24696]
          - text: per channel [Hamann, Schlüter, and Chiang, 1979, eq. (1), p. 1494]. Spin-polarised calculations (different
          - img [ref=e24711]
          - text: for spin-up and spin-down) require a *separate
        - text: norm-conservation condition per spin channel, which the 1979 paper does not discuss [Hamann, Schlüter, and Chiang, 1979, p. 1495]. The PAW formalism of Blöchl 1994
        - emphasis [ref=e24719]: does
        - text: admit spin-polarisation naturally through the on-site density matrix, but the original paper’s tests are all spin-paired (Si, Mo) [Blöchl, 1994, p. 17953]. The Kresse–Joubert 1999 test on Fe, Co, Ni is the first explicit spin-polarised PAW benchmark [Kresse and Joubert, 1999, p. 1767].
      - paragraph [ref=e24720]:
        - strong [ref=e24721]: (4) No multi-reference optimisation in the original NC-PP.
        - text: The Hamann 1979 pseudo is built from a
        - emphasis [ref=e24722]: single
        - text: reference configuration (typically the neutral atom ground state) [Hamann, Schlüter, and Chiang, 1979, p. 1495]. For elements with several competing valence configurations (Mn with
        - img [ref=e24724]
        - text: vs
        - img [ref=e24742]
        - text: ", Ce with"
        - img [ref=e24760]
        - text: vs
        - img [ref=e24785]
        - text: ", …), the single-reference pseudo can have large errors at off-reference configurations. The multi-reference optimisation (HGH 2013, ONCV 2014) came three decades later and is not in the four original papers."
      - paragraph [ref=e24809]:
        - strong [ref=e24810]:
          - text: (5) No DFT+
          - img [ref=e24812]
          - text: coupling.
        - text: The DFT+
        - img [ref=e24818]
        - text: method of Anisimov, Zaanen, and Andersen (1991) and Liechtenstein, Anisimov, and Zaanen (1995) was developed
        - emphasis [ref=e24823]: after
        - text: the four pseudopotential papers. The PAW reconstruction of 1994 admits the on-site density matrix
        - img [ref=e24825]
        - text: of eq.
        - img [ref=e24839]:
          - link [ref=e24842] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-08-paw-occupancy"
        - text: as the natural input to a Hubbard-
        - img [ref=e24851]
        - text: correction, but the
        - emphasis [ref=e24856]: coupling
        - text: is not in the paper [Blöchl, 1994, p. 17956]. The first DFT+
        - img [ref=e24858]
        - text: in PAW is in Anisimov, Solovyev, Korotin, Czyżyk, and Sawatzky (1995) and the formal PAW+
        - img [ref=e24864]
        - text: treatment is in
        - link "chapters 13" [ref=e24869] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-13/
        - text: of these notes.
      - paragraph [ref=e24870]:
        - strong [ref=e24871]: (6) No connection to machine-learning interatomic potentials.
        - text: The four papers are purely
        - emphasis [ref=e24872]: ab initio
        - text: — no empirical parameters beyond the cutoff radii. The recent (2020+) machine-learning potentials (e.g. tabulated pseudopotentials for use with neural-network interatomic potentials, or “machine-learned” pseudopotentials trained on large databases) are
        - emphasis [ref=e24873]: not
        - text: anticipated by the four papers. The “machine-learned pseudopotential” is a 2020s innovation, and the original papers are unaffected.
      - blockquote [ref=e24874]:
        - paragraph [ref=e24875]:
          - strong [ref=e24876]: Summary.
          - text: The four foundational papers (1979–1999) cover the
          - emphasis [ref=e24877]: core
          - text: "of the pseudopotential formalism: the construction, the transferability proof, the ultrasoft generalisation, the all-electron reconstruction, and the production implementation. The topics that the modern user needs and that are"
          - emphasis [ref=e24878]: not
          - text: in these papers — relativistic effects, NLCC, multi-reference optimisation, DFT+
          - img [ref=e24880]
          - text: ", machine learning — are all"
          - emphasis [ref=e24885]: extensions
          - text: of the original formalism, not contradictions of it. The formalism has been remarkably robust over four decades.
