        - text: point in the Brillouin zone (away from time-reversal- invariant momenta). In a molecule, the Kramers degeneracy splits in a magnetic field (which breaks time-reversal) but is preserved in zero field.
      - paragraph [ref=e18369]:
        - text: The Kramers pair is the
        - strong [ref=e18370]: fundamental building block
        - text: of all spin-orbit-coupled band theory. The Bloch states of a spin-orbit-coupled solid form
        - emphasis [ref=e18371]: Kramers pairs
        - img [ref=e18373]
        - text: at every
        - img [ref=e18408]
        - text: . The
        - strong [ref=e18414]: Chern number
        - text: of a filled Kramers pair, integrated over the Brillouin zone, is the
        - strong [ref=e18415]:
          - img [ref=e18417]
          - text: invariant
        - text: that distinguishes a topological insulator from a trivial insulator — see
        - link "chapter 16" [ref=e18426] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-16/
        - text: §16.3. The
        - strong [ref=e18427]: spin-Hall conductivity
        - text: of §15.8 below is a sum of
        - emphasis [ref=e18428]: Berry-phase contributions
        - text: from every Kramers pair, weighted by the Fermi occupation.
      - blockquote [ref=e18429]:
        - paragraph [ref=e18430]:
          - strong [ref=e18431]: Reading note.
          - text: The Kramers degeneracy is the
          - emphasis [ref=e18432]: only
          - text: degeneracy of a time-reversal-invariant spin-orbit system. The non-relativistic “spin-up / spin-down” degeneracy is
          - emphasis [ref=e18433]: not
          - text: present in a spin-orbit-coupled system (the spin is
          - emphasis [ref=e18434]: not
          - text: a good quantum number, only the
          - emphasis [ref=e18435]: total
          - text: angular momentum
          - img [ref=e18437]
          - text: is). The Kramers pair is the relativistic replacement for the non-relativistic spin-up / spin-down pair. In a collinear non-relativistic magnet (where time-reversal is
          - emphasis [ref=e18442]: broken
          - text: by the magnetisation), the spin-up / spin-down pair is the fundamental building block. In a non-magnetic spin-orbit- coupled system, the Kramers pair is.
