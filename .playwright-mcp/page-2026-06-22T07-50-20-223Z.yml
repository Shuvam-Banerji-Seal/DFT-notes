      - heading "15.11 What we left out" [level=2] [ref=e20675]
      - paragraph [ref=e20676]:
        - text: The chapter is
        - emphasis [ref=e20677]: complete
        - text: for the qualitative and
        - emphasis [ref=e20678]: quantitative
        - text: description of relativistic effects in DFT, but the following topics were not covered.
      - list [ref=e20679]:
        - listitem [ref=e20680]:
          - paragraph [ref=e20681]:
            - strong [ref=e20682]: Quantum electrodynamics (QED) corrections.
            - text: The Dirac equation is a
            - emphasis [ref=e20683]: single-particle
            - text: equation in an external potential. The
            - emphasis [ref=e20684]: "true"
            - text: relativistic theory of electrons is
            - emphasis [ref=e20685]: quantum electrodynamics
            - text: (QED), in which the electromagnetic field is
            - emphasis [ref=e20686]: "quantise`d"
            - text: ’ and the vacuum fluctuates. The QED corrections to atomic energies are the
            - strong [ref=e20687]: Lamb shift
            - text: (the
            - img [ref=e20689]
            - text: –
            - img [ref=e20706]
            - text: splitting of hydrogen,
            - img [ref=e20723]
            - text: eV) and the
            - strong [ref=e20743]: anomalous magnetic moment
            - text: of the electron (
            - img [ref=e20745]
            - text: Schwinger correction). These are
            - img [ref=e20758]
            - text: –
            - img [ref=e20773]
            - text: eV and are negligible for chemistry. We did not cover QED.
        - listitem [ref=e20785]:
          - paragraph [ref=e20786]:
            - strong [ref=e20787]: The Breit interaction in detail.
            - text: The Breit–Pauli operator of
            - img [ref=e20789]:
              - link [ref=e20792] [cursor=pointer]:
                - /url: "#"
            - text: is the
            - emphasis [ref=e20801]: non-relativistic
            - text: ’ limit of the full two-electron relativistic interaction. The full two-electron interaction includes the
            - strong [ref=e20802]: Breit interaction
            - text: (a relativistic correction to the Coulomb repulsion that includes magnetic and retardation effects) and the
            - strong [ref=e20803]: vacuum polarisation
            - text: (the screening of the electron– electron interaction by the virtual
            - img [ref=e20805]
            - text: pairs of the QED vacuum). The Breit correction is
            - img [ref=e20819]
            - text: eV per electron pair and is important for
            - emphasis [ref=e20833]: precision
            - text: spectroscopy of few-electron systems. We did not cover the Breit interaction or the vacuum polarisation.
        - listitem [ref=e20834]:
          - paragraph [ref=e20835]:
            - strong [ref=e20836]: The negative-energy (positron) states.
            - text: The Dirac equation has
            - emphasis [ref=e20837]: negative-energy
            - text: solutions that describe
            - emphasis [ref=e20838]: positrons
            - text: (or, in the no-pair approximation, are projected out of the spectrum). In
            - emphasis [ref=e20839]: quantum electrodynamics
            - text: ", the negative-energy states are"
            - emphasis [ref=e20840]: "occupie`d"
            - text: ’ (the Dirac sea), and the
            - emphasis [ref=e20841]: holes
            - text: in the Dirac sea are the positrons. The
            - emphasis [ref=e20842]: positron
            - text: is not a chemical object (it is unstable in matter), but
            - emphasis [ref=e20843]: positron annihilation
            - text: spectroscopy is a probe of the electron momentum density in solids. We did not cover positron physics.
        - listitem [ref=e20844]:
          - paragraph [ref=e20845]:
            - strong [ref=e20846]: The exact two-component (X2C) Hamiltonian with picture-change correction.
            - text: The X2C Hamiltonian of
            - img [ref=e20848]:
              - link [ref=e20851] [cursor=pointer]:
                - /url: "#"
            - text: is the
            - emphasis [ref=e20860]: exact
            - text: positive- energy block of the Dirac Hamiltonian in the chosen basis, but the
            - emphasis [ref=e20861]: matrix elements of operators
            - text: in the X2C basis have a
            - emphasis [ref=e20862]: picture-change error
            - text: of
            - img [ref=e20864]
            - text: . The picture-change correction is
            - emphasis [ref=e20884]: small
            - text: for energy-related operators (it is
            - img [ref=e20886]
            - text: ) but is
            - emphasis [ref=e20906]: important
            - text: for property operators (hyperfine coupling, NMR chemical shift, contact density). The picture-change correction is
            - emphasis [ref=e20907]: "standar`d"
            - text: ’ in modern X2C codes (ORCA, NWChem) but we did not derive it.
        - listitem [ref=e20908]:
          - paragraph [ref=e20909]:
            - strong [ref=e20910]: The Breit–Pauli two-electron spin-orbit operator.
            - text: The two-electron spin-orbit operator of
            - img [ref=e20912]:
              - link [ref=e20915] [cursor=pointer]:
                - /url: "#"
            - text: is the
            - emphasis [ref=e20924]: full
            - text: two- electron Breit–Pauli operator, including the spin-other-orbit, orbit-orbit, spin-spin, and contact terms. The
            - emphasis [ref=e20925]:
              - text: mean-fiel
              - code [ref=e20926]: "d*' approximation of \\eqref{eq:ch-15-soc-mf} is the practical implementation, but the *full* two-electron treatment (the Dirac–Hartree–Fock / Dirac–KS with the Breit interaction) is the *benchmar"
              - text: k
            - text: ’ for high-accuracy calculations on small systems. We did not cover the Dirac–Hartree–Fock / Dirac–KS with Breit.
