        - text: the spin-current operator
      - img [ref=e19728]
      - paragraph [ref=e19776]:
        - text: with
        - img [ref=e19778]
        - text: the spin operator. The sum is over all
        - emphasis [ref=e19808]: Kramers pairs
        - img [ref=e19810]
        - text: at each
        - img [ref=e19824]
        - text: ", and the Berry-curvature sum"
        - img [ref=e19831]
        - text: is the
        - strong [ref=e19872]: spin Berry curvature
        - text: of the Kramers pair.
      - blockquote [ref=e19873]:
        - paragraph [ref=e19874]:
          - strong [ref=e19875]: Reading note.
          - text: The sum over
          - img [ref=e19877]
          - text: in
