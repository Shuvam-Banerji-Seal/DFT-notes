      - blockquote [ref=e20139]:
        - paragraph [ref=e20140]:
          - strong [ref=e20141]: The Pt calculation.
          - text: Pt is a strong spin-orbit-coupled metal (5
          - emphasis [ref=e20142]:
            - code [ref=e20143]: "d*' SOC splitting $\\sim 1.5$ eV) with a large intrinsic spin Hall conductivity. The experimental value, measured by spin-torque ferromagnetic resonance [Liu et al. 2011, *Science* **336**, 555], is $\\sigma_{xy}^s \\approx 2400 \\;(\\hbar/e)(\\Omega\\,\\text{m})^{-1}$ at room temperature. A first-principles calculation with the 2c-X2C method of §15.3.4, the PBE XC functional, and a $30 \\times 30 \\times 30$ k-point mesh gives $\\sigma_{xy}^s \\approx 2200\\;(\\hbar/e)(\\Omega\\,\\text{m})^{-1}$, in good agreement with the experiment. The *non-relativisti"
            - text: c
          - text: ’ calculation (no SOC) gives
          - img [ref=e20145]
          - text: by symmetry, because the spin current operator
          - img [ref=e20163]
          - text: is identically zero for a non-relativistic Hamiltonian with
          - img [ref=e20178]
          - text: as a good quantum number. The spin Hall effect is therefore a
          - emphasis [ref=e20190]: "purely relativisti`c"
          - text: ’ effect — it cannot be computed without spin-orbit coupling.
        - paragraph [ref=e20191]:
          - text: The dominant contribution to the Pt spin Hall conductivity comes from the
          - emphasis [ref=e20192]: resonant
          - text: avoided crossings of the 5
          - emphasis [ref=e20193]: "`d"
          - text: ’ bands near the Fermi level (the so-called “Kane-Mele” resonances of the FCC Pt Brillouin zone). The Berry curvature is sharply peaked at these avoided crossings, and the sum
          - img [ref=e20195]:
            - link [ref=e20198] [cursor=pointer]:
              - /url: "#"
          - text: is dominated by the contributions from the Fermi-surface states. The intrinsic SHE of Pt is therefore a
          - emphasis [ref=e20207]: resonant
          - text: "effect: the spin Hall conductivity is large"
          - emphasis [ref=e20208]: because
          - text: the 5d* bands are close in energy, and small changes in the lattice parameter or the doping level can change the sign and the magnitude of
          - img [ref=e20210]
          - text: .
      - paragraph [ref=e20223]:
        - text: A worked numerical evaluation of the Kubo formula
        - img [ref=e20225]:
          - link [ref=e20228] [cursor=pointer]:
            - /url: "#"
        - text: for Pt is the following.
      - paragraph [ref=e20237]:
        - strong [ref=e20238]: Step 1 — self-consistent 2c-X2C calculation.
        - text: Compute the self-consistent ground state of Pt with the 2c-X2C method (§15.6.2), a plane-wave basis set with cutoff
        - img [ref=e20240]
        - text: eV, a
        - img [ref=e20248]
        - text: Monkhorst–Pack mesh for the SCF, and the PBE XC functional. The result is a set of Bloch spinor orbitals
        - img [ref=e20265]
        - text: and eigenvalues
        - img [ref=e20285]
        - text: for every band
        - img [ref=e20298]
        - text: and every
        - img [ref=e20304]
        - text: point.
      - paragraph [ref=e20310]:
        - strong [ref=e20311]: Step 2 — Wannier interpolation.
        - text: The Kubo formula
        - img [ref=e20313]:
          - link [ref=e20316] [cursor=pointer]:
            - /url: "#"
        - text: requires a
        - emphasis [ref=e20325]: dense
        - text: k-point sampling (much denser than the SCF mesh) for convergence. The standard approach is to interpolate the Bloch Hamiltonian onto a fine mesh using
        - strong [ref=e20326]: maximally-localised Wannier functions
        - text: (the
        - emphasis [ref=e20327]: Wannier90
        - text: / Wannierier code; see
        - link "chapter 11" [ref=e20328] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-11/
