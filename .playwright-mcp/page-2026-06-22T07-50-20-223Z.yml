      - 'heading "15.7 Worked example: the Au₂ dimer" [level=2] [ref=e18725]'
      - paragraph [ref=e18726]:
        - text: The Au₂ dimer is the canonical textbook example of a relativistic effect in chemistry. The non-relativistic calculation gets the bond length wrong by
        - img [ref=e18728]
        - text: Å (
        - img [ref=e18738]
        - text: ) and the binding energy wrong by
        - img [ref=e18749]
        - text: eV (
        - img [ref=e18759]
        - text: ). The scalar-relativistic calculation alone gets the bond length within
        - img [ref=e18770]
        - text: Å, and the fully-relativistic calculation (with spin-orbit) reproduces the experimental bond length to within
        - img [ref=e18780]
        - text: Å. This example walks through the calculation at all three levels and shows the breakdown of the relativistic correction.
      - paragraph [ref=e18790]:
        - strong [ref=e18791]: Experimental reference.
        - text: The Au–Au bond length in Au₂, measured by gas-phase electronic spectroscopy [Huber and Herzberg 1979], is
        - img [ref=e18793]
        - text: Å. The binding energy, measured by photoionisation of the Au₂⁻ anion [Handschuh et al. 1995], is
        - img [ref=e18810]
        - text: eV. The vibrational frequency is
        - img [ref=e18833]
        - text: cm⁻¹.
      - paragraph [ref=e18847]:
        - strong [ref=e18848]: Level 0 — non-relativistic calculation.
        - text: A non-relativistic scalar-relativistic calculation (no relativistic effects, Schrödinger equation, large-core pseudopotential) on Au₂ gives a bond length of
        - img [ref=e18850]
        - text: Å and a binding energy of
        - img [ref=e18860]
        - text: eV. The Au–Au bond is too
        - emphasis [ref=e18869]: long
        - text: (the missing relativistic contraction of the 6
        - emphasis [ref=e18870]: s
        - text: orbital means the valence electrons do not feel the full nuclear attraction) and too
        - emphasis [ref=e18871]: "wea`k"
        - text: ’ (the longer bond has less orbital overlap). The non-relativistic calculation is qualitatively
        - emphasis [ref=e18872]: wrong
        - text: — it predicts an Au–Au bond length comparable to the Ag–Ag bond length (which is
        - img [ref=e18874]
        - text: Å but is, paradoxically,
        - emphasis [ref=e18883]: shorter
        - text: than the non-relativistic Au–Au prediction).
      - paragraph [ref=e18884]:
        - strong [ref=e18885]: Level 1 — scalar-relativistic calculation.
        - text: A calculation with the scalar-relativistic pseudopotential (the SR terms of
        - img [ref=e18887]:
          - link [ref=e18890] [cursor=pointer]:
            - /url: "#"
        - text: but no spin-orbit coupling) on Au₂ gives a bond length of
        - img [ref=e18900]
        - text: Å and a binding energy of
        - img [ref=e18911]
        - text: eV. The 6
        - emphasis [ref=e18921]: s
        - text: orbital is contracted by
        - img [ref=e18923]
        - text: ", the 5"
        - emphasis [ref=e18933]:
          - code [ref=e18934]: d*' orbital is expanded by $\sim 5\%$, and the Au–Au bond is *shorter* and stronger than the non-relativistic prediction. The SR calculation reproduces the *tren
          - text: d
        - text: ’ correctly but is still off by
        - img [ref=e18936]
        - text: Å in the bond length and
        - img [ref=e18947]
        - text: eV in the binding energy.
      - paragraph [ref=e18957]:
        - strong [ref=e18958]: Level 2 — fully-relativistic calculation with spin-orbit.
        - text: A calculation with the fully-relativistic PAW pseudopotential (SR + SOC, the 2c-X2C method of §15.3.4) on Au₂ gives a bond length of
        - img [ref=e18960]
        - text: Å and a binding energy of
        - img [ref=e18969]
        - text: eV. The spin-orbit correction
        - emphasis [ref=e18977]: contracts
        - text: the bond by an additional
        - img [ref=e18979]
        - text: Å and
        - emphasis [ref=e18989]: strengthens
        - text: the bond by an additional
        - img [ref=e18991]
        - text: eV. The 2c-X2C calculation reproduces the experimental values to within
        - img [ref=e19002]
        - text: Å and
        - img [ref=e19013]
        - text: eV.
      - paragraph [ref=e19023]:
        - text: The
        - strong [ref=e19024]: physical mechanism
        - text: of the Au₂ relativistic chemistry is the relativistic contraction of the 6
        - emphasis [ref=e19025]: s
        - text: orbital and the corresponding destabilisation of the 5
        - emphasis [ref=e19026]: d
        - text: ’ orbital. The 6s orbital of gold is the outermost occupied orbital; its contraction moves electron density closer to the nucleus and
        - emphasis [ref=e19027]: increases
        - text: the 6
        - emphasis [ref=e19028]: s
        - text: binding energy. The 5d* orbital of gold is the next shell; its destabilisation
        - emphasis [ref=e19029]: decreases
        - text: the 5d–6s gap. The result is that the 6
        - emphasis [ref=e19030]: s and 5
        - text: d levels of gold are
        - emphasis [ref=e19031]: closer in energy
        - text: than the corresponding 5
        - emphasis [ref=e19032]: s
        - text: and 4d* levels of silver, and the chemistry of gold is dominated by the
        - emphasis [ref=e19033]: mixing
        - text: of the 6
        - emphasis [ref=e19034]: s
        - text: and 5d* orbitals in the Au–Au bond.
      - paragraph [ref=e19035]:
        - text: A quantitative estimate of the Au–Au bond length contraction uses the
        - emphasis [ref=e19036]: expectation value
        - text: of the relativistic mass-velocity term on the 6
        - emphasis [ref=e19037]: s
        - text: orbital. The non-relativistic 6
        - emphasis [ref=e19038]: s
        - text: orbital of gold has
        - img [ref=e19040]
        - text: a.u. (from the non-relativistic Dirac equation for the Au atom, projected onto the large component). The fully- relativistic 6
        - emphasis [ref=e19064]: s
        - text: orbital has
        - img [ref=e19066]
        - text: a.u. (from the same calculation, now including the kinetic- relativistic and Darwin corrections). The ratio
        - img [ref=e19092]
        - text: is a
        - img [ref=e19137]
        - text: contraction, in good agreement with the more elaborate self-consistent-field calculation of Pitzer (1975).
