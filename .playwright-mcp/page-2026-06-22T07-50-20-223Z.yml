      - heading "15.9 Problems" [level=2] [ref=e20598]
      - paragraph [ref=e20599]:
        - text: Three problems, in order of increasing difficulty. The first is a pencil-and-paper exercise on the
        - img [ref=e20601]
        - text: scaling of the Pauli corrections. The second is a numerical calculation of the Au₂ potential-energy curve with a toy model. The third is a full spin-Hall conductivity calculation on a model tight-binding lattice.
      - group [ref=e20606]:
        - generic "▸ Problem 1 (easy) — the rule of thumb" [ref=e20607] [cursor=pointer]:
          - text: ▸ Problem 1 (easy) — the
          - img [ref=e20609]
          - text: rule of thumb
        - text: The spin-orbit correction to a hydrogenic orbital scales as (a) Compute for the level of hydrogen ( , ), the level of copper ( , ), the level of silver ( , ), the level of gold ( , ), the level of lead ( , ), and the level of oganesson ( , ). Express your answer in eV. (b) Which of these is comparable to a chemical bond energy ( – eV)? (c) The spin-orbit splitting of an shell has a factor in addition to the scaling. How does this modify the answer for a shell (e.g. the shell of Au) versus a shell (e.g. the shell of Pb)? Which is more important in the chemistry of Au, the or the splitting?
      - group [ref=e20617]:
        - generic "▸ Show answer" [ref=e20618] [cursor=pointer]
        - text: "**Part (a).** Substituting the values: | Element | | | (eV) | |:--------|:----|:----|:--------------------------| | H | 1 | 2 | | | Cu | 29 | 3 | | | Ag | 47 | 4 | | | Au | 79 | 5 | | | Pb | 82 | 6 | | | Og | 118 | 7 | | The formula gives . Hydrogen's splitting is invisible in chemistry; gold's is comparable to a chemical bond; oganesson's is larger than any chemical bond. **Part (b).** Gold and lead (and any element with ) have a spin-orbit splitting comparable to a chemical bond. The chemistry of these elements *cannot* be described by non-relativistic quantum chemistry. **Part (c).** The factor gives (p shell) a factor of and (d shell) a factor of . So a -shell splitting is *smaller* than a -shell splitting for the same and . But the shell of Au is at lower than the shell, and the formula gives eV for the and eV for the (with the corrected and ). The splitting of Pb is therefore *larger* than the splitting of Au. In the chemistry of Au, the splitting is the most important (because the electrons are the *valence* electrons of Au), and in the chemistry of Pb, the splitting is the most important. The general rule is that the spin-orbit splitting is largest for the *outermost occupie`d*' shell of the atom."
      - group [ref=e20619]:
        - generic "▸ Problem 2 (medium) — a toy Au₂ Morse curve" [ref=e20620] [cursor=pointer]
        - text: "The Au–Au bond can be modelled as a Morse oscillator with the binding energy, the equilibrium bond length, and the curvature parameter. The vibrational frequency is , where is the reduced mass (in atomic units, ). (a) Using the *experimental* values Å, eV, cm⁻¹, compute the Morse parameter . (b) The non-relativistic Au₂ calculation gives Å, eV, cm⁻¹. The scalar-relativistic calculation gives Å, eV, cm⁻¹. The fully-relativistic calculation gives the experimental values. Compute the Morse parameter at each level and explain the trend. (c) The *zero-point energy* of the Morse oscillator is . Compute the ZPE at each level and explain why the *relativistic*' ZPE is larger than the *non-relativisti`c*' ZPE."
      - group [ref=e20621]:
        - generic "▸ Show answer" [ref=e20622] [cursor=pointer]
        - text: "**Part (a).** From the experimental data: Convert to atomic units: cm⁻¹ , eV , . So Equivalently, Å⁻¹. **Part (b).** The Morse parameter at each level is: | Level | (Å) | (eV) | (cm⁻¹) | (Å⁻¹) | |:------|:----------|:-----------|:------------------|:----------| | Non-rel | 3.00 | 1.60 | 130 | 0.92 | | SR | 2.55 | 2.10 | 175 | 1.04 | | Full | 2.47 | 2.30 | 191 | 1.11 | The trend is that *increases* as we go from non-relativistic to SR to fully-relativistic. The physical reason is that the relativistic bond is *shorter* and stiffer than the non-relativistic bond; the *stiffness* (the second derivative of at the minimum, ) is therefore larger. The relativistic -orbital contraction moves the electron density closer to the nuclei, and the bond has more electron density to resist displacement. **Part (c).** The ZPE is At each level: | Level | (eV) | ZPE (eV) | |:------|:----------------------|:---------| | Non-rel | 0.0161 | 0.0080 | | SR | 0.0217 | 0.0108 | | Full | 0.0237 | 0.0118 | The relativistic ZPE is *larger* than the non-relativistic ZPE because is larger (stiffer bond). The ZPE correction is *important* for the *binding energy*: the ZPE-corrected binding energy is | Level | (eV) | ZPE (eV) | (eV) | |:------|:-----------|:---------|:-----------| | Non-rel | 1.60 | 0.0080 | 1.59 | | SR | 2.10 | 0.0108 | 2.09 | | Full | 2.30 | 0.0118 | 2.29 | The ZPE correction is of in all three cases — small, but not zero. The ZPE correction must be included when comparing the calculated to the experimental *enthalpy* of dissociation at room temperature, which is ( eV at 300 K). The ZPE and thermal corrections together shift the experimental by eV, which is larger than the *non-relativisti`c*' correction to the Au–Au bond energy."
      - group [ref=e20623]:
        - generic "▸ Problem 3 (hard) — a 2-band Kane–Mele model on a square lattice" [ref=e20624] [cursor=pointer]
        - text: "Consider the **Kane–Mele model** on a 2-D square lattice with two orbitals per site ( and ) and intrinsic spin-orbit coupling . The Bloch Hamiltonian is where is the Pauli matrix in the orbital basis, is the Pauli matrix in the spin basis, and is the nearest-neighbour hopping. This is a **time-reversal-invariant** model with a non-trivial invariant for . (a) Diagonalise at every in the Brillouin zone. Show that the eigenvalues come in Kramers pairs at every . (b) Compute the **Chern number** of the *lower* Kramers pair (i.e. the sum of the Berry curvature of the lower band over the BZ, divided by ). Show that the Chern number is *zero* by time-reversal symmetry, but that the *spin Chern number* (the same sum weighted by the spin expectation value ) is *non-zero*. (c) Compute the **spin Hall conductivity** of this model at zero temperature using the Kubo formula of §15.8. Express your answer in units of and verify that it is quantised to (the topological invariant of §15.8). *Hint*: at every , the two spin blocks and are *decouple`d*' (because is diagonal in the spin basis). Each block is a 2-band model in the orbital basis, and the Chern number of each block can be computed from the **dressed Chern number** formula where and is the vector of coefficients of the Pauli matrices in the 2-band Hamiltonian ."
      - group [ref=e20625]:
        - generic "▸ Show answer" [ref=e20626] [cursor=pointer]
        - text: "**Part (a).** The Hamiltonian , with and . The eigenvalues are The eigenstates are direct products of the orbital eigenstates of and the spin eigenstates of . The -spin block (with ) has Hamiltonian , with eigenstates at energy and at energy . The -spin block (with ) is the same with . The time-reversal operator maps the state at to the state at (because under time-reversal and flips the spin). Since (the Hamiltonian is time-reversal invariant), the state at and the state at are *degenerate*: the **Kramers pair** of §15.6.4. In particular, the energies come in Kramers pairs . **Part (b).** The two spin blocks are *decouple`d*' and each is a 2-band model in the orbital basis. The -spin block has Hamiltonian , which is *purely diagonal* in the basis (there is no or component). The Chern number of a purely diagonal 2-band model is *identically zero* — the dressed Chern number formula reduces to a total derivative of a function of alone, and the integral over the BZ vanishes because the function is single-valued. So and . The *total* Chern number is , as required by time-reversal symmetry. The *spin* Chern number, is also *zero* for this particular model (because the two spin blocks have the same Berry curvature, just with opposite sign of ). This is the *expecte`d*' result for the Kane–Mele model on a *bipartite* square lattice: the spin Chern number is non-zero on the honeycomb lattice (the Kane–Mele model *par excellence*) but is zero on the square lattice. **Part (c).** The spin Hall conductivity of the Kane–Mele model on the square lattice is therefore *zero* in the simple form of the model. To get a *non-zero* spin Hall conductivity, we need to add either a Rashba spin-orbit term (which breaks inversion symmetry) or a second-neighbour hopping (which makes the lattice non-bipartite). The *quantise`d*' spin Hall conductivity of is obtained in the **Bernevig–Hughes–Zhang (BHZ) model** of the HgTe quantum well, which is a Kane–Mele-type model on a *honeycom`b*' lattice with intrinsic SOC that opens a *non-trivial* gap. The BHZ model is the *prototypical* 2-D topological insulator; see [chapter 16](/DFT-notes/dft-notes/chapter-16/) §16.3 for the full discussion. The lesson is that the *intrinsic*' spin Hall effect is topological in origin: a *clean*, time-reversal-invariant, gapped system has a invariant, and the spin Hall conductivity is *quantise`d*' in units of to that invariant."
      - heading "15.10 Cross-references" [level=2] [ref=e20627]
      - paragraph [ref=e20628]:
