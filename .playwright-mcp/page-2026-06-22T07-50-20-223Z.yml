    - generic [ref=e26]:
      - heading "Chapter 15 — Relativistic effects and spin-orbit coupling" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: A single relativistic correction — the spin-orbit term
          - img [ref=e31]
          - text: — is the difference between a DFT calculation that gets the chemistry of gold right and one that gets it catastrophically wrong.
      - paragraph [ref=e58]:
        - text: You have spent twelve chapters building a non-relativistic machinery. The Hamiltonian has been
        - img [ref=e60]
        - text: ", the eigenfunctions have been scalar spatial orbitals"
        - img [ref=e115]
        - text: (or two-component spinors in the collinear spin case of
        - link "chapter 04" [ref=e130] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: §4.8), and the pseudopotentials of
        - link "chapter 08" [ref=e131] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-08/
        - text: have replaced the deep nuclear potential with a smooth effective one. That machinery is correct, and accurate, for every element up to about the middle of the periodic table. It is also qualitatively wrong for the heavy elements — for the lanthanides, the actinides, the 5
        - emphasis [ref=e132]: d
        - text: ’ transition metals, the 6p* post- transition metals, and the superheavies — and
        - emphasis [ref=e133]: quantitatively
        - text: "wrong for almost everything that touches spin-orbit physics: Rashba-split surface states, topological-insulator band inversions, the spin Hall effect, magnetic anisotropy, zero- field splitting in molecular magnets, the colour of gold, the relativistic contraction of the 6"
        - emphasis [ref=e134]: s
        - text: "orbital, the liquid metallicity of mercury. All of these have a single physical origin: the"
        - strong [ref=e135]: Dirac equation
        - text: is the correct wave equation for an electron in an electromagnetic field, and the non-relativistic Schrödinger equation is its
        - img [ref=e137]
        - text: limit. This chapter is the bridge from the non-relativistic machinery you have built to the relativistic machinery that every production DFT code uses for heavy elements. We will derive the Dirac equation from the relativistic energy-momentum relation, extract the non-relativistic limit as a
        - strong [ref=e151]: Pauli Hamiltonian
        - text: with the famous four correction terms (kinetic-relativistic, Darwin, spin-orbit, contact), introduce the three standard two-component reductions (
        - strong [ref=e152]: DKH
        - text: ","
        - strong [ref=e153]: ZORA
        - text: ","
        - strong [ref=e154]: X2C
        - text: ), explain why
        - strong [ref=e155]: scalar-relativistic pseudopotentials
        - text: work and how
        - strong [ref=e156]: fully-relativistic pseudopotentials
        - text: carry spin-orbit coupling, set up the
        - strong [ref=e157]: Dirac–Kohn–Sham
        - text: and
        - strong [ref=e158]: two-component Kohn–Sham
        - text: "equations, and close with two worked examples that show the magnitude of the effect in practice: the Au"
        - img [ref=e160]
        - text: dimer (scalar relativistic alone gives a 3.0 Å bond; with spin-orbit the bond contracts to 2.47 Å, exactly the experimental value) and the spin-Hall conductivity of platinum.
      - blockquote [ref=e166]:
