      - list [ref=e20630]:
        - listitem [ref=e20631]:
          - link "Chapter 04" [ref=e20632] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: "§4.9 is the immediate prerequisite: the non-relativistic limit of the Dirac equation and the Pauli expansion (§4.9.2), the scalar-relativistic approximation (§4.9.3), and the spin-orbit-coupled KS DFT (§4.9.4) are all the"
          - emphasis [ref=e20633]: raw material
          - text: of the present chapter. The current chapter derives these results
          - emphasis [ref=e20634]: "from scratc`h"
          - text: ’ (from the relativistic energy- momentum relation) and generalises them to the modern two-component and four-component machinery.
        - listitem [ref=e20635]:
          - link "Chapter 08" [ref=e20636] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: on pseudopotentials is the bridge from the atomic Dirac equation to a
          - emphasis [ref=e20637]: molecular
          - text: or solid-state calculation. The scalar-relativistic pseudopotential of §15.4.4 is the practical implementation of the SR approximation in plane- wave DFT; the fully-relativistic PAW of §15.5.4 is the practical implementation of the SOC.
        - listitem [ref=e20638]:
          - link "Chapter 07" [ref=e20639] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: on periodic boundary conditions is the bridge to
          - emphasis [ref=e20640]: solid-state
          - text: relativistic DFT. The Bloch states of a spin-orbit-coupled solid are
          - emphasis [ref=e20641]: 2-component spinors
          - text: at every
          - img [ref=e20643]
          - text: point, and the Kramers pair of §15.6.4 is the fundamental excitation of the band structure.
        - listitem [ref=e20649]:
          - paragraph [ref=e20650]:
            - link "Chapter 12" [ref=e20651] [cursor=pointer]:
              - /url: /DFT-notes/dft-notes/chapter-12/
            - text: on TDDFT is the bridge to the
            - emphasis [ref=e20652]: time-dependent
            - text: relativistic DFT. The spin-current DFT of §15.6.3 is the relativistic generalisation of the Runge–Gross theorem; the spin Hall conductivity of §15.8 is a
            - emphasis [ref=e20653]: linear-response
            - text: property that uses the Kubo formula of
            - link "chapter 12" [ref=e20654] [cursor=pointer]:
              - /url: /DFT-notes/dft-notes/chapter-12/
            - text: §12.3.
            - strong [ref=e20655]: Forward (downstream) chapters.
        - listitem [ref=e20656]:
          - link "Chapter 16" [ref=e20657] [cursor=pointer]:
