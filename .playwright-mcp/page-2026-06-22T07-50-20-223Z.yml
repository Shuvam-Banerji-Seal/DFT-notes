      - heading "15.4 Scalar relativistic effects" [level=2] [ref=e11933]
      - paragraph [ref=e11934]:
        - text: The
        - strong [ref=e11935]: scalar relativistic (SR)
        - text: approximation keeps the kinetic-relativistic and Darwin terms of
        - img [ref=e11937]:
          - link [ref=e11940] [cursor=pointer]:
            - /url: "#"
        - text: and discards the spin-orbit term. The resulting Hamiltonian is
        - emphasis [ref=e11949]: spin-independent
        - text: ": the wavefunction remains a 2-component Pauli spinor, but the upper and lower components (spin-up and spin-down) are degenerate. The SR approximation captures all of the"
        - emphasis [ref=e11950]: "kinemati`c"
        - text: ’ relativistic effects (orbital contraction and expansion) at a cost only marginally higher than the non-relativistic calculation. The remaining spin-orbit correction is then added either
        - emphasis [ref=e11951]: perturbatively
        - text: (the
        - strong [ref=e11952]: second-variational
        - text: method of Koelling and Harmon 1977) or
        - emphasis [ref=e11953]: self-consistently
        - text: (the
        - strong [ref=e11954]: spin-orbit coupled
        - text: method of §15.5.4 below).
      - paragraph [ref=e11955]:
        - text: The SR approximation is the
        - emphasis [ref=e11956]: workhorse
        - text: of modern relativistic DFT for medium-heavy elements. It is the default in the pseudopotential libraries (Quantum ESPRESSO, VASP, CASTEP, ABINIT) and in the all-electron FP-LAPW codes (WIEN2k, Elk, FLEUR) for elements up to the lanthanides. For the actinides and the superheavies the spin-orbit correction is added explicitly, either as a second-variational correction on top of the SR ground state or as a fully self-consistent X2C calculation. This section derives the SR approximation, identifies the two corrections (mass-velocity and Darwin), and explains why scalar-relativistic pseudopotentials are
        - emphasis [ref=e11957]: transferable
        - text: between chemical environments.
