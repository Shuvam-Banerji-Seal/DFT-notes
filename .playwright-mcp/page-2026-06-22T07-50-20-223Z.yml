            - text: Scan the Au–Au distance from
            - img [ref=e19224]
            - text: Å to
            - img [ref=e19232]
            - text: Å in steps of
            - img [ref=e19240]
            - text: Å; fit a Morse or polynomial; extract
            - img [ref=e19248]
            - text: and
            - img [ref=e19257]
            - text: .
      - blockquote [ref=e19265]:
        - paragraph [ref=e19266]:
          - strong [ref=e19267]: Reading note.
          - text: The Au₂ example illustrates the
          - emphasis [ref=e19268]: "rule of thum`b"
          - text: ’ that the relativistic effects grow as
          - img [ref=e19270]
          - text: . Silver (
          - img [ref=e19279]
          - text: ) has a
          - img [ref=e19290]
          - text: correction — much smaller than gold’s, and a non-relativistic calculation on Ag₂ gives a bond length within
          - img [ref=e19335]
          - text: Å of experiment. Copper (
          - img [ref=e19345]
          - text: ) is fully non-relativistic; the Cu–Cu bond is reproduced without any relativistic correction.
      - 'heading "15.8 Worked example: the spin Hall conductivity of Pt" [level=2] [ref=e19355]'
      - paragraph [ref=e19356]:
        - text: The
        - strong [ref=e19357]: spin Hall effect
        - text: (SHE) is the generation of a spin current transverse to an applied electric field in a non-magnetic material. The
        - emphasis [ref=e19358]:
          - text: intrinsi
          - code [ref=e19359]: "c*' SHE is a property of the band structure: the Berry curvature of the Bloch states in a spin-orbit-coupled metal acts as a *fictitious magnetic fiel"
          - text: d
        - text: ’ in momentum space, and electrons in filled bands execute an anomalous Hall motion that adds up to a macroscopic spin current. The
        - strong [ref=e19360]: spin Hall conductivity
        - img [ref=e19362]
        - text: "is the material parameter that quantifies the effect:"
      - img [ref=e19376]
      - paragraph [ref=e19406]:
        - text: where
        - img [ref=e19408]
        - text: is the
        - img [ref=e19419]
        - text: "-th component of the spin current (a"
        - emphasis [ref=e19424]: pseudovector
        - text: with units of
        - img [ref=e19426]
        - text: ) and
        - img [ref=e19454]
        - text: the
        - img [ref=e19463]
        - text: "-th component of the applied electric field. The spin Hall conductivity is a"
        - strong [ref=e19468]: rank-2 pseudotensor
        - text: ; for a cubic material (such as Pt) it reduces to a single scalar
        - img [ref=e19470]
        - text: (with the diagonal
        - img [ref=e19484]
        - text: by symmetry in the time-reversal- invariant state).
      - paragraph [ref=e19501]:
        - text: The intrinsic spin Hall conductivity of a time-reversal-invariant metal is given by the
        - strong [ref=e19502]: Kubo–Greenwood
        - text: linear-response formula (
        - link "chapter 12" [ref=e19503] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-12/
        - text: "§12.3 generalised to a spin-current operator):"
      - img [ref=e19505]
      - paragraph [ref=e19692]:
