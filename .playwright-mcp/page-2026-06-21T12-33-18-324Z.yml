      - heading "4.6 Advanced features" [level=3] [ref=e1163]
      - list [ref=e1164]:
        - listitem [ref=e1165]:
          - strong [ref=e1166]: Real-time TDDFT.
          - code [ref=e1167]: propagate(...)' from the calculator's TDDFT module. The standard workflow is (i) ground-state SCF, (ii) kick the system with a small electric-field pulse, (iii) propagate the Kohn–Sham orbitals in time, (iv) compute the time-dependent dipole moment, (v) Fourier-transform to the optical absorption spectrum. The
          - text: GPAW(…).tddft().propagate(…)’ API is integrated with the rest of the Python workflow.
        - listitem [ref=e1168]:
          - strong [ref=e1169]: Linear-response TDDFT (Casida).
          - text: The
          - code [ref=e1170]: Casida' post-processing gives the full excited-state spectrum (eigenvalues + oscillator strengths) on top of a converged ground state. The setup is
          - text: GPAW(…).diagonalize_full_hamiltonian()’ followed by
          - code [ref=e1171]: GPAW(...).calculate_kschem()
          - text: .
        - listitem [ref=e1172]:
          - strong [ref=e1173]:
            - img [ref=e1175]
            - text: and BSE.
          - text: The plane-wave mode supports
          - img [ref=e1189]
          - text: via the
          - code [ref=e1202]: G0W0' calculator. The BSE (Bethe–Salpeter equation) is implemented in the
          - text: BSE’ module. Both are in active development; the user community is small but active.
        - listitem [ref=e1203]:
          - strong [ref=e1204]: DFT+U.
          - text: "Set `setup={‘X’: ‘PBE+s’}’ for the Dudarev DFT+U ("
          - link "chapter 12" [ref=e1205] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: ). The ‘X’ is the atomic number. The ‘U’ value is specified in the setup dictionary.
        - listitem [ref=e1206]:
          - strong [ref=e1207]: Spin–orbit coupling.
          - text: Set
          - code [ref=e1208]: soc=True' in the calculator (GPAW switches to non-collinear automatically). SOC is only supported in the PW mode and the FD mode. For a band structure with SOC, the
          - text: band_structure()’ method returns the SOC-split bands.
        - listitem [ref=e1209]:
          - strong [ref=e1210]: Delta-SCF.
          - text: "The `deltaSCF’ module computes excited-state energies by enforcing a non-Aufbau occupation in the SCF. Useful for Hubbard-corrected calculations of charge-transfer excitations."
        - listitem [ref=e1211]:
          - strong [ref=e1212]: NEB and dimer.
          - text: "The NEB module is integrated with ASE: ‘from ase.neb import NEB’. The climbing-image NEB is ‘climb=True’ in the ‘NEB’ constructor. The dimer method is"
          - code [ref=e1213]: from ase.dimer import Dimer' and
          - text: "DimerRun`."
      - heading "4.7 Worked example — Si band structure in 20 lines" [level=3] [ref=e1214]
      - paragraph [ref=e1215]: A complete Si band structure with the plane-wave mode in 20 lines of Python.
      - paragraph [ref=e1216]: "```python"
      - heading "si_bands.py" [level=1] [ref=e1217]
      - paragraph [ref=e1218]: import numpy as np from ase.build import bulk from ase.dft.kpoints import bandpath from gpaw import GPAW, PW
      - heading "1. Build the structure" [level=1] [ref=e1219]
      - paragraph [ref=e1220]: si = bulk(‘Si’, ‘diamond’, a=5.43)
      - heading "2. Standard SCF on a uniform mesh" [level=1] [ref=e1221]
      - paragraph [ref=e1222]: "si.calc = GPAW( mode=PW(300), xc=’PBE’, kpts=(8, 8, 8), convergence={‘energy’: 1.0e-6}, txt=’si.scf.txt’, ) si.get_potential_energy() # runs the SCF si.calc.write(‘si.gpw’, mode=’all’) # save everything for re-use"
      - heading "3. Non-self-consistent band structure along a path" [level=1] [ref=e1223]
      - paragraph [ref=e1224]: "calc = GPAW(‘si.gpw’).fixed_density() # reload, hold density fixed kpts, x, X = bandpath(‘GXWKL’, si.cell, npoints=60) calc.set(kpts=kpts) # re-attach the calculator si.calc = calc si.get_potential_energy() # NSCF run"
      - heading "4. Extract and plot the band structure" [level=1] [ref=e1225]
      - paragraph [ref=e1226]: "bs = calc.band_structure() bs.plot(filename=’si.bands.png’, emax=15) # one line for the plot ``’"
      - paragraph [ref=e1227]: "Run:"
      - paragraph [ref=e1228]: "```bash mpiexec -n 8 gpaw python si_bands.py ``’"
      - paragraph [ref=e1229]: "The output `si.bands.png’ is a publication-quality band-structure plot with the high-symmetry points labelled."
      - paragraph [ref=e1230]:
        - text: For a band structure with HSE06, change
        - code [ref=e1231]: xc='PBE'' to
        - text: xc=’HSE06’
        - code [ref=e1232]: . The HSE06 SCF is ~ 100× slower than PBE, so the wall-time increases correspondingly. The
        - text: fixed_density()’ call re-uses the HSE06 density for the NSCF band structure.
      - paragraph [ref=e1233]: "For a TDDFT calculation, the standard workflow is:"
      - paragraph [ref=e1234]: "```python from gpaw.tddft import photoabsorption spectrum = photoabsorption(‘si.gpw’, ‘si.td.log’, e_min=0.0, e_max=10.0, delta_e=0.05, # eV kick_strength=1.0e-3) # a.u. spectrum[:].plot(‘si.td.png’) ``’"
      - paragraph [ref=e1235]: "The `photoabsorption’ function runs a real-time TDDFT calculation with a delta-function electric-field kick at ‘t = 0’, propagates the Kohn–Sham orbitals, computes the time-dependent dipole, and Fourier-transforms to the optical absorption spectrum. The output ‘spectrum’ is a ‘Spectrum’ object with the absorption cross-section as a function of energy."
      - separator [ref=e1236]
      - heading "5. CP2K" [level=2] [ref=e1237]
      - heading "5.1 Overview" [level=3] [ref=e1238]
      - paragraph [ref=e1239]:
        - text: CP2K is a Fortran mixed Gaussian / plane-wave (GPW) code (
        - link "chapter 06" [ref=e1240] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.3, §6.7). The Gaussian basis handles the wavefunctions; the plane- wave auxiliary grid handles the density and the electron-repulsion integrals. The advantage of this mixed basis is that it is
        - strong [ref=e1241]: systematically-improvable
        - text: (the Gaussian basis and the plane-wave cutoff are independent convergence parameters) and
        - strong [ref=e1242]: fast for inhomogeneous systems
        - text: (the plane-wave grid adapts locally). The cost is the complexity of the convergence — the user must converge
        - emphasis [ref=e1243]: two
        - text: parameters (the Gaussian basis and the plane-wave cutoff) and
        - emphasis [ref=e1244]: three
        - text: SCF parameters (
        - code [ref=e1245]: EPS_SCF
        - text: ", the OT minimiser, the preconditioner)."
      - paragraph [ref=e1246]:
        - text: CP2K’s flagship application is
        - strong [ref=e1247]: ab-initio molecular dynamics
        - text: "of large systems (water, electrolytes, solid–liquid interfaces, MOFs with diffusing ions). A 1000-atom water simulation on a desktop workstation is a routine calculation; a 10,000-atom electrolyte is tractable on a small cluster. CP2K also has a growing set of static-DFT features: geometry optimisation, NEB, phonons, hybrid functionals (within the GPW formulation, with truncated Coulomb for HSE06), DFT+U, MP2, RPA, and"
        - img [ref=e1249]
        - text: .
      - heading "5.2 Install" [level=3] [ref=e1262]
      - paragraph [ref=e1263]: "CP2K is distributed as a single `cp2k.ssmp’ (serial), ‘cp2k.psmp’ (MPI / OpenMP), or ‘cp2k.popt’ (OpenMP) executable, with a toolchain script that downloads and compiles all the dependencies (BLAS, LAPACK, ScaLAPACK, FFTW3, libint, libxc, libxsmm, …). The build takes 1–3 hours on a modern machine."
      - paragraph [ref=e1264]: "```bash"
      - heading "Clone and build" [level=1] [ref=e1265]
      - paragraph [ref=e1266]:
        - text: git clone –recursive -b support/v2024.3
        - link "https://github.com/cp2k/cp2k.git" [ref=e1267] [cursor=pointer]:
          - /url: https://github.com/cp2k/cp2k.git
        - text: "cp2k cd cp2k/tools/toolchain ./install_toolchain.sh # ~ 30 minutes cd ../.. make -j 16 ARCH=local VERSION=psmp # MPI + OpenMP"
      - heading "Verify" [level=1] [ref=e1268]
      - paragraph [ref=e1269]: "./bin/local/cp2k.psmp –version ``’"
      - paragraph [ref=e1270]: "The dependencies are: GCC ≥ 9, MPI, BLAS / LAPACK / ScaLAPACK, FFTW3, libint (for ERIs), libxc (for modern functionals), libxsmm (for the matrix multiplications), and CUDA (for GPU support)."
      - heading "5.3 Input file template — H₂O geometry optimisation" [level=3] [ref=e1271]
      - paragraph [ref=e1272]: "```fortran ! h2o.inp &GLOBAL PROJECT h2o RUN_TYPE GEO_OPT PRINT_LEVEL MEDIUM &END GLOBAL"
      - paragraph [ref=e1273]: "&MOTION &GEO_OPT TYPE MINIMIZATION OPTIMIZER BFGS MAX_ITER 100 MAX_FORCE 1.0E-03 ! Hartree / Bohr &END GEO_OPT &END MOTION"
      - paragraph [ref=e1274]: "&FORCE_EVAL METHOD QUICKSTEP &DFT BASIS_SET_FILE_NAME BASIS_MOLOPT POTENTIAL_FILE_NAME GTH_POTENTIALS CHARGE 0 MULTIPLICITY 1 &QS EPS_DEFAULT 1.0E-12 ! orbital basis &END QS &POISSON PERIODIC NONE PSOLVER MT ! Martyna-Tuckerman (isolated) &END POISSON &MGRID CUTOFF 300 ! plane-wave cutoff, Ry REL_CUTOFF 50 ! 50-100 Ry for the Gaussian density &END MGRID &SCF MAX_SCF 50 EPS_SCF 1.0E-6 SCF_GUESS ATOMIC &END SCF &XC &XC_FUNCTIONAL PBE &END XC_FUNCTIONAL &END XC &END DFT &SUBSYS &CELL ABC 6.0 6.0 6.0 PERIODIC NONE &END CELL &COORD O 0.000 0.000 0.000 H 0.957 0.000 0.000 H -0.240 0.927 0.000 &END COORD &KIND O BASIS_SET DZVP-MOLOPT-GTH POTENTIAL GTH-PBE-q6 &END KIND &KIND H BASIS_SET DZVP-MOLOPT-GTH POTENTIAL GTH-PBE-q1 &END KIND &END SUBSYS &END FORCE_EVAL ``’"
      - paragraph [ref=e1275]: "To run on 4 cores:"
      - paragraph [ref=e1276]: "```bash mpiexec -n 4 cp2k.psmp -i h2o.inp -o h2o.out ``’"
      - paragraph [ref=e1277]: "The total energy (in Hartree!) is in `h2o.out’ after:"
      - paragraph [ref=e1278]: "```bash $ grep “Total FORCE_EVAL” h2o.out ENERGY| Total FORCE_EVAL ( QS ) energy (a.u.): -17.2153 ``’"
      - paragraph [ref=e1279]: (For PBE on H₂O, the experimental geometry gives ~ -17.21 Eh = -468.5 eV; this matches the CP2K PBE value with the DZVP-MOLOPT-GTH basis and the GTH-PBE pseudopotential.)
      - heading "5.4 Convergence tests" [level=3] [ref=e1280]
      - paragraph [ref=e1281]:
        - text: "CP2K’s convergence is structured around three parameters: the"
        - strong [ref=e1282]: Gaussian basis set
        - text: ", the"
        - strong [ref=e1283]: plane-wave cutoff
        - text: (‘CUTOFF’ in ‘&MGRID
        - code [ref=e1284]: ), and the **relative cutoff** ('REL_CUTOFF' in '&MGRID
        - text: "). The convergence recipes:"
      - list [ref=e1285]:
        - listitem [ref=e1286]:
          - paragraph [ref=e1287]:
            - strong [ref=e1288]: Gaussian basis set.
            - text: "The MOLOPT family is the recommended choice:"
            - code [ref=e1289]: DZVP-MOLOPT-GTH' (double-zeta with polarisation),
            - text: TZV2P-MOLOPT-GTH’ (triple-zeta with two polarisation functions), and
            - code [ref=e1290]: QZV2P-MOLOPT-GTH' (quadruple-zeta). For a quick check,
            - text: DZVP-MOLOPT-GTH’ is fine; for production geometries and energies,
            - code [ref=e1291]: TZV2P-MOLOPT-GTH' is the default. For high-accuracy reference calculations,
            - text: "QZV2P-MOLOPT-GTH`."
        - listitem [ref=e1292]:
          - paragraph [ref=e1293]:
            - strong [ref=e1294]:
              - text: Plane-wave cutoff (
              - code [ref=e1295]: CUTOFF
              - text: ).
            - text: Sweep from 200 Ry to 1000 Ry in steps of 50 Ry. Pick the smallest value at which the total energy changes by less than 1 meV/atom. For
            - code [ref=e1296]: DZVP-MOLOPT-GTH
            - text: ", the converged"
            - code [ref=e1297]: CUTOFF' is 300–400 Ry; for
            - text: TZV2P-MOLOPT-GTH
            - code [ref=e1298]: ", 500–700 Ry; for"
            - text: "QZV2P-MOLOPT-GTH`, 800–1000 Ry."
        - listitem [ref=e1299]:
          - paragraph [ref=e1300]:
            - strong [ref=e1301]:
              - text: Relative cutoff (
              - code [ref=e1302]: REL_CUTOFF
              - text: ).
            - text: The
            - code [ref=e1303]: REL_CUTOFF' is the cutoff for the *auxiliary* density (the Gaussian density expanded in plane waves). The default is 50 Ry, but for high-accuracy work, increase to 60–100 Ry. The energy converges *muc'h*' faster in 'REL_CUTOFF' than in
            - text: "CUTOFF`."
        - listitem [ref=e1304]:
          - paragraph [ref=e1305]:
            - strong [ref=e1306]: SCF convergence.
            - text: The default
            - code [ref=e1307]: EPS_SCF = 1.0E-6' is too loose for production. Use
            - text: 1.0E-7’ for routine geometry optimisation and
            - code [ref=e1308]: 1.0E-8' for final energies and properties. For difficult systems (transition-metal oxides, mid-gap states), use
            - text: "OT’ (the orbital transformation solver) with `PRECONDITIONER FULL_SINGLE_INVERSE’ and ‘MINIMIZER DIIS’."
        - listitem [ref=e1309]:
          - paragraph [ref=e1310]:
            - strong [ref=e1311]: OT solver for large systems.
            - text: "The diagonalisation solver scales as `O(N³)’ in the system size; the OT (orbital transformation) solver scales as ‘O(N²)’ to ‘O(N)’ (with the right preconditioner). For systems with more than ~ 500 atoms, the OT solver is the only option."
        - listitem [ref=e1312]:
          - paragraph [ref=e1313]:
            - strong [ref=e1314]: MD timestep.
            - text: "The default 0.5 fs is safe for water with PBE. For H–H bonds or fast stretches, use 0.25 fs or smaller. For constant-temperature NVT, the thermostat relaxation time (the ‘TIMECON’ in the ‘&NOSE’ block) should be ~ 10× the timestep (e.g. `TIMECON 1000 fs’ for a ‘TIMESTEP 0.5 fs’)."
