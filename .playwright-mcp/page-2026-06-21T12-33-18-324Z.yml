      - heading "5.6 Advanced features" [level=3] [ref=e1386]
      - list [ref=e1387]:
        - listitem [ref=e1388]:
          - strong [ref=e1389]: OT solver (Orbital Transformation).
          - text: Switch ‘&SCF … &END SCF’ to ‘&SCF … &OT … &END OT &END SCF
          - code [ref=e1390]: . The OT solver is the recommended choice for systems with more than ~ 500 atoms. The 'MINIMIZER' can be 'DIIS' (default),
          - text: CG’ (conjugate gradient), or
          - code [ref=e1391]: SD' (steepest descent). The
          - text: "PRECONDITIONER’ is the most important parameter:"
          - code [ref=e1392]: FULL_SINGLE_INVERSE' is the most robust default;
          - text: FULL_KINETIC’ is faster but less robust.
        - listitem [ref=e1393]:
          - strong [ref=e1394]: Hybrid functionals (HSE06, PBE0).
          - text: Add
          - code [ref=e1395]: "&XC ... &HF ... &END HF &END XC' with"
          - text: "&HF … FRACTION 0.25 … &END HF’ for PBE0, or with"
          - code [ref=e1396]: "&SCREENING ... &END SCREENING' for HSE06. The HSE06 calculation in CP2K uses a *truncated Coulom'b*' kernel — the '&SCREENING ... &END SCREENING' block specifies the screening length (0.2 Å⁻¹ for HSE06). The cost is ~ 50× that of semilocal DFT; the"
          - text: CUTOFF’ must be increased to 600–1000 Ry.
        - listitem [ref=e1397]:
          - strong [ref=e1398]: DFT+U.
          - text: Add
          - code [ref=e1399]: "&DFT ... &PLUS_U ... &END PLUS_U ... &END DFT' with"
          - text: "&PLUS_U … &END PLUS_U’ per species. The"
          - code [ref=e1400]: L
          - text: ","
          - code [ref=e1401]: U
          - text: ", and"
          - code [ref=e1402]: J' parameters are specified per species. The Dudarev formulation is the default (the
          - text: U_eff = U - J’ is the effective parameter).
        - listitem [ref=e1403]:
          - strong [ref=e1404]: MP2 and RPA.
          - text: Add
          - code [ref=e1405]: METHOD QUICKSTEP' with
          - text: "&DFT … &WF_CORRELATION … &END WF_CORRELATION &END DFT’ and ‘METHOD MP2’ (or ‘METHOD RPA"
          - code [ref=e1406]: ). The MP2 calculation scales as
          - text: O(N⁵)
          - code [ref=e1407]: ; the RPA scales as
          - text: "O(N⁶)`. The output is the MP2 / RPA correlation energy on top of a converged PBE / PBE0 ground state."
        - listitem [ref=e1408]:
          - strong [ref=e1409]:
            - img [ref=e1411]
            - text: and BSE.
          - text: Available via the ‘METHOD GW’ and ‘METHOD BSE’ blocks. The GW calculation is similar in scope to the
          - code [ref=e1424]: West' /
          - text: Yambo’ implementations on top of QE / VASP.
        - listitem [ref=e1425]:
          - strong [ref=e1426]: Dispersion (D3, D4, TS, MBD).
          - text: Add
          - code [ref=e1427]: "&XC ... &VDW_POTENTIAL ... &END VDW_POTENTIAL &END XC' with"
          - text: POTENTIAL_TYPE PAIR_POTENTIAL’ and
          - code [ref=e1428]: PARAMETER_FILE_NAME dftd3.dat' for D3, or
          - text: POTENTIAL_TYPE NON_LOCAL’ for the many-body dispersion (MBD@rsSCS).
        - listitem [ref=e1429]:
          - strong [ref=e1430]: NEB and dimer.
          - text: The NEB module is invoked with ‘RUN_TYPE BAND’ and a ‘&MOTION … &BAND … &END BAND &END MOTION’ block. The
          - code [ref=e1431]: BAND_TYPE' can be 'IT-NEB' (improved tangent NEB), 'CI-NEB' (climbing image NEB), or
          - text: "DIMER`. The output is the converged NEB trajectory; a frequency calculation on the saddle-point image confirms a single imaginary mode."
        - listitem [ref=e1432]:
          - strong [ref=e1433]: Metadynamics (PLUMED).
          - text: The
          - code [ref=e1434]: RUN_TYPE MD' with
          - text: "&MOTION … &MD … &END MD &END MOTION’ and the PLUMED interface for enhanced-sampling. PLUMED is loaded as a runtime library."
        - listitem [ref=e1435]:
          - strong [ref=e1436]: Ab-initio MD (NVE, NVT, NPT).
          - code [ref=e1437]: RUN_TYPE MD' with the '&MD' block. 'ENSEMBLE NVE' (default),
          - text: NVT’ (Nose–Hoover, CSVR, or GLE thermostat), or
          - code [ref=e1438]: NPT' (variable-cell MD with the Andersen or Martyna–Tobias–Klein barostat). The timestep is
          - text: TIMESTEP 0.5 fs’ (default); for H–H bonds, use ‘0.25 fs’.
      - heading "5.7 Worked example — NEB of H diffusion on Pt(111)" [level=3] [ref=e1439]
      - paragraph [ref=e1440]:
        - text: "The H diffusion on Pt(111) is a textbook surface science problem: H adsorbs on the"
        - emphasis [ref=e1441]:
          - text: fc
          - code [ref=e1442]: c*' hollow site, diffuses to the neighbouring *hc
          - text: p
        - text: ’ hollow site via a
        - emphasis [ref=e1443]: bridge
        - text: transition state. The activation energy is ~ 0.1 eV (PBE) — small enough that the diffusion is fast at room temperature. This example is the canonical “I want to test my NEB setup” calculation.
      - paragraph [ref=e1444]:
        - strong [ref=e1445]: Step 1 — initial and final geometries
        - text: "(single-point energies on the two endpoints):"
      - paragraph [ref=e1446]: "```fortran ! pt111_h_fcc.inp &GLOBAL PROJECT pt111_h_fcc RUN_TYPE GEO_OPT &END GLOBAL &FORCE_EVAL METHOD QUICKSTEP &DFT BASIS_SET_FILE_NAME BASIS_MOLOPT POTENTIAL_FILE_NAME GTH_POTENTIALS &POISSON PERIODIC XYZ PSOLVER PERIODIC &END POISSON &MGRID CUTOFF 400 REL_CUTOFF 60 &END MGRID &SCF MAX_SCF 50 EPS_SCF 1.0E-6 SCF_GUESS ATOMIC &OT MINIMIZER DIIS PRECONDITIONER FULL_SINGLE_INVERSE &END OT &END SCF &XC &XC_FUNCTIONAL PBE &END XC_FUNCTIONAL &VDW_POTENTIAL POTENTIAL_TYPE PAIR_POTENTIAL &PAIR_POTENTIAL PARAMETER_FILE_NAME dftd3.dat TYPE DFTD3 REFERENCE_FUNCTIONAL PBE &END PAIR_POTENTIAL &END VDW_POTENTIAL &END XC &END DFT &SUBSYS &CELL ABC 11.11 11.11 22.22 PERIODIC XYZ &END CELL ! Pt(111) surface: 3 layers, 4x4 supercell &TOPOLOGY COORD_FILE_NAME pt111_fcc.xyz COORD_FILE_FORMAT XYZ &CENTER_COORDINATES &END CENTER_COORDINATES &END TOPOLOGY &KIND Pt BASIS_SET DZVP-MOLOPT-SR-GTH POTENTIAL GTH-PBE-q10 &END KIND &KIND H BASIS_SET DZVP-MOLOPT-GTH POTENTIAL GTH-PBE-q1 &END KIND &END SUBSYS &END FORCE_EVAL ``’"
      - paragraph [ref=e1447]: "(The `pt111_fcc.xyz’ file contains the Pt(111) surface with 48 Pt atoms and 1 H atom on the fcc hollow site. The same XYZ with the H atom on the hcp hollow site is the final image.)"
      - paragraph [ref=e1448]:
        - strong [ref=e1449]: "Step 2 — NEB calculation:"
      - paragraph [ref=e1450]: "```fortran ! pt111_h_neb.inp &GLOBAL PROJECT pt111_h_neb RUN_TYPE BAND &END GLOBAL &MOTION &BAND BAND_TYPE CI-NEB ! climbing-image NEB NUMBER_OF_REPLICA 8 ! 8 images between fcc and hcp K_SPRING 0.1 ! spring constant, Hartree/Bohr^2 &OPTIMIZER BFGS &END OPTIMIZER &CONVERGENCE MAX_FORCE 1.0E-3 ! Hartree/Bohr &END CONVERGENCE &END BAND &END MOTION &FORCE_EVAL … ! same as the single-point input &END FORCE_EVAL ``’"
      - paragraph [ref=e1451]: "Run on 16 cores:"
      - paragraph [ref=e1452]: "```bash mpiexec -n 16 cp2k.psmp -i pt111_h_neb.inp -o pt111_h_neb.out ``’"
      - paragraph [ref=e1453]:
        - text: The NEB converges in ~ 30 iterations; the output gives the barrier height (the climbing image is the saddle point). The expected barrier height for H/Pt(111) at PBE is ~ 0.1 eV; the converged NEB trajectory in
        - code [ref=e1454]: pt111_h_neb-1.restart' and the band energies in
        - text: pt111_h_neb.log’ confirm the diffusion pathway.
      - paragraph [ref=e1455]:
        - text: For a frequency calculation on the saddle-point image, extract the image, fix the Pt atoms, and run a frequency calculation with
        - code [ref=e1456]: RUN_TYPE VIBRATIONAL ANALYSIS
        - text: . The output gives the imaginary frequency at the saddle point (~ 700 cm⁻¹ for H/Pt(111) at PBE, corresponding to a ~ 1 eV barrier height in a harmonic approximation; the NEB is more accurate).
