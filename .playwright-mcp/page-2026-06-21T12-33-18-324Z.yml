      - heading "2.6 Advanced features" [level=3] [ref=e616]
      - list [ref=e617]:
        - listitem [ref=e618]:
          - strong [ref=e619]: Hybrid functionals (HSE06, PBE0, SCAN0).
          - text: Add ‘input_dft = ‘HSE’’ to ‘&SYSTEM’ for HSE06, ‘input_dft = ‘PBE0’’ for PBE0, and ‘input_dft = ‘SCAN0’’ for the SCAN0 hybrid. The exact-exchange mixing and screening length are controlled by
          - code [ref=e620]: nqx1
          - text: ","
          - code [ref=e621]: nqx2
          - text: ","
          - code [ref=e622]: nqx3' (the FFT grid for the exact exchange) and 'exxdiv_treatment = 'gygi-baldereschi''. The hybrid SCF is ~50× slower than the PBE SCF; use 'mixing_beta = 0.4' and 'mixing_ndim = 16' for the first SCF iterations and switch to
          - text: mixing_beta = 0.7’ once the energy is on track.
        - listitem [ref=e623]:
          - strong [ref=e624]: DFT+U (Dudarev).
          - text: Add
          - code [ref=e625]: lda_plus_u = .TRUE.' and 'Hubbard_U(i)' for each species to '&SYSTEM
          - text: . For the Liechtenstein formulation, use ‘Hubbard_U(i)’ and ‘Hubbard_J(i)’ per
          - img [ref=e627]
          - text: . QE also supports DFT+U+V (inter-site
          - img [ref=e641]
          - text: ) for non-collinear magnetism with ‘lda_plus_u_kind = 1’.
        - listitem [ref=e646]:
          - strong [ref=e647]: Spin–orbit coupling.
          - text: Add
          - code [ref=e648]: noncolin = .TRUE.' and 'lspinorb = .TRUE.' to '&SYSTEM
          - text: ". The initial `starting_magnetization’ must be a 3-component vector per atom. For collinear SOC (spin quantisation along one axis), use ‘lspinorb = .TRUE., noncolin = .FALSE.’. The second-variational SOC (more accurate, faster convergence) is on by default."
        - listitem [ref=e649]:
          - strong [ref=e650]: Van der Waals (D3, D4, TS, MBD).
          - text: QE does
          - emphasis [ref=e651]: not
          - text: ship D3 by default; use the
          - code [ref=e652]: dftd3' plugin via
          - text: "&SYSTEM … dftd3 = .TRUE.’ (since QE 7.0). For older QE versions, use the"
          - code [ref=e653]: xtorch' interface or post-process the energy with a standalone D3 implementation. Tkatchenko–Scheffler (TS) is available as 'dft_ts = .TRUE.'; the many-body dispersion (MBD@rsSCS) is in the
          - text: MBD’ plugin.
        - listitem [ref=e654]:
          - strong [ref=e655]: Phonons (DFPT).
          - text: ‘ph.x’ with ‘tr2_ph = 1.0d-12’ on a non-metallic system. The standard workflow is (i) PBE SCF, (ii)
          - code [ref=e656]: ph.x' at a 2×2×2 (or 4×4×4) q-mesh, (iii)
          - text: q2r.x’ to Fourier-interpolate the force constants, (iv)
          - code [ref=e657]: matdyn.x' to plot the dispersion. For metals, use 'ph.x' with 'ldisp = .TRUE.' and
          - text: nq1, nq2, nq3’ to compute the full dispersion by finite differences (DFPT does not work for metals in QE).
        - listitem [ref=e658]:
          - strong [ref=e659]: Phonons (finite differences).
          - text: "`ph.x’ with ‘tr2_ph = 1.0d-12’ and ‘ldisp = .TRUE.’ on a supercell. Slower than DFPT but works for metals."
        - listitem [ref=e660]:
          - strong [ref=e661]: Nudged elastic band (NEB).
          - code [ref=e662]: neb.x' with an input
          - text: neb.dat’ listing the initial and final images and a list of intermediate atom positions. The
          - code [ref=e663]: path_thr' parameter controls the initial-path smoothing; the
          - text: "CI_scheme’ parameter turns on the climbing-image NEB. The converged saddle point is in the output, and a frequency calculation (`ph.x’ on the saddle-point configuration) confirms a single imaginary mode."
        - listitem [ref=e664]:
          - strong [ref=e665]: Dimer method.
          - code [ref=e666]: neb.x' with
          - text: CI_scheme = ‘dimer’’ for a saddle-point search from a single initial configuration.
        - listitem [ref=e667]:
          - strong [ref=e668]:
            - img [ref=e670]
            - text: and BSE.
          - text: The QE ground state is post-processed by ‘Yambo’ (most common) or ‘West’ (largest systems, stochastic). The
          - code [ref=e683]: pw2gw.x' utility converts the QE 'WAVECAR' ('save/' directory) into the format Yambo reads. The
          - text: pw4gw.x’ utility does the same for West.
        - listitem [ref=e684]:
          - strong [ref=e685]: Ab-initio MD (BO and CP).
          - code [ref=e686]: pw.x' with
          - text: calculation = ‘md’’ is Born–Oppenheimer MD; the CP code (
          - code [ref=e687]: cp.x
          - text: ) is Car–Parrinello MD. The default is NVE; for NVT, add
          - code [ref=e688]: "&THERMOSTAT ... &END THERMOSTAT' with"
          - text: THERMOSTAT = ‘nose’’ (Nose–Hoover) or
          - code [ref=e689]: "'langevin'"
          - text: ". For NPT, use the `CP’ code’s variable- cell MD."
      - heading "2.7 Worked example — Si phonon dispersion by DFPT" [level=3] [ref=e690]
      - paragraph [ref=e691]:
        - text: "The QE phonon workflow is the most-used in the open- source community. Steps: (i) PBE SCF, (ii) DFPT at q = Γ on the conventional cell, (iii) DFPT on a 2×2×2 q-mesh on the primitive cell, (iv)"
        - code [ref=e692]: q2r.x' to Fourier- interpolate, (v)
        - text: matdyn.x’ to plot the dispersion.
      - paragraph [ref=e693]:
        - strong [ref=e694]: Step 1 — PBE SCF
        - text: (
        - code [ref=e695]: si.scf.in
        - text: "): see the cheatsheet"
        - link "§10.1" [ref=e696] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/software-cheatsheet/
        - text: . The “right” converged
        - code [ref=e697]: ecutwfc' for the SG15 ONCV pseudopotential is 40 Ry; the converged k-mesh is 8×8×8. **Step 2 — DFPT at Γ** (
        - text: "si.ph.Gamma.in`):"
      - paragraph [ref=e698]: "```fortran &INPUTPH tr2_ph = 1.0d-14 ! threshold on the dynamical matrix prefix = ‘si’ outdir = ‘./tmp/’ fildyn = ‘si.dyn.Gamma’ ! output: dynamical matrix at q = 0 recover = .TRUE. ! resume from a previous run / ``’"
      - paragraph [ref=e699]: "Run:"
      - paragraph [ref=e700]: "```bash mpirun -n 4 ph.x -in si.ph.Gamma.in > si.ph.Gamma.out ``’"
      - paragraph [ref=e701]:
        - strong [ref=e702]: Step 3 — DFPT on a 2×2×2 q-mesh
        - text: (
        - code [ref=e703]: si.ph.qmesh.in
        - text: "):"
      - paragraph [ref=e704]: "```fortran &INPUTPH tr2_ph = 1.0d-14 prefix = ‘si’ outdir = ‘./tmp/’ fildyn = ‘si.dyn’ ! output: dynamical matrices for all q-points recover = .TRUE. start_q = 1 ! first q-point last_q = 8 ! last q-point (2x2x2 = 8 q-points) / ``’"
      - paragraph [ref=e705]: "Run:"
      - paragraph [ref=e706]: "```bash mpirun -n 4 ph.x -in si.ph.qmesh.in > si.ph.qmesh.out ``’"
      - paragraph [ref=e707]:
        - strong [ref=e708]: Step 4 — Fourier-interpolation
        - text: (
        - code [ref=e709]: si.q2r.in
        - text: "):"
      - paragraph [ref=e710]: "```fortran &INPUT fildyn = ‘si.dyn’ flfrc = ‘si.fc’ ! output: real-space force constants zasr = ‘simple’ ! acoustic-sum rule / ``’"
      - paragraph [ref=e711]: "Run:"
      - paragraph [ref=e712]: "```bash q2r.x -in si.q2r.in > si.q2r.out ``’"
      - paragraph [ref=e713]:
        - strong [ref=e714]: Step 5 — Plot the dispersion
        - text: (
        - code [ref=e715]: si.matdyn.in
        - text: "):"
      - paragraph [ref=e716]: "```fortran &INPUT flfrc = ‘si.fc’ flfrq = ‘si.freq’ ! output: phonon frequencies along the path q_in_cryst_coord = .TRUE. / 8 0.0 0.0 0.0 30 0.5 0.0 0.5 30 0.5 0.25 0.75 30 0.375 0.375 0.375 30 0.0 0.0 0.0 30 0.5 0.5 0.5 30 ``’"
      - paragraph [ref=e717]: "Run:"
      - paragraph [ref=e718]: "```bash matdyn.x -in si.matdyn.in > si.matdyn.out ``’"
      - paragraph [ref=e719]:
        - text: The output
        - code [ref=e720]: si.freq' has one row per q-point and one column per mode. The expected phonon dispersion of Si peaks at ~ 520 cm⁻¹ (the TO mode at Γ); the TA mode is acoustic (linear in
        - text: "q`) with the slope of sound."
      - paragraph [ref=e721]:
        - text: For visualisation, convert
        - code [ref=e722]: si.freq' to a plot with
        - text: plotband.x’ or a custom Python script.
      - separator [ref=e723]
      - heading "3. ORCA" [level=2] [ref=e724]
      - heading "3.1 Overview" [level=3] [ref=e725]
      - paragraph [ref=e726]:
        - text: ORCA is a C++ quantum-chemistry program distributed
        - strong [ref=e727]: free of charge for academic use
        - text: (commercial for industry) by the group of Frank Neese at the Max Planck Institute for Kohlenforschung. It is the workhorse of
        - emphasis [ref=e728]: "inorganic and organometalli`c"
        - text: "’ quantum chemistry, with particularly strong modules for:"
      - list [ref=e729]:
        - listitem [ref=e730]:
          - text: Broken-symmetry DFT for antiferromagnets (
          - link "chapter 04" [ref=e731] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: §4.8.5)
        - listitem [ref=e732]: "Multi-reference methods: CASSCF, NEVPT2, MRCI"
        - listitem [ref=e733]: "High-accuracy coupled cluster: DLPNO-CCSD(T) (the canonical-accuracy “golden standard” on 100-atom systems)"
        - listitem [ref=e734]: "Spectroscopy: UV/Vis, XAS, EPR, NMR, Mössbauer"
        - listitem [ref=e735]: Geometry optimisation, NEB, transition-state search, IRC, ab-initio MD
      - paragraph [ref=e736]:
        - text: ORCA is
        - strong [ref=e737]: not
        - text: a plane-wave code; it uses a Gaussian basis (
        - link "chapter 06" [ref=e738] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-06/
        - text: §6.3) and is a
        - emphasis [ref=e739]: molecular
        - text: "code — no periodic boundary conditions in the standard build (the standalone `ORCA - 3D’ extension adds PBC for solids, but the community standard for periodic solids is VASP / QE / CP2K). For a single transition-metal complex, a small molecule, or a spectroscopic property, ORCA is the de facto choice in the inorganic-chemistry community."
      - heading "3.2 Install" [level=3] [ref=e740]
      - paragraph [ref=e741]:
        - text: ORCA is distributed as a single static binary (
        - code [ref=e742]: orca.x.x.x.tar.xz
        - text: ) that contains the entire program. There is no compilation step; just unpack the archive and add the directory to the
        - code [ref=e743]: PATH
        - text: . The license is the “ORCA License Agreement” — a free annual registration for academic groups. The build supports MPI parallelism (OpenMPI / MPICH), OpenMP, and a separate GPU build (NVIDIA CUDA).
      - paragraph [ref=e744]: "```bash"
      - heading "Download from the ORCA forum (login required)" [level=1] [ref=e745]
      - paragraph [ref=e746]:
        - text: wget
        - link "https://orcaforum.kofo.mpg.de/forum/.../orca_5_0_4_linux_x86-64.tar.xz" [ref=e747] [cursor=pointer]:
          - /url: https://orcaforum.kofo.mpg.de/forum/.../orca_5_0_4_linux_x86-64.tar.xz
        - text: "tar -xf orca_5_0_4_linux_x86-64.tar.xz export PATH=/opt/orca_5_0_4_linux_x86-64:"
        - img [ref=e749]:
          - generic [ref=e755]: "Double subscripts: use braces to clarify"
        - text: "{LD_LIBRARY_PATH}"
      - heading "Verify" [level=1] [ref=e756]
      - paragraph [ref=e757]: "orca –version ``’"
      - paragraph [ref=e758]:
        - text: "Dependencies: an MPI library (optional, for parallel runs), and (for some methods) the"
        - code [ref=e759]: libgfortran' and
        - text: libcblas’ shared libraries that ship with the distribution.
      - heading "3.3 Input file template — H₂O geometry optimisation" [level=3] [ref=e760]
      - paragraph [ref=e761]:
        - text: The ORCA input is a
        - strong [ref=e762]: free-format
        - text: "keyword-value file. The same input file drives all calculations: SCF, geometry optimisation, frequency, NEB, MD. The keywords are not case-sensitive; the input is interpreted as “smart” — a geometry optimisation reads the `Opt’ flag and dispatches accordingly."
      - paragraph [ref=e763]: "```text"
      - heading "h2o_opt.inp" [level=1] [ref=e764]
      - paragraph [ref=e765]: "! B3LYP def2-SVP Opt TightSCF TightOpt # method, basis, job"
      - heading "OR equivalently:" [level=1] [ref=e766]
      - heading "! B3LYP def2-SVP" [level=1] [ref=e767]
      - heading "! Opt" [level=1] [ref=e768]
      - heading "! TightSCF" [level=1] [ref=e769]
      - heading "! TightOpt" [level=1] [ref=e770]
      - paragraph [ref=e771]: "%maxcore 4096 # per-core memory, MB"
      - list [ref=e772]:
        - listitem [ref=e773]: "xyz 0 1 # charge, multiplicity O 0.000 0.000 0.000 H 0.957 0.000 0.000 H -0.240 0.927 0.000 * ``’"
      - paragraph [ref=e774]: "To run on 4 cores:"
      - paragraph [ref=e775]: "```bash $PATH/orca h2o_opt.inp > h2o_opt.out ``’"
      - paragraph [ref=e776]:
        - text: ORCA produces a directory
        - code [ref=e777]: h2o_opt/' with the input, output, GBW (binary orbital file), and the converged geometry (
        - text: "h2o_opt.xyz`). The total energy (in Hartree!) is in the output:"
      - paragraph [ref=e778]: "```bash $ grep “FINAL SINGLE POINT ENERGY” h2o_opt.out FINAL SINGLE POINT ENERGY -76.43421088 ``’"
      - heading "3.4 Convergence tests" [level=3] [ref=e779]
      - paragraph [ref=e780]:
        - text: ORCA is a Gaussian-basis code, so the convergence tests are different from the plane-wave codes above. The two main convergence parameters are the
        - strong [ref=e781]: basis set size
        - text: (‘def2-SVP’ → ‘def2-TZVP’ →
        - code [ref=e782]: def2-QZVP
        - text: ) and the
        - strong [ref=e783]: numerical integration grid
        - text: "(`GridX’ where X is 1–9). For most methods, the default grid is fine, but for geometry optimisation and properties the convergence should be checked."
      - list [ref=e784]:
        - listitem [ref=e785]:
          - paragraph [ref=e786]:
            - strong [ref=e787]: Basis-set convergence.
            - text: Sweep the basis from ‘def2-SVP’ to ‘def2-TZVP’ to
            - code [ref=e788]: def2-QZVP' and check the convergence of the property of interest. For a single-point energy,
            - text: def2-TZVP’ is usually within 0.1 mEh of
            - code [ref=e789]: def2-QZVP
            - text: ; for a geometry,
            - code [ref=e790]: def2-TZVP' gives bond lengths within 0.001 Å of
            - text: def2-QZVP
            - code [ref=e791]: ". For high-accuracy reference calculations, the **complete basis set (CBS)** extrapolation uses 'n^{-3}' for the HF energy and 'n^{-5}' for the correlation energy (Helgaker–Halkier), with"
            - text: n = 3 (TZ)’ and ‘n = 4 (QZ)’.
        - listitem [ref=e792]:
          - paragraph [ref=e793]:
            - strong [ref=e794]: Integration grid.
            - text: The default is
            - code [ref=e795]: Grid4' for geometry optimisation and
            - text: Grid5’ for final properties. For an inaccurate grid (e.g.
            - code [ref=e796]: Grid1
            - text: ), the SCF can show “numerical noise” in the energy that does not converge. For high-accuracy spectroscopy (NMR, EPR), use
            - code [ref=e797]: Grid7' and the "no-final-grid" trick (
            - text: UseFinalGridX’ in the SCF block).
        - listitem [ref=e798]:
          - paragraph [ref=e799]:
            - strong [ref=e800]: SCF convergence.
            - text: The default
            - code [ref=e801]: TightSCF' flag gives
            - text: 1.0e-8’ Eh. For difficult systems (open-shell TM, near-degeneracy), use ‘VeryTightSCF’ (‘1.0e-10
            - code [ref=e802]: "). For SCF convergence problems:"
            - text: SlowConv
            - code [ref=e803]: ","
            - text: SOSCF
            - code [ref=e804]: ","
            - text: DIIS
            - code [ref=e805]: ", and"
            - text: "KDIIS’ are available; for very difficult cases, the `TRAH’ (transformation-based accelerated Hartree– Fock) method is robust."
        - listitem [ref=e806]:
          - paragraph [ref=e807]:
            - strong [ref=e808]: RI / RIJCOSX approximation.
            - text: The “Resolution of the Identity” approximation (RI) and the “RI-J + chain-of-spheres exchange” (RIJCOSX) approximation are *muc
            - code [ref=e809]: h*' faster than the full ERI evaluation, with an error of < 0.1 mEh for most properties. For hybrid DFT, use
            - text: RIJCOSX
            - code [ref=e810]: ; for pure GGA, use
            - text: RI
            - code [ref=e811]: . The auxiliary basis is the 'def2/J' basis; for 'def2-SVP' it is
            - text: def2/J
            - code [ref=e812]: ; for 'def2-TZVP' it is 'def2/J'; for 'def2-QZVP' it is
            - text: "def2/J`."
        - listitem [ref=e813]:
          - paragraph [ref=e814]:
            - strong [ref=e815]: Dispersion.
            - text: "For non-covalent interactions, use the D3 or D4 corrections:"
            - code [ref=e816]: "! D3BJ' for D3 with Becke–Johnson damping,"
            - text: "! D4’ for the newer D4. These add an empirical pairwise (or many-body) term to the energy."
