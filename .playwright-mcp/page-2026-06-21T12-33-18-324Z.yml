      - heading "3.6 Advanced features" [level=3] [ref=e876]
      - list [ref=e877]:
        - listitem [ref=e878]:
          - strong [ref=e879]: Hybrid functionals.
          - text: "All common hybrids are available: B3LYP (‘! B3LYP’), PBE0 (‘! PBE0’), TPSSh (‘! TPSSh’), the range-separated hybrids"
          - code [ref=e880]: ωB97X-D3
          - text: ","
          - code [ref=e881]: ωB97X-V
          - text: ","
          - code [ref=e882]: ωB97M-V
          - text: ","
          - code [ref=e883]: CAM-B3LYP' ('! CAM-B3LYP'). For dispersion-corrected hybrid functionals, add
          - text: "! D3BJ’ (D3 with Becke–Johnson damping), ‘! D4’ (D4), or ‘! NL’ (the non-local Vydrov–Van Voorhis dispersion, used in"
          - code [ref=e884]: ωB97X-V
          - text: ).
        - listitem [ref=e885]:
          - strong [ref=e886]: Double-hybrids.
          - text: The “double-hybrid” functionals (MP2 correlation on top of a hybrid exchange,
          - link "chapter 05" [ref=e887] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: "§5.6) are available: B2PLYP (‘! B2PLYP’), DSD-PBEP86 (‘! DSD-PBEP86’), ωB97X-2 (‘! ωB97X-2’). These are slower than hybrids but more accurate for non-covalent interactions and thermochemistry."
        - listitem [ref=e888]:
          - strong [ref=e889]: CASSCF / NEVPT2.
          - text: The complete active space SCF (CASSCF) module is a full multi-reference method; NEVPT2 is the
          - emphasis [ref=e890]: "n"
          - text: "-electron valence perturbation theory 2nd-order perturbation on top of CASSCF. The active space is specified in `%casscf … nel = 6 … norb = 5 … end’ (6 electrons in 5 orbitals for the Cr(CO)₆ example below). The orbital optimisation is restarted if the CASSCF SCF does not converge."
        - listitem [ref=e891]:
          - strong [ref=e892]: DLPNO-CCSD(T).
          - text: The “domain-based local pair natural orbital” CCSD(T) method is ORCA’s flagship high-accuracy method. It is the canonical-accuracy “golden standard” on 100-atom systems. The convergence is controlled by
          - code [ref=e893]: TightPNO' (default) and
          - text: "NormalPNO’ (faster, less accurate). The `%mdci … TCutPNO … end’ block controls the PNO cutoffs."
        - listitem [ref=e894]:
          - strong [ref=e895]: "Spectroscopy: UV/Vis (TDDFT)."
          - text: The TDDFT module is a standard “Casida” linear-response TDDFT (
          - link "chapter 11" [ref=e896] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: "). Specify ‘! TDDFT’ with ‘NRoots 50’ (50 excited states) and `MaxDim 200’ (the maximum subspace size). For spin-flip TDDFT (diradicals), use ‘! SF-TDDFT’."
        - listitem [ref=e897]:
          - strong [ref=e898]: "Spectroscopy: EPR / NMR."
          - text: ORCA computes hyperfine coupling (EPR) and NMR chemical shifts via the
          - code [ref=e899]: EPRNMR' module. The input is '! EPRNMR' with 'NTrip' (triplet state for EPR) or
          - text: NAtoms’ (for NMR shielding). The output is the hyperfine tensor and the shielding tensor.
        - listitem [ref=e900]:
          - strong [ref=e901]: "Spectroscopy: Mössbauer."
          - text: "The Mössbauer isomer shift is computed via the `Mossbauer’ module. The reference isomer shift is fitted to experiment; the computed contact density is the “raw” output."
        - listitem [ref=e902]:
          - strong [ref=e903]: Mössbauer / EPR with SOC.
          - text: For 5
          - img [ref=e905]
          - text: and 4
          - img [ref=e911]
          - text: systems, SOC is required for an accurate EPR / NMR / Mössbauer property. Use
          - code [ref=e916]: "! SOMF' (the spin-orbit mean-field integral approximation) or"
          - text: "! RI-SOMF’ for the SOC treatment."
        - listitem [ref=e917]:
          - strong [ref=e918]: Geometry optimisation + NEB.
          - text: ORCA’s NEB module (‘! NEB-TS’) is a full climbing-image NEB for transition-state search. The input is ‘! NEB-TS’ with ‘NImages 8’ (8 images between the initial and final states). The converged saddle point is in the output.
        - listitem [ref=e919]:
          - strong [ref=e920]: Ab-initio MD.
          - text: ORCA’s MD module supports Born–Oppenheimer MD with the same input format as the geometry optimisation. Use
          - code [ref=e921]: "! MD' with 'TimeStep 0.5 fs' and 'NSteps 1000"
          - text: . For a thermal initial condition, use ‘! MDINIT 300 K’.
      - heading "3.7 Worked example — Cr(CO)₆ CASSCF + NEVPT2" [level=3] [ref=e922]
      - paragraph [ref=e923]:
        - text: The Cr(CO)₆ complex has a Cr⁰ in an octahedral field, with 6 CO ligands. The relevant electronic structure is the
        - img [ref=e925]
        - text: configuration of Cr⁰ in a
        - img [ref=e934]
        - text: ground state. A CASSCF(6,5) calculation (6 electrons in 5
        - img [ref=e946]
        - text: orbitals) with NEVPT2 dynamic correlation gives a spectrum that matches the experimental UV/Vis absorption to within 0.1 eV.
      - paragraph [ref=e951]:
        - strong [ref=e952]: "Step 1 — geometry optimisation at DFT:"
      - paragraph [ref=e953]: "```text ! BP86 def2-TZVP Opt TightSCF TightOpt ! D3BJ # Becke-Johnson-damped D3 %maxcore 4096"
      - list [ref=e954]:
        - listitem [ref=e955]: "xyz 0 1 Cr 0.000 0.000 0.000 C 1.918 0.000 0.000 C -1.918 0.000 0.000 C 0.000 1.918 0.000 C 0.000 -1.918 0.000 C 0.000 0.000 1.918 C 0.000 0.000 -1.918 O 3.075 0.000 0.000 O -3.075 0.000 0.000 O 0.000 3.075 0.000 O 0.000 -3.075 0.000 O 0.000 0.000 3.075 O 0.000 0.000 -3.075 * ``’"
      - paragraph [ref=e956]: "Run on 8 cores:"
      - paragraph [ref=e957]: "```bash $PATH/orca crco6_opt.inp > crco6_opt.out ``’"
      - paragraph [ref=e958]:
        - strong [ref=e959]: "Step 2 — CASSCF(6,5) at the converged geometry:"
      - paragraph [ref=e960]: "```text ! CASSCF(6,5) def2-TZVP TightSCF ! NEVPT2 # perturbative correction on top %maxcore 4096"
      - paragraph [ref=e961]: "%casscf nel 6 # 6 electrons norb 5 # 5 orbitals mult 1 # singlet (low-spin Cr^0) nroots 5 # 5 singlet roots switchstep nr # orbital optimisation end"
      - list [ref=e962]:
        - listitem [ref=e963]: "xyzfile 0 1 crco6_opt.xyz # read geometry from the DFT optimisation ``’"
      - paragraph [ref=e964]: "Run on 8 cores:"
      - paragraph [ref=e965]: "```bash $PATH/orca crco6_casscf.inp > crco6_casscf.out ``’"
      - paragraph [ref=e966]: The CASSCF SCF converges in 10–20 iterations; the output gives the energies of the 5 singlet roots (singlet-a, singlet-b, …) and the orbital composition.
      - paragraph [ref=e967]:
        - strong [ref=e968]: "Step 3 — NEVPT2 correction:"
      - paragraph [ref=e969]: "ORCA’s `! NEVPT2’ flag runs the NEVPT2 perturbation automatically as a post-processing step. The output gives the NEVPT2-corrected energies:"
      - paragraph [ref=e970]: "```bash $ grep “NEVPT2” crco6_casscf.out NEVPT2 energies: 0 0.000 eV 1 3.42 eV 2 3.42 eV 3 3.42 eV 4 4.15 eV ``’"
      - paragraph [ref=e971]:
        - text: The 3.42 eV transition matches the experimental
        - img [ref=e973]
        - text: absorption of Cr(CO)₆ at ~ 3.4 eV (in toluene, with a polarisation-corrected shift).
      - paragraph [ref=e1001]:
        - text: For an open-shell case (e.g. a TM complex with a
        - img [ref=e1003]
        - text: "ground state, like a Mn²⁺ octahedral complex), change ‘mult 1’ to ‘mult 3’ (triplet) and the active space to `(5, 5)’ for the high-spin"
        - img [ref=e1013]
        - text: case.
      - separator [ref=e1021]
      - heading "4. GPAW" [level=2] [ref=e1022]
      - heading "4.1 Overview" [level=3] [ref=e1023]
      - paragraph [ref=e1024]:
        - text: GPAW is a Python / C PAW code (
        - link "chapter 08" [ref=e1025] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-08/
        - text: "§8.7) with three modes of operation:"
      - list [ref=e1026]:
        - listitem [ref=e1027]:
          - strong [ref=e1028]: "Real-space grid mode (default):"
          - text: the wavefunctions are represented on a uniform or adaptive real-space grid (similar to Octopus). This is the default mode and is the most general.
        - listitem [ref=e1029]:
          - strong [ref=e1030]: "Plane-wave mode:"
          - text: the wavefunctions are represented on a plane-wave basis (similar to VASP / QE). This is the most accurate mode and is mandatory for
          - img [ref=e1032]
          - text: and BSE.
        - listitem [ref=e1039]:
          - strong [ref=e1040]: "LCAO mode:"
          - text: the wavefunctions are represented on a set of atom-centred numerical atomic orbitals, with the PAW solution projected onto the LCAO basis. This is the
          - emphasis [ref=e1041]: fastest
          - text: mode and is the only mode that scales linearly in system size.
      - paragraph [ref=e1042]:
        - text: The defining feature of GPAW is the
        - emphasis [ref=e1043]:
          - text: "*Python front en"
          - code [ref=e1044]: d*
        - text: ": the entire calculator is accessible from a Python script, and the standard interface is the"
        - strong [ref=e1045]: ASE
        - text: (
        - link "Atomic Simulation Environment" [ref=e1046] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/software-cheatsheet/
        - text: §9.1). This makes GPAW the natural choice when the rest of the workflow (structure generation, MD, machine learning, plotting) is in Python. It is also the most
        - emphasis [ref=e1047]: user-friendly
        - text: "of the PAW codes: a typical “geometry optimisation + band structure + DOS” workflow fits in 20–30 lines of Python, with no input files to write beyond the script itself."
      - heading "4.2 Install" [level=3] [ref=e1048]
      - paragraph [ref=e1049]:
        - text: GPAW is distributed on
        - strong [ref=e1050]: PyPI
        - text: and
        - strong [ref=e1051]: conda-forge
        - text: "as a pre-built binary (for Linux, macOS, and Windows with WSL). The dependencies are: Python ≥ 3.9, NumPy, SciPy, ASE, BLAS, and a C / Cython compiler. The optional dependencies are"
        - code [ref=e1052]: libxc' (for modern functionals),
        - text: "fftw3’ (for the plane-wave mode), and the `spglib’ library (for space-group detection)."
      - paragraph [ref=e1053]: "```bash"
      - 'heading "Easiest: pip install (Linux + Python 3.9+)" [level=1] [ref=e1054]'
      - paragraph [ref=e1055]: pip install gpaw
      - heading "Verify" [level=1] [ref=e1056]
      - paragraph [ref=e1057]: gpaw –version
      - heading "To get the PAW datasets (required!):" [level=1] [ref=e1058]
      - paragraph [ref=e1059]: gpaw install-data ~/.gpaw_data
      - heading "Alternatively, conda-forge:" [level=1] [ref=e1060]
      - paragraph [ref=e1061]: "conda install -c conda-forge gpaw ``’"
      - paragraph [ref=e1062]:
        - text: For a
        - emphasis [ref=e1063]: custom
        - text: "build (e.g. to enable the CUDA GPU support), clone the GitLab repository and compile manually:"
      - paragraph [ref=e1064]:
        - text: "```bash git clone"
        - link "https://gitlab.com/gpaw/gpaw.git" [ref=e1065] [cursor=pointer]:
          - /url: https://gitlab.com/gpaw/gpaw.git
        - text: "cd gpaw python -m pip install -e . ``’"
      - heading "4.3 Input file template — H₂O geometry optimisation in 15 lines" [level=3] [ref=e1066]
      - paragraph [ref=e1067]: "```python"
      - heading "h2o_opt.py" [level=1] [ref=e1068]
      - paragraph [ref=e1069]: from ase import Atoms from gpaw import GPAW, PW
      - heading "1. Build the structure" [level=1] [ref=e1070]
      - paragraph [ref=e1071]: "h2o = Atoms(‘OH2’, positions=[(0, 0, 0), (0.957, 0, 0), (-0.240, 0.927, 0)]) h2o.center(vacuum=4.0) # pad the cell"
      - heading "2. Set up the calculator (plane-wave mode for accuracy)" [level=1] [ref=e1072]
      - paragraph [ref=e1073]: "calc = GPAW( mode=PW(500), # plane-wave cutoff, eV xc=’PBE’, kpts=(1, 1, 1), # Gamma-only for a molecule convergence={‘energy’: 1.0e-6}, # eV per electron convergence={‘forces’: 0.02}, # eV / Angstrom txt=’h2o.txt’, )"
      - heading "3. Run a geometry optimisation" [level=1] [ref=e1074]
      - paragraph [ref=e1075]: "from ase.optimize import BFGS h2o.calc = calc opt = BFGS(h2o, logfile=’h2o.opt.log’) opt.run(fmax=0.02) # convergence criterion: max force"
      - heading "4. Print the result" [level=1] [ref=e1076]
      - paragraph [ref=e1077]: "print(f’Final energy: {h2o.get_potential_energy():.4f} eV’) print(f’Optimised geometry:’) print(h2o.get_positions()) ``’"
      - paragraph [ref=e1078]: "Run on 4 cores:"
      - paragraph [ref=e1079]: "```bash mpiexec -n 4 gpaw python h2o_opt.py ``’"
      - paragraph [ref=e1080]: "The total energy is in eV (GPAW’s default unit). The output `h2o.txt’ is the log file; the optimised geometry is in the output of the script."
      - heading "4.4 Convergence tests" [level=3] [ref=e1081]
      - paragraph [ref=e1082]:
        - text: "GPAW’s convergence is structured around three parameters: the"
        - strong [ref=e1083]: plane-wave cutoff
        - text: (in PW mode), the
        - strong [ref=e1084]: real-space grid spacing
        - text: (in FD mode), and the
        - strong [ref=e1085]: k-point mesh
        - text: "(for periodic systems). The convergence recipes:"
      - list [ref=e1086]:
        - listitem [ref=e1087]:
          - paragraph [ref=e1088]:
            - strong [ref=e1089]: Plane-wave cutoff (PW mode).
            - text: "Sweep from 300 eV to 800 eV in steps of 50 eV, compute the total energy at the experimental geometry, and pick the smallest value at which the energy changes by less than 1 meV/atom. For a typical PBE calculation on a transition-metal oxide with the `0.9.x’ PAW data, the converged cutoff is 400–600 eV."
        - listitem [ref=e1090]:
          - paragraph [ref=e1091]:
            - strong [ref=e1092]: Real-space grid spacing (FD mode).
            - text: Sweep h* from 0.25 Å to 0.10 Å in steps of 0.025 Å. The energy converges
            - emphasis [ref=e1093]: exponentially
            - text: "in h* (the multi-grid solver is exact in the limit of ‘h = 0’), so the convergence is much faster than for the plane-wave cutoff. The default `h = 0.2’ Å is fine for routine work; for high-accuracy forces (‘< 0.01’ eV/Å), use ‘h = 0.15’ Å or smaller."
        - listitem [ref=e1094]:
          - paragraph [ref=e1095]:
            - strong [ref=e1096]: LCAO basis (LCAO mode).
            - text: The default basis is
            - code [ref=e1097]: dzp' (double-zeta with polarisation). For high-accuracy, use
            - text: tzp’ (triple-zeta). The convergence is checked by running a PW mode calculation as a reference and confirming that the LCAO energy matches to within the desired tolerance.
        - listitem [ref=e1098]:
          - paragraph [ref=e1099]:
            - strong [ref=e1100]: K-point mesh.
            - text: "Same as VASP / QE: sweep the mesh density, pick the smallest converged. For a typical Si 2-atom cell, an 8×8×8 mesh converges the total energy to 1 meV/atom."
        - listitem [ref=e1101]:
          - paragraph [ref=e1102]:
            - strong [ref=e1103]: SCF convergence.
            - code [ref=e1104]: "convergence={'energy': 1.0e-6}' (eV per electron) is the default. For high-accuracy, use"
            - text: "1.0e-8"
            - code [ref=e1105]: . For response properties, use '1.0e-10' and a tighter 'density' convergence (the default
            - text: 1.0e-12’ is fine).
        - listitem [ref=e1106]:
          - paragraph [ref=e1107]:
            - strong [ref=e1108]: PAW dataset version.
            - text: GPAW ships with the
            - code [ref=e1109]: gpaw-setups' package (PyPI). The default is the '0.9.x' series. Older '0.8.x' data should not be used for new work. For *all-electron* accuracy benchmarks, use the
            - text: 0.10.x’ data.
      - heading "4.5 Common errors" [level=3] [ref=e1110]
      - table [ref=e1111]:
        - rowgroup [ref=e1112]:
          - row "Error / symptom Likely cause Fix" [ref=e1113]:
            - columnheader "Error / symptom" [ref=e1114]
            - columnheader "Likely cause" [ref=e1115]
            - columnheader "Fix" [ref=e1116]
        - rowgroup [ref=e1117]:
