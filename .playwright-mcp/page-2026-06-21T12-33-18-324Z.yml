      - heading "1.6 Advanced features" [level=3] [ref=e333]
      - list [ref=e334]:
        - listitem [ref=e335]:
          - strong [ref=e336]: Hybrid functionals (HSE06, PBE0, SCAN0).
          - text: Set ‘LHFCALC = .TRUE.’,
          - code [ref=e337]: HFSCREEN = 0.2' (HSE06, screening in Å⁻¹), and
          - text: AEXX = 0.25’ (the exact-exchange mixing, default for HSE06).
          - code [ref=e338]: ALGO = Damped' is the robust default;
          - text: ALGO = All’ is faster when stable. The hybrid SCF is ~50–100× slower than PBE, so converge the geometry at PBE first and run a single-point HSE06 calculation. For a band structure, run a PBE SCF (
          - code [ref=e339]: LCHARG = .TRUE.' to write
          - text: CHGCAR
          - code [ref=e340]: ), then a hybrid NSCF with
          - text: ICHARG = 11’ (read
          - code [ref=e341]: CHGCAR
          - text: ", do not update). See the worked example below."
        - listitem [ref=e342]:
          - strong [ref=e343]: DFT+U.
          - text: Set ‘LDAU = .TRUE.’ and ‘LDAUTYPE = 2’ (Dudarev’s rotationally-invariant formulation
          - link "chapter 12" [ref=e344] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: ). For a transition-metal oxide with the
          - img [ref=e346]
          - text: states localised, set ‘LDAUL = 2’ (the
          - img [ref=e352]
          - text: channel), ‘LDAUU’ and ‘LDAUJ’ per species (e.g. ‘LDAUU = 4.0 0.0’ for O-d = 4 eV, H-d = 0). For the Liechtenstein formulation (‘LDAUTYPE = 1’), set both ‘LDAUU’ and ‘LDAUJ’ per
          - img [ref=e358]
          - text: .
        - listitem [ref=e371]:
          - strong [ref=e372]: Spin–orbit coupling (SOC).
          - text: Set ‘LSORBIT = .TRUE.’ and ‘LNONCOLLINEAR = .TRUE.
          - code [ref=e373]: . The initial
          - text: MAGMOM’ must be a 3-component vector (not a scalar). For a non-magnetic calculation with SOC, set ‘ISPIN = 1’, ‘LNONCOLLINEAR = .TRUE.’, and ‘MAGMOM = 0 0 0’. The output is non-collinear (
          - img [ref=e375]
          - text: density matrix);
          - code [ref=e384]: LORBIT = 11' or
          - text: LORBIT = 13’ produces the per-orbital projection.
        - listitem [ref=e385]:
          - strong [ref=e386]: van der Waals corrections (D3, D4, TS, MBD).
          - text: VASP ships Grimme’s D3 since v5.4 (‘IVDW = 12’). Set ‘IVDW = 12’ for D3(BJ), ‘IVDW = 20’ for D4,
          - code [ref=e387]: IVDW = 2' for Tkatchenko–Scheffler (TS), and
          - text: "IVDW = 4’ for the many-body dispersion (MBD@rsSCS). The D3 zero-damping is `IVDW = 11’ and the Becke–Johnson damping is ‘IVDW = 12’."
        - listitem [ref=e388]:
          - strong [ref=e389]: Phonons (finite differences).
          - code [ref=e390]: IBRION = 6' with
          - text: NFREE = 2’ (central differences) computes a phonon dispersion by finite differences. Requires a converged equilibrium geometry (forces < 0.001 eV/Å) and a non-metallic ground state (or a very dense k-mesh for metals). The output is a
          - code [ref=e391]: phonon' directory with the force constants; use 'phonopy' ('<https://phonopy.github.io/
          - text: ">) to post-process."
        - listitem [ref=e392]:
          - strong [ref=e393]: Phonons (DFPT).
          - text: ‘IBRION = 5’ and ‘LEPSILON = .TRUE.’ invokes density-functional perturbation theory (DFPT) for the dynamical matrix. Required for IR intensities (Born effective charges from
          - code [ref=e394]: LEPSILON
          - text: "), and much faster than finite differences on a non-metallic system. Output:"
          - code [ref=e395]: OUTCAR' contains the dynamical matrix at Γ; the full dispersion requires a supercell with 'PHON_NSTRUCT' and the 'PHON_CALCPATH' block in the
          - text: "INCAR`."
        - listitem [ref=e396]:
          - strong [ref=e397]: Nudged elastic band (NEB).
          - code [ref=e398]: IBRION = 3' (NEB) or 'IBRION = 1' with 'ICHAIN = 0' and
          - text: IOPT = 1’ runs a NEB transition-state search. The initial and final images are read from ‘POSCAR’ and ‘CONTCAR
          - code [ref=e399]: ; the intermediate images are specified in
          - text: "POSCAR’ with the `Selective dynamics’ tag. The climbing-image variant (‘LCLIMB = .TRUE.’) gives a more accurate saddle point at the cost of a slower NEB convergence."
        - listitem [ref=e400]:
          - strong [ref=e401]: Dimer method.
          - text: ‘IBRION = 3’ with ‘ICHAIN = 0’ and
          - code [ref=e402]: IOPT = 3' runs the dimer method for a saddle-point search from a single initial configuration. The output is a
          - text: "CONTCAR’ corresponding to the saddle point; frequency analysis (`NWRITE = 2’ and a finite-difference follow-up) confirms a single imaginary mode."
        - listitem [ref=e403]:
          - strong [ref=e404]:
            - img [ref=e406]
            - text: and BSE.
          - text: Set ‘ALGO = GW’; requires a converged PBE / HSE06 starting point. The standard workflow is (i) PBE SCF, (ii) HSE06 SCF (or PBE0), (iii)
          - img [ref=e420]
          - text: on top, (iv) BSE for optical absorption. The number of bands (
          - code [ref=e433]: NBANDS
          - text: ") must be increased to include all unoccupied states that contribute to the self-energy (typically 5–10× the number of occupied bands). The `vasp_gw’ executable is required."
      - heading "1.7 Worked example — band structure of Si with HSE06" [level=3] [ref=e434]
      - paragraph [ref=e435]: "A complete workflow: PBE SCF → HSE06 SCF → HSE06 band structure along Γ–X–W–K–Γ–L. The PBE step is the “warm-up”; the HSE06 step is where the band gap opens up to the experimental 1.12 eV (PBE gives 0.6 eV; HSE06 gives 1.13 eV)."
      - paragraph [ref=e436]:
        - strong [ref=e437]: Step 1 — PBE SCF
        - text: (
        - code [ref=e438]: INCAR.PBE
        - text: "):"
      - paragraph [ref=e439]: "```bash"
      - heading "INCAR" [level=1] [ref=e440]
      - paragraph [ref=e441]: "SYSTEM = Si PBE SCF ENCUT = 500 EDIFF = 1.0e-5 ISMEAR = 0 SIGMA = 0.05 IBRION = -1 LCHARG = .TRUE. # write CHGCAR for HSE LWAVE = .TRUE. # write WAVECAR for HSE LREAL = .FALSE. ``’"
      - paragraph [ref=e442]:
        - code [ref=e443]: KPOINTS
        - text: ","
        - code [ref=e444]: POSCAR
        - text: ", `POTCAR’ are as in the Si band structure example in the cheatsheet ("
        - link "§10.2" [ref=e445] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/software-cheatsheet/
        - text: "). Run on 8 cores:"
      - paragraph [ref=e446]: "```bash mpirun -n 8 vasp_std ``’"
      - paragraph [ref=e447]:
        - strong [ref=e448]: Step 2 — HSE06 SCF
        - text: (
        - code [ref=e449]: INCAR.HSE
        - text: "): identical to the PBE INCAR with the following changes:"
      - paragraph [ref=e450]: "```bash LHFCALC = .TRUE. HFSCREEN = 0.2 # HSE06 screening, 1/Angstrom AEXX = 0.25 # exact-exchange mixing ALGO = Damped # robust SCF algorithm for hybrids TIME = 0.4 # damping parameter PRECFOCK = Normal # FFT grid for the exact exchange EDIFF = 1.0e-5 # tighter than PBE ``’"
      - paragraph [ref=e451]: "Run again on 8 cores (HSE06 is ~ 100× slower than PBE on this system):"
      - paragraph [ref=e452]: "```bash mpirun -n 8 vasp_std ``’"
      - paragraph [ref=e453]:
        - text: The HSE06 SCF starts from the PBE
        - code [ref=e454]: CHGCAR' (if present, which is why
        - text: LCHARG = .TRUE.’ in step 1). Convergence typically takes 15–25 iterations; check the ‘free energy’ column in ‘OUTCAR’ for the convergence.
      - paragraph [ref=e455]:
        - strong [ref=e456]: Step 3 — HSE06 bands
        - text: (
        - code [ref=e457]: INCAR.bands
        - text: "): same"
        - code [ref=e458]: POTCAR
        - text: ", but a new `KPOINTS’ in line mode (a k-point path instead of a uniform mesh):"
      - paragraph [ref=e459]: "```bash"
      - heading "KPOINTS (line-mode k-path)" [level=1] [ref=e460]
      - paragraph [ref=e461]: "K-Path 6 0.0 0.0 0.0 ! Gamma 0.5 0.0 0.5 ! X 0.5 0.25 0.75 ! W 0.375 0.375 0.375 ! K 0.0 0.0 0.0 ! Gamma 0.5 0.5 0.5 ! L ``’"
      - paragraph [ref=e462]:
        - text: The bands
        - code [ref=e463]: INCAR
        - text: ":"
      - paragraph [ref=e464]: "```bash LHFCALC = .TRUE. HFSCREEN = 0.2 AEXX = 0.25 ALGO = Normal # or ‘Eigenvalue’ (faster for the NSCF step) ICHARG = 11 # read CHGCAR, do not update LWAVE = .FALSE. LCHARG = .FALSE. EDIFF = 1.0e-6 NBANDS = 16 # >= 8 (Si has 8 valence electrons in 2-atom cell) ``’"
      - paragraph [ref=e465]: "Run:"
      - paragraph [ref=e466]: "```bash mpirun -n 8 vasp_std ``’"
      - paragraph [ref=e467]:
        - text: The eigenvalues are in
        - code [ref=e468]: EIGENVAL
        - text: ". To plot:"
      - paragraph [ref=e469]: "```bash"
      - heading "Use pymatgen, sumo, or a custom script" [level=1] [ref=e470]
      - paragraph [ref=e471]: "python -c “ from pymatgen.io.vasp import Vasprun v = Vasprun(‘vasprun.xml’) bs = v.get_band_structure() bs.plot_brillouin() “ ``’"
      - paragraph [ref=e472]: The expected HSE06 band gap of Si is 1.13 eV; the VBM is at Γ, the CBM is at X (a quasi-direct gap with the indirect 1.13 eV and a direct gap of ~ 3.4 eV at Γ). The total energy of the HSE06 calculation should be ~ 0.5 eV/atom lower than the PBE total energy (the typical HSE06 vs. PBE difference for Si).
      - separator [ref=e473]
      - heading "2. Quantum ESPRESSO" [level=2] [ref=e474]
      - heading "2.1 Overview" [level=3] [ref=e475]
      - paragraph [ref=e476]:
        - text: Quantum ESPRESSO (QE) is the de facto
        - strong [ref=e477]: open-source
        - text: plane-wave DFT code, distributed under the GPL and maintained by an international consortium. It is the open-source counterpart to VASP for solid-state DFT and is the workhorse of
        - emphasis [ref=e478]:
          - text: academi
          - code [ref=e479]: c*' solid-state physics, with a particularly deep **phonon** implementation (DFPT and finite-difference) and a mature
          - text: "G_0W_0’ / BSE ecosystem through the ‘Yambo’ and ‘West’ post-processors. The name is an acronym: “opEn Source Package for Research in Electronic Structure, Simulation, and Optimisation”. Unlike VASP, QE ships as a collection of independent executables ("
          - code [ref=e480]: pw.x
          - text: ","
          - code [ref=e481]: ph.x
          - text: ","
          - code [ref=e482]: neb.x
          - text: ","
          - code [ref=e483]: pp.x
          - text: ","
          - code [ref=e484]: bands.x
          - text: ","
          - code [ref=e485]: dos.x
          - text: ","
          - code [ref=e486]: projwfc.x
          - text: ","
          - code [ref=e487]: ppacf.x
          - text: ","
          - code [ref=e488]: matdyn.x
          - text: ","
          - code [ref=e489]: q2r.x
          - text: ","
          - code [ref=e490]: pw2gw.x
          - text: ","
          - code [ref=e491]: turboTDDFT.x
          - text: ", …) — each does one job, and the user scripts the workflow by piping the outputs of one executable into the inputs of the next. The consequence is that the user has a much more *transparent"
        - text: "view of what the code is doing: every intermediate file is text and can be inspected. The cost is a steeper learning curve than VASP’s, and the user-written scripts are not always short."
      - heading "2.2 Install" [level=3] [ref=e492]
      - paragraph [ref=e493]: "QE is built with the standard GNU autotools (‘/configure && make’). The dependencies are: a Fortran 2003 compiler (gfortran ≥ 7, ifort, AMD flang, or nvfortran), an MPI library (openmpi, mpich, Intel MPI), BLAS / LAPACK / ScaLAPACK, an FFT library (FFTW3 or Intel MKL), and (for many modern functionals) the `libxc’ library. The total build takes 30–90 minutes on a modern machine."
      - paragraph [ref=e494]: "```bash"
      - heading "Clone the latest stable release" [level=1] [ref=e495]
      - paragraph [ref=e496]:
        - text: git clone -b qe-7.4
        - link "https://gitlab.com/QEF/q-e.git" [ref=e497] [cursor=pointer]:
          - /url: https://gitlab.com/QEF/q-e.git
        - text: qe cd qe
      - heading "Configure for MPI + OpenMP + CUDA (NVIDIA GPUs)" [level=1] [ref=e498]
      - paragraph [ref=e499]:
        - text: ./configure –enable-parallel –enable-openmp
        - text: –with-cuda=/usr/local/cuda
        - text: –with-scalapack=intel
        - text: BLAS_LIBS=”-mkl” LAPACK_LIBS=”-mkl”
        - text: FFT_LIBS=”-mkl”
      - heading "Build all executables" [level=1] [ref=e500]
      - paragraph [ref=e501]: make -j 16 pw pp ph neb cp ld1 upftools
      - heading "Verify" [level=1] [ref=e502]
      - paragraph [ref=e503]: "./bin/pw.x -h | head -10 ``’"
      - paragraph [ref=e504]:
        - text: The executables end up in
        - code [ref=e505]: ./bin/
        - text: . The
        - code [ref=e506]: pseudo/' folder contains the standard pseudopotential library (the PSLibrary, the SG15 ONCV, the UPF format). The "Pseudo Dojo" (
        - 'link "https://www.pseudo-dojo.org/`" [ref=e507] [cursor=pointer]':
          - /url: "https://www.pseudo-dojo.org/`"
        - text: ) is a recommended alternative.
      - heading "2.3 Input file template — H₂O in a box" [level=3] [ref=e508]
      - paragraph [ref=e509]:
        - text: The smallest QE input that produces a sensible H₂O single-point energy. The input format is
        - strong [ref=e510]: Fortran namelist
        - text: ": each section starts with"
        - code [ref=e511]: "&NAME' and ends with"
        - text: "/`."
      - paragraph [ref=e512]:
        - text: "```fortran ! h2o.scf.in &CONTROL calculation = ‘scf’ ! ‘scf’ | ‘relax’ | ‘vc-relax’ | ‘bands’ | ‘nscf’ | ‘md’ | ‘vc-md’ prefix = ‘h2o’ ! base name for output files outdir = ‘./tmp/’ ! scratch directory (MUST exist) pseudo_dir = ‘./pseudo/’ ! directory containing"
        - emphasis [ref=e513]: .UPF pseudopotentials verbosity = ‘low’ ! ‘low’ | ‘high’ | ‘debug’ / &SYSTEM ibrav = 0 ! 0 = free-format (CELL_PARAMETERS / ATOMIC_POSITIONS below) nat = 3 ntyp = 2 ecutwfc = 30.0 ! plane-wave cutoff for wavefunctions, Ry ecutrho = 240.0 ! charge-density cutoff, Ry ! >= 4
        - text: "ecutwfc for norm-conserving ! >= 8-12*ecutwfc for USPP / PAW nbnd = 8 ! >= number of occupied bands (H2O: 8 valence e-) / &ELECTRONS conv_thr = 1.0d-8 ! SCF convergence threshold, Ry mixing_beta = 0.7 ! charge-density mixing (0.7 is robust default) / ATOMIC_SPECIES O 15.999 O.upf ! element, atomic mass, pseudopotential file H 1.008 H.upf ATOMIC_POSITIONS angstrom O 0.000 0.000 0.000 H 0.957 0.000 0.000 H -0.240 0.927 0.000 K_POINTS gamma ! Gamma-only: 1 k-point (molecule in a box) CELL_PARAMETERS angstrom 10.0 0.0 0.0 0.0 10.0 0.0 0.0 0.0 10.0 ``’"
      - paragraph [ref=e514]: "To run on 4 cores:"
      - paragraph [ref=e515]: "```bash mpirun -n 4 pw.x -in h2o.scf.in > h2o.scf.out ``’"
      - paragraph [ref=e516]: "The total energy (in Rydberg!) is in `h2o.scf.out’ after the line ‘! total energy’:"
      - paragraph [ref=e517]: "```bash $ grep “total energy” h2o.scf.out ! total energy = -34.92658373 Ry ``’"
      - paragraph [ref=e518]: (Rydberg is QE’s default energy unit. To convert to eV, multiply by 13.6057. The PBE H₂O total energy is ~ -475.5 eV = -34.93 Ry.)
      - heading "2.4 Convergence tests" [level=3] [ref=e519]
      - paragraph [ref=e520]: QE convergence is structured around the same three parameters as VASP (cutoff, k-mesh, smearing), but with different defaults.
      - list [ref=e521]:
        - listitem [ref=e522]:
          - paragraph [ref=e523]:
            - strong [ref=e524]:
              - text: Plane-wave cutoff (
              - code [ref=e525]: ecutwfc
              - text: ).
            - text: Sweep from 20 Ry to 80 Ry in steps of 5–10 Ry. Pick the smallest value at which the total energy changes by less than 1 meV/atom. For norm-conserving pseudopotentials, the converged
            - code [ref=e526]: ecutwfc' is typically 30–60 Ry; for ultrasoft and PAW, 40–80 Ry. The
            - text: ecutrho’ should be
            - code [ref=e527]: ">= 4 * ecutwfc' for norm-conserving and"
            - text: ">= 8 * ecutwfc’ (often 10–12) for USPP/PAW. The error from a too-small `ecutrho’ is"
            - emphasis [ref=e528]: silent
            - text: — the SCF converges to a “wrong” total energy that is not variational.
        - listitem [ref=e529]:
          - paragraph [ref=e530]:
            - strong [ref=e531]: K-point sampling.
            - text: For a metal, use a Monkhorst–Pack mesh with
            - code [ref=e532]: occupations = 'smearing'' and a Methfessel– Paxton smearing ('smearing = 'mp'',
            - text: degauss = 0.02’ Ry). For an insulator, use
            - code [ref=e533]: occupations = 'fixed'' with a uniform mesh, or
            - text: "occupations = ‘tetrahedron’’ on a sufficiently dense mesh (≥ 4×4×4 on a primitive cell). For a molecule in a box, `K_POINTS gamma’ is correct."
        - listitem [ref=e534]:
          - paragraph [ref=e535]:
            - strong [ref=e536]: Smearing.
            - text: For metals, never use
            - code [ref=e537]: smearing = 'gaussian'' for production (it converges too slowly). Use
            - text: "smearing = ‘mp’’ (Methfessel–Paxton, 2nd order:"
            - code [ref=e538]: degauss = 0.02' Ry) for routine work, and
            - text: "smearing = ‘fd’’ (Fermi–Dirac) for very high accuracy (extrapolate to ‘T = 0’). The `smearing = ‘tetrahedron’’ integrator is the most accurate, but it requires a"
            - emphasis [ref=e539]: uniform
            - text: mesh (no custom k-paths) and at least 4×4×4 points per primitive cell.
        - listitem [ref=e540]:
          - paragraph [ref=e541]:
            - strong [ref=e542]:
              - text: SCF convergence (
              - code [ref=e543]: conv_thr
              - text: ).
            - text: The default
            - code [ref=e544]: 1.0d-6' Ry is too loose for production. Use '1.0d-8' for geometry optimisation, '1.0d-10' for final energies, and
            - text: 1.0d-12’ for phonons and response.
        - listitem [ref=e545]:
          - paragraph [ref=e546]:
            - strong [ref=e547]: Charge-density mixing.
            - text: The default
            - code [ref=e548]: mixing_beta = 0.7' is robust. For difficult systems (transition-metal oxides with strong correlation), reduce to '0.2' and increase 'mixing_ndim = 12' (the Broyden history length). For metallic systems with charge sloshing, use
            - text: mixing_mode = ‘local-TF’’ (Thomas–Fermi local mixer).
      - heading "2.5 Common errors" [level=3] [ref=e549]
      - table [ref=e550]:
        - rowgroup [ref=e551]:
          - row "Error / symptom Likely cause Fix" [ref=e552]:
            - columnheader "Error / symptom" [ref=e553]
