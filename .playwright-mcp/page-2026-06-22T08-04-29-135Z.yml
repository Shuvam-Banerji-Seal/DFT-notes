line restates the problem; the last line boxes the final answer.> </details> <details class=\"problem\"> <summary>Problem 2 (medium) — <one-line statement></summary> ... </details> <details class=\"answer\"> <summary>Show answer</summary> ... </details> <details class=\"problem\"> <summary>Problem 3 (hard) — <one-line statement></summary> ... </details> <details class=\"answer\"> <summary>Show answer</summary> ... </details> ## NN.7 What we left out <honest, explicit list of the things this chapter did not cover, in the same tone as the rest of the chapter. One bullet per topic. Two to five bullets is the norm.> > Next: [Chapter NN+1](/DFT-notes/dft-notes/chapter-NN+1/) > — <one-sentence teaser of the next chapter>"
