    - 'heading "Worked example: a derivation done right" [level=3] [ref=e384]'
    - code [ref=e388]: "## 12.4.2 The Casida equation The Casida equation in matrix form is \\begin{equation} \\label{eq:ch-12-casida} \\begin{pmatrix} \\mathbf A & \\mathbf B \\\\ \\mathbf B^* & \\mathbf A^* \\end{pmatrix} \\begin{pmatrix} \\mathbf X \\\\ \\mathbf Y \\end{pmatrix} = \\omega^2 \\begin{pmatrix} \\mathbf X \\\\ \\mathbf Y \\end{pmatrix} \\end{equation} **Derivation.** We start from the density-response equation \\begin{equation} \\label{eq:ch-12-density-response} \\delta\\rho(\\mathbf r, \\omega) = \\int d\\mathbf r'\\, \\chi_s(\\mathbf r, \\mathbf r'; \\omega)\\, \\delta v_\\text{eff}(\\mathbf r', \\omega) \\end{equation} where $\\chi_s$ is the KS response function. Substituting the spin-summed version (Eq. (12.4.4) above) and expanding the effective perturbation as a sum over orbital transitions, $\\delta v_\\text{eff} = \\delta v_\\text{ext} + \\delta v_\\text{H} + \\delta v_\\text{xc}$, we get \\begin{align} \\delta\\rho(\\mathbf r, \\omega) &= \\sum_{ia} \\phi_i(\\mathbf r) \\phi_a(\\mathbf r) \\Bigl[ P_{ia}(\\omega) + P_{ia}(-\\omega) \\Bigr] \\\\ \\text{with} \\quad P_{ia}(\\omega) &= \\frac{2\\, n_{ia}} {\\omega - (\\varepsilon_a - \\varepsilon_i) + i\\eta} \\bigl[ \\delta v_\\text{eff} \\bigr]_{ia} \\quad\\quad (12.5) \\end{align} where $n_{ia} = f_i - f_a$ is the occupation difference and $\\eta$ is a positive infinitesimal. Substituting into the density-response equation and projecting onto the orbital product $\\phi_i(\\mathbf r)\\phi_a(\\mathbf r)$ gives, after some algebra (this is the step that takes the most care, so we write it out line by line below):"
    - paragraph [ref=e389]:
      - text: "[the actual algebra then continues, with each line numbered and each substitution explicitly written. The “after some algebra” preamble is"
      - strong [ref=e390]: wrong
      - text: — the “step that takes the most care” comment is acceptable only because the algebra immediately follows.]
