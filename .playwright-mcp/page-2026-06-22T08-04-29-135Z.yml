    - heading "“Every step explicit” — what it costs in agent time" [level=3] [ref=e561]
    - paragraph [ref=e562]:
      - text: "The “no-summaries” rule has a real cost: a section that would have been 20 lines in a typical textbook becomes 80-150 lines in this project’s style. A chapter that would take an"
      - code [ref=e563]: agent:content-writer
      - text: 2 hours to write under the old “summarise where possible” rule takes 4-6 hours under the new rule.
    - paragraph [ref=e564]: In return, the reader can read the chapter linearly, check every step, and trust the math. This is the trade-off the user explicitly requested.
    - heading "How to balance content-writer throughput with depth" [level=3] [ref=e565]
    - list [ref=e566]:
      - listitem [ref=e567]:
        - strong [ref=e568]: Use the parallel pattern
        - text: . 10 agents in parallel each take 4-6 hours; the cluster produces 10 chapters in 4-6 hours wall time, not 40-60.
      - listitem [ref=e569]:
        - strong [ref=e570]:
          - text: Use
          - code [ref=e571]: agent:enricher
          - text: for retrospective fixes
        - text: . New chapters go in with the full rule applied; older chapters are enriched in later passes as time permits.
      - listitem [ref=e572]:
        - strong [ref=e573]:
          - text: Use
          - code [ref=e574]: agent:literature-scholar
          - text: for citation depth
        - text: . This is the agent that goes to the original papers and pulls out the page numbers. It runs in parallel with the content-writer.
      - listitem [ref=e575]:
        - strong [ref=e576]: Don’t re-render animations that haven’t changed
        - text: . The CI workflow’s “check if script exists” step prevents wasted work.
