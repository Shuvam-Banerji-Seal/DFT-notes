    - code [ref=e70]: "version: alpha name: Claude-design-analysis description: A warm-canvas editorial interface for Anthropic's Claude product. The system anchors on a tinted cream canvas with serif display headlines, warm coral CTAs, and dark navy product surfaces (code editor mockups, model showcase cards). Brand voltage comes from the cream/coral pairing — deliberately warm and humanist where most AI brands use cool blue + slate. Type voice runs a slab-serif display (\"Copernicus\" / Tiempos Headline) for h1/h2 and a humanist sans for body. The signature Anthropic black-radial-spike mark anchors the wordmark. colors: primary: \"#cc785c\" primary-active: \"#a9583e\" primary-disabled: \"#e6dfd8\" ink: \"#141413\" body: \"#3d3d3a\" body-strong: \"#252523\" muted: \"#6c6a64\" muted-soft: \"#8e8b82\" hairline: \"#e6dfd8\" hairline-soft: \"#ebe6df\" canvas: \"#faf9f5\" surface-soft: \"#f5f0e8\" surface-card: \"#efe9de\" surface-cream-strong: \"#e8e0d2\" surface-dark: \"#181715\" surface-dark-elevated: \"#252320\" surface-dark-soft: \"#1f1e1b\" on-primary: \"#ffffff\" on-dark: \"#faf9f5\" on-dark-soft: \"#a09d96\" accent-teal: \"#5db8a6\" accent-amber: \"#e8a55a\" success: \"#5db872\" warning: \"#d4a017\" error: \"#c64545\" typography: display-xl: fontFamily: \"Copernicus, Tiempos Headline, serif\" fontSize: 64px fontWeight: 400 lineHeight: 1.05 letterSpacing: -1.5px display-lg: fontFamily: \"Copernicus, Tiempos Headline, serif\" fontSize: 48px fontWeight: 400 lineHeight: 1.1 letterSpacing: -1px display-md: fontFamily: \"Copernicus, Tiempos Headline, serif\" fontSize: 36px fontWeight: 400 lineHeight: 1.15 letterSpacing: -0.5px display-sm: fontFamily: \"Copernicus, Tiempos Headline, serif\" fontSize: 28px fontWeight: 400 lineHeight: 1.2 letterSpacing: -0.3px title-lg: fontFamily: \"StyreneB, Inter, sans-serif\" fontSize: 22px fontWeight: 500 lineHeight: 1.3 letterSpacing: 0 title-md: fontFamily: \"StyreneB, Inter, sans-serif\" fontSize: 18px fontWeight: 500 lineHeight: