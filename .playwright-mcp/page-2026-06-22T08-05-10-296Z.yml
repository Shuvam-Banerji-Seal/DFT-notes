          - columnheader "Spec (licensed)" [ref=e121]
          - columnheader "We use" [ref=e122]
          - columnheader "Why" [ref=e123]
      - rowgroup [ref=e124]:
        - row "Display Copernicus / Tiempos Headline EB Garamond(400, 500) The closest open-source editorial serif; refined, period-correct feel; loads from Google Fonts" [ref=e125]:
          - cell "Display" [ref=e126]
          - cell "Copernicus / Tiempos Headline" [ref=e127]
          - cell "EB Garamond(400, 500)" [ref=e128]:
