    - heading "Reading column (v2)" [level=2] [ref=e987]
    - paragraph [ref=e988]:
      - text: The v1 chapter column was
      - code [ref=e989]: "max-width: 760px"
      - text: "everywhere. On a 1920px screen that left ~580px of dead space on each side. v2 grows progressively:"
    - table [ref=e990]:
      - rowgroup [ref=e991]:
        - row "Breakpoint .page-contentmax-width" [ref=e992]:
          - columnheader "Breakpoint" [ref=e993]
          - columnheader ".page-contentmax-width" [ref=e994]:
            - code [ref=e995]: .page-content
            - text: max-width
      - rowgroup [ref=e996]:
        - row "< 768px 100%(with 24px padding)" [ref=e997]:
          - cell "< 768px" [ref=e998]:
            - code [ref=e999]: < 768px
          - cell "100%(with 24px padding)" [ref=e1000]:
            - code [ref=e1001]: 100%
            - text: (with 24px padding)
        - row "768 – 1024px 760px(mobile-friendly)" [ref=e1002]:
          - cell "768 – 1024px" [ref=e1003]:
            - code [ref=e1004]: 768 – 1024px
          - cell "760px(mobile-friendly)" [ref=e1005]:
            - code [ref=e1006]: 760px
            - text: (mobile-friendly)
        - row "1024 – 1440px 960px(slightly wider)" [ref=e1007]:
          - cell "1024 – 1440px" [ref=e1008]:
            - code [ref=e1009]: 1024 – 1440px
          - cell "960px(slightly wider)" [ref=e1010]:
            - code [ref=e1011]: 960px
            - text: (slightly wider)
        - row "≥ 1440px 1100px(wide-screen reading)" [ref=e1012]:
          - cell "≥ 1440px" [ref=e1013]:
            - code [ref=e1014]: ≥ 1440px
          - cell "1100px(wide-screen reading)" [ref=e1015]:
            - code [ref=e1016]: 1100px
            - text: (wide-screen reading)
    - paragraph [ref=e1017]: "Inside the wider column, authors can use:"
    - list [ref=e1018]:
      - listitem [ref=e1019]:
        - code [ref=e1020]: <aside class="marginalia">
        - text: for right-rail figure captions or side notes
      - listitem [ref=e1021]:
        - code [ref=e1022]: <figure class="figure-wide">
        - text: for full-width images
      - listitem [ref=e1023]:
        - code [ref=e1024]: <table class="table-scroll">
        - text: for wide tables with horizontal scroll
    - heading "Theme switcher (v2)" [level=2] [ref=e1025]
    - paragraph [ref=e1026]:
      - text: The user wants to read for long sessions. v2 adds a
      - strong [ref=e1027]: light / dark
      - text: "toggle:"
    - list [ref=e1028]:
      - listitem [ref=e1029]: The toggle is a small icon button in the top nav, between the GitHub text-link and the “Read the notes” CTA.
      - listitem [ref=e1030]:
        - text: Preference is persisted in
        - code [ref=e1031]: localStorage
        - text: under the key
        - code [ref=e1032]: dft-notes:theme
        - text: with values
        - code [ref=e1033]: light
        - text: "|"
        - code [ref=e1034]: dark
        - text: .
      - listitem [ref=e1035]:
        - text: A tiny inline script in
        - code [ref=e1036]: <head>
        - text: reads the stored value (or the OS
        - code [ref=e1037]: prefers-color-scheme
        - text: ) and sets
        - code [ref=e1038]: data-theme="dark"
        - text: "on"
        - code [ref=e1039]: <html>
        - strong [ref=e1040]: before
        - text: the CSS loads — this prevents a flash of the wrong theme on first paint.
      - listitem [ref=e1041]:
        - text: CSS variables are organized so
        - code [ref=e1042]: :root
        - text: holds the light palette and
        - code [ref=e1043]: "[data-theme=\"dark\"]"
        - text: overrides the same names with the dark palette. All component styles are written against the variable names, so the switch is automatic.
    - heading "Mermaid (v2)" [level=2] [ref=e1044]
    - paragraph [ref=e1045]:
      - text: Authors can drop a Mermaid diagram into any chapter with a fenced code block whose language is
      - code [ref=e1046]: mermaid
      - text: ":"
    - code [ref=e1050]: "```mermaid graph TD A[Schrödinger] --> B[Hartree-Fock] B --> C[Kohn-Sham] ```"
    - paragraph [ref=e1051]:
      - text: The Mermaid library is loaded from
      - code [ref=e1052]: https://cdn.jsdelivr.net/npm/mermaid@10
      - text: and initialized with
      - code [ref=e1053]: "startOnLoad: true"
      - text: . The init script picks the theme palette from
      - code [ref=e1054]: "[data-theme]"
      - text: so diagrams match the page.
    - paragraph [ref=e1055]:
      - code [ref=e1056]: dft_notes/chapters-map.md
      - text: is the canonical example — a live Mermaid graph of every chapter, with the planned future chapters dimmed and labelled
      - code [ref=e1057]: (planned)
      - text: .
    - heading "Python codes (v2)" [level=2] [ref=e1058]
    - paragraph [ref=e1059]:
      - text: Code that runs in a chapter lives
      - strong [ref=e1060]: twice
      - text: ":"
    - list [ref=e1061]:
      - listitem [ref=e1062]:
        - strong [ref=e1063]: Inline in the chapter
        - text: (as a fenced code block) for reading.
      - listitem [ref=e1064]:
        - strong [ref=e1065]:
          - text: In
          - code [ref=e1066]: dft_notes/python_codes/chapter_NN/NN-slug.py
        - text: as a runnable file.
    - paragraph [ref=e1067]: "The folder structure is:"
    - code [ref=e1071]: dft_notes/python_codes/ ├── README.md ← how to run, how to add a new script ├── chapter_00/ │ ├── 01-particle-in-box.py │ ├── plots/ │ │ └── particle-in-box.png ← generated, committed │ └── ... ├── chapter_01/ │ └── ...
    - paragraph [ref=e1072]:
      - text: Scripts that produce plots commit the PNG alongside the script. The README documents the
      - code [ref=e1073]: python
      - text: version, the required packages (numpy, matplotlib, scipy), and the convention for naming.
    - heading "Hidden answers (v2)" [level=2] [ref=e1074]
    - paragraph [ref=e1075]:
      - text: Problem sets use HTML
      - code [ref=e1076]: <details>
      - text: "for the answer:"
    - code [ref=e1080]: "<details class=\"problem\"> <summary>Show hint</summary> Start from $E = mc^2$ and the definition of momentum. </details> <details class=\"answer\"> <summary>Show answer</summary> Derivation: ...step by step... </details>"
    - paragraph [ref=e1081]:
      - text: CSS styles
      - code [ref=e1082]: <details>
      - text: "with the design system: a soft-card background, coral summary text, a thin left border, smooth open/close animation."
    - heading "Repository structure (v2)" [level=2] [ref=e1083]
    - paragraph [ref=e1084]: "The full tree, with purpose of each path:"
    - code [ref=e1088]: "DFT-notes/ ├── .github/ │ ├── CODEOWNERS │ ├── dependabot.yml │ ├── ISSUE_TEMPLATE/bug_report.md │ ├── pull_request_template.md │ └── workflows/ │ ├── jekyll.yml ← build + deploy to Pages │ └── markdown-lint.yml ← markdownlint-cli2 (v0.40) │ ├── _includes/ ← Liquid partials │ ├── head.html ← meta + fonts + CSS + SEO + MathJax + Mermaid │ ├── nav.html ← top nav, mobile menu, theme switcher │ ├── footer.html ← dark navy footer (no chapter list) │ ├── spike-mark.html ← reusable 4-spoke radial SVG │ └── mathjax.html ← MathJax 3 config │ ├── _layouts/ ← Jekyll layouts │ ├── default.html ← wrapper: skip + nav + main + footer + nav.js + theme init │ └── page.html ← .page-content div for reading column │ ├── assets/ │ ├── css/site.css ← The design system (variables + components) │ └── js/ │ ├── nav.js ← mobile menu toggle │ ├── theme.js ← theme switcher (persist + toggle) │ └── mermaid-init.js ← mermaid.initialize() with theme-aware palette │ ├── design.md ← THIS FILE (excluded from served site) ├── agents.md ← The agent handbook (excluded from served site) │ ├── dft_notes/ ← The actual content │ ├── index.md ← chapter index │ ├── chapters-map.md ← Mermaid graph of all chapters │ ├── chapter_00/00-welcome.md │ ├── chapter_NN/00-topic.md │ ├── python_codes/ │ │ ├── README.md │ │ ├── chapter_00/ │ │ │ ├── 01-particle-in-box.py │ │ │ ├── plots/particle-in-box.png │ │ │ └── ... │ │ └── chapter_NN/ │ └── ... │ ├── _config.yml ← Jekyll config ├── Gemfile ← jekyll 3.10 + minima + kramdown-parser-gfm ├── 404.md ├── index.md ← hero-band home page ├── CONTRIBUTING.md ├── SECURITY.md ├── LICENSE ├── README.md ← repo overview + this structure └── .markdownlint-cli2.jsonc ← linter config (MD013, MD033, MD025, MD040, MD024, MD026, MD049, MD060 disabled by design)"
    - paragraph [ref=e1089]:
      - text: This is the structure that
      - strong [ref=e1090]: must not drift
      - text: . Adding a new chapter goes in
      - code [ref=e1091]: dft_notes/chapter_NN/
      - text: . Adding a new Python script goes in
      - code [ref=e1092]: dft_notes/python_codes/chapter_NN/
      - text: . Adding a new component class goes in
      - code [ref=e1093]: assets/css/site.css
      - text: . Adding a new page-level layout goes in
      - code [ref=e1094]: _layouts/
      - text: . No new top-level directories without updating this file.
