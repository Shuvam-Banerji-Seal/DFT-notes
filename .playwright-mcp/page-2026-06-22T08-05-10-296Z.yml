    - heading "Whitespace Philosophy" [level=3] [ref=e414]
    - paragraph [ref=e415]: The cream canvas + serif display + generous internal padding create an editorial pacing — Claude reads like a long-form magazine column rather than a marketing template. Whitespace between bands stays uniform at 96px; whitespace inside cards is generous (32px), letting type breathe.
