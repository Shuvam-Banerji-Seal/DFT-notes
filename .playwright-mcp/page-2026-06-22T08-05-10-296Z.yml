    - paragraph [ref=e143]:
      - text: For the display font, the spec recommends
      - strong [ref=e144]: Cormorant Garamond
      - text: at weight 500 with
      - code [ref=e145]: "-0.02em"
      - text: letter-spacing as the primary substitute; we use EB Garamond because it has a slightly wider x-height that reads better at small sizes, but the visual character is the same family. If you’d prefer Cormorant, swap the
      - code [ref=e146]: "--font-display"
      - text: CSS variable in
      - code [ref=e147]: assets/css/site.css
      - text: to
      - code [ref=e148]: "\"Cormorant Garamond\", ..."
      - text: and update the Google Fonts link in
      - code [ref=e149]: _includes/head.html
      - text: .
