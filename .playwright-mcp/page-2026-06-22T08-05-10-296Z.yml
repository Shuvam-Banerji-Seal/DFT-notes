    - separator [ref=e71]
    - heading "Overview" [level=2] [ref=e72]
    - paragraph [ref=e73]:
      - text: Claude.com is the warmest, most editorial interface in the AI-product category. The base atmosphere is a
      - strong [ref=e74]: tinted cream canvas
      - text: (
      - code [ref=e75]: "{colors.canvas}"
      - text: "— #faf9f5) — distinctly warm, deliberately not the cool gray-white that every other AI brand uses. Headlines run a"
      - strong [ref=e76]: slab-serif display
      - text: (“Copernicus” / Tiempos Headline) at weight 400 with negative letter-spacing, paired with
      - strong [ref=e77]: StyreneB / Inter
      - text: body sans. The combination feels like a literary publication, not a SaaS marketing page.
    - paragraph [ref=e78]:
      - text: Brand voltage comes from the
      - strong [ref=e79]: cream + coral pairing
      - text: — coral (
      - code [ref=e80]: "{colors.primary}"
      - text: "— #cc785c) is the signature Anthropic accent, used on every primary CTA, on the brand wordmark, and on full-bleed callout cards. The coral is warm, slightly muted, never cyan/blue — a deliberate counter-positioning against OpenAI’s cool slate, Google’s saturated blue, and Microsoft’s corporate cyan."
    - paragraph [ref=e81]: "The system has three surface modes that alternate page-by-page:"
    - list [ref=e82]:
      - listitem [ref=e83]:
        - strong [ref=e84]: Cream canvas
        - text: (
        - code [ref=e85]: "{colors.canvas}"
        - text: ) — default body floor
      - listitem [ref=e86]:
        - strong [ref=e87]: Light cream cards
        - text: (
        - code [ref=e88]: "{colors.surface-card}"
        - text: ) — feature card backgrounds
      - listitem [ref=e89]:
        - strong [ref=e90]: Dark navy product surfaces
        - text: (
        - code [ref=e91]: "{colors.surface-dark}"
        - text: ) — code editor mockups, model showcase cards, pre-footer CTAs, footer itself
    - paragraph [ref=e92]: The dark surfaces are where Claude shows its product chrome — code blocks, terminal output, model comparison tables, agentic-flow diagrams. The cream-to-dark contrast is the page’s pacing rhythm.
    - paragraph [ref=e93]:
      - strong [ref=e94]: "Key Characteristics:"
    - list [ref=e95]:
      - listitem [ref=e96]:
        - text: Warm cream canvas (
        - code [ref=e97]: "{colors.canvas}"
        - text: "— #faf9f5) with dark warm-ink text ("
        - code [ref=e98]: "{colors.ink}"
        - text: "— #141413). The brand’s defining color choice."
      - listitem [ref=e99]:
        - text: Coral primary CTA (
        - code [ref=e100]: "{colors.primary}"
        - text: "— #cc785c). Used scarcely on individual buttons, generously on full-bleed coral callout cards."
      - listitem [ref=e101]: Slab-serif display headlines via Copernicus / Tiempos Headline at weight 400 with negative letter-spacing. Pairs with humanist sans body for a literary editorial voice.
      - listitem [ref=e102]:
        - text: Dark navy product mockup cards (
        - code [ref=e103]: "{colors.surface-dark}"
        - text: "— #181715) carrying code blocks, terminal panels, model comparison data — the brand shows the product chrome at scale rather than abstract marketing illustrations."
      - listitem [ref=e104]:
        - text: Light cream feature cards (
        - code [ref=e105]: "{colors.surface-card}"
        - text: "— #efe9de) — slightly darker than canvas, used for content-driven feature explanations."
      - listitem [ref=e106]: Anthropic radial-spike mark — a small black asterisk-like glyph (4-spoke radial) — appears as the brand wordmark prefix and as a content marker.
      - listitem [ref=e107]:
        - text: "Border radius is hierarchical:"
        - code [ref=e108]: "{rounded.md}"
        - text: (8px) for buttons + inputs,
        - code [ref=e109]: "{rounded.lg}"
        - text: (12px) for content + product cards,
        - code [ref=e110]: "{rounded.xl}"
        - text: (16px) for the hero illustration container,
        - code [ref=e111]: "{rounded.pill}"
        - text: for badges.
      - listitem [ref=e112]:
        - text: Section rhythm
        - code [ref=e113]: "{spacing.section}"
        - text: (96px) — modern-SaaS standard. Internal card padding stays generous at
        - code [ref=e114]: "{spacing.xl}"
        - text: (32px).
    - heading "Note on Font Substitutes (we use on this site)" [level=3] [ref=e115]
    - paragraph [ref=e116]: "Copernicus and StyreneB are licensed Anthropic typefaces and not available as public web fonts. On this site we substitute with the closest open-source matches that preserve the editorial voice:"
