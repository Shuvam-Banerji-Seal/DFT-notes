    - heading "Collapsing Strategy" [level=3] [ref=e744]
    - list [ref=e745]:
      - listitem [ref=e746]: Top nav collapses to hamburger at < 768px; menu opens as a full-screen cream sheet.
      - listitem [ref=e747]: Hero band’s 6-6 grid collapses to single-column on mobile — h1 + sub-head + buttons first, then the illustration / mockup card below.
      - listitem [ref=e748]: Feature grids reduce columns rather than scaling cards down.
      - listitem [ref=e749]: Pricing tier cards collapse 4 → 2 → 1; featured-tier dark surface stays visually distinct at every breakpoint.
      - listitem [ref=e750]: Code-window cards retain code legibility at every breakpoint by allowing horizontal scroll within the card rather than wrapping code lines.
    - heading "Image Behavior" [level=3] [ref=e751]
    - list [ref=e752]:
      - listitem [ref=e753]: Code blocks inside dark mockups stay at fixed font-size; horizontal scroll on mobile rather than wrapping.
      - listitem [ref=e754]: Hero illustrations scale proportionally; line-art strokes thin slightly on mobile.
      - listitem [ref=e755]: Avatar photos in testimonials crop to circles at every breakpoint.
    - heading "Iteration Guide" [level=2] [ref=e756]
    - list [ref=e757]:
      - listitem [ref=e758]:
        - text: Focus on ONE component at a time. Reference its YAML key (
        - code [ref=e759]: "{component.feature-card}"
        - text: ","
        - code [ref=e760]: "{component.code-window-card}"
        - text: ).
      - listitem [ref=e761]:
        - text: Variants of an existing component (
        - code [ref=e762]: "-active"
        - text: ","
        - code [ref=e763]: "-disabled"
        - text: ","
        - code [ref=e764]: "-focused"
        - text: ) live as separate entries in
        - code [ref=e765]: "components:"
        - text: .
      - listitem [ref=e766]:
        - text: Use
        - code [ref=e767]: "{token.refs}"
        - text: everywhere — never inline hex.
      - listitem [ref=e768]: Never document hover. Default and Active/Pressed states only.
      - listitem [ref=e769]: Display headlines stay Copernicus serif 400 with negative tracking. Body stays StyreneB / Inter 400. The split is unbreakable.
      - listitem [ref=e770]: Cream + coral + dark navy is the trinity. Don’t introduce a fourth surface tone (no purple cards, no green sections).
      - listitem [ref=e771]: "When in doubt about emphasis: bigger Copernicus serif before bolder weight."
    - heading "Known Gaps" [level=2] [ref=e772]
    - list [ref=e773]:
      - listitem [ref=e774]: Copernicus and StyreneB are licensed Anthropic typefaces and not available as public web fonts. Substitutes (Tiempos Headline / Cormorant Garamond / EB Garamond for serif; Inter / Söhne for sans) are documented in the typography section.
      - listitem [ref=e775]: The Anthropic radial-spike-mark is a brand glyph rendered as inline SVG; it’s not formalized as a system token here. Treat it as a logo asset.
      - listitem [ref=e776]: Animation and transition timings (chat message reveal, code block typewriter effect on the homepage, agentic-flow diagram animations) are not in scope.
      - listitem [ref=e777]:
        - text: Form validation states beyond
        - code [ref=e778]: "{component.text-input-focused}"
        - text: are not extracted — error / success states would need a sign-up or feedback flow to confirm.
      - listitem [ref=e779]: The actual Claude product surface (claude.ai chat interface) shares some tokens with the marketing site but adds many product- specific components (chat bubbles, message tools, file upload chips, conversation history sidebar) that are out of scope for this marketing-surface document.
      - listitem [ref=e780]: The “agent” / “computer use” demo cards on certain pages display animated Claude controlling a browser — the static screenshot doesn’t fully capture the animation chrome.
