    - heading "Do’s and Don’ts" [level=2] [ref=e681]
    - heading "Do" [level=3] [ref=e682]
    - list [ref=e683]:
      - listitem [ref=e684]: Anchor every page on the cream canvas. Pure white reads as “any other AI tool”; the warm tint is the brand differentiator.
      - listitem [ref=e685]: Use Copernicus serif for every display headline. Pair with StyreneB sans body. Negative letter-spacing on display sizes is non-negotiable.
      - listitem [ref=e686]:
        - text: Reserve
        - code [ref=e687]: "{colors.primary}"
        - text: (coral) for primary CTAs and full-bleed
        - code [ref=e688]: "{component.callout-card-coral}"
        - text: moments. Don’t paint accent moments coral elsewhere.
      - listitem [ref=e689]:
        - text: Use
        - code [ref=e690]: "{component.product-mockup-card-dark}"
        - text: and
        - code [ref=e691]: "{component.code-window-card}"
        - text: to show actual Claude product chrome. Don’t paint marketing illustrations of code when you can show real code.
      - listitem [ref=e692]:
        - text: Pair
        - code [ref=e693]: "{component.feature-card}"
        - text: (cream) with
        - code [ref=e694]: "{component.product-mockup-card-dark}"
        - text: (navy) in alternating bands. The cream-to-dark rhythm is the brand’s pacing mechanism.
      - listitem [ref=e695]: Use the Anthropic spike-mark glyph as the brand wordmark prefix. Never invert the mark to white-on-dark within the wordmark itself.
      - listitem [ref=e696]:
        - text: Apply
        - code [ref=e697]: "{spacing.section}"
        - text: (96px) between major bands.
    - heading "Don’t" [level=3] [ref=e698]
    - list [ref=e699]:
      - listitem [ref=e700]: Don’t use cool grays or pure white for canvas. Cream is the brand.
      - listitem [ref=e701]: Don’t bold serif display weight. Copernicus at 700 reads as bombastic; the system stays at 400.
      - listitem [ref=e702]: Don’t use cool blue or saturated cyan as a brand accent. The coral is the brand voltage.
      - listitem [ref=e703]: Don’t put coral everywhere. The coral is scarce on individual elements and generous only on full-bleed coral callout cards.
      - listitem [ref=e704]: Don’t use Inter for display headlines. The serif character is the brand voice.
      - listitem [ref=e705]: "Don’t repeat the same surface mode in two consecutive bands. The pacing alternates: cream → cream-card → dark-mockup → cream → coral-callout → dark-footer."
      - listitem [ref=e706]: Don’t add hover state styling beyond what the system already encodes — primary darkens on press; nothing else changes.
