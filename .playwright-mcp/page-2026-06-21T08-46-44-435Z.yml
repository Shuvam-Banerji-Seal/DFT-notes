      - 'heading "17.15 The original ML-for-DFT papers: a literature deep-dive" [level=2] [ref=e9414]'
      - paragraph [ref=e9415]:
        - text: The chapter so far is a
        - emphasis [ref=e9416]: tour
        - text: of the methods — atomic descriptors, neural-network potentials, equivariant networks,
        - img [ref=e9418]
        - text: "-learning, ML for the Hamiltonian, and ML exchange–correlation functionals. This section is a"
        - emphasis [ref=e9423]: deep-dive
        - text: into the five foundational papers that made the tour possible. For each paper, we give the exact
        - emphasis [ref=e9424]: page
        - text: where the key result is stated, the
        - emphasis [ref=e9425]: form
        - text: of the key equation, the
        - emphasis [ref=e9426]: test
        - text: the authors actually ran, and the
        - emphasis [ref=e9427]: limitation
        - text: of the original formulation that later work was forced to fix. The page citations use the published journal pagination (PRL / PRB / Nat. Commun. / NeurIPS), not the arXiv pagination, because the reader who wants to follow up will go to the journal of record.
      - paragraph [ref=e9428]: "The five papers are:"
      - list [ref=e9429]:
        - listitem [ref=e9430]:
          - strong [ref=e9431]:
            - text: Behler & Parrinello,
            - emphasis [ref=e9432]: Phys. Rev. Lett.
            - text: "**98"
          - text: ", 146401 (2007)** — the original neural-network potential (NNP) for high-dimensional PES, with the symmetry-function descriptors and the test on bulk silicon."
        - listitem [ref=e9433]:
          - strong [ref=e9434]:
            - text: Bartók, Payne, Kondor & Csányi,
            - emphasis [ref=e9435]: Phys. Rev. Lett.
            - text: "**104"
          - text: ", 136403 (2010)** — the Gaussian Approximation Potential (GAP), the kernel-based alternative to the NNP, with the test on bulk carbon, silicon, and germanium."
        - listitem [ref=e9436]:
          - strong [ref=e9437]:
            - text: Bartók, Kondor & Csányi,
            - emphasis [ref=e9438]: Phys. Rev. B
            - text: "**87"
          - text: ", 184115 (2013)** — the Smooth Overlap of Atomic Positions (SOAP) descriptor, the"
          - emphasis [ref=e9439]: systematic
          - text: rotation-invariant basis for atomic environments, and the unification of the previous ad-hoc descriptors under a single spherical-harmonic framework.
        - listitem [ref=e9440]:
          - strong [ref=e9441]:
            - text: Schütt, Arbabzadah, Chmiela, Müller & Tkatchenko,
            - emphasis [ref=e9442]: Nat. Commun.
            - text: "**8"
