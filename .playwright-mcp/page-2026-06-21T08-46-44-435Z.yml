      - 'heading "17.5.3 MACE: message-passing with higher-order ACE features" [level=3] [ref=e5593]'
      - paragraph [ref=e5594]:
        - text: The
        - strong [ref=e5595]: MACE
        - text: (Message Passing Atomic Cluster Expansion) architecture of Batatia et al. (
        - link "2022, NeurIPS; 2024, npj Comput. Mater." [ref=e5596] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: 2022,
          - emphasis [ref=e5597]: NeurIPS
          - text: ; 2024,
          - emphasis [ref=e5598]: npj Comput. Mater.
        - text: ) is the
        - emphasis [ref=e5599]: higher-order
        - text: generalisation of NequIP. The message function
        - emphasis [ref=e5600]: includes
        - text: "the higher-body-order terms of the ACE basis (§ 17.3.4): in NequIP, the messages are two-body; in MACE, the messages are two-body"
        - emphasis [ref=e5601]: and
        - text: three-body (a
        - emphasis [ref=e5602]: triple
        - text: of atoms). The MACE
        - emphasis [ref=e5603]: layer structure
        - text: "is: (1) edge features as in NequIP; (2) two-body messages"
        - img [ref=e5605]
        - text: ; (3) three-body messages
        - img [ref=e5662]
        - text: ","
        - emphasis [ref=e5731]: symmetrised
        - text: over
        - img [ref=e5733]
        - text: and
        - img [ref=e5739]
        - text: "; (4) aggregation; (5) readout: the"
        - img [ref=e5745]
        - text: part of the
        - emphasis [ref=e5754]: product
        - text: of the aggregated messages is the atomic energy.
      - paragraph [ref=e5755]:
        - text: MACE has the
        - emphasis [ref=e5756]: accuracy
        - text: of NequIP with
        - emphasis [ref=e5757]: fewer
        - text: message-passing layers (typically 2 layers in MACE, 5 in NequIP), at the cost of
        - emphasis [ref=e5758]: more
        - text: computation per layer (the three-body terms). The trade-off is
        - emphasis [ref=e5759]: better in 2025
        - text: — MACE is the default for production. The
        - strong [ref=e5760]: MACE-MP-0
        - text: universal potential is the MACE architecture trained on the Materials Project trajectory set (MPtrj,
