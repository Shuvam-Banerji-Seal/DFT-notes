        - emphasis [ref=e4725]: size
        - text: of the training set;
        - img [ref=e4727]
        - text: –
        - img [ref=e4741]
        - text: parameters for
        - img [ref=e4751]
        - text: –
        - img [ref=e4765]
        - text: configurations); (3)
        - strong [ref=e4774]: the data’s diversity
        - text: (a
        - emphasis [ref=e4775]: narrow
        - text: training set is
        - emphasis [ref=e4776]: blind
        - text: to OOD configurations; the fix is
        - emphasis [ref=e4777]: diversification
        - text: by
        - emphasis [ref=e4778]: brute force
        - text: or by
        - emphasis [ref=e4779]: active learning
        - text: ); (4)
        - strong [ref=e4780]: the OOD problem
        - text: — the
        - emphasis [ref=e4781]: defining
        - text: challenge of MLIPs. A model trained on bulk water is asked to predict the energy of a water molecule
        - emphasis [ref=e4782]: inside
        - text: a CNT; the configuration is OOD; the model’s prediction is
        - emphasis [ref=e4783]: confident
        - text: and
        - emphasis [ref=e4784]: wrong
        - text: . The fix is
        - emphasis [ref=e4785]: uncertainty quantification
        - text: (§ 17.9.2) and
        - emphasis [ref=e4786]: active learning
        - text: (§ 17.9).
      - paragraph [ref=e4787]:
        - text: The
        - emphasis [ref=e4788]: universal
        - text: MLIPs of § 17.5.4 — MACE-MP-0, MACE-OFF, fairchem-UMA — are the
        - emphasis [ref=e4789]: response
        - text: "to the OOD problem: train on a"
        - emphasis [ref=e4790]: huge
        - text: and
        - emphasis [ref=e4791]: diverse
        - text: dataset (
        - img [ref=e4793]
        - text: –
        - img [ref=e4807]
        - text: configurations,
        - img [ref=e4817]
        - text: elements), so that the OOD configurations of a
        - emphasis [ref=e4828]: single
        - text: MD trajectory are
        - emphasis [ref=e4829]: within
        - text: the training distribution. The cost is a
        - img [ref=e4831]
        - text: larger training set and a
        - img [ref=e4847]
        - text: larger model. The benefit is
        - emphasis [ref=e4862]: zero-shot
        - text: generalisation to
        - emphasis [ref=e4863]: most
        - text: of the chemistry that the working calculator meets.
      - heading "17.5 Equivariant neural networks" [level=2] [ref=e4864]
      - paragraph [ref=e4865]:
        - text: The
        - emphasis [ref=e4866]: equivalence
        - text: of 3-D Euclidean space — the symmetry group
        - img [ref=e4868]
        - text: — is the
        - emphasis [ref=e4879]: defining
        - text: property of the atomic configuration. A model that
        - emphasis [ref=e4880]: respects
        - text: the symmetry is
        - emphasis [ref=e4881]: correct by construction
        - text: ; a model that
        - emphasis [ref=e4882]: violates
        - text: the symmetry has to
        - emphasis [ref=e4883]: learn
        - text: it from the data. The BP and SchNet networks of § 17.4 are
        - emphasis [ref=e4884]: invariant
        - text: (distances only) and
        - emphasis [ref=e4885]: not equivariant
        - text: . The equivariant networks of this section are
        - emphasis [ref=e4886]: equivariant
        - text: "under rotations: the network’s outputs transform"
        - emphasis [ref=e4887]: correctly
        - text: under a rotation of the input, in the same way as the irreducible representations of
        - img [ref=e4889]
        - text: .
      - heading "17.5.1 Group-equivariance and E(3) symmetry" [level=3] [ref=e4901]
      - paragraph [ref=e4902]:
        - text: The
        - strong [ref=e4903]: symmetry group
        - text: of 3-D Euclidean space is
        - img [ref=e4905]
        - text: ", the"
        - emphasis [ref=e4935]: semi-direct product
        - text: of the rotation group
        - img [ref=e4937]
        - text: and the translation group
        - img [ref=e4950]
        - text: . A function
        - img [ref=e4960]
        - text: is
