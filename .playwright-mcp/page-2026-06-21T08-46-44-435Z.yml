          - text: The 2017 SchNet and MPNN papers introduced the
          - emphasis [ref=e4130]: graph
          - text: view and
          - emphasis [ref=e4131]: message passing
          - text: paradigm. SchNet/MPNN were
          - emphasis [ref=e4132]: overtaken
