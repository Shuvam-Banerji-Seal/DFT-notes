        - text: DFT calculations per model).
      - heading "17.7.3 Orbital-free DFT with ML kinetic energy" [level=3] [ref=e7457]
      - paragraph [ref=e7458]:
        - text: The
        - strong [ref=e7459]: orbital-free DFT
        - text: (OFDFT) of
        - link "chapter 04" [ref=e7460] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: replaces the Kohn–Sham
        - emphasis [ref=e7461]: orbitals
        - text: with a
        - emphasis [ref=e7462]: density-only
        - text: kinetic energy functional
        - img [ref=e7464]
        - text: . OFDFT scales
        - emphasis [ref=e7478]: linearly
        - text: in the system size, but the standard
        - img [ref=e7480]
        - text: functionals (Thomas– Fermi, von Weizsäcker, TF+vW) are
        - emphasis [ref=e7494]: less accurate
        - text: than the Kohn–Sham kinetic energy by a factor of
        - img [ref=e7496]
        - text: –
        - img [ref=e7507]
        - text: in the formation energy. The
        - strong [ref=e7514]: ML-XC family
        - text: "is the modern approach: replace the"
        - emphasis [ref=e7515]: kinetic energy functional
        - text: with a
        - emphasis [ref=e7516]: machine-learned
        - text: functional (kernel machine KRR-OFDFT or neural network NN-OFDFT). The MAE on the formation energy is
        - img [ref=e7518]
        - text: –
        - img [ref=e7529]
        - text: meV/atom, comparable to the standard GGA functionals, with cost that scales
        - emphasis [ref=e7535]: linearly
        - text: in the system size — the
        - emphasis [ref=e7536]: only
        - text: practical approach for
        - emphasis [ref=e7537]: linear-scaling DFT
        - text: of systems with
        - img [ref=e7539]
        - text: –
        - img [ref=e7553]
        - text: atoms. The 2024 review of
        - link "Kirkpatrick et al., Chem. Rev. 124, 5613 (2024)" [ref=e7562] [cursor=pointer]:
