      - 'heading "17.9.3 MACE-OSP: on-the-fly training" [level=3] [ref=e8283]'
      - paragraph [ref=e8284]:
        - text: The
        - strong [ref=e8285]: MACE-OSP
        - text: (MACE On-the-fly Sparse Potential) framework of
        - link "Magdău et al., npj Comput. Mater. 9, 146 (2023)" [ref=e8286] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: Magdău et al.,
          - emphasis [ref=e8287]: npj Comput. Mater.
          - strong [ref=e8288]: "9"
          - text: ", 146 (2023)"
        - text: is the
        - emphasis [ref=e8289]: standard
        - text: "implementation of the AL loop for MLIPs in 2024. The framework: (1) start with a"
        - emphasis [ref=e8290]: small
        - text: initial training set; (2) run an
        - emphasis [ref=e8291]: initial
        - text: MACE training; (3) run an
        - emphasis [ref=e8292]: MD
        - text: trajectory with the initial MACE; (4) at every MD step, score the
        - emphasis [ref=e8293]: uncertainty
        - text: of the MACE prediction (using the
        - emphasis [ref=e8294]: ensemble disagreement
        - text: of a
        - emphasis [ref=e8295]: small
        - text: ensemble of MACE models); (5) if the uncertainty
        - emphasis [ref=e8296]: exceeds
        - text: a threshold,
        - emphasis [ref=e8297]: pause
        - text: the MD, run a
        - emphasis [ref=e8298]: single- point
        - text: DFT calculation, add to the training set, and
        - emphasis [ref=e8299]: retrain
        - text: the MACE; (6)
        - emphasis [ref=e8300]: resume
        - text: the MD with the
        - emphasis [ref=e8301]: retrained
        - text: MACE. The loop continues until the MD trajectory
        - emphasis [ref=e8302]: completes
        - text: without a
        - emphasis [ref=e8303]: retraining
        - text: event, yielding a
        - emphasis [ref=e8304]: self-consistent
        - text: MLIP that is
        - emphasis [ref=e8305]: accurate
        - text: on the MD trajectory with the
        - emphasis [ref=e8306]: minimum
        - text: number of
        - emphasis [ref=e8307]: additional
        - text: DFT calculations. MACE-OSP has been applied to battery electrolytes (LiPF$
        - emphasis [ref=e8308]:
          - text: "6"
          - img [ref=e8310]
          - text: \sim! 10\,000
          - img [ref=e8333]
          - text: \sim! 1
          - img [ref=e8349]
          - text: \sim! 99.9\%
          - img [ref=e8363]
          - text: _2
          - img [ref=e8441]
          - text: _7
          - img [ref=e8507]
          - text: _3
          - img [ref=e8515]
          - text: _2
          - img [ref=e8523]
        - text: "{12}$). The AL loop pays for itself as long as the number of labelling events is"
        - emphasis [ref=e8528]: small
        - text: (
        - img [ref=e8530]
        - text: events for a 1-ns MD of water, not
