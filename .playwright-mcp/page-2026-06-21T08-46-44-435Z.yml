      - paragraph [ref=e692]:
        - text: The table is the “shopping list” for 2025. The DFT rows are the
        - emphasis [ref=e693]: cost
        - text: ; the MLIP rows are the
        - emphasis [ref=e694]: price
        - text: the calculator pays in training time (typically 1–4 weeks on a single H100) for a
        - img [ref=e696]
        - text: inference speedup. The accuracies quoted for the DFT rows are
        - emphasis [ref=e711]: systematic
        - text: errors on a standard benchmark; the accuracies quoted for the MLIP rows are
        - emphasis [ref=e712]: transfer
        - text: errors from the underlying DFT (the MLIP can never be more accurate than the data it was trained on). The last row — fairchem-UMA — is the 2024 foundation model of Meta FAIR-Chem, trained on a
        - emphasis [ref=e713]: mixed
        - text: PBE/r
        - img [ref=e715]
        - text: SCAN dataset of
        - img [ref=e722]
        - text: million configurations.
      - paragraph [ref=e733]:
        - text: The reader who wants a quick summary of the
        - emphasis [ref=e734]: methods
        - text: covered in this chapter should jump straight to § 17.5.4 (universal MLIPs) or § 17.6 (
        - img [ref=e736]
        - text: "-learning) and return. The reader who wants to understand"
        - emphasis [ref=e741]: why
        - text: ML methods work, and
        - emphasis [ref=e742]: how
        - text: to build one for a new chemical class, should read the chapter in order. The next section (17.2) is the
        - emphasis [ref=e743]: cost-scaling
        - text: "prelude: how much DFT actually costs, and what the ML alternative has to beat."
      - heading "17.2 The accuracy–cost landscape" [level=2] [ref=e744]
      - paragraph [ref=e745]: The claim of § 17.1 has two halves — accuracy and cost — and both deserve their own subsection.
      - heading "17.2.1 The cost scaling of DFT" [level=3] [ref=e746]
      - paragraph [ref=e747]: "The computational cost of a single Kohn–Sham single-point calculation has three contributions:"
      - list [ref=e748]:
        - listitem [ref=e749]:
          - strong [ref=e750]: The basis-set evaluation.
          - text: In a plane-wave code the cost of constructing the Hamiltonian matrix elements scales as
          - img [ref=e752]
          - text: for the FFT-based kinetic energy and as
          - img [ref=e779]
          - text: for the local potential;
          - img [ref=e802]
          - text: is the number of plane waves, proportional to the cell volume. In a Gaussian code the cost of the electron-repulsion integrals (ERIs) scales naively as
          - img [ref=e812]
          - text: in the number of basis functions
          - img [ref=e828]
          - text: per unit cell.
        - listitem [ref=e833]:
          - strong [ref=e834]: The diagonalisation.
          - text: The standard diagonalisation of the Kohn–Sham Hamiltonian in
          - img [ref=e836]
          - text: basis functions is
          - img [ref=e842]
          - text: per
          - emphasis [ref=e857]: k
          - text: "-point. For a plane-wave code"
          - img [ref=e859]
          - text: and the diagonalisation is the dominant cost. Iterative diagonalisation (LOBPCG, Davidson) reduces the prefactor but the asymptotic scaling is unchanged.
        - listitem [ref=e872]:
          - strong [ref=e873]: The self-consistent field (SCF) iteration.
          - text: The KS loop is
          - img [ref=e875]
          - text: iterations to convergence, with
          - img [ref=e893]
          - text: –
          - img [ref=e909]
          - text: for well-behaved systems and
          - img [ref=e916]
          - text: + for difficult metallic or magnetic systems.
      - paragraph [ref=e925]:
        - text: The result is the
        - emphasis [ref=e926]: cubic wall
        - text: "of Kohn–Sham DFT:"
      - paragraph [ref=e927]:
        - text: "\\begin{equation} \\label{eq:ch-17-cubic} \\text{Cost}"
        - emphasis [ref=e928]: "\\text{KS} \\;\\sim\\; N"
        - text: "\\text{SCF} \\cdot N_k \\cdot K^3 , \\end{equation}"
      - paragraph [ref=e929]:
        - text: where
        - img [ref=e931]
        - text: is the number of
        - emphasis [ref=e939]: k
        - text: "-points. For a periodic solid with 50 atoms in the unit cell,"
        - img [ref=e941]
        - text: plane waves and
        - img [ref=e955]
        - text: for a converged calculation, the cost of a single SCF is
        - img [ref=e969]
        - text: node- hour on a modern CPU cluster. For a 500-atom supercell (typical of defects, disordered alloys, or amorphous materials),
        - img [ref=e979]
        - text: and the cost is
        - img [ref=e993]
        - text: node-hours per SCF. For a 5000-atom supercell (typical of a point defect in a semiconductor at realistic concentration),
        - img [ref=e1007]
        - text: and the cost is
        - img [ref=e1021]
        - text: node-hours per SCF — already out of reach for routine use.
      - paragraph [ref=e1034]:
        - text: The
        - emphasis [ref=e1035]: cubic wall
        - text: is the
        - emphasis [ref=e1036]: reason
        - text: MLIPs are interesting. A trained MLIP evaluates the energy and forces of a 100-atom configuration in
        - img [ref=e1038]
        - text: ms, with cost that scales
        - emphasis [ref=e1047]: linearly
        - text: "in the number of atoms (the descriptor and the network evaluation are both local operations):"
      - paragraph [ref=e1048]:
        - text: "\\begin{equation} \\label{eq:ch-17-linear} \\text{Cost}"
        - emphasis [ref=e1049]: "\\text{MLIP} \\;\\sim\\; N"
        - text: "\\text{at} \\cdot d_\\text{feat} \\cdot N_\\text{layer} , \\end{equation}"
      - paragraph [ref=e1050]:
        - text: where
        - img [ref=e1052]
        - text: is the per-atom feature dimension (typically 64–128) and
        - img [ref=e1064]
        - text: is the number of message-passing layers (typically 2–4). The
        - strong [ref=e1076]: speedup
        - text: is
      - paragraph [ref=e1077]:
        - text: "\\begin{equation} \\label{eq:ch-17-speedup} \\frac{\\text{Cost}"
        - emphasis [ref=e1078]: "\\text{KS}}{\\text{Cost}"
        - text: "\\text{MLIP}} \\;\\sim\\; \\frac{N_\\text{SCF}\\, N_k\\, K^3}{N_\\text{at}\\, d_\\text{feat}\\, N_\\text{layer}} \\;\\sim\\; 10^3 \\text{–} 10^6 , \\end{equation}"
      - paragraph [ref=e1079]:
        - text: with the higher end of the range achieved for large systems (
        - img [ref=e1081]
        - text: ) and the lower end for small systems (
        - img [ref=e1099]
        - text: ). The crossover — the system size at which the MLIP is faster than a single DFT call
        - emphasis [ref=e1116]: even after
        - text: accounting for the training cost — is typically around
        - img [ref=e1118]
        - text: –
        - img [ref=e1133]
        - text: .
      - blockquote [ref=e1139]:
        - paragraph [ref=e1140]:
          - strong [ref=e1141]: Why the cost matters.
          - text: The
          - emphasis [ref=e1142]: application
          - text: that justifies the investment in an MLIP is
          - strong [ref=e1143]: molecular dynamics
          - text: ": an MD trajectory is"
          - img [ref=e1145]
          - text: –
          - img [ref=e1165]
          - text: single-point calculations. At
          - img [ref=e1175]
          - text: s per DFT single point, a 1-ns MD simulation of a 100-atom system is
          - img [ref=e1185]
          - text: s of CPU time (
          - img [ref=e1199]
          - text: years on a single core,
          - img [ref=e1209]
          - text: week on 1000 cores). At
          - img [ref=e1219]
          - text: ms per MLIP single point, the same simulation is
          - img [ref=e1229]
          - text: s of GPU time (
          - img [ref=e1243]
          - text: hours on a single H100). The MLIP turns
          - emphasis [ref=e1252]: infeasible
          - text: MD into
          - emphasis [ref=e1253]: routine
          - text: MD.
      - heading "17.2.2 The accuracy of DFT" [level=3] [ref=e1254]
      - paragraph [ref=e1255]:
        - text: The accuracy of Kohn–Sham DFT is the
        - emphasis [ref=e1256]: ceiling
        - text: on the accuracy of the MLIP. If the underlying DFT is wrong by 150 meV/atom, the MLIP can be no better than 150 meV/atom on average — it can match the DFT, and it might even
        - emphasis [ref=e1257]: overfit
        - text: and be slightly worse. The
        - emphasis [ref=e1258]: systematic
        - text: "errors of the standard XC functionals on the standard benchmarks are well-characterised:"
      - list [ref=e1259]:
        - listitem [ref=e1260]:
          - strong [ref=e1261]: Formation energies of solids.
          - text: The PBE functional has a mean-absolute error of
          - img [ref=e1263]
          - text: on the Materials Project formation-energy benchmark (
          - img [ref=e1284]
          - text: compounds); the r
          - img [ref=e1297]
          - text: SCAN meta-GGA reduces this to
          - img [ref=e1304]
          - text: meV/atom; the
          - img [ref=e1315]
          - text: B97M-D3 range-separated hybrid further reduces it to
          - img [ref=e1321]
          - text: meV/atom; the
          - emphasis [ref=e1331]: gold standard
          - text: is the
          - emphasis [ref=e1332]: hybrid
          - text: DFT plus a many-body correction (e.g.
          - img [ref=e1334]
          - text: B97M-D3 +
          - img [ref=e1340]
          - text: on a subset), at
          - img [ref=e1354]
          - text: meV/atom for the benchmark.
        - listitem [ref=e1363]:
          - strong [ref=e1364]: Band gaps.
          - text: PBE underestimates the band gap of semiconductors and insulators by
          - img [ref=e1366]
          - text: on average; the r
          - img [ref=e1379]
          - text: SCAN reduces this to
          - img [ref=e1386]
          - text: underestimation; the HSE06 hybrid gets within
          - img [ref=e1399]
          - text: of experiment on the standard benchmark;
          - img [ref=e1412]
          - text: at the
          - img [ref=e1426]
          - text: level gets within
          - img [ref=e1438]
          - text: .
        - listitem [ref=e1449]:
          - strong [ref=e1450]: Phonon frequencies.
          - text: PBE has a typical mean-absolute error of
          - img [ref=e1452]
          - text: on the experimental phonon frequencies of semiconductors and metals; r
          - img [ref=e1464]
          - text: SCAN and hybrids are similar; the
          - emphasis [ref=e1470]: best
          - text: DFT functionals are
          - img [ref=e1472]
          - text: –
          - img [ref=e1484]
          - text: accurate.
      - paragraph [ref=e1491]:
        - text: The numbers are tabulated in
        - link "chapter 05" [ref=e1492] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: § 5.2.10 and
        - link "chapter 13" [ref=e1493] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-13/
        - text: § 13.2.8. The key point for this chapter is that
        - strong [ref=e1494]: the MLIP is a surrogate of the DFT, not of the experiment
        - text: . The accuracy of the MLIP is bounded above by the accuracy of the DFT it was trained on. If the DFT is wrong, the MLIP is wrong. The fix for systematic DFT errors is
        - emphasis [ref=e1495]: not
        - text: a better MLIP — it is a better DFT reference (a higher rung of Jacob’s ladder, or a
        - img [ref=e1497]
        - text: "-ML correction to the next rung, or a"
        - img [ref=e1503]
        - text: reference).
      - heading "17.2.3 The promise of ML" [level=3] [ref=e1516]
      - paragraph [ref=e1517]:
        - text: The promise of ML for DFT is the
        - emphasis [ref=e1518]: combination
        - text: of DFT- level accuracy with classical-MD cost. The
        - emphasis [ref=e1519]: applications
        - text: "that have emerged since 2017 are:"
      - list [ref=e1520]:
        - listitem [ref=e1521]:
          - strong [ref=e1522]: Long MD trajectories.
          - text: A 1-ns MD of a 10 000- atom protein in explicit solvent is
          - emphasis [ref=e1523]: routine
          - text: with a trained MLIP; the same calculation is
          - emphasis [ref=e1524]: not routine
          - text: with
          - emphasis [ref=e1525]: ab-initio
          - text: MD.
        - listitem [ref=e1526]:
          - strong [ref=e1527]: Free-energy surfaces.
          - text: The free-energy surface of a chemical reaction — the potential of mean force along a reaction coordinate — is a million single-point calculations. An MLIP makes this feasible; Kohn–Sham DFT does not.
        - listitem [ref=e1528]:
          - strong [ref=e1529]: High-throughput screening.
          - text: The Materials Project —
          - img [ref=e1531]
          - text: inorganic crystals, each with a PBE calculation — is the
          - emphasis [ref=e1546]: training data
          - text: for the MACE-MP-0 universal potential. The
          - emphasis [ref=e1547]: use
          - text: "of the trained potential is the inverse problem: given a new composition, predict the energy without a DFT calculation."
        - listitem [ref=e1548]:
          - strong [ref=e1549]: Phase diagrams and convex hulls.
          - text: The convex hull of formation energies — the set of stable compositions at zero temperature — is the foundational object of computational materials science. An MLIP can evaluate the formation energy of a hypothetical compound in
          - img [ref=e1551]
          - text: ms, making the brute-force screening of
          - img [ref=e1561]
          - text: compositions tractable.
        - listitem [ref=e1574]:
          - strong [ref=e1575]:
            - img [ref=e1577]
            - text: "-learning (corrections)."
          - text: The cheap DFT (e.g. PBE) is wrong by a systematic
          - img [ref=e1583]
          - text: meV/atom. The
          - emphasis [ref=e1594]: expensive
          - text: DFT (e.g. r
          - img [ref=e1596]
          - text: SCAN, or HSE06, or
          - img [ref=e1603]
          - text: ) is right to
          - img [ref=e1617]
          - text: meV/atom. Train an ML model on the
          - emphasis [ref=e1627]: difference
          - img [ref=e1629]
          - text: on a small set of compounds (
          - img [ref=e1663]
          - text: –
          - img [ref=e1677]
          - text: ), then apply it to the full Materials Project. The result is the accuracy of the
          - emphasis [ref=e1686]: expensive
          - text: DFT at a fraction of the cost.
        - listitem [ref=e1687]:
          - strong [ref=e1688]: Accelerated structure prediction.
          - text: The
          - emphasis [ref=e1689]: generation
          - text: of candidate crystal structures (USPEX, CALYPSO, genetic algorithms) is embarrassingly parallel; the
          - emphasis [ref=e1690]: evaluation
          - text: of each candidate is the bottleneck. An MLIP makes the evaluation
          - img [ref=e1692]
          - text: × cheaper.
      - paragraph [ref=e1705]:
        - text: The next five sections cover the
        - emphasis [ref=e1706]: methods
        - text: that deliver the promise. We start with the
        - emphasis [ref=e1707]: descriptors
        - text: — the input to the ML model — then the
        - emphasis [ref=e1708]: models
        - text: themselves, then the
        - emphasis [ref=e1709]: training and inference
        - text: details, then the
        - emphasis [ref=e1710]: equivalence
        - text: to DFT, and finally the
        - emphasis [ref=e1711]: active learning
        - text: loop that makes the whole pipeline robust to out-of-distribution configurations.
      - heading "17.3 Atomic descriptors" [level=2] [ref=e1712]
      - paragraph [ref=e1713]:
        - text: The first ingredient of an MLIP is a
        - strong [ref=e1714]: descriptor
        - text: ": a function"
        - img [ref=e1716]
        - text: that takes as input the
        - emphasis [ref=e1739]: positions
        - img [ref=e1741]
        - text: of all atoms in the system and produces a
        - emphasis [ref=e1751]: fixed-length vector
        - text: of features for atom
        - img [ref=e1753]
        - text: . The descriptor is the only place where the symmetries of the problem are encoded; the network that consumes the descriptor is a generic function approximator. Get the descriptor right, and the network can be small and accurate. Get the descriptor wrong, and no amount of network engineering will save you.
      - heading "17.3.1 The descriptor design problem" [level=3] [ref=e1758]
      - paragraph [ref=e1759]:
        - text: The descriptor must satisfy three
        - emphasis [ref=e1760]: invariance
        - text: "properties:"
        - strong [ref=e1761]: translation invariance
        - img [ref=e1763]:
          - link [ref=e1766] [cursor=pointer]:
            - /url: "#"
        - text: ","
        - strong [ref=e1775]: rotation invariance
        - img [ref=e1777]:
          - link [ref=e1780] [cursor=pointer]:
            - /url: "#"
        - text: ", and"
        - strong [ref=e1789]: permutation invariance
        - img [ref=e1791]:
          - link [ref=e1794] [cursor=pointer]:
            - /url: "#"
        - text: . Translation invariance is
        - emphasis [ref=e1803]: trivial
        - text: (depend on
        - img [ref=e1805]
        - text: ", not on absolute positions). Rotation invariance is"
        - emphasis [ref=e1833]: non-trivial
        - text: ": BP (§ 17.3.2) uses distances and angles, SOAP (§ 17.3.3) integrates the atomic density over all rotations, ACE (§ 17.3.4) expands in rotation-invariant products of spherical harmonics. Permutation invariance follows from the"
        - emphasis [ref=e1834]: per-atom
        - text: "decomposition: the list of atomic descriptors is permuted in the same way as the list of atoms."
      - paragraph [ref=e1835]:
        - text: In addition, the descriptor should be
        - strong [ref=e1836]: smooth
        - text: (so the network generalises), and
        - strong [ref=e1837]: differential
        - text: (so the forces can be computed by automatic differentiation, with both the
        - emphasis [ref=e1838]: network gradient
        - text: and the
        - emphasis [ref=e1839]: descriptor gradient
        - text: "available in closed form):"
      - paragraph [ref=e1840]:
        - img [ref=e1842]:
          - generic [ref=e1846]:
            - img [ref=e1847]
            - img [ref=e1948]
      - paragraph [ref=e1956]:
        - text: The descriptor should also be
        - strong [ref=e1957]: complete
        - text: (the map from configuration to descriptor should be
        - emphasis [ref=e1958]: injective
        - text: ). The ACE basis (§ 17.3.4) is the
        - emphasis [ref=e1959]: only
        - text: known descriptor that is provably complete.
      - heading "17.3.2 Behler–Parrinello symmetry functions" [level=3] [ref=e1960]
      - paragraph [ref=e1961]:
        - text: The
        - strong [ref=e1962]: Behler–Parrinello (BP) symmetry functions
        - text: were introduced in 2007 by Jörg Behler and Michele Parrinello in their foundational paper on neural-network potentials (
        - link "Behler & Parrinello, Phys. Rev. Lett. 98, 146401 (2007)" [ref=e1963] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: Behler & Parrinello,
          - emphasis [ref=e1964]: Phys. Rev. Lett.
          - strong [ref=e1965]: "98"
          - text: ", 146401 (2007)"
        - text: ). The idea is to construct a
        - emphasis [ref=e1966]: hand-crafted
        - text: set of
        - emphasis [ref=e1967]: invariant
        - text: "features of the atomic neighbourhood. The features come in two families: the"
        - emphasis [ref=e1968]: radial
        - img [ref=e1970]
        - text: and
        - img [ref=e1981]
        - text: functions, which depend on the distances
        - img [ref=e1992]
        - text: between atom
        - img [ref=e2020]
        - text: and its neighbours, and the
        - emphasis [ref=e2025]: angular
        - img [ref=e2027]
        - text: functions, which depend on triples of atoms.
      - paragraph [ref=e2055]:
        - text: The
        - strong [ref=e2056]: radial
        - text: symmetry functions are sums over the neighbours of atom
        - img [ref=e2058]
        - text: ":"
      - paragraph [ref=e2063]:
        - img [ref=e2065]:
          - generic [ref=e2069]:
            - img [ref=e2070]
            - img [ref=e2146]
      - paragraph [ref=e2154]:
        - img [ref=e2156]:
          - generic [ref=e2160]:
            - img [ref=e2161]
            - img [ref=e2225]
      - blockquote [ref=e2233]:
        - paragraph [ref=e2234]:
          - strong [ref=e2235]: The hand-crafted limitation.
          - text: The BP hyperparameters
          - img [ref=e2237]
          - text: are user-picked and
          - emphasis [ref=e2261]: system-specific
          - text: (water vs. metal vs. oxide). This limits
          - emphasis [ref=e2262]: transferability
          - text: ; the ACE basis of § 17.3.4 fixes it.
      - heading "17.3.3 Smooth Overlap of Atomic Positions (SOAP)" [level=3] [ref=e2263]
      - paragraph [ref=e2264]:
        - text: The
        - strong [ref=e2265]: Smooth Overlap of Atomic Positions (SOAP)
        - text: descriptor of Bartók, Payne, Risi and Csányi (
        - link "2010, Phys. Rev. Lett. 104, 136403" [ref=e2266] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: 2010,
          - emphasis [ref=e2267]: Phys. Rev. Lett.
          - strong [ref=e2268]: "104"
          - text: ", 136403"
        - text: ) takes a
        - emphasis [ref=e2269]: systematic
        - text: approach. The starting point is the
        - strong [ref=e2270]: atomic density
        - text: centred on atom
        - img [ref=e2272]
        - text: ":"
      - paragraph [ref=e2277]:
        - img [ref=e2279]:
          - generic [ref=e2283]:
            - img [ref=e2284]
            - img [ref=e2372]
      - paragraph [ref=e2380]:
        - text: a sum of Gaussians of width
        - img [ref=e2382]
        - text: centred on the neighbours of atom
        - img [ref=e2388]
        - text: (with a cutoff
        - img [ref=e2394]
        - text: ). The density
        - img [ref=e2403]
        - text: is a
        - emphasis [ref=e2411]: smooth
        - text: function of the atomic positions; it encodes the local geometry. The SOAP descriptor is the
        - emphasis [ref=e2412]: overlap
        - text: of
        - img [ref=e2414]
        - text: with itself,
        - emphasis [ref=e2422]: integrated over all rotations
        - text: ":"
      - paragraph [ref=e2423]:
        - img [ref=e2425]:
          - generic [ref=e2429]:
            - img [ref=e2430]:
              - generic [ref=e2433]:
                - img [ref=e2466]
                - img [ref=e2511]
            - img [ref=e2517]
      - paragraph [ref=e2524]:
        - text: The integral over
        - img [ref=e2526]
        - text: is the
        - emphasis [ref=e2546]: rotation-integration
        - text: "trick: it averages over all rotations of the second density, leaving a"
        - emphasis [ref=e2547]: rotation-invariant
        - text: kernel
        - img [ref=e2549]
        - text: . Two local geometries
        - img [ref=e2571]
        - text: and
        - img [ref=e2577]
        - text: that differ by a rotation have
        - img [ref=e2586]
        - text: ; two local geometries that differ in shape have
        - img [ref=e2599]
        - text: . The kernel is a
        - emphasis [ref=e2611]: similarity measure
        - text: for atomic environments.
      - paragraph [ref=e2612]:
        - text: The kernel is
        - emphasis [ref=e2613]: expanded
        - text: in a basis of products of spherical harmonics. The atomic density is expanded in spherical harmonics centred on atom
        - img [ref=e2615]
        - text: ":"
      - paragraph [ref=e2620]:
        - img [ref=e2622]:
          - generic [ref=e2626]:
            - img [ref=e2627]
            - img [ref=e2703]
      - paragraph [ref=e2711]:
        - text: where
        - img [ref=e2713]
        - text: is a radial basis (typically a Gaussian or a polynomial),
        - img [ref=e2728]
        - text: is a real spherical harmonic, and the coefficients
        - img [ref=e2740]
        - text: are the
        - emphasis [ref=e2760]: partial-power spectrum
        - text: of the density. The rotation-invariant kernel is
      - paragraph [ref=e2761]:
        - img [ref=e2763]:
          - generic [ref=e2767]:
            - img [ref=e2768]:
              - generic [ref=e2771]:
                - img [ref=e2807]
                - img [ref=e2837]
                - img [ref=e2843]
                - img [ref=e2876]
            - img [ref=e2880]
      - paragraph [ref=e2888]:
        - text: where the
        - strong [ref=e2889]: power-spectrum
        - text: coefficients are
      - paragraph [ref=e2890]:
        - img [ref=e2892]:
          - generic [ref=e2896]:
            - img [ref=e2897]
            - img [ref=e2974]
      - paragraph [ref=e2982]:
        - text: The power spectrum is a
        - emphasis [ref=e2983]: finite
        - text: set of numbers indexed by
        - img [ref=e2985]
        - text: — typically
        - img [ref=e3006]
        - text: –
        - img [ref=e3018]
        - text: coefficients. The vector
        - img [ref=e3027]
        - text: is the SOAP descriptor. The descriptor is a
        - emphasis [ref=e3067]: systematic
        - text: "basis: the coefficients"
        - img [ref=e3069]
        - text: for
        - img [ref=e3093]
        - text: form a hierarchical basis, and the basis is
        - emphasis [ref=e3123]: complete
        - text: as
        - img [ref=e3125]
        - text: .
      - paragraph [ref=e3139]:
        - text: The kernel
        - img [ref=e3141]
        - text: is then used as the
        - emphasis [ref=e3149]: similarity measure
        - text: in a kernel-ridge-regression model (KRR-SOAP, or “Gaussian Approximation Potential”, GAP). The model is a kernel machine, not a neural network. The kernel
        - img [ref=e3151]
        - text: is a positive- definite function on the space of atomic environments, and the model is
      - paragraph [ref=e3172]:
        - img [ref=e3174]:
          - generic [ref=e3178]:
            - img [ref=e3179]
            - img [ref=e3231]
      - paragraph [ref=e3239]:
        - text: a linear combination of kernel evaluations on the training configurations
        - img [ref=e3241]
        - text: ", with weights"
        - img [ref=e3250]
        - text: fitted by regularised least-squares (§ 17.3.4 also discusses the kernel-machine view). The vector
        - img [ref=e3259]
        - text: is the
        - strong [ref=e3299]: SOAP descriptor
        - text: ; it is the
        - emphasis [ref=e3300]: systematic
        - text: "basis: the coefficients"
        - img [ref=e3302]
        - text: for
        - img [ref=e3326]
        - text: form a hierarchical basis, complete as
        - img [ref=e3357]
        - text: .
      - heading "17.3.4 Atomic Cluster Expansion (ACE)" [level=3] [ref=e3371]
      - paragraph [ref=e3372]:
        - text: The
        - strong [ref=e3373]: Atomic Cluster Expansion (ACE)
        - text: of Drautz (
        - link "2019, Phys. Rev. B 99, 014104" [ref=e3374] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: 2019,
          - emphasis [ref=e3375]: Phys. Rev. B
          - strong [ref=e3376]: "99"
          - text: ", 014104"
        - text: ) is the
        - emphasis [ref=e3377]: most general
        - text: atomic descriptor in current use. ACE is a
        - emphasis [ref=e3378]: systematic, complete
        - text: "basis for atomic environments, in the same sense that a Fourier basis is a systematic, complete basis for periodic functions. The ACE basis is:"
      - paragraph [ref=e3379]:
        - img [ref=e3381]:
          - generic [ref=e3385]:
            - img [ref=e3386]
            - img [ref=e3572]
      - paragraph [ref=e3581]:
        - text: The basis functions are labelled by a
        - emphasis [ref=e3582]: body order
        - img [ref=e3584]
        - text: (the number of neighbours involved) and a
        - emphasis [ref=e3589]: rank
        - img [ref=e3591]
        - text: (the angular momenta of the spherical harmonics). The radial functions
        - img [ref=e3615]
        - text: are a basis in distance (typically a polynomial in
        - img [ref=e3635]
        - text: "on"
        - img [ref=e3641]
        - text: ). The
        - img [ref=e3658]
        - text: is the
        - emphasis [ref=e3677]: clebsch–Gordan
        - text: condition for rotation invariance.
      - paragraph [ref=e3678]:
        - text: The total atomic energy is a
        - emphasis [ref=e3679]: linear
        - text: combination of the ACE basis
        - img [ref=e3681]:
          - link [ref=e3684] [cursor=pointer]:
            - /url: "#"
        - text: ", with linear coefficients"
        - img [ref=e3694]
        - text: . The
        - emphasis [ref=e3699]: linear
        - text: "structure is what makes ACE different from a neural network: the descriptor is"
        - emphasis [ref=e3700]: systematic
        - text: and the model is
        - emphasis [ref=e3701]: linear
        - text: in the coefficients; the non-linearity is in the
        - emphasis [ref=e3702]: basis
        - text: ", not in the model."
      - paragraph [ref=e3703]:
        - text: "The ACE basis has three properties: (1)"
        - strong [ref=e3704]: systematic convergence
        - text: as
        - img [ref=e3706]
        - text: ; (2)
        - strong [ref=e3719]: permutation invariance
        - text: by symmetrisation of the body-order couplings; (3)
        - strong [ref=e3720]: linear fit
        - text: by regularised least-squares, no gradient descent, no GPU. The catch is the
        - emphasis [ref=e3721]: cost
        - text: ":"
        - img [ref=e3723]
        - text: basis functions. For
        - img [ref=e3750]
        - text: ","
        - img [ref=e3760]
        - text: ", the basis has"
        - img [ref=e3770]
        - text: functions per atom. In practice, ACE is used at body order
        - img [ref=e3784]
        - text: –
        - img [ref=e3794]
        - text: .
      - blockquote [ref=e3799]:
        - paragraph [ref=e3800]:
          - strong [ref=e3801]: The MACE connection.
          - text: MACE (§ 17.5.3) is what you get when you
          - emphasis [ref=e3802]: take the ACE basis and replace the linear fit with a non-linear one
          - text: ": each message-passing layer of MACE corresponds to a"
          - emphasis [ref=e3803]: body order
          - text: ; the MACE descriptor is an implicitly-defined ACE basis of body order
          - img [ref=e3805]
          - text: .
      - heading "17.4 Machine-learned interatomic potentials" [level=2] [ref=e3817]
      - paragraph [ref=e3818]:
        - text: The second ingredient of an MLIP is the
        - strong [ref=e3819]: model
        - text: ": the function that maps the per-atom descriptor"
        - img [ref=e3821]
        - text: to the per-atom energy contribution
        - img [ref=e3831]
        - text: . The model is
        - emphasis [ref=e3839]: almost always
        - text: a neural network in 2025. This section treats the
        - emphasis [ref=e3840]: first-generation
        - text: model — the Behler–Parrinello neural network (BEP). The
        - emphasis [ref=e3841]: next-generation
        - text: models — the equivariant networks of § 17.5 — are the production standard in 2025; we treat them after the BEP because the BEP is the simplest and the easiest to derive.
      - heading "17.4.1 The Behler–Parrinello neural network (BEP)" [level=3] [ref=e3842]
      - paragraph [ref=e3843]:
        - text: The BEP is a
        - strong [ref=e3844]: feed-forward neural network
        - text: that maps the per-atom descriptor
        - img [ref=e3846]
        - text: to the per-atom energy contribution
        - img [ref=e3864]
