      - paragraph [ref=e4643]:
        - text: the mean-squared error of the per-atom forces, averaged over atoms and configurations. The
        - strong [ref=e4644]: stress loss
        - text: is similar, with the symmetric stress tensor in place of the per-atom force vector.
      - paragraph [ref=e4645]:
        - text: The training is the standard
        - emphasis [ref=e4646]: stochastic gradient descent
        - text: (SGD) with the Adam optimiser and a
        - emphasis [ref=e4647]: learning-rate schedule
        - text: (typically cosine annealing with a warm-up). The
        - emphasis [ref=e4648]: batch size
        - text: is typically 32–128 configurations; the
        - emphasis [ref=e4649]: number of epochs
        - text: is typically 100–1000. The
        - strong [ref=e4650]: regularisation
        - text: is the
        - emphasis [ref=e4651]: early stopping
        - text: on a held-out validation set. The training data is split into a
        - emphasis [ref=e4652]: training set
        - text: (80%) and a
        - emphasis [ref=e4653]: validation set
        - text: (20%); the training proceeds on the training set, the generalisation error is monitored on the validation set, and the best model is the one with the
        - emphasis [ref=e4654]: lowest
        - text: validation error.
