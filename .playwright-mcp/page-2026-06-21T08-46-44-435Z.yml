      - heading "17.10 Practical considerations" [level=2] [ref=e8710]
      - paragraph [ref=e8711]:
        - text: This section collects the
        - emphasis [ref=e8712]: practical
        - text: advice that the working calculator needs to
        - emphasis [ref=e8713]: build
        - text: and
        - emphasis [ref=e8714]: deploy
        - text: an MLIP. The advice is
        - emphasis [ref=e8715]: empirical
        - text: ": it is what the 2024–2025 ML-for-DFT community has"
        - emphasis [ref=e8716]: learned
