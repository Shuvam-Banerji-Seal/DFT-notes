        - text: surveys the state of the art; the most accurate 2024 ML-XC functionals reach
        - img [ref=e7566]
        - text: meV/atom on the formation-energy benchmark, comparable to SCAN.
      - heading "17.8 ML exchange–correlation functionals" [level=2] [ref=e7576]
      - paragraph [ref=e7577]:
        - text: The most ambitious use of ML for DFT is to
        - emphasis [ref=e7578]: replace the XC functional
        - text: with an ML model. The
        - emphasis [ref=e7579]: promise
        - text: is a
        - emphasis [ref=e7580]: systematic
        - text: "improvement over the human-designed Jacob’s ladder: the ML functional can be"
        - emphasis [ref=e7581]: trained
        - text: on a
        - emphasis [ref=e7582]: representative
        - text: set of systems, with a
        - emphasis [ref=e7583]: loss function
        - text: that explicitly minimises the
        - emphasis [ref=e7584]: target
        - text: error. The
        - emphasis [ref=e7585]: challenge
        - text: is the
        - emphasis [ref=e7586]: generalisation
        - text: "problem: a functional that is"
        - emphasis [ref=e7587]: trained
        - text: on a finite set of systems is
        - emphasis [ref=e7588]: biased
        - text: towards the training set, and the
        - emphasis [ref=e7589]: transferability
        - text: to new systems is
        - emphasis [ref=e7590]: unreliable
        - text: .
      - heading "17.8.1 NeuralXC" [level=3] [ref=e7591]
      - paragraph [ref=e7592]:
        - text: The
        - strong [ref=e7593]: NeuralXC
        - text: architecture of
        - link "Dick & Fernandez-Serra, Phys. Rev. B 104, L161112 (2021)" [ref=e7594] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: Dick & Fernandez-Serra,
          - emphasis [ref=e7595]: Phys. Rev. B
          - strong [ref=e7596]: "104"
          - text: ", L161112 (2021)"
        - text: is a
        - emphasis [ref=e7597]: neural-network-based
        - text: XC functional that
        - emphasis [ref=e7598]: augments
        - text: "a standard Kohn–Sham DFT calculation. The architecture is: (1) run a"
        - emphasis [ref=e7599]: standard
        - text: Kohn–Sham DFT calculation with a
        - emphasis [ref=e7600]: baseline
        - text: functional (e.g. PBE); (2) compute the
        - emphasis [ref=e7601]: baseline
        - text: density
        - img [ref=e7603]
        - text: and the
        - emphasis [ref=e7613]: baseline
        - text: KS orbitals
        - img [ref=e7615]
        - text: ; (3) use a
        - emphasis [ref=e7627]: neural network
        - text: to predict the
        - emphasis [ref=e7628]: correction
        - text: to the XC energy and potential from the
        - emphasis [ref=e7629]: local
        - text: density and the local orbital features. The correction is
        - emphasis [ref=e7630]: delta-learning
        - text: ":"
        - img [ref=e7632]
        - text: ; (4) add the correction to the baseline KS Hamiltonian and re-solve the KS equations self-consistently. The
        - emphasis [ref=e7666]: advantage
        - text: of NeuralXC is that the model
        - emphasis [ref=e7667]: uses
        - text: the standard KS machinery and only
        - emphasis [ref=e7668]: replaces
        - text: the XC functional; the
        - emphasis [ref=e7669]: implementation
        - text: is a Python wrapper around a standard DFT code. The
        - emphasis [ref=e7670]: disadvantage
        - text: is the
        - emphasis [ref=e7671]: self-consistency
        - text: ": the model has to be"
        - emphasis [ref=e7672]: self-consistent
        - text: with the KS equations. The
        - strong [ref=e7673]: training data
        - text: is a set of
        - img [ref=e7675]
        - text: –
        - img [ref=e7689]
        - text: molecules or solids for which
        - emphasis [ref=e7698]: both
        - text: the baseline (PBE) and the
        - emphasis [ref=e7699]: reference
        - text: (e.g. CCSD(T) or
        - img [ref=e7701]
        - text: ) calculations are available; the
        - emphasis [ref=e7714]: neural network
        - text: is a
        - emphasis [ref=e7715]: small
        - text: feed-forward network (
        - img [ref=e7717]
        - text: parameters) that takes the
        - emphasis [ref=e7730]: atomic descriptor
        - text: as input and outputs the
        - emphasis [ref=e7731]: per-atom
        - text: XC correction.
      - heading "17.8.2 KRR-based non-local functionals" [level=3] [ref=e7732]
      - paragraph [ref=e7733]:
        - text: The
        - strong [ref=e7734]: kernel-ridge-regression
        - text: (KRR) approach to non-local functionals is the
        - emphasis [ref=e7735]: kernel
        - text: analogue of NeuralXC. The training data is a set of
        - emphasis [ref=e7736]: densities
        - text: (or
        - emphasis [ref=e7737]: density matrices
        - text: ) and the corresponding
        - emphasis [ref=e7738]: exact
        - text: XC energies (from quantum-chemical calculations or from inverse DFT). The model is
      - paragraph [ref=e7739]:
        - img [ref=e7741]:
          - generic [ref=e7745]:
            - img [ref=e7746]
            - img [ref=e7795]
      - paragraph [ref=e7804]:
        - text: a linear combination of kernel evaluations on the training densities, with weights
        - img [ref=e7806]
        - text: fitted by regularised least-squares. The
        - emphasis [ref=e7814]: kernel
        - img [ref=e7816]
        - text: is a
        - emphasis [ref=e7834]: similarity measure
        - text: "for densities: a typical choice is the"
        - emphasis [ref=e7835]: overlap
        - text: of the two densities in a
        - emphasis [ref=e7836]: smooth
        - text: basis.
      - paragraph [ref=e7837]:
        - text: The
        - strong [ref=e7838]: advantage
        - text: of KRR is the
        - emphasis [ref=e7839]: non-parametric
        - text: "form: the model"
        - emphasis [ref=e7840]: interpolates
        - text: the training data, and the
        - emphasis [ref=e7841]: only
        - text: assumption is the
        - emphasis [ref=e7842]: kernel
        - text: (which encodes the
        - emphasis [ref=e7843]: similarity
        - text: of densities). The
        - strong [ref=e7844]: disadvantage
        - text: is the
        - emphasis [ref=e7845]: cost
        - text: ": the inference is"
        - emphasis [ref=e7846]: "O(N_\\text{train})$ per evaluation, and the *training"
        - text: is
        - emphasis [ref=e7847]: "O(N_ \\text{train}^3)$"
        - text: (the kernel matrix must be inverted).
      - heading "17.8.3 DM21" [level=3] [ref=e7848]
      - paragraph [ref=e7849]:
        - text: The
        - strong [ref=e7850]: DM21
        - text: functional of
        - link "DeepMind, Science 374, 1385 (2021)" [ref=e7851] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: DeepMind,
          - emphasis [ref=e7852]: Science
          - strong [ref=e7853]: "374"
          - text: ", 1385 (2021)"
        - text: is the
        - emphasis [ref=e7854]: most publicised
        - text: ML functional. The architecture is a
        - emphasis [ref=e7855]: neural network
        - text: that takes the
        - emphasis [ref=e7856]: density
        - text: and the
        - emphasis [ref=e7857]: gradient of the density
        - text: as input and outputs the
        - emphasis [ref=e7858]: XC energy density
        - text: . The training set is a
        - emphasis [ref=e7859]: large
        - text: collection of
        - emphasis [ref=e7860]: exact
        - text: XC energies from the
        - emphasis [ref=e7861]: hierarchical equations of motion
        - text: (HEOM) on
        - emphasis [ref=e7862]: model systems
        - text: (atoms, molecules, model solids). The
        - strong [ref=e7863]: key innovation
        - text: of DM21 is the
        - emphasis [ref=e7864]: loss function
        - text: ": the model is trained to"
        - emphasis [ref=e7865]: reproduce
        - text: the exact XC energy of the training systems, but with a
        - emphasis [ref=e7866]: regularisation
        - text: that
        - emphasis [ref=e7867]: penalises
        - text: the model for
        - emphasis [ref=e7868]: common failures
        - text: "of the standard functionals: (i) the"
        - emphasis [ref=e7869]: uniform electron gas limit
        - text: (the model should reproduce the
        - emphasis [ref=e7870]: exact
        - text: XC energy of the UEG at high density), (ii) the
        - emphasis [ref=e7871]: one-electron limit
        - text: (zero self-interaction error), (iii) the
        - emphasis [ref=e7872]: strong-correlation limit
        - text: (the
        - emphasis [ref=e7873]: step
        - text: structure of the XC potential at integer electron numbers — the
        - emphasis [ref=e7874]: DFT derivative discontinuity
        - text: ). The result is a functional that
        - emphasis [ref=e7875]: outperforms
        - text: the standard GGA and hybrid functionals on a wide range of
        - emphasis [ref=e7876]: benchmark
        - text: calculations (reaction energies, bond lengths, barrier heights, non-covalent interactions). The
        - emphasis [ref=e7877]: advantage
        - text: of DM21 is the
        - emphasis [ref=e7878]: systematic improvement
        - text: on the standard functionals; the
        - emphasis [ref=e7879]: disadvantage
        - text: is the
        - emphasis [ref=e7880]: transferability
        - text: ": DM21 is trained on a"
        - emphasis [ref=e7881]: finite
        - text: set of systems and is
        - emphasis [ref=e7882]: not
        - text: guaranteed to generalise to
        - emphasis [ref=e7883]: new
        - text: systems (the
        - emphasis [ref=e7884]: DeepMind
        - text: paper documents
        - emphasis [ref=e7885]: failure modes
        - text: "on"
        - emphasis [ref=e7886]: transition-metal
        - text: and
        - emphasis [ref=e7887]: strongly-correlated
        - text: systems).
      - heading "17.8.4 The generalisation problem" [level=3] [ref=e7888]
      - paragraph [ref=e7889]:
        - text: The
        - emphasis [ref=e7890]: generalisation problem
        - text: is the
        - emphasis [ref=e7891]: defining
        - text: challenge of ML functionals. A functional that is
        - emphasis [ref=e7892]: trained
        - text: on a finite set of systems is
        - emphasis [ref=e7893]: biased
        - text: towards the training set, and the
        - emphasis [ref=e7894]: transferability
        - text: to new systems is
        - emphasis [ref=e7895]: unreliable
        - text: . The problem is
        - emphasis [ref=e7896]: worse
        - text: for functionals than for MLIPs because the
        - emphasis [ref=e7897]: training data
        - text: is more
        - emphasis [ref=e7898]: expensive
        - text: (a DFT calculation per training example, vs. a
        - emphasis [ref=e7899]: single DFT single point
        - text: for an MLIP) and the
        - emphasis [ref=e7900]: model
        - text: is
        - emphasis [ref=e7901]: more
        - text: sensitive to the
        - emphasis [ref=e7902]: training distribution
        - text: (a small change in the functional can have
        - emphasis [ref=e7903]: large
        - text: effects on the energy).
      - paragraph [ref=e7904]:
        - text: The
        - strong [ref=e7905]: state-of-the-art
        - text: in 2025 is
        - emphasis [ref=e7906]: modest
        - text: ": the ML functionals are"
        - emphasis [ref=e7907]: better
        - text: than the standard GGA on the
        - emphasis [ref=e7908]: training distribution
        - text: ", and"
        - emphasis [ref=e7909]: competitive
        - text: with the
        - emphasis [ref=e7910]: best
        - text: GGA on
        - emphasis [ref=e7911]: near-by
        - text: test sets, but
        - emphasis [ref=e7912]: worse
        - text: than the
        - emphasis [ref=e7913]: best
        - text: GGA on
        - emphasis [ref=e7914]: far-away
        - text: test sets. The
        - emphasis [ref=e7915]: fix
        - text: is the
        - emphasis [ref=e7916]: same
        - text: "as for MLIPs:"
        - emphasis [ref=e7917]: active learning
        - text: (sample where the functional is uncertain) and
        - emphasis [ref=e7918]: fine-tuning
        - text: (retrain on a small set of application-specific DFT calculations).
      - blockquote [ref=e7919]:
        - paragraph [ref=e7920]:
          - strong [ref=e7921]: The “in heaven” prediction.
          - text: Jacob’s ladder ends “in heaven” — the exact
          - img [ref=e7923]
          - text: is
          - emphasis [ref=e7938]: unknown
          - text: . The ML functionals are a
          - emphasis [ref=e7939]: step
          - text: in the right direction, but they are
          - emphasis [ref=e7940]: not
          - text: the exact functional. The
