        - text: "**Step 1.** The two H neighbours are at Å , so . The exponent is , so . The sum over two H neighbours gives **Step 2.** ; for . Å, so Å and the exponential is . The factor . Together: **Step 3.** Both descriptors are *invariant* under rotation: depends only on the distances , only on the angle at the O vertex, and *neither* depends on the absolute orientation of the molecule. The descriptors satisfy the three invariance properties of § 17.3.1 (translation, rotation, permutation)."
