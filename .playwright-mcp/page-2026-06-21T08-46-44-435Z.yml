      - paragraph [ref=e4373]:
        - text: For a
        - emphasis [ref=e4374]: production
        - text: "MLIP, the loss includes forces (and, optionally, stress):"
      - paragraph [ref=e4375]:
        - img [ref=e4377]:
          - generic [ref=e4381]:
            - img [ref=e4382]
            - img [ref=e4430]
      - paragraph [ref=e4438]:
