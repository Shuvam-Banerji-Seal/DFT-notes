      - paragraph [ref=e9449]:
        - text: The reading order of this section mirrors the
        - emphasis [ref=e9450]: chronological
        - text: "order of the field: 2007 (NNP) → 2010 (GAP, kernel) → 2013 (SOAP, descriptor) → 2017 (SchNet, deep) → 2022 (MACE, equivariant). The five papers are also the"
        - emphasis [ref=e9451]: intellectual genealogy
