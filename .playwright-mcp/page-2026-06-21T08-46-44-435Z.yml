        - img [ref=e6035]
        - text: elements; Tc, Pm, the heavy actinides are
        - emphasis [ref=e6045]: out of support
        - text: ); (3)
        - strong [ref=e6046]: force accuracy limits the dynamics
        - text: (the universal MLIPs are
        - emphasis [ref=e6047]: trained
        - text: for near-equilibrium configurations; transition states and surfaces under large strain have
        - emphasis [ref=e6048]: larger
        - text: force errors); (4)
        - strong [ref=e6049]: calibration to the application’s functional
        - text: (MACE-MP-0 is trained on PBE; HSE06 for the band gap requires a
        - emphasis [ref=e6050]: fine-tune
        - text: ). The
        - strong [ref=e6051]: fine-tune
        - text: workflow is the
        - emphasis [ref=e6052]: practical
        - text: "answer to the OOD problem: pick a"
        - emphasis [ref=e6053]: close
        - text: universal MLIP, run a short MD to find the
        - emphasis [ref=e6054]: representative configurations
        - text: ", run"
        - emphasis [ref=e6055]: single-point
        - text: DFT with the
        - emphasis [ref=e6056]: application’s
        - text: functional,
        - emphasis [ref=e6057]: fine-tune
        - text: the universal MLIP on
        - img [ref=e6059]
        - text: –
        - img [ref=e6071]
        - text: DFT configurations (
        - img [ref=e6080]
        - text: –
        - img [ref=e6090]
        - text: H100-hours), and run the production MD with the fine-tuned MLIP.
      - paragraph [ref=e6096]:
        - text: The “fine-tune” workflow is the
        - emphasis [ref=e6097]: practical
        - text: answer to the OOD problem. The
        - emphasis [ref=e6098]: theoretical
        - text: answer is active learning (§ 17.9), which is the workflow for the case where the universal MLIP is
        - emphasis [ref=e6099]: not
