      - heading "17.7 ML for the Hamiltonian and the wavefunction" [level=2] [ref=e7266]
      - paragraph [ref=e7267]:
        - text: The most ambitious use of ML for DFT is to
        - emphasis [ref=e7268]: replace the Kohn–Sham inner loop
        - text: with an ML model that predicts the
        - emphasis [ref=e7269]: Hamiltonian
        - text: (or the
        - emphasis [ref=e7270]: wavefunction
        - text: ", or the"
        - emphasis [ref=e7271]: density matrix
        - text: ) directly from the atomic structure. The
        - emphasis [ref=e7272]: advantage
        - text: is that the ML model is
        - emphasis [ref=e7273]: O(1)
        - text: (per atom) at inference time, vs.
        - emphasis [ref=e7274]: O(N³)
        - text: for the Kohn–Sham diagonalisation. The
        - emphasis [ref=e7275]: disadvantage
        - text: is that the model is
        - emphasis [ref=e7276]: hard to train
        - text: ": the labels are"
        - emphasis [ref=e7277]: matrices
        - text: (the Hamiltonian in a localised basis), not scalars (the energy), and the training set is
        - emphasis [ref=e7278]: expensive
        - text: (a DFT calculation per training example).
      - heading "17.7.1 DeepH and HamGNN" [level=3] [ref=e7279]
      - paragraph [ref=e7280]:
        - text: The
        - strong [ref=e7281]: DeepH
        - text: (Deep Hamiltonian) approach of
        - link "Li et al., Nat. Phys. 18, 992 (2022)" [ref=e7282] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: Li et al.,
          - emphasis [ref=e7283]: Nat. Phys.
          - strong [ref=e7284]: "18"
          - text: ", 992 (2022)"
        - text: predicts the
        - emphasis [ref=e7285]: tight-binding Hamiltonian
        - text: from the atomic structure. The architecture is a graph neural network in which the
        - emphasis [ref=e7286]: edge features
        - text: are the matrix elements of the tight-binding Hamiltonian (the hopping integrals and the on-site energies) and the
        - emphasis [ref=e7287]: node features
        - text: are the atomic descriptors. The training labels are the
        - emphasis [ref=e7288]: DFT-calculated
        - text: "tight-binding Hamiltonians, obtained by Wannier-interpolating the Kohn–Sham Hamiltonian. The workflow is: run DFT on"
        - img [ref=e7290]
        - text: –
        - img [ref=e7304]
        - text: configurations, construct the
        - emphasis [ref=e7313]: maximally-localised Wannier functions
        - text: ", train the graph network to predict the tight-binding parameters from the atomic structure, and at"
        - emphasis [ref=e7314]: inference time
        - text: predict the parameters and
        - emphasis [ref=e7315]: diagonalise
        - text: the tight-binding Hamiltonian to get the band structure. The inference is
        - emphasis [ref=e7316]: O(N)
        - text: (graph network) +
        - emphasis [ref=e7317]: O(K^3)
        - text: (diagonalisation); the
        - emphasis [ref=e7318]: disadvantage
        - text: is the
        - emphasis [ref=e7319]: Wannier construction
        - text: is
        - emphasis [ref=e7320]: expensive
        - text: (one DFT calculation per training example) and the
        - emphasis [ref=e7321]: transferability
        - text: is limited to the training distribution. The
        - strong [ref=e7322]: HamGNN
        - text: (Hamiltonian Graph Neural Network) of
