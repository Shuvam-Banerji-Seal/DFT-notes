  - main [ref=e25]:
    - generic [ref=e26]:
      - heading "Chapter 17 — Machine learning for DFT" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: Kohn–Sham DFT gives you a Kohn–Sham band structure, but it costs you an
          - img [ref=e31]
          - text: "diagonalisation. Machine learning gives you the same band structure — and the same forces, the same stress, the same phonons — at a thousandth of the cost, provided you can fit a model that respects the symmetries of the problem. This chapter is the working calculator’s tour of the methods that make that trade work: descriptors, neural-network potentials, equivariant networks, foundation models,"
          - img [ref=e47]
          - text: "-learning, and the first attempts to learn the exchange–correlation functional itself."
      - paragraph [ref=e52]:
        - text: The Kohn–Sham equations of
        - link "chapter 04" [ref=e53] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: are exact in principle but expensive in practice. The diagonalisation of the Kohn–Sham Hamiltonian scales as
        - img [ref=e55]
        - text: in the number of basis functions, which is the cubic-scaling wall that limits
        - emphasis [ref=e70]: ab-initio
        - text: molecular dynamics (AIMD) to a few hundred picoseconds on a few hundred atoms. The first three chapters of these notes explained the physics and the numerics of Kohn–Sham DFT;
        - link "chapter 13" [ref=e71] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-13/
        - text: explained the corrections (DFT+U, hybrids,
        - img [ref=e73]
        - text: ", DMFT) that fix the"
        - emphasis [ref=e80]: systematic
        - text: failures of the local and semi-local functionals; this chapter is about a
        - emphasis [ref=e81]: different
        - text: kind of fix — replacing the DFT energy-and-forces calculator, for systems where the standard Kohn–Sham loop is too expensive, with a
        - emphasis [ref=e82]: machine-learned surrogate
        - text: that is trained once on a representative set of DFT calculations and then evaluated at near-classical-MD cost for every subsequent configuration.
      - paragraph [ref=e83]:
        - text: "The four ideas that make ML-for-DFT work in 2025 are: (1)"
        - strong [ref=e84]: atomic descriptors
        - text: that respect the symmetries of the problem (rotation, translation, permutation of identical atoms); (2)
        - strong [ref=e85]: graph neural networks
        - text: that operate on the
        - emphasis [ref=e86]: neighbourhood
        - text: of every atom; (3)
        - strong [ref=e87]: equivariance
        - text: — the recognition that the network’s outputs (energy, forces, stress) must transform
        - emphasis [ref=e88]: correctly
        - text: under the symmetry group of 3-D space,
        - img [ref=e90]
        - text: ; and (4)
        - strong [ref=e101]: active learning
        - text: — the iterative loop that picks the
        - emphasis [ref=e102]: next
        - text: DFT calculation to add to the training set,
        - emphasis [ref=e103]: without
        - text: leaving the model’s region of competence. We treat all four, in the order of their appearance in a working MLIP (machine-learned interatomic potential) workflow, plus a section on
        - img [ref=e105]
        - text: "-learning (a small, low-risk way to add ML to an existing DFT pipeline), a section on ML for the Hamiltonian and the wavefunction (a more ambitious replacement of the KS inner loop), a section on ML exchange–correlation functionals (the most ambitious replacement of them all — the functional itself), and two worked examples."
      - blockquote [ref=e110]:
        - paragraph [ref=e111]:
          - strong [ref=e112]: Reading note.
          - text: This chapter assumes
          - link "chapter 04" [ref=e113] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: (Kohn–Sham DFT) and
          - link "chapter 05" [ref=e114] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: (XC functionals) and
          - link "chapter 13" [ref=e115] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-13/
          - text: (DFT+U and beyond) as prerequisites. The reading of chapter 17 is
          - emphasis [ref=e116]: optional
          - text: for the rest of the chapters in this series. The chapter is the natural starting point for any reader who plans to use
          - emphasis [ref=e117]: universal
          - text: interatomic potentials (MACE-MP-0, MACE-OFF, fairchem, UMA) in production, or who plans to build a specialist MLIP for a new chemical class, or who plans to use ML to
          - emphasis [ref=e118]: correct
          - text: a DFT calculation (a
          - img [ref=e120]
          - text: "-ML formation-energy correction is the cheapest and most reliable way to add ML to an existing high-throughput pipeline)."
      - heading "17.1 The claim" [level=2] [ref=e125]
      - paragraph [ref=e126]:
        - text: The headline of this chapter is that
        - strong [ref=e127]: machine-learning surrogates of Kohn–Sham DFT can reproduce DFT-level accuracy at a small fraction of the cost
        - text: ", and that the most recent"
        - emphasis [ref=e128]: equivariant
        - text: architectures (MACE, NequIP, Allegro) achieve
        - strong [ref=e129]: sub-meV/atom
        - text: "accuracy on the standard benchmarks. The cost advantage is large: a well-trained universal MLIP evaluates the energy and forces of a"
        - img [ref=e131]
        - text: "-atom configuration in"
        - img [ref=e143]
        - text: ms on a single GPU, compared to
        - img [ref=e153]
        - text: s for a converged Kohn–Sham calculation on a single CPU core — a
        - strong [ref=e162]:
          - img [ref=e164]
        - text: speedup, with
        - strong [ref=e177]:
          - img [ref=e179]
          - text: –
          - img [ref=e193]
        - text: "speedups possible at the scale of large MD simulations. The accuracy advantage is also large: the MACE-MP-0 universal potential"
        - link "Batatia et al. 2024" [ref=e202] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
        - text: reaches
        - img [ref=e204]
        - text: meV/atom on the Materials Project formation energy benchmark, compared to the
        - img [ref=e215]
        - text: meV/atom typical of PBE on the same benchmark, and the same potential reaches sub-meV/atom on the r2SCAN re-calibrated subset. The catch — the only one that matters — is that the MLIP is only accurate on
        - emphasis [ref=e226]: configurations that resemble the training set
        - text: ; out-of- distribution extrapolation is unreliable. The mitigation is the
        - emphasis [ref=e227]: active-learning
        - text: loop of § 17.9, which queries the DFT calculator only on the configurations the MLIP is
        - emphasis [ref=e228]: uncertain
        - text: about.
      - blockquote [ref=e229]:
        - paragraph [ref=e230]:
          - strong [ref=e231]: Claim.
          - text: A machine-learned surrogate of Kohn–Sham DFT, trained on a representative set of DFT calculations, can reproduce the DFT energy to within
          - img [ref=e233]
          - text: –
          - img [ref=e243]
          - text: and the DFT forces to within
          - img [ref=e259]
          - text: –
          - img [ref=e270]:
            - generic [ref=e282]: Å
          - text: at a
          - img [ref=e284]
          - text: –
          - img [ref=e298]
          - text: speedup over the underlying Kohn–Sham calculation. The most accurate 2025 architectures (MACE, NequIP, Allegro) are
          - emphasis [ref=e309]: equivariant
          - text: — they respect the rotation, translation, and permutation symmetries of 3-D space exactly. The remaining problem is
          - emphasis [ref=e310]: out-of-distribution generalisation
          - text: ": the MLIP is only reliable on configurations that resemble the training set, and active learning (§ 17.9) is the standard mitigation."
      - paragraph [ref=e311]:
        - text: The claim can be sharpened into a single equation that captures the
        - emphasis [ref=e312]: trading relation
        - text: ":"
      - paragraph [ref=e313]:
        - text: "\\begin{equation} \\label{eq:ch-17-claim} \\boxed{\\; \\text{MAE}"
        - emphasis [ref=e314]: "\\text{MLIP} \\;\\le\\; \\text{MAE}"
        - text: "\\text{DFT} \\quad \\text{AND} \\quad \\text{cost}"
        - emphasis [ref=e315]: "\\text{MLIP} \\;\\ll\\; \\text{cost}"
        - text: "\\text{DFT} \\quad \\text{on} \\quad \\text{supp}(\\mathcal D_\\text{train}) . \\;} \\end{equation}"
      - paragraph [ref=e316]:
        - text: The first inequality says that, on the support of the training distribution
        - img [ref=e318]
        - text: ", the machine-learned potential is at least as accurate as the DFT it was trained on. The second inequality says that, at inference time, the MLIP is much cheaper than DFT. The caveat “on the support of"
        - img [ref=e332]
        - text: "” is the only one that matters in practice: outside that support, the inequalities can fail catastrophically ($\\text{MAE}"
        - emphasis [ref=e345]: "\\text{MLIP} \\gg \\text{MAE}"
        - text: "\\text{DFT}$). The fix is"
        - emphasis [ref=e346]: active learning
        - text: — sample where the MLIP is uncertain, retrain, repeat.
      - paragraph [ref=e347]:
        - strong [ref=e348]:
          - text: "Table 1. The accuracy–cost landscape for 2025. The columns are: method; typical reference (Kohn–Sham functional); mean absolute error on formation energies ("
          - img [ref=e350]
          - text: ); mean absolute error on forces (
          - img [ref=e363]:
            - generic [ref=e371]: Å
          - text: ); relative cost per single-point calculation (DFT=1); typical system size. The DFT rows are the references; the MLIP rows are the trained surrogates. All MLIP accuracies are on the Materials Project
          - img [ref=e373]
          - text: training set, tested on out-of-distribution subsets of MPtrj; the costs assume a single H100 GPU for the MLIP and a single CPU node (32 cores) for the DFT reference.
