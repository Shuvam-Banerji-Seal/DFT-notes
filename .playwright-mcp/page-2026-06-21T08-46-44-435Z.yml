          - text: tensor product of irreps.
        - listitem [ref=e5430]:
          - strong [ref=e5431]: Aggregation.
          - img [ref=e5433]
          - text: . Permutation-invariant and equivariant.
        - listitem [ref=e5472]:
          - strong [ref=e5473]: Update.
          - img [ref=e5475]
          - text: .
        - listitem [ref=e5508]:
          - strong [ref=e5509]: Readout.
          - text: The
          - img [ref=e5511]
          - text: part of the node features is the atomic energy
          - img [ref=e5521]
          - text: .
      - paragraph [ref=e5529]:
        - text: The NequIP architecture is the
        - emphasis [ref=e5530]: de facto
        - text: equivariant network in 2022–2023. The
        - emphasis [ref=e5531]: training data
        - text: is
        - img [ref=e5533]
        - text: –
        - img [ref=e5547]
        - text: configurations; the
        - emphasis [ref=e5556]: training time
