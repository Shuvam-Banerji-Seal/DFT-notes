        - text: predicts the
        - emphasis [ref=e7399]: Kohn–Sham Hamiltonian
        - text: in an atomic-orbital basis, and the
        - strong [ref=e7400]: OrbNet
        - text: of
        - link "Qiao et al., Nat. Chem. 14, 160 (2022)" [ref=e7401] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: Qiao et al.,
          - emphasis [ref=e7402]: Nat. Chem.
          - strong [ref=e7403]: "14"
          - text: ", 160 (2022)"
        - text: is a
        - emphasis [ref=e7404]: transformer
        - text: that predicts the
        - emphasis [ref=e7405]: occupied molecular orbitals
        - text: directly. The
        - emphasis [ref=e7406]: advantage
        - text: is that the
        - emphasis [ref=e7407]: predicted
        - text: Hamiltonian or wavefunction can be
        - emphasis [ref=e7408]: used
        - text: in a
        - emphasis [ref=e7409]: standard
        - text: post-processing pipeline (band structure, density of states, optical spectrum,
        - img [ref=e7411]
        - text: on top of the ML orbitals). The
        - emphasis [ref=e7418]: disadvantage
        - text: is the
        - emphasis [ref=e7419]: training cost
        - text: ": the labels are"
        - emphasis [ref=e7420]: matrices
        - text: or
        - emphasis [ref=e7421]: tensors
        - text: of dimension
        - img [ref=e7423]
        - text: ", and the training set is"
