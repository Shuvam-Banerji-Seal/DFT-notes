        - text: "-ML MP is the"
        - emphasis [ref=e7060]: standard
        - text: "reference for stability predictions in 2025. ### 17.6.3"
        - img [ref=e7062]
        - text: "-ML for band gaps"
      - paragraph [ref=e7067]:
        - text: The
        - strong [ref=e7068]: band gap
        - text: is a more delicate target. PBE underestimates the gap by
        - img [ref=e7070]
        - text: on average, HSE06 by
        - img [ref=e7083]
        - text: ","
        - img [ref=e7096]
        - text: is right to
        - img [ref=e7110]
        - text: . The
        - img [ref=e7122]
        - text: "-ML approach is to"
        - emphasis [ref=e7127]: correct
        - text: the PBE gap with an ML model trained on
        - img [ref=e7129]
        - text: . The MAE on the test set is
        - img [ref=e7168]
        - text: –
        - img [ref=e7180]
        - text: eV for HSE06 corrections and
        - img [ref=e7188]
        - text: –
        - img [ref=e7200]
        - text: eV for
        - img [ref=e7208]
        - text: . The
        - strong [ref=e7221]: challenge
        - text: is the
        - emphasis [ref=e7222]: system-dependence
        - text: ": the PBE"
        - img [ref=e7224]
        - text: HSE06 correction is
        - emphasis [ref=e7229]: not
        - text: a smooth function of the local geometry; it is sensitive to the
        - emphasis [ref=e7230]: dielectric screening
        - text: ", which depends on the"
        - emphasis [ref=e7231]: non-local
        - text: electronic structure. The 2024
        - emphasis [ref=e7232]: deep
        - img [ref=e7234]
        - text: "-ML approach of"
