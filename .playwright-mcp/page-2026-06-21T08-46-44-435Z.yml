        - emphasis [ref=e5112]: layer-wise activations
        - text: that carry a direct sum of irreps
        - img [ref=e5114]:
          - link [ref=e5117] [cursor=pointer]:
            - /url: "#"
        - text: ; the
        - emphasis [ref=e5126]: linear
        - text: operations are
        - img [ref=e5128]
        - text: "-equivariant by construction (Clebsch–Gordan tensor products); the"
        - emphasis [ref=e5140]: non-linear
        - text: operations are applied
        - emphasis [ref=e5141]: channel-wise
        - text: within each
        - img [ref=e5143]
        - text: .
      - paragraph [ref=e5148]:
        - text: The
        - strong [ref=e5149]: advantage
        - text: of equivariance is
        - emphasis [ref=e5150]: sample efficiency
        - text: . An invariant network has to
        - emphasis [ref=e5151]: learn
        - text: "the invariance from the data: it has to learn that the energy is the same when the molecule is rotated. An equivariant network"
        - emphasis [ref=e5152]: knows
        - text: the invariance by construction. The result is that equivariant networks need
        - img [ref=e5154]
        - text: –
        - img [ref=e5165]
        - text: times less data than invariant networks to reach the same accuracy, and they
        - emphasis [ref=e5172]: generalise
        - text: better outside the training distribution. The
        - strong [ref=e5173]: disadvantage
        - text: is
        - emphasis [ref=e5174]: implementation complexity
        - text: ": the equivariant operations are"
        - emphasis [ref=e5175]: tensor products
        - text: of irreps, with Clebsch–Gordan coefficients, and the implementation is
        - img [ref=e5177]
        - text: –
        - img [ref=e5188]
        - text: times more code than the invariant case.
      - heading "17.5.2 NequIP and Allegro" [level=3] [ref=e5195]
      - paragraph [ref=e5196]:
        - text: The
        - strong [ref=e5197]: NequIP
        - text: (Neural Equivariant Interatomic Potential) of Batzner et al. (
        - link "2022, Nat. Commun. 13, 2453" [ref=e5198] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: 2022,
          - emphasis [ref=e5199]: Nat. Commun.
          - strong [ref=e5200]: "13"
          - text: ", 2453"
        - text: ) is the first equivariant message-passing network for MLIPs. The architecture is a
        - emphasis [ref=e5201]: graph neural network
        - text: in which each atom is a node, each pair of neighbouring atoms is an edge, and the node features are equivariant irreps of
        - img [ref=e5203]
        - text: . The
        - emphasis [ref=e5215]: message
        - text: passed from atom
        - img [ref=e5217]
        - text: to atom
        - img [ref=e5223]
        - text: is a function of the edge features (the relative position
        - img [ref=e5229]
        - text: expanded in irreps) and the node features of
        - img [ref=e5242]
        - text: . The
        - emphasis [ref=e5247]: update
        - text: aggregates the messages and applies an equivariant linear layer.
      - paragraph [ref=e5248]:
        - text: The
        - strong [ref=e5249]: Allegro
        - text: architecture of Musaelian et al. (
        - link "2023, Nat. Commun. 14, 579" [ref=e5250] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/extras/bibliography/
          - text: 2023,
          - emphasis [ref=e5251]: Nat. Commun.
          - strong [ref=e5252]: "14"
          - text: ", 579"
        - text: ) is the
        - emphasis [ref=e5253]: fully local
        - text: "variant of NequIP: the features are"
        - emphasis [ref=e5254]: two-body
        - text: (edge) features, not three-body (triangle) features, and the message passing is
        - emphasis [ref=e5255]: not
        - text: a graph convolution. The Allegro architecture is
        - emphasis [ref=e5256]:
          - text: order-
          - img [ref=e5258]
        - text: in
        - emphasis [ref=e5263]: strict
        - text: local mode (no global graph aggregation), which makes it
        - emphasis [ref=e5264]: fast
        - text: on large systems. Allegro and NequIP reach
        - emphasis [ref=e5265]: similar
        - text: accuracies on standard benchmarks; Allegro is the better default for large systems.
      - paragraph [ref=e5266]:
        - text: The
        - strong [ref=e5267]: layer structure
        - text: "of NequIP is:"
