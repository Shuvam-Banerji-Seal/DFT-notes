      - heading "17.4.4 Generalisation and dataset coverage" [level=3] [ref=e4717]
      - paragraph [ref=e4718]:
        - text: The
        - emphasis [ref=e4719]: generalisation
        - text: of the MLIP is the
        - emphasis [ref=e4720]: one thing that matters
        - text: in production. A model that is perfect on the training set and catastrophic on the test set is
        - emphasis [ref=e4721]: useless
        - text: ". The generalisation depends on: (1)"
