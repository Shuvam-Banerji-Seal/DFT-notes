      - heading "17.10.1 Units and conversions" [level=3] [ref=e8717]
      - paragraph [ref=e8718]:
        - text: The
        - emphasis [ref=e8719]: units
        - text: in ML-for-DFT are the
        - emphasis [ref=e8720]: same
        - text: "as in DFT: energies in eV, forces in eV/Å, distances in Å, time in fs. The"
        - emphasis [ref=e8721]: conversions
        - text: "the working calculator needs are:"
      - paragraph [ref=e8722]:
        - img [ref=e8724]:
          - generic [ref=e8728]:
            - img [ref=e8729]:
              - generic [ref=e8732]:
                - generic [ref=e8774]: Å
                - generic [ref=e8806]: Å
            - img [ref=e8809]
      - paragraph [ref=e8817]:
        - text: The
        - emphasis [ref=e8818]: standard
        - text: ML-for-DFT libraries (MACE, NequIP, Allegro, SchNet, fairchem) use
        - emphasis [ref=e8819]: eV
        - text: and
        - emphasis [ref=e8820]: Å
        - text: as the
        - emphasis [ref=e8821]: internal
        - text: units. The
        - emphasis [ref=e8822]: ASE
        - text: integration layer (see the software cheatsheet) handles the
        - emphasis [ref=e8823]: conversion
        - text: between the MLIP’s
        - emphasis [ref=e8824]: internal
        - text: units and the
        - emphasis [ref=e8825]: target
        - text: units of the MD integrator.
      - blockquote [ref=e8826]:
        - paragraph [ref=e8827]:
          - strong [ref=e8828]: The silent unit bug.
          - text: The most common bug is a
          - emphasis [ref=e8829]: silent unit mismatch
          - text: (eV/Å vs. Ry/bohr vs. kJ/mol/nm). A factor-of-2 error in the
          - emphasis [ref=e8830]: forces
          - text: makes the MD diverge in a few fs.
          - emphasis [ref=e8831]: Always
          - text: print the units of every quantity at every interface.
      - heading "17.10.2 Code and frameworks" [level=3] [ref=e8832]
      - paragraph [ref=e8833]:
        - text: The
        - emphasis [ref=e8834]: standard
        - text: "2025 ML-for-DFT stack:"
        - strong [ref=e8835]: MACE
        - text: (
        - link "ACEsuite/mace" [ref=e8836] [cursor=pointer]:
          - /url: https://github.com/ACEsuit/mace
        - text: ", the default for production),"
        - strong [ref=e8837]: NequIP
        - text: and
        - strong [ref=e8838]: Allegro
        - text: (
        - link "mir-group" [ref=e8839] [cursor=pointer]:
          - /url: https://github.com/mir-group
        - text: ", equivariant),"
        - strong [ref=e8840]: SchNet
        - text: and
        - strong [ref=e8841]: flare
        - text: (invariant, GAP-style),
        - strong [ref=e8842]: fairchem
        - text: (
        - link "FAIR-Chem" [ref=e8843] [cursor=pointer]:
          - /url: https://github.com/FAIR-Chem/fairchem
        - text: ", the foundation models),"
        - strong [ref=e8844]: MACE-OSP
        - text: (on-the-fly AL),
        - strong [ref=e8845]: ASE
        - text: (the calculator interface, used by all of the above), and
        - strong [ref=e8846]: MatGL
        - text: (M3GNet). The
        - strong [ref=e8847]: ASE
        - text: package provides the standard
        - code [ref=e8848]: get_potential_energy()
        - text: and
        - code [ref=e8849]: get_forces()
        - text: API that wraps every MLIP.
      - paragraph [ref=e8850]:
        - text: The
        - strong [ref=e8851]: MACE training script
        - text: (in Python) loads the training data (an
        - code [ref=e8852]: xyz
        - text: /
        - code [ref=e8853]: extxyz
        - text: file with DFT energies, forces, and stresses), constructs the MACE model, trains with Adam and the energy+force loss of
        - img [ref=e8855]:
          - link [ref=e8858] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-17-loss-full"
        - text: ", saves the model, and logs to"
        - code [ref=e8866]: wandb
        - text: or
        - code [ref=e8867]: tensorboard
        - text: . The
        - strong [ref=e8868]: inference script
        - text: is a
        - emphasis [ref=e8869]: single-line
        - text: "ASE call:"
      - paragraph [ref=e8870]:
        - text: The
        - strong [ref=e8871]: inference script
        - text: is a
        - emphasis [ref=e8872]: single-line
        - text: "ASE call:"
      - code [ref=e8876]: from mace.calculators import MACECalculator calc = MACECalculator(model_path='my_mace.model', device='cuda') atoms.calc = calc energy = atoms.get_potential_energy() forces = atoms.get_forces()
      - paragraph [ref=e8877]:
        - text: The
        - emphasis [ref=e8878]: cost
        - text: of inference is
        - img [ref=e8880]
        - text: –
        - img [ref=e8891]
        - text: "ms per configuration on a single H100. ### 17.10.3 Common pitfalls"
      - paragraph [ref=e8898]:
        - text: The
        - emphasis [ref=e8899]: common pitfalls
        - text: "of ML-for-DFT, in the order of frequency:"
      - list [ref=e8900]:
        - listitem [ref=e8901]:
          - strong [ref=e8902]: Out-of-distribution failure.
          - text: The MLIP is
          - emphasis [ref=e8903]: confident
          - text: and
          - emphasis [ref=e8904]: wrong
          - text: on OOD configurations. The
          - emphasis [ref=e8905]: fix
          - text: is active learning (§ 17.9), fine-tuning (§ 17.5.4), or a larger training set.
        - listitem [ref=e8906]:
          - strong [ref=e8907]: Silent unit mismatch.
          - text: Training data in
          - emphasis [ref=e8908]: eV
          - text: ", MLIP outputs in"
          - emphasis [ref=e8909]: Ry
          - text: ", MD integrator in"
          - emphasis [ref=e8910]: kJ/mol
          - text: .
          - emphasis [ref=e8911]: Always
          - text: print and check the units.
        - listitem [ref=e8912]:
          - strong [ref=e8913]: Force–energy loss imbalance.
          - img [ref=e8915]
          - text: gives noisy forces and the MD diverges. Use
          - img [ref=e8928]
          - text: –
          - img [ref=e8950]
          - text: .
        - listitem [ref=e8957]:
          - strong [ref=e8958]: Periodic boundary conditions.
          - text: Train on
          - emphasis [ref=e8959]: finite
          - text: clusters and the
          - emphasis [ref=e8960]: periodic
          - text: solid has a
          - emphasis [ref=e8961]: finite-size
          - text: error. Train on
          - emphasis [ref=e8962]: periodic
          - text: configurations.
        - listitem [ref=e8963]:
          - strong [ref=e8964]: Charge transfer.
          - text: Train on
          - emphasis [ref=e8965]: neutral
          - text: atoms, evaluate a
          - emphasis [ref=e8966]: charged
          - text: system. Use a
          - emphasis [ref=e8967]: charge-equilibration
          - text: model (e.g. MEGNet).
        - listitem [ref=e8968]:
          - strong [ref=e8969]: Spin polarisation.
          - text: Train on
          - emphasis [ref=e8970]: non-spin-polarised
          - text: and miss the
          - emphasis [ref=e8971]: ferromagnetic
          - text: ground state. Use
          - emphasis [ref=e8972]: spin-aware
          - text: architectures (MACE’s spin channels).
        - listitem [ref=e8973]:
          - strong [ref=e8974]: Reproducibility.
          - text: Default training is
          - emphasis [ref=e8975]: non-deterministic
          - text: . Set the random seed (
          - code [ref=e8976]: torch.manual_seed(42)
          - text: ) and use deterministic GPU operations (
          - code [ref=e8977]: torch.use_deterministic_algorithms(True)
          - text: ).
        - listitem [ref=e8978]:
          - strong [ref=e8979]: Data leakage.
          - text: The training set includes a configuration
          - emphasis [ref=e8980]: almost identical
          - text: to a test configuration (e.g. two MD frames that differ by
          - img [ref=e8982]
          - text: Å). The
          - emphasis [ref=e8995]: test
          - text: error is
          - emphasis [ref=e8996]: artificially low
          - text: . The
          - emphasis [ref=e8997]: fix
          - text: is to
          - emphasis [ref=e8998]: split
          - text: the data
          - emphasis [ref=e8999]: structurally
          - text: (e.g. by composition).
      - blockquote [ref=e9000]:
        - paragraph [ref=e9001]:
          - strong [ref=e9002]: The reproducibility crisis.
          - text: MLIP training is
          - emphasis [ref=e9003]: notoriously
          - text: non- reproducible. The same training script, run twice on the same data with the same hyperparameters, can produce models with
          - img [ref=e9005]
          - text: –
          - img [ref=e9015]
          - text: meV/atom differences in the
          - emphasis [ref=e9020]: validation
          - text: error. The
          - emphasis [ref=e9021]: fix
          - text: is to
          - emphasis [ref=e9022]: report
          - text: the validation error
          - emphasis [ref=e9023]: with error bars
          - text: (standard deviation over 5–10 random seeds) and to
          - emphasis [ref=e9024]: publish
          - text: the
          - emphasis [ref=e9025]: trained model
          - text: ","
          - emphasis [ref=e9026]: training script
          - text: ", and"
          - emphasis [ref=e9027]: training data
          - text: — the 2024 MACE paper is exemplary.
        - heading "17.11 Worked example — a MACE-MP-0 potential for water" [level=2] [ref=e9028]
      - paragraph [ref=e9029]:
        - text: We use the
        - strong [ref=e9030]: MACE-MP-0
        - text: universal potential as a
        - emphasis [ref=e9031]: zero-shot
        - text: predictor for liquid water. The script is
        - code [ref=e9032]: dft_notes/python_codes/chapter_17/01-mace-water-md.py
        - text: "; the essential code is:"
      - code [ref=e9036]: "from mace.calculators import MACECalculator from ase.build import molecule from ase.md.langevin import Langevin from ase.md.velocitydistribution import MaxwellBoltzmannDistribution from ase import units calc = MACECalculator(model=\"medium\", device=\"cuda\") atoms = molecule(\"H2O\").repeat((4, 4, 4)) atoms.set_cell([12.4, 12.4, 12.4]) atoms.set_pbc(True) atoms.calc = calc MaxwellBoltzmannDistribution(atoms, temperature_K=300) dyn = Langevin(atoms, timestep=0.5*units.fs, temperature_K=300, friction=0.01/units.fs) for step in range(20000): dyn.run(1)"
      - paragraph [ref=e9037]:
        - text: The O–O RDF is computed by histogramming the pairwise O–O distances over the trajectory. The
        - emphasis [ref=e9038]: expected
        - text: result is an O–O RDF with a
        - emphasis [ref=e9039]: first peak
        - text: at
        - img [ref=e9041]
        - text: Å (the
        - emphasis [ref=e9052]: hydrogen-bond
        - text: distance), a
        - emphasis [ref=e9053]: first minimum
        - text: at
        - img [ref=e9055]
        - text: Å, a
        - emphasis [ref=e9066]: second peak
        - text: at
        - img [ref=e9068]
        - text: Å, and a
        - emphasis [ref=e9079]: long-range
        - text: tail that
        - emphasis [ref=e9080]: converges
        - text: to
        - img [ref=e9082]
        - text: .
      - paragraph [ref=e9097]:
        - text: The MACE-MP-0 RDF is
        - emphasis [ref=e9098]: qualitatively correct
        - text: (the peaks are at the right positions) but
        - emphasis [ref=e9099]: quantitatively
        - text: off (the first peak is
        - emphasis [ref=e9100]: too high
        - text: by
        - img [ref=e9102]
        - text: –
        - img [ref=e9115]
        - text: ", the second peak is"
        - emphasis [ref=e9123]: too low
        - text: ). The
        - emphasis [ref=e9124]: fix
        - text: is to
        - emphasis [ref=e9125]: fine-tune
        - text: the MACE-MP-0 model on a small set of
        - emphasis [ref=e9126]: DFT-calculated
        - text: water configurations (
        - img [ref=e9128]
        - text: configurations,
        - img [ref=e9141]
        - text: day on a single H100). The fine-tuned model reproduces the
        - emphasis [ref=e9150]: experimental
        - text: RDF to within
        - img [ref=e9152]
        - text: .
      - blockquote [ref=e9163]:
        - paragraph [ref=e9164]:
          - strong [ref=e9165]: The “MLIP for water” is a solved problem.
          - text: The 2024 MACE-OFF paper reports a MACE model trained on the SPICE dataset (
          - img [ref=e9167]
          - text: B97M-D3 reference) that reproduces the experimental RDF of water to within
          - img [ref=e9173]
          - emphasis [ref=e9184]: zero-shot
          - text: ; the model is
          - code [ref=e9185]: MACE-OFF23
          - text: in the MACE package.
      - heading "17.12 Worked example — a -ML formation-energy correction" [level=2] [ref=e9186]:
        - text: 17.12 Worked example — a
        - img [ref=e9188]
        - text: "-ML formation-energy correction"
      - paragraph [ref=e9193]:
        - text: The second worked example is a
        - emphasis [ref=e9194]: minimal
        - img [ref=e9196]
        - text: "-ML correction of PBE formation energies to the r"
        - img [ref=e9202]
        - text: SCAN level using KRR with a SOAP descriptor. The script is
        - code [ref=e9208]: dft_notes/python_codes/chapter_17/02-delta-ml-formation-energy.py
        - text: "; the essential code is:"
      - code [ref=e9212]: "from dscribe.descriptors import SOAP from sklearn.kernel_ridge import KernelRidge from sklearn.model_selection import train_test_split from sklearn.metrics import mean_absolute_error import numpy as np # Build a SOAP descriptor soap = SOAP(species=[\"Li\",\"Na\",\"K\",\"Mg\",\"Ca\",\"Al\",\"Si\", \"Ti\",\"V\",\"Cr\",\"Mn\",\"Fe\",\"Co\",\"Ni\",\"Cu\",\"Zn\",\"O\"], r_cut=4.0, n_max=4, l_max=2, average=\"inner\", periodic=False) X = np.array([soap.create(a) for a in atoms_list]) y = (e_r2scan - e_pbe) # per-atom PBE -> r2SCAN correction # Split X_tr, X_te, y_tr, y_te = train_test_split(X, y, test_size=0.2) # Train the KRR model krr = KernelRidge(alpha=1e-3, kernel=\"rbf\", gamma=0.1) krr.fit(X_tr, y_tr) # Predict and evaluate y_pred = krr.predict(X_te) mae_deltaml = mean_absolute_error(y_te, y_pred)"
