      - heading "17.16 What we left out" [level=2] [ref=e14076]
      - paragraph [ref=e14077]: The chapter scratched the surface of a deep and rapidly-moving subject. The omissions below are the most important for a complete picture.
      - list [ref=e14078]:
        - listitem [ref=e14079]:
          - strong [ref=e14080]: Graph neural networks in detail.
          - text: We used the
          - emphasis [ref=e14081]: graph
          - text: view of the atomic structure (§ 17.5) without deriving the
          - emphasis [ref=e14082]: message-passing
          - text: paradigm in detail. The 2017 MPNN paper of Gilmer et al. and the 2017 SchNet paper of Schütt et al. introduced the
          - emphasis [ref=e14083]: graph
          - text: and
          - emphasis [ref=e14084]: message- passing
          - text: views; we did not derive either. The reader interested in the
          - emphasis [ref=e14085]: general
          - text: theory of GNNs should consult the
          - emphasis [ref=e14086]: graph representation learning
          - text: textbook by Hamilton (2020).
        - listitem [ref=e14087]:
          - strong [ref=e14088]: Uncertainty quantification.
          - text: We used the
          - emphasis [ref=e14089]: ensemble disagreement
          - text: of § 17.9.2 as a
          - emphasis [ref=e14090]: proxy
          - text: for the MLIP uncertainty. The proper
          - emphasis [ref=e14091]: Bayesian
          - text: treatment (Gaussian-process variance, Monte Carlo dropout, deep ensembles) is a
          - emphasis [ref=e14092]: subject
          - text: in its own right. We did not derive the Bayesian formalism; the 2024 MACE-OSP paper and the 2024 MACE-MP-0 paper both use the
          - emphasis [ref=e14093]: ensemble
          - text: approximation.
        - listitem [ref=e14094]:
          - strong [ref=e14095]: The older non-equivariant SchNet and PaiNN architectures.
          - text: We used the
          - emphasis [ref=e14096]: equivariant
          - text: MACE architecture (§ 17.5.3) as the
          - emphasis [ref=e14097]: default
          - text: ", but the"
          - emphasis [ref=e14098]: older
          - text: non-equivariant SchNet (2017) and PaiNN (2021) architectures are still in production in 2025, particularly for
          - emphasis [ref=e14099]: small
          - text: training sets and
          - emphasis [ref=e14100]: fast
          - text: inference. We did not derive the SchNet or PaiNN architectures; the original papers are the standard reference.
        - listitem [ref=e14101]:
