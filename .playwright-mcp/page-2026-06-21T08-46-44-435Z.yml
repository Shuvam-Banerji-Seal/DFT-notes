        - img [ref=e5992]
        - text: –
        - img [ref=e6002]
        - text: GB. The
        - strong [ref=e6007]: batch size
        - text: for inference is typically 1–10 configurations; larger batches are possible but the memory scales linearly.
      - paragraph [ref=e6008]:
        - text: The
        - strong [ref=e6009]: limitations
        - text: "of the universal MLIPs are: (1)"
        - strong [ref=e6010]: out-of-distribution failure
        - text: (OOD configurations give
        - emphasis [ref=e6011]: unreliable
        - text: predictions;
        - img [ref=e6013]
