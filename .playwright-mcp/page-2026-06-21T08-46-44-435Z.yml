        - text: is the action of
        - img [ref=e5036]
        - text: on the output. The total energy is
        - emphasis [ref=e5041]: invariant
        - text: (a scalar), the forces are
        - emphasis [ref=e5042]: equivariant
        - text: "(a vector: rotation acts on them as a 3×3 matrix), the stress is"
        - emphasis [ref=e5043]: equivariant
        - text: (a rank-2 tensor).
      - paragraph [ref=e5044]:
        - text: The
        - strong [ref=e5045]: irreducible representations
        - text: of
        - img [ref=e5047]
        - text: are labelled by the angular momentum
        - img [ref=e5060]
