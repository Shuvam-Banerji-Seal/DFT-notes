            - text: .
        - listitem [ref=e13867]:
          - paragraph [ref=e13868]:
            - strong [ref=e13869]: No uncertainty quantification (UQ) for the neural-network models).
            - text: The GAP paper
            - emphasis [ref=e13870]: has
            - text: UQ for free (the GP predictive variance), but the BP, SchNet, and MACE papers do
            - emphasis [ref=e13871]: not
            - text: ": they are"
            - emphasis [ref=e13872]: deterministic
            - text: neural networks. The
            - emphasis [ref=e13873]: UQ
            - text: for neural networks is a
