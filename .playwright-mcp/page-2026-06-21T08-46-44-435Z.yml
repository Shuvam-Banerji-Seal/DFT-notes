        - emphasis [ref=e6109]:
          - img [ref=e6111]
          - text: "-ML"
        - text: or
        - emphasis [ref=e6116]: delta-learning
        - text: ). The idea is to
        - emphasis [ref=e6117]: correct
        - text: a cheap DFT calculation with an ML model trained on the
        - emphasis [ref=e6118]: difference
        - text: to an expensive DFT calculation. The cheap DFT (PBE) is wrong by
        - img [ref=e6120]
        - text: meV/atom; the expensive DFT (r
        - img [ref=e6132]
        - text: SCAN, or HSE06, or
        - img [ref=e6139]
        - text: ) is right to
        - img [ref=e6153]
        - text: meV/atom. The
        - img [ref=e6164]
        - text: "-ML model is trained on a"
        - emphasis [ref=e6169]: small
        - text: set of
        - emphasis [ref=e6170]: corrections
        - text: and applied to the
        - emphasis [ref=e6171]: full
        - text: database.
