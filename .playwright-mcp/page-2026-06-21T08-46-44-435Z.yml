      - heading "17.4.2 Training data and active learning" [level=3] [ref=e4135]
      - paragraph [ref=e4136]:
        - text: The
        - emphasis [ref=e4137]: training data
        - text: is the
        - emphasis [ref=e4138]: only
        - text: place where the
        - emphasis [ref=e4139]: physics
        - text: enters the MLIP. The model is a function approximator; the data is the
        - emphasis [ref=e4140]: truth
        - text: ". A good training set must:"
      - list [ref=e4141]:
        - listitem [ref=e4142]:
          - strong [ref=e4143]: Cover the configuration space
          - text: of the application. For a
          - emphasis [ref=e4144]: room-temperature
          - text: "MD of liquid water, the configurations are the local minima of the water PES in the thermal ensemble: O–H distances, O–O distances, H–O–H angles. For a"
          - emphasis [ref=e4145]: high-pressure
          - text: phase of ice, the configurations include the
          - emphasis [ref=e4146]: new
          - text: high- pressure phases that the room-temperature training set does not include. For a
          - emphasis [ref=e4147]: defect
          - text: in a semiconductor, the configurations include the
          - emphasis [ref=e4148]: defect
          - text: and its
          - emphasis [ref=e4149]: first few shells
          - text: of neighbours.
        - listitem [ref=e4150]:
          - strong [ref=e4151]: Sample the energy landscape
          - text: uniformly. A training set dominated by low-energy configurations will give a
          - emphasis [ref=e4152]: biased
          - text: model that fails on high-energy configurations (transition states, surfaces, defects). A
          - emphasis [ref=e4153]: uniform sampling
          - text: of the energy landscape is the right goal.
        - listitem [ref=e4154]:
          - strong [ref=e4155]: Include the forces
          - text: ", not just the energies. A model trained on energies"
          - emphasis [ref=e4156]: alone
          - text: has an
          - img [ref=e4158]
          - text: effective sample size; a model trained on energies
          - emphasis [ref=e4175]: and
          - text: forces has an
          - img [ref=e4177]
          - text: effective sample size, because the force on each atom is a
          - emphasis [ref=e4189]: new
          - text: data point. The rule of thumb is that the force information dominates the training for an MD-quality MLIP.
      - paragraph [ref=e4190]:
        - text: The
        - emphasis [ref=e4191]: active-learning
        - text: loop (§ 17.9) is the
        - emphasis [ref=e4192]: iterative
        - text: "procedure that builds the training set. The loop has three steps:"
      - paragraph [ref=e4193]:
        - img [ref=e4195]:
          - generic [ref=e4199]:
            - img [ref=e4200]
            - img [ref=e4255]
      - paragraph [ref=e4263]:
        - text: The “sample where uncertain” step is the
        - emphasis [ref=e4264]: query strategy
        - text: ; the most common is
        - emphasis [ref=e4265]: query-by- committee
        - text: (§ 17.9.2), in which an
        - emphasis [ref=e4266]: ensemble
        - text: of MLIPs trained on the same data vote on which configuration to add next. A configuration is added when the
        - emphasis [ref=e4267]: disagreement
        - text: of the ensemble exceeds a threshold.
      - blockquote [ref=e4268]:
        - paragraph [ref=e4269]:
          - strong [ref=e4270]: The “in-domain” problem.
          - text: A common failure mode is to train on a
          - emphasis [ref=e4271]: small
          - text: DFT set and deploy on OOD configurations; the predictions are
          - emphasis [ref=e4272]: confident
          - text: and
          - emphasis [ref=e4273]: wrong
          - text: . The fix is
          - emphasis [ref=e4274]: active learning
          - text: (§ 17.9.3).
      - heading "17.4.3 The loss function" [level=3] [ref=e4275]
      - paragraph [ref=e4276]:
        - text: The
        - strong [ref=e4277]: loss function
