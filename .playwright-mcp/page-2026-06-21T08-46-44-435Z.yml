        - text: meV/atom; the
        - img [ref=e7024]
        - text: "-ML convex hull is"
        - emphasis [ref=e7029]: right
        - text: to
        - img [ref=e7031]
        - text: meV/atom, at the cost of a PBE calculation per compound. A
