    - generic [ref=e26]:
      - heading "Chapter 14 — Quantum chemistry methods beyond DFT" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: Density-functional theory is the workhorse of modern electronic structure, but it is not the only theory. Sitting in the same many-body Hilbert space are
          - emphasis [ref=e30]: wavefunction-based
          - text: methods — Møller–Plesset perturbation theory, configuration interaction, coupled cluster, multireference, and the modern semiempiricals — that are systematically improvable, that converge to the exact answer as a parameter is turned up, and that have a different set of strengths and weaknesses from any functional on Jacob’s ladder.
      - paragraph [ref=e31]:
        - text: By the end of
        - link "chapter 05" [ref=e32] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-05/
        - text: "we had the full Kohn–Sham machinery: a fictitious non-interacting reference system that reproduces the interacting density ("
        - link "chapter 04" [ref=e33] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: ), a self-consistent loop, and a Jacob’s ladder of exchange–correlation functionals — LDA, GGA, meta-GGA, hybrid. For most of chemistry and materials science, the local and semi-local rungs of that ladder are good enough; even the hybrid rung (PBE0, B3LYP) gets the thermochemistry of organic molecules within
        - img [ref=e35]
        - text: . The exceptions are the
        - emphasis [ref=e47]: systematically improvable
        - text: problems — non-covalent interactions, thermochemistry at
        - img [ref=e49]
        - text: accuracy, transition-metal multiplets, bond breaking — where the
        - emphasis [ref=e66]: wavefunction
        - text: itself is the controlled quantity and DFT is one approximation among many.
      - paragraph [ref=e67]:
        - text: This chapter is the tour of the wavefunction-based methods that
        - emphasis [ref=e68]: complement
        - text: "DFT. We will, in order: state the"
        - emphasis [ref=e69]: post-HF ladder
        - text: in a single table (§ 14.1); derive the
        - strong [ref=e70]: Møller–Plesset
        - text: perturbation series and the canonical MP2 energy correction (§ 14.2); build the
        - strong [ref=e71]: configuration-interaction
        - text: hierarchy, the
        - strong [ref=e72]: Davidson
        - text: algorithm, and the
        - emphasis [ref=e73]: size-extensivity error
        - text: of truncated CI (§ 14.3); introduce the
        - strong [ref=e74]: coupled-cluster
        - text: exponential ansatz, the CCSD equations, and the perturbative triples correction CCSD(T) (§ 14.4); survey the
        - strong [ref=e75]: multireference
        - text: methods — CASSCF, CASPT2, NEVPT2, and selected CI — for the problems where a single determinant is not enough (§ 14.5); give the
        - strong [ref=e76]: semiempirical
        - text: ancestry from Hückel to PM7 to modern
        - strong [ref=e77]: DFTB
        - text: (§ 14.6); derive the
        - strong [ref=e78]: Helgaker basis-set extrapolation
        - text: formula and the
        - strong [ref=e79]: G1/G2/G3/W1
        - text: composite protocols (§ 14.7); close with a side-by-side comparison (§ 14.8), a worked example on the H₂O atomisation energy (§ 14.9), three graded problems (§ 14.10), and an honest list of omissions (§ 14.12).
      - paragraph [ref=e80]:
