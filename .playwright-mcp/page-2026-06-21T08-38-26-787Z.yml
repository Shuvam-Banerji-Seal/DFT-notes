      - heading "14.1 The claim" [level=2] [ref=e95]
      - paragraph [ref=e96]:
        - text: The headline of this chapter is a single statement of the
        - emphasis [ref=e97]: post-HF ladder
        - text: — the ranking of methods by cost, by accuracy, and by the kind of problem each is good at.
