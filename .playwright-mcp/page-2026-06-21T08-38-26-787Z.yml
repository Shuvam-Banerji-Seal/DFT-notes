      - heading "14.6 Semiempirical methods" [level=2] [ref=e11955]
      - paragraph [ref=e11956]:
        - text: The
        - emphasis [ref=e11957]: semiempirical
        - text: methods are a
        - emphasis [ref=e11958]: family
        - text: of approximate quantum-chemistry methods that
        - emphasis [ref=e11959]: replace
        - text: the expensive two-electron integrals with
        - emphasis [ref=e11960]: empirical parameters
        - text: fitted to experiment or to high-accuracy calculations. The semiempirical family is
        - emphasis [ref=e11961]: older
        - text: than DFT (the
        - emphasis [ref=e11962]: Hückel
        - text: method is from 1930), and is the
        - emphasis [ref=e11963]: only
        - text: quantum-chemistry approach that is
        - emphasis [ref=e11964]: fast enough
        - text: for
        - emphasis [ref=e11965]: millions
        - text: of atoms (molecular dynamics of proteins, molecular electronics, combinatorial chemistry). The
        - emphasis [ref=e11966]: modern
        - text: semiempirical methods — PM3, PM6, PM7, DFTB — are
        - emphasis [ref=e11967]: not
        - text: the Hückel method of the 1930s; they are
        - emphasis [ref=e11968]: systematically improvable
        - text: approximations to the full electronic problem that retain the
        - emphasis [ref=e11969]: speed
        - text: of the historical methods and the
        - emphasis [ref=e11970]: accuracy
        - text: of the modern ones.
