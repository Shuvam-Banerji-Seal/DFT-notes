          - img [ref=e103]
          - text: and the accuracy grows with that cost. Hartree–Fock (
          - link "chapter 03" [ref=e108] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-03/
          - text: ) is the zeroth rung (
          - img [ref=e110]
