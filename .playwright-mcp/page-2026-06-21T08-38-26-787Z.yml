      - heading "14.10 Problems" [level=2] [ref=e17442]
      - group [ref=e17443]:
        - generic "▸ Problem 1 (easy) — Size consistency of MP2" [ref=e17444] [cursor=pointer]
        - text: "The **MP2 correlation energy** of a system of two non-interacting He atoms (in the limit ) is the *sum* of the MP2 correlation energies of the two He atoms computed separately. Show this *algebraically* by working through the MP2 formula for the dimer and identifying the cross-terms that vanish in the limit . You may use the following *facts* (which are derived in the body of the chapter): 1. In the limit , the MOs of the dimer split into the MOs of the *left* He atom and the MOs of the *right* He atom. 2. The MOs of the *left* He atom are *localised* on the *left* He atom; the MOs of the *right* He atom are *localised* on the *right* He atom. 3. The two-electron integrals between *left* and *right* orbitals are *exponentially small* in the separation (they vanish in the limit ). 4. The energy denominators in the MP2 sum are *the same* in the dimer and in the two separate atoms (the orbital energies do not change with ). Verify that the cross-terms in the MP2 sum (those with and or vice versa) vanish in the limit , and write the final expression for in terms of the atomic MP2 correlation energies."
      - group [ref=e17445]:
        - generic "▸ Show answer" [ref=e17446] [cursor=pointer]
        - text: "**Step 1 — split the orbital spaces.** In the limit, the occupied spin-orbitals of the dimer split into the *left*-atom and *right*-atom sets; the same split holds for the virtuals. **Step 2 — classify the MP2 sum.** The pairs in split into **AA**, **BB**, and **AB** classes. The same for the virtual pairs. **Step 3 — evaluate the cross-terms.** Each **AB** occupied pair combines with any virtual pair to give a *cross* integral that is *exponentially small* in (fact 3). All **AB** contributions vanish. **Step 4 — sum the survivors.** The remaining **AA**-**AA** and **BB**-**BB** pieces are the *left*- and *right*-atom MP2 sums; the energy denominators are unchanged (fact 4), so the dimer MP2 correlation energy is The analogous argument for CISD *fails* — the truncated-CI normalisation introduces *disconnected* terms that grow with the number of fragments (§ 14.3.4)."
      - group [ref=e17447]:
        - generic "▸ Problem 2 (medium) — The MP2 energy of H₂ in a minimal basis" [ref=e17448] [cursor=pointer]
        - text: Consider the H₂ molecule at the equilibrium bond length in the *minimal* STO-3G basis. The basis has one function on each hydrogen, contracted from 3 Gaussians. The HF energy in this basis is , the HF orbital energies are (occupied) and (virtual), and the only non-zero antisymmetrised two-electron integral is . Compute the MP2 correlation energy using (sum over the *one* pair of occupied orbitals and the *one* pair of virtual orbitals ), and add it to the HF energy to get the MP2 total energy. Compare to the *exact* (full-CI) energy of H₂ in the STO-3G basis, .
      - group [ref=e17449]:
        - generic "▸ Show answer" [ref=e17450] [cursor=pointer]
        - text: "**Step 1 — identify the unique pair.** In the minimal STO-3G basis of H₂, the only occupied spin-orbital is the bonding (with both and electrons) and the only virtual is the antibonding . The sum in has *one* term: the double excitation . **Step 2 — evaluate the integral and denominator.** The antisymmetrised integral is ; the energy denominator is . **Step 3 — assemble the MP2 energy.** **Step 4 — compare to FCI.** The MP2 total energy is *below* the FCI energy : MP2 is *not* a variational bound on FCI. The MP2 error in the correlation energy is ( of the correlation energy) — *typical* for a *minimal* basis, and *systematic* (overcorrelation). The *take-home*: the Møller–Plesset series is a *power series*, and a *truncated* series is not a variational bound."
      - group [ref=e17451]:
        - generic "▸ Problem 3 (hard) — Show that the CCSD energy is size extensive" [ref=e17452] [cursor=pointer]
        - text: "Show that the CCSD energy is *size extensive*: for two non-interacting fragments A and B (in the limit ), the CCSD energy of A B is the *sum* of the CCSD energies of A and B computed separately. Use the linked-cluster theorem of § 14.4.4 and the factorisation of the exponential ansatz in the limit . You may use the following *facts* (which are derived in the body of the chapter): 1. In the limit , the CCSD wavefunction factorises: . 2. The CCSD energy is the *sum* of connected diagrams: . 3. The *connected* diagrams in the CCSD energy are *proportional* to the number of particles in the uniform limit. 4. The **linked-cluster theorem** of CC theory says that *all* matrix elements of are *sums* of connected diagrams; there are *no* disconnected contributions to the *matrix elements*. Working from these facts, show that ."
      - group [ref=e17453]:
        - generic "▸ Show answer" [ref=e17454] [cursor=pointer]
        - text: "**Step 1 — apply the factorisation.** By fact 1, in the limit the CCSD wavefunction of the dimer factorises into a *product* of the fragment CCSD wavefunctions: and . **Step 2 — apply the linked-cluster theorem.** By fact 2 (which *follows* from fact 4), the CCSD energy is a *sum* of connected diagrams. In the *factorised* dimer reference, the connected diagrams split into *AA* (left-atom only) and *BB* (right-atom only) classes. The *cross* (AB) diagrams do *not* exist in the limit because the cross two-electron integrals vanish exponentially in (the *same* argument as in Problem 1 for MP2). So the sum splits into a *left-atom* sum *plus* a *right-atom* sum. **Step 3 — identify the fragment energies.** The *left-atom* sum is, by definition, the CCSD energy of the *left* atom; the *right-atom* sum is the *right*-atom energy. Therefore This is the *defining* advantage of the exponential ansatz of CC theory over the linear CI ansatz: the *normalisation* of the truncated-CI wavefunction introduces *disconnected* contributions that grow with the number of fragments (§ 14.3.4), while the CC ansatz *factorises* by the BCH similarity transform and the linked-cluster theorem ensures that *only* *connected* contributions survive. The same argument extends to CCSDT, CCSDTQ, …, and to the (T) correction of CCSD(T)."
