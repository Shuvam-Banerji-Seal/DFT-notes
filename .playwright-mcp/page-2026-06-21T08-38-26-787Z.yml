      - heading "14.12 What we left out" [level=2] [ref=e17484]
      - paragraph [ref=e17485]:
        - text: The chapter scratched the surface of a
        - emphasis [ref=e17486]: large
        - text: field. The five omissions below are the most important for a
        - emphasis [ref=e17487]: complete
        - text: picture of the post-HF landscape.
      - list [ref=e17488]:
        - listitem [ref=e17489]:
          - paragraph [ref=e17490]:
            - strong [ref=e17491]: Explicitly correlated (F12) methods.
            - text: The
            - emphasis [ref=e17492]: conventional
            - text: MP2, CCSD, and CCSD(T) methods have a
            - emphasis [ref=e17493]: slow
            - text: basis-set convergence because the electron–electron cusp is
            - emphasis [ref=e17494]: not
            - text: described by the finite Gaussian basis. The
            - strong [ref=e17495]: F12
            - text: methods (Hättig, Klopper, Tew, Valeev,
            - emphasis [ref=e17496]: Chem. Rev.
            - strong [ref=e17497]: "112"
            - text: ", 4 (2012)) add a"
            - emphasis [ref=e17498]: geminal
            - text: correlation factor
            - img [ref=e17500]
            - text: that
            - emphasis [ref=e17516]: explicitly
            - text: describes the cusp, and achieve
            - emphasis [ref=e17517]: cc-pVDZ-F12
            - text: accuracy comparable to
            - emphasis [ref=e17518]: cc-pVQZ
            - text: at a
            - emphasis [ref=e17519]: much lower
            - text: cost. F12 is the
            - emphasis [ref=e17520]: production
            - text: standard in modern high-accuracy quantum chemistry. We did not derive the F12 ansatz, the F12-specific integrals, or the F12-CASPT2 generalisation of § 14.5.3. -
            - strong [ref=e17521]: Quantum Monte Carlo (QMC) and full-CI QMC.
            - text: The
            - strong [ref=e17522]: VMC
            - text: (variational) and
            - strong [ref=e17523]: DMC
            - text: (diffusion) Monte Carlo methods (Anderson,
            - emphasis [ref=e17524]: J. Chem. Phys.
            - strong [ref=e17525]: "63"
            - text: ", 1499 (1975); Ceperley & Alder,"
            - emphasis [ref=e17526]: Phys. Rev. Lett.
            - strong [ref=e17527]: "45"
            - text: ", 566 (1980)) solve the"
            - emphasis [ref=e17528]: electronic
            - text: Schrödinger equation by
            - emphasis [ref=e17529]: stochastic
            - text: sampling of the wavefunction. QMC is
            - emphasis [ref=e17530]: exact
            - text: in principle (within the
            - emphasis [ref=e17531]: fixed-node
            - text: approximation) and scales polynomially, making it
            - emphasis [ref=e17532]: competitive
            - text: with CCSD(T) for
            - emphasis [ref=e17533]: medium-sized
            - text: systems. The
            - strong [ref=e17534]: Full-CI QMC
            - text: algorithm of Booth, Thom, Alavi (
            - emphasis [ref=e17535]: J. Chem. Phys.
            - strong [ref=e17536]: "131"
            - text: ", 054106 (2009)) is the"
            - emphasis [ref=e17537]: only
            - text: method that has
            - emphasis [ref=e17538]: solved
            - text: the
            - emphasis [ref=e17539]: square
            - text: H₂O molecule in a
            - emphasis [ref=e17540]: hexuple-zeta
            - text: basis. We did not discuss QMC.
        - listitem [ref=e17541]:
          - paragraph [ref=e17542]:
            - strong [ref=e17543]: Equation-of-motion CC (EOM-CC) and multireference CC (MRCC).
            - text: The
            - strong [ref=e17544]: EOM-CCSD
            - text: method (Stanton & Bartlett,
            - emphasis [ref=e17545]: J. Chem. Phys.
            - strong [ref=e17546]: "98"
            - text: ", 7029 (1993)) extends CCSD to"
            - emphasis [ref=e17547]: excited
            - text: ","
            - emphasis [ref=e17548]: ionised
            - text: ", and"
            - emphasis [ref=e17549]: electron- attached
            - text: states by acting on the CCSD wavefunction with a
            - emphasis [ref=e17550]: linear
            - text: operator
            - img [ref=e17552]
            - text: and diagonalising the
            - emphasis [ref=e17561]: similarity-transformed
            - text: Hamiltonian
            - img [ref=e17563]
            - text: in the
            - emphasis [ref=e17602]: single-excitation
            - text: space. The
            - strong [ref=e17603]: multireference CC
            - text: methods (Hanrath,
            - emphasis [ref=e17604]: Theor. Chem. Acc.
            - strong [ref=e17605]: "123"
            - text: ", 245 (2009)) are the"
            - emphasis [ref=e17606]: open
            - text: "problem in modern quantum chemistry: how to combine the"
            - emphasis [ref=e17607]: size extensivity
            - text: of the exponential ansatz with the
            - emphasis [ref=e17608]: qualitative correctness
            - text: of a multireference reference. We did not derive the EOM equations or the MRCC formalism.
        - listitem [ref=e17609]:
          - paragraph [ref=e17610]:
            - strong [ref=e17611]: Spin–orbit coupling and relativistic post-HF methods.
            - text: The
            - emphasis [ref=e17612]: scalar
            - text: relativistic effects (Darwin, mass–velocity) and the
            - emphasis [ref=e17613]: spin–orbit
            - text: coupling are
            - emphasis [ref=e17614]: essential
            - text: for the heavy elements of the periodic table (
            - img [ref=e17616]
            - text: ). The four-component Dirac–Hartree–Fock, four-component MP2, and four-component CCSD(T) methods are the
            - emphasis [ref=e17626]: production
            - text: tools for heavy-element quantum chemistry. We did not discuss them; they are the subject of
            - link "chapter 15" [ref=e17627] [cursor=pointer]:
              - /url: /DFT-notes/dft-notes/chapter-15/
            - text: (the
            - emphasis [ref=e17628]: next
            - text: chapter).
        - listitem [ref=e17629]:
          - paragraph [ref=e17630]:
            - strong [ref=e17631]: Periodic post-HF methods (periodic MP2, periodic CCSD(T)).
            - text: The
            - emphasis [ref=e17632]: periodic
            - text: versions of MP2, CCSD, and CCSD(T) extend the post-HF ladder to
            - emphasis [ref=e17633]: infinite
            - text: periodic systems (solids, surfaces). The
            - emphasis [ref=e17634]: cost
            - text: is dominated by the
            - img [ref=e17636]
            - text: "-point sampling, and the"
            - emphasis [ref=e17641]: practical
            - text: limit in 2025 is
            - emphasis [ref=e17642]: small-unit-cell
            - text: systems (
            - img [ref=e17644]
            - text: atoms). The
            - link "PI boys et al." [ref=e17652] [cursor=pointer]:
              - /url: https://doi.org/10.1063/5.0013845
              - text: PI boys
              - emphasis [ref=e17653]: et al.
            - text: and
            - link "Grüneis et al." [ref=e17654] [cursor=pointer]:
              - /url: https://doi.org/10.1063/5.0040469
              - text: Grüneis
              - emphasis [ref=e17655]: et al.
            - text: programmes are the production tools. We did not discuss periodic post-HF methods.
