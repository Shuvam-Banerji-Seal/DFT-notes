        - emphasis [ref=e847]: all
        - text: of these methods have a
        - emphasis [ref=e848]: systematic
        - text: "failure mode: the"
        - emphasis [ref=e849]: single-reference
        - text: assumption that underlies MP2, CCSD, and CCSD(T) breaks down for bond breaking, diradicals, and excited states of the same symmetry as the ground state — which is the topic of § 14.5. The rest of the chapter unpacks the ladder. We start with the perturbation-theory machinery that gives MP2 (§ 14.2), build the configuration-interaction hierarchy (§ 14.3) and its size-extensivity failure (§ 14.3.4), introduce the coupled-cluster exponential ansatz that fixes the failure (§ 14.4), survey the multireference methods for the problems that defeat single-reference theories (§ 14.5), and close with the semiempirical family (§ 14.6) and the basis-set extrapolation that any practical calculation must use to reach the “complete-basis-set” limit (§ 14.7).
      - heading "14.2 Møller–Plesset perturbation theory" [level=2] [ref=e850]
      - paragraph [ref=e851]:
        - text: Møller–Plesset perturbation theory is the simplest wavefunction-based correction of Hartree–Fock. The
        - emphasis [ref=e852]: zeroth order
        - text: is HF; the
        - emphasis [ref=e853]: first order
        - text: reproduces the HF energy exactly (the perturbation is by construction zero at first order); the
        - emphasis [ref=e854]: second order
        - text: — MP2 — is the first non-trivial correction, and is a
        - img [ref=e856]
        - text: sum over pairs of occupied and pairs of virtual orbitals. MP2 is the cheapest method that captures
        - emphasis [ref=e871]: dynamic correlation
        - text: — the short-range electron-electron cusp that HF misses — and is the default in many production codes for systems too large for CCSD(T).
