        - emphasis [ref=e10708]: undershoots
        - text: even further, the MP4 energy
        - emphasis [ref=e10709]: overshoots
        - text: again, and so on — the series is
        - emphasis [ref=e10710]: asymptotic
        - text: ", not convergent. The CCSD(T) energy is"
        - emphasis [ref=e10711]: finite
        - text: at every
        - img [ref=e10713]
        - text: (it is bounded from below by the variational principle), but it is
        - emphasis [ref=e10718]: systematically
        - text: "in error: the (T) correction is"
