          - img [ref=e119]
          - text: ); MP3 the second (
          - img [ref=e128]
          - text: ); CISD the third (
          - img [ref=e137]
          - text: ); CCSD the fourth (
          - img [ref=e146]
          - text: ); CCSD(T) the fifth (
          - img [ref=e155]
          - text: ); and full CI the sixth (
          - img [ref=e164]
          - text: ", exponential). The energy error at chemical accuracy ("
          - img [ref=e173]
          - text: ) drops monotonically along the ladder — from
          - img [ref=e195]
          - text: at HF to
          - img [ref=e218]
          - text: "at CCSD(T). The price for the last factor of three is the only one that is not polynomial: full CI scales exponentially and is"
