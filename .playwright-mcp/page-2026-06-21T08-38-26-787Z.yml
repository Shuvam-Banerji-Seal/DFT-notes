        - img [ref=e10661]
        - text: ", the FCI wavefunction becomes an"
        - emphasis [ref=e10666]: equal-weight superposition
        - text: of the covalent
        - img [ref=e10668]
        - text: and the ionic configurations, and
        - emphasis [ref=e10689]: no single determinant
        - text: is dominant. The MP2 / CCSD(T) methods
        - emphasis [ref=e10690]: fail
        - text: at large
        - img [ref=e10692]
        - text: because they
        - emphasis [ref=e10697]: expand around
        - text: the single-determinant reference, and the expansion is not convergent when the reference is not a good starting point.
      - paragraph [ref=e10698]:
