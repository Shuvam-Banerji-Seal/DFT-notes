      - heading "Chapter 09 — Forces & geometry optimisation" [level=1] [ref=e27]
      - blockquote [ref=e28]:
        - paragraph [ref=e29]:
          - text: The energy tells you
          - emphasis [ref=e30]: where
          - text: the equilibrium is. The forces tell you
          - emphasis [ref=e31]: how to walk there
          - text: . This chapter derives the gradient of the Kohn–Sham energy with respect to the nuclear coordinates, shows the basis-set correction that every atom-centred code must add, and turns the resulting vector field into a working geometry optimiser.
      - paragraph [ref=e32]:
        - text: By the end of
        - link "chapter 04" [ref=e33] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-04/
        - text: we had a working self-consistent Kohn–Sham (KS) loop that takes a geometry — a set of nuclear positions
        - img [ref=e35]
        - text: — and returns a single number, the Born–Oppenheimer energy
        - img [ref=e46]
        - text: . The Born–Oppenheimer separation itself is laid out in
        - link "chapter 01" [ref=e62] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-01/
        - text: (§1.4); the operators that enter the electronic Hamiltonian (kinetic, Coulomb, position) are the alphabet of
        - link "chapter 01" [ref=e63] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-01/
        - text: "§1.5. This chapter is about the next quantity a practical calculation needs: the"
        - strong [ref=e64]: gradient
        - text: "of that number with respect to the nuclear coordinates. The gradient is a vector field ${\\mathbf F_I = -\\partial E/\\partial \\mathbf R_I}"
        - emphasis [ref=e65]: "{I=1}^{N"
        - text: "\\text{atoms}$ that drives geometry optimisation ("
        - link "chapter 09, §9.6" [ref=e66] [cursor=pointer]:
          - /url: "#96-geometry-optimisation"
        - text: ), molecular dynamics (
        - link "§9.13" [ref=e67] [cursor=pointer]:
          - /url: "#913-what-we-left-out"
        - text: ), vibrational analysis (
        - link "chapter 10" [ref=e68] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-10/
        - text: ), and transition-state search. Computing the gradient in a
        - emphasis [ref=e69]: complete
        - text: basis set is essentially free, by the
        - strong [ref=e70]: Hellmann–Feynman theorem
        - text: (
        - link "§9.2" [ref=e71] [cursor=pointer]:
          - /url: "#92-derivation-of-the-hellmannfeynman-theorem-for-dft"
        - text: ); in a
        - emphasis [ref=e72]: finite
        - text: basis set it picks up a non-trivial correction, the
        - strong [ref=e73]: Pulay force
        - text: (
        - link "§9.3" [ref=e74] [cursor=pointer]:
          - /url: "#93-pulay-forces-the-correction-needed-for-incomplete-basis-sets"
        - text: ), that vanishes for plane waves but is the dominant non-trivial term in every Gaussian-basis code.
