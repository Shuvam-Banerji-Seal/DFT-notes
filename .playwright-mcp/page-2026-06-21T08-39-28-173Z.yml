      - heading "9.12 Problems" [level=2] [ref=e14301]
      - group [ref=e14302]:
        - generic "▸ Problem 1 (easy) — Hellmann–Feynman force for a 1-electron H-like atom" [ref=e14303] [cursor=pointer]
        - text: Consider a 1-electron atom with Hamiltonian and ground-state wavefunction . Compute the "force on the nucleus" in the limit of a complete basis set, i.e. the Hellmann–Feynman force (here is the position of the nucleus, taken to be the origin of the electron coordinates). Verify your answer by direct differentiation of the exact energy .
      - group [ref=e14304]:
        - generic "▸ Show answer" [ref=e14305] [cursor=pointer]
        - text: "**Step 1.** Apply with and . The Hellmann–Feynman force is zero by symmetry: the electron density is spherically symmetric about the origin, so The integrand is odd under , so the integral vanishes term by term. By the symmetry of a single 1-electron atom, the net force on the (single) nucleus is zero. **Step 2.** Verify by direct differentiation. The energy does not depend on (the nucleus position does not appear in the *electronic* Hamiltonian — only the electron–nuclear separation does, and shifting by a constant redefines the electron-coordinate origin without changing the spectrum). Therefore , and the force is . **Comment.** The 1-electron H atom is the one case in which the Hellmann–Feynman formula gives the answer *for the wrong reason* (by symmetry rather than by completeness). The two-electron He atom already has a non-zero Hellmann–Feynman force on the nucleus, and it differs from the full gradient in any finite basis. The H atom is therefore a poor test case for the Pulay correction."
      - group [ref=e14306]:
        - generic "▸ Problem 2 (medium) — Pulay force for a STO-nG basis" [ref=e14307] [cursor=pointer]
        - text: Show that for a single STO-nG contracted s-function centred on nucleus , the derivative of with respect to is a *p-type* function for some scalar function . Write explicitly and explain why this means the Pulay term in a STO-nG basis requires the *same* one-electron integral routines as an sp-shell calculation.
      - group [ref=e14308]:
        - generic "▸ Show answer" [ref=e14309] [cursor=pointer]
        - text: "**Step 1.** The derivative of the primitive with respect to its centre is (The chain rule on gives .) For the contracted function, where The function is a sum of *unnormalised* s-type primitive Gaussians, and the prefactor is the characteristic Cartesian p-type factor. So the derivative of an s-type STO is a vector-valued p-type function. **Step 2.** The Pulay matrix element is a sum of integrals of the form where is an s-type sum of primitives and is a one-electron operator. In the angular-momentum decomposition ([chapter 06](/DFT-notes/dft-notes/chapter-06/) §6.3) the integrand is a *product* of a p-type function and an s-type function acted on by , which is the same kind of integral that appears in an sp-shell calculation. Every production Gaussian code that has an sp integral routine therefore has the building blocks for the Pulay term \"for free\". **Step 3.** The two-electron Pulay integrals (needed for the and contributions) are of mixed s/p type, but again they reuse the existing integral routines. This is why the Pulay force in a Gaussian code has roughly the same cost as the SCF itself: the *new* work is the contraction of the integrals with the density matrix, not the *generation* of the integrals."
      - group [ref=e14310]:
        - generic "▸ Problem 3 (hard) — Derive the BFGS update formula" [ref=e14311] [cursor=pointer]
        - text: Starting from the secant condition and the **rank-two** ansatz with the BFGS choice , ( a scalar), derive the BFGS update formula and show that the update preserves positive-definiteness whenever .
      - group [ref=e14312]:
        - generic "▸ Show answer" [ref=e14313] [cursor=pointer]
        - text: "**Step 1 — impose the secant condition.** Apply to : Substitute and : We want this to equal . Taking the inner product with , and using the symmetry of to write and : **Step 2 — assemble the matrix form.** With fixed, the update is The terms with combine in pairs. The standard algebraic trick is to add and subtract two rank-one updates that have the same form but different scalings: The cleanest route is via the inverse form . Using the Sherman–Morrison–Woodbury identity for the rank-one update of by the secant condition, the result is the **BFGS update** stated in the problem: **Step 3 — positive-definiteness.** The update has the form , with and . By the matrix determinant lemma, The first bracket is (by definition of ). For the determinant to be positive, we need the second bracket to be positive, which requires . Since by induction, the numerator is non-negative; the condition therefore reduces to , i.e. . The same condition guarantees positive-definiteness of the inverse form by the Sherman–Morrison–Woodbury identity. So the BFGS update preserves positive-definiteness iff , which is the **curvature condition**."
      - heading "9.13 What we left out" [level=2] [ref=e14314]
      - paragraph [ref=e14315]: "This chapter covered the analytical gradient in DFT and the geometry-optimisation loop that uses it. Some of the obvious follow-ups we did not cover:"
      - list [ref=e14316]:
        - listitem [ref=e14317]:
          - strong [ref=e14318]: Ab-initio molecular dynamics (AIMD).
          - text: Once the forces are in hand, the classical equations of motion
          - img [ref=e14320]
          - text: can be integrated forward in time to generate a
          - emphasis [ref=e14346]: trajectory
          - text: of the nuclei. Born–Oppenheimer AIMD re-runs the SCF at every time step; Car–Parrinello AIMD propagates the orbitals alongside the nuclei with a fictitious electronic mass. Both are sub-fields in their own right; see Marx & Hutter,
          - emphasis [ref=e14347]: Ab Initio Molecular Dynamics
          - text: ", Cambridge (2009). The forces in this chapter are exactly the ones used in AIMD; the only new ingredient is the integrator (Verlet, velocity-Verlet, Nose–Hoover thermostat, etc.)."
        - listitem [ref=e14348]:
          - strong [ref=e14349]: Nudged elastic band (NEB).
          - text: To find a transition state between two minima, one relaxes a chain of geometries (the “images”) connected by springs, with the spring force
          - emphasis [ref=e14350]: projected out
          - text: of the perpendicular component and the
          - emphasis [ref=e14351]: "true"
          - text: force projected out of the tangential component. The resulting “nudged” force is the gradient of the NEB functional, and the algorithm is the same BFGS / LBFGS machinery applied to a chain of geometries. See Henkelman & Jónsson, J. Chem. Phys. 113, 9978 (2000).
        - listitem [ref=e14352]:
          - strong [ref=e14353]: Dimer method and growing-string method.
          - text: When only one minimum and a
          - emphasis [ref=e14354]: rough
          - text: idea of the transition state are known, the dimer method rotates a pair of geometries about their midpoint to find the lowest-curvature direction without the need for a full Hessian. The growing-string method grows the chain of images from both ends.
        - listitem [ref=e14355]:
          - strong [ref=e14356]: Transition-state search (nudged-elastic-band, dimer, eigenvector-following, gentlest-ascent dynamics).
          - text: All of these require a
          - emphasis [ref=e14357]: Hessian
          - text: (or a Hessian-vector product) at the saddle point; the most popular algorithm in production is the Baker–Chan version of eigenvector following, which climbs the lowest-eigenvalue mode of the Hessian while minimising in the orthogonal complement.
        - listitem [ref=e14358]:
          - strong [ref=e14359]: Internal coordinates (Z-matrix, redundant internals).
          - text: "The Cartesian-coordinate description is wasteful for the small vibrations of a molecule: the natural coordinates are bond stretches, angle bends, and dihedral torsions. The Baker–Hubbard transformation from Cartesians to internal coordinates accelerates convergence by 5–10x for typical organic molecules, and is the default in Gaussian’s Berny optimiser and in the ORCA geometry-optimisation module."
        - listitem [ref=e14360]:
          - strong [ref=e14361]: Constrained optimisation.
          - text: Fixing some degrees of freedom (e.g. the bond length of a reaction coordinate) and optimising the rest is the basis of
          - emphasis [ref=e14362]: relaxed scans
          - text: and of many constrained-MD techniques. The standard tool is the method of Lagrange multipliers, with the constraint gradient added to the force.
        - listitem [ref=e14363]:
          - strong [ref=e14364]: Optimisation in delocalised internal coordinates.
          - text: The Pulay–Baker approach (Pulay & Fogarasi, 1992) uses delocalised internals that are invariant under symmetry operations of the molecule, with a B-matrix that maps from internal to Cartesian space. This is the gold standard for difficult optimisations (transition metal complexes, weakly bound clusters).
        - listitem [ref=e14365]:
          - strong [ref=e14366]: Cell optimisation in non-cubic systems.
          - text: The stress tensor of
          - link "§9.9" [ref=e14367] [cursor=pointer]:
            - /url: "#99-cell-optimisation-in-periodic-systems-the-stress-tensor"
          - text: is for an arbitrary cell. In practice one maintains a minimum basis of cell parameters (3 angles + 3 lengths for a triclinic cell; fewer with symmetry), and the optimiser works in that reduced space. The Pulay stress and the non-local pseudopotential stress are the two terms that require the most care in a plane-wave code.
        - listitem [ref=e14368]:
          - strong [ref=e14369]: Symmetry handling.
          - text: Crystallographic and molecular point-group symmetries can be used to reduce the number of independent coordinates, and the gradient must be symmetrised after every step. The implementation in most codes is to work in the symmetry-adapted basis of irreducible representations.
      - blockquote [ref=e14370]:
        - paragraph [ref=e14371]:
          - text: "Next:"
          - link "chapter 10" [ref=e14372] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: — phonons and vibrations. The force constants (the Hessian of the BO energy surface) determine the vibrational frequencies of a molecule and the phonon dispersion of a solid; the same analytical-force machinery we have built here is the starting point.
