        - text: ", and the Pulay correction must be evaluated. In an atom-centred code the Pulay term is the dominant non-trivial contribution to the force evaluation, and it is the reason the force routine in such a code is comparable in cost to the SCF routine itself."
      - blockquote [ref=e3769]:
        - paragraph [ref=e3770]:
          - strong [ref=e3771]: Warning.
          - text: The Pulay correction is
          - emphasis [ref=e3772]: not
          - text: a small correction. For a minimal basis like STO-3G, it can be a sizeable fraction of the total force. Skipping it gives a geometry optimiser that converges to the wrong minimum, a vibrational frequency that is off by tens of percent, and a molecular-dynamics trajectory that does not conserve energy to within the time- step tolerance. The first three generations of Gaussian-basis quantum-chemistry codes (IBMOL, GAUSSIAN, HONDO) had bugs in their Pulay routines; fixing them was, in some cases, the difference between a published structure being correct and being off by 0.05 Å.
