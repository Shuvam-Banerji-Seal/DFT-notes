      - paragraph [ref=e8115]:
        - text: Silicon crystallises in the diamond structure (space group
        - img [ref=e8117]
        - text: ", No. 227). The conventional cell has 8 atoms; the primitive cell has 2. With 4 valence electrons per atom, the primitive cell contributes 8 valence electrons, filling 4 bands at zero temperature."
      - paragraph [ref=e8132]:
        - text: The Kohn–Sham band structure (LDA, plane-wave cutoff 30 Ha,
        - img [ref=e8134]
        - text: "MP mesh, Setyawan–Curtarolo path) has the following features:"
      - list [ref=e8147]:
