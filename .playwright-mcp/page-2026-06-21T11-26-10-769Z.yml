      - heading "11.4 The Fermi surface" [level=2] [ref=e4921]
      - paragraph [ref=e4922]:
        - text: The Fermi surface is the
        - emphasis [ref=e4923]: level set
        - text: of the band structure at the Fermi energy. In 3-D it is a 2-D surface; in 2-D a 1-D curve. Its shape is the central object of
        - strong [ref=e4924]: Fermiology
        - text: ", and the experimental techniques that measure it (de Haas–van Alphen, Shubnikov–de Haas, angle-resolved photoemission, Compton scattering) all read off some property of the Fermi surface."
      - heading "11.4.1 Constructing the Fermi surface" [level=3] [ref=e4925]
      - paragraph [ref=e4926]:
        - text: "The numerical problem: given a set of bands"
        - img [ref=e4928]
        - text: on a discrete k-mesh, find the points at which
        - img [ref=e4941]
        - text: .
      - paragraph [ref=e4960]:
        - text: For a coarse mesh, the simplest approach is
        - strong [ref=e4961]:
          - text: linear interpolation of
          - img [ref=e4963]
          - text: in each mesh cell
        - text: (the same idea as tetrahedron integration, but with the
        - emphasis [ref=e4968]: isosurface
        - text: rather than the integrated* form). Tile the BZ with tetrahedra, linearly interpolate the band energy within each tetrahedron, and intersect the level set
        - img [ref=e4970]
        - text: with each tetrahedron. The intersection is a 2-D polygon (a triangle if the level set passes through all four vertices, a quadrilateral if it cuts only three, and so on). Stitching the polygons together gives the Fermi surface.
      - paragraph [ref=e4989]:
