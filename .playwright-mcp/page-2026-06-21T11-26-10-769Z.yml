          - text: The conduction-band minimum is at
          - img [ref=e8151]
          - text: (about 85 % of the way from
          - img [ref=e8171]
          - text: to
          - img [ref=e8177]
          - text: ); the valence-band maximum is at
          - img [ref=e8183]
          - text: . The
          - strong [ref=e8188]: indirect gap
          - text: is
          - img [ref=e8190]
          - text: eV in LDA (the experimental value is 1.17 eV at room temperature; the LDA gap is the well-known ~50 % underestimate).
        - listitem [ref=e8211]:
          - strong [ref=e8212]:
            - text: Direct gap at
            - img [ref=e8214]
            - text: .
          - text: The lowest direct gap at
          - img [ref=e8220]
          - text: is larger,
          - img [ref=e8226]
          - text: eV in LDA (
          - img [ref=e8236]
          - text: eV experimentally). The difference between the direct gap at
          - img [ref=e8246]
          - text: and the indirect gap is what makes silicon an
          - emphasis [ref=e8251]: indirect
          - text: "semiconductor: an optical transition across the indirect gap requires a phonon to conserve crystal momentum, and is therefore a higher-order process with a much smaller matrix element than a direct transition."
        - listitem [ref=e8252]:
          - strong [ref=e8253]: Valence bands.
          - text: The top three valence bands at
