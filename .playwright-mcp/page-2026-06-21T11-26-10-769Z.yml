      - heading "11.5 Spin–orbit coupling in the band structure" [level=2] [ref=e5485]
      - paragraph [ref=e5486]:
        - text: The Kohn–Sham Hamiltonian of
        - link "chapter 04" [ref=e5487] [cursor=pointer]:
