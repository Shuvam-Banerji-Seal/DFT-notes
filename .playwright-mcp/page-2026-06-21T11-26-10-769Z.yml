      - heading "11.10 Workflow diagram" [level=2] [ref=e14107]
      - paragraph [ref=e14108]: The end-to-end workflow of a band-structure calculation is summarised below.
      - paragraph [ref=e14109]: "```mermaid"
      - paragraph [ref=e14110]:
        - text: "%%{init: {‘flowchart’: {‘htmlLabels’: true, ‘curve’: ‘basis’}}}%% graph LR A[“Crystal structure"
        - generic [ref=e14111]: lattice, atoms,magnetic order
        - text: ”] –> B[“Relax ionic positionschapter 09”] B –> C[“Converge E_cut,k-mesh, smearing”] C –> D[“SCF calculation
        - generic [ref=e14112]: on uniformMP mesh
        - text: "”] D –> E[“Self-consistentρ, V_eff”] E –> F1[“Band structureεₙ(k) onk-path”] E –> F2[“DOS g(E)on MP mesh”] E –> F3[“Projected DOSg_{a,ℓ}(E)”] E –> F4[“Fermi surface3-D isosurface”] F1 –> G[“Analyse:band character,effective mass,spin–orbit split”] F2 –> G F3 –> G F4 –> G G –> H[“Plots, tables,interpretation”]"
      - paragraph [ref=e14113]: classDef input fill:#faf9f5,stroke:#6c6a64,stroke-width:1px; classDef scf fill:#e8e0d2,stroke:#3d3d3a,stroke-width:1px; classDef post fill:#cc785c,stroke:#ffffff,stroke-width:1px; class A input class B input class C input class D scf class E scf class F1 post class F2 post class F3 post class F4 post class G post class H post
      - paragraph [ref=e14114]: "``’"
      - paragraph [ref=e14115]:
        - text: "The central column is the SCF: a converged density and effective potential on a uniform MP mesh. The four post-processing outputs (band structure, total DOS, projected DOS, Fermi surface) are"
        - emphasis [ref=e14116]: linear
        - text: "in the converged potential: they do not require a new SCF. The “Analyse” box is the human (or machine-learning) reader extracting physics — band character, effective masses, spin–orbit splittings, Fermi-surface topology — from the four compressed representations of the band structure."
      - blockquote [ref=e14117]:
        - paragraph [ref=e14118]:
          - strong [ref=e14119]: Note.
          - text: In a high-throughput calculation (e.g. the Materials Project), the same SCF is reused for
          - emphasis [ref=e14120]: all four
          - text: post-processing steps. In a high-accuracy calculation on a single material, the post-processing steps may be re-done on denser k-meshes than the SCF, with
          - img [ref=e14122]
          - text: adjusted to match the SCF value.
      - heading "11.11 Problems" [level=2] [ref=e14130]
      - group [ref=e14131]:
        - generic "▸ Problem 1 (easy) — DOS of a 1-D free electron gas" [ref=e14132] [cursor=pointer]
        - text: "For a 1-D free electron gas of length with periodic boundary conditions, the single-particle energies are with the spin degeneracy giving a factor of 2. Show that the density of states (per unit length) is You may use the *semiclassical* argument: the number of states with is (factor of 2 for the two spin states and the two directions), and differentiate with respect to ."
      - group [ref=e14133]:
        - generic "▸ Show answer" [ref=e14134] [cursor=pointer]
        - text: "**Setup.** For a 1-D system of length with periodic boundary conditions, the allowed wavevectors are with . The density of states in -space is per -point (one -point per interval ). The factor of 2 for spin gives states per unit . **Counting states.** The number of states with wavevector in is (The factor of 2 is for the two spin states; the factor of is the -space density of states per spin.) **Converting to energy.** The free-electron energy is Differentiating with respect to , **The DOS.** The number of states with energy is The DOS (number of states per unit length per unit energy) is the derivative: So the 1-D free-electron DOS is This is a **divergent** function as — a 1-D free electron has a divergent density of states at the bottom of the band, in contrast to the 3-D free electron (which has vanishing at the band bottom) and the 2-D free electron (which has a *constant* DOS). The divergence reflects the van Hove singularity at the band edge: the band has a minimum at , and the dispersion is quadratic in 1-D, giving a 1/ divergence."
      - group [ref=e14135]:
        - generic "▸ Problem 2 (medium) — Effective mass at a band extremum" [ref=e14136] [cursor=pointer]
        - text: "Near a non-degenerate band extremum at with energy , the band energy has a Taylor expansion where is the Hessian of the band at . 1. Show that the **effective mass tensor** defined by makes the band look like a free-electron band with anisotropic mass: i.e. that in the *diagonal* basis where is a scalar. 2. For silicon's conduction-band minimum near (a so-called \" minimum\"), the effective mass tensor in the cubic axes has the form with (longitudinal, along – ) and (transverse, perpendicular to it). Compute the **density-of-states effective mass** and the **conductivity effective mass** defined by ."
      - group [ref=e14137]:
        - generic "▸ Show answer" [ref=e14138] [cursor=pointer]
        - text: "**Part 1.** The Hessian is a real symmetric matrix, so it can be diagonalised by an orthogonal transformation: with diagonal and orthogonal. In the rotated basis , Define (the principal effective masses). Then This is the dispersion of a free particle with *anisotropi`c*' mass: the energy depends on separately, with effective masses along the three principal axes. The isotropic case gives the familiar . **Part 2.** The DOS effective mass is the geometric mean of the three principal masses: Plugging in the numbers: This is the effective mass that controls the electronic specific heat and the Pauli susceptibility of doped silicon. The conductivity effective mass is the harmonic mean: so This is the effective mass that controls the Drude conductivity of doped silicon (a longitudinal mass enters the conductivity with weight 1/3, a transverse mass with weight 2/3 because there are two transverse directions). Note that in this case, because the conductivity weights the lighter transverse mass more heavily."
      - group [ref=e14139]:
        - generic "▸ Problem 3 (hard) — Tight-binding band structure of graphene" [ref=e14140] [cursor=pointer]
        - text: Derive the tight-binding band structure of graphene starting from the two-atom basis and a single orbital per atom. Use the convention - primitive vectors and , - basis vectors and , - nearest-neighbour hoppings from A to the three B neighbours at , , . 1. Write down the Bloch Hamiltonian . 2. Compute its eigenvalues. Show that they touch at the ** point** . 3. Expand to first order in . Show that the resulting low-energy Hamiltonian is proportional to — the 2-D Dirac Hamiltonian. 4. Show that the **Fermi velocity** is . Use eV and Å to compute in m/s.
      - group [ref=e14141]:
        - generic "▸ Show answer" [ref=e14142] [cursor=pointer]
        - text: "**Part 1.** The Bloch Hamiltonian is the matrix with the diagonal elements set to (we measure energies from the centre of the – pair), and This is equation of section 11.9.2. **Part 2.** The eigenvalues of the matrix are The two bands touch when , i.e. when Setting and (modulo ) and solving for the Cartesian gives as the ** point** in the BZ. The other solution of the same equation (modulo reciprocal-lattice vectors) is the inequivalent ** ** point at . **Part 3.** Expand around : The first term is (the bands touch here). The gradient is At , and . Write the primitive vectors in Cartesian form: and . Then Compute the components: - -component: . With and : . So the -component is . - -component: Hmm, let me redo this more carefully. We have with and . Then and . But actually, looking at the more standard convention with the : , and the structure factor is depending on which convention. We can use any of the three phase conventions; the spectrum is the same. The result is that the linearised Hamiltonian near takes the form which is the **2-D massless Dirac Hamiltonian** in the *chiral* subspace spanned by the two orbitals of the unit cell. The Pauli matrices here act on the *sublattice* pseudospin (A vs. B), not on the real electron spin. The matrix would correspond to a sublattice mass term — this is the **Haldane mass**, which is forbidden by inversion symmetry in pristine graphene but allowed when inversion is broken (e.g. by a substrate or by the application of a perpendicular electric field). **Part 4.** The magnitude of the linear coefficient in the expansion gives the Fermi velocity. Computing explicitly (the details are in section 11.9.4): Plugging in the numbers: The numerator is eV·Å J·m J·m. The denominator is J·s. So Let me redo with care. . eV J J. Å m. J·s. So The accepted experimental value is m/s, so the tight-binding estimate is about 50 % too high — a -only tight-binding model with a single hopping is not exact. Adding a next-nearest-neighbour hopping (which shifts the bands rigidly in energy but does not affect the linear dispersion) and a third-nearest-neighbour hopping (which renormalises by about 20 %) brings the calculated into closer agreement with experiment. The full first-principles value (LDA, GGA) is m/s, slightly *below* the experimental value."
      - heading "11.12 What we left out" [level=2] [ref=e14143]
      - paragraph [ref=e14144]:
        - text: This chapter introduced the Kohn–Sham band structure, the density of states, the Fermi surface, effective masses, band character, and spin–orbit effects. A non-exhaustive list of the topics we have
        - emphasis [ref=e14145]: not
        - text: "covered:"
      - list [ref=e14146]:
        - listitem [ref=e14147]:
          - strong [ref=e14148]: Wannier functions.
          - text: The Bloch functions
          - img [ref=e14150]
          - text: are not the only complete basis of the occupied subspace. The
          - strong [ref=e14169]: Wannier functions
          - img [ref=e14171]
          - text: ", obtained by Fourier-transforming the Bloch functions over the BZ, are localised in real space (centred on the unit cell at"
          - img [ref=e14191]
          - text: ) and form the natural basis for tight-binding models, chemical-bonding analysis, and linear- scaling DFT. The Wannier functions of a set of isolated bands are
          - emphasis [ref=e14197]: not
          - text: "unique: a"
          - img [ref=e14199]
          - text: gauge freedom allows any unitary rotation among the
          - img [ref=e14211]
          - text: bands. Maximally-localised Wannier functions (MLWFs) are obtained by choosing the gauge that minimises the spread
          - img [ref=e14217]
          - text: . We will use Wannier functions in the
          - emphasis [ref=e14298]: Wannier-interpolation
          - text: of band structures and the construction of model tight-binding Hamiltonians.
        - listitem [ref=e14299]:
          - strong [ref=e14300]: Berry phase and the modern theory of polarisation.
          - text: The integral of
          - img [ref=e14302]
          - text: around a closed loop in the BZ is the
          - strong [ref=e14339]: Berry phase
          - text: of the band, a gauge-invariant quantity that encodes geometric information about the Bloch bundle. The modern theory of polarisation (King-Smith & Vanderbilt 1993; Resta 1994) shows that the
          - emphasis [ref=e14340]: spontaneous polarisation
          - text: of a crystal is a Berry phase of the occupied Bloch bundle, not a dipole moment of the charge density. We will not derive this here.
        - listitem [ref=e14341]:
          - strong [ref=e14342]: Chern number and the quantum Hall effect.
          - text: The integral of the Berry curvature
          - img [ref=e14344]
          - text: over the 2-D BZ is the
          - strong [ref=e14422]: Chern number
          - img [ref=e14424]
          - text: ", a topological invariant that classifies the band. Bands with"
          - img [ref=e14433]
          - text: cannot be connected to
          - img [ref=e14446]
          - text: bands without closing the band gap; the quantised Hall conductivity of a 2-D electron gas is
          - img [ref=e14459]
          - text: . The Chern number is the parent of modern “topological band theory” — topological insulators, Chern insulators, Weyl semimetals, and the entire
          - img [ref=e14497]
          - text: /
          - img [ref=e14507]
          - text: /
          - img [ref=e14514]
          - text: classification scheme for gapped and gapless band structures.
        - listitem [ref=e14520]:
          - strong [ref=e14521]: Anomalous Hall conductivity and the orbital magnetisation.
          - text: The integral of the Berry curvature over the
          - emphasis [ref=e14522]: "occupie`d"
          - text: ’ bands gives the
          - strong [ref=e14523]: intrinsic anomalous Hall conductivity
          - text: of a magnetic metal; the integral of the orbital magnetic moment of the occupied Bloch states gives the
          - strong [ref=e14524]: orbital magnetisation
          - text: . Both are bulk, ground-state properties of the band structure that depend only on the
          - emphasis [ref=e14525]: geometry
          - text: of the Bloch bundle — not on the disorder or scattering in the sample.
        - listitem [ref=e14526]:
          - strong [ref=e14527]: Band-structure interpolation by Wannier functions.
          - text: Given a set of MLWFs, the band structure of a
          - emphasis [ref=e14528]: finer
          - text: k-mesh (or of a supercell) can be reconstructed by Wannier interpolation. The cost of Wannier interpolation is
          - emphasis [ref=e14529]: linear
          - text: in the number of Wannier functions and
          - emphasis [ref=e14530]: independent
          - text: of the plane-wave cutoff, making it possible to compute fine band structures, Fermi surfaces, and anomalous Hall conductivities on dense meshes at a cost much lower than a direct DFT calculation.
        - listitem [ref=e14531]:
          - strong [ref=e14532]:
            - text: "Beyond LDA/GGA:"
            - img [ref=e14534]
            - text: and BSE.
          - text: The Kohn–Sham eigenvalues of LDA and GGA are not quasiparticle energies; the “band-gap problem” is a 30–50 % underestimate of the gap and a larger misplacement of the semicore
          - img [ref=e14548]
          - text: states. The
          - img [ref=e14554]
          - text: approximation (Hedin’s
          - img [ref=e14568]
          - text: self-energy, with the DFT orbitals as a starting point) corrects the band gap and improves the band positions, at a cost roughly
          - img [ref=e14576]
          - text: the LDA calculation. The Bethe–Salpeter equation (BSE) on top of
          - img [ref=e14588]
          - text: is the standard approach to optical absorption and excitons in solids.
