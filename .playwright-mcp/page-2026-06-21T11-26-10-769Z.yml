      - heading "11.2.5 Plotting a band structure" [level=3] [ref=e3136]
      - paragraph [ref=e3137]: "The algorithm to plot a band structure is:"
      - list [ref=e3138]:
        - listitem [ref=e3139]:
          - strong [ref=e3140]: Choose a k-path
          - text: as in
          - img [ref=e3142]:
            - link [ref=e3145] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-11-fcc-path"
          - text: or
          - img [ref=e3153]:
            - link [ref=e3156] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-11-bcc-path"
          - text: or
          - img [ref=e3164]:
            - link [ref=e3167] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-11-hex-path"
          - text: ", in Cartesian coordinates of the BZ."
        - listitem [ref=e3174]:
          - strong [ref=e3175]:
            - text: Sample
            - img [ref=e3177]
            - text: k-points per segment
          - text: uniformly along the path. The total number of k-points is
          - img [ref=e3186]
          - text: ", where"
          - img [ref=e3205]
          - text: is the number of segments.
        - listitem [ref=e3216]:
          - strong [ref=e3217]:
            - text: Compute
            - img [ref=e3219]
            - text: at each k-point.
          - text: "This requires a converged SCF calculation: the potential"
          - img [ref=e3232]
          - text: depends on the density, the density depends on the occupied states, the occupied states are the lowest
          - img [ref=e3243]
          - text: bands at each k-point. The SCF is typically done on a
          - emphasis [ref=e3256]: uniform
          - text: Monkhorst–Pack mesh (so the BZ integral for the density is well approximated); the k-path for the band-structure plot is a
          - emphasis [ref=e3257]: separate
          - text: ", denser set of k-points at which the eigenvalues of"
          - img [ref=e3259]
          - text: are evaluated
          - emphasis [ref=e3271]: non-self-consistently
          - text: using the converged potential.
        - listitem [ref=e3272]:
          - strong [ref=e3273]: Connect the dots.
          - text: Plot
          - img [ref=e3275]
          - text: vs. the cumulative path length, with vertical tick marks at the high- symmetry points. A 2-D band-structure plot has band index
          - img [ref=e3288]
          - text: on the vertical axis and cumulative path length on the horizontal.
        - listitem [ref=e3293]:
          - strong [ref=e3294]:
            - text: Draw a horizontal line at
            - img [ref=e3296]
            - text: .
          - text: This is the Fermi level, set by the converged occupation numbers.
      - blockquote [ref=e3304]:
        - paragraph [ref=e3305]:
          - strong [ref=e3306]: Note.
          - text: Step 3 above is called a
          - strong [ref=e3307]: non-self-consistent
          - text: calculation, or “bands” calculation in VASP / Quantum ESPRESSO terminology. The Kohn–Sham potential is fixed at the SCF result (computed on the MP mesh); the eigenvalues are evaluated on the k-path. This is a
          - emphasis [ref=e3308]: linear
          - text: "operation, much cheaper than the SCF itself, and it is the standard way to plot a band structure. A subtlety: the Fermi level in the non-SCF calculation can drift slightly from the SCF value if the k-path mesh samples the bands differently from the MP mesh. In practice one re-computes"
          - img [ref=e3310]
          - text: on the k-path mesh, or takes it directly from the SCF.
      - heading "11.2.6 The Python helper" [level=3] [ref=e3318]
      - paragraph [ref=e3319]: "A practical Python function that maps a k-path to a list of k-points and cumulative distances is short enough to inline here. We will use it in section 11.9. ```python"
      - heading "dft_notes/python_codes/chapter_11/_kpath.py" [level=1] [ref=e3320]
      - paragraph [ref=e3321]: import numpy as np
      - paragraph [ref=e3322]: "def kpath(points, n_per_segment=60): “\"”Return (kpts, dist) for a list of high-symmetry points."
      - code [ref=e3326]: "Parameters ---------- points : list of array-like, shape (3,) The k-path as a list of Cartesian coordinates in the BZ (in units of 2*pi / a for cubic, in units of the reciprocal lattice vectors in general). n_per_segment : int Number of k-points per straight segment. Returns ------- kpts : ndarray, shape (sum_segments, 3) The sampled k-points. dist : ndarray, shape (sum_segments,) Cumulative path length from the first k-point. \"\"\" pts = np.asarray(points, dtype=float) klist, dlist = [], [0.0] for i in range(len(pts) - 1): seg = np.linspace(pts[i], pts[i + 1], n_per_segment, endpoint=(i == len(pts) - 2)) if i > 0: seg = seg[1:] d = np.linalg.norm(np.diff(seg, axis=0), axis=1) klist.append(seg) dlist.extend(dlist[-1] + np.cumsum(d).tolist()) return np.vstack(klist), np.array(dlist)"
      - paragraph [ref=e3327]: "``’"
      - paragraph [ref=e3328]:
        - text: The first k-point is
        - code [ref=e3329]: kpts[0]
        - text: ", the last is"
        - code [ref=e3330]: kpts[-1]
        - text: ", and the length along the path is"
        - code [ref=e3331]: dist[-1]
        - text: ". We use this helper in the graphene worked example of section 11.9. ## 11.3 The density of states"
      - paragraph [ref=e3332]:
        - text: The DOS of
        - img [ref=e3334]:
          - link [ref=e3337] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-11-dos"
        - text: is a Brillouin-zone integral of a delta function. In practice the integral is approximated by a discrete sum over a finite k-mesh, and the delta function is replaced by a smooth approximation. The choice of approximation is a numerical art; this section catalogues the three standard methods.
      - heading "11.3.1 The naive histogram" [level=3] [ref=e3344]
      - paragraph [ref=e3345]:
        - text: "The most direct approach: pick a k-mesh of"
        - img [ref=e3347]
        - text: points, evaluate
        - img [ref=e3357]
        - text: at each, and bin the resulting list of eigenvalues into a histogram. This is fast, easy, and
        - emphasis [ref=e3369]: qualitatively correct
        - text: "but not very accurate: the histogram is piecewise-constant and has spurious noise from the finite mesh and the bin boundaries. The convergence of the histogram with"
        - img [ref=e3371]
        - text: is
        - img [ref=e3381]
        - text: in the absence of smearing,
        - img [ref=e3396]
        - text: with optimal Gaussian smearing.
      - paragraph [ref=e3412]: For pedagogical work and quick previews, the histogram is acceptable. For publication-quality DOS plots, use the methods below.
      - heading "11.3.2 Gaussian and Methfessel–Paxton smearing" [level=3] [ref=e3413]
      - paragraph [ref=e3414]:
        - text: A better method is to replace the delta function in
        - img [ref=e3416]:
          - link [ref=e3419] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-11-dos"
        - text: by a smooth function of finite width. The most common choice is the
        - strong [ref=e3426]: Gaussian
        - text: of width
        - img [ref=e3428]
        - text: ":"
      - paragraph [ref=e3433]:
        - img [ref=e3435]:
          - generic [ref=e3439]:
            - img [ref=e3440]
            - img [ref=e3530]
      - paragraph [ref=e3538]: The DOS is then
      - paragraph [ref=e3539]:
        - img [ref=e3541]:
          - generic [ref=e3545]:
            - img [ref=e3546]
            - img [ref=e3605]
      - paragraph [ref=e3613]:
        - text: The Gaussian is positive and normalised, so the resulting
        - img [ref=e3615]
        - text: is also positive and normalised; the width
        - img [ref=e3627]
        - text: controls the tradeoff between noise (small
        - img [ref=e3633]
        - text: ) and over-smoothing (large
        - img [ref=e3639]
        - text: ). The DOS converges to the true DOS as
        - img [ref=e3645]
        - emphasis [ref=e3654]: "an`d"
        - text: ’
        - img [ref=e3656]
        - text: ; in practice one picks
        - img [ref=e3670]
        - text: slightly larger than the natural energy resolution of the mesh (
        - img [ref=e3676]
        - text: ", where"
        - img [ref=e3688]
        - text: is the mean spacing of eigenvalues near
        - img [ref=e3696]
        - text: ).
      - paragraph [ref=e3701]:
        - text: The
        - strong [ref=e3702]: Methfessel–Paxton
        - text: (MP) smearing generalises the Gaussian by adding higher-order Hermite corrections that improve the systematic behaviour of the total energy at small
        - img [ref=e3704]
        - text: ":"
      - paragraph [ref=e3709]:
        - img [ref=e3711]:
          - generic [ref=e3715]:
            - img [ref=e3716]
            - img [ref=e3818]
      - paragraph [ref=e3826]:
        - text: The
        - img [ref=e3828]
        - text: term is the Gaussian. The coefficients
        - img [ref=e3838]
        - text: are chosen so that the integral of
        - img [ref=e3847]
        - text: over a band-pass
        - img [ref=e3859]
        - text: "reproduces the step function to order $\\sigma^{2N_\\text{MP}$: the"
        - emphasis [ref=e3874]: "systemati`c"
        - text: ’ error in the total energy falls as
        - img [ref=e3876]
        - text: for
        - img [ref=e3885]
        - text: (Gaussian),
        - img [ref=e3899]
        - text: for
        - img [ref=e3908]
        - text: ","
        - img [ref=e3922]
        - text: for
        - img [ref=e3931]
        - text: ", and so on. The MP smearing is the standard for high-throughput DFT: the total energy converges faster in"
        - img [ref=e3945]
        - text: ", at the price of a slightly less physical DOS at the Fermi level (the MP delta function is"
        - emphasis [ref=e3950]: not
        - text: positive-definite for
        - img [ref=e3952]
        - text: ", so the DOS can become slightly negative in the unoccupied region). For DOS plots, the Gaussian is preferred; for total-energy calculations, MP-x is preferred."
      - paragraph [ref=e3965]:
        - text: Both methods were derived in detail in
        - link "chapter 07" [ref=e3966] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: ; we will not re-derive them here.
      - heading "11.3.3 Tetrahedron integration" [level=3] [ref=e3967]
      - paragraph [ref=e3968]:
        - text: The third method, and the most accurate, is the
        - emphasis [ref=e3969]:
          - text: "*tetrahedron metho"
          - code [ref=e3970]: d*
        - text: (Lehmann–Taut 1972; Blöchl 1994). We derived it in detail in
        - link "chapter 07" [ref=e3971] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: (§7.11), so we only summarise the result here.
      - paragraph [ref=e3972]:
        - text: Tile the BZ with tetrahedra whose vertices are the k-points of a Monkhorst–Pack mesh. Within each tetrahedron, linearly interpolate the band energy. The BZ integral of the step function
        - img [ref=e3974]
        - text: over a single tetrahedron with vertex energies
        - img [ref=e4000]
        - text: is, by the
        - strong [ref=e4019]: Lehmann–Taut formula
        - text: ","
      - paragraph [ref=e4020]:
        - img [ref=e4022]:
          - generic [ref=e4026]:
            - img [ref=e4027]
            - img [ref=e4156]
      - paragraph [ref=e4165]:
        - text: The DOS is obtained by differentiating the integrated DOS with respect to energy. The result is continuous and piecewise-linear in
        - img [ref=e4167]
        - text: ", with cusps at the vertex energies; it converges to the true DOS as"
        - img [ref=e4173]
        - text: for the linear-interpolation tetrahedron method and
        - img [ref=e4194]
        - text: with Blöchl’s correction. The tetrahedron method is
        - strong [ref=e4214]: parameter-free
        - text: (no
        - img [ref=e4216]
        - text: to choose), which makes it the standard for high-accuracy DOS calculations.
      - paragraph [ref=e4221]: "The catch is the implementation: the tetrahedron method requires building the tetrahedra, tracking their vertices, and (for Blöchl’s correction) the neighbours of each tetrahedron. This is more work than a Gaussian-smearing code, but the speedup at production accuracy is significant (typically a factor of 2–4 in the number of k-points needed)."
      - heading "11.3.4 The projected DOS" [level=3] [ref=e4222]
      - paragraph [ref=e4223]:
        - text: The DOS of
        - img [ref=e4225]:
          - link [ref=e4228] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-11-dos"
        - text: sums over
        - emphasis [ref=e4235]: all
        - text: bands with equal weight. Often we want to know how much of a particular band has the character of a particular
        - emphasis [ref=e4236]: "atomi`c"
        - text: ’ orbital. The
        - strong [ref=e4237]: projected DOS
        - text: (pDOS) onto an atomic orbital
        - img [ref=e4239]
        - text: (atomic index
        - img [ref=e4255]
        - text: ", orbital index"
        - img [ref=e4261]
        - text: ) is
      - paragraph [ref=e4266]:
        - img [ref=e4268]:
          - generic [ref=e4272]:
