              - generic [ref=e4276]:
                - img [ref=e4318]
                - img [ref=e4350]
            - img [ref=e4377]
      - paragraph [ref=e4386]:
        - text: The square of the projection amplitude
        - img [ref=e4388]
        - text: is a
        - strong [ref=e4425]: band- and k-resolved weight
        - text: between 0 and 1. The pDOS onto
        - emphasis [ref=e4426]: all
        - text: the orbitals of a given atom
        - img [ref=e4428]
        - text: and angular momentum
        - img [ref=e4434]
        - text: is the sum over the
        - img [ref=e4440]
        - img [ref=e4456]
        - text: "-degenerate orbitals of the shell:"
      - paragraph [ref=e4461]:
        - img [ref=e4463]:
          - generic [ref=e4467]:
            - img [ref=e4468]
            - img [ref=e4527]
      - paragraph [ref=e4536]:
        - text: A pDOS plot shows
        - img [ref=e4538]
        - text: for several atoms and angular momenta on the same axes. It is the standard tool for assigning
        - emphasis [ref=e4557]: orbital character
        - text: "to bands: a band that is mostly"
        - img [ref=e4559]
        - text: on atom Fe will show up as a peak in
        - img [ref=e4571]
        - text: .
      - paragraph [ref=e4597]:
        - text: The amplitude
        - img [ref=e4599]
        - text: depends on the choice of projector
        - img [ref=e4637]
        - text: . In a plane-wave code, the standard choice is a set of
        - emphasis [ref=e4652]: spherical waves
        - text: centred on each atom (i.e. the partial waves of the PAW method, or the projectors of an ultrasoft pseudopotential). In a localised-basis code (SIESTA, FHI-aims, Gaussian-basis DFT), the projectors are the basis functions themselves, and the projection is just the expansion coefficient
        - img [ref=e4654]
        - text: . In a LAPW code (Wien2k, Elk), the projectors are the linearised augmented orbitals inside the muffin-tin spheres. Each choice has its own conventions; the pDOS is qualitatively robust but the quantitative peak heights depend on the projector definition.
      - blockquote [ref=e4677]:
        - paragraph [ref=e4678]:
          - strong [ref=e4679]: Tip.
          - text: "The pDOS is sometimes called the “fat-band” plot in a different form: a band-structure plot where each point"
          - img [ref=e4681]
