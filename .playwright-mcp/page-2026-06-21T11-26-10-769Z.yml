      - heading "Chapter 11 — Band structures" [level=1] [ref=e21]
      - blockquote [ref=e22]:
        - paragraph [ref=e23]:
          - text: Once you have solved the Kohn–Sham equations for a periodic solid, you are left with a list of energies that depend on a continuous variable
          - strong [ref=e24]: k
          - text: in the Brillouin zone. This chapter is about what to do with that list.
      - paragraph [ref=e25]:
        - text: By the end of
        - link "chapter 07" [ref=e26] [cursor=pointer]:
          - /url: /DFT-notes/dft-notes/chapter-07/
        - text: we had a Kohn–Sham Hamiltonian at every crystal momentum
        - strong [ref=e27]: k
        - text: in the first Brillouin zone, and we could solve the eigenproblem
        - img [ref=e29]
        - text: to obtain a discrete set of eigenvalues at each
        - strong [ref=e70]: k
        - text: . The result is a set of continuous functions
        - img [ref=e72]
        - text: — the
        - strong [ref=e87]: band structure
        - text: of the solid — and a discrete Fermi energy
        - img [ref=e89]
        - text: chosen so that exactly
        - img [ref=e98]
        - text: states are filled. Everything else in this chapter is a way of
        - emphasis [ref=e106]: compressing
        - text: "the band structure into a finite number of useful quantities: a band-structure plot along a 1-D k-path, a density of states (DOS) as a function of energy, a projected DOS onto atomic orbitals, a 2-D or 3-D Fermi surface, an effective mass tensor, an orbital character, a spin–orbit splitting. Each of these compressions is a small loss of information but a large gain in interpretability: the band-structure plot is the universal fingerprint of a solid, and reading it correctly is the single most useful skill in solid-state DFT."
      - blockquote [ref=e107]:
        - paragraph [ref=e108]:
          - strong [ref=e109]: Reading note.
          - text: This chapter assumes you have read chapters 01–07. It uses the plane-wave machinery of
          - link "chapter 06" [ref=e110] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-06/
          - text: and the Bloch / Brillouin-zone / k-point sampling machinery of
          - link "chapter 07" [ref=e111] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: "without re-deriving them. Forward cross-references: the projected DOS is the basis of the projected-crystal-field analysis in the transition-metal chapters that follow, and the Fermi-surface language is reused in the transport discussion."
      - heading "11.1 The claim" [level=2] [ref=e112]
      - blockquote [ref=e113]:
        - paragraph [ref=e114]:
          - strong [ref=e115]: The Kohn–Sham band structure.
          - text: "Let $V_\\text{eff}"
          - link "\\rho" [ref=e116] [cursor=pointer]:
            - /url: \mathbf r
          - text: $ be the self-consistent Kohn–Sham effective potential of
          - link "chapter 04" [ref=e117] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: ", evaluated at the ground-state density of a crystal. Let"
          - img [ref=e119]
          - text: be a point in the first Brillouin zone. The Kohn–Sham eigenproblem on the plane-wave basis of
          - link "chapter 07" [ref=e125] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-07/
          - text: is
          - img [ref=e127]:
            - generic [ref=e131]:
              - img [ref=e132]
              - img [ref=e196]
          - text: The eigenvalues
          - img [ref=e204]
          - text: are continuous functions of
          - img [ref=e217]
          - text: within each band
          - img [ref=e224]
          - text: . The set
          - img [ref=e230]
          - text: is the
          - strong [ref=e252]: Kohn–Sham band structure
          - text: .
      - paragraph [ref=e253]:
        - text: The continuity of
        - img [ref=e255]
        - text: in
        - img [ref=e268]
        - text: is a theorem, not an accident. For a non-degenerate band
        - img [ref=e275]
        - text: ", the eigenvalue is an analytic function of"
        - img [ref=e281]
        - text: in a neighbourhood of any
        - img [ref=e288]
        - text: where the band is separated from its neighbours; derivatives
        - img [ref=e295]
        - text: and second derivatives
        - img [ref=e320]
        - text: exist and are continuous. At
        - strong [ref=e354]: band crossings
        - text: and
        - strong [ref=e355]: degeneracies
        - text: ", differentiability can be lost; the formal statement is that the"
        - emphasis [ref=e356]: set
        - img [ref=e358]
        - text: is continuous in
        - img [ref=e375]
        - text: "even where individual bands are not differentiable. We will return to this point when we discuss avoided crossings and the analytic properties of the band structure in section 11.7. ### 11.1.1 Why “Kohn–Sham” and not “physical”?"
      - paragraph [ref=e381]:
        - text: Strictly speaking, the Kohn–Sham eigenvalues are
        - emphasis [ref=e382]: not
        - text: quasiparticle energies. The KS gap (the gap between the highest occupied and lowest unoccupied KS eigenvalue) differs from the
        - emphasis [ref=e383]: "true"
        - text: band gap of the solid, defined as the minimum energy to add or remove an electron. For LDA and GGA, the KS gap is typically 30–50 % smaller than the quasiparticle gap measured by photoemission; for semicore
        - img [ref=e385]
        - text: states, KS eigenvalues can be wrong by several eV. The correct way to obtain physically meaningful band gaps is the
        - img [ref=e391]
        - text: approximation of many-body perturbation theory, which is outside the scope of these notes.
      - paragraph [ref=e398]:
        - text: This chapter uses the KS band structure as the
        - emphasis [ref=e399]: starting point
        - text: . All the machinery developed here — band-structure plots, DOS, projected DOS, Fermi surfaces, effective masses — applies to
        - emphasis [ref=e400]: any
        - text: eigenvalue spectrum, whether from KS-DFT, Hartree–Fock, or
        - img [ref=e402]
        - text: . The qualitative shapes of the band structures are usually correct in LDA/GGA; the
        - emphasis [ref=e415]: positions
        - text: "of the bands are systematically shifted by the well-known “band-gap problem”. We will flag this caveat again in section 11.8. ### 11.1.2 The density of states"
      - paragraph [ref=e416]:
        - text: The
        - strong [ref=e417]: density of states
        - text: (DOS) at energy
        - img [ref=e419]
        - text: "is the number of single-particle states per unit energy per unit cell volume. In a crystal it is the sum over bands of a Brillouin-zone integral of a Dirac delta:"
      - paragraph [ref=e424]:
        - img [ref=e426]:
          - generic [ref=e430]:
            - img [ref=e431]
            - img [ref=e494]
      - paragraph [ref=e502]:
        - text: where
        - img [ref=e504]
        - text: is the volume of the first Brillouin zone. The integral is over the irreducible Brillouin zone if symmetry is exploited; the prefactor in
        - img [ref=e538]:
          - link [ref=e541] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-11-dos"
        - text: "already accounts for the symmetry. The DOS is the “spectroscopic” projection of the band structure: it loses all the"
        - strong [ref=e548]: k
        - text: "-dependent information and keeps only the energy-resolved density of states."
      - paragraph [ref=e549]: "Three properties to keep in mind:"
      - list [ref=e550]:
        - listitem [ref=e551]:
          - strong [ref=e552]: Units.
          - img [ref=e554]
          - text: is the number of states (per unit cell, per spin) with energy in
          - img [ref=e570]
          - text: . For a spinless calculation on a spin-paired system, the factor of 2 is inserted at the interpretation stage.
        - listitem [ref=e589]:
          - strong [ref=e590]: Integrals.
          - img [ref=e592]
          - text: for a spin-paired insulator with
          - img [ref=e634]
          - text: valence electrons, where the 1/2 is from the spin factor. This is the
          - strong [ref=e642]: Fermi-level fixing
          - text: condition.
        - listitem [ref=e643]:
          - strong [ref=e644]: Van Hove singularities.
          - text: Wherever
          - img [ref=e646]
          - text: (a band extremum or a saddle point), the integrand in
          - img [ref=e669]:
            - link [ref=e672] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-11-dos"
          - text: diverges as
          - img [ref=e680]
          - text: (extremum) or has a logarithmic divergence (saddle). These are the
          - strong [ref=e707]: van Hove singularities
          - text: ; they show up as cusps and peaks in the DOS plot and are useful spectroscopic fingerprints.
      - heading "11.1.3 The Fermi surface" [level=3] [ref=e708]
      - paragraph [ref=e709]:
        - text: The
        - strong [ref=e710]: Fermi surface
        - text: "is the set of points in the Brillouin zone at which the band energy equals the Fermi energy:"
      - paragraph [ref=e711]:
        - img [ref=e713]:
          - generic [ref=e717]:
            - img [ref=e718]
            - img [ref=e775]
      - paragraph [ref=e782]:
        - text: For a metal, this is a 2-D surface in the 3-D Brillouin zone (or, in 2-D, a 1-D curve). For an insulator or a semiconductor, the equation
        - img [ref=e784]
        - text: "has no solution: there is no Fermi surface, and the “Fermi level” sits in the gap."
      - paragraph [ref=e803]:
        - text: The Fermi surface is
        - emphasis [ref=e804]: the
        - text: "object of solid-state physics. Almost every low-temperature property of a metal is determined by the shape of the Fermi surface, the velocity of electrons on it, and the way it scatters: the electronic specific heat, the magnetic susceptibility, the de Haas–van Alphen frequency, the nesting that drives charge-density waves, the transport coefficients. Sections 11.4 and 11.5 will return to the Fermi surface at length."
      - heading "11.1.4 The band structure as afunction" [level=3] [ref=e805]:
        - text: 11.1.4 The band structure as a
        - emphasis [ref=e806]: function
      - paragraph [ref=e807]:
        - text: The band structure
        - img [ref=e809]
        - text: is, in the language of mathematics, a continuous map from
        - img [ref=e825]
        - text: (the Brillouin zone, topologically a 3-torus) to
        - img [ref=e835]
        - text: . The number of bands
        - img [ref=e842]
        - text: at each
        - img [ref=e854]
        - text: is the size of the Hamiltonian matrix, which is determined by the basis-set size — for a plane-wave code, by the kinetic-energy cutoff. In the
        - emphasis [ref=e860]: all-electron
        - text: limit the number of bands diverges (every atomic orbital generates a band, and the conduction-band continuum is unbounded). In
        - emphasis [ref=e861]: practice
        - text: we keep a finite number of bands (typically the lowest
        - img [ref=e863]
        - text: bands, with
        - img [ref=e883]
        - text: for an insulator and
        - img [ref=e908]
        - text: for a metal). The “deep” bands (many eV below the Fermi level) are not affected by chemistry and can be ignored; the “high” bands (many eV above the Fermi level) are empty and equally uninteresting unless we are computing optical properties.
      - blockquote [ref=e937]:
        - paragraph [ref=e938]:
          - strong [ref=e939]: Note.
          - text: The Kohn–Sham band structure
          - img [ref=e941]
          - text: is the answer to “what is the energy of an electron in the solid as a function of its crystal momentum?” The
          - strong [ref=e956]: Janak–Sham–Kohn
          - text: theorem (we will return to this in
          - link "chapter 12" [ref=e957] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: ) shows that the
          - emphasis [ref=e958]: "occupation-weighte`d"
          - text: "’ sum of KS eigenvalues is the derivative of the total energy with respect to particle number:"
          - img [ref=e960]
          - text: . This is the formal sense in which the band structure is “the” spectrum of the solid.
      - heading "11.2 Plotting the band structure along high-symmetry k-paths" [level=2] [ref=e984]
      - paragraph [ref=e985]:
        - text: The full band structure is a function on a 3-D Brillouin zone. We cannot plot a 4-D object. The standard trick is to plot
        - img [ref=e987]
        - text: along a 1-D
        - strong [ref=e1002]: k-path
        - text: that visits the high-symmetry points of the Brillouin zone, ordered so that no symmetry-equivalent point is missed. The path should be long enough to cover the irreducible BZ but short enough that the plot is readable.
      - heading "11.2.1 What is a “high-symmetry k-point”?" [level=3] [ref=e1003]
      - paragraph [ref=e1004]:
        - text: A
        - strong [ref=e1005]: high-symmetry point
        - text: is a point
        - img [ref=e1007]
        - text: in the BZ whose little group (the subgroup of the point group that leaves
        - img [ref=e1014]
        - text: invariant modulo a reciprocal-lattice vector) is non-trivial. At high-symmetry points bands can be degenerate; the degenerate representations carry the
        - strong [ref=e1020]: irrep labels
        - text: of the little group, and the band energies at these points are the canonical way to label bands in the literature. Bands plotted along the k-path are labelled by their little-group irreps at the endpoints of the path.
