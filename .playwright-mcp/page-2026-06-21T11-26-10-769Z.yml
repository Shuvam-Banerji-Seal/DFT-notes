        - text: "is spin-free: the orbital part of the wavefunction is decoupled from the spin, and every spin-degenerate orbital comes as a pair"
        - img [ref=e5489]
        - text: . This is a good approximation for light atoms (where the spin–orbit coupling is small) but a poor one for heavy atoms (where the spin–orbit coupling is large) and for any problem where the
        - emphasis [ref=e5512]: spin texture
        - text: "of the band structure matters: topological insulators, transition-metal dichalcogenides, skyrmion materials, the Rashba effect."
