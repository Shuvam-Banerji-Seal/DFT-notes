          - text: ); the 3-site chain has a degenerate ground state at
          - img [ref=e18353]
          - text: that makes the gap definition ambiguous. The 4-site chain is the smallest chain that reproduces all the qualitative features of the
          - strong [ref=e18362]: thermodynamic-limit Hubbard model
          - text: ": a metallic ground state at"
          - img [ref=e18364]
          - text: ", a Mott gap opening at finite"
          - img [ref=e18374]
          - text: ", a single-particle gap scaling as"
          - img [ref=e18380]
          - text: at strong coupling, and a Heisenberg-model effective Hamiltonian with
          - img [ref=e18392]
          - text: for the spin physics. The script also computes the
          - strong [ref=e18411]: spin gap
          - img [ref=e18413]
          - text: ", which is zero for the 1-D Heisenberg chain (the Bethe-ansatz ground state is a gapless spin liquid) but non-zero in higher dimensions — the 4-site chain is too small to see the spin gap close, but the calculation is a useful sanity check on the symmetrisation."
