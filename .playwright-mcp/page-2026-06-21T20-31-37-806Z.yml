      - heading "13.10.1 The LDA+DMFT loop (Kotliar et al. 2006, Lichtenstein & Katsnelson 1998)" [level=3] [ref=e18834]
      - paragraph [ref=e18835]:
        - text: The LDA+DMFT formalism combines the
        - emphasis [ref=e18836]: band-structure
        - text: machinery of LDA with the
        - emphasis [ref=e18837]: local
        - text: "(on-site) treatment of strong correlations from DMFT. The standard loop is:"
      - paragraph [ref=e18838]:
        - strong [ref=e18839]: Step 1 — LDA calculation.
        - text: Solve the KS equations with a local functional (LDA or GGA), obtaining the converged self-consistent KS potential
        - img [ref=e18841]
        - text: and the set of KS orbitals
        - img [ref=e18863]
        - text: .
      - paragraph [ref=e18876]:
        - strong [ref=e18877]: Step 2 — Construct a local basis.
        - text: Project the KS orbitals onto a set of
        - emphasis [ref=e18878]: "correlate`d"
        - text: ’ orbitals (typically the five
        - img [ref=e18880]
        - text: or seven
        - img [ref=e18888]
        - text: Wannier functions localised on the correlated atom) using the
        - strong [ref=e18895]: projected localised orbitals
        - text: (PLO) construction of Marzari & Vanderbilt (1997) or the
        - strong [ref=e18896]: maximally-localised Wannier functions
        - text: of Marzari & Vanderbilt (1997) and Souza, Marzari & Vanderbilt (2001). The PLO construction gives
      - img [ref=e18898]:
        - generic [ref=e18902]:
          - img [ref=e18903]
          - img [ref=e18968]
      - paragraph [ref=e18977]:
        - text: where
        - img [ref=e18979]
        - text: is a trial orbital centred on site
        - img [ref=e18994]
        - text: with angular-momentum character
        - img [ref=e19000]
        - text: (e.g. a spherical-harmonic-like
        - img [ref=e19006]
        - text: trial orbital), and the sum is over the KS bands and
        - img [ref=e19014]
        - text: "-points that span the correlated subspace. The projection"
        - img [ref=e19021]
        - text: defines the correlated subspace.
      - paragraph [ref=e19061]:
        - strong [ref=e19062]: Step 3 — Construct the Hubbard Hamiltonian.
        - text: "Project the LDA Hamiltonian onto the correlated subspace and add the local Hubbard interaction:"
      - img [ref=e19064]:
        - generic [ref=e19068]:
          - img [ref=e19069]:
            - generic [ref=e19072]:
              - generic [ref=e19165]:
