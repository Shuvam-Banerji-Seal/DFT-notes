      - heading "13.11 What we left out" [level=2] [ref=e20985]
      - paragraph [ref=e20986]: The chapter scratched the surface of a deep subject. The omissions below are the most important for a complete picture.
      - list [ref=e20987]:
        - listitem [ref=e20988]:
          - strong [ref=e20989]: The full Liechtenstein form of DFT+U and non-collinear DFT+U.
          - text: We used the Dudarev simplification
          - img [ref=e20991]:
            - link [ref=e20994] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-13-dudarev"
          - text: — a single effective
          - img [ref=e21003]
          - text: and a diagonal, spin-collinear occupation matrix. The full Liechtenstein form
          - img [ref=e21022]:
            - link [ref=e21025] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-13-liechtenstein"
          - text: has four independent
          - img [ref=e21034]
          - text: parameters (one per Slater–Condon integral
          - img [ref=e21040]
          - text: of the
          - img [ref=e21063]
          - text: shell) and treats the off-diagonal occupation matrix elements; the non-collinear form extends the occupation matrix to
          - img [ref=e21069]
          - text: in spin space and is needed for the orbitally-ordered manganites and the spin–orbit-coupled iridates. We did not derive the full rotational coupling or the non-collinear DFT+U+SOC.
        - listitem [ref=e21078]:
          - strong [ref=e21079]: DMFT in finite dimensions, in real time, and in practice.
          - text: The DMFT self-consistency loop
          - img [ref=e21081]:
            - link [ref=e21084] [cursor=pointer]:
              - /url: "#mjx-eqn%3Aeq%3Ach-13-dmft-loop"
          - text: is
          - emphasis [ref=e21092]: exact
          - text: only in the limit of infinite coordination; in finite dimensions
          - strong [ref=e21093]: cluster DMFT
          - text: (CDMFT) and
          - strong [ref=e21094]: dynamical cluster approximation
          - text: (DCA) capture short-range correlations beyond the on-site. The time-dependent extension (
          - strong [ref=e21095]: TD-DMFT
          - text: ) handles pump–probe experiments and the driven Mott insulator; the practical implementation of DFT+DMFT (in
          - link "TRIQS/DFTTools" [ref=e21096] [cursor=pointer]:
            - /url: https://triqs.github.io/triqs/
          - text: ", Questaal, or the ComCTQMC impurity solver) is a substantial engineering effort in its own right. We did not derive any of these."
        - listitem [ref=e21097]:
          - strong [ref=e21098]: Diagrammatic and quantum Monte Carlo for the Hubbard model.
          - text: The diagrammatic Monte Carlo (Kozik
          - emphasis [ref=e21099]: et al.
          - text: ", 2010) and the determinant quantum Monte Carlo (Blankenbecler, Scalapino, Sugar 1981) are"
          - emphasis [ref=e21100]: exact
          - text: (within statistical error) many-body methods for the Hubbard model — the former in the thermodynamic limit, the latter at finite temperature. Both suffer from the
          - strong [ref=e21101]: fermion-sign problem
          - text: away from half-filling and at low temperature. We did not discuss them; they are the subject of any graduate course on many-body physics.
        - listitem [ref=e21102]:
          - strong [ref=e21103]: The Bethe-ansatz solution of the 1-D Hubbard model.
          - text: The Lieb–Wu solution is the only
          - emphasis [ref=e21104]: analytical
          - text: solution of a strongly correlated lattice model in more than 0 dimensions. The ground state is a Mott insulator for any
          - img [ref=e21106]
          - text: at half-filling; the elementary excitations are the
          - strong [ref=e21115]: holons
          - text: (charge, no spin) and
          - strong [ref=e21116]: spinons
          - text: (spin, no charge) — a
          - emphasis [ref=e21117]: separation
          - text: of charge and spin that has no analogue in higher dimensions. We did not derive the Bethe-ansatz solution.
        - listitem [ref=e21118]:
          - strong [ref=e21119]:
            - text: Vertex corrections and beyond-
            - img [ref=e21121]
            - text: .
          - text: The GW approximation neglects the
          - strong [ref=e21128]: vertex corrections
          - text: in Hedin’s equations — the three-legged objects
          - img [ref=e21130]
          - text: and
          - img [ref=e21145]
          - text: that couple the self-energy to the
          - emphasis [ref=e21159]: two-particle
          - text: Green’s function. Vertex corrections are essential for satellite
          - emphasis [ref=e21160]: intensities
          - text: (not just energies) and for the description of charge-transfer excitations. The
          - img [ref=e21162]
          - text: +Bethe–Salpeter–Equation (
          - link "chapter 12" [ref=e21169] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: § 12.4.3) is the standard fix for the optical satellites; the
          - strong [ref=e21170]:
            - img [ref=e21172]
            - text: "-matrix"
          - text: approximation is the standard fix for the satellite intensities. We did not discuss either.
      - paragraph [ref=e21177]:
        - text: The chapter’s coverage is the
        - emphasis [ref=e21178]: minimum
        - text: "a working solid-state physicist or quantum chemist needs to know about correlated electrons: the"
        - emphasis [ref=e21179]: failure mode
        - text: of LDA, the
        - emphasis [ref=e21180]: Hubbard model
        - text: and the Mott transition
        - emphasis [ref=e21181]:
          - text: ", the *DFT+U correction with the Dudarev / Liechtenstein forms, the *choice of"
          - img [ref=e21183]
        - text: (linear-response, constrained DFT, cRPA), the
        - emphasis [ref=e21188]: hybrid-functional
        - text: alternative (HSE06), the GW self-energy* and the
        - img [ref=e21190]
        - text: /
        - img [ref=e21204]
        - text: ladder, and the *DMFT outloo
        - code [ref=e21215]: k*
        - text: . Anything more — the vertex corrections, the cluster extensions, the TD-DMFT dynamics — is a subject in its own right.
      - blockquote [ref=e21216]:
        - paragraph [ref=e21217]:
          - text: The DFT Notes series began with the Schrödinger equation and the postulates of quantum mechanics (
          - link "chapter 01" [ref=e21218] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-01/
          - text: ). It worked its way through the exponential wall of the many-body problem (
          - link "chapter 02" [ref=e21219] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-02/
          - text: ), the mean-field Hartree–Fock approximation (
          - link "chapter 03" [ref=e21220] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-03/
          - text: ), the Kohn–Sham reformulation that turned DFT into a practical tool (
          - link "chapter 04" [ref=e21221] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-04/
          - text: ), the Jacob’s-ladder of XC functionals (
          - link "chapter 05" [ref=e21222] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-05/
          - text: ), the numerical engines (basis sets (
          - link "chapter 06" [ref=e21223] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-06/
          - text: ), pseudopotentials (
          - link "chapter 08" [ref=e21224] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-08/
          - text: ), the applications (geometry optimisation (
          - link "chapter 09" [ref=e21225] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-09/
          - text: ), phonons (
          - link "chapter 10" [ref=e21226] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-10/
          - text: ), band structures (
          - link "chapter 11" [ref=e21227] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-11/
          - text: )), and the time-dependent extension (
          - link "chapter 12" [ref=e21228] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-12/
          - text: ). This chapter is the “where the rubber meets the road” chapter for correlated materials, the chapter where the standard approximations are
          - emphasis [ref=e21229]: not enough
          - text: ’ and the fixes (DFT+U, hybrids, GW, DMFT) live. The reader who has come this far has the background to read any modern paper on electronic-structure methods. The reader who wants to
          - emphasis [ref=e21230]: do
          - text: "the calculations on a real material needs the practice: install Quantum ESPRESSO or VASP, run a DFT+U calculation on NiO, compare to a"
          - img [ref=e21232]
          - text: calculation in Yambo, and then — if they are brave — try a DMFT calculation in TRIQS. The remaining chapters then broaden the scope to post-Hartree–Fock quantum-chemistry methods (
          - link "chapter 14" [ref=e21245] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-14/
          - text: ), relativistic effects (
          - link "chapter 15" [ref=e21246] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-15/
          - text: ), topological materials (
          - link "chapter 16" [ref=e21247] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-16/
          - text: ), and machine-learned interatomic potentials (
          - link "chapter 17" [ref=e21248] [cursor=pointer]:
            - /url: /DFT-notes/dft-notes/chapter-17/
          - text: ). The road from here is long, but the foundations are in place.
      - blockquote [ref=e21249]:
        - paragraph [ref=e21250]:
          - text: "Next:"
          - link "chapter 14" [ref=e21251] [cursor=pointer]:
