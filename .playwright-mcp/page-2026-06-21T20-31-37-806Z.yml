      - heading "13.6 Problems" [level=2] [ref=e8398]
      - group [ref=e8399]:
        - generic "▸ Problem 1 (easy) — DFT+U on a 2-orbital atom" [ref=e8400] [cursor=pointer]
        - text: "A toy 2-orbital atom has DFT energy with (the \"ionisation potential\" of each orbital), and is treated at half-filling ( ). In the uniform DFT solution the occupations are . The DFT+U correction (Dudarev form) is . For : 1. Compute the DFT+U energy of the uniform configuration . 2. Compute the DFT+U energy of the integer configuration (or the symmetric ). 3. Which configuration does DFT+U prefer? By how much (in eV)?"
      - group [ref=e8401]:
        - generic "▸ Show answer" [ref=e8402] [cursor=pointer]
        - text: "**Step 1 — uniform configuration.** With : **Step 2 — integer configuration.** With : **Step 3 — preference.** The integer configuration is preferred by The DFT part is the *same* in both configurations (the DFT energy depends only on the *sum* of the occupations, which is the same in both). The DFT+U correction *penalises* the fractional occupations and rewards the integer occupations. The energy gain is — half of the penalty, by the symmetry of the form. This is the *mechanism* by which DFT+U opens the band gap: the LDA-like uniform-density configuration is destabilised, the integer-occupation configuration is preferred, the system localises, and a gap opens between the occupied and unoccupied levels."
      - group [ref=e8403]:
        - generic "▸ Problem 2 (medium) — Linear-response U for a 2-orbital atom" [ref=e8404] [cursor=pointer]
        - text: "The linear-response of Cococcioni is defined as where is the *non-self-consistent* response of the occupation of the correlated atom to a shift of its on-site potential, and is the *self-consistent* response. For the 2-orbital atom of Problem 1, with a free parameter, the non-self-consistent response is the bare LDA response (the derivative of the occupation with respect to the potential, for a 1-electron level at ). The self-consistent response is the derivative *wit`h*' the DFT+U potential re-inserted self-consistently. 1. Set up the self-consistency equation. Show that the self-consistent occupation is (one electron split between two orbitals of energies and , with a Hubbard correction). 2. Compute . 3. Compute as a function of the *input* (i.e. the consistency condition )."
      - group [ref=e8405]:
        - generic "▸ Show answer" [ref=e8406] [cursor=pointer]
        - text: "**Step 1 — the self-consistency equation.** The effective potential seen by orbital is with , . With the Hubbard correction , the potential is . The occupation in the mean-field (Hartree-like) sense is , or, after rearrangement, giving . Summing over with , and exploiting the symmetry : (Check: at , when and when — the Hubbard correction *biases* the configuration towards .) **Step 2 — the response.** Differentiate with respect to at : The *bare* response is (i.e. in the formula above). **Step 3 — the consistency condition.** Apply : This gives , which is *not* self-consistent. The fix is that the *non-self-consistent* response should be computed in a *reference* calculation without the Hubbard correction *and without* the perturbation on the correlated atom — i.e. the *bare* KS response of the LDA to a perturbation that does *not* couple to the correlated atom. The correct formulation is where is the response of the LDA *ignoring* the on-site Hubbard term but *including* the perturbation , and is the response with the Hubbard term. With the correct , the linear-response is the *bare* interaction *minus* the screening by the Hubbard term itself — the difference between the on-site Coulomb of the *bare* atom and the on-site Coulomb of the *self-consistent* atom. In practice this is evaluated by finite differences in the DFT code; the result for a 2-orbital toy model with is depending on the discretisation of the perturbation. This is in the right ballpark for a transition-metal — the linear- response method works."
      - group [ref=e8407]:
        - generic "▸ Problem 3 (hard) — self-energy in the atomic limit" [ref=e8408] [cursor=pointer]:
          - text: ▸ Problem 3 (hard) —
          - img [ref=e8410]
          - text: self-energy in the atomic limit
        - text: The atomic limit of the Hubbard model has a frequency-dependent self-energy in the **second-order Born approximation** (the truncated form for a single site). 1. At half-filling and , simplify the self-energy. 2. Compute the *quasi-particle weight* from the derivative at the Fermi level . 3. Compute the *satellite energy* — the position of the pole in on the real axis — and compare it to the lower Hubbard band energy .
      - group [ref=e8423]:
        - generic "▸ Show answer" [ref=e8424] [cursor=pointer]
        - text: "**Step 1 — the half-filled self-energy.** At and , the self-energy becomes which is *frequency-independent*. This is the \"HF self-energy\" of a half-filled site — the *stati`c*' shift. The frequency-dependent correction vanishes because at half-filling. The lesson: the *stati`c*' part of the second-order self-energy is , the *dynamic*' part is zero at half-filling in the second-order Born approximation. To get a non-trivial frequency dependence, we need to go beyond second order. The **fluctuation-exchange (FLEX)** approximation or the **T-matrix** approximation is needed. The simplest non-trivial dynamic self-energy for the *Hubbard atom* is the **iterated second-order** where is the Hartree–Fock Green's function. At half-filling, for the up-spin in the mean-field of the down-spin (and similarly for the down-spin), giving This is the *Hubbard-I* self-energy (Hubbard 1963) — the simplest self-energy that captures the Mott physics. **Step 2 — the quasi-particle weight.** The Hubbard-I self-energy has so the quasi-particle weight is giving A QP weight of is *less than 1* — the system is *not* a Fermi liquid; half of the spectral weight is in the *incoherent* Hubbard sideband. The other half is in the QP peak, at the energy The QP peak is at (for the two spins), not at — the renormalisation by has shifted it by a factor of 2 from the bare atomic level. This is the *mass renormalisation* of the Hubbard atom. **Step 3 — the satellite.** The Hubbard-I self-energy has a pole at . This pole is *exactly* at the lower Hubbard band energy ( for the removal spectrum, for the addition spectrum). The pole in produces a *zero* in the denominator of , which gives the satellite in the single-particle spectral function at the lower Hubbard band energy. The weight of the satellite is , exactly the missing weight from the QP peak. The energy difference between the QP peak and the satellite is This is the *satellite–QP separation* — the characteristic energy scale of the Hubbard model. In real materials it is the energy of the \"six-eV satellite\" of Ni (where – and the satellite is at below the Fermi level). The Hubbard-I approximation captures this satellite correctly; the LDA misses it because it has *no* self-energy beyond the frequency-independent ."
