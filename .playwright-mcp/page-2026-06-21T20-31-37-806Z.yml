                - img [ref=e19309]
                - img [ref=e19311]
          - img [ref=e19325]
      - paragraph [ref=e19334]:
        - text: where
        - img [ref=e19336]
        - text: is the
        - emphasis [ref=e19395]: "projecte`d"
        - text: ’ hopping matrix,
        - img [ref=e19397]
        - text: is the double-counting-corrected energy level,
        - img [ref=e19406]
        - text: is the (rotationally-invariant) four-index Coulomb tensor (Lichtenstein 1995, Eq. (3); see §13.9.2 above), and
        - img [ref=e19434]
        - text: is a shorthand for the correlated orbital indices.
      - paragraph [ref=e19440]:
        - strong [ref=e19441]: Step 4 — DMFT self-consistency.
        - text: Compute the local Green’s function
        - img [ref=e19443]
        - text: from the DMFT self-consistency loop of §13.9.5. In the LDA+DMFT version, the
        - emphasis [ref=e19464]: "bat`h"
        - text: ’ Green function
        - img [ref=e19466]
        - text: "is defined on the correlated subspace and updated at each iteration:"
      - img [ref=e19486]:
        - generic [ref=e19490]:
          - img [ref=e19491]
          - img [ref=e19584]
      - paragraph [ref=e19593]:
        - text: where the subscript “loc” means the local projection onto the correlated subspace (a
        - img [ref=e19595]
        - text: matrix in the correlated-orbital space,
        - img [ref=e19605]
        - text: for
        - img [ref=e19615]
        - text: or
        - img [ref=e19621]
        - text: for
        - img [ref=e19631]
        - text: ). The bath function
        - img [ref=e19637]
        - text: is updated via
        - img [ref=e19657]
