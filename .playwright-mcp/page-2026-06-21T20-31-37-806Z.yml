          - img [ref=e6450]
      - paragraph [ref=e6459]:
        - text: The left equation computes the
        - emphasis [ref=e6460]: local
        - text: Green’s function of the lattice by summing over the band energies
        - img [ref=e6462]
        - text: with the
        - emphasis [ref=e6472]: current
        - text: self-energy
        - img [ref=e6474]
        - text: . The right equation inverts to find the bath that would reproduce this
        - img [ref=e6486]
        - text: as the impurity Green’s function of the SIAM. The SIAM is solved with a
        - strong [ref=e6496]: quantum impurity solver
