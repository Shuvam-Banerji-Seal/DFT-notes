          - text: . The papers here — Kotliar, Savrasov, Haule, Oudovenko, Parcollet & Marianetti 2006 (Rev. Mod. Phys. 78, 865), Haule 2007 (PRB 75, 155113), Haule, Yee & Kim 2010 (PRB 81, 195107), Werner, Millis & Troyer 2006 (PRL 97, 076405), and Haule & Birol 2015 (PRL 115, 256402) — built the
