        - generic [ref=e19754]:
          - img [ref=e19755]
          - img [ref=e19883]
      - paragraph [ref=e19892]:
        - text: The high-frequency limit of the self-energy,
        - img [ref=e19894]
        - text: ", is the"
        - strong [ref=e19925]: double-counting correction
        - text: "that removes the electron–electron interaction already present in the LDA energy. The two standard choices are:"
      - img [ref=e19927]:
        - generic [ref=e19931]:
          - img [ref=e19932]
          - img [ref=e19987]
      - paragraph [ref=e19996]: (the “fully-localised limit” of Anisimov, Zaanen & Andersen 1991, Eq. (5); see §13.9.1 above) and
      - img [ref=e19998]:
        - generic [ref=e20002]:
          - img [ref=e20003]
          - img [ref=e20045]
      - paragraph [ref=e20054]:
        - text: (the “around-mean-field” of Czyzyk & Sawatzky 1994). The FLL is the
        - emphasis [ref=e20055]: default
        - text: for insulating correlated systems (Mott insulators, charge-transfer insulators); the AMF is preferred for
        - emphasis [ref=e20056]: "metalli`c"
        - text: ’ systems where the LDA already gives a reasonable average occupancy.
      - paragraph [ref=e20057]:
        - strong [ref=e20058]: Step 6 — Iterate to charge self-consistency.
        - text: Re-solve the KS equations with the updated potential
        - img [ref=e20060]
        - text: ", obtain new KS orbitals, project onto the correlated subspace, re-construct the Hubbard Hamiltonian, and repeat the DMFT self-consistency. The total loop converges when both the DMFT self-energy and the DFT potential are self-consistent. The total computational cost is dominated by the"
        - emphasis [ref=e20074]: impurity-solver
        - text: "step (Step 4):"
        - img [ref=e20076]
        - text: per DMFT iteration with Hirsch-Fye,
        - img [ref=e20096]
        - text: with CT-HYB (see §13.10.2), and the number of DMFT iterations needed for convergence is typically 10–30.
      - paragraph [ref=e20112]:
        - text: The
        - strong [ref=e20113]: LDA+DMFT total energy
        - text: functional (Kotliar et al. 2006, Eq. (3); Haule & Birol 2015, Eq. (1)) is
      - img [ref=e20115]:
        - generic [ref=e20119]:
          - img [ref=e20120]
          - img [ref=e20240]
      - paragraph [ref=e20248]:
        - text: where the last three terms are the
        - strong [ref=e20249]: DMFT correlation energy
        - text: (the difference between the interacting and non-interacting impurity partition functions). The
        - strong [ref=e20250]:
          - text: force on atom
          - img [ref=e20252]
        - text: "is (Haule 2010, Eq. (12)):"
      - img [ref=e20258]:
        - generic [ref=e20262]:
          - img [ref=e20263]
          - img [ref=e20305]
      - paragraph [ref=e20314]:
        - text: which requires the
        - emphasis [ref=e20315]: stationary
        - text: implementation of Haule & Birol 2015 (a free-energy functional rather than an energy functional, so the forces are well-defined).
      - heading "13.10.2 The continuous-time quantum Monte Carlo impurity solver (Haule 2007, Werner 2006)" [level=3] [ref=e20316]
      - paragraph [ref=e20317]:
        - text: The DMFT impurity problem is a
        - emphasis [ref=e20318]: single-orbital Anderson impurity model
        - text: "(SIAM) with a non-interacting bath. The three modern solvers are:"
      - paragraph [ref=e20319]:
        - strong [ref=e20320]: Hirsch–Fye auxiliary-field QMC
        - text: (Hirsch & Fye 1986, PRL 56, 2521). The partition function is written as a discretised time-slice path integral, and the four-fermion interaction is decoupled with a Hubbard–Stratonovich transformation. Each time slice requires a matrix determinant and a Gaussian integral, giving a cost of
        - img [ref=e20322]
        - text: per Monte Carlo step. Hirsch–Fye is the
        - emphasis [ref=e20338]:
          - text: ol
          - code [ref=e20339]: d*' workhorse and is still used because of its simplicity. The *sign problem* is absent at half-filling for a *particle–hole symmetri
          - text: c
        - text: ’ Hamiltonian; away from half-filling the sign problem is severe and the method is
        - emphasis [ref=e20340]: not
        - text: used in practice for general
        - img [ref=e20342]
        - text: .
      - paragraph [ref=e20347]:
        - strong [ref=e20348]: Strong-coupling CT-QMC (CT-HYB)
        - text: (Werner, Comanac, de’ Medici, Troyer & Millis 2006, PRL 97, 076405; Haule 2007, PRB 75, 155113). The partition function is expanded in powers of the
        - emphasis [ref=e20349]: hybridisation
        - img [ref=e20351]
        - text: (the bath–impurity coupling), not in powers of the interaction
        - img [ref=e20357]
        - text: as in Hirsch–Fye. Each Monte Carlo step is the insertion or removal of a
        - emphasis [ref=e20362]: single
        - text: bath electron, and the cost is
        - img [ref=e20364]
        - text: per step. CT-HYB has the
        - emphasis [ref=e20380]: same
        - text: sign problem as Hirsch–Fye (none at half-filling, severe away from half-filling) but is
        - emphasis [ref=e20381]: much faster
        - text: and much less discretisation-error-prone* (the time discretisation
        - img [ref=e20383]
        - text: is absent). CT-HYB is the
        - emphasis [ref=e20390]: current workhorse
        - text: for LDA+DMFT.
      - paragraph [ref=e20391]:
        - strong [ref=e20392]: Weak-coupling CT-QMC (CT-INT)
        - text: (Rubtsov, Savkin & Lichtenstein 2005, PRB 72, 035122). The partition function is expanded in powers of the
        - emphasis [ref=e20393]: interaction
        - img [ref=e20395]
        - text: (and also in the bath hybridisation
        - img [ref=e20401]
        - text: for CT-AUX). CT-INT is
        - emphasis [ref=e20406]: complementary
        - text: "to CT-HYB: it works well at"
        - emphasis [ref=e20407]: small
        - img [ref=e20409]
        - text: (where CT-HYB has a hard time because the expansion in
        - img [ref=e20415]
        - text: is slow to converge) and poorly at
        - emphasis [ref=e20420]: large
        - img [ref=e20422]
        - text: (the complement). In practice CT-INT is used only for
        - emphasis [ref=e20427]: weak-coupling
        - text: problems.
      - paragraph [ref=e20428]:
        - text: The
        - strong [ref=e20429]: Haule 2007 implementation
        - text: of CT-HYB is the most widely used. The algorithm expands the partition function as a
        - emphasis [ref=e20430]: random walk
        - text: ’ in the space of Keldysh contours, and the cost is
        - img [ref=e20432]
        - text: per step (with
        - img [ref=e20449]
        - text: being the number of correlated orbitals and
        - img [ref=e20455]
        - text: the inverse temperature). The method is
        - emphasis [ref=e20460]: exact
        - text: (in the sense of no discretisation error) and
        - emphasis [ref=e20461]: continuous-time
        - text: (no
        - img [ref=e20463]
        - text: to choose). The
        - emphasis [ref=e20470]: sign problem
        - text: is the
        - emphasis [ref=e20471]: only
        - text: systematic error, and it is severe at low temperatures and for some materials (e.g. the Hubbard model away from half-filling).
      - 'heading "13.10.3 DFT+DMFT in practice: case studies (Kotliar et al. 2006 §V)" [level=3] [ref=e20472]'
      - paragraph [ref=e20473]:
        - text: The following are the
        - emphasis [ref=e20474]: success stories
        - text: "of DFT+DMFT (the materials where LDA fails dramatically and DFT+DMFT recovers the experiment):"
      - list [ref=e20475]:
        - listitem [ref=e20476]:
          - strong [ref=e20477]:
            - img [ref=e20479]
            - text: "-Mn"
          - text: (one of the most notoriously hard materials for LDA). The
          - img [ref=e20485]
          - text: phase is antiferromagnetic with a complex non-collinear spin structure (collinear below the Néel temperature
          - img [ref=e20491]
          - text: K, non-collinear spiral below
          - img [ref=e20505]
          - text: ). LDA predicts the wrong ground-state structure; DFT+DMFT predicts the correct one. (Kotliar et al. 2006, §V.A)
        - listitem [ref=e20513]:
          - strong [ref=e20514]:
            - img [ref=e20516]
            - text: "-Mn"
          - text: (the fcc phase, stable only as a thin film). LDA predicts a non-magnetic ground state; experiment shows a non-collinear antiferromagnet. DFT+DMFT with the Liechtenstein form recovers the experimental moment. (Kotliar et al. 2006, §V.A)
        - listitem [ref=e20521]:
          - strong [ref=e20522]:
            - img [ref=e20524]
            - text: "-Pu"
          - text: (the fcc phase of plutonium). DFT+DMFT is the
          - emphasis [ref=e20529]: only
          - text: first-principles method that gets the volume and the bulk modulus simultaneously right. LDA underestimates the volume by 25%. (Kotliar et al. 2006, §V.B)
        - listitem [ref=e20530]:
          - strong [ref=e20531]: Fe, Ni, Co
          - text: (the 3
          - img [ref=e20533]
          - text: ferromagnets). LDA underestimates the moment by 10–20%. DFT+DMFT with CT-HYB recovers the experimental moments. (Kotliar et al. 2006, §V.C)
        - listitem [ref=e20538]:
          - strong [ref=e20539]:
            - text: V
            - img [ref=e20541]
            - text: O
            - img [ref=e20548]
          - text: (the canonical Mott insulator). LDA predicts a metal; experiment shows an insulator. The DFT+DMFT Mott transition (driven by pressure or doping) is the
          - emphasis [ref=e20554]: "textboo`k"
          - text: ’ example. (Held 2007)
        - listitem [ref=e20555]:
          - strong [ref=e20556]: The cuprates
          - text: (high-Tc superconductors). DFT+DMFT with the
          - emphasis [ref=e20557]: layer-DMFT
          - text: extension (where the self-energy is local
          - emphasis [ref=e20558]:
            - text: within a CuO
            - img [ref=e20560]
            - text: plane
          - text: ) gets the correct
          - emphasis [ref=e20566]: normal-state
          - text: spectral function and the
          - emphasis [ref=e20567]: pseudogap
          - text: ’. The superconducting dome is not in plain DFT+DMFT (it requires additional ingredients for the pairing).
        - listitem [ref=e20568]:
          - strong [ref=e20569]: The iron pnictides
          - text: (the second family of high-Tc superconductors). DFT+DMFT reveals that these are
          - emphasis [ref=e20570]: Hund’s metals
          - text: ": the correlations are driven by the Hund’s-rule coupling"
          - img [ref=e20572]
          - text: ", not by the Hubbard"
          - img [ref=e20581]
          - text: . (Yin, Haule & Kotliar 2011, Nature Materials 10, 932)
      - heading "13.10.4 When to use DFT+U vs DFT+DMFT" [level=3] [ref=e20586]
      - paragraph [ref=e20587]:
        - text: The choice between DFT+U and DFT+DMFT is dictated by the
        - emphasis [ref=e20588]: number
        - text: "and degeneracy of the correlated orbitals:"
      - list [ref=e20589]:
        - listitem [ref=e20590]:
          - strong [ref=e20591]: DFT+U
          - text: "for “few correlated orbitals”: a"
          - emphasis [ref=e20592]: single
          - text: correlated atom per unit cell with a
          - emphasis [ref=e20593]: single
          - text: correlated shell (e.g. one
          - img [ref=e20595]
          - text: shell on the Cu in CuO). The Hubbard correction is a
          - emphasis [ref=e20602]: "stati`c"
          - text: "’ mean-field on the occupation matrix. Cost:"
          - img [ref=e20604]
          - text: per iteration (the standard DFT cost).
        - listitem [ref=e20618]:
          - strong [ref=e20619]: DFT+DMFT
          - text: "for “many correlated orbitals” or “degenerate shells”: multiple correlated atoms per unit cell (e.g. the two Cu in Cu"
          - img [ref=e20621]
          - text: O), the
          - emphasis [ref=e20627]: full
          - img [ref=e20629]
          - img [ref=e20639]
          - text: shell (with Hund’s
          - img [ref=e20645]
          - text: ), or
          - emphasis [ref=e20653]: frequency-dependent
          - text: quantities (e.g. ARPES spectra). The Hubbard correction is a
          - emphasis [ref=e20654]: "dynami`c"
          - text: "’ self-energy. Cost:"
          - img [ref=e20656]
          - text: per iteration with the impurity solver.
        - listitem [ref=e20675]:
          - strong [ref=e20676]: DFT+DMFT
          - text: "for “near degeneracy”: the"
          - img [ref=e20678]
          - text: shell of the rare earths, the
          - img [ref=e20686]
          - text: shell of the late transition metals, the
          - img [ref=e20694]
          - text: shell of the actinides. These are
          - emphasis [ref=e20701]: not
          - text: Mott insulators (LDA gets the ground state roughly right) but have a
          - emphasis [ref=e20702]: large
          - text: mass enhancement (the “Kondo physics” of the SIAM). DFT+U cannot capture the mass enhancement because it forces a static integer occupancy.
        - listitem [ref=e20703]:
          - strong [ref=e20704]: DFT+U for “fast” and DFT+DMFT for “right”
          - text: ": in"
          - emphasis [ref=e20705]: high-throughput
          - text: screening (e.g. the Materials Project), DFT+U is the only option because of its
          - img [ref=e20707]
          - text: cost. For
          - emphasis [ref=e20721]: one
          - text: material that the screening flags as interesting, DFT+DMFT is the next step.
      - heading "13.10.5 What this section doesn’t cover" [level=3] [ref=e20722]
      - list [ref=e20723]:
        - listitem [ref=e20724]:
          - strong [ref=e20725]: Cluster DMFT (CDMFT)
          - text: and
          - strong [ref=e20726]: dynamical cluster approximation (DCA)
          - text: ": the"
          - emphasis [ref=e20727]: short-range
          - text: correlation extensions of DMFT (finite cluster size
          - img [ref=e20729]
          - text: ). These are needed for the cuprates and the organic superconductors, where the antiferromagnetic correlations at
          - emphasis [ref=e20737]: nearest-neighbour
          - text: distance are essential. We did not derive the CDMFT or DCA self-consistency loops. See
          - link "Kotliar et al. 2006, §IV.D" [ref=e20738] [cursor=pointer]:
            - /url: https://doi.org/10.1103/RevModPhys.78.865
          - text: for the formalism.
        - listitem [ref=e20739]:
          - strong [ref=e20740]: GW+DMFT
          - text: ": the"
          - emphasis [ref=e20741]: merger
          - text: of GW (Hedin 1965, see §13.8.1) and DMFT. GW+DMFT captures both the
          - emphasis [ref=e20742]: non-local
          - text: screening (from GW) and the local strong correlations (from DMFT). We did not derive the GW+DMFT self-consistency loop. See
          - link "Biermann, Aryasetiawan, Georges 2003" [ref=e20743] [cursor=pointer]:
            - /url: https://doi.org/10.1103/PhysRevLett.90.086402
          - text: for the first GW+DMFT calculation.
        - listitem [ref=e20744]:
          - strong [ref=e20745]: Non-equilibrium DMFT
          - text: ": the time-dependent extension for pump–probe experiments. We did not derive the Keldysh-DMFT self-consistency. See"
          - link "Freericks, Turkowski, Zlatić 2006" [ref=e20746] [cursor=pointer]:
            - /url: https://doi.org/10.1103/PhysRevLett.97.266408
          - text: for the formalism.
        - listitem [ref=e20747]:
          - strong [ref=e20748]: DFT+DMFT in excited states
          - text: ": the Bethe–Salpeter"
          - list [ref=e20749]:
            - listitem [ref=e20750]:
              - text: DMFT merger for correlated materials. We did not derive the BSE+DMFT equations. See
              - link "Rohringer et al. 2018" [ref=e20751] [cursor=pointer]:
                - /url: https://doi.org/10.1103/RevModPhys.90.025003
              - text: for the modern review.
        - listitem [ref=e20752]:
          - strong [ref=e20753]: The maximum-entropy method
          - text: for analytic continuation of the imaginary-time data to real-frequency spectra. We did not derive the MEM algorithm. See
          - link "Jarrell & Gubernatis 1996" [ref=e20754] [cursor=pointer]:
            - /url: https://doi.org/10.1016/0370-1573(95)00074-7
          - text: for the standard reference.
