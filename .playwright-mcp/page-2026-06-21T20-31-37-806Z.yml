        - text: is the
        - emphasis [ref=e18468]:
          - text: screene
          - code [ref=e18469]: d*' $U$ of the *soli
          - text: d
        - text: ’ (with the hybridisation screening already included), while the DMFT
        - img [ref=e18471]
        - text: is the
        - emphasis [ref=e18476]: bare
        - text: on-site repulsion (the hybridisation screening is in the
        - emphasis [ref=e18477]: "bat`h"
        - text: ’
        - img [ref=e18479]
        - text: ).
      - heading "13.9.7 What these papers don’t say" [level=3] [ref=e18490]
      - paragraph [ref=e18491]:
        - text: The five papers above are the foundation of the field, but they are
        - emphasis [ref=e18492]: not
        - text: the end of the story. The limitations of the
        - emphasis [ref=e18493]: original
        - text: formulations are the
        - emphasis [ref=e18494]: seeds
        - text: of the next 30 years of work.
      - list [ref=e18495]:
        - listitem [ref=e18496]:
          - paragraph [ref=e18497]:
            - strong [ref=e18498]: No non-local correlations.
            - text: Both DFT+U [Anisimov, Zaanen, and Andersen, 1991, eq. (2.1), p. 944] and DMFT [Metzner and Vollhardt, 1989, eq. (1), p. 324; Georges, Kotliar, Krauth, and Rozenberg, 1996, p. 18-20] are
            - emphasis [ref=e18499]: local
            - text: theories — the self-energy is on-site. The non-local correlations (the superexchange
            - img [ref=e18501]
            - text: ", the inter-site charge fluctuations) are"
            - emphasis [ref=e18506]: missing
            - text: . The fix is
            - strong [ref=e18507]: cluster DMFT
            - text: (CDMFT) and the
            - strong [ref=e18508]: dynamical cluster approximation
            - text: (DCA), which embed a
            - emphasis [ref=e18509]: finite cluster
            - text: of correlated sites in the bath [Georges, Kotliar, Krauth, and Rozenberg, 1996, p. 124-125]. The non-local corrections are essential for the
            - emphasis [ref=e18510]: cuprates
            - text: (the antiferromagnetic superexchange of the half-filled Hubbard model) and the
            - emphasis [ref=e18511]: ferropnictides
            - text: (the orbital fluctuations between the Fe
            - img [ref=e18513]
            - text: orbitals).
        - listitem [ref=e18520]:
          - paragraph [ref=e18521]:
            - strong [ref=e18522]: No multi-orbital in the original DMFT.
            - text: The
            - emphasis [ref=e18523]: original
            - text: DMFT [Metzner and Vollhardt, 1989, eq. (1), p. 324; Georges, Kotliar, Krauth, and Rozenberg, 1996, § II, p. 18-25] is a
            - emphasis [ref=e18524]: single-orbital
            - text: theory — the SIAM has
            - emphasis [ref=e18525]: one
            - text: correlated orbital. The
            - emphasis [ref=e18526]: multi-orbital
            - text: case (the realistic
            - img [ref=e18528]
            - text: or
            - img [ref=e18536]
            - text: shell) is a
            - emphasis [ref=e18543]: "straightforwar`d"
            - text: ’ extension, but the
            - emphasis [ref=e18544]: impurity
            - text: becomes a
            - emphasis [ref=e18545]: multi-orbital
            - text: SIAM and the solver must handle the
            - emphasis [ref=e18546]: full
            - text: Hund’s-rule multiplet structure. The multi-orbital formulation is in [Georges, Kotliar, Krauth, and Rozenberg, 1996, § II.D, p. 32-38, and references therein], and the
            - emphasis [ref=e18547]: modern
            - text: multi-orbital CT-QMC solvers are the workhorse of DFT+DMFT [Kotliar, Savrasov, Haule, Oudovenko, Parcollet, Marianetti, 2006,
            - emphasis [ref=e18548]: Rev. Mod. Phys.
            - strong [ref=e18549]: "78"
            - text: ", 865]."
        - listitem [ref=e18550]:
          - paragraph [ref=e18551]:
            - strong [ref=e18552]:
              - text: No connection to
              - img [ref=e18554]
              - text: .
            - text: The DMFT self-energy
            - img [ref=e18562]
            - text: is
            - emphasis [ref=e18573]: local
            - text: by construction, but the
            - emphasis [ref=e18574]: exact
            - text: self-energy is
            - emphasis [ref=e18575]: non-local
            - text: . The fix is
            - strong [ref=e18576]: GW+DMFT
            - text: "[Biermann, Aryasetiawan, Georges, 2003,"
            - emphasis [ref=e18577]: Phys. Rev. Lett.
            - strong [ref=e18578]: "90"
            - text: ", 086402 (2003)], which combines the"
            - emphasis [ref=e18579]: non-local
            - img [ref=e18581]
            - text: self-energy with the
            - emphasis [ref=e18588]: local
            - text: DMFT self-energy via a
            - emphasis [ref=e18589]: double-counting
            - text: correction (analogous to the DFT+U double-counting). The result is a
            - emphasis [ref=e18590]: non-local
            - text: ", dynamic* self-energy that captures the"
            - emphasis [ref=e18591]: "screene`d"
            - text: ’ exchange (the
            - img [ref=e18593]
            - text: piece) and the
            - emphasis [ref=e18600]: local
            - text: Hubbard physics (the DMFT piece). The 1996 review [Georges, Kotliar, Krauth, and Rozenberg, 1996, p. 124-125] lists this as a
            - emphasis [ref=e18601]: future direction
            - text: ; it took another decade to make it work in practice.
        - listitem [ref=e18602]:
          - paragraph [ref=e18603]:
            - strong [ref=e18604]: No cluster extensions in the original DMFT.
            - text: The
            - emphasis [ref=e18605]: original
            - text: DMFT [Georges, Kotliar, Krauth, and Rozenberg, 1996, § II, p. 18-25] is
            - emphasis [ref=e18606]: single-site
            - text: . The
            - emphasis [ref=e18607]: cluster
            - text: extensions (CDMFT, DCA) are the
            - emphasis [ref=e18608]: natural
            - text: generalisation to finite dimensions [Georges, Kotliar, Krauth, and Rozenberg, 1996, p. 124-125]. The cluster DMFT embeds a
            - emphasis [ref=e18609]: finite cluster
            - text: of correlated sites in the bath, and the
            - emphasis [ref=e18610]: short-range
            - text: correlations (the antiferromagnetic superexchange, the nearest-neighbour charge fluctuations) are captured. The DCA is a
            - emphasis [ref=e18611]: momentum-space
            - text: cluster that captures the
            - emphasis [ref=e18612]: non-local
            - text: self-energy at
            - emphasis [ref=e18613]: discrete
            - text: momentum points. Both are essential for the cuprates and the ferropnictides.
        - listitem [ref=e18614]:
          - paragraph [ref=e18615]:
            - strong [ref=e18616]: No real-time DMFT in the original review.
            - text: The DMFT of [Georges, Kotliar, Krauth, and Rozenberg, 1996, § II, p. 18-25] is a
            - emphasis [ref=e18617]: ground-state
            - text: /
            - emphasis [ref=e18618]: finite-temperature
            - text: theory in imaginary time
            - emphasis [ref=e18619]: . The *real-time extension (for pump–probe experiments, for non-equilibrium transport) is the subject of the *non-equilibrium DMFT
            - text: of [Aoki, Tsuji, Eckstein, Kollar, Oka, Werner, 2014,
            - emphasis [ref=e18620]: Rev. Mod. Phys.
            - strong [ref=e18621]: "86"
            - text: ", 779]. The non-equilibrium DMFT is the"
            - emphasis [ref=e18622]: modern
            - text: tool for the
            - emphasis [ref=e18623]: "time-resolve`d"
            - text: ’ spectroscopy of correlated materials.
        - listitem [ref=e18624]:
          - paragraph [ref=e18625]:
            - strong [ref=e18626]: The Dudarev form is not rotationally invariant.
            - text: The simplified form [Dudarev, Botton, Savrasov, Humphreys, and Sutton, 1998, eq. (3), p. 1506] is
            - emphasis [ref=e18627]: not
            - text: rotationally invariant — it averages over the off-diagonal occupations and uses
            - img [ref=e18629]
            - text: as the
            - emphasis [ref=e18647]: single
            - text: parameter. The
            - emphasis [ref=e18648]: full
            - text: Liechtenstein form [Liechtenstein, Anisimov, and Zaanen, 1995, eq. (3), p. R5468] is rotationally invariant and
            - emphasis [ref=e18649]:
              - text: require
              - code [ref=e18650]: "d*' for the cuprates (the orbital-order parameter is a *rotation* of the $d_{x^2-y^2}$ orbital). The modern DFT+U codes implement *bot"
              - text: h
            - text: ’ forms, and the user can choose.
        - listitem [ref=e18651]:
          - paragraph [ref=e18652]:
            - strong [ref=e18653]: No cRPA in the original DFT+U.
            - text: The
            - emphasis [ref=e18654]: constrained-LDA
            - img [ref=e18656]
            - text: of [Anisimov, Zaanen, and Andersen, 1991, eq. (2.4), p. 945] is
            - emphasis [ref=e18661]: not
            - text: the ab initio
            - img [ref=e18663]
            - text: — it depends on the
            - emphasis [ref=e18668]: basis
            - text: (the atomic orbitals used for the projection) and on the
            - emphasis [ref=e18669]: energy window
            - text: (the set of bands included in the constraint). The
            - emphasis [ref=e18670]: ab initio
            - img [ref=e18672]
            - text: from
            - strong [ref=e18677]: constrained RPA
            - text: (cRPA) [Aryasetiawan, Imada, Georges, Kotliar, Biermann, Lichtenstein, 2004,
            - emphasis [ref=e18678]: Phys. Rev. B
            - strong [ref=e18679]: "70"
            - text: ", 195104] is"
            - emphasis [ref=e18680]: frequency-dependent
            - text: and
            - emphasis [ref=e18681]: basis-independent
            - text: . The cRPA
            - img [ref=e18683]
            - text: is the
            - emphasis [ref=e18688]: modern
            - text: input for both DFT+U and DMFT, and the
            - emphasis [ref=e18689]: original
            - text: constrained-LDA
            - img [ref=e18691]
            - text: is now considered a
            - emphasis [ref=e18696]: first approximation
            - text: .
        - listitem [ref=e18697]:
          - paragraph [ref=e18698]:
            - strong [ref=e18699]: No spin–orbit coupling in the original DFT+U.
            - text: The original DFT+U [Anisimov, Zaanen, and Andersen, 1991, eq. (2.1), p. 944] is
            - emphasis [ref=e18700]: spin-collinear
            - text: . The
            - emphasis [ref=e18701]: non-collinear
            - text: extension (with the
            - img [ref=e18703]
            - text: occupation matrix in spin space) is the
            - strong [ref=e18712]: DFT+U+SOC
            - text: of [Liechtenstein, Anisimov, and Zaanen, 1995, eq. (3), p. R5468] (the Liechtenstein form already includes the spin-off-diagonal occupations). The non-collinear form is essential for the
            - emphasis [ref=e18713]: iridates
            - text: (the spin–orbit-coupled
            - img [ref=e18715]
            - text: Mott insulator) and the
            - emphasis [ref=e18734]: actinides
            - text: (the spin–orbit-coupled
            - img [ref=e18736]
            - text: shell).
      - paragraph [ref=e18743]:
        - text: These limitations are
        - emphasis [ref=e18744]: not
        - text: flaws of the original papers — they are the
        - emphasis [ref=e18745]: boundary
        - text: of the
        - emphasis [ref=e18746]: original
        - text: theory, and the seeds of the
        - emphasis [ref=e18747]: next 30 years of work. The reader who wants to follow the *modern
        - text: developments should look at the reviews by [Kotliar, Savrasov, Haule, Oudovenko, Parcollet, Marianetti, 2006,
        - emphasis [ref=e18748]: Rev. Mod. Phys.
        - strong [ref=e18749]: "78"
        - text: ", 865] (DFT+DMFT) and [Aryasetiawan and Gunnarsson, 1998,"
        - emphasis [ref=e18750]: Rep. Prog. Phys.
        - strong [ref=e18751]: "61"
        - text: ", 237] (the"
        - img [ref=e18753]
        - text: /DFT connection).
