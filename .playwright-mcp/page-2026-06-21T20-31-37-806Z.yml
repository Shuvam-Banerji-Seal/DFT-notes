      - heading "13.2.7 DMFT outlook" [level=3] [ref=e5924]
      - paragraph [ref=e5925]:
        - text: The
        - strong [ref=e5926]: dynamical mean-field theory
        - text: (DMFT, Metzner & Vollhardt 1989, Georges & Kotliar 1992, Georges, Kotliar, Krauth, Rozenberg 1996) is the many-body method that treats the
        - emphasis [ref=e5927]: local
        - text: quantum fluctuations of a lattice model
        - emphasis [ref=e5928]: exactly
        - text: by mapping it to a single-impurity Anderson model (SIAM) in a self-consistent bath.
      - paragraph [ref=e5929]:
        - strong [ref=e5930]: The mapping.
        - text: The lattice Hubbard model
        - img [ref=e5932]:
          - link [ref=e5935] [cursor=pointer]:
            - /url: "#mjx-eqn%3Aeq%3Ach-13-hubbard"
        - text: is mapped to a single impurity site embedded in a bath of non-interacting electrons, with the impurity described by the Anderson Hamiltonian
      - img [ref=e5943]:
        - generic [ref=e5947]:
          - img [ref=e5948]
          - img [ref=e6120]
      - paragraph [ref=e6129]:
        - text: where
        - img [ref=e6131]
        - text: destroys an electron on the impurity,
        - img [ref=e6140]
        - text: destroys an electron in the bath state
        - img [ref=e6152]
        - text: ","
        - img [ref=e6158]
        - text: is the bath energy, and
        - img [ref=e6167]
        - text: is the hybridisation. The
        - strong [ref=e6175]: hybridisation function
      - img [ref=e6177]:
        - generic [ref=e6181]:
          - img [ref=e6182]
          - img [ref=e6235]
      - paragraph [ref=e6244]: encodes the bath. The impurity Green’s function is
      - img [ref=e6246]:
