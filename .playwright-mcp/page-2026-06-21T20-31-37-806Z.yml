        - text: as input.
      - paragraph [ref=e19715]:
        - strong [ref=e19716]: Step 5 — Update the DFT potential with the DMFT correction.
        - text: Once DMFT has converged for the current
        - img [ref=e19718]
        - text: ", the DMFT self-energy"
        - img [ref=e19733]
        - text: "is used to update the KS potential:"
