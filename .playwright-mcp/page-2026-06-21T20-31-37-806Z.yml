      - paragraph [ref=e6520]:
        - strong [ref=e6521]: The Mott transition in DMFT.
        - text: The DMFT solution of the Hubbard model on the Bethe lattice (infinite coordination) gives a first-order Mott transition at
        - img [ref=e6523]
        - text: at zero temperature, with a hysteresis region between
        - img [ref=e6544]
        - text: and
        - img [ref=e6563]
        - text: . At
        - img [ref=e6582]
        - text: the transition becomes a crossover with a smooth quasi-particle weight
        - img [ref=e6592]
        - text: that vanishes as
        - img [ref=e6608]
        - text: for
        - img [ref=e6618]
        - text: . The spectral function in the insulating phase has the two-Hubbard-band structure of
        - img [ref=e6631]:
          - link [ref=e6634] [cursor=pointer]:
