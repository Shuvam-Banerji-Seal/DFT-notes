          - emphasis [ref=e18814]: original
          - text: Anisimov–Zaanen– Andersen 1991 paper is short and readable; the
          - emphasis [ref=e18815]: original
          - text: Liechtenstein 1995 paper is very short (four pages) and
          - emphasis [ref=e18816]: very
          - text: dense. The
          - emphasis [ref=e18817]: original
          - text: Dudarev 1998 paper is short and readable. The
          - emphasis [ref=e18818]: original
          - text: Metzner–Vollhardt 1989 paper is short and readable. The
          - emphasis [ref=e18819]: Georges–Kotliar–Krauth–Rozenberg
          - text: 1996 review is
